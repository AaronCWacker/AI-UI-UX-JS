<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaussian Splat Studio</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Orbitron:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0c;
    color: #e0e0e0;
    font-family: 'JetBrains Mono', monospace;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }

  #canvas-container {
    position: absolute;
    inset: 0;
    z-index: 1;
  }

  canvas#three-canvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* HUD Overlay */
  #hud {
    position: absolute;
    inset: 0;
    z-index: 10;
    pointer-events: none;
  }

  #hud > * { pointer-events: auto; }

  /* Top bar */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 24px;
    background: linear-gradient(180deg, rgba(10,10,12,0.95) 0%, rgba(10,10,12,0) 100%);
  }

  .logo {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 18px;
    letter-spacing: 4px;
    text-transform: uppercase;
    background: linear-gradient(135deg, #ff3c3c, #ff8c00, #ffcc00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 40px rgba(255,60,60,0.3);
  }

  .stats-bar {
    display: flex;
    gap: 24px;
    font-size: 11px;
    letter-spacing: 1px;
    color: #888;
  }

  .stat-value {
    color: #ff6633;
    font-weight: 700;
  }

  /* Camera preview */
  #cam-preview {
    position: absolute;
    bottom: 20px;
    left: 20px;
    width: 240px;
    border: 1px solid rgba(255,100,50,0.3);
    border-radius: 4px;
    overflow: hidden;
    background: #111;
    box-shadow: 0 0 30px rgba(255,60,60,0.15);
  }

  #cam-preview video {
    width: 100%;
    display: block;
    opacity: 0.9;
  }

  #cam-preview canvas {
    display: none;
  }

  .cam-label {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 6px 10px;
    background: rgba(0,0,0,0.7);
    color: #ff6633;
    border-top: 1px solid rgba(255,100,50,0.2);
  }

  /* Controls panel */
  .controls {
    position: absolute;
    bottom: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: flex-end;
  }

  .ctrl-btn {
    padding: 10px 20px;
    border: 1px solid rgba(255,100,50,0.4);
    background: rgba(20,20,24,0.9);
    color: #ff6633;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.2s;
    backdrop-filter: blur(10px);
  }

  .ctrl-btn:hover {
    background: rgba(255,100,50,0.15);
    border-color: #ff6633;
    box-shadow: 0 0 20px rgba(255,100,50,0.2);
  }

  .ctrl-btn.active {
    background: rgba(255,60,60,0.2);
    border-color: #ff3c3c;
    color: #ff3c3c;
    box-shadow: 0 0 20px rgba(255,60,60,0.3);
  }

  .ctrl-btn.primary {
    background: linear-gradient(135deg, rgba(255,60,60,0.3), rgba(255,140,0,0.3));
    border-color: #ff6633;
    font-weight: 700;
  }

  /* Slider controls */
  .slider-group {
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 16px;
    background: rgba(15,15,18,0.9);
    padding: 16px;
    border: 1px solid rgba(255,100,50,0.2);
    border-radius: 4px;
    backdrop-filter: blur(10px);
  }

  .slider-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .slider-item label {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #888;
  }

  .slider-item input[type="range"] {
    -webkit-appearance: none;
    width: 140px;
    height: 3px;
    background: #333;
    border-radius: 2px;
    outline: none;
  }

  .slider-item input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    background: #ff6633;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 10px rgba(255,100,50,0.5);
  }

  .slider-val {
    font-size: 11px;
    color: #ff6633;
    font-weight: 700;
  }

  /* Info overlay */
  .info-overlay {
    position: absolute;
    top: 60px;
    left: 24px;
    font-size: 10px;
    color: #555;
    line-height: 1.8;
    letter-spacing: 1px;
  }

  .info-overlay .key {
    display: inline-block;
    padding: 1px 6px;
    border: 1px solid #444;
    border-radius: 2px;
    color: #777;
    font-size: 9px;
    margin-right: 4px;
  }

  /* Capture flash */
  .capture-flash {
    position: absolute;
    inset: 0;
    background: rgba(255,100,50,0.1);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.1s;
    z-index: 5;
  }

  .capture-flash.flash {
    opacity: 1;
    transition: opacity 0s;
  }

  /* Mode indicator */
  .mode-indicator {
    position: absolute;
    top: 60px;
    right: 24px;
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    color: #ff3c3c;
    text-transform: uppercase;
    animation: pulse-glow 2s ease-in-out infinite;
  }

  @keyframes pulse-glow {
    0%, 100% { opacity: 0.5; text-shadow: 0 0 10px rgba(255,60,60,0.3); }
    50% { opacity: 1; text-shadow: 0 0 20px rgba(255,60,60,0.6); }
  }

  /* Crosshair */
  .crosshair {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 40px;
    height: 40px;
    pointer-events: none;
  }

  .crosshair::before, .crosshair::after {
    content: '';
    position: absolute;
    background: rgba(255,100,50,0.3);
  }

  .crosshair::before {
    top: 50%;
    left: 0;
    right: 0;
    height: 1px;
    transform: translateY(-50%);
  }

  .crosshair::after {
    left: 50%;
    top: 0;
    bottom: 0;
    width: 1px;
    transform: translateX(-50%);
  }

  /* Loading state */
  #loading {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0a0a0c;
    z-index: 100;
    transition: opacity 0.5s;
  }

  #loading.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .loading-text {
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    letter-spacing: 6px;
    color: #ff6633;
    margin-top: 20px;
  }

  .loading-spinner {
    width: 40px;
    height: 40px;
    border: 2px solid #222;
    border-top-color: #ff6633;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loading">
  <div class="loading-spinner"></div>
  <div class="loading-text">Initializing</div>
</div>

<div id="canvas-container">
  <canvas id="three-canvas"></canvas>
</div>

<div class="capture-flash" id="flash"></div>

<div id="hud">
  <div class="top-bar">
    <div class="logo">Gaussian Splat Studio</div>
    <div class="stats-bar">
      <div>SPLATS: <span class="stat-value" id="splat-count">0</span></div>
      <div>FPS: <span class="stat-value" id="fps-display">0</span></div>
      <div>MEMORY: <span class="stat-value" id="mem-display">0</span> MB</div>
    </div>
  </div>

  <div class="info-overlay">
    <div><span class="key">SPACE</span> Capture Frame</div>
    <div><span class="key">C</span> Toggle Continuous</div>
    <div><span class="key">R</span> Reset Scene</div>
    <div><span class="key">G</span> Toggle Grid</div>
    <div><span class="key">1-3</span> Depth Mode</div>
    <div>Drag to orbit · Scroll to zoom</div>
  </div>

  <div class="mode-indicator" id="mode-label">● Single Capture</div>

  <div id="cam-preview">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="sample-canvas"></canvas>
    <div class="cam-label">Camera Feed</div>
  </div>

  <div class="slider-group">
    <div class="slider-item">
      <label>Splat Size</label>
      <input type="range" id="splat-size" min="0.5" max="8" step="0.1" value="2.5">
      <span class="slider-val" id="splat-size-val">2.5</span>
    </div>
    <div class="slider-item">
      <label>Sample Density</label>
      <input type="range" id="density" min="8" max="64" step="4" value="32">
      <span class="slider-val" id="density-val">32</span>
    </div>
    <div class="slider-item">
      <label>Depth Spread</label>
      <input type="range" id="depth-spread" min="0.5" max="10" step="0.5" value="3">
      <span class="slider-val" id="depth-spread-val">3.0</span>
    </div>
    <div class="slider-item">
      <label>Opacity</label>
      <input type="range" id="opacity" min="0.1" max="1" step="0.05" value="0.7">
      <span class="slider-val" id="opacity-val">0.70</span>
    </div>
    <div class="slider-item">
      <label>Rotation Speed</label>
      <input type="range" id="auto-rotate" min="0" max="2" step="0.1" value="0.3">
      <span class="slider-val" id="auto-rotate-val">0.3</span>
    </div>
  </div>

  <div class="controls">
    <button class="ctrl-btn primary" id="btn-capture">⚡ Capture [Space]</button>
    <button class="ctrl-btn" id="btn-continuous">◉ Continuous [C]</button>
    <button class="ctrl-btn" id="btn-reset">✕ Reset [R]</button>
    <button class="ctrl-btn" id="btn-grid">▦ Grid [G]</button>
    <button class="ctrl-btn" id="btn-export">↓ Export .PLY</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
// GAUSSIAN SPLAT STUDIO — Real-time Camera → 3D Gaussian Splats
// ============================================================

const CONFIG = {
  maxSplats: 500000,
  captureInterval: 200,
  depthMode: 1, // 1=luminance, 2=color-hue, 3=random
};

let scene, camera, renderer, clock;
let splatGeometry, splatMaterial, splatMesh;
let splatData = []; // {x,y,z, r,g,b, sx,sy,sz, opacity}
let videoEl, sampleCanvas, sampleCtx;
let continuous = false;
let captureTimer = null;
let frameCount = 0;
let lastFpsTime = 0;
let gridHelper;
let orbitState = { theta: 0, phi: Math.PI / 4, radius: 15, target: new THREE.Vector3(0, 0, 0) };
let isDragging = false;
let lastMouse = { x: 0, y: 0 };
let autoRotateSpeed = 0.3;
let captureIndex = 0;

// ---- CUSTOM GAUSSIAN SPLAT SHADER ----
const splatVertexShader = `
  attribute float aSize;
  attribute float aOpacity;
  attribute vec3 aColor;
  attribute vec3 aSplatScale;

  varying vec3 vColor;
  varying float vOpacity;
  varying vec2 vUv;

  void main() {
    vColor = aColor;
    vOpacity = aOpacity;

    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);

    // Billboard size based on splat scale and distance
    float avgScale = (aSplatScale.x + aSplatScale.y + aSplatScale.z) / 3.0;
    gl_PointSize = aSize * avgScale * (300.0 / -mvPosition.z);
    gl_PointSize = clamp(gl_PointSize, 1.0, 128.0);

    gl_Position = projectionMatrix * mvPosition;
  }
`;

const splatFragmentShader = `
  varying vec3 vColor;
  varying float vOpacity;

  void main() {
    // Gaussian falloff from center
    vec2 center = gl_PointCoord - vec2(0.5);
    float dist = dot(center, center);

    // 2D Gaussian: exp(-dist / (2 * sigma^2)), sigma ~0.25 for nice falloff
    float gaussian = exp(-dist * 8.0);

    if (gaussian < 0.02) discard;

    // Soft alpha blending
    float alpha = gaussian * vOpacity;

    gl_FragColor = vec4(vColor, alpha);
  }
`;

// ---- INIT ----
function init() {
  clock = new THREE.Clock();
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a0c);
  scene.fog = new THREE.FogExp2(0x0a0a0c, 0.015);

  camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
  updateCameraFromOrbit();

  renderer = new THREE.WebGLRenderer({
    canvas: document.getElementById('three-canvas'),
    antialias: true,
    alpha: false
  });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.sortObjects = false;

  // Grid
  gridHelper = new THREE.GridHelper(30, 30, 0x222222, 0x161616);
  scene.add(gridHelper);

  // Ambient light reference
  const ambientSphere = new THREE.Mesh(
    new THREE.SphereGeometry(0.1, 16, 16),
    new THREE.MeshBasicMaterial({ color: 0xff6633, transparent: true, opacity: 0.5 })
  );
  ambientSphere.position.set(0, 0, 0);
  scene.add(ambientSphere);

  // Axis lines
  const axisLen = 2;
  const axisLines = new THREE.Group();
  const xLine = createLine(new THREE.Vector3(0,0,0), new THREE.Vector3(axisLen,0,0), 0xff3333);
  const yLine = createLine(new THREE.Vector3(0,0,0), new THREE.Vector3(0,axisLen,0), 0x33ff33);
  const zLine = createLine(new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,axisLen), 0x3333ff);
  axisLines.add(xLine, yLine, zLine);
  scene.add(axisLines);

  // Initialize splat system
  initSplatSystem();

  // Setup camera
  initCamera();

  // Input handlers
  initInputs();

  // Start render loop
  animate();

  document.getElementById('loading').classList.add('hidden');
}

function createLine(from, to, color) {
  const geom = new THREE.BufferGeometry().setFromPoints([from, to]);
  return new THREE.Line(geom, new THREE.LineBasicMaterial({ color }));
}

// ---- SPLAT SYSTEM ----
function initSplatSystem() {
  const maxPts = CONFIG.maxSplats;

  splatGeometry = new THREE.BufferGeometry();

  const positions = new Float32Array(maxPts * 3);
  const colors = new Float32Array(maxPts * 3);
  const sizes = new Float32Array(maxPts);
  const opacities = new Float32Array(maxPts);
  const scales = new Float32Array(maxPts * 3);

  splatGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  splatGeometry.setAttribute('aColor', new THREE.BufferAttribute(colors, 3));
  splatGeometry.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));
  splatGeometry.setAttribute('aOpacity', new THREE.BufferAttribute(opacities, 1));
  splatGeometry.setAttribute('aSplatScale', new THREE.BufferAttribute(scales, 3));

  splatGeometry.setDrawRange(0, 0);

  splatMaterial = new THREE.ShaderMaterial({
    vertexShader: splatVertexShader,
    fragmentShader: splatFragmentShader,
    transparent: true,
    depthWrite: false,
    depthTest: true,
    blending: THREE.AdditiveBlending,
  });

  splatMesh = new THREE.Points(splatGeometry, splatMaterial);
  scene.add(splatMesh);
}

function addSplats(newSplats) {
  const posAttr = splatGeometry.getAttribute('position');
  const colAttr = splatGeometry.getAttribute('aColor');
  const sizeAttr = splatGeometry.getAttribute('aSize');
  const opacAttr = splatGeometry.getAttribute('aOpacity');
  const scaleAttr = splatGeometry.getAttribute('aSplatScale');

  const startIdx = splatData.length;

  for (let i = 0; i < newSplats.length; i++) {
    const idx = startIdx + i;
    if (idx >= CONFIG.maxSplats) break;

    const s = newSplats[i];
    splatData.push(s);

    posAttr.array[idx * 3] = s.x;
    posAttr.array[idx * 3 + 1] = s.y;
    posAttr.array[idx * 3 + 2] = s.z;

    colAttr.array[idx * 3] = s.r;
    colAttr.array[idx * 3 + 1] = s.g;
    colAttr.array[idx * 3 + 2] = s.b;

    sizeAttr.array[idx] = s.size;
    opacAttr.array[idx] = s.opacity;

    scaleAttr.array[idx * 3] = s.sx;
    scaleAttr.array[idx * 3 + 1] = s.sy;
    scaleAttr.array[idx * 3 + 2] = s.sz;
  }

  posAttr.needsUpdate = true;
  colAttr.needsUpdate = true;
  sizeAttr.needsUpdate = true;
  opacAttr.needsUpdate = true;
  scaleAttr.needsUpdate = true;

  splatGeometry.setDrawRange(0, splatData.length);
  document.getElementById('splat-count').textContent = splatData.length.toLocaleString();
}

function resetSplats() {
  splatData = [];
  splatGeometry.setDrawRange(0, 0);
  document.getElementById('splat-count').textContent = '0';
  captureIndex = 0;
}

// ---- WEBCAM ----
async function initCamera() {
  videoEl = document.getElementById('webcam');
  sampleCanvas = document.getElementById('sample-canvas');
  sampleCtx = sampleCanvas.getContext('2d', { willReadFrequently: true });

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: 'user' }
    });
    videoEl.srcObject = stream;
    await videoEl.play();

    sampleCanvas.width = videoEl.videoWidth || 640;
    sampleCanvas.height = videoEl.videoHeight || 480;
  } catch (err) {
    console.error('Camera access denied:', err);
    document.querySelector('.cam-label').textContent = 'NO CAMERA — using noise';
    // Fallback: generate synthetic data
  }
}

function captureFrame() {
  const density = parseInt(document.getElementById('density').value);
  const splatSize = parseFloat(document.getElementById('splat-size').value);
  const depthSpread = parseFloat(document.getElementById('depth-spread').value);
  const opacity = parseFloat(document.getElementById('opacity').value);

  // Flash effect
  const flash = document.getElementById('flash');
  flash.classList.add('flash');
  setTimeout(() => flash.classList.remove('flash'), 100);

  let newSplats = [];

  if (videoEl.srcObject) {
    sampleCtx.drawImage(videoEl, 0, 0, sampleCanvas.width, sampleCanvas.height);
    const imgData = sampleCtx.getImageData(0, 0, sampleCanvas.width, sampleCanvas.height);
    const pixels = imgData.data;
    const w = sampleCanvas.width;
    const h = sampleCanvas.height;

    const stepX = Math.max(1, Math.floor(w / density));
    const stepY = Math.max(1, Math.floor(h / density));

    // Capture angle offset for multi-capture depth
    const angleOffset = captureIndex * 0.4;
    captureIndex++;

    for (let py = 0; py < h; py += stepY) {
      for (let px = 0; px < w; px += stepX) {
        const i = (py * w + px) * 4;
        const r = pixels[i] / 255;
        const g = pixels[i + 1] / 255;
        const b = pixels[i + 2] / 255;
        const a = pixels[i + 3] / 255;

        if (a < 0.1) continue;

        // Normalized image coords centered at 0
        const nx = (px / w - 0.5) * 2;
        const ny = -(py / h - 0.5) * 2;

        // Compute depth from pixel data
        let depth;
        const luminance = 0.299 * r + 0.587 * g + 0.114 * b;

        switch (CONFIG.depthMode) {
          case 1: // Luminance-based depth
            depth = (1 - luminance) * depthSpread;
            break;
          case 2: // Hue-based depth
            const hue = Math.atan2(Math.sqrt(3) * (g - b), 2 * r - g - b);
            depth = ((hue + Math.PI) / (2 * Math.PI)) * depthSpread;
            break;
          case 3: // Random depth with color clustering
            depth = (luminance + (Math.random() - 0.5) * 0.5) * depthSpread;
            break;
          default:
            depth = luminance * depthSpread;
        }

        // Add jitter for organic feel
        const jx = (Math.random() - 0.5) * 0.15;
        const jy = (Math.random() - 0.5) * 0.15;
        const jz = (Math.random() - 0.5) * 0.15;

        // Map to 3D space — rotate based on capture index for multi-angle effect
        const cos = Math.cos(angleOffset);
        const sin = Math.sin(angleOffset);
        const rawX = nx * 6;
        const rawZ = -depth + depthSpread * 0.5;

        const worldX = rawX * cos - rawZ * sin + jx;
        const worldY = ny * 6 + jy;
        const worldZ = rawX * sin + rawZ * cos + jz;

        // Anisotropic splat scales — brighter = larger
        const baseScale = 0.5 + luminance * 1.5;
        const sx = baseScale * (0.8 + Math.random() * 0.4);
        const sy = baseScale * (0.8 + Math.random() * 0.4);
        const sz = baseScale * (0.3 + Math.random() * 0.3);

        newSplats.push({
          x: worldX, y: worldY, z: worldZ,
          r, g, b,
          size: splatSize,
          opacity: opacity * (0.5 + luminance * 0.5),
          sx, sy, sz
        });
      }
    }
  } else {
    // Synthetic noise splats when no camera
    for (let i = 0; i < density * density; i++) {
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.random() * Math.PI;
      const radius = 2 + Math.random() * depthSpread;

      newSplats.push({
        x: Math.sin(phi) * Math.cos(theta) * radius,
        y: Math.cos(phi) * radius,
        z: Math.sin(phi) * Math.sin(theta) * radius,
        r: Math.random(), g: Math.random() * 0.5, b: Math.random() * 0.2,
        size: splatSize,
        opacity: opacity * Math.random(),
        sx: 0.5 + Math.random(), sy: 0.5 + Math.random(), sz: 0.3 + Math.random() * 0.3
      });
    }
  }

  addSplats(newSplats);
}

// ---- ORBIT CAMERA ----
function updateCameraFromOrbit() {
  const { theta, phi, radius, target } = orbitState;
  camera.position.set(
    target.x + radius * Math.sin(phi) * Math.cos(theta),
    target.y + radius * Math.cos(phi),
    target.z + radius * Math.sin(phi) * Math.sin(theta)
  );
  camera.lookAt(target);
}

// ---- INPUTS ----
function initInputs() {
  const canvas = renderer.domElement;

  canvas.addEventListener('mousedown', (e) => {
    isDragging = true;
    lastMouse.x = e.clientX;
    lastMouse.y = e.clientY;
  });

  canvas.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    const dx = e.clientX - lastMouse.x;
    const dy = e.clientY - lastMouse.y;
    orbitState.theta -= dx * 0.005;
    orbitState.phi = Math.max(0.1, Math.min(Math.PI - 0.1, orbitState.phi - dy * 0.005));
    lastMouse.x = e.clientX;
    lastMouse.y = e.clientY;
  });

  canvas.addEventListener('mouseup', () => isDragging = false);
  canvas.addEventListener('mouseleave', () => isDragging = false);

  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    orbitState.radius = Math.max(2, Math.min(60, orbitState.radius + e.deltaY * 0.02));
  }, { passive: false });

  // Touch support
  let lastTouch = null;
  canvas.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
      lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }
  });
  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (e.touches.length === 1 && lastTouch) {
      const dx = e.touches[0].clientX - lastTouch.x;
      const dy = e.touches[0].clientY - lastTouch.y;
      orbitState.theta -= dx * 0.005;
      orbitState.phi = Math.max(0.1, Math.min(Math.PI - 0.1, orbitState.phi - dy * 0.005));
      lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }
  }, { passive: false });

  // Keyboard
  document.addEventListener('keydown', (e) => {
    switch (e.code) {
      case 'Space':
        e.preventDefault();
        captureFrame();
        break;
      case 'KeyC':
        toggleContinuous();
        break;
      case 'KeyR':
        resetSplats();
        break;
      case 'KeyG':
        gridHelper.visible = !gridHelper.visible;
        break;
      case 'Digit1':
        CONFIG.depthMode = 1;
        document.getElementById('mode-label').textContent = '● Depth: Luminance';
        break;
      case 'Digit2':
        CONFIG.depthMode = 2;
        document.getElementById('mode-label').textContent = '● Depth: Hue';
        break;
      case 'Digit3':
        CONFIG.depthMode = 3;
        document.getElementById('mode-label').textContent = '● Depth: Stochastic';
        break;
    }
  });

  // Buttons
  document.getElementById('btn-capture').addEventListener('click', captureFrame);
  document.getElementById('btn-continuous').addEventListener('click', toggleContinuous);
  document.getElementById('btn-reset').addEventListener('click', resetSplats);
  document.getElementById('btn-grid').addEventListener('click', () => gridHelper.visible = !gridHelper.visible);
  document.getElementById('btn-export').addEventListener('click', exportPLY);

  // Sliders
  ['splat-size', 'density', 'depth-spread', 'opacity', 'auto-rotate'].forEach(id => {
    const el = document.getElementById(id);
    const valEl = document.getElementById(id + '-val');
    el.addEventListener('input', () => {
      const v = parseFloat(el.value);
      valEl.textContent = v.toFixed(id === 'density' ? 0 : 1);
      if (id === 'auto-rotate') autoRotateSpeed = v;
    });
  });
}

function toggleContinuous() {
  continuous = !continuous;
  const btn = document.getElementById('btn-continuous');

  if (continuous) {
    btn.classList.add('active');
    btn.textContent = '◉ Stop [C]';
    document.getElementById('mode-label').textContent = '● CONTINUOUS CAPTURE';
    captureTimer = setInterval(captureFrame, CONFIG.captureInterval);
  } else {
    btn.classList.remove('active');
    btn.textContent = '◉ Continuous [C]';
    document.getElementById('mode-label').textContent = '● Single Capture';
    clearInterval(captureTimer);
  }
}

// ---- EXPORT PLY ----
function exportPLY() {
  if (splatData.length === 0) return;

  let header = `ply\nformat ascii 1.0\nelement vertex ${splatData.length}\n`;
  header += `property float x\nproperty float y\nproperty float z\n`;
  header += `property uchar red\nproperty uchar green\nproperty uchar blue\n`;
  header += `property float scale_0\nproperty float scale_1\nproperty float scale_2\n`;
  header += `property float opacity\nend_header\n`;

  let body = '';
  for (const s of splatData) {
    const cr = Math.round(s.r * 255);
    const cg = Math.round(s.g * 255);
    const cb = Math.round(s.b * 255);
    body += `${s.x.toFixed(4)} ${s.y.toFixed(4)} ${s.z.toFixed(4)} ${cr} ${cg} ${cb} ${s.sx.toFixed(3)} ${s.sy.toFixed(3)} ${s.sz.toFixed(3)} ${s.opacity.toFixed(3)}\n`;
  }

  const blob = new Blob([header + body], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `gaussian_splats_${Date.now()}.ply`;
  a.click();
  URL.revokeObjectURL(url);
}

// ---- ANIMATE ----
function animate() {
  requestAnimationFrame(animate);

  const dt = clock.getDelta();

  // Auto rotate
  if (!isDragging && autoRotateSpeed > 0) {
    orbitState.theta += autoRotateSpeed * dt * 0.5;
  }

  updateCameraFromOrbit();

  // FPS counter
  frameCount++;
  const now = performance.now();
  if (now - lastFpsTime > 500) {
    const fps = Math.round(frameCount / ((now - lastFpsTime) / 1000));
    document.getElementById('fps-display').textContent = fps;
    frameCount = 0;
    lastFpsTime = now;
  }

  // Memory estimate
  const memMB = (splatData.length * 10 * 4 / (1024 * 1024)).toFixed(1);
  document.getElementById('mem-display').textContent = memMB;

  renderer.render(scene, camera);
}

// ---- RESIZE ----
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ---- GO ----
init();
</script>
