<!DOCTYPE html>
<html lang="en">
<head>
    <title>NEON DRIFT — Anti-Gravity Racer</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: 'Segoe UI', system-ui, sans-serif; }
        canvas { display: block; }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(ellipse at center, #0a0018 0%, #000 100%);
            z-index: 300; transition: opacity 1.5s ease;
        }
        #overlay.hidden { opacity: 0; pointer-events: none; }
        #overlay h1 {
            color: #ff44aa; font-size: 42px; font-weight: 200; letter-spacing: 18px;
            text-transform: uppercase; text-shadow: 0 0 40px rgba(255,68,170,0.6);
        }
        #overlay .sub { color: rgba(255,100,200,0.4); font-size: 12px; letter-spacing: 5px; margin-top: 8px; }
        #overlay .start-btn {
            margin-top: 30px; padding: 12px 40px; background: rgba(255,68,170,0.15);
            border: 1px solid rgba(255,68,170,0.4); color: #ff88cc; font-size: 14px;
            letter-spacing: 6px; cursor: pointer; border-radius: 30px; transition: all 0.3s;
            font-family: inherit; text-transform: uppercase;
        }
        #overlay .start-btn:hover { background: rgba(255,68,170,0.3); color: #fff; transform: scale(1.05); }
        #overlay .controls-hint {
            margin-top: 20px; color: rgba(255,255,255,0.25); font-size: 11px; letter-spacing: 2px; text-align: center; line-height: 1.8;
        }

        #countdown {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
            color: #fff; font-size: 120px; font-weight: 100; letter-spacing: 10px;
            pointer-events: none; z-index: 250; opacity: 0; transition: opacity 0.3s;
            text-shadow: 0 0 60px rgba(255,68,170,0.8), 0 0 120px rgba(100,50,255,0.4);
        }
        #countdown.show { opacity: 1; }

        #hud {
            position: fixed; top: 0; left: 0; width: 100%; pointer-events: none; z-index: 100;
        }
        #hud .speed-panel {
            position: absolute; bottom: 20px; left: 20px;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(12px);
            border: 1px solid rgba(255,68,170,0.15); border-radius: 12px;
            padding: 12px 18px; min-width: 140px;
        }
        #hud .speed-val { font-size: 36px; color: #ff66bb; font-weight: 200; letter-spacing: 2px; }
        #hud .speed-unit { font-size: 11px; color: rgba(255,255,255,0.3); letter-spacing: 3px; }
        #hud .boost-bar {
            margin-top: 8px; height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden;
        }
        #hud .boost-fill { height: 100%; background: linear-gradient(90deg, #ff44aa, #44aaff); border-radius: 2px; transition: width 0.15s; }

        #hud .race-panel {
            position: absolute; top: 14px; right: 14px;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(12px);
            border: 1px solid rgba(100,180,255,0.15); border-radius: 12px;
            padding: 12px 18px; text-align: right;
        }
        #hud .position { font-size: 42px; color: #fff; font-weight: 100; }
        #hud .position sup { font-size: 16px; color: rgba(255,255,255,0.4); }
        #hud .lap-info { font-size: 12px; color: rgba(255,200,100,0.6); letter-spacing: 2px; margin-top: 4px; }
        #hud .lap-time { font-size: 11px; color: rgba(255,255,255,0.3); letter-spacing: 1px; margin-top: 2px; }

        #hud .pos-panel {
            position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 6px; align-items: center;
        }
        #hud .pos-dot {
            width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: 600; border: 2px solid rgba(255,255,255,0.15);
            transition: all 0.3s;
        }
        #hud .pos-dot.player { border-color: #ff44aa; box-shadow: 0 0 12px rgba(255,68,170,0.4); }

        #minimap {
            position: fixed; bottom: 20px; right: 20px; z-index: 100;
            pointer-events: none;
        }

        #ui-bar {
            position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
            z-index: 100; display: flex; gap: 6px; align-items: center;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(16px);
            padding: 7px 14px; border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.06);
        }
        #ui-bar button {
            background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 5px 12px; border-radius: 16px; cursor: pointer;
            font-size: 10px; font-family: inherit; letter-spacing: 2px; transition: all 0.3s;
        }
        #ui-bar button:hover { background: rgba(255,255,255,0.12); color: #fff; }
        #ui-bar button.active { background: rgba(255,68,170,0.25); border-color: rgba(255,68,170,0.4); color: #ff88cc; }

        #lap-flash {
            position: fixed; top: 30%; left: 50%; transform: translate(-50%,-50%);
            color: #fff; font-size: 28px; font-weight: 200; letter-spacing: 8px;
            pointer-events: none; z-index: 100; opacity: 0; transition: opacity 0.5s;
            text-shadow: 0 0 30px rgba(255,200,100,0.6);
        }
        #lap-flash.show { opacity: 1; }

        #finish-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(20px);
            z-index: 280;
        }
        #finish-screen.show { display: flex; }
        #finish-screen h2 { color: #ff44aa; font-size: 48px; font-weight: 100; letter-spacing: 12px; }
        #finish-screen .result { color: rgba(255,255,255,0.6); font-size: 16px; letter-spacing: 4px; margin-top: 12px; }
        #finish-screen .times { color: rgba(255,255,255,0.3); font-size: 12px; letter-spacing: 2px; margin-top: 20px; line-height: 2; }
        #finish-screen .restart-btn {
            margin-top: 30px; padding: 12px 40px; background: rgba(255,68,170,0.15);
            border: 1px solid rgba(255,68,170,0.4); color: #ff88cc; font-size: 14px;
            letter-spacing: 6px; cursor: pointer; border-radius: 30px; transition: all 0.3s;
            font-family: inherit;
        }
        #finish-screen .restart-btn:hover { background: rgba(255,68,170,0.3); color: #fff; }

        #wrong-way {
            position: fixed; top: 40%; left: 50%; transform: translate(-50%,-50%);
            color: #ff4444; font-size: 24px; font-weight: 600; letter-spacing: 8px;
            pointer-events: none; z-index: 100; opacity: 0; transition: opacity 0.3s;
            text-shadow: 0 0 20px rgba(255,0,0,0.6);
        }
        #wrong-way.show { opacity: 1; }

        #backend-tag { position: fixed; top: 8px; right: 8px; color: rgba(255,255,255,0.15); font-size: 9px; z-index: 100; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div id="overlay">
        <h1>NEON DRIFT</h1>
        <div class="sub">ANTI-GRAVITY CHAMPIONSHIP</div>
        <button class="start-btn" id="startBtn">BEGIN RACE</button>
        <div class="controls-hint">
            WASD / ARROWS — Steer &amp; Thrust<br>
            SHIFT — Boost &nbsp;|&nbsp; SPACE — Airbrake<br>
            C — Camera &nbsp;|&nbsp; R — Reset Position
        </div>
    </div>

    <div id="countdown"></div>

    <div id="hud" style="display:none">
        <div class="speed-panel">
            <div class="speed-val" id="speedVal">0</div>
            <div class="speed-unit">KM/H</div>
            <div class="boost-bar"><div class="boost-fill" id="boostFill" style="width:100%"></div></div>
        </div>
        <div class="race-panel">
            <div class="position" id="posDisplay">1<sup>ST</sup></div>
            <div class="lap-info" id="lapDisplay">LAP 1 / 3</div>
            <div class="lap-time" id="timeDisplay">0:00.0</div>
        </div>
        <div class="pos-panel" id="posPanel"></div>
    </div>

    <canvas id="minimap" width="160" height="160"></canvas>

    <div id="ui-bar">
        <button id="camChase" class="active">CHASE</button>
        <button id="camCockpit">COCKPIT</button>
        <button id="camBird">BIRD</button>
    </div>

    <div id="lap-flash"></div>
    <div id="wrong-way"></div>

    <div id="finish-screen">
        <h2>RACE COMPLETE</h2>
        <div class="result" id="finishResult"></div>
        <div class="times" id="finishTimes"></div>
        <button class="restart-btn" id="restartBtn">RACE AGAIN</button>
    </div>

    <div id="backend-tag"></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.webgpu.js",
            "three/webgpu": "https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.webgpu.js",
            "three/tsl": "https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.tsl.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.172.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three/webgpu';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ══════════════════════════════════════════
        //  RENDERER INIT
        // ══════════════════════════════════════════
        const renderer = new THREE.WebGPURenderer({ antialias: true });
        await renderer.init();
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 0.85;
        document.body.appendChild(renderer.domElement);
        document.getElementById('backend-tag').textContent =
            renderer.backend?.isWebGPUBackend ? 'WebGPU' : 'WebGL2';

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0a0020, 0.00035);

        // ══════════════════════════════════════════
        //  CAMERAS
        // ══════════════════════════════════════════
        const aspect = window.innerWidth / window.innerHeight;
        const chaseCam = new THREE.PerspectiveCamera(68, aspect, 0.1, 5000);
        const cockpitCam = new THREE.PerspectiveCamera(90, aspect, 0.1, 5000);
        const birdCam = new THREE.PerspectiveCamera(50, aspect, 0.1, 5000);
        birdCam.position.set(0, 400, 0);
        let activeCam = chaseCam;
        let camMode = 'chase';

        // ══════════════════════════════════════════
        //  LIGHTING
        // ══════════════════════════════════════════
        scene.add(new THREE.AmbientLight(0x334466, 0.5));
        const sun = new THREE.DirectionalLight(0xffeedd, 2.5);
        sun.position.set(300, 400, 200); scene.add(sun);
        const fill = new THREE.DirectionalLight(0x6644aa, 1.2);
        fill.position.set(-200, 150, -150); scene.add(fill);

        // Neon accent lights around the track
        const accentColors = [0xff44aa, 0x44aaff, 0xaa44ff, 0x44ffaa, 0xff8844, 0xff4466];
        accentColors.forEach((c, i) => {
            const p = new THREE.PointLight(c, 8, 300);
            const a = (i / accentColors.length) * Math.PI * 2;
            p.position.set(Math.cos(a) * 280, 20, Math.sin(a) * 280);
            scene.add(p);
        });

        // ══════════════════════════════════════════
        //  SKY DOME
        // ══════════════════════════════════════════
        const skyCanvas = document.createElement('canvas');
        skyCanvas.width = 1024; skyCanvas.height = 512;
        const skyCtx = skyCanvas.getContext('2d');
        const grad = skyCtx.createLinearGradient(0, 0, 0, 512);
        [[0,'#000008'],[0.2,'#0a0030'],[0.4,'#1a0050'],[0.6,'#0d1040'],[0.8,'#061030'],[1,'#0a1828']].forEach(([s,c]) => grad.addColorStop(s,c));
        skyCtx.fillStyle = grad; skyCtx.fillRect(0,0,1024,512);
        // Stars
        skyCtx.fillStyle = '#fff';
        for (let i = 0; i < 400; i++) {
            skyCtx.globalAlpha = 0.2 + Math.random() * 0.8;
            const sz = 0.3 + Math.random() * 1.5;
            skyCtx.fillRect(Math.random()*1024, Math.random()*300, sz, sz);
        }
        // Nebula wisps
        skyCtx.globalAlpha = 0.04;
        for (let i = 0; i < 30; i++) {
            const hue = Math.random() > 0.5 ? '#ff44aa' : '#4466ff';
            skyCtx.fillStyle = hue;
            skyCtx.beginPath();
            skyCtx.ellipse(Math.random()*1024, 100+Math.random()*250, 40+Math.random()*150, 8+Math.random()*40, Math.random()*Math.PI, 0, Math.PI*2);
            skyCtx.fill();
        }
        skyCtx.globalAlpha = 1;
        const skyTex = new THREE.CanvasTexture(skyCanvas);
        scene.add(new THREE.Mesh(new THREE.SphereGeometry(2200, 48, 24), new THREE.MeshBasicMaterial({ map: skyTex, side: THREE.BackSide })));

        // Environment map
        const pmrem = new THREE.PMREMGenerator(renderer);
        const envScene = new THREE.Scene();
        envScene.add(new THREE.Mesh(new THREE.SphereGeometry(100,16,8), new THREE.MeshBasicMaterial({ map: skyTex, side: THREE.BackSide })));
        scene.environment = pmrem.fromScene(envScene, 0, 0.1, 250).texture;

        // ══════════════════════════════════════════
        //  TRACK GENERATION
        // ══════════════════════════════════════════
        const TRACK_PTS = 6000;
        const TRACK_WIDTH = 18;
        const TOTAL_LAPS = 3;

        function buildTrackPoints() {
            const pts = [];
            for (let i = 0; i < TRACK_PTS; i++) {
                const t = i / TRACK_PTS;
                const a = t * Math.PI * 2;

                // Complex interesting shape — figure-8 with elevation changes
                let x = 500 * Math.sin(a) + 180 * Math.sin(2*a) + 50 * Math.sin(5*a) + 30 * Math.cos(3*a);
                let z = 420 * Math.cos(a) + 140 * Math.cos(3*a) + 60 * Math.cos(6*a) + 25 * Math.sin(4*a);

                // Elevation profile — rolling hills, big climb, fast descent
                let y = 15; // base height
                y += 80 * Math.sin(a * 1 + 0.5) * Math.max(0, Math.sin(a * 0.5));
                y += 40 * Math.sin(a * 3 + 1.2);
                y += 25 * Math.cos(a * 5 + 0.7);
                y += 60 * Math.max(0, Math.sin(a * 2 - 0.3)) * Math.sin(a + 1);
                // Keep minimum height
                y = Math.max(y, 8);

                pts.push(new THREE.Vector3(x, y, z));
            }
            return pts;
        }

        const trackPoints = buildTrackPoints();
        const trackCurve = new THREE.CatmullRomCurve3(trackPoints, true, 'catmullrom', 0.3);

        // Precompute curvature + banking for the entire track
        const TRACK_SAMPLES = 4000;
        const bankAngles = new Float32Array(TRACK_SAMPLES);
        const curvatures = new Float32Array(TRACK_SAMPLES);
        for (let i = 0; i < TRACK_SAMPLES; i++) {
            const t = i / TRACK_SAMPLES, dt = 1 / TRACK_SAMPLES;
            const t0 = Math.max(0, t - dt), t1 = Math.min(1, t + dt);
            const tan0 = trackCurve.getTangentAt(t0), tan1 = trackCurve.getTangentAt(t1);
            const dx = tan1.x - tan0.x, dz = tan1.z - tan0.z;
            curvatures[i] = Math.sqrt(dx*dx + dz*dz) / (2 * dt);
            const tangent = trackCurve.getTangentAt(t);
            const lat = new THREE.Vector3().crossVectors(tangent, new THREE.Vector3(0,1,0)).normalize();
            bankAngles[i] = Math.atan2((dx * lat.x + dz * lat.z) * 6, 1);
        }
        function getCurvature(t) { return curvatures[Math.floor(((t%1)+1)%1 * TRACK_SAMPLES) % TRACK_SAMPLES]; }
        function getBankAngle(t) { return bankAngles[Math.floor(((t%1)+1)%1 * TRACK_SAMPLES) % TRACK_SAMPLES]; }

        // Get track frame at t (position, tangent, right, up with banking)
        function getTrackFrame(t) {
            const pos = trackCurve.getPointAt(((t % 1) + 1) % 1);
            const tan = trackCurve.getTangentAt(((t % 1) + 1) % 1);
            const worldUp = new THREE.Vector3(0, 1, 0);
            const right = new THREE.Vector3().crossVectors(tan, worldUp).normalize();
            const up = new THREE.Vector3().crossVectors(right, tan).normalize();
            // Apply banking
            const bank = getBankAngle(t) * 0.6;
            const cb = Math.cos(bank), sb = Math.sin(bank);
            const bRight = right.clone().multiplyScalar(cb).add(up.clone().multiplyScalar(sb));
            const bUp = right.clone().multiplyScalar(-sb).add(up.clone().multiplyScalar(cb));
            return { pos, tan, right: bRight, up: bUp, bank };
        }

        // ══════════════════════════════════════════
        //  TRACK MESH — Glass tube + neon rails
        // ══════════════════════════════════════════
        // Track surface (road)
        const trackSurfaceGeo = (() => {
            const segs = 2000;
            const positions = [], indices = [], uvs = [];
            for (let i = 0; i <= segs; i++) {
                const t = i / segs;
                const frame = getTrackFrame(t);
                const left = frame.pos.clone().add(frame.right.clone().multiplyScalar(-TRACK_WIDTH / 2)).sub(frame.up.clone().multiplyScalar(0.1));
                const right = frame.pos.clone().add(frame.right.clone().multiplyScalar(TRACK_WIDTH / 2)).sub(frame.up.clone().multiplyScalar(0.1));
                positions.push(left.x, left.y, left.z, right.x, right.y, right.z);
                uvs.push(0, t * 200, 1, t * 200);
                if (i < segs) {
                    const bi = i * 2;
                    indices.push(bi, bi+1, bi+2, bi+1, bi+3, bi+2);
                }
            }
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
            geo.setIndex(indices);
            geo.computeVertexNormals();
            return geo;
        })();

        // Road texture
        const roadCanvas = document.createElement('canvas');
        roadCanvas.width = 128; roadCanvas.height = 512;
        const rctx = roadCanvas.getContext('2d');
        rctx.fillStyle = '#111118'; rctx.fillRect(0, 0, 128, 512);
        // Center line
        rctx.strokeStyle = 'rgba(255,68,170,0.3)'; rctx.lineWidth = 2;
        rctx.setLineDash([20, 20]);
        rctx.beginPath(); rctx.moveTo(64, 0); rctx.lineTo(64, 512); rctx.stroke();
        // Edge lines
        rctx.strokeStyle = 'rgba(100,180,255,0.4)'; rctx.lineWidth = 3; rctx.setLineDash([]);
        rctx.beginPath(); rctx.moveTo(4, 0); rctx.lineTo(4, 512); rctx.stroke();
        rctx.beginPath(); rctx.moveTo(124, 0); rctx.lineTo(124, 512); rctx.stroke();
        // Grid marks
        rctx.strokeStyle = 'rgba(255,255,255,0.03)'; rctx.lineWidth = 1;
        for (let y = 0; y < 512; y += 32) { rctx.beginPath(); rctx.moveTo(0, y); rctx.lineTo(128, y); rctx.stroke(); }

        const roadTex = new THREE.CanvasTexture(roadCanvas);
        roadTex.wrapS = roadTex.wrapT = THREE.RepeatWrapping;

        const trackMat = new THREE.MeshStandardMaterial({
            map: roadTex, color: 0x222233, metalness: 0.6, roughness: 0.25,
            emissive: 0x080812, emissiveIntensity: 0.3,
        });
        scene.add(new THREE.Mesh(trackSurfaceGeo, trackMat));

        // Glass barriers
        const barrierMat = new THREE.MeshPhysicalMaterial({
            color: 0x88aaff, metalness: 0.0, roughness: 0.05,
            transmission: 0.88, thickness: 0.8, ior: 1.4,
            transparent: true, opacity: 0.18, side: THREE.DoubleSide,
            envMapIntensity: 2.0, clearcoat: 1.0, clearcoatRoughness: 0.05,
            depthWrite: false,
        });

        function buildBarrier(sideSign) {
            const segs = 1500, positions = [], indices = [];
            for (let i = 0; i <= segs; i++) {
                const t = i / segs;
                const frame = getTrackFrame(t);
                const base = frame.pos.clone().add(frame.right.clone().multiplyScalar(sideSign * TRACK_WIDTH / 2));
                const top = base.clone().add(frame.up.clone().multiplyScalar(3.5));
                positions.push(base.x, base.y, base.z, top.x, top.y, top.z);
                if (i < segs) {
                    const bi = i * 2;
                    indices.push(bi, bi+1, bi+2, bi+1, bi+3, bi+2);
                }
            }
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geo.setIndex(indices);
            geo.computeVertexNormals();
            return geo;
        }
        scene.add(new THREE.Mesh(buildBarrier(-1), barrierMat));
        scene.add(new THREE.Mesh(buildBarrier(1), barrierMat));

        // Neon rail strips on barrier tops
        const railGlowMat = new THREE.MeshBasicMaterial({ color: 0xff44aa, transparent: true, opacity: 0.7 });
        const railGlowMat2 = new THREE.MeshBasicMaterial({ color: 0x44aaff, transparent: true, opacity: 0.7 });
        function buildRailStrip(sideSign) {
            const pts = [];
            for (let i = 0; i <= 1500; i++) {
                const t = i / 1500;
                const frame = getTrackFrame(t);
                const p = frame.pos.clone()
                    .add(frame.right.clone().multiplyScalar(sideSign * TRACK_WIDTH / 2))
                    .add(frame.up.clone().multiplyScalar(3.5));
                pts.push(p);
            }
            return new THREE.CatmullRomCurve3(pts, true);
        }
        scene.add(new THREE.Mesh(new THREE.TubeGeometry(buildRailStrip(-1), 1500, 0.15, 4, true), railGlowMat));
        scene.add(new THREE.Mesh(new THREE.TubeGeometry(buildRailStrip(1), 1500, 0.15, 4, true), railGlowMat2));

        // ══════════════════════════════════════════
        //  BOOST PADS
        // ══════════════════════════════════════════
        const BOOST_POSITIONS = [0.1, 0.25, 0.42, 0.58, 0.72, 0.88]; // t values on track
        const boostPads = [];
        const boostGlowMat = new THREE.MeshBasicMaterial({ color: 0x44ffaa, transparent: true, opacity: 0.6, side: THREE.DoubleSide });

        BOOST_POSITIONS.forEach(bt => {
            const frame = getTrackFrame(bt);
            const padGeo = new THREE.PlaneGeometry(TRACK_WIDTH * 0.6, 8);
            const pad = new THREE.Mesh(padGeo, boostGlowMat.clone());
            pad.position.copy(frame.pos).add(frame.up.clone().multiplyScalar(0.1));
            pad.lookAt(frame.pos.clone().add(frame.tan));
            pad.rotateX(-Math.PI / 2);
            pad.userData.t = bt;
            scene.add(pad);
            boostPads.push(pad);

            // Chevron arrows on pad
            const arrow = new THREE.Mesh(
                new THREE.PlaneGeometry(4, 3),
                new THREE.MeshBasicMaterial({ color: 0xaaffdd, transparent: true, opacity: 0.4, side: THREE.DoubleSide })
            );
            arrow.position.copy(pad.position).add(frame.up.clone().multiplyScalar(0.15));
            arrow.quaternion.copy(pad.quaternion);
            scene.add(arrow);

            // Light
            const lt = new THREE.PointLight(0x44ffaa, 6, 40);
            lt.position.copy(frame.pos).add(frame.up.clone().multiplyScalar(2));
            scene.add(lt);
        });

        // ══════════════════════════════════════════
        //  START/FINISH LINE
        // ══════════════════════════════════════════
        const startFrame = getTrackFrame(0);
        const startGate = new THREE.Group();

        // Arch
        const archMat = new THREE.MeshStandardMaterial({ color: 0x222244, metalness: 0.8, roughness: 0.2, emissive: 0xff44aa, emissiveIntensity: 0.3 });
        for (const side of [-1, 1]) {
            const pillar = new THREE.Mesh(new THREE.BoxGeometry(1.2, 12, 1.2), archMat);
            pillar.position.set(side * TRACK_WIDTH / 2, 6, 0);
            startGate.add(pillar);
        }
        const crossbar = new THREE.Mesh(new THREE.BoxGeometry(TRACK_WIDTH + 2, 1, 1.2), archMat);
        crossbar.position.set(0, 12, 0);
        startGate.add(crossbar);

        // Checkered banner
        const bannerCanvas = document.createElement('canvas');
        bannerCanvas.width = 256; bannerCanvas.height = 64;
        const bctx = bannerCanvas.getContext('2d');
        for (let bx = 0; bx < 16; bx++) for (let by = 0; by < 4; by++) {
            bctx.fillStyle = (bx + by) % 2 === 0 ? '#ffffff' : '#111111';
            bctx.fillRect(bx * 16, by * 16, 16, 16);
        }
        const bannerTex = new THREE.CanvasTexture(bannerCanvas);
        const banner = new THREE.Mesh(
            new THREE.PlaneGeometry(TRACK_WIDTH, 3),
            new THREE.MeshBasicMaterial({ map: bannerTex, transparent: true, opacity: 0.8, side: THREE.DoubleSide })
        );
        banner.position.set(0, 10, 0);
        startGate.add(banner);

        startGate.position.copy(startFrame.pos);
        startGate.lookAt(startFrame.pos.clone().add(startFrame.tan));
        scene.add(startGate);

        // ══════════════════════════════════════════
        //  PILLARS
        // ══════════════════════════════════════════
        const pillarMat = new THREE.MeshPhysicalMaterial({
            color: 0x556688, metalness: 0.5, roughness: 0.2,
            transparent: true, opacity: 0.5, transmission: 0.3
        });
        const footMat = new THREE.MeshStandardMaterial({ color: 0x334455, metalness: 0.7, roughness: 0.3 });
        for (let i = 0; i < 200; i++) {
            const t = i / 200;
            const p = trackCurve.getPointAt(t);
            if (p.y > 10) {
                const h = p.y + 2;
                const pil = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.7, h, 6), pillarMat);
                pil.position.set(p.x, h / 2 - 2, p.z);
                scene.add(pil);
                const ft = new THREE.Mesh(new THREE.CylinderGeometry(1.5, 2.5, 3, 6), footMat);
                ft.position.set(p.x, 0.5, p.z);
                scene.add(ft);
            }
        }

        // ══════════════════════════════════════════
        //  TERRAIN
        // ══════════════════════════════════════════
        (() => {
            const sz = 2400, sg = 150;
            const geo = new THREE.PlaneGeometry(sz, sz, sg, sg);
            geo.rotateX(-Math.PI / 2);
            const pos = geo.attributes.position;
            const colors = new Float32Array(pos.count * 3);
            for (let i = 0; i < pos.count; i++) {
                const x = pos.getX(i), z = pos.getZ(i);
                let h = Math.sin(x*0.004)*Math.cos(z*0.003)*10 + Math.sin(x*0.015+1)*6 + Math.cos(z*0.012+0.5)*4;
                const dist = Math.sqrt(x*x + z*z);
                const ef = Math.max(0, (dist - 350) / 500);
                h += ef * ef * 20;
                pos.setY(i, Math.max(h, -3));
                // Dark futuristic terrain colors
                const rk = Math.min(1, ef);
                colors[i*3] = 0.04 + rk * 0.06 + Math.random() * 0.02;
                colors[i*3+1] = 0.06 + rk * 0.04 + Math.random() * 0.02;
                colors[i*3+2] = 0.12 + rk * 0.1 + Math.random() * 0.03;
            }
            geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geo.computeVertexNormals();
            scene.add(new THREE.Mesh(geo, new THREE.MeshLambertMaterial({ vertexColors: true })));
        })();

        // ══════════════════════════════════════════
        //  WATER
        // ══════════════════════════════════════════
        const waterGeo = new THREE.PlaneGeometry(3000, 3000, 120, 120);
        const waterMesh = new THREE.Mesh(waterGeo, new THREE.MeshPhysicalMaterial({
            color: 0x001133, metalness: 0.9, roughness: 0.05,
            envMapIntensity: 3.0, transparent: true, opacity: 0.85,
            clearcoat: 0.8, clearcoatRoughness: 0.08,
        }));
        waterMesh.rotation.x = -Math.PI / 2;
        waterMesh.position.y = -1;
        scene.add(waterMesh);
        const waterPos = waterGeo.attributes.position;
        const waterOrigZ = new Float32Array(waterPos.count);
        for (let i = 0; i < waterPos.count; i++) waterOrigZ[i] = waterPos.getZ(i);

        // ══════════════════════════════════════════
        //  RACER VEHICLE BUILDER
        // ══════════════════════════════════════════
        const RACER_COLORS = [
            { body: 0xff2255, accent: 0xff88aa, name: 'PLAYER' },
            { body: 0x2255ff, accent: 0x88aaff, name: 'PHANTOM' },
            { body: 0x22ff55, accent: 0x88ffaa, name: 'VIPER' },
            { body: 0xff8822, accent: 0xffcc88, name: 'BLAZE' },
            { body: 0xaa22ff, accent: 0xcc88ff, name: 'SPECTRE' },
            { body: 0xffff22, accent: 0xffffaa, name: 'VOLT' },
        ];

        function createRacer(colorIndex) {
            const rc = RACER_COLORS[colorIndex];
            const group = new THREE.Group();

            // Main hull
            const hull = new THREE.Mesh(
                new THREE.BoxGeometry(2.4, 0.7, 5),
                new THREE.MeshPhysicalMaterial({
                    color: rc.body, metalness: 0.85, roughness: 0.1,
                    clearcoat: 1.0, clearcoatRoughness: 0.03,
                    emissive: rc.body, emissiveIntensity: 0.15,
                })
            );
            group.add(hull);

            // Cockpit canopy
            const canopy = new THREE.Mesh(
                new THREE.SphereGeometry(1.0, 12, 8, 0, Math.PI * 2, 0, Math.PI * 0.5),
                new THREE.MeshPhysicalMaterial({
                    color: 0x88ccff, transmission: 0.8, transparent: true, opacity: 0.3,
                    roughness: 0.02, metalness: 0,
                })
            );
            canopy.position.set(0, 0.4, -0.5);
            canopy.scale.set(1, 0.5, 1.2);
            group.add(canopy);

            // Side fins
            for (const side of [-1, 1]) {
                const fin = new THREE.Mesh(
                    new THREE.BoxGeometry(0.15, 0.8, 2.5),
                    new THREE.MeshStandardMaterial({ color: rc.body, metalness: 0.8, roughness: 0.15 })
                );
                fin.position.set(side * 1.5, 0.1, 0.5);
                group.add(fin);
            }

            // Engine glow
            const engineGlow = new THREE.PointLight(rc.accent, 4, 25);
            engineGlow.position.set(0, -0.2, 2.8);
            group.add(engineGlow);

            // Thruster mesh
            const thruster = new THREE.Mesh(
                new THREE.CylinderGeometry(0.3, 0.5, 1, 8),
                new THREE.MeshBasicMaterial({ color: rc.accent, transparent: true, opacity: 0.6 })
            );
            thruster.rotation.x = Math.PI / 2;
            thruster.position.set(0, -0.1, 2.8);
            group.add(thruster);
            group.userData.thruster = thruster;
            group.userData.engineGlow = engineGlow;

            // Headlight
            const hl = new THREE.SpotLight(0xffffff, 15, 100, Math.PI / 7, 0.6);
            hl.position.set(0, 0, -2.5);
            hl.target.position.set(0, -1, -15);
            group.add(hl); group.add(hl.target);

            scene.add(group);
            return group;
        }

        // ══════════════════════════════════════════
        //  CREATE ALL RACERS
        // ══════════════════════════════════════════
        const NUM_AI = 5;
        const racers = [];

        // Player
        const playerMesh = createRacer(0);
        const playerState = {
            mesh: playerMesh,
            t: 0,
            lateralOffset: 0,
            speed: 0,
            boost: 100,
            boosting: false,
            lap: 0,
            lapTimes: [],
            lapStartTime: 0,
            finished: false,
            lastT: 0,
            totalDist: 0,
        };
        racers.push(playerState);

        // AI racers
        for (let i = 0; i < NUM_AI; i++) {
            const mesh = createRacer(i + 1);
            const ai = {
                mesh,
                t: -0.003 * (i + 1), // stagger starts slightly behind
                lateralOffset: (Math.random() - 0.5) * TRACK_WIDTH * 0.5,
                speed: 0,
                boost: 100,
                boosting: false,
                lap: 0,
                lapTimes: [],
                lapStartTime: 0,
                finished: false,
                lastT: 0,
                totalDist: 0,
                // AI params
                baseSpeed: 0.00028 + Math.random() * 0.00008,
                aggressiveness: 0.5 + Math.random() * 0.5,
                lateralTarget: 0,
                lateralTimer: 0,
                boostChance: 0.002 + Math.random() * 0.003,
            };
            racers.push(ai);
        }

        // ══════════════════════════════════════════
        //  INPUT
        // ══════════════════════════════════════════
        const keys = {};
        window.addEventListener('keydown', e => { keys[e.code] = true; if (['Space','ShiftLeft','ShiftRight'].includes(e.code)) e.preventDefault(); });
        window.addEventListener('keyup', e => { keys[e.code] = false; });

        // ══════════════════════════════════════════
        //  GAME STATE
        // ══════════════════════════════════════════
        let gameState = 'menu'; // menu, countdown, racing, finished
        let countdownTimer = 0;
        let raceTime = 0;
        let prevTime = performance.now();
        let frame = 0;
        let currentBankSmooth = 0;

        // ══════════════════════════════════════════
        //  MINIMAP
        // ══════════════════════════════════════════
        const minimapCanvas = document.getElementById('minimap');
        const mmCtx = minimapCanvas.getContext('2d');

        function drawMinimap() {
            const w = 160, h = 160;
            mmCtx.clearRect(0, 0, w, h);
            mmCtx.fillStyle = 'rgba(0,0,0,0.4)';
            mmCtx.beginPath(); mmCtx.arc(80, 80, 78, 0, Math.PI * 2); mmCtx.fill();
            mmCtx.strokeStyle = 'rgba(255,255,255,0.08)';
            mmCtx.lineWidth = 1; mmCtx.stroke();

            // Draw track outline
            mmCtx.beginPath();
            mmCtx.strokeStyle = 'rgba(255,255,255,0.15)';
            mmCtx.lineWidth = 2;
            for (let i = 0; i <= 200; i++) {
                const t = i / 200;
                const p = trackCurve.getPointAt(t);
                const mx = 80 + p.x / 10, my = 80 + p.z / 10;
                i === 0 ? mmCtx.moveTo(mx, my) : mmCtx.lineTo(mx, my);
            }
            mmCtx.closePath(); mmCtx.stroke();

            // Draw racers
            racers.forEach((r, idx) => {
                const p = trackCurve.getPointAt(((r.t % 1) + 1) % 1);
                const mx = 80 + p.x / 10, my = 80 + p.z / 10;
                const col = RACER_COLORS[idx];
                mmCtx.fillStyle = '#' + col.body.toString(16).padStart(6, '0');
                mmCtx.beginPath();
                mmCtx.arc(mx, my, idx === 0 ? 4 : 3, 0, Math.PI * 2);
                mmCtx.fill();
                if (idx === 0) {
                    mmCtx.strokeStyle = '#fff';
                    mmCtx.lineWidth = 1;
                    mmCtx.stroke();
                }
            });
        }

        // ══════════════════════════════════════════
        //  UI SETUP
        // ══════════════════════════════════════════
        function setCamera(mode) {
            camMode = mode;
            activeCam = { chase: chaseCam, cockpit: cockpitCam, bird: birdCam }[mode];
            document.querySelectorAll('#ui-bar button').forEach(b => b.classList.remove('active'));
            document.getElementById({ chase: 'camChase', cockpit: 'camCockpit', bird: 'camBird' }[mode])?.classList.add('active');
        }
        document.getElementById('camChase').onclick = () => setCamera('chase');
        document.getElementById('camCockpit').onclick = () => setCamera('cockpit');
        document.getElementById('camBird').onclick = () => setCamera('bird');

        document.getElementById('startBtn').onclick = startRace;
        document.getElementById('restartBtn').onclick = () => location.reload();

        function startRace() {
            gameState = 'countdown';
            countdownTimer = 3.5;
            document.getElementById('overlay').classList.add('hidden');
            document.getElementById('hud').style.display = '';
        }

        function ordinalSuffix(n) {
            if (n === 1) return 'ST';
            if (n === 2) return 'ND';
            if (n === 3) return 'RD';
            return 'TH';
        }

        function formatTime(ms) {
            const s = Math.floor(ms / 1000);
            const m = Math.floor(s / 60);
            const rem = s % 60;
            const frac = Math.floor((ms % 1000) / 100);
            return `${m}:${rem.toString().padStart(2,'0')}.${frac}`;
        }

        // ══════════════════════════════════════════
        //  POSITION DOTS (top HUD)
        // ══════════════════════════════════════════
        const posPanel = document.getElementById('posPanel');
        racers.forEach((_, i) => {
            const dot = document.createElement('div');
            dot.className = 'pos-dot' + (i === 0 ? ' player' : '');
            dot.style.background = '#' + RACER_COLORS[i].body.toString(16).padStart(6, '0');
            dot.style.color = '#fff';
            dot.textContent = i + 1;
            dot.id = 'posDot' + i;
            posPanel.appendChild(dot);
        });

        // ══════════════════════════════════════════
        //  RESIZE
        // ══════════════════════════════════════════
        window.addEventListener('resize', () => {
            const w = window.innerWidth, h = window.innerHeight;
            [chaseCam, cockpitCam, birdCam].forEach(c => { c.aspect = w / h; c.updateProjectionMatrix(); });
            renderer.setSize(w, h);
        });

        // ══════════════════════════════════════════
        //  UPDATE PLAYER
        // ══════════════════════════════════════════
        function updatePlayer(dt) {
            const p = playerState;
            if (p.finished) return;

            const accel = 0.0000012 * dt;
            const maxSpeed = 0.00045;
            const maxBoostSpeed = 0.0006;
            const friction = 0.997;
            const steer = 0.35 * dt;

            // Throttle
            if (keys['KeyW'] || keys['ArrowUp']) {
                p.speed += accel;
            }
            if (keys['KeyS'] || keys['ArrowDown']) {
                p.speed -= accel * 0.5;
            }

            // Steering
            if (keys['KeyA'] || keys['ArrowLeft']) {
                p.lateralOffset -= steer;
            }
            if (keys['KeyD'] || keys['ArrowRight']) {
                p.lateralOffset += steer;
            }

            // Airbrake
            if (keys['Space']) {
                p.speed *= 0.98;
            }

            // Boost
            if ((keys['ShiftLeft'] || keys['ShiftRight']) && p.boost > 0) {
                p.boosting = true;
                p.speed += accel * 1.5;
                p.boost = Math.max(0, p.boost - 0.15 * dt);
            } else {
                p.boosting = false;
                p.boost = Math.min(100, p.boost + 0.02 * dt);
            }

            // Curvature braking
            const curv = getCurvature(p.t);
            p.speed *= 1 - curv * 0.002;

            // Speed limits
            const spdLimit = p.boosting ? maxBoostSpeed : maxSpeed;
            p.speed = Math.max(0.00002, Math.min(p.speed, spdLimit));
            p.speed *= friction;

            // Lateral clamping
            p.lateralOffset = THREE.MathUtils.clamp(p.lateralOffset, -TRACK_WIDTH * 0.38, TRACK_WIDTH * 0.38);
            // Lateral dampening
            p.lateralOffset *= 0.995;

            // Check boost pad hits
            BOOST_POSITIONS.forEach(bt => {
                const dist = Math.abs(((p.t - bt) + 1.5) % 1 - 0.5);
                if (dist < 0.003) {
                    p.speed = Math.min(p.speed + 0.00015, maxBoostSpeed);
                    p.boost = Math.min(100, p.boost + 20);
                }
            });

            // Advance
            p.lastT = p.t;
            p.t += p.speed * dt;

            // Lap detection
            if (p.lastT < 1 && p.t >= 1) {
                p.t -= 1;
                p.lap++;
                const lapTime = raceTime - p.lapStartTime;
                p.lapTimes.push(lapTime);
                p.lapStartTime = raceTime;

                if (p.lap >= TOTAL_LAPS) {
                    p.finished = true;
                    checkRaceEnd();
                } else {
                    // Flash lap indicator
                    const flash = document.getElementById('lap-flash');
                    flash.textContent = `LAP ${p.lap + 1}`;
                    flash.classList.add('show');
                    setTimeout(() => flash.classList.remove('show'), 1500);
                }
            }

            // Reset key
            if (keys['KeyR']) {
                p.lateralOffset = 0;
                p.speed = 0.0002;
            }

            // Camera toggle key
            if (keys['KeyC']) {
                keys['KeyC'] = false;
                const modes = ['chase', 'cockpit', 'bird'];
                const next = (modes.indexOf(camMode) + 1) % modes.length;
                setCamera(modes[next]);
            }
        }

        // ══════════════════════════════════════════
        //  UPDATE AI
        // ══════════════════════════════════════════
        function updateAI(ai, idx, dt) {
            if (ai.finished) return;

            // Base speed with variation
            const targetSpeed = ai.baseSpeed * (0.9 + 0.2 * Math.sin(raceTime * 0.0005 + idx * 2));

            // Rubber-banding: if far behind player, speed up; if far ahead, slow down
            const playerDist = playerState.lap + playerState.t;
            const aiDist = ai.lap + ai.t;
            const gap = playerDist - aiDist;
            const rubberBand = 1 + gap * 0.15;

            ai.speed += (targetSpeed * rubberBand - ai.speed) * 0.02;
            ai.speed = THREE.MathUtils.clamp(ai.speed, 0.0001, 0.00055);

            // Lateral weaving
            ai.lateralTimer -= dt;
            if (ai.lateralTimer <= 0) {
                ai.lateralTarget = (Math.random() - 0.5) * TRACK_WIDTH * 0.5;
                ai.lateralTimer = 1000 + Math.random() * 3000;
            }
            ai.lateralOffset += (ai.lateralTarget - ai.lateralOffset) * 0.003 * dt;

            // Random boost
            if (Math.random() < ai.boostChance && ai.boost > 30) {
                ai.speed += 0.00008;
                ai.boost -= 15;
            }
            ai.boost = Math.min(100, ai.boost + 0.01 * dt);

            // Boost pad
            BOOST_POSITIONS.forEach(bt => {
                const dist = Math.abs(((ai.t - bt) + 1.5) % 1 - 0.5);
                if (dist < 0.004) ai.speed = Math.min(ai.speed + 0.0001, 0.00055);
            });

            // Advance
            ai.lastT = ai.t;
            ai.t += ai.speed * dt;

            // Lap
            if (ai.lastT < 1 && ai.t >= 1) {
                ai.t -= 1;
                ai.lap++;
                const lapTime = raceTime - ai.lapStartTime;
                ai.lapTimes.push(lapTime);
                ai.lapStartTime = raceTime;
                if (ai.lap >= TOTAL_LAPS) {
                    ai.finished = true;
                    checkRaceEnd();
                }
            }
        }

        // ══════════════════════════════════════════
        //  POSITION RACER MESH
        // ══════════════════════════════════════════
        function positionRacer(racer) {
            const t = ((racer.t % 1) + 1) % 1;
            const frame = getTrackFrame(t);
            const pos = frame.pos.clone()
                .add(frame.right.clone().multiplyScalar(racer.lateralOffset))
                .add(frame.up.clone().multiplyScalar(1.2));
            racer.mesh.position.copy(pos);

            // Orient along track
            const lookT = ((racer.t + 0.002) % 1 + 1) % 1;
            const lookFrame = getTrackFrame(lookT);
            const lookPos = lookFrame.pos.clone()
                .add(lookFrame.right.clone().multiplyScalar(racer.lateralOffset))
                .add(lookFrame.up.clone().multiplyScalar(1.2));
            racer.mesh.lookAt(lookPos);

            // Bank
            const bank = getBankAngle(t);
            racer.mesh.rotateOnAxis(new THREE.Vector3(0, 0, 1), bank * 0.35);

            // Thruster glow intensity based on speed
            const speedFrac = racer.speed / 0.0005;
            if (racer.mesh.userData.thruster) {
                racer.mesh.userData.thruster.scale.z = 0.5 + speedFrac * 1.5;
                racer.mesh.userData.thruster.material.opacity = 0.3 + speedFrac * 0.5;
            }
            if (racer.mesh.userData.engineGlow) {
                racer.mesh.userData.engineGlow.intensity = 2 + speedFrac * 8;
            }
        }

        // ══════════════════════════════════════════
        //  COMPUTE POSITIONS
        // ══════════════════════════════════════════
        function getRanking() {
            const sorted = racers.map((r, i) => ({
                idx: i,
                dist: r.lap + r.t,
            })).sort((a, b) => b.dist - a.dist);
            return sorted;
        }

        // ══════════════════════════════════════════
        //  RACE END
        // ══════════════════════════════════════════
        function checkRaceEnd() {
            if (!playerState.finished) return;

            gameState = 'finished';
            const ranking = getRanking();
            const playerPos = ranking.findIndex(r => r.idx === 0) + 1;

            document.getElementById('finishResult').textContent =
                `YOU FINISHED ${playerPos}${ordinalSuffix(playerPos)}`;
            document.getElementById('finishTimes').innerHTML =
                playerState.lapTimes.map((t, i) => `LAP ${i+1}: ${formatTime(t)}`).join('<br>') +
                `<br>TOTAL: ${formatTime(raceTime)}`;
            setTimeout(() => document.getElementById('finish-screen').classList.add('show'), 1000);
        }

        // ══════════════════════════════════════════
        //  RENDER LOOP
        // ══════════════════════════════════════════
        renderer.setAnimationLoop(function animate() {
            const now = performance.now();
            const rawDt = Math.min(now - prevTime, 50);
            prevTime = now;
            frame++;

            // ── Water animation ──
            if (frame % 3 === 0) {
                const wt = now * 0.0003;
                for (let i = 0; i < waterPos.count; i++) {
                    const wx = waterPos.getX(i), wy = waterPos.getY(i);
                    waterPos.setZ(i, waterOrigZ[i]
                        + Math.sin(wx*0.005 + wt*2)*0.6
                        + Math.sin(wy*0.008 + wt*1.5)*0.4
                        + Math.sin((wx+wy)*0.003 + wt*3)*0.25);
                }
                waterPos.needsUpdate = true;
                waterGeo.computeVertexNormals();
            }

            // ── Boost pad animation ──
            boostPads.forEach(pad => {
                pad.material.opacity = 0.35 + 0.25 * Math.sin(now * 0.005 + pad.userData.t * 20);
            });

            // ── GAME STATE MACHINE ──
            if (gameState === 'countdown') {
                countdownTimer -= rawDt / 1000;
                const cdEl = document.getElementById('countdown');
                if (countdownTimer > 0.5) {
                    const num = Math.ceil(countdownTimer - 0.5);
                    cdEl.textContent = num > 3 ? '' : num;
                    cdEl.classList.toggle('show', num <= 3);
                } else if (countdownTimer > -0.5) {
                    cdEl.textContent = 'GO!';
                    cdEl.classList.add('show');
                } else {
                    cdEl.classList.remove('show');
                    gameState = 'racing';
                    racers.forEach(r => { r.lapStartTime = 0; });
                }
                // Position everyone at start
                racers.forEach(r => positionRacer(r));

            } else if (gameState === 'racing') {
                raceTime += rawDt;

                // Update player
                updatePlayer(rawDt);

                // Update AI
                racers.forEach((r, i) => { if (i > 0) updateAI(r, i, rawDt); });

                // Position all racers
                racers.forEach(r => positionRacer(r));

                // ── HUD updates ──
                const speedKmh = Math.round(playerState.speed * 80000);
                document.getElementById('speedVal').textContent = speedKmh;
                document.getElementById('boostFill').style.width = playerState.boost + '%';
                document.getElementById('lapDisplay').textContent =
                    `LAP ${Math.min(playerState.lap + 1, TOTAL_LAPS)} / ${TOTAL_LAPS}`;
                document.getElementById('timeDisplay').textContent = formatTime(raceTime);

                // Position ranking
                const ranking = getRanking();
                const playerRank = ranking.findIndex(r => r.idx === 0) + 1;
                document.getElementById('posDisplay').innerHTML =
                    `${playerRank}<sup>${ordinalSuffix(playerRank)}</sup>`;

                // Update position dots
                ranking.forEach((r, pos) => {
                    const dot = document.getElementById('posDot' + r.idx);
                    if (dot) {
                        dot.textContent = pos + 1;
                        dot.style.order = pos;
                    }
                });

                // Wrong way detection
                const wrongWay = playerState.speed < -0.00005;
                document.getElementById('wrong-way').classList.toggle('show', wrongWay);
            }

            // ── CAMERA ──
            if (gameState === 'racing' || gameState === 'countdown') {
                const pt = ((playerState.t % 1) + 1) % 1;
                const pFrame = getTrackFrame(pt);
                const pPos = playerState.mesh.position;

                if (camMode === 'chase') {
                    const behind = pFrame.tan.clone().multiplyScalar(-22);
                    const above = pFrame.up.clone().multiplyScalar(8);
                    const idealPos = pPos.clone().add(behind).add(above);
                    chaseCam.position.lerp(idealPos, 0.06);
                    const lookTarget = pPos.clone().add(pFrame.tan.clone().multiplyScalar(15));
                    chaseCam.lookAt(lookTarget);

                    // Camera bank
                    const bank = getBankAngle(pt);
                    const targetBank = bank * 0.2;
                    currentBankSmooth += (targetBank - currentBankSmooth) * 0.04;
                    const cRight = new THREE.Vector3().crossVectors(pFrame.tan, new THREE.Vector3(0,1,0)).normalize();
                    const leanedUp = new THREE.Vector3(0,1,0).add(cRight.multiplyScalar(Math.sin(currentBankSmooth) * 0.3)).normalize();
                    chaseCam.up.lerp(leanedUp, 0.06);

                } else if (camMode === 'cockpit') {
                    const cockpitPos = pPos.clone().add(pFrame.up.clone().multiplyScalar(1.8));
                    cockpitCam.position.copy(cockpitPos);
                    const lookFar = pPos.clone().add(pFrame.tan.clone().multiplyScalar(50));
                    cockpitCam.lookAt(lookFar);
                    // Strong banking in cockpit
                    const bank = getBankAngle(pt);
                    const cRight = new THREE.Vector3().crossVectors(pFrame.tan, new THREE.Vector3(0,1,0)).normalize();
                    const leanedUp = new THREE.Vector3(0,1,0).add(cRight.multiplyScalar(Math.sin(bank * 0.5) * 0.5)).normalize();
                    cockpitCam.up.lerp(leanedUp, 0.1);

                } else if (camMode === 'bird') {
                    const birdPos = pPos.clone().add(new THREE.Vector3(0, 120, 0));
                    birdCam.position.lerp(birdPos, 0.05);
                    birdCam.lookAt(pPos);
                }
            }

            // Minimap
            if (frame % 4 === 0 && gameState !== 'menu') drawMinimap();

            renderer.render(scene, activeCam);
        });

    </script>
</body>
</html>
