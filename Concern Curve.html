<meta charset="utf-8">
<title>Data Center Balance — Concern Curve & the AGI Solve</title>
<style>
  html, body {
    margin: 0; padding: 0;
    background: #0d1117;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #e6edf3;
    overflow: hidden;
  }
  #wrap {
    width: 100%; height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  #game { box-shadow: 0 0 60px rgba(0,0,0,0.6); }
</style>

<div id="wrap"><div id="game"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.80.1/phaser.min.js"></script>
<script>
"use strict";

const W = 1060, H = 860;

/* ===================================================================
 * DATA CENTER BALANCE — CONCERN CURVE & THE AGI SOLVE
 *
 * REAL CONSTANTS:
 *  - 1 rack = NVIDIA DGX H100: 10.2 kW IT, ~32 PFLOPS.  PUE 1.15.
 *  - 1 genset = 2.5 MW diesel. NOx 4.0 (raw) / 0.4 (SCR) g/kWh.
 *  - NOx permit cap ~100 t/yr.  US EPA AQI scale 50/100/150.
 *
 * THE CONSOLIDATED BRAIN: capability = hw x algo x self-mod,
 *   all compounding, self-mod loop accelerating. Banks "cases".
 *
 * NEW — THE CONCERN CURVE:
 *   The resident's concern is a tracked SIGNAL, not a static label.
 *     concern(t) = baseline(t) + amplitude * |sin(season)|
 *   - The sine term models ozone-precursor reality: NOx cooks into
 *     ground-level ozone on hot, sunny, lake-breeze days, so concern
 *     PEAKS seasonally and EBBS when weather disperses it.
 *   - amplitude scales with facility NOx (more diesel = bigger swings).
 *   - baseline RISES with cumulative exposure (a bad-air decade does
 *     not un-happen) and is hard to bring back down.
 *
 * THE AGI SOLVE:
 *   Once brain capability crosses SOLVE_THRESHOLD, the AGI INVENTS
 *   "catalytic NOx capture" (better than human SCR). But invention
 *   != deployment. The player must choose to DEPLOY it — it costs
 *   real budget and real megawatts. Deploying it actively bends the
 *   concern curve downward over time (removal is not instant).
 *   This is the point: capability is exponential, deployment is
 *   gated by cost, power, and the operator's willingness to pay.
 * =================================================================== */

const RACK_IT_KW = 10.2, PUE = 1.15;
const RACK_KW    = RACK_IT_KW * PUE;
const RACK_PFLOPS= 32;
const GENSET_MW  = 2.5;
const NOX_UNCTRL = 4.0, NOX_SCR = 0.4, NOX_CAP_TPY = 100;

const GEN_DAYS     = 10;
const SELFMOD_STEP = 1.25, SELFMOD_ACCEL = 1.04;
const HW_PER_GEN   = 1.10, ALGO_PER_GEN = 1.15;
const HORIZON      = 12, DISCOUNT = 0.92;

const REV_PER_PFLOP = 0.020;
const GRID_COST_MW  = 0.010, DIESEL_COST_MW = 0.026;
const CAP_COST = { rack: 14, genset: 8, grid: 22, scr: 26 };

const SOLVE_THRESHOLD = 12;     // brain capability that unlocks the AGI solve
const SOLVE_COST      = 30;     // $M to deploy catalytic NOx capture
const SOLVE_MW        = 4;      // MW the capture rig continuously draws
const SOLVE_REMOVAL   = 0.97;   // 97% NOx removal once fully ramped

const CONCERN_HISTORY = 220;    // points kept for the curve plot

class BalanceScene extends Phaser.Scene {
  constructor() { super("balance"); }

  init() {
    this.state = {
      budget: 60,
      racks: 4, gensets: 1, gridMW: 3, scr: false,
      liabilities: 4*CAP_COST.rack + 1*CAP_COST.genset + 3/5*CAP_COST.grid,
      aqi: 38, bgAqi: 34,
      pflopDays: 0, noxTons: 0,
      pflops: 0, dieselHoursPct: 0,
      day: 0, generation: 0,
      hwMult: 1, algoMult: 1, selfModMult: 1, selfModStep: SELFMOD_STEP,
      brainCap: 1, casesKnown: 0, caseBonus: 1, caseTimer: 0,
      revenue: 0, opex: 0, netWorth: 0,
      // --- concern signal ---
      concern: 18,            // current concern level (0..100)
      concernBase: 16,        // slow-moving baseline
      // --- the AGI solve ---
      solveInvented: false,   // AGI has discovered the method
      solveDeployed: false,   // player chose to deploy it
      solveRamp: 0,           // 0..1 deployment ramp-up
      genFlash: 0,
      gameOver: false, win: false, throttle: 0
    };
    this.WIN_PFLOPDAYS = 4000;
    this.concernHist = [];
    this.caseLog = [];
  }

  create() {
    this.cameras.main.setBackgroundColor("#0d1117");

    this.add.text(W/2, 8, "DATA CENTER BALANCE — CONCERN CURVE & THE AGI SOLVE", {
      fontFamily: "Arial", fontSize: "19px", fontStyle: "bold", color: "#58a6ff"
    }).setOrigin(0.5, 0);
    this.add.text(W/2, 30, "Resident concern oscillates with the seasons and rises with exposure. Can the AGI bend it back down?", {
      fontFamily: "Arial", fontSize: "11px", color: "#8b949e"
    }).setOrigin(0.5, 0);

    this.buildGauges();
    this.buildFinancePanel();
    this.buildBrainPanel();
    this.buildConcernPanel();
    this.facilityG = this.add.graphics();
    this.brainG = this.add.graphics();
    this.roadG = this.add.graphics();
    this.cars = []; this.ghosts = []; this.synapses = [];

    this.statText = this.add.text(34, 700, "", {
      fontFamily: "monospace", fontSize: "11px", color: "#e6edf3", lineSpacing: 3
    });

    this.buildButtons();

    for (let i = 0; i < 7; i++) this.spawnCar(Phaser.Math.Between(0, W));

    this.time.addEvent({ delay: 850, loop: true, callback: () => this.tick() });
    this.updateUI();
  }

  buildGauges() {
    this.add.text(106, 56, "AI COMPUTE", {
      fontFamily: "Arial", fontSize: "11px", fontStyle: "bold", color: "#3fb950"
    }).setOrigin(0.5, 0);
    this.add.rectangle(106, 232, 52, 260, 0x161b22).setStrokeStyle(1, 0x30363d);
    this.thruBar = this.add.rectangle(106, 360, 46, 4, 0x3fb950).setOrigin(0.5, 1);
    this.thruVal = this.add.text(106, 366, "", {
      fontFamily: "monospace", fontSize: "12px", color: "#3fb950"
    }).setOrigin(0.5, 0);
    this.add.text(106, 382, "PFLOPS", {
      fontFamily: "Arial", fontSize: "9px", color: "#8b949e"
    }).setOrigin(0.5, 0);

    const gx = 952, gBot = 360, gH = 258;
    this.add.text(gx, 56, "AIRSHED AQI", {
      fontFamily: "Arial", fontSize: "11px", fontStyle: "bold", color: "#f85149"
    }).setOrigin(0.5, 0);
    this.add.rectangle(gx, 232, 52, 260, 0x161b22).setStrokeStyle(1, 0x30363d);
    [[50,"#3fb950","50"],[100,"#d29922","100"],[150,"#f85149","150"]]
      .forEach(([v,c,lbl]) => {
        const y = gBot - (v/160)*gH;
        this.add.rectangle(gx, y, 46, 1.5,
          Phaser.Display.Color.HexStringToColor(c).color).setOrigin(0.5);
        this.add.text(gx + 29, y - 5, lbl, {
          fontFamily: "Arial", fontSize: "8px", color: c
        }).setOrigin(0, 0);
      });
    this.aqiBgBar  = this.add.rectangle(gx, gBot, 46, 4, 0x6e7681).setOrigin(0.5, 1);
    this.aqiFacBar = this.add.rectangle(gx, gBot, 46, 4, 0xd29922).setOrigin(0.5, 1);
    this.aqiVal = this.add.text(gx, 366, "38", {
      fontFamily: "monospace", fontSize: "13px", color: "#3fb950"
    }).setOrigin(0.5, 0);
    this.gAQI = { gx, gBot, gH };

    this.scoreText = this.add.text(W/2, 360, "", {
      fontFamily: "monospace", fontSize: "11px", color: "#8b949e"
    }).setOrigin(0.5, 0);
  }

  buildFinancePanel() {
    const px = 188, py = 52, pw = 360, ph = 86;
    this.add.rectangle(px, py, pw, ph, 0x161b22, 1)
      .setOrigin(0, 0).setStrokeStyle(1, 0x1f6feb);
    this.add.text(px + 12, py + 6, "FINANCIALS", {
      fontFamily: "Arial", fontSize: "10px", fontStyle: "bold", color: "#58a6ff"
    });
    this.finCells = {};
    [["budget","BUDGET","#3fb950"],["revenue","REV $/day","#d29922"],
     ["networth","PROJ NET WORTH","#58a6ff"]].forEach((c, i) => {
      const cx = px + 14 + i * 116;
      this.add.text(cx, py + 22, c[1], {
        fontFamily: "Arial", fontSize: "9px", color: "#8b949e"
      });
      this.finCells[c[0]] = this.add.text(cx, py + 35, "", {
        fontFamily: "monospace", fontSize: "15px", fontStyle: "bold", color: c[2]
      });
    });
    this.add.text(px + 14, py + 58, "NET WORTH FORECAST", {
      fontFamily: "Arial", fontSize: "9px", color: "#8b949e"
    });
    this.sparkG = this.add.graphics();
    this.sparkBox = { x: px + 130, y: py + 56, w: pw - 144, h: 22 };
  }

  buildBrainPanel() {
    const px = 560, py = 52, pw = 310, ph = 86;
    this.add.rectangle(px, py, pw, ph, 0x161b22, 1)
      .setOrigin(0, 0).setStrokeStyle(1, 0x8957e5);
    this.add.text(px + 12, py + 6, "CONSOLIDATED BRAIN", {
      fontFamily: "Arial", fontSize: "10px", fontStyle: "bold", color: "#a371f7"
    });
    this.brainCells = {};
    [["cap","CAPABILITY","#a371f7"],["cases","CASES KNOWN","#3fb950"]]
      .forEach((c, i) => {
        const cx = px + 14 + i * 150;
        this.add.text(cx, py + 22, c[1], {
          fontFamily: "Arial", fontSize: "9px", color: "#8b949e"
        });
        this.brainCells[c[0]] = this.add.text(cx, py + 34, "", {
          fontFamily: "monospace", fontSize: "15px", fontStyle: "bold", color: c[2]
        });
      });
    this.brainFactors = this.add.text(px + 14, py + 58, "", {
      fontFamily: "monospace", fontSize: "9px", color: "#8b949e"
    });
  }

  buildConcernPanel() {
    // The signature panel: the sine concern curve plotted over time.
    const px = 188, py = 408, pw = 682, ph = 168;
    this.add.rectangle(px, py, pw, ph, 0x161b22, 1)
      .setOrigin(0, 0).setStrokeStyle(1, 0xf0883e);
    this.add.text(px + 12, py + 8, "RESIDENT CONCERN — A TRACKED SIGNAL", {
      fontFamily: "Arial", fontSize: "11px", fontStyle: "bold", color: "#f0883e"
    });
    this.concernNow = this.add.text(px + pw - 12, py + 8, "", {
      fontFamily: "monospace", fontSize: "12px", fontStyle: "bold", color: "#f0883e"
    }).setOrigin(1, 0);
    this.concernG = this.add.graphics();
    this.concernPlot = { x: px + 14, y: py + 30, w: pw - 28, h: 110 };
    this.concernCaption = this.add.text(px + 14, py + ph - 24, "", {
      fontFamily: "Arial", fontSize: "9px", color: "#8b949e",
      wordWrap: { width: pw - 28 }, lineSpacing: 2
    });
  }

  buildButtons() {
    const defs = [
      { key: "rack",   label: "+ DGX H100 rack", cost: CAP_COST.rack,   color: 0x238636, sub: "+32 PFLOPS base" },
      { key: "genset", label: "+ 2.5 MW diesel", cost: CAP_COST.genset, color: 0x9e6a03, sub: "+2.5 MW dirty" },
      { key: "grid",   label: "+ 5 MW grid",     cost: CAP_COST.grid,   color: 0x1f6feb, sub: "clean power" },
      { key: "scr",    label: "Install SCR/DEF", cost: CAP_COST.scr,    color: 0x8957e5, sub: "human tech, -90% NOx" }
    ];
    this.btns = [];
    const startX = 300, btnW = 250;
    defs.forEach((d, i) => {
      const y = 720 + i * 25;
      const bg = this.add.rectangle(startX, y, btnW, 21, d.color, 1)
        .setOrigin(0, 0.5).setInteractive({ useHandCursor: true });
      const tx = this.add.text(startX + 8, y, "", {
        fontFamily: "Arial", fontSize: "11px", fontStyle: "bold", color: "#ffffff"
      }).setOrigin(0, 0.5);
      bg.on("pointerover", () => bg.setAlpha(0.82));
      bg.on("pointerout",  () => bg.setAlpha(1));
      bg.on("pointerdown", () => this.buy(d.key, d.cost));
      this.btns.push({ def: d, bg, tx });
    });

    // THE AGI SOLVE button — appears only once the AGI invents it.
    this.solveBtn = this.add.rectangle(300, 720 + 4*25 + 6, 540, 26, 0x1f6feb, 1)
      .setOrigin(0, 0.5).setInteractive({ useHandCursor: true }).setVisible(false);
    this.solveTx = this.add.text(308, 720 + 4*25 + 6, "", {
      fontFamily: "Arial", fontSize: "11px", fontStyle: "bold", color: "#ffffff"
    }).setOrigin(0, 0.5).setVisible(false);
    this.solveBtn.on("pointerover", () => this.solveBtn.setAlpha(0.85));
    this.solveBtn.on("pointerout",  () => this.solveBtn.setAlpha(1));
    this.solveBtn.on("pointerdown", () => this.deploySolve());
  }

  buy(key, cost) {
    const s = this.state;
    if (s.gameOver) { this.restart(); return; }
    if (key === "scr" && s.scr) return;
    if (s.budget < cost) return;
    s.budget -= cost; s.liabilities += cost;
    if (key === "rack")   s.racks++;
    if (key === "genset") s.gensets++;
    if (key === "grid")   s.gridMW += 5;
    if (key === "scr")    s.scr = true;
    this.updateUI();
  }

  deploySolve() {
    const s = this.state;
    if (s.gameOver) { this.restart(); return; }
    if (!s.solveInvented || s.solveDeployed) return;
    if (s.budget < SOLVE_COST) return;
    s.budget -= SOLVE_COST;
    s.liabilities += SOLVE_COST;
    s.solveDeployed = true;     // ramp begins; removal is NOT instant
    this.updateUI();
  }

  learnCase() {
    const s = this.state;
    s.casesKnown++;
    s.caseBonus *= 1.03;
    this.firePulse();
  }

  tick() {
    const s = this.state;
    if (s.gameOver) return;
    s.day++;

    // ---- generation: brain self-improves on all three axes ----
    const newGen = Math.floor(s.day / GEN_DAYS);
    if (newGen > s.generation) {
      s.generation = newGen;
      s.hwMult      *= HW_PER_GEN;
      s.algoMult    *= ALGO_PER_GEN;
      s.selfModMult *= s.selfModStep;
      s.selfModStep  = 1 + (s.selfModStep - 1) * SELFMOD_ACCEL;
      s.genFlash = 1;
    }
    s.brainCap = s.hwMult * s.algoMult * s.selfModMult;

    // ---- AGI invents the NOx solution once capable enough ----
    if (!s.solveInvented && s.brainCap >= SOLVE_THRESHOLD) {
      s.solveInvented = true;
    }
    // deployed solution ramps up gradually (build + install lag)
    if (s.solveDeployed && s.solveRamp < 1) {
      s.solveRamp = Math.min(1, s.solveRamp + 0.03);
    }

    // ---- case learning ----
    s.caseTimer++;
    const caseInterval = Math.max(2, Math.round(7 / Math.sqrt(s.brainCap)));
    if (s.caseTimer >= caseInterval) { s.caseTimer = 0; this.learnCase(); }

    // ---- power ----
    const demandMW = s.racks * RACK_KW / 1000;
    const dieselMW = s.gensets * GENSET_MW;
    const supplyMW = s.gridMW + dieselMW;
    const served = Math.min(1, supplyMW / Math.max(demandMW, 0.001));
    s.throttle = served < 0.999 ? 1 : 0;

    // ---- compute ----
    const intelMult = s.brainCap * s.caseBonus;
    s.pflops = s.racks * RACK_PFLOPS * intelMult * served;
    s.pflopDays += s.pflops / 60;

    // ---- financials ----
    s.revenue = s.pflops * REV_PER_PFLOP;
    // the deployed capture rig draws SOLVE_MW of power continuously
    const solveLoad = s.solveDeployed ? SOLVE_MW * s.solveRamp : 0;
    s.opex = s.gridMW * GRID_COST_MW +
             Math.min(dieselMW, Math.max(0, demandMW - s.gridMW)) * DIESEL_COST_MW +
             solveLoad * GRID_COST_MW;
    s.budget += s.revenue - s.opex;

    // ---- projected net worth ----
    let proj = 0; const projSeries = [];
    let hw = s.hwMult, algo = s.algoMult, sm = s.selfModMult, smStep = s.selfModStep;
    for (let gI = 1; gI <= HORIZON; gI++) {
      hw *= HW_PER_GEN; algo *= ALGO_PER_GEN; sm *= smStep;
      smStep = 1 + (smStep - 1) * SELFMOD_ACCEL;
      const fIntel = hw * algo * sm * s.caseBonus;
      const genProfit = s.racks * RACK_PFLOPS * fIntel * REV_PER_PFLOP
                        * GEN_DAYS - s.opex * GEN_DAYS;
      proj += genProfit * Math.pow(DISCOUNT, gI);
      projSeries.push(proj);
    }
    s.netWorth = s.budget + proj - s.liabilities;
    s._projSeries = projSeries;

    // ---- diesel NOx, with BOTH human SCR and the AGI capture rig ----
    const dieselLoadMW = Math.max(0, Math.min(dieselMW, demandMW - s.gridMW));
    s.dieselHoursPct = demandMW > 0
      ? Math.round(100 * dieselLoadMW / demandMW) : 0;
    let noxFactor = s.scr ? NOX_SCR : NOX_UNCTRL;
    // AGI catalytic capture removes up to 97% on top, scaled by ramp
    const agiRemoval = s.solveDeployed ? SOLVE_REMOVAL * s.solveRamp : 0;
    noxFactor *= (1 - agiRemoval);
    const noxTPY = dieselLoadMW * 1000 * 8760 * noxFactor / 1e6;
    s.noxTons += noxTPY / 60;
    const facAqi = Math.min(115, (noxTPY / NOX_CAP_TPY) * 95);

    // ---- airshed AQI ----
    s.bgAqi = 34 + Math.sin(s.day * 0.25) * 4;
    s.aqi += ((s.bgAqi + facAqi) - s.aqi) * 0.18;

    // ============ THE CONCERN CURVE ============
    // concern(t) = baseline(t) + amplitude * |sin(season)|
    //  - sine term = seasonal ozone-precursor cycle (hot sunny days)
    //  - amplitude grows with current facility NOx
    //  - baseline rises with cumulative exposure; the AGI solve,
    //    once ramped, slowly bends the baseline back down.
    const season = Math.sin(s.day * 0.13);          // slow seasonal wave
    const amplitude = 6 + facAqi * 0.45;            // diesel widens swings
    const exposurePush = facAqi * 0.012;            // cumulative buildup
    s.concernBase += exposurePush;
    // AGI solve relief: ramped capture pulls the baseline DOWN, but
    // slowly — you cannot un-breathe a bad-air decade quickly.
    if (s.solveDeployed) {
      s.concernBase -= 0.10 * s.solveRamp;
    }
    s.concernBase = Phaser.Math.Clamp(s.concernBase, 12, 88);
    const rawConcern = s.concernBase + amplitude * Math.abs(season);
    s.concern = Phaser.Math.Clamp(rawConcern, 0, 100);

    this.concernHist.push({
      c: s.concern, base: s.concernBase, solved: s.solveDeployed
    });
    if (this.concernHist.length > CONCERN_HISTORY) this.concernHist.shift();

    if (s.aqi >= 150)                      { this.endGame(false); return; }
    if (s.pflopDays >= this.WIN_PFLOPDAYS) { this.endGame(true);  return; }

    s._facAqi = facAqi; s._noxTPY = noxTPY; s._intelMult = intelMult;
    this.updateUI();
  }

  updateUI() {
    const s = this.state;
    const demandMW = s.racks * RACK_KW / 1000;
    const dieselMW = s.gensets * GENSET_MW;
    const supplyMW = s.gridMW + dieselMW;
    const facAqi = s._facAqi || 0;
    const intelMult = s._intelMult || 1;

    this.thruBar.height = Phaser.Math.Clamp(s.pflops / 6000 * 250, 4, 250);
    this.thruVal.setText(Math.round(s.pflops));

    const g = this.gAQI;
    const bgH  = (s.bgAqi / 160) * g.gH;
    const facH = (Math.min(facAqi, 160 - s.bgAqi) / 160) * g.gH;
    this.aqiBgBar.height = bgH;
    this.aqiFacBar.height = facH;
    this.aqiFacBar.y = g.gBot - bgH;
    const aqi = Math.round(s.aqi);
    const col = aqi <= 50 ? "#3fb950" : aqi <= 100 ? "#d29922" : "#f85149";
    this.aqiVal.setColor(col).setText(aqi);

    this.scoreText.setText(
      Math.round(s.pflopDays) + " / " + this.WIN_PFLOPDAYS + " PFLOP-days"
    );

    this.finCells.budget.setText("$" + s.budget.toFixed(1) + "M");
    this.finCells.revenue.setText("$" + s.revenue.toFixed(2) + "M");
    this.finCells.networth.setColor(s.netWorth >= 0 ? "#58a6ff" : "#f85149");
    this.finCells.networth.setText("$" + this.fmt(s.netWorth) + "M");
    this.drawSparkline();

    this.brainCells.cap.setText(this.fmt(s.brainCap) + "x");
    this.brainCells.cases.setText(s.casesKnown);
    this.brainFactors.setText(
      "hw " + s.hwMult.toFixed(1) + "x  algo " + s.algoMult.toFixed(1) +
      "x  self-mod " + this.fmt(s.selfModMult) + "x"
    );

    // ---- concern panel ----
    this.concernNow.setText("now " + Math.round(s.concern));
    const cc = s.concern < 35 ? "#3fb950" : s.concern < 65 ? "#d29922" : "#f85149";
    this.concernNow.setColor(cc);
    this.drawConcernCurve();

    const powerOk = supplyMW >= demandMW - 0.01;
    this.statText.setText([
      "Generation " + s.generation + "   Day " + s.day +
        "   Brain capability " + this.fmt(s.brainCap) + "x",
      "Racks " + s.racks + "  ->  effective " + Math.round(s.pflops) +
        " PFLOPS   profit $" + (s.revenue-s.opex).toFixed(2) + "M/d",
      "Power demand " + demandMW.toFixed(1) + " / supply " +
        supplyMW.toFixed(1) + " MW  " + (powerOk ? "[OK]" : "[THROTTLING]"),
      "Facility NOx " + (s._noxTPY||0).toFixed(1) + " t/yr   diesel ~" +
        s.dieselHoursPct + "%   SCR " + (s.scr ? "ON" : "off"),
      "AGI NOx solution:  " + (
        !s.solveInvented ? "not yet invented (needs capability " +
          SOLVE_THRESHOLD + "x)"
        : !s.solveDeployed ? "INVENTED - awaiting your decision to deploy"
        : "DEPLOYED - capture rig ramped " + Math.round(s.solveRamp*100) + "%"
      ),
      "Concern signal " + Math.round(s.concern) + "   baseline " +
        Math.round(s.concernBase) + "   (sine = seasonal ozone cycle)"
    ].join("\n"));
    this.statText.setColor(powerOk ? "#e6edf3" : "#f85149");

    this.btns.forEach(b => {
      let afford = s.budget >= b.def.cost;
      if (b.def.key === "scr" && s.scr) afford = false;
      b.bg.setAlpha(afford ? 1 : 0.35);
      let label = b.def.label + " ($" + b.def.cost + "M)  " + b.def.sub;
      if (b.def.key === "scr" && s.scr) label = "SCR/DEF installed - human tech, NOx -90%";
      b.tx.setText(label);
    });

    // ---- the AGI solve button ----
    if (s.solveInvented && !s.solveDeployed) {
      this.solveBtn.setVisible(true).setFillStyle(0x1f6feb);
      this.solveTx.setVisible(true).setText(
        "AGI SOLVE: deploy catalytic NOx capture  ($" + SOLVE_COST +
        "M + " + SOLVE_MW + " MW)  -  removes ~97% NOx"
      );
      this.solveBtn.setAlpha(s.budget >= SOLVE_COST ? 1 : 0.4);
    } else if (s.solveDeployed) {
      this.solveBtn.setVisible(true).setFillStyle(0x238636).setAlpha(1);
      this.solveTx.setVisible(true).setText(
        "AGI catalytic NOx capture DEPLOYED  -  ramped " +
        Math.round(s.solveRamp*100) + "%,  removing ~" +
        Math.round(SOLVE_REMOVAL*s.solveRamp*100) + "% of NOx"
      );
    } else {
      this.solveBtn.setVisible(false);
      this.solveTx.setVisible(false);
    }

    this.drawFacility();
    this.drawRoad();
  }

  fmt(v) {
    if (v >= 1e6) return (v/1e6).toFixed(1) + "M";
    if (v >= 1e3) return (v/1e3).toFixed(1) + "k";
    if (v >= 100) return Math.round(v).toString();
    return v.toFixed(1);
  }

  drawConcernCurve() {
    const s = this.state;
    const g = this.concernG;
    const p = this.concernPlot;
    g.clear();
    // frame + 0/50/100 gridlines
    g.lineStyle(1, 0x30363d, 1);
    [0, 0.5, 1].forEach(f => {
      const y = p.y + p.h * (1 - f);
      g.lineBetween(p.x, y, p.x + p.w, y);
    });
    // concern band thresholds (35 calm / 65 alarmed)
    g.lineStyle(1, 0x3fb950, 0.25);
    let y35 = p.y + p.h * (1 - 35/100);
    g.lineBetween(p.x, y35, p.x + p.w, y35);
    g.lineStyle(1, 0xf85149, 0.25);
    let y65 = p.y + p.h * (1 - 65/100);
    g.lineBetween(p.x, y65, p.x + p.w, y65);

    const hist = this.concernHist;
    if (hist.length < 2) return;
    const n = hist.length;

    // baseline (slow component) — drawn faint
    g.lineStyle(1.5, 0x8b949e, 0.7);
    hist.forEach((h, i) => {
      const x = p.x + (i / (CONCERN_HISTORY - 1)) * p.w;
      const y = p.y + p.h * (1 - Phaser.Math.Clamp(h.base,0,100)/100);
      if (i === 0) g.moveTo(x, y); else g.lineTo(x, y);
    });
    g.strokePath();

    // full concern signal — the sine curve. Orange before the AGI
    // solve, turning green where the deployed solve is bending it down.
    for (let i = 1; i < n; i++) {
      const h0 = hist[i-1], h1 = hist[i];
      const x0 = p.x + ((i-1)/(CONCERN_HISTORY-1))*p.w;
      const x1 = p.x + (i/(CONCERN_HISTORY-1))*p.w;
      const y0 = p.y + p.h*(1 - Phaser.Math.Clamp(h0.c,0,100)/100);
      const y1 = p.y + p.h*(1 - Phaser.Math.Clamp(h1.c,0,100)/100);
      g.lineStyle(2, h1.solved ? 0x3fb950 : 0xf0883e, 1);
      g.beginPath(); g.moveTo(x0, y0); g.lineTo(x1, y1); g.strokePath();
    }
    // leading dot
    const last = hist[n-1];
    const lx = p.x + ((n-1)/(CONCERN_HISTORY-1))*p.w;
    const ly = p.y + p.h*(1 - Phaser.Math.Clamp(last.c,0,100)/100);
    g.fillStyle(last.solved ? 0x3fb950 : 0xf0883e, 1);
    g.fillCircle(lx, ly, 3);

    // caption explains what the curve is doing right now
    let cap;
    if (!s.solveInvented) {
      cap = "Orange = concern. The sine swing is the seasonal ozone-precursor " +
            "cycle: NOx cooks into ozone on hot sunny lake-breeze days, so " +
            "concern peaks each summer. Grey = the rising baseline of " +
            "cumulative exposure.";
    } else if (!s.solveDeployed) {
      cap = "The AGI has INVENTED catalytic NOx capture - but invention is not " +
            "deployment. The curve keeps oscillating until you choose to spend " +
            "budget and power to actually deploy it.";
    } else {
      cap = "Green = the AGI solve is bending the curve down. Note it is slow: " +
            "the capture rig ramps over time, and the cumulative-exposure " +
            "baseline only eases gradually. Capability was instant; relief is not.";
    }
    this.concernCaption.setText(cap);
  }

  drawSparkline() {
    const s = this.state;
    const g = this.sparkG, box = this.sparkBox;
    g.clear();
    const series = s._projSeries;
    if (!series || !series.length) return;
    const max = Math.max(...series, 1), min = Math.min(...series, 0);
    const range = (max - min) || 1;
    const zeroY = box.y + box.h - ((0 - min)/range)*box.h;
    g.lineStyle(1, 0x30363d, 1);
    g.lineBetween(box.x, zeroY, box.x + box.w, zeroY);
    g.lineStyle(2, 0x58a6ff, 1);
    series.forEach((v, i) => {
      const x = box.x + (i/(series.length-1))*box.w;
      const y = box.y + box.h - ((v-min)/range)*box.h;
      if (i === 0) g.moveTo(x, y); else g.lineTo(x, y);
    });
    g.strokePath();
  }

  firePulse() {
    const cx = 522, cy = 232;
    for (let i = 0; i < 5; i++) {
      const ang = Math.random()*Math.PI*2;
      this.synapses.push({ x: cx, y: cy, ang, r: 0, max: 38+Math.random()*38, life: 1 });
    }
  }

  drawBrain() {
    const s = this.state;
    const g = this.brainG;
    g.clear();
    const cx = 522, cy = 232;
    const cap = Math.max(1, s.brainCap);
    const coreR = 12 + Math.min(30, Math.log(cap) * 6);
    for (let k = 3; k >= 1; k--) {
      g.lineStyle(1.5, 0x8957e5, 0.10*k);
      g.strokeCircle(cx, cy, coreR + k*8 + Math.sin(s.day*0.4)*2);
    }
    g.fillStyle(0x6e40c9, 0.30);
    g.fillCircle(cx, cy, coreR);
    g.lineStyle(2, 0xa371f7, 0.9);
    g.strokeCircle(cx, cy, coreR);
    g.fillStyle(0xd2b8ff, 0.5 + 0.3*Math.sin(s.day*0.6));
    g.fillCircle(cx, cy, coreR*0.4);
    const nodes = Math.min(s.casesKnown, 26);
    for (let i = 0; i < nodes; i++) {
      const ang = (i/Math.max(nodes,1))*Math.PI*2 + s.day*0.02;
      const orbit = coreR + 16 + (i % 3)*8;
      const nx = cx + Math.cos(ang)*orbit;
      const ny = cy + Math.sin(ang)*orbit*0.6;
      g.lineStyle(0.5, 0x8957e5, 0.35);
      g.lineBetween(cx, cy, nx, ny);
      g.fillStyle(0x3fb950, 0.9);
      g.fillCircle(nx, ny, 2.3);
    }
    for (let i = this.synapses.length - 1; i >= 0; i--) {
      const sp = this.synapses[i];
      sp.r += 2.4; sp.life -= 0.04;
      const ex = sp.x + Math.cos(sp.ang)*sp.r;
      const ey = sp.y + Math.sin(sp.ang)*sp.r*0.6;
      g.fillStyle(0xd2b8ff, Math.max(0, sp.life));
      g.fillCircle(ex, ey, 2);
      if (sp.life <= 0 || sp.r > sp.max) this.synapses.splice(i, 1);
    }
  }

  drawFacility() {
    const s = this.state;
    const g = this.facilityG;
    g.clear();
    g.fillStyle(0x161b22, 1);
    g.fillRect(252, 296, 540, 64);
    g.lineStyle(1, 0x30363d, 1);
    g.strokeRect(252, 296, 540, 64);
    const rackCount = Math.min(s.racks, 34);
    for (let i = 0; i < rackCount; i++) {
      const col = i % 17, row = Math.floor(i / 17);
      const x = 266 + col*31, y = 336 - row*22;
      g.fillStyle(s.throttle ? 0xf85149 : 0x3fb950, 1);
      g.fillRect(x, y, 22, 16);
      g.lineStyle(1, 0x0d1117, 1);
      g.strokeRect(x, y, 22, 16);
    }
    const stackCount = Math.min(s.gensets, 11);
    for (let i = 0; i < stackCount; i++) {
      const x = 270 + i*44, y = 240;
      g.fillStyle(0x484f58, 1);
      g.fillRect(x, y, 14, 56);
      g.fillStyle(s.scr ? 0x2ea043 : 0x6e7681, 1);
      g.fillRect(x - 2, y - 4, 18, 8);
    }
    // the AGI capture rig — a teal structure that appears when deployed
    if (s.solveDeployed) {
      const rx = 720, ry = 250, h = 46 * s.solveRamp;
      g.fillStyle(0x1d9e75, 0.85);
      g.fillRect(rx, ry + (46 - h), 54, h);
      g.lineStyle(1.5, 0x5dcaa5, 1);
      g.strokeRect(rx, ry, 54, 46);
      g.fillStyle(0x5dcaa5, 1);
      for (let k = 0; k < 3; k++) g.fillCircle(rx + 12 + k*16, ry - 5, 3);
    }
    if (s.genFlash > 0) {
      g.lineStyle(3, 0x8957e5, s.genFlash);
      g.strokeRect(248, 180, 548, 180);
      s.genFlash -= 0.02;
    }
  }

  drawRoad() {
    const g = this.roadG;
    g.clear();
    g.fillStyle(0x21262d, 1);
    g.fillRect(0, 600, W, 50);
    g.lineStyle(2, 0x30363d, 1);
    g.lineBetween(0, 600, W, 600);
    g.lineBetween(0, 650, W, 650);
    g.lineStyle(3, 0x484f58, 1);
    for (let x = 0; x < W; x += 46) g.lineBetween(x, 625, x + 24, 625);
  }

  spawnCar(x) {
    const lane = Math.random() < 0.5 ? 612 : 638;
    const dir = lane < 625 ? 1 : -1;
    const colors = [0xf85149, 0x58a6ff, 0xd29922, 0x8b949e, 0x3fb950];
    const c = this.add.rectangle(
      x, lane, 26, 11, colors[Phaser.Math.Between(0, colors.length-1)], 1
    );
    this.cars.push({ obj: c, vx: dir * (1.4 + Math.random()*1.5) });
  }

  spawnGhost(x, y, scrubbed) {
    const cont = this.add.container(x, y);
    const tint = scrubbed ? 0x7fae9b : 0x9b8cc4;
    const a = scrubbed ? 0.26 : 0.44;
    const tail = this.add.triangle(0, 14, -5, 0, 5, 0, 0, 9, tint, a*0.7);
    const body = this.add.ellipse(0, 6, 11, 16, tint, a);
    const head = this.add.circle(0, -6, 6, tint, a);
    const label = this.add.text(0, -20, "NOx", {
      fontFamily: "Arial", fontSize: "8px", fontStyle: "bold",
      color: scrubbed ? "#9fc4b3" : "#b9a9e0"
    }).setOrigin(0.5);
    cont.add([tail, body, head, label]);
    cont.setScale(0.7);
    this.ghosts.push({
      obj: cont, vy: -0.34 - Math.random()*0.4,
      vx: (Math.random()-0.5)*0.5, life: 1
    });
  }

  endGame(win) {
    const s = this.state;
    s.gameOver = true; s.win = win;
    this.add.rectangle(W/2, H/2, W, H, 0x000000, 0.83);
    const tc = win ? "#3fb950" : "#f85149";
    this.add.text(W/2, 300, win ? "GRID BALANCED" : "AIRSHED SHUTDOWN", {
      fontFamily: "Arial", fontSize: "32px", fontStyle: "bold", color: tc
    }).setOrigin(0.5);
    let msg;
    if (win) {
      msg = "Banked " + this.WIN_PFLOPDAYS + " PFLOP-days under EPA's AQI 150.\n" +
        (s.solveDeployed
          ? "The AGI invented the NOx fix AND you deployed it - concern\n" +
            "baseline eased to " + Math.round(s.concernBase) + ". Capability and air, both."
          : "You balanced it with human SCR alone. The AGI " +
            (s.solveInvented ? "invented a fix you never deployed." : "never got there.")
        );
    } else {
      msg = "NOx pushed the airshed past AQI 150 - permit pulled.\n" +
        (s.solveInvented && !s.solveDeployed
          ? "The AGI had ALREADY invented the fix. It sat undeployed.\n" +
            "Capability was never the bottleneck - the decision to spend was."
          : "The AGI " + (s.solveInvented ? "deployed its fix too late." :
              "never reached the capability to invent a fix.") + "\n" +
            "A concern curve ignored does not stop oscillating - it climbs.");
    }
    this.add.text(W/2, 372, msg, {
      fontFamily: "Arial", fontSize: "13px", color: "#e6edf3", align: "center"
    }).setOrigin(0.5);
    const btn = this.add.rectangle(W/2, 460, 190, 38, 0x238636)
      .setInteractive({ useHandCursor: true });
    this.add.text(W/2, 460, "PLAY AGAIN", {
      fontFamily: "Arial", fontSize: "13px", fontStyle: "bold", color: "#ffffff"
    }).setOrigin(0.5);
    btn.on("pointerdown", () => this.restart());
  }

  restart() { this.scene.restart(); }

  update() {
    const s = this.state;
    this.drawBrain();
    if (s.gameOver) return;

    for (let i = this.cars.length - 1; i >= 0; i--) {
      const c = this.cars[i];
      c.obj.x += c.vx;
      if (c.obj.x < -40 || c.obj.x > W + 40) {
        c.obj.destroy(); this.cars.splice(i, 1);
      }
    }
    if (this.cars.length < 11 && Math.random() < 0.05) {
      this.spawnCar(Math.random() < 0.5 ? -30 : W + 30);
    }

    if (Math.random() < 0.34 && this.cars.length > 0) {
      const c = this.cars[Phaser.Math.Between(0, this.cars.length-1)];
      if (c) this.spawnGhost(c.obj.x, 608, false);
    }
    // facility NOx ghosts — far fewer once the AGI capture rig ramps
    const captureCut = s.solveDeployed ? (1 - SOLVE_REMOVAL*s.solveRamp) : 1;
    const intensity = Math.min(1, s.dieselHoursPct / 60) * captureCut;
    if (Math.random() < (0.08 + intensity*0.6) * (s.scr ? 0.5 : 1)) {
      const n = Math.min(s.gensets, 11);
      if (n > 0) {
        const k = Phaser.Math.Between(0, n-1);
        this.spawnGhost(277 + k*44, 234, s.scr || s.solveDeployed);
      }
    }
    for (let i = this.ghosts.length - 1; i >= 0; i--) {
      const gh = this.ghosts[i];
      gh.obj.y += gh.vy;
      gh.obj.x += gh.vx + Math.sin(gh.life*6)*0.3;
      gh.life -= 0.006;
      gh.obj.setScale(0.7 + (1-gh.life)*0.5);
      gh.obj.setAlpha(Math.max(0, gh.life));
      if (gh.life <= 0 || gh.obj.y < 380) {
        gh.obj.destroy(); this.ghosts.splice(i, 1);
      }
    }
  }
}

new Phaser.Game({
  type: Phaser.AUTO,
  width: W, height: H,
  parent: "game",
  backgroundColor: "#0d1117",
  scene: [BalanceScene]
});
</script>
