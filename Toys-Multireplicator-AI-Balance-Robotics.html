<!DOCTYPE html>
<html lang="en">
<head>
	<title>🧸 Toys Multireplicator AI Balance Robot</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
	<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤖</text></svg>">
	<style>
		* { box-sizing: border-box; }
		body {
			margin: 0;
			overflow: hidden;
			font-family: ui-sans-serif, system-ui, sans-serif;
			background: #f4eee3;
			user-select: none;
			-webkit-user-select: none;
			overscroll-behavior: none;
		}
		canvas { display: block; touch-action: none; }
		button, select, input { font: inherit; }
		button { cursor: pointer; border: none; }

		#modebar {
			position: fixed;
			top: 16px;
			left: 50%;
			transform: translateX(-50%);
			display: flex;
			background: #fffdf8;
			border-radius: 999px;
			padding: 4px;
			box-shadow: 0 2px 12px rgba(90, 60, 20, 0.15);
			z-index: 10;
		}
		#modebar button {
			padding: 8px 22px;
			border-radius: 999px;
			background: transparent;
			color: #7a6248;
			font-weight: 700;
		}
		#modebar button.active { background: #8a5a33; color: #fff8ee; }

		#palette {
			position: fixed;
			left: 16px;
			top: 50%;
			transform: translateY(-50%);
			display: flex;
			flex-direction: column;
			gap: 10px;
			z-index: 10;
		}
		body.play #palette {
			opacity: 0;
			pointer-events: none;
			transform: translate(-16px, -50%);
		}
		.piece-btn {
			width: 78px;
			padding: 8px 4px 6px;
			background: #fffdf8;
			border-radius: 14px;
			box-shadow: 0 2px 10px rgba(90, 60, 20, 0.12);
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 2px;
			cursor: grab;
			touch-action: none;
			transition: transform 0.12s;
			color: #7a6248;
			font-size: 11px;
			font-weight: 700;
		}
		.piece-btn:hover { transform: scale(1.06); }
		.piece-btn svg {
			width: 40px;
			height: 40px;
			fill: #dcb185;
			stroke: #77502b;
			stroke-width: 2.5;
			pointer-events: none;
		}

		#actions {
			position: fixed;
			top: 20px;
			right: 16px;
			display: flex;
			gap: 8px;
			z-index: 10;
		}
		#actions button {
			padding: 8px 16px;
			border-radius: 999px;
			background: #fffdf8;
			color: #7a6248;
			font-weight: 700;
			box-shadow: 0 2px 10px rgba(90, 60, 20, 0.12);
		}
		#replicatorBtn { background: #fff4df !important; }
		#aiBtn { background: #edf8ff !important; color: #2c5876 !important; }

		#toolbar {
			position: fixed;
			bottom: 52px;
			left: 50%;
			transform: translateX(-50%);
			display: flex;
			gap: 8px;
			background: #fffdf8;
			padding: 6px;
			border-radius: 999px;
			box-shadow: 0 2px 12px rgba(90, 60, 20, 0.15);
			z-index: 10;
		}
		#toolbar[hidden] { display: none; }
		#toolbar button {
			padding: 7px 16px;
			border-radius: 999px;
			background: #f4e9da;
			color: #6d4a26;
			font-weight: 700;
		}
		#toolbar #deleteBtn { background: #f6e0d8; color: #a04d33; }

		.panel {
			position: fixed;
			right: 16px;
			width: 264px;
			padding: 12px;
			border-radius: 18px;
			background: #fffdf8;
			color: #6d4a26;
			box-shadow: 0 8px 30px rgba(90, 60, 20, 0.22);
			display: flex;
			flex-direction: column;
			gap: 10px;
			z-index: 12;
		}
		.panel[hidden] { display: none; }
		body.play .panel { display: none; }
		.panel h3 {
			margin: 0;
			font-size: 14px;
			color: #8a5a33;
		}
		#replicatorPanel { top: 64px; }
		#aiPanel { top: 64px; right: 292px; }

		.rep-row {
			display: grid;
			grid-template-columns: 84px 1fr 42px;
			align-items: center;
			gap: 7px;
			font-size: 12px;
			font-weight: 800;
		}
		.rep-row select,
		.rep-row input {
			width: 100%;
			border: none;
			border-radius: 999px;
			background: #f4e9da;
			color: #6d4a26;
			padding: 6px 8px;
		}
		.rep-row output {
			text-align: right;
			font-variant-numeric: tabular-nums;
			color: #a3906f;
		}
		.panel-actions {
			display: flex;
			gap: 8px;
			flex-wrap: wrap;
		}
		.panel-actions button {
			flex: 1;
			min-width: 90px;
			padding: 8px 10px;
			border-radius: 999px;
			background: #8a5a33;
			color: #fff8ee;
			font-weight: 800;
			font-size: 12px;
		}
		.panel-actions .soft {
			background: #f4e9da;
			color: #6d4a26;
		}
		.panel-actions .danger {
			background: #f6e0d8;
			color: #a04d33;
		}
		#aiStats {
			background: #f4e9da;
			border-radius: 14px;
			padding: 9px 10px;
			font-size: 12px;
			font-weight: 750;
			line-height: 1.5;
			color: #5f4427;
		}
		#aiStats b { color: #2c5876; }

		#hint {
			position: fixed;
			bottom: 18px;
			left: 50%;
			transform: translateX(-50%);
			color: #5c4a33;
			font-size: 12px;
			pointer-events: none;
			text-align: center;
			white-space: nowrap;
			z-index: 10;
		}

		#toast {
			position: fixed;
			left: 50%;
			top: 76px;
			transform: translateX(-50%);
			background: #fffdf8;
			color: #8a5a33;
			font-weight: 800;
			font-size: 12px;
			padding: 8px 14px;
			border-radius: 999px;
			box-shadow: 0 2px 12px rgba(90, 60, 20, 0.15);
			opacity: 0;
			pointer-events: none;
			transition: opacity 0.25s;
			z-index: 20;
		}
		#toast.show { opacity: 1; }

		@media (max-width: 980px) {
			#aiPanel { right: 16px; top: 430px; }
		}
		@media (max-width: 760px) {
			.piece-btn { width: 60px; padding: 6px 4px 5px; font-size: 10px; }
			.piece-btn svg { width: 30px; height: 30px; }
			.panel { width: calc(100vw - 32px); left: 16px; right: 16px; }
			#replicatorPanel { top: 72px; }
			#aiPanel { top: 72px; }
			#hint { white-space: normal; max-width: 70vw; }
			#actions { flex-wrap: wrap; justify-content: flex-end; }
		}
	</style>
	<script type="importmap">
		{
			"imports": {
				"three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
				"three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/"
			}
		}
	</script>
</head>
<body>
	<div id="modebar">
		<button id="buildBtn" class="active">Build</button>
		<button id="playBtn">Play</button>
	</div>

	<div id="palette"></div>

	<div id="actions">
		<button id="aiBtn">AI Robot</button>
		<button id="replicatorBtn">MultiRep</button>
		<button id="saveBtn">Save</button>
		<button id="clearBtn">Clear</button>
	</div>

	<div id="replicatorPanel" class="panel" hidden>
		<h3>🧬 Procedural Multireplicator</h3>

		<label class="rep-row">
			<span>Pattern</span>
			<select id="repPattern">
				<option value="ring">Ring</option>
				<option value="spiral">Spiral</option>
				<option value="grid">Grid</option>
				<option value="helix">Helix</option>
				<option value="wave">Wave</option>
				<option value="burst">Burst</option>
			</select>
			<output></output>
		</label>

		<label class="rep-row">
			<span>Count</span>
			<input id="repCount" type="range" min="2" max="64" value="16">
			<output id="repCountOut">16</output>
		</label>

		<label class="rep-row">
			<span>Layers</span>
			<input id="repLayers" type="range" min="1" max="8" value="2">
			<output id="repLayersOut">2</output>
		</label>

		<label class="rep-row">
			<span>Radius</span>
			<input id="repRadius" type="range" min="0.2" max="6" step="0.1" value="1.4">
			<output id="repRadiusOut">1.4</output>
		</label>

		<label class="rep-row">
			<span>Jitter</span>
			<input id="repJitter" type="range" min="0" max="0.9" step="0.05" value="0.08">
			<output id="repJitterOut">0.08</output>
		</label>

		<label class="rep-row">
			<span>Scale</span>
			<input id="repScale" type="range" min="0" max="0.8" step="0.05" value="0.18">
			<output id="repScaleOut">0.18</output>
		</label>

		<label class="rep-row">
			<span>Twist</span>
			<input id="repTwist" type="range" min="0" max="1" step="0.05" value="0.5">
			<output id="repTwistOut">0.5</output>
		</label>

		<div class="panel-actions">
			<button id="repApplyBtn">Replicate</button>
			<button id="repCloseBtn" class="soft">Close</button>
		</div>
	</div>

	<div id="aiPanel" class="panel" hidden>
		<h3>🤖 AI Balance Design Robot</h3>

		<label class="rep-row">
			<span>Target wheels</span>
			<input id="aiWheelTarget" type="range" min="4" max="24" step="2" value="12">
			<output id="aiWheelTargetOut">12</output>
		</label>

		<label class="rep-row">
			<span>Attempts/sec</span>
			<input id="aiSpeed" type="range" min="1" max="12" value="5">
			<output id="aiSpeedOut">5</output>
		</label>

		<label class="rep-row">
			<span>Explore</span>
			<input id="aiExplore" type="range" min="0" max="1" step="0.05" value="0.45">
			<output id="aiExploreOut">0.45</output>
		</label>

		<div id="aiStats">
			Generation: <b id="aiGen">0</b><br>
			Best score: <b id="aiBest">0.00</b><br>
			Wheels: <b id="aiWheels">0</b><br>
			Balance: <b id="aiBalance">0.00</b><br>
			Status: <b id="aiStatus">idle</b>
		</div>

		<div class="panel-actions">
			<button id="aiStartBtn">Start AI</button>
			<button id="aiStopBtn" class="soft">Stop</button>
			<button id="aiSeedBtn" class="soft">Seed Best</button>
			<button id="aiClearTrialsBtn" class="danger">Clear Trials</button>
		</div>
	</div>

	<div id="toolbar" hidden>
		<button id="spinBtn">Spin: off</button>
		<button id="duplicateBtn">Duplicate</button>
		<button id="deleteBtn">Delete</button>
	</div>

	<div id="hint">drag or click a piece · select one · AI Robot repeatedly improves balance with more wheels · A starts AI · space plays</div>
	<div id="toast"></div>

	<script type="module">
		import * as THREE from 'three';
		import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
		import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';

		const STORAGE_KEY = 'toys-multireplicator-ai-balance-robot-v1';
		const Y_AXIS = new THREE.Vector3(0, 1, 0);
		const Z_AXIS = new THREE.Vector3(0, 0, 1);
		const raycaster = new THREE.Raycaster();
		const pointer = new THREE.Vector2();
		const groundPlane = new THREE.Plane(Y_AXIS, 0);
		const temp = new THREE.Vector3();

		const TYPES = {
			block: {
				name: 'Block',
				color: 0xdcb185,
				geometry: () => new RoundedBoxGeometry(0.5, 0.5, 0.5, 2, 0.055),
				size: { x: 0.5, y: 0.5, z: 0.5 },
				icon: '<rect x="10" y="10" width="28" height="28" rx="7"/>'
			},
			plank: {
				name: 'Plank',
				color: 0xc88f5f,
				geometry: () => new RoundedBoxGeometry(1.2, 0.15, 0.45, 2, 0.045),
				size: { x: 1.2, y: 0.15, z: 0.45 },
				icon: '<rect x="4" y="18" width="40" height="12" rx="5"/>'
			},
			wheel: {
				name: 'Wheel',
				color: 0x8b5a35,
				geometry: () => new THREE.CylinderGeometry(0.24, 0.24, 0.16, 32).rotateX(Math.PI / 2),
				size: { radius: 0.24, width: 0.16 },
				icon: '<circle cx="24" cy="24" r="16"/><circle cx="24" cy="24" r="4" fill="#77502b"/>'
			},
			ball: {
				name: 'Ball',
				color: 0xc46a46,
				geometry: () => new THREE.SphereGeometry(0.24, 32, 20),
				size: { radius: 0.24 },
				icon: '<circle cx="24" cy="24" r="15"/>'
			}
		};

		let scene, camera, renderer, controls;
		let pieces = [];
		let selected = null;
		let mode = 'build';
		let dragType = null;
		let dragGhost = null;
		let playClock = 0;

		const ai = {
			running: false,
			timer: null,
			generation: 0,
			bestScore: 0,
			bestDesign: null,
			bestWheels: 0,
			bestBalance: 0,
			trialPieces: [],
			bestPieces: [],
			robot: null
		};

		init();

		function init() {
			scene = new THREE.Scene();
			scene.background = new THREE.Color(0x9a8b70);
			scene.fog = new THREE.Fog(0x9a8b70, 16, 45);

			camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
			camera.position.set(5.2, 4.1, 7.2);

			renderer = new THREE.WebGLRenderer({ antialias: true });
			renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
			renderer.setSize(window.innerWidth, window.innerHeight);
			renderer.shadowMap.enabled = true;
			renderer.shadowMap.type = THREE.PCFSoftShadowMap;
			document.body.appendChild(renderer.domElement);

			controls = new OrbitControls(camera, renderer.domElement);
			controls.target.set(0, 0.45, 0);
			controls.enableDamping = true;
			controls.dampingFactor = 0.08;
			controls.maxPolarAngle = Math.PI * 0.495;
			controls.minDistance = 2;
			controls.maxDistance = 24;

			const hemi = new THREE.HemisphereLight(0xfff8e8, 0x7a6248, 1.8);
			scene.add(hemi);

			const spot = new THREE.SpotLight(0xfff1de, 240);
			spot.position.set(0, 8, 0);
			spot.angle = 0.7;
			spot.penumbra = 1;
			spot.decay = 2;
			spot.castShadow = true;
			spot.shadow.mapSize.set(2048, 2048);
			scene.add(spot);
			scene.add(spot.target);

			const floor = new THREE.Mesh(
				new THREE.CircleGeometry(15, 128).rotateX(-Math.PI / 2),
				new THREE.MeshStandardMaterial({ color: 0x9a8b70, roughness: 1 })
			);
			floor.receiveShadow = true;
			floor.name = 'floor';
			scene.add(floor);

			const ring = new THREE.Mesh(
				new THREE.TorusGeometry(15, 0.045, 12, 160).rotateX(Math.PI / 2),
				new THREE.MeshStandardMaterial({ color: 0x7a6248, roughness: 0.9 })
			);
			ring.position.y = 0.02;
			scene.add(ring);

			const grid = new THREE.GridHelper(28, 28, 0x7a6248, 0xb8a587);
			grid.material.transparent = true;
			grid.material.opacity = 0.22;
			scene.add(grid);

			buildAIRobot();
			buildPalette();
			bindEvents();
			bindReplicatorUI();
			bindAIUI();
			loadLocal();

			if (pieces.length === 0) seedStarterToy();

			window.addEventListener('resize', onResize);
			renderer.setAnimationLoop(animate);
		}

		function buildAIRobot() {
			const root = new THREE.Group();
			root.position.set(-4.2, 0.05, -3.2);

			const matBlue = new THREE.MeshStandardMaterial({ color: 0x6aa7d8, roughness: 0.45, metalness: 0.05, emissive: 0x0a3552, emissiveIntensity: 0.08 });
			const matFace = new THREE.MeshStandardMaterial({ color: 0xfff4df, roughness: 0.55 });
			const matEye = new THREE.MeshStandardMaterial({ color: 0x143d57, emissive: 0x3ad7ff, emissiveIntensity: 0.7 });
			const matArm = new THREE.MeshStandardMaterial({ color: 0xb77c4c, roughness: 0.6 });

			const body = new THREE.Mesh(new RoundedBoxGeometry(0.55, 0.75, 0.38, 3, 0.07), matBlue);
			body.position.y = 0.78;
			body.castShadow = true;
			root.add(body);

			const head = new THREE.Mesh(new RoundedBoxGeometry(0.5, 0.38, 0.36, 3, 0.06), matFace);
			head.position.y = 1.42;
			head.castShadow = true;
			root.add(head);

			for (const x of [-0.13, 0.13]) {
				const eye = new THREE.Mesh(new THREE.SphereGeometry(0.045, 16, 10), matEye);
				eye.position.set(x, 1.44, 0.19);
				root.add(eye);
			}

			const antenna = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.015, 0.35, 10), matArm);
			antenna.position.y = 1.78;
			root.add(antenna);

			const orb = new THREE.Mesh(new THREE.SphereGeometry(0.055, 16, 10), matEye);
			orb.position.y = 1.98;
			root.add(orb);

			for (const side of [-1, 1]) {
				const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.035, 0.55, 12), matArm);
				arm.position.set(side * 0.42, 0.88, 0);
				arm.rotation.z = side * 0.7;
				arm.castShadow = true;
				root.add(arm);

				const hand = new THREE.Mesh(new THREE.SphereGeometry(0.055, 16, 10), matArm);
				hand.position.set(side * 0.62, 0.66, 0.02);
				root.add(hand);
			}

			for (const x of [-0.17, 0.17]) {
				const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.045, 0.045, 0.42, 12), matArm);
				leg.position.set(x, 0.28, 0);
				leg.castShadow = true;
				root.add(leg);

				const foot = new THREE.Mesh(new RoundedBoxGeometry(0.2, 0.08, 0.32, 2, 0.03), matBlue);
				foot.position.set(x, 0.05, 0.06);
				foot.castShadow = true;
				root.add(foot);
			}

			const halo = new THREE.Mesh(new THREE.TorusGeometry(0.44, 0.012, 8, 64), matEye);
			halo.position.y = 1.42;
			halo.rotation.x = Math.PI / 2;
			root.add(halo);

			root.userData = { baseY: root.position.y, halo, orb };
			ai.robot = root;
			scene.add(root);
		}

		function buildPalette() {
			const palette = document.getElementById('palette');

			for (const [type, def] of Object.entries(TYPES)) {
				const item = document.createElement('div');
				item.className = 'piece-btn';
				item.innerHTML = `<svg viewBox="0 0 48 48">${def.icon}</svg>${def.name}`;
				item.addEventListener('pointerdown', event => startPaletteDrag(event, type));
				item.addEventListener('click', () => {
					const p = addPiece(type, new THREE.Vector3(0, 0.35 + pieces.length * 0.03, 0), new THREE.Quaternion(), 1, 0, 'user');
					select(p);
					saveLocal();
				});
				palette.appendChild(item);
			}
		}

		function bindEvents() {
			const canvas = renderer.domElement;

			document.getElementById('buildBtn').addEventListener('click', () => setMode('build'));
			document.getElementById('playBtn').addEventListener('click', () => setMode('play'));
			document.getElementById('spinBtn').addEventListener('click', cycleSpin);
			document.getElementById('duplicateBtn').addEventListener('click', duplicateSelected);
			document.getElementById('deleteBtn').addEventListener('click', deleteSelected);

			document.getElementById('replicatorBtn').addEventListener('click', () => {
				document.getElementById('aiPanel').hidden = true;
				const panel = document.getElementById('replicatorPanel');
				panel.hidden = !panel.hidden;
			});

			document.getElementById('aiBtn').addEventListener('click', () => {
				document.getElementById('replicatorPanel').hidden = true;
				const panel = document.getElementById('aiPanel');
				panel.hidden = !panel.hidden;
			});

			document.getElementById('clearBtn').addEventListener('click', () => {
				stopAI();
				for (const piece of pieces) scene.remove(piece.mesh);
				pieces = [];
				ai.trialPieces = [];
				ai.bestPieces = [];
				ai.bestDesign = null;
				ai.bestScore = 0;
				select(null);
				saveLocal();
				updateAIStats();
				toast('cleared');
			});

			document.getElementById('saveBtn').addEventListener('click', () => {
				saveLocal();
				toast('saved locally');
			});

			canvas.addEventListener('pointerdown', event => {
				if (mode !== 'build') return;
				setRay(event);
				const hits = raycaster.intersectObjects(pieces.map(p => p.mesh), false);
				select(hits.length ? hits[0].object.userData.piece : null);
			});

			window.addEventListener('keydown', event => {
				if (event.code === 'Space') {
					event.preventDefault();
					setMode(mode === 'build' ? 'play' : 'build');
					return;
				}

				if (event.code === 'KeyA') {
					if (ai.running) stopAI();
					else startAI();
				}

				if (mode !== 'build') return;

				if (event.code === 'KeyM' && selected) replicateSelected();
				if (event.code === 'KeyD' && selected) duplicateSelected();
				if (event.code === 'KeyS' && selected) cycleSpin();
				if (event.code === 'Delete' || event.code === 'Backspace') deleteSelected();

				if (!selected) return;

				const step = event.shiftKey ? 0.25 : 0.1;
				if (event.code === 'ArrowLeft') moveSelected(-step, 0, 0);
				if (event.code === 'ArrowRight') moveSelected(step, 0, 0);
				if (event.code === 'ArrowUp') moveSelected(0, 0, -step);
				if (event.code === 'ArrowDown') moveSelected(0, 0, step);
				if (event.code === 'KeyQ') rotateSelected(0.18);
				if (event.code === 'KeyE') rotateSelected(-0.18);
				if (event.code === 'Equal' || event.code === 'NumpadAdd') scaleSelected(1.08);
				if (event.code === 'Minus' || event.code === 'NumpadSubtract') scaleSelected(0.92);
			});
		}

			document.getElementById('playBtn').classList.toggle('active', mode === 'play');

		function setRay(event) {
			pointer.set((event.clientX / window.innerWidth) * 2 - 1, -(event.clientY / window.innerHeight) * 2 + 1);
			raycaster.setFromCamera(pointer, camera);
		}

		function startPaletteDrag(event, type) {
			if (mode !== 'build') return;

			event.preventDefault();
			dragType = type;

			dragGhost = new THREE.Mesh(
				TYPES[type].geometry(),
				new THREE.MeshStandardMaterial({ color: 0x59b87c, transparent: true, opacity: 0.55, roughness: 0.8 })
			);
			dragGhost.castShadow = true;
			scene.add(dragGhost);

			window.addEventListener('pointermove', onPaletteDrag);
			window.addEventListener('pointerup', endPaletteDrag);
			onPaletteDrag(event);
		}

		function onPaletteDrag(event) {
			if (!dragGhost) return;
			setRay(event);

			if (raycaster.ray.intersectPlane(groundPlane, temp)) {
				dragGhost.position.copy(temp);
				dragGhost.position.x = Math.round(dragGhost.position.x * 10) / 10;
				dragGhost.position.z = Math.round(dragGhost.position.z * 10) / 10;
				dragGhost.position.y = 0.28;
			}
		}

		function endPaletteDrag(event) {
			window.removeEventListener('pointermove', onPaletteDrag);
			window.removeEventListener('pointerup', endPaletteDrag);

			if (dragGhost && document.elementFromPoint(event.clientX, event.clientY) === renderer.domElement) {
				const p = addPiece(dragType, dragGhost.position.clone(), dragGhost.quaternion.clone(), 1, 0, 'user');
				select(p);
				saveLocal();
			}

			if (dragGhost) scene.remove(dragGhost);
			dragGhost = null;
			dragType = null;
		}

		function makeMaterial(type, index = pieces.length, source = 'user') {
			const color = new THREE.Color(TYPES[type].color);

			if (source === 'ai-trial') color.setHex(type === 'wheel' ? 0x457fa4 : 0x8fc7e8);
			else if (source === 'ai-best') color.setHex(type === 'wheel' ? 0x8a5a33 : 0xffc05a);
			else color.offsetHSL((index % 7) * 0.015, 0.04, (index % 5) * 0.018);

			return new THREE.MeshStandardMaterial({
				color,
				roughness: 0.68,
				metalness: source.startsWith('ai') ? 0.08 : 0.02,
				emissive: new THREE.Color(source === 'ai-best' ? 0x5a3200 : 0x000000),
				emissiveIntensity: source === 'ai-best' ? 0.08 : 0
			});
		}

		function addPiece(type, position, quaternion, scale = 1, spin = 0, source = 'user') {
			const mesh = new THREE.Mesh(TYPES[type].geometry(), makeMaterial(type, pieces.length, source));
			mesh.castShadow = true;
			mesh.receiveShadow = true;
			mesh.position.copy(position);
			mesh.quaternion.copy(quaternion);
			mesh.scale.setScalar(scale);

			const piece = { type, mesh, spin, scale, source };
			mesh.userData.piece = piece;
			pieces.push(piece);
			scene.add(mesh);

			return piece;
		}

		function select(piece) {
			if (selected) {
				selected.mesh.material.emissive?.setHex(selected.source === 'ai-best' ? 0x5a3200 : 0x000000);
				selected.mesh.material.emissiveIntensity = selected.source === 'ai-best' ? 0.08 : 0;
			}

			selected = piece;

			if (selected) {
				selected.mesh.material.emissive = new THREE.Color(0xff9f2e);
				selected.mesh.material.emissiveIntensity = 0.28;
			}

			document.getElementById('toolbar').hidden = mode !== 'build' || !selected;
			updateSpinButton();
		}

		function moveSelected(x, y, z) {
			if (!selected) return;
			selected.mesh.position.x += x;
			selected.mesh.position.y = Math.max(0.05, selected.mesh.position.y + y);
			selected.mesh.position.z += z;
			saveLocal();
		}

		function rotateSelected(delta) {
			if (!selected) return;
			selected.mesh.rotateY(delta);
			saveLocal();
		}

		function scaleSelected(mult) {
			if (!selected) return;
			selected.scale = THREE.MathUtils.clamp(selected.scale * mult, 0.18, 3.5);
			selected.mesh.scale.setScalar(selected.scale);
			saveLocal();
		}

		function cycleSpin() {
			if (!selected) return;
			selected.spin = selected.spin === 0 ? 1 : selected.spin === 1 ? -1 : 0;

			saveLocal();

		function updateSpinButton() {

				selected.spin === 0 ? 'Spin: off' : selected.spin === 1 ? 'Spin: ⟳' : 'Spin: ⟲';

		function duplicateSelected() {
			if (!selected) return;
			const p = selected.mesh.position.clone().add(new THREE.Vector3(0.7, 0, 0.7));
			const q = selected.mesh.quaternion.clone();
			const copy = addPiece(selected.type, p, q, selected.scale, selected.spin, selected.source);

		function deleteSelected() {
			if (!selected) return;
			scene.remove(selected.mesh);
			pieces = pieces.filter(p => p !== selected);
			ai.trialPieces = ai.trialPieces.filter(p => p !== selected);
			ai.bestPieces = ai.bestPieces.filter(p => p !== selected);
			select(null);
			saveLocal();
		}

		function makeRandom(seed) {
			let s = seed >>> 0;
			return () => {
				s = (s * 1664525 + 1013904223) >>> 0;
				return s / 4294967296;
			};
		}

		function settings() {
			const n = id => Number(document.getElementById(id).value);
			return {
				pattern: document.getElementById('repPattern').value,
				count: n('repCount'),
				layers: n('repLayers'),
				radius: n('repRadius'),
				jitter: n('repJitter'),
				scaleJitter: n('repScale'),
				twist: n('repTwist'),
				seed: Math.floor(performance.now() * 1000)
			};
		}

		function replicatorTransform(cloneIndex, localIndex, layerIndex, s, random) {
			const count = s.count;
			const golden = Math.PI * (3 - Math.sqrt(5));
			const layerRadius = s.radius * (0.55 + (layerIndex + 1) * 0.45);

			let x = 0, y = 0, z = 0, yaw = 0;

			if (s.pattern === 'ring') {
				const a = (localIndex / count) * Math.PI * 2;
				x = Math.cos(a) * layerRadius;
				z = Math.sin(a) * layerRadius;
				yaw = a + Math.PI / 2;
			}

			if (s.pattern === 'spiral') {
				const i = cloneIndex + 1;
				const a = i * golden;
				const r = s.radius * Math.sqrt(i / Math.max(1, count * s.layers)) * s.layers;
				x = Math.cos(a) * r;
				z = Math.sin(a) * r;
				yaw = a;
			}

			if (s.pattern === 'grid') {
				const total = count * s.layers;
				const cols = Math.ceil(Math.sqrt(total));
				const row = Math.floor(cloneIndex / cols);
				const col = cloneIndex % cols;
				x = (col - (cols - 1) / 2) * s.radius;
				z = (row - (cols - 1) / 2) * s.radius;
				yaw = ((row + col) % 2) * Math.PI * s.twist;
			}

			if (s.pattern === 'helix') {
				const a = (localIndex / count) * Math.PI * 2 + layerIndex * 0.72;
				x = Math.cos(a) * layerRadius;
				z = Math.sin(a) * layerRadius;
				y = layerIndex * 0.45;
				yaw = a + Math.PI / 2;
			}

			if (s.pattern === 'wave') {
				const total = Math.max(1, count * s.layers - 1);
				const t = cloneIndex / total;
				x = (t - 0.5) * s.radius * count * 0.45;
				z = Math.sin(t * Math.PI * 2 * s.layers) * s.radius;
				y = Math.sin(t * Math.PI * 4) * 0.25;
				yaw = Math.sin(t * Math.PI * 2) * Math.PI * s.twist;
			}

			if (s.pattern === 'burst') {
				const a = localIndex * golden + layerIndex * 0.9;
				const r = layerRadius * (0.65 + random() * 0.7);
				x = Math.cos(a) * r;
				z = Math.sin(a) * r;
				y = (random() - 0.5) * s.radius * 0.6;
				yaw = a + (random() - 0.5) * Math.PI;
			}

			x += (random() - 0.5) * s.jitter;
			y += Math.max(0, (random() - 0.5) * s.jitter * 0.5);
			z += (random() - 0.5) * s.jitter;

			const q = new THREE.Quaternion().setFromAxisAngle(Y_AXIS, yaw * s.twist);
			const scale = THREE.MathUtils.clamp(1 + (random() - 0.5) * s.scaleJitter, 0.25, 2.6);

			return {
				offset: new THREE.Vector3(x, y, z),
				quaternion: q,
				scale,
				spinFlip: Math.cos(yaw) < 0
			};
		}

		function replicateSelected() {
			if (!selected) {
				toast('select a piece first');
				return;
			}

			const s = settings();
			const random = makeRandom(s.seed);
			const anchor = selected.mesh.position.clone();
			const total = Math.min(s.count * s.layers, 256);
			let made = 0;
			let last = null;

			for (let layer = 0; layer < s.layers; layer++) {
				for (let local = 0; local < s.count; local++) {
					if (made >= total) break;

					const t = replicatorTransform(made, local, layer, s, random);
					const p = anchor.clone().add(t.offset);
					const q = t.quaternion.clone().multiply(selected.mesh.quaternion);
					const scale = selected.scale * t.scale;
					const spin = t.spinFlip ? -selected.spin : selected.spin;

					last = addPiece(selected.type, p, q, scale, spin, selected.source);
					made++;
				}
			}

			if (last) select(last);
			saveLocal();
			toast(`replicated ${made}`);
		}

		function seedStarterToy() {
			const root = addPiece('block', new THREE.Vector3(0, 0.25, 0), new THREE.Quaternion(), 1.25, 0, 'user');
			addPiece('plank', new THREE.Vector3(0, 0.68, 0), new THREE.Quaternion(), 1.1, 0, 'user');

			for (const x of [-0.58, 0.58]) {
				for (const z of [-0.52, 0.52]) {
					addPiece('wheel', new THREE.Vector3(x, 0.18, z), new THREE.Quaternion().setFromAxisAngle(Y_AXIS, Math.PI / 2), 1, x < 0 ? 1 : -1, 'user');
				}
			}

			select(root);
			saveLocal();
		}

				targetWheels: Number(document.getElementById('aiWheelTarget').value),

		function startAI(show = true) {

			setMode('build');
			ai.running = true;
			document.getElementById('aiStatus').textContent = 'thinking';
			if (show) toast('AI robot designing');

			const s = aiSettings();
			const ms = Math.max(60, 1000 / s.speed);

		function stopAI(show = true) {

		function clearAIPieces() {
			for (const piece of [...ai.trialPieces, ...ai.bestPieces]) {
				scene.remove(piece.mesh);
				pieces = pieces.filter(p => p !== piece);
			}

			ai.trialPieces = [];
			ai.bestPieces = [];
			if (selected && selected.source?.startsWith('ai')) select(null);
		}

		function clearTrialPieces() {
			for (const piece of ai.trialPieces) {
				scene.remove(piece.mesh);
				pieces = pieces.filter(p => p !== piece);
			}
			ai.trialPieces = [];
		}

		function clearBestPieces() {
			for (const piece of ai.bestPieces) {
				scene.remove(piece.mesh);
				pieces = pieces.filter(p => p !== piece);
			}
			ai.bestPieces = [];
		}

		function aiDesignTick() {
			const s = aiSettings();
			ai.generation++;

			const random = makeRandom((performance.now() * 1000 + ai.generation * 99991) | 0);
			const design = generateAIDesign(s, random);
			const score = evaluateAIDesign(design, s);

			clearTrialPieces();
			ai.trialPieces = instantiateAIDesign(design, 'ai-trial', new THREE.Vector3(3.9, 0, 0));

			if (score.total > ai.bestScore || ai.bestDesign === null) {
				ai.bestScore = score.total;
				ai.bestDesign = structuredCloneDesign(design);
				ai.bestWheels = design.wheels.length;
				ai.bestBalance = score.balance;
				clearBestPieces();
				ai.bestPieces = instantiateAIDesign(ai.bestDesign, 'ai-best', new THREE.Vector3(0, 0, 0));
				if (ai.bestPieces[0]) select(ai.bestPieces[0]);
				toast(`new best ${score.total.toFixed(2)} · ${design.wheels.length} wheels`);
				saveLocal();
			}

			updateAIStats('designing');
		}

		function structuredCloneDesign(design) {
			return {
				chassis: { ...design.chassis },
				cabin: { ...design.cabin },
				wheels: design.wheels.map(w => ({ ...w })),
				counterweights: design.counterweights.map(w => ({ ...w })),
				seed: design.seed
			};
		}

		function generateAIDesign(s, random) {
			const target = s.targetWheels;
			const explore = s.explore;
			const wheelPairs = Math.max(2, Math.round((target / 2) + (random() - 0.5) * 4 * explore));
			const length = THREE.MathUtils.clamp(1.25 + wheelPairs * 0.18 + random() * explore, 1.8, 5.8);
			const width = THREE.MathUtils.clamp(1.0 + random() * 0.8 + wheelPairs * 0.025, 1.1, 2.3);
			const height = THREE.MathUtils.clamp(0.2 + random() * 0.22, 0.16, 0.5);
			const chassisY = 0.34 + random() * 0.16 * explore;
			const wheelRadius = THREE.MathUtils.clamp(0.16 + random() * 0.13, 0.14, 0.34);
			const wheelScale = wheelRadius / 0.24;
			const axleCount = Math.max(2, Math.ceil(wheelPairs / 2));
			const wheels = [];
			const counterweights = [];
			const yawBias = (random() - 0.5) * 0.22 * explore;

			for (let i = 0; i < axleCount; i++) {
				const t = axleCount === 1 ? 0.5 : i / (axleCount - 1);
				const z = THREE.MathUtils.lerp(-length * 0.42, length * 0.42, t);
				const jitterZ = (random() - 0.5) * 0.18 * explore;
				const y = wheelRadius + 0.03;

				for (const side of [-1, 1]) {
					const x = side * (width * 0.5 + 0.12 + random() * 0.12 * explore);
					wheels.push({
						x,
						y,
						z: z + jitterZ,
						scale: wheelScale * THREE.MathUtils.clamp(1 + (random() - 0.5) * 0.18 * explore, 0.82, 1.25),
						spin: side < 0 ? 1 : -1,
						yaw: Math.PI / 2 + yawBias * side
					});
				}

				if (random() < 0.35 + explore * 0.35 && wheels.length < target + 8) {
					const z2 = z + (random() - 0.5) * 0.38;
					const x2 = (random() < 0.5 ? -1 : 1) * width * 0.12;
					wheels.push({
						x: x2,
						y,
						z: z2,
						scale: wheelScale * 0.85,
						spin: random() < 0.5 ? 1 : -1,
						yaw: Math.PI / 2
					});
				}
			}

			while (wheels.length < target && wheels.length < 28) {
				const side = random() < 0.5 ? -1 : 1;
				wheels.push({
					x: side * (width * 0.5 + 0.18),
					y: wheelRadius + 0.03,
					z: (random() - 0.5) * length * 0.86,
					scale: wheelScale * THREE.MathUtils.clamp(0.75 + random() * 0.5, 0.75, 1.25),
					spin: side < 0 ? 1 : -1,
					yaw: Math.PI / 2
				});
			}

			for (let i = 0; i < Math.floor(random() * 3 * explore); i++) {
				counterweights.push({
					x: (random() - 0.5) * width * 0.4,
					y: 0.58 + random() * 0.28,
					z: (random() - 0.5) * length * 0.35,
					scale: 0.35 + random() * 0.45
				});
			}

			return {
				seed: Math.floor(random() * 1e9),
				chassis: { width, height, length, y: chassisY },
				cabin: {
					x: (random() - 0.5) * 0.18 * explore,
					y: chassisY + 0.34,
					z: (random() - 0.5) * length * 0.12,
					scale: THREE.MathUtils.clamp(0.55 + random() * 0.45, 0.5, 1.1)
				},
				wheels,
				counterweights
			};
		}

		function evaluateAIDesign(design, s) {
			const wheels = design.wheels;
			const n = wheels.length;

			let left = 0, right = 0, front = 0, rear = 0;
			let supportX = 0, supportZ = 0;
			let meanX = 0, meanZ = 0;

			for (const w of wheels) {
				if (w.x < 0) left++; else right++;
				if (w.z < 0) rear++; else front++;
				meanX += w.x;
				meanZ += w.z;
				supportX = Math.max(supportX, Math.abs(w.x));
				supportZ = Math.max(supportZ, Math.abs(w.z));
			}

			meanX /= Math.max(1, n);
			meanZ /= Math.max(1, n);

			const symmetryX = 1 - Math.min(1, Math.abs(left - right) / Math.max(1, n));
			const symmetryZ = 1 - Math.min(1, Math.abs(front - rear) / Math.max(1, n));
			const centered = 1 - Math.min(1, Math.hypot(meanX, meanZ) / 1.2);
			const support = Math.min(1, (supportX * supportZ) / 2.8);
			const lowCenter = 1 - Math.min(1, Math.max(0, design.chassis.y + design.chassis.height - 0.75) / 1.2);
			const wheelTarget = 1 - Math.min(1, Math.abs(n - s.targetWheels) / Math.max(4, s.targetWheels));
			const moreWheels = Math.min(1, n / s.targetWheels);

			const balance = (
				symmetryX * 0.24 +
				symmetryZ * 0.16 +
				centered * 0.18 +
				support * 0.18 +
				lowCenter * 0.14 +
				wheelTarget * 0.10
			);

			const total = balance * 78 + moreWheels * 22;

			return { total, balance, symmetryX, symmetryZ, centered, support, lowCenter, wheelTarget };
		}

		function instantiateAIDesign(design, source, offset) {
			const made = [];
			const c = design.chassis;

			const chassis = addPiece('plank', new THREE.Vector3(offset.x, c.y, offset.z), new THREE.Quaternion(), 1, 0, source);
			chassis.mesh.scale.set(c.width / 1.2, c.height / 0.15, c.length / 0.45);
			chassis.scale = 1;
			made.push(chassis);

			const cabin = addPiece('block', new THREE.Vector3(offset.x + design.cabin.x, design.cabin.y, offset.z + design.cabin.z), new THREE.Quaternion(), design.cabin.scale, 0, source);
			cabin.mesh.scale.set(design.cabin.scale * 0.9, design.cabin.scale * 0.7, design.cabin.scale * 0.75);
			made.push(cabin);

			for (const w of design.wheels) {
				const wheel = addPiece(
					'wheel',
					new THREE.Vector3(offset.x + w.x, w.y, offset.z + w.z),
					new THREE.Quaternion().setFromAxisAngle(Y_AXIS, w.yaw),
					w.scale,
					w.spin,
					source
				);
				made.push(wheel);
			}

			for (const cw of design.counterweights) {
				const ball = addPiece(
					'ball',
					new THREE.Vector3(offset.x + cw.x, cw.y, offset.z + cw.z),
					new THREE.Quaternion(),
					cw.scale,
					0,
					source
				);
				made.push(ball);
			}

			if (source === 'ai-trial') ai.trialPieces = made;
			if (source === 'ai-best') ai.bestPieces = made;

			return made;
		}

		function seedAIBestDesign() {
			const s = aiSettings();
			const random = makeRandom(Date.now() | 0);
			ai.bestDesign = generateAIDesign(s, random);
			const score = evaluateAIDesign(ai.bestDesign, s);
			ai.bestScore = score.total;
			ai.bestBalance = score.balance;
			ai.bestWheels = ai.bestDesign.wheels.length;
			ai.bestPieces = instantiateAIDesign(ai.bestDesign, 'ai-best', new THREE.Vector3(0, 0, 0));
			if (ai.bestPieces[0]) select(ai.bestPieces[0]);
		}

		function updateAIStats(status = null) {
			document.getElementById('aiGen').textContent = ai.generation;
			document.getElementById('aiBest').textContent = ai.bestScore.toFixed(2);
			document.getElementById('aiWheels').textContent = ai.bestWheels;
			document.getElementById('aiBalance').textContent = ai.bestBalance.toFixed(2);
			document.getElementById('aiStatus').textContent = status ?? (ai.running ? 'designing' : 'idle');
		}

		function serialize() {
			return pieces
				.filter(p => p.source !== 'ai-trial')
				.map(p => ({
					type: p.type,
					position: p.mesh.position.toArray(),
					quaternion: p.mesh.quaternion.toArray(),
					scale: p.scale,
					meshScale: p.mesh.scale.toArray(),
					spin: p.spin,
					source: p.source === 'ai-best' ? 'ai-best' : 'user'
				}));
		}

		function saveLocal() {
			localStorage.setItem(STORAGE_KEY, JSON.stringify(serialize()));
		}

		function loadLocal() {
			try {
				const raw = localStorage.getItem(STORAGE_KEY);
				if (!raw) return;

				const data = JSON.parse(raw);
				for (const row of data) {
					const p = addPiece(
						row.type,
						new THREE.Vector3().fromArray(row.position),
						new THREE.Quaternion().fromArray(row.quaternion),
						row.scale ?? 1,
						row.spin ?? 0,
						row.source ?? 'user'
					);

					if (row.meshScale) p.mesh.scale.fromArray(row.meshScale);
					if (p.source === 'ai-best') ai.bestPieces.push(p);
					select(p);
				}
			} catch {
				localStorage.removeItem(STORAGE_KEY);
			}
		}

		function toast(message) {
			const el = document.getElementById('toast');
			el.textContent = message;
			el.classList.add('show');
			clearTimeout(toast._t);
			toast._t = setTimeout(() => el.classList.remove('show'), 1200);
		}

		function animate() {
			const dt = 1 / 60;
			playClock += dt;

			if (ai.robot) {
				ai.robot.position.y = ai.robot.userData.baseY + Math.sin(playClock * 2.4) * 0.035;
				ai.robot.rotation.y = Math.sin(playClock * 0.9) * 0.18;
				ai.robot.userData.halo.rotation.z += dt * (ai.running ? 3.8 : 0.8);
				ai.robot.userData.orb.scale.setScalar(1 + Math.sin(playClock * 8) * (ai.running ? 0.25 : 0.08));
			}

			if (mode === 'play' || ai.running) {
				for (const [i, p] of pieces.entries()) {
					if (p.spin) {
						p.mesh.rotateOnAxis(Z_AXIS, p.spin * dt * 5.4);
						if (mode === 'play') p.mesh.position.y += Math.sin(playClock * 2.2 + i) * 0.0008;
					}
				}
			}

			if (ai.running) updateAIStats();

			controls.update();
			renderer.render(scene, camera);
		}

		function onResize() {
			camera.aspect = window.innerWidth / window.innerHeight;
			camera.updateProjectionMatrix();
			renderer.setSize(window.innerWidth, window.innerHeight);
		}
	</script>
</body>
</html>
