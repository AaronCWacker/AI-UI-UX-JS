<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LSD RACER — Lake Shore Drive</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Rajdhani', sans-serif; cursor: none; }
  canvas#game { display: block; }

  #ui-layer {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 10;
  }

  /* === TITLE SCREEN === */
  #title-screen {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 100; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: linear-gradient(180deg, #010a14 0%, #020c18 40%, #04152a 100%);
    transition: opacity 0.8s ease;
  }
  #title-screen.hidden { opacity: 0; pointer-events: none; }
  
  .title-logo {
    font-family: 'Orbitron', monospace; font-weight: 900;
    font-size: clamp(3rem, 10vw, 7rem); letter-spacing: 0.15em;
    background: linear-gradient(180deg, #7ec8e3 0%, #3a7bd5 50%, #00d2ff 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 30px rgba(126,200,227,0.5));
    text-align: center; line-height: 1.1;
  }
  .title-sub {
    font-family: 'Rajdhani', sans-serif; font-weight: 300;
    font-size: clamp(0.9rem, 2.5vw, 1.4rem); color: rgba(126,200,227,0.5);
    letter-spacing: 0.5em; text-transform: uppercase; margin-top: 0.5em;
  }
  .title-divider {
    width: 200px; height: 1px; margin: 2em 0;
    background: linear-gradient(90deg, transparent, rgba(126,200,227,0.4), transparent);
  }
  .title-start {
    font-family: 'Orbitron', monospace; font-weight: 700;
    font-size: clamp(0.8rem, 2vw, 1.1rem); color: #7ec8e3;
    letter-spacing: 0.3em; cursor: pointer; pointer-events: auto;
    padding: 15px 50px; border: 1px solid rgba(126,200,227,0.3);
    background: rgba(126,200,227,0.05); transition: all 0.3s ease;
    text-transform: uppercase;
    animation: pulseBtn 2s ease-in-out infinite;
  }
  .title-start:hover {
    background: rgba(126,200,227,0.15); border-color: rgba(126,200,227,0.6);
    box-shadow: 0 0 30px rgba(126,200,227,0.2);
  }
  @keyframes pulseBtn { 0%,100% { opacity: 0.7; } 50% { opacity: 1; } }

  .title-controls {
    margin-top: 2.5em; color: rgba(126,200,227,0.3);
    font-size: 0.75rem; letter-spacing: 0.15em; text-align: center; line-height: 2;
  }
  .title-controls span { color: rgba(126,200,227,0.55); font-weight: 600; }

  /* === HUD === */
  #hud {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 20; opacity: 0; transition: opacity 0.5s;
  }
  #hud.visible { opacity: 1; }

  .hud-score {
    position: absolute; top: 25px; left: 50%; transform: translateX(-50%);
    text-align: center;
  }
  .hud-score-val {
    font-family: 'Orbitron', monospace; font-weight: 900;
    font-size: clamp(1.8rem, 4vw, 3rem); color: #7ec8e3;
    text-shadow: 0 0 20px rgba(126,200,227,0.5);
    letter-spacing: 0.05em;
  }
  .hud-score-label {
    font-size: 0.6rem; color: rgba(126,200,227,0.4);
    letter-spacing: 0.3em; text-transform: uppercase;
  }

  .hud-combo {
    position: absolute; top: 80px; left: 50%; transform: translateX(-50%);
    font-family: 'Orbitron', monospace; font-weight: 700;
    font-size: 1rem; color: #ff6b35; letter-spacing: 0.1em;
    text-shadow: 0 0 15px rgba(255,107,53,0.5);
    opacity: 0; transition: opacity 0.2s;
  }
  .hud-combo.active { opacity: 1; }

  .hud-speed {
    position: absolute; bottom: 30px; right: 30px; text-align: right;
  }
  .hud-speed-val {
    font-family: 'Orbitron', monospace; font-weight: 900;
    font-size: clamp(2.5rem, 6vw, 4.5rem); color: #fff;
    text-shadow: 0 0 10px rgba(255,255,255,0.3);
    line-height: 1;
  }
  .hud-speed-unit {
    font-family: 'Rajdhani', sans-serif; font-weight: 300;
    font-size: 0.8rem; color: rgba(255,255,255,0.3);
    letter-spacing: 0.3em;
  }

  .hud-tach {
    position: absolute; bottom: 30px; right: 200px;
    width: 120px; height: 8px; border-radius: 4px;
    background: rgba(255,255,255,0.08); overflow: hidden;
  }
  .hud-tach-fill {
    height: 100%; width: 0%; border-radius: 4px;
    background: linear-gradient(90deg, #3a7bd5, #7ec8e3, #ff4444);
    transition: width 0.05s;
  }

  .hud-lives {
    position: absolute; top: 25px; left: 25px;
    display: flex; gap: 8px;
  }
  .hud-life {
    width: 14px; height: 14px; border-radius: 50%;
    background: #ff3355; box-shadow: 0 0 8px rgba(255,51,85,0.5);
    transition: all 0.3s;
  }
  .hud-life.lost { background: rgba(255,51,85,0.15); box-shadow: none; }

  .hud-dist {
    position: absolute; top: 25px; right: 25px;
    text-align: right;
  }
  .hud-dist-val {
    font-family: 'Orbitron', monospace; font-weight: 700;
    font-size: 1rem; color: rgba(126,200,227,0.7);
  }
  .hud-dist-label {
    font-size: 0.55rem; color: rgba(126,200,227,0.3);
    letter-spacing: 0.3em;
  }

  .hud-nearmiss {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-family: 'Orbitron', monospace; font-weight: 900;
    font-size: 2rem; color: #00ff88; letter-spacing: 0.1em;
    text-shadow: 0 0 30px rgba(0,255,136,0.6);
    opacity: 0; pointer-events: none;
    transition: opacity 0.15s;
  }
  .hud-nearmiss.show { opacity: 1; }

  /* === GAME OVER === */
  #game-over {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 100; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,0.85); opacity: 0; pointer-events: none;
    transition: opacity 0.5s;
  }
  #game-over.visible { opacity: 1; pointer-events: auto; }

  .go-title {
    font-family: 'Orbitron', monospace; font-weight: 900;
    font-size: clamp(2rem, 6vw, 4rem); color: #ff3355;
    text-shadow: 0 0 40px rgba(255,51,85,0.4);
    letter-spacing: 0.1em;
  }
  .go-score {
    font-family: 'Orbitron', monospace; font-weight: 700;
    font-size: clamp(1.5rem, 4vw, 2.5rem); color: #7ec8e3;
    margin-top: 0.5em;
  }
  .go-stats {
    margin-top: 1.5em; text-align: center; line-height: 2;
    color: rgba(126,200,227,0.5); font-size: 0.85rem;
    letter-spacing: 0.1em;
  }
  .go-stats strong { color: rgba(126,200,227,0.8); font-weight: 600; }
  .go-restart {
    margin-top: 2em; font-family: 'Orbitron', monospace;
    font-size: 0.9rem; color: #7ec8e3; letter-spacing: 0.2em;
    padding: 12px 40px; border: 1px solid rgba(126,200,227,0.3);
    background: rgba(126,200,227,0.05); cursor: pointer;
    pointer-events: auto; transition: all 0.3s;
  }
  .go-restart:hover {
    background: rgba(126,200,227,0.15); border-color: rgba(126,200,227,0.6);
  }

  /* === EFFECTS === */
  #flash-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 15; background: rgba(255,50,50,0.3);
    pointer-events: none; opacity: 0; transition: opacity 0.1s;
  }
  #speed-lines {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 11; pointer-events: none; opacity: 0; transition: opacity 0.3s;
    background: repeating-linear-gradient(
      90deg, transparent, transparent 48%, rgba(126,200,227,0.03) 49%, transparent 50%
    );
  }
  #vignette {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 12;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.8) 100%);
  }
</style>
</head>
<body>

<!-- TITLE SCREEN -->
<div id="title-screen">
  <div class="title-logo">LSD<br>RACER</div>
  <div class="title-sub">Lake Shore Drive</div>
  <div class="title-divider"></div>
  <div class="title-start" id="start-btn">DRIVE</div>
  <div class="title-controls">
    <span>↑ / W</span> accelerate · <span>↓ / S</span> brake<br>
    <span>← → / A D</span> steer · <span>SPACE</span> nitro boost<br>
    weave through traffic · near-misses score big
  </div>
</div>

<!-- HUD -->
<div id="hud">
  <div class="hud-score">
    <div class="hud-score-val" id="score">0</div>
    <div class="hud-score-label">SCORE</div>
  </div>
  <div class="hud-combo" id="combo">x2 COMBO</div>
  <div class="hud-lives" id="lives"></div>
  <div class="hud-dist">
    <div class="hud-dist-val" id="distance">0.0 mi</div>
    <div class="hud-dist-label">DISTANCE</div>
  </div>
  <div class="hud-speed">
    <div class="hud-speed-val" id="mph">0</div>
    <div class="hud-speed-unit">MPH</div>
  </div>
  <div class="hud-tach"><div class="hud-tach-fill" id="tach"></div></div>
  <div class="hud-nearmiss" id="nearmiss">NEAR MISS +500</div>
</div>

<!-- GAME OVER -->
<div id="game-over">
  <div class="go-title">WRECKED</div>
  <div class="go-score" id="go-score">0</div>
  <div class="go-stats" id="go-stats"></div>
  <div class="go-restart" id="restart-btn">DRIVE AGAIN</div>
</div>

<!-- EFFECTS -->
<div id="flash-overlay"></div>
<div id="speed-lines"></div>
<div id="vignette"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════
// LSD RACER — Lake Shore Drive Racing Game
// ═══════════════════════════════════════════════════════

// ── Audio Engine (Web Audio API) ──
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx, engineOsc, engineGain, windGain, windNoise;

function initAudio() {
  audioCtx = new AudioCtx();
  
  // Engine sound - layered oscillators
  engineOsc = audioCtx.createOscillator();
  engineOsc.type = 'sawtooth';
  engineOsc.frequency.value = 80;
  
  const engineOsc2 = audioCtx.createOscillator();
  engineOsc2.type = 'square';
  engineOsc2.frequency.value = 40;
  
  engineGain = audioCtx.createGain();
  engineGain.gain.value = 0;
  
  const engineFilter = audioCtx.createBiquadFilter();
  engineFilter.type = 'lowpass';
  engineFilter.frequency.value = 400;
  
  const distortion = audioCtx.createWaveShaper();
  const curve = new Float32Array(256);
  for (let i = 0; i < 256; i++) {
    const x = (i * 2) / 256 - 1;
    curve[i] = Math.tanh(x * 3);
  }
  distortion.curve = curve;
  
  engineOsc.connect(distortion);
  engineOsc2.connect(distortion);
  distortion.connect(engineFilter);
  engineFilter.connect(engineGain);
  engineGain.connect(audioCtx.destination);
  engineOsc.start();
  engineOsc2.start();
  
  // Wind noise
  const bufferSize = audioCtx.sampleRate * 2;
  const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const output = noiseBuffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
  
  windNoise = audioCtx.createBufferSource();
  windNoise.buffer = noiseBuffer;
  windNoise.loop = true;
  
  windGain = audioCtx.createGain();
  windGain.gain.value = 0;
  
  const windFilter = audioCtx.createBiquadFilter();
  windFilter.type = 'bandpass';
  windFilter.frequency.value = 800;
  windFilter.Q.value = 0.5;
  
  windNoise.connect(windFilter);
  windFilter.connect(windGain);
  windGain.connect(audioCtx.destination);
  windNoise.start();
}

function playCollisionSound() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(200, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.3);
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.4);
}

function playNearMissSound() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(600, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.15);
  gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.2);
}

function playNitroSound() {
  if (!audioCtx) return;
  const bufSize = audioCtx.sampleRate;
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const ch = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) ch[i] = Math.random() * 2 - 1;
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);
  const filt = audioCtx.createBiquadFilter();
  filt.type = 'lowpass';
  filt.frequency.value = 600;
  src.connect(filt);
  filt.connect(gain);
  gain.connect(audioCtx.destination);
  src.start();
  src.stop(audioCtx.currentTime + 0.8);
}

// ── Three.js Setup ──
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x020810, 0.006);
scene.background = new THREE.Color(0x020810);

const camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.1, 2000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.9;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.domElement.id = 'game';
document.body.insertBefore(renderer.domElement, document.body.firstChild);

// ── Game State ──
const G = {
  started: false,
  gameOver: false,
  speed: 0,
  maxSpeed: 3.5,
  nitroSpeed: 5.5,
  accel: 4.0,
  brake: 6.0,
  drag: 0.98,
  steer: 0,
  steerSpeed: 4.0,
  steerReturn: 0.90,
  carX: 0,
  carZ: 0,
  lives: 5,
  maxLives: 5,
  score: 0,
  distance: 0,
  combo: 1,
  comboTimer: 0,
  nearMisses: 0,
  topSpeed: 0,
  nitro: 100,
  nitroActive: false,
  nitroCooldown: 0,
  invulnerable: 0,
  screenShake: 0,
  nearMissTimer: 0,
  difficulty: 1,
};

const ROAD_W = 26;
const ROAD_LEN = 2400;
const LANES = [-8.5, -5.5, -2.75, 2.75, 5.5, 8.5];
const keys = {};

// ── Materials ──
const mats = {
  asphalt: new THREE.MeshStandardMaterial({ color: 0x181822, roughness: 0.85 }),
  concrete: new THREE.MeshStandardMaterial({ color: 0x252535, roughness: 0.9 }),
  water: new THREE.MeshStandardMaterial({ color: 0x051828, roughness: 0.15, metalness: 0.85, transparent: true, opacity: 0.85 }),
  building: new THREE.MeshStandardMaterial({ color: 0x080c18, roughness: 0.7, metalness: 0.3 }),
  pole: new THREE.MeshStandardMaterial({ color: 0x333345, roughness: 0.5, metalness: 0.5 }),
  guardrail: new THREE.MeshStandardMaterial({ color: 0x444460, roughness: 0.4, metalness: 0.6 }),
};

// ── Lighting ──
scene.add(new THREE.AmbientLight(0x0a1525, 0.35));
const moonLight = new THREE.DirectionalLight(0x4466aa, 0.12);
moonLight.position.set(60, 100, -40);
scene.add(moonLight);

// ── Build Road ──
function buildRoad() {
  const roadGeo = new THREE.PlaneGeometry(ROAD_W, ROAD_LEN, 1, 1);
  const road = new THREE.Mesh(roadGeo, mats.asphalt);
  road.rotation.x = -Math.PI / 2;
  road.position.set(0, 0, -ROAD_LEN / 2);
  road.receiveShadow = true;
  scene.add(road);

  // Center median
  const medGeo = new THREE.BoxGeometry(0.8, 0.15, ROAD_LEN);
  const med = new THREE.Mesh(medGeo, mats.concrete);
  med.position.set(0, 0.08, -ROAD_LEN / 2);
  scene.add(med);

  // Yellow center lines
  const yMat = new THREE.MeshBasicMaterial({ color: 0xccaa44 });
  for (let z = 0; z > -ROAD_LEN; z -= 2) {
    for (const dx of [-0.55, 0.55]) {
      const m = new THREE.Mesh(new THREE.PlaneGeometry(0.08, 1.4), yMat);
      m.rotation.x = -Math.PI / 2; m.position.set(dx, 0.02, z);
      scene.add(m);
    }
  }

  // White lane dashes
  const wMat = new THREE.MeshBasicMaterial({ color: 0x556677 });
  const laneDashes = [-5.5, -2.75, 2.75, 5.5];
  for (const lx of laneDashes) {
    for (let z = 0; z > -ROAD_LEN; z -= 10) {
      const d = new THREE.Mesh(new THREE.PlaneGeometry(0.08, 3.5), wMat);
      d.rotation.x = -Math.PI / 2; d.position.set(lx, 0.02, z);
      scene.add(d);
    }
  }

  // Guardrails
  const grGeo = new THREE.BoxGeometry(0.15, 0.8, ROAD_LEN);
  for (const side of [-1, 1]) {
    const gr = new THREE.Mesh(grGeo, mats.guardrail);
    gr.position.set(side * (ROAD_W / 2 + 0.3), 0.4, -ROAD_LEN / 2);
    scene.add(gr);
  }

  // Sidewalks
  const swGeo = new THREE.BoxGeometry(5, 0.15, ROAD_LEN);
  for (const side of [-1, 1]) {
    const sw = new THREE.Mesh(swGeo, mats.concrete);
    sw.position.set(side * (ROAD_W / 2 + 2.8), 0.08, -ROAD_LEN / 2);
    sw.receiveShadow = true;
    scene.add(sw);
  }
}

// ── Lake Michigan ──
function buildLake() {
  const lGeo = new THREE.PlaneGeometry(1000, ROAD_LEN + 600);
  const lake = new THREE.Mesh(lGeo, mats.water);
  lake.rotation.x = -Math.PI / 2;
  lake.position.set(-(ROAD_W / 2 + 505), -0.4, -ROAD_LEN / 2);
  scene.add(lake);

  const wallGeo = new THREE.BoxGeometry(1.2, 1.8, ROAD_LEN);
  const wall = new THREE.Mesh(wallGeo, mats.concrete);
  wall.position.set(-(ROAD_W / 2 + 5.5), 0.5, -ROAD_LEN / 2);
  scene.add(wall);
}

// ── Blue Streetlights ──
const blueLightData = [];
function buildStreetLights() {
  const bulbGeo = new THREE.SphereGeometry(0.22, 8, 8);
  const bulbMat = new THREE.MeshBasicMaterial({ color: 0x7ec8e3 });
  const poleGeo = new THREE.CylinderGeometry(0.06, 0.09, 6.5, 6);
  const armGeo = new THREE.CylinderGeometry(0.035, 0.035, 2.8, 4);

  for (let z = 0; z > -ROAD_LEN; z -= 28) {
    for (const side of [-1, 1]) {
      const x = side * (ROAD_W / 2 + 1.2);

      const pole = new THREE.Mesh(poleGeo, mats.pole);
      pole.position.set(x, 3.25, z);
      scene.add(pole);

      const arm = new THREE.Mesh(armGeo, mats.pole);
      arm.rotation.z = Math.PI / 2;
      arm.position.set(x - side * 1.4, 6.2, z);
      scene.add(arm);

      const bulb = new THREE.Mesh(bulbGeo, bulbMat);
      bulb.position.set(x - side * 2.6, 6, z);
      scene.add(bulb);

      const pl = new THREE.PointLight(0x7ec8e3, 1.4, 35, 2);
      pl.position.copy(bulb.position);
      scene.add(pl);

      const spMat = new THREE.SpriteMaterial({
        color: 0x7ec8e3, transparent: true, opacity: 0.55,
        blending: THREE.AdditiveBlending
      });
      const sp = new THREE.Sprite(spMat);
      sp.position.copy(bulb.position);
      sp.scale.set(2.5, 2.5, 1);
      scene.add(sp);

      blueLightData.push({ light: pl, sprite: sp, z });
    }
  }
}

// ── Skyline ──
function buildSkyline() {
  const group = new THREE.Group();
  
  // Iconic towers
  const towers = [
    { x: 50, z: -180, w: 14, h: 120, d: 14 },
    { x: 55, z: -180, w: 9, h: 100, d: 9 },
    { x: 40, z: -480, w: 11, h: 115, d: 11 },
    { x: 58, z: -340, w: 10, h: 90, d: 10 },
    { x: 44, z: -700, w: 8, h: 100, d: 8 },
    { x: 52, z: -900, w: 12, h: 80, d: 12 },
  ];

  for (let z = 10; z > -ROAD_LEN - 100; z -= 12 + Math.random() * 22) {
    towers.push({
      x: 22 + Math.random() * 50, z,
      w: 4 + Math.random() * 12, h: 12 + Math.random() * 75,
      d: 4 + Math.random() * 12
    });
  }

  towers.forEach(b => {
    const mat = mats.building.clone();
    mat.color = new THREE.Color().setHSL(0.6, 0.08, 0.015 + Math.random() * 0.035);
    const mesh = new THREE.Mesh(new THREE.BoxGeometry(b.w, b.h, b.d), mat);
    mesh.position.set(b.x, b.h / 2, b.z);
    group.add(mesh);

    // Window lights
    const litCount = Math.floor((b.h * b.w) / 8 * (0.08 + Math.random() * 0.2));
    for (let i = 0; i < litCount; i++) {
      const wy = 2 + Math.random() * (b.h - 4);
      const wx = (Math.random() - 0.5) * (b.w - 1);
      const wz = b.d / 2 + 0.06;
      const face = Math.floor(Math.random() * 4);
      const warm = Math.random();
      const wMat = new THREE.MeshBasicMaterial({
        color: new THREE.Color().setHSL(0.1 + warm * 0.05, 0.3 + warm * 0.4, 0.25 + warm * 0.4),
        transparent: true, opacity: 0.25 + Math.random() * 0.5
      });
      const wMesh = new THREE.Mesh(new THREE.PlaneGeometry(0.7, 1.1), wMat);
      const pos = [
        [b.x + wx, wy, b.z + wz, 0],
        [b.x + wx, wy, b.z - wz, Math.PI],
        [b.x + wz, wy, b.z + wx, Math.PI / 2],
        [b.x - wz, wy, b.z + wx, -Math.PI / 2]
      ][face];
      wMesh.position.set(pos[0], pos[1], pos[2]);
      wMesh.rotation.y = pos[3];
      group.add(wMesh);
    }
  });

  scene.add(group);
}

// ── Stars & Moon ──
function buildSky() {
  const count = 2500;
  const pos = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    const t = Math.random() * Math.PI * 2;
    const p = Math.random() * Math.PI * 0.4;
    const r = 600 + Math.random() * 400;
    pos[i * 3] = r * Math.sin(p) * Math.cos(t);
    pos[i * 3 + 1] = r * Math.cos(p) + 60;
    pos[i * 3 + 2] = r * Math.sin(p) * Math.sin(t);
  }
  const sGeo = new THREE.BufferGeometry();
  sGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  scene.add(new THREE.Points(sGeo, new THREE.PointsMaterial({ color: 0xaabbdd, size: 1, transparent: true, opacity: 0.6 })));

  const moon = new THREE.Mesh(new THREE.SphereGeometry(10, 32, 32), new THREE.MeshBasicMaterial({ color: 0xdde4f0 }));
  moon.position.set(-120, 130, -350);
  scene.add(moon);
  const mgMat = new THREE.SpriteMaterial({ color: 0x5577aa, transparent: true, opacity: 0.12, blending: THREE.AdditiveBlending });
  const mg = new THREE.Sprite(mgMat);
  mg.position.copy(moon.position);
  mg.scale.set(70, 70, 1);
  scene.add(mg);
}

// ── Player Car ──
let playerCar;
function buildPlayerCar() {
  playerCar = new THREE.Group();
  
  // Body
  const bodyGeo = new THREE.BoxGeometry(2, 0.6, 4.5);
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0x111122, roughness: 0.2, metalness: 0.8 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 0.5;
  playerCar.add(body);

  // Cabin
  const cabGeo = new THREE.BoxGeometry(1.7, 0.55, 2.2);
  const cabMat = new THREE.MeshStandardMaterial({ color: 0x0a0a18, roughness: 0.1, metalness: 0.9, transparent: true, opacity: 0.6 });
  const cab = new THREE.Mesh(cabGeo, cabMat);
  cab.position.set(0, 1.05, -0.3);
  playerCar.add(cab);

  // Headlights
  for (const lx of [-0.7, 0.7]) {
    const hlMesh = new THREE.Mesh(
      new THREE.SphereGeometry(0.15, 6, 6),
      new THREE.MeshBasicMaterial({ color: 0xffeedd })
    );
    hlMesh.position.set(lx, 0.5, -2.3);
    playerCar.add(hlMesh);
  }

  // Tail lights
  for (const lx of [-0.7, 0.7]) {
    const tlMesh = new THREE.Mesh(
      new THREE.SphereGeometry(0.12, 6, 6),
      new THREE.MeshBasicMaterial({ color: 0xff2200 })
    );
    tlMesh.position.set(lx, 0.5, 2.3);
    playerCar.add(tlMesh);
  }

  playerCar.position.set(0, 0.1, 0);
  scene.add(playerCar);
}

// ── Headlight Spotlights ──
let hlLeft, hlRight;
function buildHeadlights() {
  hlLeft = new THREE.SpotLight(0xffeedd, 3, 100, Math.PI / 5.5, 0.5, 1);
  hlRight = new THREE.SpotLight(0xffeedd, 3, 100, Math.PI / 5.5, 0.5, 1);
  hlLeft.target.position.set(0, 0, -1);
  hlRight.target.position.set(0, 0, -1);
  scene.add(hlLeft, hlRight, hlLeft.target, hlRight.target);
}

// ── Traffic ──
const traffic = [];
const CAR_COLORS = [0x1a1a2e, 0x16213e, 0x0f3460, 0x1a0a2e, 0x2e1a1a, 0x1e2a1a, 0x2a2a2a, 0x0e0e1e];

function spawnTrafficCar(forceZ) {
  const isOncoming = Math.random() < 0.35;
  const laneIdx = isOncoming ? (3 + Math.floor(Math.random() * 3)) : Math.floor(Math.random() * 3);
  const lane = LANES[laneIdx];
  const z = forceZ !== undefined ? forceZ : (G.carZ - 200 - Math.random() * 400);

  const group = new THREE.Group();
  const h = 0.9 + Math.random() * 0.5;
  const w = 1.7 + Math.random() * 0.5;
  const len = 3.5 + Math.random() * 2;

  const bMat = new THREE.MeshStandardMaterial({
    color: CAR_COLORS[Math.floor(Math.random() * CAR_COLORS.length)],
    roughness: 0.25, metalness: 0.7
  });
  const bMesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, len), bMat);
  bMesh.position.y = 0.35 + h / 2;
  group.add(bMesh);

  // Lights
  if (isOncoming) {
    for (const lx of [-w * 0.35, w * 0.35]) {
      const hl = new THREE.PointLight(0xffeedd, 0.6, 18);
      hl.position.set(lx, 0.5, len / 2 + 0.1);
      group.add(hl);
      const hm = new THREE.Mesh(new THREE.SphereGeometry(0.1, 4, 4), new THREE.MeshBasicMaterial({ color: 0xffeedd }));
      hm.position.copy(hl.position);
      group.add(hm);
    }
  } else {
    for (const lx of [-w * 0.35, w * 0.35]) {
      const tl = new THREE.PointLight(0xff2200, 0.35, 10);
      tl.position.set(lx, 0.5, -len / 2 - 0.1);
      group.add(tl);
      const tm = new THREE.Mesh(new THREE.SphereGeometry(0.08, 4, 4), new THREE.MeshBasicMaterial({ color: 0xff2200 }));
      tm.position.copy(tl.position);
      group.add(tm);
    }
  }

  group.position.set(lane, 0, z);
  scene.add(group);
  
  const spd = isOncoming ? (1.0 + Math.random() * 1.5) : (0.5 + Math.random() * 1.0);
  traffic.push({
    mesh: group, speed: spd, isOncoming, lane, w, len,
    nearMissed: false
  });
}

function initTraffic() {
  for (let i = 0; i < 25; i++) {
    spawnTrafficCar(-(i * 40 + Math.random() * 30));
  }
}

// ── Spark Particles ──
const sparks = [];
function spawnSparks(x, y, z, count) {
  for (let i = 0; i < count; i++) {
    const geo = new THREE.SphereGeometry(0.08, 4, 4);
    const mat = new THREE.MeshBasicMaterial({
      color: new THREE.Color().setHSL(0.08 + Math.random() * 0.05, 1, 0.5 + Math.random() * 0.5)
    });
    const m = new THREE.Mesh(geo, mat);
    m.position.set(x, y, z);
    scene.add(m);
    sparks.push({
      mesh: m,
      vx: (Math.random() - 0.5) * 8,
      vy: Math.random() * 6 + 2,
      vz: (Math.random() - 0.5) * 8,
      life: 0.5 + Math.random() * 0.5
    });
  }
}

// ── Build Scene ──
buildRoad();
buildLake();
buildStreetLights();
buildSkyline();
buildSky();
buildPlayerCar();
buildHeadlights();

// ── HUD Helpers ──
function updateLivesHUD() {
  const el = document.getElementById('lives');
  el.innerHTML = '';
  for (let i = 0; i < G.maxLives; i++) {
    const d = document.createElement('div');
    d.className = 'hud-life' + (i >= G.lives ? ' lost' : '');
    el.appendChild(d);
  }
}

// ── Game Start / Restart ──
function startGame() {
  if (!audioCtx) initAudio();
  G.started = true;
  G.gameOver = false;
  G.speed = 0; G.steer = 0; G.carX = -5.5; G.carZ = 0;
  G.lives = G.maxLives; G.score = 0; G.distance = 0;
  G.combo = 1; G.comboTimer = 0; G.nearMisses = 0; G.topSpeed = 0;
  G.nitro = 100; G.nitroActive = false; G.invulnerable = 0;
  G.difficulty = 1;

  // Clear old traffic
  traffic.forEach(t => scene.remove(t.mesh));
  traffic.length = 0;
  sparks.forEach(s => scene.remove(s.mesh));
  sparks.length = 0;
  initTraffic();

  document.getElementById('title-screen').classList.add('hidden');
  document.getElementById('game-over').classList.remove('visible');
  document.getElementById('hud').classList.add('visible');
  updateLivesHUD();
}

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', startGame);

function endGame() {
  G.gameOver = true;
  G.started = false;
  document.getElementById('hud').classList.remove('visible');
  document.getElementById('go-score').textContent = G.score.toLocaleString();
  document.getElementById('go-stats').innerHTML =
    `Distance: <strong>${(G.distance / 100).toFixed(1)} mi</strong><br>` +
    `Near Misses: <strong>${G.nearMisses}</strong><br>` +
    `Top Speed: <strong>${Math.floor(G.topSpeed)} mph</strong><br>` +
    `Best Combo: <strong>x${G.combo}</strong>`;
  document.getElementById('game-over').classList.add('visible');
}

// ── Input ──
document.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
document.addEventListener('keyup', e => { keys[e.code] = false; });
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Game Loop ──
const clock = new THREE.Clock();
let frame = 0;

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  frame++;

  if (!G.started) {
    // Title auto-pan
    const t = clock.elapsedTime;
    camera.position.set(Math.sin(t * 0.08) * 4, 3.5, -t * 1.5);
    camera.lookAt(Math.sin(t * 0.12) * 6, 2.5, camera.position.z - 50);
    if (camera.position.z < -ROAD_LEN + 100) clock.start();
    renderer.render(scene, camera);
    return;
  }

  // ── Player Input ──
  const up = keys['ArrowUp'] || keys['KeyW'];
  const down = keys['ArrowDown'] || keys['KeyS'];
  const left = keys['ArrowLeft'] || keys['KeyA'];
  const right = keys['ArrowRight'] || keys['KeyD'];
  const nitroKey = keys['Space'];

  // Acceleration
  if (up) {
    const maxS = (G.nitroActive && G.nitro > 0) ? G.nitroSpeed : G.maxSpeed;
    G.speed = Math.min(G.speed + G.accel * dt, maxS);
  } else if (down) {
    G.speed = Math.max(G.speed - G.brake * dt, -0.5);
  } else {
    G.speed *= G.drag;
  }

  // Nitro
  if (nitroKey && G.nitro > 5 && G.speed > 1) {
    if (!G.nitroActive) playNitroSound();
    G.nitroActive = true;
    G.nitro = Math.max(G.nitro - 40 * dt, 0);
  } else {
    G.nitroActive = false;
    G.nitro = Math.min(G.nitro + 8 * dt, 100);
  }

  // Steering
  if (left) G.steer = Math.min(G.steer + G.steerSpeed * dt, 1);
  else if (right) G.steer = Math.max(G.steer - G.steerSpeed * dt, -1);
  else G.steer *= G.steerReturn;

  // Movement
  G.carX += G.steer * G.speed * 3.5 * dt;
  G.carX = THREE.MathUtils.clamp(G.carX, -ROAD_W / 2 + 1.5, ROAD_W / 2 - 1.5);
  G.carZ -= G.speed * dt * 20;

  // Stats
  const mph = Math.abs(G.speed) * 45;
  if (mph > G.topSpeed) G.topSpeed = mph;
  G.distance += Math.abs(G.speed) * dt * 2;
  G.score += Math.floor(Math.abs(G.speed) * dt * 10 * G.combo);

  // Difficulty ramp
  G.difficulty = 1 + G.distance / 500;
  G.maxSpeed = 3.5 + G.difficulty * 0.3;
  G.nitroSpeed = 5.5 + G.difficulty * 0.2;

  // Invulnerability timer
  if (G.invulnerable > 0) G.invulnerable -= dt;

  // Combo decay
  if (G.comboTimer > 0) {
    G.comboTimer -= dt;
    if (G.comboTimer <= 0) G.combo = 1;
  }

  // ── Traffic Update ──
  traffic.forEach(t => {
    if (t.isOncoming) {
      t.mesh.position.z += (t.speed + G.speed * 0.5) * dt * 20;
    } else {
      t.mesh.position.z -= (G.speed - t.speed) * dt * 20;
    }

    // Recycle
    if (t.mesh.position.z > G.carZ + 80) {
      t.mesh.position.z = G.carZ - 250 - Math.random() * 200 * G.difficulty;
      t.lane = LANES[t.isOncoming ? (3 + Math.floor(Math.random() * 3)) : Math.floor(Math.random() * 3)];
      t.mesh.position.x = t.lane;
      t.nearMissed = false;
    }
    if (t.mesh.position.z < G.carZ - 500) {
      t.mesh.position.z = G.carZ + 30 + Math.random() * 50;
      t.lane = LANES[t.isOncoming ? (3 + Math.floor(Math.random() * 3)) : Math.floor(Math.random() * 3)];
      t.mesh.position.x = t.lane;
      t.nearMissed = false;
    }

    // Collision check (AABB)
    const dx = Math.abs(G.carX - t.mesh.position.x);
    const dz = Math.abs(G.carZ - t.mesh.position.z);
    const hitX = (2 + t.w) / 2 - 0.3;
    const hitZ = (4.5 + t.len) / 2 - 0.5;

    if (dx < hitX && dz < hitZ && G.invulnerable <= 0) {
      // Collision!
      G.lives--;
      G.invulnerable = 1.5;
      G.speed *= 0.3;
      G.combo = 1;
      G.screenShake = 0.5;
      playCollisionSound();
      spawnSparks(G.carX, 0.8, G.carZ, 20);
      document.getElementById('flash-overlay').style.opacity = '1';
      setTimeout(() => document.getElementById('flash-overlay').style.opacity = '0', 150);
      updateLivesHUD();
      if (G.lives <= 0) { endGame(); return; }
    }

    // Near-miss detection
    const nmX = (2 + t.w) / 2 + 1.2;
    const nmZ = (4.5 + t.len) / 2 + 1.0;
    if (dx < nmX && dz < nmZ && !t.nearMissed && dx >= hitX && G.speed > 1.5) {
      t.nearMissed = true;
      G.nearMisses++;
      const bonus = Math.floor(300 + G.speed * 100);
      G.score += bonus * G.combo;
      G.combo = Math.min(G.combo + 1, 12);
      G.comboTimer = 3;
      playNearMissSound();
      G.nearMissTimer = 0.6;
      document.getElementById('nearmiss').textContent = `NEAR MISS +${bonus * G.combo}`;
    }
  });

  // Spawn more traffic as difficulty increases
  if (frame % 60 === 0 && traffic.length < 20 + G.difficulty * 5) {
    spawnTrafficCar(G.carZ - 300 - Math.random() * 200);
  }

  // ── Sparks Update ──
  for (let i = sparks.length - 1; i >= 0; i--) {
    const s = sparks[i];
    s.mesh.position.x += s.vx * dt;
    s.mesh.position.y += s.vy * dt;
    s.mesh.position.z += s.vz * dt;
    s.vy -= 15 * dt;
    s.life -= dt;
    s.mesh.material.opacity = Math.max(s.life * 2, 0);
    if (s.life <= 0) {
      scene.remove(s.mesh);
      sparks.splice(i, 1);
    }
  }

  // ── Update Player Car ──
  playerCar.position.set(G.carX, 0.1, G.carZ);
  playerCar.rotation.y = G.steer * 0.15;
  // Blink if invulnerable
  playerCar.visible = G.invulnerable <= 0 || Math.floor(G.invulnerable * 10) % 2 === 0;

  // ── Headlights ──
  hlLeft.position.set(G.carX - 0.7, 1.2, G.carZ - 2.3);
  hlLeft.target.position.set(G.carX - 2, 0, G.carZ - 50);
  hlRight.position.set(G.carX + 0.7, 1.2, G.carZ - 2.3);
  hlRight.target.position.set(G.carX + 2, 0, G.carZ - 50);

  // ── Camera ──
  const camDist = 10 + G.speed * 1.5;
  const camH = 3.5 + G.speed * 0.5;
  const fovTarget = 72 + G.speed * 5;
  camera.fov += (fovTarget - camera.fov) * 0.05;
  camera.updateProjectionMatrix();

  let camX = G.carX - G.steer * 2;
  let camY = camH;
  let camZ = G.carZ + camDist;

  // Screen shake
  if (G.screenShake > 0) {
    G.screenShake -= dt;
    const shk = G.screenShake * 3;
    camX += (Math.random() - 0.5) * shk;
    camY += (Math.random() - 0.5) * shk;
  }

  camera.position.lerp(new THREE.Vector3(camX, camY, camZ), 0.08);
  const lookTarget = new THREE.Vector3(G.carX + G.steer * 4, 1.5, G.carZ - 30);
  camera.lookAt(lookTarget);

  // ── Audio ──
  if (audioCtx) {
    const engineFreq = 60 + Math.abs(G.speed) * 60;
    engineOsc.frequency.setTargetAtTime(engineFreq, audioCtx.currentTime, 0.05);
    engineGain.gain.setTargetAtTime(Math.min(Math.abs(G.speed) * 0.04, 0.12), audioCtx.currentTime, 0.05);
    windGain.gain.setTargetAtTime(Math.min(Math.abs(G.speed) * 0.015, 0.06), audioCtx.currentTime, 0.1);
  }

  // ── HUD ──
  document.getElementById('score').textContent = G.score.toLocaleString();
  document.getElementById('mph').textContent = Math.floor(mph);
  document.getElementById('distance').textContent = (G.distance / 100).toFixed(1) + ' mi';
  document.getElementById('tach').style.width = (G.speed / G.nitroSpeed * 100) + '%';
  
  const comboEl = document.getElementById('combo');
  if (G.combo > 1 && G.comboTimer > 0) {
    comboEl.textContent = `x${G.combo} COMBO`;
    comboEl.classList.add('active');
  } else {
    comboEl.classList.remove('active');
  }

  if (G.nearMissTimer > 0) {
    G.nearMissTimer -= dt;
    document.getElementById('nearmiss').classList.add('show');
  } else {
    document.getElementById('nearmiss').classList.remove('show');
  }

  // Speed lines effect
  document.getElementById('speed-lines').style.opacity = Math.min(G.speed / 4, 0.5);

  // ── Blue Light Pulse ──
  blueLightData.forEach((bl, i) => {
    bl.sprite.material.opacity = 0.4 + Math.sin(frame * 0.02 + i * 0.4) * 0.15;
    bl.light.intensity = 1.0 + Math.sin(frame * 0.015 + i * 0.3) * 0.4;
  });

  // Nitro visual
  if (G.nitroActive) {
    renderer.toneMappingExposure = 1.1;
    scene.fog.density = 0.004;
  } else {
    renderer.toneMappingExposure += (0.9 - renderer.toneMappingExposure) * 0.05;
    scene.fog.density += (0.006 - scene.fog.density) * 0.05;
  }

  // Road wrapping
  if (G.carZ < -ROAD_LEN + 100) G.carZ += ROAD_LEN - 200;

  renderer.render(scene, camera);
}

animate();
</script>
