<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAMILIAR ARENA — The Living Assembler (WebGPU)</title>
<link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.0/examples/jsm/",
    "three/nodes": "https://cdn.jsdelivr.net/npm/three@0.164.0/build/three.nodes.js"
  }
}
</script>
<style>
:root {
  --bg: #030508; --neon-cyan: #00f3ff; --neon-magenta: #ff00ea;
  --neon-green: #39ff14; --neon-gold: #ffd700; --dark-glass: rgba(5, 10, 15, 0.85);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
  width: 100vw; height: 100vh; overflow: hidden; background: var(--bg); 
  font-family: 'Space Mono', monospace; color: #fff; user-select: none;
}
canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

/* HUD LAYOUT */
#ui-layer {
  position: absolute; inset: 0; z-index: 10; pointer-events: none;
  display: flex; flex-direction: row; justify-content: space-between;
}
.interactive { pointer-events: auto; }

/* LEFT PANEL - STATS & LORE */
#left-panel {
  width: 300px; padding: 20px; background: linear-gradient(90deg, rgba(0,0,0,0.9) 0%, transparent 100%);
  display: flex; flex-direction: column; gap: 20px;
}
.hud-title { font-family: 'Syncopate', sans-serif; font-weight: 700; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; color: var(--neon-cyan); text-shadow: 0 0 10px var(--neon-cyan); }
.hud-subtitle { font-size: 0.7rem; color: #888; letter-spacing: 1px; }
.stat-box { border-left: 2px solid var(--neon-magenta); padding-left: 10px; margin-bottom: 10px; }
.stat-value { font-size: 1.5rem; font-weight: 700; color: #fff; }
.stat-label { font-size: 0.6rem; color: #aaa; text-transform: uppercase; }

/* RIGHT PANEL - ACTIVE DECK QUEUE */
#right-panel {
  width: 380px; padding: 20px; background: linear-gradient(-90deg, rgba(0,0,0,0.9) 0%, transparent 100%);
  display: flex; flex-direction: column;
}
.queue-header {
  font-family: 'Syncopate', sans-serif; font-size: 0.9rem; color: var(--neon-gold);
  border-bottom: 1px solid rgba(255,215,0,0.3); padding-bottom: 10px; margin-bottom: 15px;
}
#card-queue {
  flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px;
  padding-right: 10px;
}
/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }

/* CARD UI */
.deck-card {
  background: var(--dark-glass); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 4px; padding: 12px; position: relative; overflow: hidden;
  transition: all 0.2s ease; cursor: pointer;
  animation: slideIn 0.3s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
}
@keyframes slideIn { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: translateX(0); } }
.deck-card:hover { border-color: var(--neon-cyan); background: rgba(0, 243, 255, 0.05); transform: translateX(-5px); }
.deck-card.active { border-color: var(--neon-green); box-shadow: 0 0 15px rgba(57, 255, 20, 0.2); }
.deck-card.consumed { opacity: 0.2; pointer-events: none; filter: grayscale(1); }

.card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.card-name { font-family: 'Syncopate', sans-serif; font-size: 0.8rem; font-weight: 700; }
.card-type { font-size: 0.6rem; padding: 2px 6px; border-radius: 2px; background: rgba(255,255,255,0.1); }
.card-desc { font-size: 0.7rem; color: #ccc; line-height: 1.4; margin-bottom: 10px; }

.btn-activate {
  width: 100%; padding: 8px; background: transparent; border: 1px solid;
  color: inherit; font-family: 'Space Mono', monospace; font-size: 0.7rem; font-weight: 700;
  text-transform: uppercase; cursor: pointer; transition: 0.2s;
}
.btn-activate:hover { background: currentColor; color: #000 !important; }

/* EFFECT OVERLAY */
#effect-flash {
  position: absolute; inset: 0; pointer-events: none; z-index: 5;
  opacity: 0; transition: opacity 0.5s;
}
</style>
</head>
<body>

<div id="effect-flash"></div>
<canvas id="gameCanvas"></canvas>

<div id="ui-layer">
  <div id="left-panel">
    <div>
      <div class="hud-title">Assembler Core</div>
      <div class="hud-subtitle">WebGPU • TSL • Procedural Mass</div>
    </div>
    
    <div style="margin-top: 20px;">
      <div class="stat-box">
        <div class="stat-value" id="stat-mass">0.00</div>
        <div class="stat-label">Total Ship Mass (Assimilated)</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="stat-radius">12.0 m</div>
        <div class="stat-label">Gravitational Radius</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="stat-cards">0</div>
        <div class="stat-label">Wild Entities Active</div>
      </div>
    </div>
  </div>

  <div id="right-panel">
    <div class="queue-header">TACTICAL QUEUE // CLICK TO EXECUTE</div>
    <div id="card-queue" class="interactive">
      </div>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
// WebGPU Renderer and TSL (Three.js Shading Language) nodes
import WebGPURenderer from 'three/addons/renderers/webgpu/WebGPURenderer.js';
import { 
  color, time, positionLocal, mix, sin, cos, positionWorld,
  vec3, length, max, normalize, Fn, uniform, modelWorldMatrix 
} from 'three/nodes';

// ═══════════════════════════════════════════════════════
// GAME CONFIG & DATABASE
// ═══════════════════════════════════════════════════════
const CFG = { bounds: 80, spawnRate: 1.5 };
const STATE = { mass: 1, radius: 12, cardsInWorld: 0, deck: [] };

// The specific powers and their physical geometry that will be bolted onto the ship
const PROTOCOLS = [
  { 
    id: 'vortex', name: 'Singularity', type: 'GRAVITY', color: 0x00f3ff, hex: '#00f3ff',
    desc: 'Generates a massive localized gravity well. Pulls all entities into the hull instantly.',
    action: 'ENGAGE VORTEX', geoType: 'torus'
  },
  { 
    id: 'stasis', name: 'Chronos Lock', type: 'TIME', color: 0xff00ea, hex: '#ff00ea',
    desc: 'Stops all entity movement in the arena. Freezes targets for tactical collection.',
    action: 'TRIGGER STASIS', geoType: 'crystal'
  },
  { 
    id: 'repel', name: 'Kinetic Repulse', type: 'FORCE', color: 0xffd700, hex: '#ffd700',
    desc: 'Fires a concussive radial shockwave. Pushes entities to the arena perimeter.',
    action: 'FIRE SHOCKWAVE', geoType: 'spikes'
  },
  { 
    id: 'assimilate', name: 'Mass Converter', type: 'STRUCTURE', color: 0x39ff14, hex: '#39ff14',
    desc: 'Instantly breaks down closest entities and permanently increases ship gravitational radius.',
    action: 'ASSIMILATE MASS', geoType: 'plating'
  }
];

// ═══════════════════════════════════════════════════════
// WEBGPU ENGINE SETUP
// ═══════════════════════════════════════════════════════
const canvas = document.getElementById('gameCanvas');
const renderer = new WebGPURenderer({ canvas, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020305);
scene.fog = new THREE.FogExp2(0x020305, 0.015);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 1, 500);
camera.position.set(0, 40, 60);
camera.lookAt(0, 0, 0);

// Lighting
const ambient = new THREE.AmbientLight(0x223344, 2.0);
scene.add(ambient);
const dirLight = new THREE.DirectionalLight(0xffffff, 2.0);
dirLight.position.set(10, 50, 20);
scene.add(dirLight);

// ═══════════════════════════════════════════════════════
// TSL (THREE.JS SHADING LANGUAGE) MATERIALS
// ═══════════════════════════════════════════════════════
// 1. Grid Floor using TSL procedural generation
const gridMaterial = new THREE.MeshBasicNodeMaterial();
gridMaterial.transparent = true;
gridMaterial.colorNode = Fn(() => {
  const scale = 2.0;
  const pos = positionWorld.xz.mul(scale);
  const grid = max(
    sin(pos.x).step(0.95), 
    sin(pos.y).step(0.95)
  );
  const dist = length(positionWorld.xz).div(CFG.bounds);
  const fade = max(0.0, 1.0 - dist);
  return color(0x002244).mul(grid).mul(fade).add(color(0x010203));
})();

const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), gridMaterial);
floor.rotation.x = -Math.PI/2;
floor.position.y = -5;
scene.add(floor);

// 2. Living Hull Material (Pulsing TSL node)
const hullBaseColor = uniform(color(0x111111));
const hullGlowColor = uniform(color(0x00f3ff));
const livingMaterial = new THREE.MeshStandardNodeMaterial({ roughness: 0.2, metalness: 0.8 });
livingMaterial.colorNode = hullBaseColor;
livingMaterial.emissiveNode = Fn(() => {
  const pulse = sin(time.mul(2.0).add(positionLocal.y)).mul(0.5).add(0.5);
  return hullGlowColor.mul(pulse).mul(0.5);
})();

// ═══════════════════════════════════════════════════════
// PROCEDURAL SHIP ASSEMBLER
// ═══════════════════════════════════════════════════════
class LivingShip extends THREE.Group {
  constructor() {
    super();
    this.parts = [];
    
    // The Core
    const coreGeo = new THREE.IcosahedronGeometry(2, 1);
    this.coreMesh = new THREE.Mesh(coreGeo, livingMaterial);
    this.add(this.coreMesh);
    
    // Gravitational Radius Visual
    const ringGeo = new THREE.RingGeometry(STATE.radius - 0.2, STATE.radius, 64);
    const ringMat = new THREE.MeshBasicMaterial({ color: 0x00f3ff, transparent: true, opacity: 0.2, side: THREE.DoubleSide });
    this.radiusRing = new THREE.Mesh(ringGeo, ringMat);
    this.radiusRing.rotation.x = -Math.PI/2;
    this.add(this.radiusRing);
    
    this.targetRadius = STATE.radius;
  }

  update(dt) {
    // Ship floats and rotates slightly
    this.position.y = Math.sin(performance.now() * 0.002) * 1.5;
    this.coreMesh.rotation.y += dt * 0.5;
    this.coreMesh.rotation.z += dt * 0.2;

    // Animate assimilated parts rotating around the core
    this.parts.forEach((part, i) => {
      part.rotation.y += dt * (1 + i*0.1);
      part.rotation.x += dt * 0.5;
    });

    // Smoothly interpolate radius visual
    STATE.radius += (this.targetRadius - STATE.radius) * dt * 2.0;
    const scale = STATE.radius / 12.0; // 12 is base
    this.radiusRing.scale.setScalar(scale);
    document.getElementById('stat-radius').innerText = STATE.radius.toFixed(1) + ' m';
  }

  // The critical "Living" mechanic: Bolting new geometry onto the ship
  assimilateGeometry(type, customColor) {
    let geo;
    const s = 1 + (this.parts.length * 0.1); // Parts get bigger as ship grows
    
    if (type === 'torus') geo = new THREE.TorusGeometry(2 * s, 0.2, 8, 24);
    else if (type === 'crystal') geo = new THREE.OctahedronGeometry(1.5 * s, 0);
    else if (type === 'spikes') geo = new THREE.ConeGeometry(0.5 * s, 4 * s, 4);
    else geo = new THREE.BoxGeometry(2 * s, 0.5 * s, 2 * s); // plating

    const mat = livingMaterial.clone();
    mat.emissiveNode = Fn(() => {
      const p = sin(time.mul(3.0)).mul(0.5).add(0.5);
      return color(customColor).mul(p);
    })();

    const mesh = new THREE.Mesh(geo, mat);
    
    // Random orbit position
    const radius = 2.5 + (this.parts.length * 0.5);
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.random() * Math.PI;
    mesh.position.setFromSphericalCoords(radius, phi, theta);
    
    // Pop-in animation scale
    mesh.scale.setScalar(0.01);
    this.parts.push(mesh);
    this.add(mesh);

    // Increment Mass
    STATE.mass += 1.25;
    document.getElementById('stat-mass').innerText = STATE.mass.toFixed(2);
  }
}

const ship = new LivingShip();
scene.add(ship);

// ═══════════════════════════════════════════════════════
// ENTITY SYSTEM (THE CARDS/ENEMIES)
// ═══════════════════════════════════════════════════════
const entities = [];
const entityGroup = new THREE.Group();
scene.add(entityGroup);

function spawnEntity() {
  if (entities.length > 40) return;
  
  const protocol = PROTOCOLS[Math.floor(Math.random() * PROTOCOLS.length)];
  const angle = Math.random() * Math.PI * 2;
  const dist = CFG.bounds * 0.8;
  
  const geo = new THREE.TetrahedronGeometry(1.2, 1);
  const mat = new THREE.MeshStandardMaterial({ 
    color: 0x222222, emissive: protocol.color, emissiveIntensity: 0.8, wireframe: true 
  });
  
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(Math.cos(angle)*dist, 0, Math.sin(angle)*dist);
  
  const entity = {
    mesh, protocol, id: Math.random().toString(36).substr(2, 9),
    velocity: new THREE.Vector3(Math.cos(angle+Math.PI)*10, 0, Math.sin(angle+Math.PI)*10),
    active: true, stasis: false
  };
  
  entities.push(entity);
  entityGroup.add(mesh);
  STATE.cardsInWorld++;
}

// ═══════════════════════════════════════════════════════
// DOM UI & EVENT LOGIC
// ═══════════════════════════════════════════════════════
const uiQueue = document.getElementById('card-queue');
const effectFlash = document.getElementById('effect-flash');

function triggerFlash(colorHex) {
  effectFlash.style.transition = 'none';
  effectFlash.style.backgroundColor = colorHex;
  effectFlash.style.opacity = '0.3';
  setTimeout(() => {
    effectFlash.style.transition = 'opacity 0.8s ease-out';
    effectFlash.style.opacity = '0';
  }, 50);
}

function addCardToUI(protocol) {
  const cardId = 'card-' + Math.random().toString(36).substr(2, 9);
  STATE.deck.push({ id: cardId, protocol });

  const el = document.createElement('div');
  el.className = 'deck-card';
  el.id = cardId;
  el.style.borderColor = `rgba(255,255,255,0.2)`;
  
  el.innerHTML = `
    <div class="card-top">
      <span class="card-name" style="color: ${protocol.hex}">${protocol.name}</span>
      <span class="card-type" style="color: ${protocol.hex}; border: 1px solid ${protocol.hex}">${protocol.type}</span>
    </div>
    <div class="card-desc">${protocol.desc}</div>
    <button class="btn-activate" style="color: ${protocol.hex}; border-color: ${protocol.hex}">${protocol.action}</button>
  `;

  el.querySelector('button').addEventListener('click', () => executeProtocol(cardId));
  uiQueue.prepend(el); // Add to top
}

function executeProtocol(cardId) {
  const index = STATE.deck.findIndex(c => c.id === cardId);
  if (index === -1) return;
  const protocol = STATE.deck[index].protocol;
  
  // Visuals
  const el = document.getElementById(cardId);
  el.classList.add('consumed');
  el.querySelector('button').innerText = 'EXECUTED';
  triggerFlash(protocol.hex);

  // Gameplay Mechanics
  if (protocol.id === 'vortex') {
    // Pull everything towards center instantly
    entities.forEach(e => {
      const dir = ship.position.clone().sub(e.mesh.position).normalize();
      e.velocity.copy(dir.multiplyScalar(60)); // Massive inward speed
    });
  } 
  else if (protocol.id === 'stasis') {
    entities.forEach(e => { e.stasis = true; });
    setTimeout(() => { entities.forEach(e => { e.stasis = false; }); }, 4000);
  }
  else if (protocol.id === 'repel') {
    entities.forEach(e => {
      const dir = e.mesh.position.clone().sub(ship.position).normalize();
      e.velocity.copy(dir.multiplyScalar(80)); // Pushed away
    });
  }
  else if (protocol.id === 'assimilate') {
    ship.targetRadius += 4.0; // Permanently increase collection ring
    // Destroy 3 random entities instantly to simulate mass conversion
    for(let i=0; i<3; i++) {
      const active = entities.filter(e => e.active);
      if(active.length > 0) processCollection(active[0]);
    }
  }

  STATE.deck.splice(index, 1); // Remove from logic
}

function processCollection(entity) {
  if (!entity.active) return;
  entity.active = false;
  entityGroup.remove(entity.mesh);
  
  // Physical Assimilation: Add geometry to the ship based on what we caught
  ship.assimilateGeometry(entity.protocol.geoType, entity.protocol.color);
  
  // Add protocol to Deck UI
  addCardToUI(entity.protocol);
}

// ═══════════════════════════════════════════════════════
// MAIN GAME LOOP
// ═══════════════════════════════════════════════════════
const clock = new THREE.Clock();
let spawnTimer = 0;

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.1);

  // 1. Spawning
  spawnTimer += dt;
  if (spawnTimer > CFG.spawnRate) {
    spawnEntity();
    spawnTimer = 0;
  }

  // 2. Update Ship Assembly
  ship.update(dt);
  // Scale up newly assimilated parts smoothly
  ship.parts.forEach(p => {
    if (p.scale.x < 1) {
      const ns = p.scale.x + dt * 2.0;
      p.scale.setScalar(Math.min(ns, 1));
    }
  });

  // 3. Entity Physics & Collection Logic
  let activeCount = 0;
  for (let i = entities.length - 1; i >= 0; i--) {
    const e = entities[i];
    if (!e.active) {
      entities.splice(i, 1);
      continue;
    }
    activeCount++;

    if (!e.stasis) {
      // Movement
      e.mesh.position.addScaledVector(e.velocity, dt);
      
      // Boundary bounce
      if (Math.abs(e.mesh.position.x) > CFG.bounds) { e.velocity.x *= -1; e.mesh.position.x = Math.sign(e.mesh.position.x)*CFG.bounds; }
      if (Math.abs(e.mesh.position.z) > CFG.bounds) { e.velocity.z *= -1; e.mesh.position.z = Math.sign(e.mesh.position.z)*CFG.bounds; }
      
      // Friction
      e.velocity.multiplyScalar(0.98);
      // Base wander
      if (e.velocity.length() < 10) {
        e.velocity.add(new THREE.Vector3((Math.random()-0.5)*2, 0, (Math.random()-0.5)*2));
      }
    }
    e.mesh.rotation.x += dt; e.mesh.rotation.y += dt;

    // Radius Collection Check
    const dist = ship.position.distanceTo(e.mesh.position);
    if (dist < STATE.radius) {
      processCollection(e);
    }
  }

  document.getElementById('stat-cards').innerText = activeCount;

  // 4. Render via WebGPU
  renderer.render(scene, camera);
}

// Handle Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Boot
animate();

</script>
</body>
</html>
