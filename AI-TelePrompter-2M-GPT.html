<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic Delivery Teleprompter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000000;
            color: #e5e5e5;
        }

        #scene-container {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100vh;
            z-index: 1;
        }

        #teleprompter-container {
            position: absolute;
            inset: 0;
            z-index: 2;
            display: flex;
            justify-content: center;
            pointer-events: none;
            overflow: hidden;
            perspective: 600px;
        }

        #teleprompter {
            width: 98%;
            max-width: 1400px;
            position: relative;
            transform-style: preserve-3d;
            transition: max-width 0.5s ease-in-out;
        }

        .scrolling-content {
            position: absolute;
            width: 100%;
            animation: crawl 270s linear 1 forwards;
            animation-play-state: paused;
            will-change: transform;
        }

        @keyframes crawl {
            0% {
                transform: rotateX(9deg) translateY(100vh) translateZ(50px);
            }
            100% {
                transform: rotateX(9deg) translateY(var(--crawl-end-y, -4200px)) translateZ(-1200px);
            }
        }

        .section {
            margin-bottom: 2.5rem;
            pointer-events: all;
        }

        .section-title {
            color: #fff352;
            font-size: 3.1rem;
            font-weight: 800;
            line-height: 1.25;
            text-align: center;
            padding: 1rem 0 0.75rem 0;
            text-shadow: 0 0 12px rgba(0,0,0,0.7);
        }

        .principle {
            color: #ffc909;
            font-size: 2.45rem;
            font-weight: 700;
            line-height: 1.42;
            text-align: left;
            padding: 0.9rem 0;
            cursor: pointer;
            pointer-events: all;
            transition: color 0.3s, transform 0.3s;
            text-shadow: 0 0 8px rgba(0,0,0,0.7);
        }

        .principle:hover,
        .video-link:hover {
            color: #fff352;
            transform: scale(1.015);
        }

        .video-link {
            color: #ffc909;
            display: block;
            font-size: 2.35rem;
            font-weight: 700;
            line-height: 1.4;
            text-align: center;
            padding: 0.75rem 0;
            pointer-events: all;
            transition: color 0.3s, transform 0.3s;
            text-decoration: none;
            text-shadow: 0 0 8px rgba(0,0,0,0.7);
        }

        #copy-notification {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(30, 200, 100, 0.85);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.5s, transform 0.5s;
            pointer-events: none;
        }

        #copy-notification.show {
            opacity: 1;
            transform: translateX(-50%) translateY(-20px);
        }

        .controls-container {
            position: fixed;
            top: 20px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #speed-controls { left: 20px; }
        #text-controls { right: 20px; }

        .controls-container button,
        #bottom-controls button,
        #timer-btn {
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 201, 9, 0.5);
            color: #ffc909;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 0 0 5px #ffc909;
            font-weight: bold;
            pointer-events: all;
            min-width: 80px;
        }

        .controls-container button:hover,
        #bottom-controls button:hover,
        #timer-btn:hover {
            background-color: rgba(255, 201, 9, 0.2);
            box-shadow: 0 0 10px #ffc909;
        }

        #bottom-controls {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        #timer-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: all;
        }

        #timer-btn {
            min-width: auto;
            width: 44px;
            height: 44px;
            padding: 0;
            font-size: 1.2rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        #countdown-display {
            min-width: 86px;
            color: #fff352;
            font-size: 1.05rem;
            font-weight: 800;
            text-shadow: 0 0 8px rgba(255, 201, 9, 0.65);
            letter-spacing: 0.03em;
            user-select: none;
        }

        @media (max-width: 768px) {
            .section-title {
                font-size: 2.1rem;
                text-align: left;
            }

            .principle,
            .video-link {
                font-size: 1.55rem;
                text-align: left;
            }

            #teleprompter-container {
                perspective: 250px;
            }

            #bottom-controls {
                bottom: 14px;
                left: 14px;
                right: 14px;
            }
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="speed-controls" class="controls-container">
        <button id="slow-btn">Slow</button>
        <button id="pause-btn">Pause</button>
        <button id="fast-btn">Fast</button>
    </div>

    <div id="text-controls" class="controls-container">
        <button id="wider-btn">Wider</button>
        <button id="reset-btn">Reset</button>
        <button id="smaller-btn">Smaller</button>
    </div>

    <div id="bottom-controls">
        <button id="copy-all-btn">Copy All</button>
        <div id="timer-wrap">
            <button id="timer-btn" title="Start 2-minute rehearsal">⏱️</button>
            <span id="countdown-display">02:00</span>
        </div>
    </div>

    <div id="scene-container"></div>

    <div id="teleprompter-container">
        <div id="teleprompter"></div>
    </div>

    <div id="copy-notification">Copied to clipboard!</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const talkSections = [
            {
                title: '📈 There Are 5 Levels of Agentic Development',
                items: [
                    '👶 Level 1: Assisted, the Copilot. AI suggests syntax while the human remains the primary author and typist.',
                    '🧑‍🎓 Level 2: Task-Based, the Intern. AI handles discrete routines like unit tests while the human manages the workflow.',
                    '👔 Level 3: Collaborative, the Manager. Agents coordinate handoffs from spec to code while the human acts as the air traffic controller.',
                    '📋 Level 4: Autonomous, the PM. Agents build features directly from Markdown specs while the human moves from writing to articulating.',
                    '🏭 Level 5: ASI Dark Factory. Self-improving cyclic graphs handle everything while the human applies 100x opportunity judgment.'
                ]
            },
            {
                title: '🏛️ The Articulation Shift: Managing Intent',
                items: [
                    '🤖 The adequate is automated. Roughly sixty percent of entry-level implementation is becoming commodity work, so humans move up-stack into judgment.',
                    '✍️ Markdown is the new code. We are moving to specifications as truth. If you cannot describe it in Markdown, the agents cannot build it.',
                    '🌉 The spec is the interface. Senior engineers must treat high-bandwidth Markdown as the bridge between human intent and AI execution.',
                    '🏗️ Architect the factory. Your value is no longer syntax. It is the design of high-correctness, low-latency agentic loops.',
                    '📝 Reverse engineer flagship apps and specify organizational intent: desired outcomes, IO paths, and evaluation criteria.',
                    '🔌 Reverse engineer intent from legacy repos by extracting business logic and wrapping it inside a modern specification.',
                    '🎯 Opportunity judgment is the new bottleneck. The question is no longer how fast you type. It is what should be built, and why.'
                ]
            },
            {
                title: '🔄 Level 5 Dark Factories',
                items: [
                    '🔄 We are moving toward cyclic graphs where software improves itself in a closed loop.'
                ]
            },
            {
                title: '🔋 The Agentic Engine: Memory and HPC',
                items: [
                    '🧠 The multi-agent stack reaches Level 5 through specialized agents for brains, muscle, and memory.',
                    '⚙️ Market agents for scale using Python asyncio and multiprocessing to load-balance high-performance cloud tasks.',
                    '🕸️ The intelligence graph distills clinical or business expertise into a machine-readable structure that solves messy problems.',
                    '📚 Semantic memory preserves logic, standards, evals, and result sets across sessions.',
                    '🎞️ Episodic memory preserves patient or customer nuances so the system stays context-aware and tracks what stakeholders hold dear.',
                    '📄 Programmatic summarization can collapse one hundred twenty-eight pages of data into a single page of high-fidelity insight in seconds.',
                    '🖼️ The glass box view uses AI-native HTML, JavaScript, and visualization canvases to make reasoning transparent to stakeholders.',
                    '⏳ Seventy-two-hour value windows matter. This is not only about volume. It is about limited opportunity deadlines and completing at scale under speed constraints.',
                    '📈 Knowledge is additive. Every weekly release stores expert judgment, making the system smarter with every encounter and episode of care.'
                ]
            },
            {
                title: '⚖️ The Validation Shift: From Tests to Outcomes',
                items: [
                    '⚖️ Correctness over speed. Speed becomes a liability without accuracy, so we prioritize high-correctness architecting.',
                    '🧪 The AB200 engine replaces narrow unit tests with a holdout set of two hundred complex, high-volume cases, plus expert review of full examples.',
                    '🏥 Outcome evaluation replaces line-by-line code review with programmatic outcome reviews guided by subject matter experts.',
                    '🛣️ The scenario shift moves us from testing functions to evaluating real-world behavior scenarios.',
                    '🤝 Clinical partnership lets doctors and engineers audit the dark factory together.',
                    '🔄 In a self-correcting loop, if the system fails AB200, the agents should fix the specification, not just the syntax.',
                    '🗓️ Weekly human audits are non-negotiable. Senior humans must review the AI improvement cycle every week.',
                    '👓 Transparency is safety. Interactive 3D views, including Three.js, show these systems are not black boxes.',
                    '🛡️ Architecting trust means turning clinical and business intent into a scalable, trustworthy engine.'
                ]
            }
        ];

        const videoLinks = [
            { text: '1. Nate B Jones', url: 'https://www.youtube.com/@NateBJones' },
            { text: '2. Wes Roth', url: 'https://www.youtube.com/@WesRoth/videos' },
            { text: '3. Jordan B Peterson', url: 'https://www.youtube.com/@JordanBPeterson/videos' },
            { text: '4. Lex Fridman', url: 'https://www.youtube.com/@lexfridman/videos' },
            { text: '5. Aaron Wacker', url: 'https://www.youtube.com/@AaronWacker/videos' },
            { text: '6. Joe Rogan Experience', url: 'https://www.youtube.com/@joerogan/videos' }
        ];

        const teleprompter = document.getElementById('teleprompter');
        const notification = document.getElementById('copy-notification');
        const slowBtn = document.getElementById('slow-btn');
        const fastBtn = document.getElementById('fast-btn');
        const pauseBtn = document.getElementById('pause-btn');
        const widerBtn = document.getElementById('wider-btn');
        const resetBtn = document.getElementById('reset-btn');
        const smallerBtn = document.getElementById('smaller-btn');
        const copyAllBtn = document.getElementById('copy-all-btn');
        const timerBtn = document.getElementById('timer-btn');
        const countdownDisplay = document.getElementById('countdown-display');

        let scrollingContent;
        const initialDuration = 270;
        const initialMaxWidth = 2900;
        const initialRotationX = 9;
        let currentDuration = initialDuration;
        let currentMaxWidth = initialMaxWidth;
        let currentRotationX = initialRotationX;
        let isPaused = true;
        let timerInterval = null;
        let countdownSeconds = 120;
        let timedRunActive = false;
        let hasCompletedScroll = false;

        function init() {
            initTeleprompter();
            init3D();
            animate();
        }

        function initTeleprompter() {
            const contentDiv = document.createElement('div');
            contentDiv.className = 'scrolling-content';

            talkSections.forEach(section => {
                const sectionWrap = document.createElement('section');
                sectionWrap.className = 'section';

                const heading = document.createElement('h2');
                heading.className = 'section-title';
                heading.textContent = section.title;
                sectionWrap.appendChild(heading);

                section.items.forEach(text => {
                    const p = document.createElement('p');
                    p.textContent = text;
                    p.className = 'principle';
                    p.addEventListener('click', () => copyToClipboard(text));
                    sectionWrap.appendChild(p);
                });

                contentDiv.appendChild(sectionWrap);
            });

            const linksSection = document.createElement('section');
            linksSection.className = 'section';
            linksSection.style.marginTop = '4rem';

            const linksHeader = document.createElement('h2');
            linksHeader.textContent = '🎥 Videos';
            linksHeader.className = 'section-title';
            linksSection.appendChild(linksHeader);

            videoLinks.forEach(link => {
                const a = document.createElement('a');
                a.href = link.url;
                a.target = '_blank';
                a.rel = 'noopener noreferrer';
                a.textContent = link.text;
                a.className = 'video-link';
                linksSection.appendChild(a);
            });

            contentDiv.appendChild(linksSection);
            scrollingContent = contentDiv;
            teleprompter.appendChild(scrollingContent);

            slowBtn.addEventListener('click', slowDown);
            fastBtn.addEventListener('click', speedUp);
            pauseBtn.addEventListener('click', togglePause);
            widerBtn.addEventListener('click', makeWider);
            smallerBtn.addEventListener('click', makeSmaller);
            resetBtn.addEventListener('click', resetSettings);
            copyAllBtn.addEventListener('click', copyAllContent);
            timerBtn.addEventListener('click', startTimedRun);
            scrollingContent.addEventListener('animationend', handleScrollComplete);

            teleprompter.style.maxWidth = currentMaxWidth + 'px';
            updateCrawlAnimation();
            resetScrollPosition();
            updatePauseLabel();
            updateCountdownDisplay(countdownSeconds);
        }

        function getCrawlEndY() {
            if (!scrollingContent) return '-4200px';
            const contentHeight = scrollingContent.scrollHeight || window.innerHeight * 4;
            const visibleTail = window.innerHeight * 0.82;
            const finalY = -Math.max(contentHeight - visibleTail, 80);
            return `${finalY}px`;
        }

        function resetScrollPosition() {
            hasCompletedScroll = false;
            scrollingContent.style.animation = 'none';
            scrollingContent.style.setProperty('--crawl-end-y', getCrawlEndY());
            scrollingContent.offsetHeight;
            scrollingContent.style.animation = `crawl ${currentDuration}s linear 1 forwards`;
            scrollingContent.style.animationPlayState = isPaused ? 'paused' : 'running';
        }

        function slowDown() {
            currentDuration += 30;
            resetScrollPosition();
        }

        function speedUp() {
            if (currentDuration > 15) {
                currentDuration -= 15;
                resetScrollPosition();
            }
        }

        function togglePause() {
            if (hasCompletedScroll && isPaused) {
                isPaused = false;
                resetScrollPosition();
                updatePauseLabel();
                return;
            }

            isPaused = !isPaused;
            scrollingContent.style.animationPlayState = isPaused ? 'paused' : 'running';
            if (timedRunActive && isPaused) {
                stopTimedRun(false);
            }
            updatePauseLabel();
        }

        function updatePauseLabel() {
            pauseBtn.textContent = isPaused ? 'Play' : 'Pause';
        }

        function makeWider() {
            if (currentMaxWidth < 5000) {
                currentMaxWidth += 500;
                teleprompter.style.maxWidth = currentMaxWidth + 'px';
            }
            if (currentRotationX > 5) {
                currentRotationX -= 1;
                updateCrawlAnimation();
            }
        }

        function makeSmaller() {
            if (currentMaxWidth > 800) {
                currentMaxWidth -= 500;
                teleprompter.style.maxWidth = currentMaxWidth + 'px';
            }
            if (currentRotationX < 20) {
                currentRotationX += 1;
                updateCrawlAnimation();
            }
        }

        function resetSettings() {
            stopTimedRun(true);
            currentMaxWidth = initialMaxWidth;
            currentRotationX = initialRotationX;
            currentDuration = initialDuration;
            teleprompter.style.maxWidth = currentMaxWidth + 'px';
            updateCrawlAnimation();
            isPaused = true;
            resetScrollPosition();
            updatePauseLabel();
            updateCountdownDisplay(120);
        }

        function updateCrawlAnimation() {
            let styleSheet = document.getElementById('dynamic-styles');
            if (!styleSheet) {
                styleSheet = document.createElement('style');
                styleSheet.id = 'dynamic-styles';
                document.head.appendChild(styleSheet);
            }

            styleSheet.innerHTML = `
                @keyframes crawl {
                    0% {
                        transform: rotateX(${currentRotationX}deg) translateY(100vh) translateZ(50px);
                    }
                    100% {
                        transform: rotateX(${currentRotationX}deg) translateY(var(--crawl-end-y, -4200px)) translateZ(-1200px);
                    }
                }
            `;

            resetScrollPosition();
        }

        async function copyToClipboard(text) {
            try {
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(text);
                } else {
                    const textarea = document.createElement('textarea');
                    textarea.value = text;
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);
                }
                showCopyNotice();
            } catch (error) {
                console.error('Clipboard copy failed:', error);
            }
        }

        function copyAllContent() {
            const sectionText = talkSections
                .map(section => `${section.title}\n\n${section.items.join('\n')}`)
                .join('\n\n');

            const linksText = videoLinks
                .map(link => `${link.text}: ${link.url}`)
                .join('\n');

            copyToClipboard(`${sectionText}\n\n🎥 Videos\n\n${linksText}`);
        }

        function showCopyNotice() {
            notification.classList.add('show');
            setTimeout(() => {
                notification.classList.remove('show');
            }, 2000);
        }

        function updateCountdownDisplay(totalSeconds) {
            const minutes = String(Math.floor(totalSeconds / 60)).padStart(2, '0');
            const seconds = String(totalSeconds % 60).padStart(2, '0');
            countdownDisplay.textContent = `${minutes}:${seconds}`;
        }

        function startTimedRun() {
            stopTimedRun(true);
            timedRunActive = true;
            countdownSeconds = 120;
            currentDuration = 140;
            isPaused = false;
            updatePauseLabel();
            updateCountdownDisplay(countdownSeconds);
            resetScrollPosition();
            timerBtn.textContent = '⏳';

            timerInterval = setInterval(() => {
                countdownSeconds -= 1;
                updateCountdownDisplay(Math.max(countdownSeconds, 0));

                if (countdownSeconds <= 0) {
                    stopTimedRun(false);
                }
            }, 1000);
        }

        function stopTimedRun(resetDisplay = false) {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }

            if (timedRunActive || !resetDisplay) {
                isPaused = true;
                if (scrollingContent) {
                    scrollingContent.style.animationPlayState = 'paused';
                }
            }

            timedRunActive = false;
            timerBtn.textContent = '⏱️';
            updatePauseLabel();

            if (resetDisplay) {
                countdownSeconds = 120;
                updateCountdownDisplay(countdownSeconds);
            } else {
                updateCountdownDisplay(0);
            }
        }

        function handleScrollComplete() {
            hasCompletedScroll = true;
            isPaused = true;
            scrollingContent.style.animationPlayState = 'paused';

            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }

            if (timedRunActive) {
                timedRunActive = false;
                countdownSeconds = 0;
                updateCountdownDisplay(0);
                timerBtn.textContent = '⏱️';
            }

            updatePauseLabel();
        }

        let scene, camera, renderer, starLayers = [];

        function init3D() {
            const container = document.getElementById('scene-container');
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.0007);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            const starTexture = createStarTexture();
            createStarLayer(15000, 0.7, 0xffffff, starTexture);
            createStarLayer(25000, 0.5, 0xf0e68c, starTexture);
            createStarLayer(10000, 0.6, 0xadd8e6, starTexture);

            window.addEventListener('resize', onWindowResize, false);
        }

        function createStarLayer(count, size, color, texture) {
            const geometry = new THREE.BufferGeometry();
            const material = new THREE.PointsMaterial({
                color,
                size,
                transparent: true,
                opacity: 0.8,
                map: texture,
                blending: THREE.AdditiveBlending
            });

            const vertices = [];
            for (let i = 0; i < count; i++) {
                const x = (Math.random() - 0.5) * 2000;
                const y = (Math.random() - 0.5) * 2000;
                const z = (Math.random() - 0.5) * 2000;
                vertices.push(x, y, z);
            }

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            const stars = new THREE.Points(geometry, material);
            starLayers.push(stars);
            scene.add(stars);
        }

        function createStarTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const context = canvas.getContext('2d');
            const gradient = context.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(0.2, 'rgba(255,255,255,0.8)');
            gradient.addColorStop(0.7, 'rgba(255,255,255,0.1)');
            gradient.addColorStop(1, 'rgba(255,255,255,0)');
            context.fillStyle = gradient;
            context.fillRect(0, 0, 64, 64);
            return new THREE.CanvasTexture(canvas);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            if (scrollingContent) {
                updateCrawlAnimation();
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            camera.lookAt(scene.position);

            if (starLayers.length) {
                starLayers[0].rotation.y += 0.00020;
                starLayers[1].rotation.y += 0.00010;
                starLayers[2].rotation.y += 0.00015;
            }

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
