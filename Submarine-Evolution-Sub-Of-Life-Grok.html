<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SUB OF LIFE • Abyssal Genesis • SymbioMech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=JetBrains+Mono:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg: #00050f;
            --mint: #00ffcc;
            --cyan: #00ddff;
            --violet: #aa00ff;
            --rose: #ff0066;
            --gold: #ffcc00;
            --bio: #aaff44;
            --deep: #001122;
        }
        body { margin: 0; overflow: hidden; background-color: var(--bg); font-family: 'Inter', sans-serif; color: #eef4ff; user-select: none; }
        #three-container { position: absolute; inset: 0; z-index: 0; }
        .ui-layer { position: relative; z-index: 10; pointer-events: none; }
        .interactive { pointer-events: auto; }
        .glass-panel {
            background: rgba(2, 8, 22, 0.92);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 255, 204, 0.25);
            box-shadow: 0 20px 60px rgba(0,0,0,0.9), inset 0 0 30px rgba(0,255,204,0.08);
        }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .text-mint { color: var(--mint); }
        .text-cyan { color: var(--cyan); }
        .text-violet { color: var(--violet); }
        .text-rose { color: var(--rose); }
        .text-gold { color: var(--gold); }
        .text-bio { color: var(--bio); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(0,255,204,0.4); border-radius: 4px; }
        .log-entry { animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-15px); } to { opacity: 1; transform: translateX(0); } }
        .card-item { transition: all 0.25s cubic-bezier(0.23,1,0.32,1); }
        .card-item:hover { transform: scale(1.03) translateY(-2px); box-shadow: 0 0 25px rgba(0,255,204,0.3); }
        .type-torpedo { color: var(--rose); border-left-color: var(--rose); }
        .type-vortex { color: var(--violet); border-left-color: var(--violet); }
        .type-overdrive { color: var(--gold); border-left-color: var(--gold); }
        .type-net { color: var(--mint); border-left-color: var(--mint); }
        .type-luminara { color: var(--cyan); border-left-color: var(--cyan); }
        .type-symbiont { color: var(--bio); border-left-color: var(--bio); }
        .type-flush { color: var(--rose); border-left-color: var(--rose); }
        #scanline { position: absolute; inset: 0; z-index: 5; pointer-events: none; background: linear-gradient(transparent 50%, rgba(0,255,204,0.12) 51%); background-size: 100% 3px; animation: scan 4s linear infinite; }
        @keyframes scan { 0% { background-position: 0 0; } 100% { background-position: 0 300px; } }
        .vignette { position: absolute; inset: 0; z-index: 6; pointer-events: none; background: radial-gradient(circle at center, transparent 60%, rgba(0,5,15,0.85) 100%); }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.172.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.172.0/examples/jsm/" } }
    </script>
</head>
<body class="flex h-screen w-full">
    <div id="three-container"></div>
    <div id="scanline"></div>
    <div class="vignette"></div>

    <div class="ui-layer flex flex-col w-full h-full justify-between p-6 gap-6">
        <header class="flex justify-between items-start gap-6">
            <div class="glass-panel p-5 rounded-2xl interactive w-80">
                <h1 class="font-orbitron text-2xl font-black tracking-[4px] text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-mint-400 to-bio-400">SUB OF LIFE</h1>
                <p class="text-xs text-slate-400 mt-2 leading-tight">Abyssal Genesis • SymbioMech<br>Harvest microorganisms. Forge living machinery. Evolve the submarine of life.</p>
                <div class="mt-4 flex items-center justify-between text-[10px] font-mono border-t border-slate-700 pt-3">
                    <span id="status-text" class="text-mint font-bold animate-pulse">PRESSURE STABLE • DEPTH 1</span>
                    <div class="flex items-center gap-3">
                        <span class="text-slate-400">TTS</span>
                        <button id="tts-btn" class="w-9 h-5 bg-slate-700 rounded-full relative transition-all">
                            <span class="absolute right-1 top-0.5 w-3.5 h-3.5 bg-white rounded-full shadow transition-all"></span>
                        </button>
                    </div>
                </div>
            </div>

            <div class="glass-panel px-8 py-4 rounded-2xl flex gap-8 text-center font-mono text-sm interactive">
                <div><div class="text-slate-400 text-[10px]">BIOMASS</div><div id="ui-collected" class="text-white font-bold text-2xl">0</div></div>
                <div><div class="text-slate-400 text-[10px]">MICROBES</div><div id="ui-loose" class="text-cyan font-bold text-2xl">0</div></div>
                <div><div class="text-slate-400 text-[10px]">HULL MASS</div><div id="ui-mass" class="text-gold font-bold text-2xl">1.0</div></div>
                <div><div class="text-slate-400 text-[10px]">TECH TIER</div><div id="ui-gene" class="text-violet font-bold text-2xl">1</div></div>
                <div><div class="text-slate-400 text-[10px]">SYMBIO %</div><div id="ui-symbio" class="text-bio font-bold text-2xl">0%</div></div>
                <div><div class="text-slate-400 text-[10px]">CORE CHARGE</div><div id="ui-sweep" class="text-rose font-bold text-2xl">0%</div></div>
            </div>
        </header>

        <main class="flex-1 flex justify-between gap-6 pb-6">
            <!-- COMMS LOG -->
            <div class="glass-panel w-80 h-[420px] rounded-2xl flex flex-col interactive overflow-hidden border border-cyan-500/20">
                <div class="p-4 border-b border-cyan-500/30 bg-slate-950/60 flex justify-between items-center">
                    <span class="font-orbitron text-xs text-cyan tracking-widest flex items-center gap-2"><span class="w-2 h-2 bg-cyan rounded-full animate-ping"></span>NEURAL COMMS</span>
                    <button id="mic-btn" class="p-2.5 bg-slate-800 rounded-xl hover:bg-rose-600 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/></svg>
                    </button>
                </div>
                <div id="chat-log" class="flex-1 overflow-y-auto p-4 text-xs font-light"></div>
                <div class="p-3 border-t border-cyan-500/30 bg-slate-950">
                    <input id="chat-input" type="text" class="w-full bg-black border border-cyan-500/40 focus:border-cyan-400 rounded-xl px-4 py-3 text-xs placeholder:text-slate-500" placeholder="Command: torpedo, vortex, luminara, symbiont...">
                </div>
            </div>

            <!-- FORGED MODULES -->
            <div class="glass-panel w-80 h-[420px] rounded-2xl flex flex-col interactive overflow-hidden">
                <div class="p-4 border-b border-gold-500/30 bg-slate-950/60">
                    <span class="font-orbitron text-xs text-gold tracking-widest">FORGED SYMBIO MODULES</span>
                </div>
                <div id="powers-list" class="flex-1 overflow-y-auto p-4 flex flex-col gap-3"></div>
            </div>

            <!-- MICROBE ATLAS -->
            <div class="glass-panel w-80 h-[420px] rounded-2xl flex flex-col interactive overflow-hidden">
                <div class="p-4 border-b border-bio-500/30 bg-slate-950/60">
                    <span class="font-orbitron text-xs text-bio tracking-widest">MICROBE ATLAS • DEPTH 1</span>
                </div>
                <div id="species-list" class="flex-1 overflow-y-auto p-4 flex flex-col gap-3 text-xs"></div>
            </div>
        </main>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

        // ====================== INSANE AUDIO ENGINE ======================
        let audioCtx = null;
        let ambientOsc = null, ambientFilter = null, ambientGain = null;
        let engineHum = null;
        let reverbDelay = null;

        const SFX = {
            init() {
                if (audioCtx) return;
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();

                // Ambient abyssal drone
                ambientOsc = audioCtx.createOscillator();
                ambientOsc.type = 'sawtooth';
                ambientOsc.frequency.value = 32;
                ambientFilter = audioCtx.createBiquadFilter();
                ambientFilter.type = 'lowpass';
                ambientFilter.frequency.value = 140;
                ambientGain = audioCtx.createGain();
                ambientGain.gain.value = 0.028;
                reverbDelay = audioCtx.createDelay(0.8);
                reverbDelay.delayTime.value = 0.6;
                const reverbGain = audioCtx.createGain();
                reverbGain.gain.value = 0.12;
                ambientOsc.connect(ambientFilter).connect(ambientGain).connect(audioCtx.destination);
                ambientFilter.connect(reverbDelay).connect(reverbGain).connect(audioCtx.destination);
                ambientOsc.start();

                // Engine hum (will be modulated)
                engineHum = audioCtx.createOscillator();
                engineHum.type = 'sine';
                engineHum.frequency.value = 68;
                const humGain = audioCtx.createGain();
                humGain.gain.value = 0;
                engineHum.connect(humGain).connect(audioCtx.destination);
                engineHum.start();
            },

            modulateEngine(speed) {
                if (!engineHum) return;
                engineHum.frequency.setTargetAtTime(68 + speed * 0.9, audioCtx.currentTime, 0.2);
            },

            playHarvest(color) {
                const o = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                const f = audioCtx.createBiquadFilter();
                f.type = 'bandpass';
                f.frequency.value = 1400;
                o.type = 'sine';
                o.frequency.setValueAtTime(2100, audioCtx.currentTime);
                o.frequency.exponentialRampToValueAtTime(420, audioCtx.currentTime + 0.18);
                g.gain.setValueAtTime(0.25, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                o.connect(f).connect(g).connect(audioCtx.destination);
                o.start();
                o.stop(audioCtx.currentTime + 0.35);
            },

            playTorpedo() {
                const noise = audioCtx.createBufferSource();
                const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.6, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
                noise.buffer = buffer;
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 280;
                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(1.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.9);
                noise.connect(filter).connect(gain).connect(audioCtx.destination);
                noise.start();
            },

            playLuminara() {
                const chord = [880, 1100, 1320];
                chord.forEach((f,i) => {
                    const o = audioCtx.createOscillator();
                    o.frequency.value = f;
                    o.type = 'sine';
                    const g = audioCtx.createGain();
                    g.gain.setValueAtTime(0.3, audioCtx.currentTime + i*0.04);
                    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.8 + i*0.1);
                    o.connect(g).connect(audioCtx.destination);
                    o.start();
                    o.stop(audioCtx.currentTime + 2);
                });
            },

            playSymbiont() {
                for (let i = 0; i < 7; i++) {
                    setTimeout(() => {
                        const o = audioCtx.createOscillator();
                        o.type = 'triangle';
                        o.frequency.value = 680 + Math.random() * 420;
                        const g = audioCtx.createGain();
                        g.gain.setValueAtTime(0.18, audioCtx.currentTime);
                        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
                        o.connect(g).connect(audioCtx.destination);
                        o.start();
                        o.stop(audioCtx.currentTime + 0.15);
                    }, i * 28);
                }
            },

            playPowerBass() {
                const o = audioCtx.createOscillator();
                o.type = 'sawtooth';
                o.frequency.setValueAtTime(92, audioCtx.currentTime);
                o.frequency.exponentialRampToValueAtTime(28, audioCtx.currentTime + 0.7);
                const g = audioCtx.createGain();
                g.gain.setValueAtTime(0.45, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.85);
                o.connect(g).connect(audioCtx.destination);
                o.start();
            }
        };

        // ====================== GAME CONSTANTS ======================
        const BOUNDS = 280;
        const MAX_ENTITIES = 110;
        const MAX_PARTICLES = 3200;

        const SPECIES_SEEDS = [
            { name: 'Diatom', color: 0x00ffcc, body: 'crystal', speed: 14, drift: 0.45, fertility: 0.28, aggression: 0.04 },
            { name: 'Copepod', color: 0x0088ff, body: 'shell', speed: 38, drift: 0.22, fertility: 0.16, aggression: 0.35 },
            { name: 'Dinoflagellate', color: 0xff0066, body: 'whip', speed: 26, drift: 0.65, fertility: 0.24, aggression: 0.42 },
            { name: 'Radiolarian', color: 0xaa00ff, body: 'spiky', speed: 11, drift: 0.12, fertility: 0.09, aggression: 0.55 },
            { name: 'Rotifer', color: 0xaaff44, body: 'wheel', speed: 31, drift: 0.35, fertility: 0.32, aggression: 0.08 },
            { name: 'Nematode', color: 0xffcc00, body: 'worm', speed: 19, drift: 0.52, fertility: 0.19, aggression: 0.27 }
        ];

        const CARD_TYPES = [
            { type: 'Torpedo', color: 0xff0066, css: 'type-torpedo', effect: 'torpedo', desc: 'Explosive radial pressure blast' },
            { type: 'HydroVortex', color: 0xaa00ff, css: 'type-vortex', effect: 'vortex', desc: 'Suction current field' },
            { type: 'Overdrive', color: 0xffcc00, css: 'type-overdrive', effect: 'overdrive', desc: 'Hyper turbine surge' },
            { type: 'Stasis Net', color: 0x00ffcc, css: 'type-net', effect: 'net', desc: 'Electromagnetic paralysis web' },
            { type: 'Luminara Flare', color: 0x00ddff, css: 'type-luminara', effect: 'luminara', desc: 'Massive biolum attraction pulse' },
            { type: 'Symbiont Swarm', color: 0xaaff44, css: 'type-symbiont', effect: 'symbiont', desc: 'Release living helper drones' },
            { type: 'Core Vent', color: 0xff8800, css: 'type-flush', effect: 'flush', desc: 'Full arena purge' }
        ];

        // ====================== STATE ======================
        const state = {
            time: 0,
            collected: 0,
            combo: 0,
            sweepCharge: 0,
            powers: [],
            effects: { vortexUntil: 0, netUntil: 0, overdriveUntil: 0, luminaraUntil: 0, symbiontUntil: 0 },
            ttsEnabled: true,
            isListening: false,
            nextSpawnAt: 0,
            nextMutateAt: 7,
            nextSpeciationAt: 19,
            entities: [],
            speciesCatalog: [],
            speciesCounter: 0,
            growthMass: 1,
            geneLevel: 1,
            symbioPercent: 0,
            currentDepth: 1,
            harvestedParts: [],
            haloNodes: [],
            shake: 0
        };

        // ====================== THREE SETUP ======================
        const container = document.getElementById('three-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x00050f, 0.0032);

        const camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 1, 1600);
        camera.position.set(0, 165, 245);
        camera.lookAt(0, 15, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2.5));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        container.appendChild(renderer.domElement);

        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.85, 0.55, 0.72);
        bloom.threshold = 0.08;
        bloom.strength = 1.65;
        bloom.radius = 0.75;
        composer.addPass(bloom);
        composer.addPass(new OutputPass());

        // Seafloor with caustics-ready grid
        const gridHelper = new THREE.GridHelper(BOUNDS * 2.2, 64, 0x004455, 0x001122);
        gridHelper.position.y = -28;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.38;
        scene.add(gridHelper);

        scene.add(new THREE.AmbientLight(0x001133, 1.4));

        const pointLight = new THREE.PointLight(0x88ffff, 3.2, 500);
        scene.add(pointLight);

        // Sub headlights
        const headLight = new THREE.SpotLight(0xaaffff, 5.5, 520, Math.PI / 3.5, 0.6);
        scene.add(headLight);
        scene.add(headLight.target);

        const bioCore = new THREE.Group();
        scene.add(bioCore);

        const shipData = {
            pos: new THREE.Vector3(0, 0, 0),
            vel: new THREE.Vector3(),
            target: new THREE.Vector3(),
            collectRadius: 26,
            vortexRadius: 92,
            baseOrbit: 34,
            rootAssembly: null,
            propeller: null,
            tendrils: [],
            partGroups: []
        };

        // Particles (bubbles + plankton + caustics)
        const particles = [];
        const dummy = new THREE.Object3D();
        const particleMesh = new THREE.InstancedMesh(
            new THREE.SphereGeometry(0.35, 5, 5),
            new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.75 }),
            MAX_PARTICLES
        );
        scene.add(particleMesh);

        // ====================== UTILS ======================
        const synth = window.speechSynthesis;
        let recognition = null;
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        function rand(min, max) { return Math.random() * (max - min) + min; }
        function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
        function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

        function setStatus(text, cls = 'text-mint') {
            document.getElementById('status-text').textContent = text;
            document.getElementById('status-text').className = cls + ' font-bold';
        }

        function logComms(speaker, msg, highlight = false) {
            const box = document.getElementById('chat-log');
            const entry = document.createElement('div');
            entry.className = 'log-entry mb-2';
            const col = speaker === 'System' ? 'text-rose' : speaker.includes('Operator') ? 'text-cyan' : 'text-mint';
            entry.innerHTML = `<span class="font-bold ${col} text-[10px] uppercase">${speaker}:</span> <span class="${highlight ? 'text-white font-medium' : 'text-slate-300'}">${msg}</span>`;
            box.appendChild(entry);
            box.scrollTop = box.scrollHeight;
            if (box.children.length > 75) box.removeChild(box.firstChild);
        }

        function speak(text) {
            if (!state.ttsEnabled || !synth) return;
            const u = new SpeechSynthesisUtterance(text);
            u.pitch = 0.62;
            u.rate = 1.08;
            synth.speak(u);
        }

        // ====================== SPECIES & ENTITIES ======================
        function seededSpecies(seed) {
            state.speciesCounter++;
            return { id: `sp-${state.speciesCounter}`, name: `${seed.name}-${state.speciesCounter}`, color: seed.color, body: seed.body, ...seed, generation: 1, births: 0, harvested: 0 };
        }

        function mutateSpecies(base) {
            state.speciesCounter++;
            const c = new THREE.Color(base.color);
            c.offsetHSL(rand(-0.12, 0.12), 0, rand(-0.1, 0.1));
            return {
                ...base,
                id: `sp-${state.speciesCounter}`,
                name: `${base.name.split('-')[0]}′${state.speciesCounter}`,
                color: c.getHex(),
                speed: clamp(base.speed + rand(-6, 6), 9, 48),
                drift: clamp(base.drift + rand(-0.18, 0.18), 0.05, 0.78),
                generation: base.generation + 1,
                births: 0,
                harvested: 0
            };
        }

        function createBodyGeometry(kind) {
            if (kind === 'crystal') return new THREE.OctahedronGeometry(2.1, 0);
            if (kind === 'shell') return new THREE.TorusGeometry(1.7, 0.9, 9, 14);
            if (kind === 'whip') return new THREE.CylinderGeometry(0.25, 1.35, 7.5, 7, 1, true);
            if (kind === 'spiky') return new THREE.IcosahedronGeometry(2.3, 1);
            if (kind === 'wheel') return new THREE.TorusKnotGeometry(1.35, 0.35, 36, 7, 2, 3);
            return new THREE.CapsuleGeometry(1.05, 5.5, 6, 12);
        }

        function createBioMaterial(color) {
            return new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.85, roughness: 0.15, metalness: 0.05, transparent: true, opacity: 0.92 });
        }

        function buildCreatureMesh(species, mass) {
            const g = new THREE.Group();
            const main = new THREE.Mesh(createBodyGeometry(species.body), createBioMaterial(species.color));
            g.add(main);
            for (let i = 0; i < 5 + mass * 2; i++) {
                const limb = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.6, 3.5), createBioMaterial(species.color));
                limb.position.set(rand(-3, 3), rand(-2, 2), rand(-3, 3));
                limb.rotation.set(rand(-2, 2), rand(-2, 2), rand(-2, 2));
                g.add(limb);
            }
            return g;
        }

        function createSpeciesEntity(species) {
            const mass = rand(0.55, 1.75) + species.generation * 0.09;
            const mesh = buildCreatureMesh(species, mass);
            mesh.position.set(rand(-BOUNDS, BOUNDS), rand(-15, 45), rand(-BOUNDS, BOUNDS));
            scene.add(mesh);

            const entity = {
                id: Math.random().toString(36).slice(2),
                speciesId: species.id,
                speciesName: species.name,
                species,
                mesh,
                pos: mesh.position,
                vel: new THREE.Vector3(rand(-1,1), rand(-0.3,0.3), rand(-1,1)).normalize().multiplyScalar(species.speed * 0.17),
                energy: rand(45, 105),
                mass,
                phase: rand(0, Math.PI * 2),
                collected: false,
                power: pick(CARD_TYPES),
                partKind: pick(['tendril','thruster','sensor','plating']),
                isSymbiont: false,
                trailPhase: rand(0, Math.PI * 2)
            };
            state.entities.push(entity);
            species.births++;
            return entity;
        }

        // ====================== SUBMARINE EVOLUTION ======================
        function createShipAssembly() {
            bioCore.clear();
            shipData.partGroups = [];
            shipData.tendrils = [];

            const hullMat = new THREE.MeshStandardMaterial({ color: 0x112233, emissive: 0x00aaff, emissiveIntensity: 0.4, metalness: 0.85, roughness: 0.35 });
            const root = new THREE.Group();

            // Hull
            const hull = new THREE.Mesh(new THREE.CylinderGeometry(5.5, 4.5, 22, 18), hullMat);
            hull.rotation.z = Math.PI / 2;
            root.add(hull);

            // Glass dome
            const domeMat = new THREE.MeshPhysicalMaterial({ color: 0x00ffff, transmission: 0.95, roughness: 0, metalness: 0.1 });
            const dome = new THREE.Mesh(new THREE.SphereGeometry(4.8, 24, 24, 0, Math.PI*2, 0, Math.PI*1.1), domeMat);
            dome.rotation.z = -Math.PI / 2;
            dome.position.x = 11;
            root.add(dome);

            // Propeller
            const prop = new THREE.Group();
            for (let i = 0; i < 4; i++) {
                const blade = new THREE.Mesh(new THREE.BoxGeometry(1.1, 7, 1.8), new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.95 }));
                blade.rotation.x = i * Math.PI / 2;
                prop.add(blade);
            }
            prop.position.x = -18;
            root.add(prop);
            shipData.propeller = prop;

            bioCore.add(root);
            shipData.rootAssembly = root;
        }

        function addHarvestedPart(partKind, color) {
            if (!shipData.rootAssembly) return;
            const mechColor = new THREE.Color(color).lerp(new THREE.Color(0x334455), 0.4);
            const part = new THREE.Mesh(
                partKind === 'tendril' ? new THREE.CylinderGeometry(0.8, 0.3, 9, 6) : new THREE.BoxGeometry(3.5, 1.2, 4.5),
                new THREE.MeshStandardMaterial({ color: mechColor, emissive: color, emissiveIntensity: 0.75, metalness: 0.6 })
            );
            const slot = shipData.partGroups.length;
            part.position.set(rand(-8, 8), Math.sin(slot) * 7, Math.cos(slot * 1.3) * 9);
            part.rotation.set(rand(-1,1), rand(-1,1), rand(-1,1));
            part.userData = { pulse: rand(0, Math.PI*2), slot };
            shipData.rootAssembly.add(part);
            shipData.partGroups.push(part);

            // Grow tendril
            if (Math.random() < 0.6) {
                const tendril = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.15, 14 + slot * 1.2, 5), new THREE.MeshStandardMaterial({ color: 0x00ff88, emissive: 0x00ff88, emissiveIntensity: 1.1 }));
                tendril.position.set(rand(-12, 12), rand(-9, 9), rand(-12, 12));
                shipData.rootAssembly.add(tendril);
                shipData.tendrils.push(tendril);
            }

            state.symbioPercent = Math.min(100, state.symbioPercent + 6);
            state.growthMass = (1 + shipData.partGroups.length * 0.085).toFixed(1);
            state.geneLevel = 1 + Math.floor(shipData.partGroups.length / 4);

            document.getElementById('ui-symbio').textContent = `${Math.floor(state.symbioPercent)}%`;
        }

        // ====================== PARTICLES ======================
        function emitParticles(pos, colorVal, count, isBubble = false) {
            const col = new THREE.Color(colorVal);
            for (let i = 0; i < count && particles.length < MAX_PARTICLES; i++) {
                particles.push({
                    pos: pos.clone(),
                    vel: new THREE.Vector3(rand(-3,3), isBubble ? rand(3,8) : rand(-3,3), rand(-3,3)),
                    life: 1 + Math.random(),
                    color: col,
                    isBubble,
                    size: rand(0.2, 1.1)
                });
            }
        }

        function updateParticles(dt) {
            let idx = 0;
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.life -= dt * (p.isBubble ? 0.65 : 1.35);
                if (p.life <= 0) { particles.splice(i, 1); continue; }

                if (p.isBubble) p.vel.y += dt * 7;
                p.pos.addScaledVector(p.vel, dt * 55);

                dummy.position.copy(p.pos);
                dummy.scale.setScalar(p.life * p.size);
                dummy.updateMatrix();
                particleMesh.setMatrixAt(idx, dummy.matrix);
                particleMesh.setColorAt(idx, p.color);
                idx++;
            }
            particleMesh.count = idx;
            particleMesh.instanceMatrix.needsUpdate = true;
            if (particleMesh.instanceColor) particleMesh.instanceColor.needsUpdate = true;
        }

        // ====================== GAMEPLAY ======================
        function collectEntity(e, source) {
            if (e.collected) return;
            e.collected = true;
            state.collected++;
            state.combo = Math.min(12, state.combo + 1);
            state.sweepCharge = Math.min(100, state.sweepCharge + 7 + e.mass * 2.5);
            emitParticles(e.mesh.position, e.species.color, 28);
            emitParticles(e.mesh.position, 0xffffff, 12, true);
            SFX.playHarvest(e.species.color);

            state.powers.unshift({
                id: e.id,
                name: `${e.power.type} Module`,
                effect: e.power.effect,
                css: e.power.css,
                desc: e.power.desc,
                used: false
            });
            state.powers = state.powers.slice(0, 28);

            e.species.harvested++;
            addHarvestedPart(e.partKind, e.species.color);

            state.haloNodes.push({ entity: e, phase: rand(0, Math.PI*2) });
            if (state.haloNodes.length > 24) {
                const old = state.haloNodes.shift();
                if (old.entity && !old.entity.visualRemoved) {
                    old.entity.visualRemoved = true;
                    scene.remove(old.entity.mesh);
                }
            }

            renderPowers();
            renderSpecies();
            updateUI();
            if (source !== 'auto') logComms('Link', `${e.speciesName} assimilated • ${source}`);
        }

        function bestTarget() {
            const loose = state.entities.filter(e => !e.collected);
            if (!loose.length) return new THREE.Vector3();
            let best = loose[0].pos.clone();
            let score = -Infinity;
            for (const e of loose) {
                let s = e.energy * 0.03 + e.mass * 0.7 + e.species.generation * 0.8;
                s += (180 - shipData.pos.distanceTo(e.pos)) * 0.015;
                if (s > score) { score = s; best = e.pos.clone(); }
            }
            return best;
        }

        function evolveWorld(dt) {
            // Ambient bubbles
            if (Math.random() < 0.28) emitParticles(new THREE.Vector3(rand(-BOUNDS*0.9, BOUNDS*0.9), -35, rand(-BOUNDS*0.9, BOUNDS*0.9)), 0x88ccff, 1, true);

            // Mutations & speciation
            if (state.time > state.nextMutateAt) {
                state.nextMutateAt = state.time + rand(6, 11);
                const mutant = mutateSpecies(pick(state.speciesCatalog));
                state.speciesCatalog.push(mutant);
                for (let i = 0; i < 3; i++) createSpeciesEntity(mutant);
                logComms('System', `Mutation event: ${mutant.name} detected`);
            }
            if (state.time > state.nextSpeciationAt && state.speciesCatalog.length < 18) {
                state.nextSpeciationAt = state.time + rand(16, 27);
                const newSp = mutateSpecies(pick(state.speciesCatalog));
                state.speciesCatalog.push(newSp);
                logComms('System', `New lineage: ${newSp.name}`);
            }

            const netOn = state.time < state.effects.netUntil;
            const luminaraOn = state.time < state.effects.luminaraUntil;

            for (const e of state.entities) {
                if (e.collected) continue;
                e.age = (e.age || 0) + dt;
                e.energy -= dt * 0.45;
                e.phase += dt * (0.9 + e.species.drift * 1.8);
                e.mesh.position.y += Math.sin(state.time * 2.8 + e.phase) * dt * 1.8;

                if (!netOn) {
                    const noise = new THREE.Vector3(Math.sin(e.phase) * e.species.drift * 0.7, Math.cos(e.phase * 0.7) * 0.4, Math.cos(e.phase * 1.3) * e.species.drift * 0.7);
                    e.vel.addScaledVector(noise, dt * 8);
                    e.vel.clampLength(0, e.species.speed * 0.42);
                    e.pos.addScaledVector(e.vel, dt);
                }

                e.pos.x = clamp(e.pos.x, -BOUNDS, BOUNDS);
                e.pos.z = clamp(e.pos.z, -BOUNDS, BOUNDS);

                // Reproduction
                if (Math.random() < (e.species.fertility + (state.time < state.effects.symbiontUntil ? 0.11 : 0)) * dt * 0.18 && state.entities.length < MAX_ENTITIES) {
                    const child = createSpeciesEntity(Math.random() < 0.22 ? mutateSpecies(e.species) : e.species);
                    child.pos.copy(e.pos).add(new THREE.Vector3(rand(-6,6), rand(-6,6), rand(-6,6)));
                }

                if (e.energy <= 0) collectEntity(e, 'decay');
            }

            // Depth progression
            if (state.collected > state.currentDepth * 14) {
                state.currentDepth++;
                scene.fog.density = 0.0032 + state.currentDepth * 0.0009;
                setStatus(`PRESSURE RISING • DEPTH ${state.currentDepth}`, 'text-rose');
                logComms('System', `Depth level ${state.currentDepth} reached. Rarer species emerging.`);
            }
        }

        function autopilot(dt) {
            shipData.target = bestTarget();
            const dir = shipData.target.clone().sub(shipData.pos);
            const dist = dir.length();
            const overOn = state.time < state.effects.overdriveUntil;

            if (dist > 8) {
                const speed = clamp(22 + state.geneLevel * 3.5 + dist * 0.14, 22, 135) * (overOn ? 3.1 : 1);
                dir.normalize().multiplyScalar(speed);
                shipData.vel.lerp(dir, 0.055);
            }
            shipData.pos.addScaledVector(shipData.vel, dt);
            shipData.pos.clamp(new THREE.Vector3(-BOUNDS + 30, -25, -BOUNDS + 30), new THREE.Vector3(BOUNDS - 30, 95, BOUNDS - 30));

            bioCore.position.copy(shipData.pos);
            bioCore.position.y += Math.sin(state.time * 2.1) * 2.2;

            if (shipData.vel.lengthSq() > 0.2) {
                const yaw = Math.atan2(shipData.vel.x, shipData.vel.z);
                bioCore.rotation.y = yaw;
                bioCore.rotation.z = Math.asin(clamp(-shipData.vel.y / shipData.vel.length(), -0.6, 0.6)) * 0.7;
            }

            // Propeller spin + wake
            if (shipData.propeller) {
                shipData.propeller.rotation.x += dt * shipData.vel.length() * 0.85;
                emitParticles(bioCore.position.clone().add(new THREE.Vector3(-19, 0, 0).applyEuler(bioCore.rotation)), 0x88ffff, 2, true);
            }

            // Lights
            pointLight.position.copy(bioCore.position).add(new THREE.Vector3(0, 18, 0));
            headLight.position.copy(bioCore.position);
            headLight.target.position.copy(bioCore.position).add(shipData.vel.clone().normalize().multiplyScalar(80));

            SFX.modulateEngine(shipData.vel.length());

            // Collection & effects
            const collectR = shipData.collectRadius * (state.time < state.effects.luminaraUntil ? 2.4 : 1);
            const vortexR = shipData.vortexRadius + (state.time < state.effects.vortexUntil ? 145 : 0);

            for (const e of state.entities) {
                if (e.collected) continue;
                const d = e.pos.distanceTo(shipData.pos);
                if (d < vortexR) {
                    const pull = shipData.pos.clone().sub(e.pos).normalize().multiplyScalar((state.time < state.effects.vortexUntil ? 1.35 : 0.12) * (1 - d / vortexR));
                    e.vel.add(pull);
                }
                if (d < collectR) collectEntity(e);
            }

            // Animate attached parts
            for (const p of shipData.partGroups) {
                p.userData.pulse += dt * 3.5;
                p.position.y += Math.sin(p.userData.pulse) * 0.035;
            }
            for (const t of shipData.tendrils) {
                t.rotation.z += dt * 1.2;
            }
        }

        function updateHalo(dt) {
            const r = shipData.baseOrbit + (state.time < state.effects.luminaraUntil ? 22 : 0);
            state.haloNodes.forEach((hn, i) => {
                if (!hn.entity || hn.entity.visualRemoved) return;
                hn.phase += dt * 1.35;
                hn.entity.mesh.position.set(
                    shipData.pos.x + Math.cos(hn.phase + i) * (r + i * 3),
                    bioCore.position.y + Math.sin(state.time * 3.5 + i) * 5,
                    shipData.pos.z + Math.sin(hn.phase + i * 1.3) * (r + i * 3)
                );
            });
        }

        function executePower(effect, source = 'manual') {
            SFX.init();
            SFX.playPowerBass();

            const idx = state.powers.findIndex(p => p.effect === effect && !p.used);
            if (idx === -1 && effect !== 'flush') {
                logComms('System', `No ${effect.toUpperCase()} module ready.`);
                return;
            }
            if (effect === 'flush' && state.sweepCharge < 100) {
                logComms('System', 'Core charge insufficient.');
                return;
            }

            if (idx > -1) state.powers[idx].used = true;

            let msg = '';

            if (effect === 'torpedo') {
                let hits = 0;
                state.entities.forEach(e => { if (!e.collected && e.pos.distanceTo(shipData.pos) < 135) { collectEntity(e); hits++; } });
                emitParticles(shipData.pos, 0xff0066, 95);
                SFX.playTorpedo();
                msg = `Torpedo detonated • ${hits} harvested`;
            } else if (effect === 'vortex') {
                state.effects.vortexUntil = state.time + 8.5;
                msg = 'Hydro vortex engaged';
            } else if (effect === 'net') {
                state.effects.netUntil = state.time + 6.5;
                msg = 'Stasis net deployed';
            } else if (effect === 'overdrive') {
                state.effects.overdriveUntil = state.time + 5.8;
                msg = 'Thrusters overcharged';
            } else if (effect === 'luminara') {
                state.effects.luminaraUntil = state.time + 10;
                emitParticles(shipData.pos, 0x00ddff, 180);
                SFX.playLuminara();
                msg = 'Luminara flare ignited — all life drawn';
            } else if (effect === 'symbiont') {
                state.effects.symbiontUntil = state.time + 15;
                for (let i = 0; i < 7; i++) {
                    const ally = createSpeciesEntity(pick(state.speciesCatalog));
                    ally.isSymbiont = true;
                    ally.vel.set(rand(-1,1), 0, rand(-1,1)).multiplyScalar(22);
                }
                SFX.playSymbiont();
                msg = 'Symbiont swarm released from DNA archive';
            } else if (effect === 'flush') {
                state.entities.forEach(e => { if (!e.collected) collectEntity(e); });
                state.sweepCharge = 0;
                msg = 'Core vented — sector cleared';
            }

            logComms('Operator', msg, true);
            speak(msg);
            state.shake = 0.6;
            renderPowers();
            renderSpecies();
            updateUI();
        }

        function parseCommand(str) {
            const l = str.toLowerCase();
            if (l.includes('torpedo')) return executePower('torpedo');
            if (l.includes('vortex')) return executePower('vortex');
            if (l.includes('overdrive')) return executePower('overdrive');
            if (l.includes('net') || l.includes('stasis')) return executePower('net');
            if (l.includes('luminara') || l.includes('flare')) return executePower('luminara');
            if (l.includes('symbiont') || l.includes('swarm')) return executePower('symbiont');
            if (l.includes('flush') || l.includes('vent') || l.includes('clear')) return executePower('flush');
            logComms('System', 'Unknown command. Try: torpedo, vortex, luminara, symbiont, overdrive, net, flush');
        }

        function updateUI() {
            const loose = state.entities.filter(e => !e.collected).length;
            document.getElementById('ui-collected').textContent = state.collected;
            document.getElementById('ui-loose').textContent = loose;
            document.getElementById('ui-mass').textContent = state.growthMass;
            document.getElementById('ui-gene').textContent = state.geneLevel;
            document.getElementById('ui-sweep').textContent = `${Math.floor(state.sweepCharge)}%`;
        }

        function renderPowers() {
            const container = document.getElementById('powers-list');
            container.innerHTML = '';
            const active = state.powers.filter(p => !p.used).slice(0, 11);
            if (!active.length) {
                container.innerHTML = `<div class="text-center text-[11px] text-slate-500 mt-12">Harvest to forge modules...</div>`;
                return;
            }
            active.forEach(p => {
                const div = document.createElement('div');
                div.className = `card-item p-3 rounded-xl border bg-slate-900/70 text-xs ${p.css}`;
                div.innerHTML = `
                    <div class="flex justify-between items-baseline">
                        <span class="font-bold">${p.name}</span>
                        <span class="px-2 py-0.5 text-[9px] font-mono bg-black/60 rounded">READY</span>
                    </div>
                    <div class="text-[10px] text-slate-400 mt-1">${p.desc}</div>
                `;
                div.onclick = () => executePower(p.effect, 'click');
                container.appendChild(div);
            });
        }

        function renderSpecies() {
            const container = document.getElementById('species-list');
            container.innerHTML = '';
            const sorted = [...state.speciesCatalog].sort((a,b) => b.generation - a.generation).slice(0, 13);
            sorted.forEach(sp => {
                const live = state.entities.filter(e => !e.collected && e.speciesId === sp.id).length;
                const row = document.createElement('div');
                row.className = 'p-3 rounded-xl bg-slate-900/70 border border-slate-700 flex flex-col';
                row.innerHTML = `
                    <div class="flex justify-between">
                        <span style="color:#${sp.color.toString(16).padStart(6,'0')}" class="font-semibold">${sp.name}</span>
                        <span class="text-[10px] text-slate-500">GEN ${sp.generation}</span>
                    </div>
                    <div class="text-[10px] text-slate-400">${sp.body} • live: ${live} • harvested: ${sp.harvested}</div>
                `;
                container.appendChild(row);
            });
        }

        function initField() {
            createShipAssembly();
            state.speciesCatalog = SPECIES_SEEDS.map(seededSpecies);
            state.speciesCatalog.forEach(s => {
                for (let i = 0; i < 8; i++) createSpeciesEntity(s);
            });

            // Starter modules
            addHarvestedPart('tendril', 0x00ffcc);
            addHarvestedPart('thruster', 0xffcc00);

            logComms('System', 'SUB OF LIFE online. Harvest microbes to evolve living machinery. Voice or type commands. Depth increases every 14 biomass.');
            logComms('System', 'RULES: Proximity = harvest. Use powers. Symbio % grows tendrils & stats.', true);

            renderPowers();
            renderSpecies();
            updateUI();
        }

        // Voice
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = false;
            recognition.onresult = e => {
                const txt = e.results[e.results.length-1][0].transcript.trim();
                logComms('Operator (Voice)', txt);
                parseCommand(txt);
            };
            recognition.onstart = () => { state.isListening = true; document.getElementById('mic-btn').classList.add('bg-rose-600'); setStatus('VOICE LINK OPEN', 'text-rose'); };
            recognition.onend = () => { state.isListening = false; document.getElementById('mic-btn').classList.remove('bg-rose-600'); setStatus(`PRESSURE STABLE • DEPTH ${state.currentDepth}`); };
        }

        document.getElementById('mic-btn').onclick = () => {
            SFX.init();
            if (!recognition) return;
            state.isListening ? recognition.stop() : recognition.start();
        };

        document.getElementById('tts-btn').onclick = e => {
            SFX.init();
            state.ttsEnabled = !state.ttsEnabled;
            const knob = e.currentTarget.children[0];
            if (state.ttsEnabled) {
                e.currentTarget.classList.replace('bg-slate-700', 'bg-cyan-600');
                knob.classList.replace('right-1', 'right-5');
                speak('TTS restored.');
            } else {
                e.currentTarget.classList.replace('bg-cyan-600', 'bg-slate-700');
                knob.classList.replace('right-5', 'right-1');
            }
        };

        document.getElementById('chat-input').addEventListener('keypress', e => {
            if (e.key !== 'Enter') return;
            const val = e.target.value.trim();
            if (!val) return;
            logComms('Operator (Text)', val);
            e.target.value = '';
            parseCommand(val);
        });

        // ====================== ANIMATION LOOP ======================
        const clock = new THREE.Clock();
        let causticsPhase = 0;

        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.12);
            state.time += dt;

            evolveWorld(dt);
            autopilot(dt);
            updateHalo(dt);
            updateParticles(dt);

            // Caustics pulse
            causticsPhase += dt * 1.1;
            gridHelper.material.opacity = 0.38 + Math.sin(causticsPhase * 1.8) * 0.11;

            // Screen shake on power
            if (state.shake > 0) {
                bioCore.position.x += (Math.random() - 0.5) * state.shake * 3;
                bioCore.position.z += (Math.random() - 0.5) * state.shake * 3;
                state.shake *= 0.82;
            }

            // Auto spawn
            if (state.entities.filter(e => !e.collected).length < 32 && state.time > state.nextSpawnAt) {
                createSpeciesEntity(pick(state.speciesCatalog));
                state.nextSpawnAt = state.time + 0.22;
            }

            composer.render();
            updateUI();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        // Click anywhere to init audio
        document.body.addEventListener('click', () => SFX.init(), { once: true });
        document.body.addEventListener('keydown', () => SFX.init(), { once: true });

        initField();
        speak('Sub of life online. Harvest. Evolve. Become the abyss.');
        animate();
    </script>
</body>
