<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Abyssal Tech: Submersible Evolution</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=JetBrains+Mono:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg: #010a15;
            --mint: #00ffcc;
            --cyan: #0088ff;
            --violet: #9d00ff;
            --rose: #ff0055;
            --gold: #ffaa00;
            --bio: #aaff00;
        }
        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--bg);
            font-family: 'Inter', sans-serif;
            color: #eef4ff;
            user-select: none;
        }
        #three-container { position: absolute; inset: 0; z-index: 0; }
        .ui-layer { position: relative; z-index: 10; pointer-events: none; }
        .interactive { pointer-events: auto; }
        .glass-panel {
            background: rgba(4, 12, 28, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 255, 204, 0.15);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0, 255, 204, 0.05);
        }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .text-mint { color: var(--mint); }
        .text-cyan { color: var(--cyan); }
        .text-violet { color: var(--violet); }
        .text-rose { color: var(--rose); }
        .text-gold { color: var(--gold); }
        .text-bio { color: var(--bio); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0, 255, 204, 0.3); border-radius: 4px; }
        .log-entry { animation: slideIn 0.28s ease-out forwards; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .card-item { transition: all 0.2s; cursor: pointer; border-left: 3px solid transparent; }
        .card-item:hover { transform: translateX(4px); background: rgba(0, 255, 204, 0.1); }
        .type-sonar { color: var(--cyan); border-left-color: var(--cyan); }
        .type-vortex { color: var(--violet); border-left-color: var(--violet); }
        .type-overdrive { color: var(--gold); border-left-color: var(--gold); }
        .type-net { color: var(--mint); border-left-color: var(--mint); }
        .type-torpedo { color: var(--rose); border-left-color: var(--rose); }
        .type-synth { color: var(--bio); border-left-color: var(--bio); }
        
        #scanline {
            position: absolute; inset: 0; z-index: 5; pointer-events: none;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.2) 51%);
            background-size: 100% 4px; opacity: 0.3;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.172.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.172.0/examples/jsm/"
            }
        }
    </script>
</head>
<body class="flex h-screen w-full">
    <div id="three-container"></div>
    <div id="scanline"></div>
    
    <div class="ui-layer flex flex-col w-full h-full justify-between p-4 gap-4">
        <header class="flex justify-between items-start gap-4">
            <div class="glass-panel p-4 rounded-xl interactive w-80">
                <h1 class="font-orbitron text-lg font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-mint-500 tracking-widest uppercase">Abyssal Tech OS</h1>
                <p class="text-xs text-slate-400 mt-1">Nautilus Unit deployed. Harvest microorganisms to synthesize new mechanical appendages.</p>
                <div class="mt-3 flex items-center justify-between text-[10px] font-mono border-t border-slate-700 pt-2">
                    <span id="status-text" class="text-mint animate-pulse">SONAR ACTIVE</span>
                    <div class="flex items-center gap-2 text-slate-300">
                        TTS
                        <button id="tts-btn" class="w-8 h-4 bg-slate-600 rounded-full relative transition-colors">
                            <span class="absolute right-5 top-0.5 w-3 h-3 bg-white rounded-full transition-all"></span>
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="glass-panel px-6 py-3 rounded-xl flex gap-5 text-center font-mono text-sm interactive">
                <div><div class="text-slate-400 text-[10px]">BIOMASS</div><div id="ui-collected" class="text-white font-bold text-lg">0</div></div>
                <div><div class="text-slate-400 text-[10px]">TARGETS</div><div id="ui-loose" class="text-cyan-400 font-bold text-lg">0</div></div>
                <div><div class="text-slate-400 text-[10px]">HULL LVL</div><div id="ui-mass" class="text-gold font-bold text-lg">1.0</div></div>
                <div><div class="text-slate-400 text-[10px]">TECH TIER</div><div id="ui-gene" class="text-violet-400 font-bold text-lg">1</div></div>
                <div><div class="text-slate-400 text-[10px]">CORE CHARGE</div><div id="ui-sweep" class="text-rose-400 font-bold text-lg">0%</div></div>
            </div>
        </header>

        <main class="flex-1 flex justify-between items-end gap-4 pb-4">
            <div class="glass-panel w-80 h-96 rounded-xl flex flex-col interactive overflow-hidden">
                <div class="p-3 border-b border-slate-700/50 bg-slate-900/50 flex justify-between items-center">
                    <span class="font-orbitron text-xs text-cyan-400 tracking-widest flex items-center gap-2">
                        <div class="w-2 h-2 rounded-full bg-cyan-400 animate-ping"></div>
                        COMMS LOG
                    </span>
                    <button id="mic-btn" class="p-2 bg-slate-800 rounded-full hover:bg-slate-700 transition-colors" title="Toggle Voice Recognition">
                        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
                    </button>
                </div>
                <div id="chat-log" class="flex-1 overflow-y-auto p-3 flex flex-col gap-2 text-xs"></div>
                <div class="p-2 border-t border-slate-700/50 bg-slate-900/80">
                    <input type="text" id="chat-input" class="w-full bg-slate-950/50 text-slate-200 text-xs px-3 py-2 rounded border border-slate-700 focus:outline-none focus:border-cyan-500 transition-colors" placeholder="Commands: sonar, vortex, overdrive, net, torpedo, synth" />
                </div>
            </div>

            <div class="glass-panel w-80 h-96 rounded-xl flex flex-col interactive overflow-hidden">
                <div class="p-3 border-b border-slate-700/50 bg-slate-900/50">
                    <span class="font-orbitron text-xs text-gold tracking-widest">SUBMARINE SYSTEMS</span>
                </div>
                <div id="powers-list" class="flex-1 overflow-y-auto p-3 flex flex-col gap-2">
                    <div class="text-[10px] text-slate-500 text-center mt-10">Systems offline. Harvest biomass to synthesize modules.</div>
                </div>
            </div>

            <div class="glass-panel w-80 h-96 rounded-xl flex flex-col interactive overflow-hidden">
                <div class="p-3 border-b border-slate-700/50 bg-slate-900/50">
                    <span class="font-orbitron text-xs text-bio tracking-widest">MICROBIAL RADAR</span>
                </div>
                <div id="species-list" class="flex-1 overflow-y-auto p-3 flex flex-col gap-2 text-xs"></div>
            </div>
        </main>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

        // --- AUDIO ENGINE ---
        let audioCtx = null;
        
        const SFX = {
            init: () => {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
            },
            playHarvest: () => {
                if (!audioCtx) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            },
            playPing: () => {
                if (!audioCtx) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                // Add some echo/reverb conceptually by chaining delays, but keep it simple for now
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);
                osc.start();
                osc.stop(audioCtx.currentTime + 1.5);
            },
            playBassDrop: () => {
                if (!audioCtx) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.8);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.8);
            }
        };

        // Initialize audio on first user interaction
        document.body.addEventListener('click', SFX.init, { once: true });
        document.body.addEventListener('keydown', SFX.init, { once: true });

        // --- GAME CONFIG ---
        const BOUNDS = 250;
        const MAX_PARTICLES = 2500;
        const MAX_ENTITIES = 100;
        const MAX_POWER_HISTORY = 36;

        const SPECIES_SEEDS = [
            { name: 'Diatom', color: 0x00ffcc, body: 'crystal', speed: 15, drift: 0.4, fertility: 0.25, aggression: 0.05, rarity: 1 },
            { name: 'Copepod', color: 0x0088ff, body: 'shell', speed: 35, drift: 0.2, fertility: 0.15, aggression: 0.3, rarity: 1 },
            { name: 'Dinoflagellate', color: 0xff0055, body: 'whip', speed: 22, drift: 0.6, fertility: 0.2, aggression: 0.4, rarity: 1 },
            { name: 'Radiolarian', color: 0x9d00ff, body: 'spiky', speed: 12, drift: 0.1, fertility: 0.1, aggression: 0.5, rarity: 1 },
            { name: 'Rotifer', color: 0xaaff00, body: 'wheel', speed: 28, drift: 0.3, fertility: 0.3, aggression: 0.1, rarity: 1 },
            { name: 'Nematode', color: 0xffaa00, body: 'worm', speed: 18, drift: 0.5, fertility: 0.2, aggression: 0.2, rarity: 1 }
        ];

        const CARD_TYPES = [
            { type: 'Torpedo', color: 0xff0055, css: 'type-torpedo', effect: 'torpedo', desc: 'Explosive radial harvest.' },
            { type: 'Vortex', color: 0x9d00ff, css: 'type-vortex', effect: 'vortex', desc: 'Gravitational siphon.' },
            { type: 'Core Flush', color: 0x0088ff, css: 'type-sonar', effect: 'flush', desc: 'Vent core to collect all targets.' },
            { type: 'Net', color: 0x00ffcc, css: 'type-net', effect: 'net', desc: 'Tether and stall targets.' },
            { type: 'Overdrive', color: 0xffaa00, css: 'type-overdrive', effect: 'overdrive', desc: 'Triple turbine speed & range.' },
            { type: 'Synthesize', color: 0xaaff00, css: 'type-synth', effect: 'synth', desc: 'Force spawn biome anomalies.' }
        ];

        const state = {
            time: 0, collected: 0, combo: 0, sweepCharge: 0, powers: [],
            effects: { vortexUntil: 0, netUntil: 0, overdriveUntil: 0, synthUntil: 0 },
            ttsEnabled: false, isListening: false, nextSpawnAt: 0, nextMutateAt: 8, nextSpeciationAt: 20,
            entities: [], speciesCatalog: [], speciesCounter: 0,
            growthMass: 1, geneLevel: 1, harvestedParts: [], haloNodes: []
        };

        // --- THREE.JS SETUP ---
        const container = document.getElementById('three-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x010a15, 0.0035); // Deep ocean fog

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 1, 1500);
        camera.position.set(0, 150, 220);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'high-performance' });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        container.appendChild(renderer.domElement);

        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        
        // Heavy bloom for bioluminescence
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.8, 0.6, 0.85);
        bloomPass.threshold = 0.15;
        bloomPass.strength = 1.5;
        bloomPass.radius = 0.8;
        composer.addPass(bloomPass);
        composer.addPass(new OutputPass());

        // Environment styling
        const gridHelper = new THREE.GridHelper(BOUNDS * 2, 60, 0x004466, 0x001122);
        gridHelper.position.y = -20;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.4;
        scene.add(gridHelper);

        scene.add(new THREE.AmbientLight(0x001122, 1.5));

        const pointLight = new THREE.PointLight(0x00ffff, 2.0, 300);
        scene.add(pointLight);

        // Submarine Headlights
        const headLight = new THREE.SpotLight(0xaaffff, 4.0, 400, Math.PI / 4, 0.5, 1);
        headLight.castShadow = false;
        scene.add(headLight);
        scene.add(headLight.target);

        const shipData = {
            pos: new THREE.Vector3(0, 0, 0),
            vel: new THREE.Vector3(0, 0, 0),
            target: new THREE.Vector3(0, 0, 0),
            baseOrbit: 30,
            collectRadius: 22,
            vortexRadius: 80,
            rootAssembly: null,
            propeller: null,
            partGroups: []
        };

        const bioCore = new THREE.Group();
        scene.add(bioCore);

        // Particles System (Bubbles & Plankton)
        const particles = [];
        const dummy = new THREE.Object3D();
        const particleMesh = new THREE.InstancedMesh(
            new THREE.SphereGeometry(0.3, 4, 4),
            new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.8 }),
            MAX_PARTICLES
        );
        particleMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
        scene.add(particleMesh);

        // --- UTILS ---
        const synth = window.speechSynthesis;
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;

        function rand(min, max) { return Math.random() * (max - min) + min; }
        function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
        function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

        function setStatus(text, cssClass = 'text-mint') {
            const el = document.getElementById('status-text');
            el.textContent = text;
            el.className = `${cssClass} animate-pulse`;
        }

        function logComms(speaker, msg, isHighlight = false) {
            const logBox = document.getElementById('chat-log');
            const entry = document.createElement('div');
            entry.className = 'log-entry mb-2';
            const color = speaker === 'System' ? 'text-gold' : (speaker === 'Link' ? 'text-cyan' : 'text-mint');
            const textClass = isHighlight ? 'text-white font-semibold' : 'text-slate-300';
            entry.innerHTML = `<span class="font-bold ${color} text-[10px] uppercase tracking-wider">${speaker}:</span> <span class="${textClass}">${msg}</span>`;
            logBox.appendChild(entry);
            logBox.scrollTop = logBox.scrollHeight;
            while (logBox.children.length > 80) logBox.removeChild(logBox.firstChild);
        }

        function speak(text) {
            if (!state.ttsEnabled || !synth) return;
            const u = new SpeechSynthesisUtterance(text);
            u.pitch = 0.6; // Deeper, robotic voice
            u.rate = 1.1;
            synth.speak(u);
        }

        // --- ORGANISM LOGIC ---
        function seededSpecies(seed) {
            state.speciesCounter += 1;
            return {
                id: `sp-${state.speciesCounter}`, name: `${seed.name}-${state.speciesCounter}`,
                color: seed.color, body: seed.body, speed: seed.speed, drift: seed.drift,
                fertility: seed.fertility, aggression: seed.aggression, rarity: seed.rarity,
                generation: 1, births: 0, harvested: 0, mutations: 0
            };
        }

        function mutateSpecies(base) {
            state.speciesCounter += 1;
            const hue = new THREE.Color(base.color);
            hue.offsetHSL(rand(-0.1, 0.1), 0, rand(-0.1, 0.1));
            const bodies = ['crystal', 'shell', 'whip', 'spiky', 'wheel', 'worm'];
            return {
                ...base, id: `sp-${state.speciesCounter}`, name: `${base.name.split('-')[0]} v${state.speciesCounter}`,
                color: hue.getHex(),
                body: Math.random() < 0.3 ? pick(bodies) : base.body,
                speed: clamp(base.speed + rand(-5, 5), 10, 45),
                drift: clamp(base.drift + rand(-0.15, 0.15), 0.05, 0.8),
                fertility: clamp(base.fertility + rand(-0.05, 0.08), 0.05, 0.4),
                aggression: clamp(base.aggression + rand(-0.1, 0.15), 0.05, 0.6),
                generation: base.generation + 1, births: 0, harvested: 0, mutations: (base.mutations || 0) + 1
            };
        }

        function createBodyGeometry(kind, scale = 1) {
            if (kind === 'crystal') return new THREE.OctahedronGeometry(1.8 * scale, 0);
            if (kind === 'shell') return new THREE.TorusGeometry(1.5 * scale, 0.8 * scale, 8, 12);
            if (kind === 'whip') return new THREE.CylinderGeometry(0.2 * scale, 1.2 * scale, 6 * scale, 6);
            if (kind === 'spiky') return new THREE.IcosahedronGeometry(2.0 * scale, 0);
            if (kind === 'wheel') return new THREE.TorusKnotGeometry(1.2 * scale, 0.3 * scale, 32, 6);
            if (kind === 'worm') return new THREE.CapsuleGeometry(0.8 * scale, 5 * scale, 4, 8);
            return new THREE.SphereGeometry(1.5 * scale, 8, 8);
        }

        function createBioMaterial(color) {
            return new THREE.MeshStandardMaterial({
                color, emissive: color, emissiveIntensity: 0.6,
                roughness: 0.2, metalness: 0.1, transparent: true, opacity: 0.9
            });
        }

        function buildCreatureMesh(species, mass = 1) {
            const g = new THREE.Group();
            const main = new THREE.Mesh(createBodyGeometry(species.body, 0.8 + mass * 0.2), createBioMaterial(species.color));
            main.rotation.z = rand(-0.4, 0.4);
            g.add(main);

            // Cilia / Appendages
            const appendages = Math.floor(2 + mass * 1.5 + species.generation * 0.3);
            for (let i = 0; i < appendages; i++) {
                const limb = new THREE.Mesh(createBodyGeometry('whip', rand(0.2, 0.4)), createBioMaterial(species.color));
                const a = (Math.PI * 2 * i) / appendages;
                limb.position.set(Math.cos(a) * rand(1, 3), rand(-1, 1), Math.sin(a) * rand(1, 3));
                limb.rotation.set(rand(-1.5, 1.5), rand(-1.5, 1.5), rand(-1.5, 1.5));
                g.add(limb);
            }
            return g;
        }

        function createSpeciesEntity(species, inherited = false) {
            const mass = rand(0.5, 1.5) + species.generation * 0.1;
            const mesh = buildCreatureMesh(species, mass);
            mesh.position.set(rand(-BOUNDS, BOUNDS), rand(-10, 30), rand(-BOUNDS, BOUNDS));
            scene.add(mesh);

            const dir = new THREE.Vector3(rand(-1, 1), rand(-0.2, 0.2), rand(-1, 1)).normalize();
            const entity = {
                id: Math.random().toString(36).slice(2),
                kind: 'microbe', speciesId: species.id, speciesName: species.name, species,
                mesh, pos: mesh.position, vel: dir.multiplyScalar(species.speed * 0.15),
                energy: rand(50, 100), age: 0, mass, phase: rand(0, Math.PI * 2),
                collected: false, visualRemoved: false, power: pick(CARD_TYPES),
                partKind: pick(['thruster', 'sensor', 'plating', 'drill'])
            };
            
            state.entities.push(entity);
            if (!inherited) species.births += 1;
            return entity;
        }

        // --- SUBMARINE (PLAYER) ---
        function createShipAssembly() {
            bioCore.clear();
            shipData.partGroups = [];

            const hullMat = new THREE.MeshStandardMaterial({
                color: 0xffaa00, emissive: 0x331100, emissiveIntensity: 0.2,
                roughness: 0.4, metalness: 0.8
            });
            const glassMat = new THREE.MeshPhysicalMaterial({
                color: 0x00ffff, transmission: 0.9, opacity: 1, metalness: 0.1, roughness: 0.1, ior: 1.5
            });

            const root = new THREE.Group();
            
            // Main Cylinder Hull
            const hull = new THREE.Mesh(new THREE.CylinderGeometry(4, 4, 18, 16), hullMat);
            hull.rotation.z = Math.PI / 2;
            root.add(hull);

            // Front Glass Dome
            const dome = new THREE.Mesh(new THREE.SphereGeometry(3.9, 16, 16, 0, Math.PI * 2, 0, Math.PI / 2), glassMat);
            dome.rotation.z = -Math.PI / 2;
            dome.position.set(9, 0, 0);
            root.add(dome);

            // Tail
            const tail = new THREE.Mesh(new THREE.ConeGeometry(3.5, 8, 8), hullMat);
            tail.rotation.z = -Math.PI / 2;
            tail.position.set(-13, 0, 0);
            root.add(tail);

            // Propeller
            const propGroup = new THREE.Group();
            for(let i=0; i<3; i++) {
                const blade = new THREE.Mesh(new THREE.BoxGeometry(0.5, 6, 1.5), new THREE.MeshStandardMaterial({color: 0x555555, metalness: 0.9}));
                blade.rotation.x = (Math.PI * 2 / 3) * i;
                propGroup.add(blade);
            }
            propGroup.position.set(-17.5, 0, 0);
            root.add(propGroup);
            shipData.propeller = propGroup;

            bioCore.add(root);
            shipData.rootAssembly = root;
        }

        function createMechPartGeometry(kind) {
            if (kind === 'thruster') return new THREE.CylinderGeometry(1, 1.5, 4, 8);
            if (kind === 'sensor') return new THREE.TorusGeometry(1.5, 0.4, 8, 12);
            if (kind === 'plating') return new THREE.BoxGeometry(3, 0.5, 4);
            if (kind === 'drill') return new THREE.ConeGeometry(1, 5, 8);
            return new THREE.BoxGeometry(2, 2, 2);
        }

        function addHarvestedPart(partKind, color, powerEffect) {
            if (!shipData.rootAssembly) return;
            
            // Generate mechanical colored parts instead of pure bio
            const mechColor = new THREE.Color(color).lerp(new THREE.Color(0x888888), 0.5);
            const partMat = new THREE.MeshStandardMaterial({
                color: mechColor, emissive: color, emissiveIntensity: 0.4, roughness: 0.5, metalness: 0.7
            });

            const part = new THREE.Mesh(createMechPartGeometry(partKind), partMat);
            const slot = shipData.partGroups.length;
            const ring = 6 + Math.floor(slot / 6) * 4;
            const a = slot * 1.04;
            
            part.position.set(rand(-6, 6), Math.cos(a) * ring, Math.sin(a) * ring);
            part.rotation.set(rand(-0.5, 0.5), rand(-0.5, 0.5), rand(-0.5, 0.5));
            if (partKind === 'drill') part.rotation.z = -Math.PI/2;
            
            part.userData = { slot, pulse: rand(0, Math.PI * 2), effect: powerEffect };
            shipData.rootAssembly.add(part);
            shipData.partGroups.push(part);
            
            state.harvestedParts.push({ partKind, color, powerEffect });

            // Evolve ship stats
            const growthFactor = 1 + shipData.partGroups.length * 0.01;
            shipData.rootAssembly.scale.setScalar(growthFactor);
            shipData.collectRadius = 22 + Math.min(25, shipData.partGroups.length * 0.25);
            shipData.vortexRadius = 80 + Math.min(100, shipData.partGroups.length * 1.5);
            
            state.growthMass = (1 + shipData.partGroups.length * 0.08).toFixed(1);
            state.geneLevel = 1 + Math.floor(shipData.partGroups.length / 5);
        }

        // --- PARTICLES & EFFECTS ---
        function emitParticles(pos, colorValue, count = 10, isBubble = false) {
            const color = new THREE.Color(colorValue);
            for (let i = 0; i < count; i++) {
                if (particles.length >= MAX_PARTICLES) break;
                particles.push({
                    pos: pos.clone(),
                    vel: new THREE.Vector3(rand(-2, 2), isBubble ? rand(2, 6) : rand(-2, 2), rand(-2, 2)),
                    life: 1,
                    color,
                    isBubble
                });
            }
        }

        function updateParticles(dt) {
            let activeCount = 0;
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.life -= dt * (p.isBubble ? 0.5 : 1.2);
                if (p.life <= 0) {
                    particles.splice(i, 1);
                    continue;
                }
                
                // Bubbles drift up, debris spreads
                if (p.isBubble) {
                    p.vel.y += dt * 5;
                    p.vel.x += Math.sin(state.time * 5 + p.life) * dt * 2;
                }
                
                p.pos.addScaledVector(p.vel, dt * (p.isBubble ? 5 : 40));
                
                dummy.position.copy(p.pos);
                dummy.scale.setScalar(Math.max(0.1, p.life * (p.isBubble ? 1.5 : 0.8)));
                dummy.updateMatrix();
                
                particleMesh.setMatrixAt(activeCount, dummy.matrix);
                particleMesh.setColorAt(activeCount, p.color);
                activeCount++;
            }
            particleMesh.count = activeCount;
            particleMesh.instanceMatrix.needsUpdate = true;
            if (particleMesh.instanceColor) particleMesh.instanceColor.needsUpdate = true;
        }

        // --- GAMEPLAY LOOP ---
        function collectEntity(entity, source = 'auto') {
            if (entity.collected) return;
            entity.collected = true;
            state.collected++;
            state.combo++;
            state.sweepCharge = Math.min(100, state.sweepCharge + 5 + entity.mass * 2);
            
            emitParticles(entity.mesh.position, entity.species.color, 25, false);
            emitParticles(entity.mesh.position, 0xffffff, 10, true);
            SFX.playHarvest();

            state.powers.unshift({
                id: entity.id, name: `${entity.power.type} Module`, effect: entity.power.effect,
                css: entity.power.css, desc: `${entity.power.desc} Sourced from ${entity.speciesName}.`, used: false
            });
            state.powers = state.powers.slice(0, MAX_POWER_HISTORY);
            
            entity.species.harvested += 1;
            addHarvestedPart(entity.partKind, entity.species.color, entity.power.effect);
            
            // Add to "towed array" (halo)
            state.haloNodes.push({ entity, phase: rand(0, Math.PI * 2) });
            if (state.haloNodes.length > 20) {
                const removed = state.haloNodes.shift();
                if (removed && removed.entity && !removed.entity.visualRemoved) {
                    removed.entity.visualRemoved = true;
                    scene.remove(removed.entity.mesh);
                }
            }
            
            renderPowers();
            renderSpecies();
            updateUI();
            if (source !== 'auto') logComms('Link', `Biomass ${entity.speciesName} assimilated via ${source}.`);
        }

        function bestTarget() {
            const loose = state.entities.filter(e => !e.collected);
            if (!loose.length) return new THREE.Vector3(0, 0, 0);
            let best = null;
            let bestScore = -Infinity;
            for (const e of loose) {
                let score = e.energy * 0.02 + e.mass * 0.5 + e.species.generation * 0.6;
                const distToShip = shipData.pos.distanceTo(e.pos);
                score += Math.max(0, 1 - distToShip / 200) * 3;
                if (score > bestScore) {
                    bestScore = score;
                    best = e.pos.clone();
                }
            }
            return best || new THREE.Vector3(0, 0, 0);
        }

        function evolveWorld(dt) {
            // Ambient bubble generation
            if (Math.random() < 0.2) {
                emitParticles(new THREE.Vector3(rand(-BOUNDS, BOUNDS), -30, rand(-BOUNDS, BOUNDS)), 0xaaaaaa, 1, true);
            }

            if (state.time >= state.nextMutateAt) {
                state.nextMutateAt = state.time + rand(7, 12);
                const base = pick(state.speciesCatalog);
                const mutant = mutateSpecies(base);
                state.speciesCatalog.push(mutant);
                logComms('System', `Anomaly detected: ${mutant.name} exhibiting novel ${mutant.body} traits.`);
                for (let i = 0; i < 2 + Math.floor(mutant.generation / 2); i++) createSpeciesEntity(mutant, true);
                renderSpecies();
            }

            if (state.time >= state.nextSpeciationAt && state.speciesCatalog.length < 16) {
                state.nextSpeciationAt = state.time + rand(18, 28);
                const seed = mutateSpecies(pick(state.speciesCatalog));
                state.speciesCatalog.push(seed);
                logComms('System', `Mass speciation: ${seed.name} lineage confirmed.`);
                renderSpecies();
            }

            const netOn = state.time < state.effects.netUntil;
            const synthOn = state.time < state.effects.synthUntil;

            for (const e of state.entities) {
                if (e.collected) continue;
                e.age += dt;
                e.energy -= dt * (0.4 + e.species.speed * 0.01);
                e.phase += dt * (0.6 + e.species.drift * 1.5);
                
                e.mesh.rotation.x += dt * 0.5;
                e.mesh.rotation.y += dt * (0.5 + e.species.drift);
                
                // Fluid up/down bobbing
                e.mesh.position.y += Math.sin(state.time * 2 + e.phase) * dt * 2;

                if (!netOn) {
                    const noise = new THREE.Vector3(
                        Math.sin(e.phase) * e.species.drift,
                        Math.cos(e.phase * 0.8) * e.species.drift * 0.5,
                        Math.cos(e.phase * 1.2) * e.species.drift
                    );
                    e.vel.addScaledVector(noise, dt * 6);
                    e.vel.clampLength(0, e.species.speed * 0.4);
                    e.pos.addScaledVector(e.vel, dt);
                }

                if (Math.abs(e.pos.x) > BOUNDS) e.vel.x *= -1;
                if (Math.abs(e.pos.z) > BOUNDS) e.vel.z *= -1;
                if (e.pos.y > 100) e.vel.y -= dt * 5;
                if (e.pos.y < -30) e.vel.y += dt * 5;
                
                e.pos.clamp(new THREE.Vector3(-BOUNDS, -40, -BOUNDS), new THREE.Vector3(BOUNDS, 120, BOUNDS));

                if (Math.random() < (e.species.fertility + (synthOn ? 0.08 : 0)) * dt * 0.12 && state.entities.filter(x => !x.collected).length < MAX_ENTITIES) {
                    const childSpecies = Math.random() < 0.15 ? mutateSpecies(e.species) : e.species;
                    if (!state.speciesCatalog.find(s => s.id === childSpecies.id)) state.speciesCatalog.push(childSpecies);
                    const child = createSpeciesEntity(childSpecies);
                    child.pos.copy(e.pos.clone().add(new THREE.Vector3(rand(-4,4), rand(-4,4), rand(-4,4))));
                }
            }

            const live = state.entities.filter(e => !e.collected);
            for (const e of live) {
                if (e.energy <= 0) collectEntity(e, 'decay');
            }
        }

        function autopilot(dt) {
            shipData.target = bestTarget();
            const dir = shipData.target.clone().sub(shipData.pos);
            const dist = dir.length();
            
            const overdriveOn = state.time < state.effects.overdriveUntil;
            let speedMult = overdriveOn ? 3.5 : 1.0;

            if (dist > 0.1) {
                const speed = clamp(20 + state.geneLevel * 2.5 + dist * 0.15, 20, 120) * speedMult;
                dir.normalize().multiplyScalar(speed);
                shipData.vel.lerp(dir, 0.05);
            }

            shipData.pos.addScaledVector(shipData.vel, dt);
            shipData.pos.clamp(new THREE.Vector3(-BOUNDS, -20, -BOUNDS), new THREE.Vector3(BOUNDS, 100, BOUNDS));

            bioCore.position.copy(shipData.pos);
            bioCore.position.y += Math.sin(state.time * 1.5) * 1.5;

            // Rotate Submarine to face velocity
            if (shipData.vel.lengthSq() > 0.1) {
                const targetRotation = Math.atan2(shipData.vel.x, shipData.vel.z);
                
                // Pitch based on vertical velocity
                const pitch = Math.asin(clamp(-shipData.vel.y / shipData.vel.length(), -0.5, 0.5));
                
                bioCore.rotation.y = targetRotation;
                shipData.rootAssembly.rotation.z = pitch;
            }

            // Spin propeller
            if (shipData.propeller) {
                shipData.propeller.rotation.x += dt * shipData.vel.length() * 0.5;
                emitParticles(bioCore.position.clone().add(new THREE.Vector3(-15,0,0).applyEuler(bioCore.rotation)), 0xffffff, 1, true);
            }

            // Headlight follows sub
            pointLight.position.copy(bioCore.position);
            headLight.position.copy(bioCore.position);
            headLight.position.y += 2;
            headLight.target.position.copy(bioCore.position).add(shipData.vel.clone().normalize().multiplyScalar(50));

            const vortexOn = state.time < state.effects.vortexUntil;
            const collectRadius = shipData.collectRadius * (overdriveOn ? 2 : 1);
            const vortexRadius = shipData.vortexRadius + (vortexOn ? 120 : 0);

            for (const e of state.entities) {
                if (e.collected) continue;
                const d = e.pos.distanceTo(shipData.pos);
                if (d < vortexRadius) {
                    const pull = shipData.pos.clone().sub(e.pos).normalize().multiplyScalar((vortexOn ? 1.2 : 0.1) * Math.max(0.1, 1 - d / vortexRadius));
                    e.vel.add(pull);
                }
                if (d < collectRadius) collectEntity(e);
            }

            // Animate mechanical parts
            for (const part of shipData.partGroups) {
                part.userData.pulse += dt * 3;
                if (part.geometry.type === 'TorusGeometry') {
                    part.rotation.y += dt * 2; // Spin sensors
                } else if (part.geometry.type === 'ConeGeometry') {
                    part.rotation.x += dt * 5; // Spin drills
                }
            }
        }

        function updateHalo(dt) {
            const orbitR = shipData.baseOrbit;
            state.haloNodes.forEach((hn, i) => {
                if (hn.entity.visualRemoved) return;
                hn.phase += dt * 1.2;
                const r = orbitR + (i % 4) * 5;
                hn.entity.mesh.position.x = shipData.pos.x + Math.cos(hn.phase + i * 0.8) * r;
                hn.entity.mesh.position.z = shipData.pos.z + Math.sin(hn.phase + i * 0.8) * r;
                hn.entity.mesh.position.y = bioCore.position.y + Math.sin(state.time * 3 + i) * 4;
            });
        }

        function executePower(effectType, source = 'manual') {
            SFX.init();
            const powerIdx = state.powers.findIndex(p => p.effect === effectType && !p.used);
            
            if (powerIdx === -1 && effectType !== 'flush') {
                logComms('System', `No ${effectType.toUpperCase()} module loaded.`);
                return false;
            }
            if (effectType === 'flush' && powerIdx === -1 && state.sweepCharge < 100) {
                logComms('System', 'Core charge insufficient for flush.');
                return false;
            }

            if (powerIdx !== -1) state.powers[powerIdx].used = true;
            let successMsg = '';

            SFX.playBassDrop();

            if (effectType === 'torpedo') {
                let hits = 0;
                state.entities.forEach(e => {
                    if (!e.collected && e.pos.distanceTo(shipData.pos) < 120) {
                        collectEntity(e, source);
                        hits++;
                    }
                });
                emitParticles(shipData.pos, 0xff0055, 80);
                successMsg = `Torpedo detonated. Yield: ${hits} units.`;
            } else if (effectType === 'vortex') {
                state.effects.vortexUntil = state.time + 8;
                successMsg = 'Gravitational vortex engaged.';
            } else if (effectType === 'flush') {
                state.entities.forEach(e => { if (!e.collected) collectEntity(e, source); });
                state.sweepCharge = 0;
                successMsg = 'Core vented. Sector cleared.';
            } else if (effectType === 'net') {
                state.effects.netUntil = state.time + 6;
                successMsg = 'Electro-net deployed. Targets stalled.';
            } else if (effectType === 'overdrive') {
                state.effects.overdriveUntil = state.time + 5;
                successMsg = 'Turbine overdrive. Max velocity.';
            } else if (effectType === 'synth') {
                state.effects.synthUntil = state.time + 12;
                SFX.playPing();
                for (let i = 0; i < 5; i++) {
                    const base = pick(state.speciesCatalog);
                    const mutant = mutateSpecies(base);
                    state.speciesCatalog.push(mutant);
                    createSpeciesEntity(mutant, true);
                }
                addHarvestedPart(pick(['sensor','plating']), 0xaaff00, 'synth');
                successMsg = 'Forced synthesis routine complete.';
            }

            logComms('Operator', successMsg, true);
            speak(successMsg);
            renderPowers();
            renderSpecies();
            updateUI();
            return true;
        }

        function parseCommand(raw, source = 'manual') {
            const lower = raw.toLowerCase();
            if (lower.includes('torpedo') || lower.includes('explode')) return executePower('torpedo', source);
            if (lower.includes('vortex') || lower.includes('pull') || lower.includes('suck')) return executePower('vortex', source);
            if (lower.includes('flush') || lower.includes('clear')) return executePower('flush', source);
            if (lower.includes('net') || lower.includes('stop') || lower.includes('freeze')) return executePower('net', source);
            if (lower.includes('overdrive') || lower.includes('speed')) return executePower('overdrive', source);
            if (lower.includes('synth') || lower.includes('spawn') || lower.includes('evolve')) return executePower('synth', source);
            if (lower.includes('sonar')) {
                SFX.playPing();
                logComms('System', 'Sonar ping emitted. Mapping sector...');
                return true;
            }
            logComms('System', 'Command unknown. Valid: sonar, vortex, overdrive, net, torpedo, synth, flush.');
            return false;
        }

        function updateUI() {
            const loose = state.entities.reduce((acc, e) => acc + (e.collected ? 0 : 1), 0);
            document.getElementById('ui-collected').textContent = String(state.collected);
            document.getElementById('ui-loose').textContent = String(loose);
            document.getElementById('ui-mass').textContent = String(state.growthMass);
            document.getElementById('ui-gene').textContent = String(state.geneLevel);
            document.getElementById('ui-sweep').textContent = `${Math.floor(state.sweepCharge)}%`;
        }

        function renderPowers() {
            const list = document.getElementById('powers-list');
            list.innerHTML = '';
            const activePowers = state.powers.filter(p => !p.used).slice(0, 10);
            
            if (!activePowers.length) {
                list.innerHTML = '<div class="text-[10px] text-slate-500 text-center mt-10">Systems offline. Harvest biomass to synthesize modules.</div>';
                return;
            }
            
            activePowers.forEach(power => {
                const el = document.createElement('div');
                el.className = `card-item p-2 rounded-lg border-b border-r border-t border-slate-700 bg-slate-800/80 text-xs ${power.css}`;
                el.innerHTML = `
                    <div class="flex justify-between font-bold">
                        <span>${power.name}</span>
                        <span class="font-mono text-[9px] text-slate-400 border border-slate-600 px-1 rounded">READY</span>
                    </div>
                    <div class="text-[10px] text-slate-400 mt-1">${power.desc}</div>
                `;
                el.onclick = () => executePower(power.effect, 'manual');
                list.appendChild(el);
            });
        }

        function renderSpecies() {
            const lab = document.getElementById('species-list');
            lab.innerHTML = '';
            const lines = [...state.speciesCatalog]
                .sort((a, b) => (b.generation + b.births * 0.1) - (a.generation + a.births * 0.1))
                .slice(0, 12);
                
            if (!lines.length) return;
            
            lines.forEach(sp => {
                const live = state.entities.filter(e => !e.collected && e.speciesId === sp.id).length;
                const row = document.createElement('div');
                row.className = 'p-2 rounded-lg border border-slate-700 bg-slate-900/70 relative overflow-hidden';
                row.innerHTML = `
                    <div class="absolute left-0 top-0 bottom-0 w-1" style="background-color:#${sp.color.toString(16).padStart(6,'0')}"></div>
                    <div class="pl-2 flex justify-between items-center">
                        <span class="font-semibold" style="color:#${sp.color.toString(16).padStart(6,'0')}">${sp.name}</span>
                        <span class="text-[10px] text-slate-400">TIER ${sp.generation}</span>
                    </div>
                    <div class="pl-2 mt-1 text-[10px] text-slate-400">${sp.body.toUpperCase()} • ACTIVE: ${live} • ASSIMILATED: ${sp.harvested}</div>
                `;
                lab.appendChild(row);
            });
        }

        function initField() {
            createShipAssembly();
            state.speciesCatalog = SPECIES_SEEDS.map(seededSpecies);
            state.speciesCatalog.forEach(sp => {
                const n = 8 + Math.floor(rand(0, 6));
                for (let i = 0; i < n; i++) createSpeciesEntity(sp);
            });
            
            // Starter Tech
            addHarvestedPart('sensor', 0x00ffcc, 'net');
            addHarvestedPart('thruster', 0xffaa00, 'overdrive');
            
            logComms('System', 'Submersible OS initialized. Scanning abyssal zone.');
            renderPowers();
            renderSpecies();
            updateUI();
        }

        // Voice API
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = false;
            recognition.onstart = () => {
                state.isListening = true;
                document.getElementById('mic-btn').classList.add('bg-rose-600', 'animate-pulse');
                setStatus('VOICE REC ACTIVE', 'text-rose');
            };
            recognition.onend = () => {
                state.isListening = false;
                document.getElementById('mic-btn').classList.remove('bg-rose-600', 'animate-pulse');
                setStatus('SONAR ACTIVE', 'text-mint');
            };
            recognition.onerror = event => {
                logComms('System', `Comms error: ${event.error}`);
                setStatus('COMMS ERROR', 'text-rose');
            };
            recognition.onresult = event => {
                const transcript = event.results[event.results.length - 1][0].transcript.trim();
                logComms('Operator (Voice)', `"${transcript}"`);
                parseCommand(transcript, 'voice');
            };
        }

        // Listeners
        document.getElementById('mic-btn').addEventListener('click', () => {
            SFX.init();
            if (!recognition) return logComms('System', 'Voice link not supported.');
            if (state.isListening) recognition.stop();
            else recognition.start();
        });

        document.getElementById('tts-btn').addEventListener('click', e => {
            SFX.init();
            state.ttsEnabled = !state.ttsEnabled;
            const btn = e.currentTarget;
            const knob = btn.children[0];
            if (state.ttsEnabled) {
                btn.classList.replace('bg-slate-600', 'bg-cyan-600');
                knob.classList.replace('right-5', 'right-1');
                speak('Audio logs enabled.');
            } else {
                btn.classList.replace('bg-cyan-600', 'bg-slate-600');
                knob.classList.replace('right-1', 'right-5');
                if (synth) synth.cancel();
            }
        });

        document.getElementById('chat-input').addEventListener('keypress', e => {
            if (e.key !== 'Enter') return;
            const val = e.target.value.trim();
            if (!val) return;
            logComms('Operator (Text)', val);
            e.target.value = '';
            parseCommand(val, 'text');
        });

        // Main Loop
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.1);
            state.time += dt;
            
            evolveWorld(dt);
            autopilot(dt);
            updateHalo(dt);
            updateParticles(dt);
            
            if (state.entities.filter(e => !e.collected).length < 30 && state.time >= state.nextSpawnAt) {
                createSpeciesEntity(pick(state.speciesCatalog));
                state.nextSpawnAt = state.time + 0.25;
            }
            
            composer.render();
            updateUI();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        initField();
        animate();
    </script>
</body>
</html>
