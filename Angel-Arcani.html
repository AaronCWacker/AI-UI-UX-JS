<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Angels of the Tarot — Statuary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --void: #08051c;
    --gold: #c8a154;
    --gold-bright: #ffd870;
    --vellum: #f0e2b8;
    --vellum-dim: rgba(240, 226, 184, 0.55);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: var(--void);
    font-family: 'Cormorant Garamond', Georgia, serif;
    color: var(--vellum);
    user-select: none; -webkit-user-select: none;
  }
  #canvas { display: block; width: 100%; height: 100%; cursor: grab; }
  #canvas:active { cursor: grabbing; }

  .vignette {
    position: fixed; inset: 0; pointer-events: none; z-index: 2;
    background:
      radial-gradient(ellipse at center, transparent 35%, rgba(8,5,28,0.75) 100%),
      linear-gradient(180deg, rgba(8,5,28,0.5) 0%, transparent 18%, transparent 82%, rgba(8,5,28,0.5) 100%);
  }

  #title {
    position: fixed; top: 32px; left: 50%; transform: translateX(-50%);
    text-align: center; pointer-events: none; z-index: 10;
    opacity: 0; animation: fadeIn 2.5s ease 4s forwards;
  }
  #title h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.1rem, 2.2vw, 1.6rem);
    font-weight: 400; letter-spacing: 0.55em;
    color: var(--vellum);
    text-shadow: 0 0 30px rgba(255, 216, 112, 0.4);
    padding-left: 0.55em;
  }
  #title .rule { width: 60px; height: 1px; background: var(--gold); margin: 14px auto 12px; opacity: 0.6; }
  #title .sub {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem; letter-spacing: 0.5em; opacity: 0.55;
    padding-left: 0.5em;
  }

  #roster {
    position: fixed; top: 50%; left: 32px; transform: translateY(-50%);
    z-index: 10; opacity: 0; animation: fadeIn 2.5s ease 5s forwards;
  }
  #roster .name {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem; letter-spacing: 0.4em;
    padding: 14px 0 14px 18px;
    border-left: 1px solid rgba(200, 161, 84, 0.3);
    color: var(--vellum-dim);
    margin: 8px 0; cursor: pointer;
    transition: all 0.4s ease;
    pointer-events: auto;
  }
  #roster .name:hover { color: var(--vellum); border-left-color: var(--gold); }
  #roster .name.active {
    color: var(--gold-bright); border-left-color: var(--gold-bright);
    text-shadow: 0 0 16px rgba(255, 216, 112, 0.5);
    padding-left: 24px;
  }
  #roster .name .num { font-size: 0.55rem; opacity: 0.5; margin-right: 8px; }

  #panel {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px);
    width: min(640px, calc(100% - 64px));
    padding: 26px 36px 30px;
    background: rgba(10, 6, 28, 0.82);
    border: 1px solid rgba(200, 161, 84, 0.35);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    z-index: 10;
    opacity: 0; pointer-events: none;
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  #panel.active { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
  #panel::before, #panel::after {
    content: ''; position: absolute; width: 14px; height: 14px;
    border: 1px solid var(--gold); opacity: 0.7;
  }
  #panel::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
  #panel::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }
  #panel .heading {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 6px; flex-wrap: wrap; gap: 12px;
  }
  #panel h2 {
    font-family: 'Cinzel', serif; font-size: 1.25rem; font-weight: 500;
    letter-spacing: 0.35em; color: var(--gold-bright);
  }
  #panel .hebrew {
    font-size: 1.4rem; color: var(--vellum-dim);
    font-family: 'Cormorant Garamond', serif;
  }
  #panel .sub {
    font-family: 'Cinzel', serif; font-size: 0.65rem;
    letter-spacing: 0.4em; opacity: 0.6; margin-bottom: 18px;
  }
  #panel p.text {
    font-size: 1.05rem; line-height: 1.65;
    font-style: italic; font-weight: 300;
    color: rgba(240, 226, 184, 0.92);
  }
  #panel p.text::first-letter {
    font-family: 'Cinzel', serif; font-style: normal;
    font-size: 1.6rem; color: var(--gold-bright); margin-right: 2px;
  }

  #hint {
    position: fixed; bottom: 22px; right: 28px;
    font-family: 'Cinzel', serif;
    font-size: 0.55rem; letter-spacing: 0.35em;
    opacity: 0; pointer-events: none; z-index: 5;
    animation: fadeIn 2.5s ease 6s forwards;
  }

  @keyframes fadeIn { to { opacity: 1; } }
  #hint { animation-fill-mode: forwards; }
  #hint.show { opacity: 0.35; }

  @media (max-width: 720px) {
    #title h1 { letter-spacing: 0.4em; }
    #title .sub { letter-spacing: 0.35em; }
    #roster { left: 16px; }
    #roster .name { font-size: 0.6rem; padding-left: 12px; }
    #panel { padding: 20px 24px; }
    #panel h2 { font-size: 1rem; letter-spacing: 0.25em; }
    #panel p.text { font-size: 0.95rem; }
    #hint { display: none; }
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div class="vignette"></div>

<div id="title">
  <h1>ANGELI ARCANI</h1>
  <div class="rule"></div>
  <div class="sub">THE HERALDS OF THE MAJOR ARCANA</div>
</div>

<div id="roster">
  <div class="name" data-angel="0"><span class="num">VI</span>RAPHAEL</div>
  <div class="name" data-angel="1"><span class="num">XIV</span>MICHAEL</div>
  <div class="name" data-angel="2"><span class="num">XX</span>GABRIEL</div>
</div>

<div id="panel">
  <div class="heading">
    <h2 id="panel-name"></h2>
    <span class="hebrew" id="panel-hebrew"></span>
  </div>
  <div class="sub" id="panel-sub"></div>
  <p class="text" id="panel-text"></p>
</div>

<div id="hint" class="show">DRAG TO ORBIT &nbsp;·&nbsp; CLICK AN ANGEL</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
//   ANGELS OF THE TAROT — STATUARY EDITION
//   Built to the 8-head canon of classical statuary.
//   Bodies are LatheGeometry profiles + ellipsoid torsos +
//   tube-curve arms + ShapeGeometry feathered wings.
//   Robe folds are vertex displacements applied after
//   lathe generation. Halos cast volumetric rays.
// ============================================================

const canvas = document.getElementById('canvas');
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x08051c, 0.028);

const camera = new THREE.PerspectiveCamera(46, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 3, 14);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x08051c, 1);
renderer.outputEncoding = THREE.sRGBEncoding;

// ---------- LIGHTING (3-point sculptural setup) ----------
scene.add(new THREE.AmbientLight(0x3a3050, 0.35));

// Key light (heavenly, warm) — slightly above and to the side
const keyLight = new THREE.DirectionalLight(0xfff0d4, 0.85);
keyLight.position.set(5, 10, 4);
scene.add(keyLight);

// Fill (cool, soft) — from below opposite side
const fillLight = new THREE.DirectionalLight(0x7090d0, 0.4);
fillLight.position.set(-6, 3, -2);
scene.add(fillLight);

// Rim light (back-light to separate figure from background)
const rimLight = new THREE.DirectionalLight(0xc8b884, 0.55);
rimLight.position.set(0, 6, -8);
scene.add(rimLight);

// Hemisphere for ambient occlusion feel
const hemi = new THREE.HemisphereLight(0x6080a0, 0x301840, 0.25);
scene.add(hemi);

// ---------- STARFIELD ----------
function createStarfield(count, innerR, outerR) {
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count * 3);
  const col = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    const r = innerR + Math.random() * (outerR - innerR);
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    pos[i*3] = r * Math.sin(phi) * Math.cos(theta);
    pos[i*3+1] = r * Math.cos(phi);
    pos[i*3+2] = r * Math.sin(phi) * Math.sin(theta);
    const c = 0.55 + Math.random() * 0.45;
    const warm = Math.random();
    col[i*3]   = c * (warm < 0.6 ? 1 : 0.85);
    col[i*3+1] = c * (warm < 0.3 ? 0.85 : 0.95);
    col[i*3+2] = c * (warm < 0.6 ? 0.85 : 1);
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
  return new THREE.Points(geo, new THREE.PointsMaterial({
    size: 0.14, vertexColors: true, transparent: true, opacity: 0.95,
    blending: THREE.AdditiveBlending, sizeAttenuation: true, depthWrite: false
  }));
}
scene.add(createStarfield(2200, 28, 70));

// Nebula sprites
function makeRadialSprite(color, scale, position, opacity = 0.45) {
  const size = 256;
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  const grad = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
  grad.addColorStop(0, color);
  grad.addColorStop(0.35, color.replace(/,\s*\d?\.?\d+\)/, ',0.5)'));
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, size, size);
  const tex = new THREE.CanvasTexture(c);
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({
    map: tex, transparent: true, opacity,
    blending: THREE.AdditiveBlending, depthWrite: false
  }));
  sprite.scale.set(scale, scale, 1);
  sprite.position.copy(position);
  return sprite;
}
scene.add(makeRadialSprite('rgba(80, 130, 90, 1)',  30, new THREE.Vector3(-16,  4, -28)));  // emerald glow
scene.add(makeRadialSprite('rgba(190, 110, 70, 1)', 24, new THREE.Vector3( 18, -2, -30)));  // ember
scene.add(makeRadialSprite('rgba(100, 130, 200, 1)', 26, new THREE.Vector3(  3, 13, -32)));  // moon-silver

// ---------- SACRED FLOOR ----------
function createSacredFloor() {
  const group = new THREE.Group();
  // Faint disc
  const disc = new THREE.Mesh(
    new THREE.CircleGeometry(13, 64),
    new THREE.MeshBasicMaterial({ color: 0x0d0828, transparent: true, opacity: 0.85, side: THREE.DoubleSide })
  );
  disc.rotation.x = -Math.PI / 2;
  group.add(disc);
  // Concentric gold rings
  function ring(r, opacity) {
    const m = new THREE.Mesh(
      new THREE.RingGeometry(r, r + 0.022, 96),
      new THREE.MeshBasicMaterial({
        color: 0xc8a154, transparent: true, opacity,
        side: THREE.DoubleSide, blending: THREE.AdditiveBlending, depthWrite: false
      })
    );
    m.rotation.x = -Math.PI / 2;
    return m;
  }
  group.add(ring(8.5, 0.55));
  group.add(ring(8.1, 0.22));
  group.add(ring(3.1, 0.4));
  // Hexagram
  function triPts(rot, r) {
    const p = [];
    for (let i = 0; i <= 3; i++) {
      const a = rot + i * Math.PI * 2 / 3;
      p.push(new THREE.Vector3(Math.cos(a) * r, 0, Math.sin(a) * r));
    }
    return p;
  }
  const triMat = new THREE.LineBasicMaterial({ color: 0xc8a154, transparent: true, opacity: 0.32, blending: THREE.AdditiveBlending });
  group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(triPts(Math.PI/2, 6)), triMat));
  group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(triPts(-Math.PI/2, 6)), triMat.clone()));
  // 36 tick marks
  const tickMat = new THREE.LineBasicMaterial({ color: 0xc8a154, transparent: true, opacity: 0.45, blending: THREE.AdditiveBlending });
  for (let i = 0; i < 36; i++) {
    const a = i * Math.PI * 2 / 36;
    const r1 = 8.55, r2 = i % 3 === 0 ? 8.85 : 8.7;
    const pts = [ new THREE.Vector3(Math.cos(a)*r1, 0, Math.sin(a)*r1), new THREE.Vector3(Math.cos(a)*r2, 0, Math.sin(a)*r2) ];
    group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), tickMat));
  }
  group.position.y = -1.5;
  return group;
}
scene.add(createSacredFloor());

// Garden petals scattered around floor (Raphael's garden)
const petalGeo = new THREE.BufferGeometry();
const petalCount = 320;
const petalPos = new Float32Array(petalCount * 3);
const petalCol = new Float32Array(petalCount * 3);
const petalPalette = [
  [0.7, 0.55, 0.85], [0.55, 0.4, 0.75], [0.92, 0.85, 0.95],
  [0.95, 0.7, 0.6], [0.5, 0.75, 0.55], [0.9, 0.8, 0.5]
];
for (let i = 0; i < petalCount; i++) {
  const r = 3.5 + Math.random() * 8;
  const a = Math.random() * Math.PI * 2;
  petalPos[i*3]   = Math.cos(a) * r;
  petalPos[i*3+1] = -1.48 + Math.random() * 0.15;
  petalPos[i*3+2] = Math.sin(a) * r;
  const c = petalPalette[Math.floor(Math.random() * petalPalette.length)];
  petalCol[i*3] = c[0]; petalCol[i*3+1] = c[1]; petalCol[i*3+2] = c[2];
}
petalGeo.setAttribute('position', new THREE.BufferAttribute(petalPos, 3));
petalGeo.setAttribute('color', new THREE.BufferAttribute(petalCol, 3));
scene.add(new THREE.Points(petalGeo, new THREE.PointsMaterial({
  size: 0.13, vertexColors: true, transparent: true, opacity: 0.7,
  blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true
})));

// ============================================================
//   ANATOMICAL HELPERS
//   These build the figure to the 8-head statuary canon.
//   head_unit = 0.5; total figure height ≈ 4.2 units.
// ============================================================

const HEAD_UNIT = 0.5;
const TOTAL_H = 4.2;

// Single feather geometry — reused for all feathers
const featherShape = new THREE.Shape();
featherShape.moveTo(0, 0);
featherShape.bezierCurveTo(0.07, 0.18, 0.10, 0.45, 0.08, 0.72);
featherShape.bezierCurveTo(0.06, 0.88, 0.03, 0.96, 0, 1);
featherShape.bezierCurveTo(-0.03, 0.96, -0.06, 0.88, -0.08, 0.72);
featherShape.bezierCurveTo(-0.10, 0.45, -0.07, 0.18, 0, 0);
const FEATHER_GEO = new THREE.ShapeGeometry(featherShape, 18);

// Body materials cached per angel
function makeMaterials(config) {
  const marble = new THREE.Color(0xf8efd8).lerp(new THREE.Color(config.primary), 0.10);
  const skinEmissive = new THREE.Color(config.primary).multiplyScalar(0.35);

  const skinMat = new THREE.MeshPhongMaterial({
    color: marble, emissive: skinEmissive, emissiveIntensity: 0.45,
    shininess: 55, specular: 0x555555
  });

  const robeColor = new THREE.Color(config.primary).lerp(new THREE.Color(0xffffff), 0.35);
  const robeEmissive = new THREE.Color(config.primary).multiplyScalar(0.55);
  const robeMat = new THREE.MeshPhongMaterial({
    color: robeColor, emissive: robeEmissive, emissiveIntensity: 0.32,
    shininess: 75, specular: 0x666666,
    transparent: true, opacity: 0.96
  });

  const hairColor = config.hairColor || 0xc8a865;
  const hairMat = new THREE.MeshPhongMaterial({
    color: hairColor,
    emissive: new THREE.Color(hairColor).multiplyScalar(0.25),
    emissiveIntensity: 0.35,
    shininess: 25
  });

  const goldMat = new THREE.MeshPhongMaterial({
    color: 0xe8c860, emissive: 0x806015, emissiveIntensity: 0.55,
    shininess: 130, specular: 0xfff0a0
  });

  return { skinMat, robeMat, hairMat, goldMat, marble };
}

// ---------- ROBE (lathe with pleat displacement) ----------
function makeRobe(robeMat) {
  const robeProfile = [
    new THREE.Vector2(0,    0.00),
    new THREE.Vector2(1.25, 0.00),
    new THREE.Vector2(1.22, 0.05),
    new THREE.Vector2(1.18, 0.25),
    new THREE.Vector2(1.10, 0.60),
    new THREE.Vector2(1.00, 0.95),
    new THREE.Vector2(0.88, 1.30),
    new THREE.Vector2(0.75, 1.65),
    new THREE.Vector2(0.63, 1.95),
    new THREE.Vector2(0.55, 2.20),
    new THREE.Vector2(0.50, 2.40)
  ];
  const geo = new THREE.LatheGeometry(robeProfile, 64, 0, Math.PI * 2);

  // Vertex displacement: vertical pleats fading toward the top
  const pos = geo.attributes.position;
  const pleatCount = 11;
  const pleatStrength = 0.045;
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
    const angle = Math.atan2(z, x);
    const r = Math.sqrt(x*x + z*z);
    // Strong at hem, fading by the waist
    const yFactor = Math.max(0, 1 - y / 2.4);
    const fold = Math.sin(angle * pleatCount) * pleatStrength * yFactor;
    const r2 = r + fold;
    pos.setX(i, Math.cos(angle) * r2);
    pos.setZ(i, Math.sin(angle) * r2);
  }
  geo.computeVertexNormals();
  return new THREE.Mesh(geo, robeMat);
}

// ---------- TORSO (ellipsoid for shoulders) ----------
function makeTorso(robeMat) {
  const geo = new THREE.SphereGeometry(0.5, 32, 24);
  const torso = new THREE.Mesh(geo, robeMat);
  torso.position.y = 2.78;
  torso.scale.set(1.42, 1.0, 0.78);
  return torso;
}

// ---------- HEAD with subtle face ----------
function makeHead(skinMat, hairMat) {
  const headGroup = new THREE.Group();

  // Cranium
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.32, 40, 32), skinMat);
  head.position.y = 3.78;
  head.scale.set(0.92, 1.12, 0.95);
  headGroup.add(head);

  // Nose ridge (small flattened ellipsoid)
  const nose = new THREE.Mesh(new THREE.SphereGeometry(0.045, 16, 16), skinMat);
  nose.position.set(0, 3.78, 0.32);
  nose.scale.set(1, 2.4, 0.8);
  headGroup.add(nose);

  // Brow ridges
  const browL = new THREE.Mesh(new THREE.SphereGeometry(0.038, 12, 12), skinMat);
  browL.position.set(0.10, 3.88, 0.28);
  browL.scale.set(1.9, 0.45, 0.55);
  headGroup.add(browL);
  const browR = browL.clone();
  browR.position.x = -0.10;
  headGroup.add(browR);

  // Cheekbones (very subtle)
  const cheekL = new THREE.Mesh(new THREE.SphereGeometry(0.06, 12, 12), skinMat);
  cheekL.position.set(0.16, 3.72, 0.22);
  cheekL.scale.set(1, 0.7, 0.6);
  headGroup.add(cheekL);
  const cheekR = cheekL.clone();
  cheekR.position.x = -0.16;
  headGroup.add(cheekR);

  // Lips (peaceful, closed)
  const lipMat = new THREE.MeshPhongMaterial({
    color: new THREE.Color(skinMat.color).lerp(new THREE.Color(0xa05050), 0.4),
    emissive: skinMat.emissive, emissiveIntensity: 0.2, shininess: 40
  });
  const lips = new THREE.Mesh(new THREE.SphereGeometry(0.05, 14, 12), lipMat);
  lips.position.set(0, 3.66, 0.30);
  lips.scale.set(1.5, 0.32, 0.5);
  headGroup.add(lips);

  // Chin point
  const chin = new THREE.Mesh(new THREE.SphereGeometry(0.05, 12, 12), skinMat);
  chin.position.set(0, 3.58, 0.26);
  chin.scale.set(1.2, 0.7, 0.6);
  headGroup.add(chin);

  // Eye sockets (very faint indented spheres of slightly darker material)
  const eyeMat = new THREE.MeshPhongMaterial({
    color: new THREE.Color(skinMat.color).multiplyScalar(0.7),
    emissive: skinMat.emissive, emissiveIntensity: 0.15
  });
  const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.05, 12, 12), eyeMat);
  eyeL.position.set(0.10, 3.83, 0.28);
  eyeL.scale.set(1.5, 0.5, 0.3);
  headGroup.add(eyeL);
  const eyeR = eyeL.clone();
  eyeR.position.x = -0.10;
  headGroup.add(eyeR);

  // === HAIR ===
  // Cap of hair (back/top)
  const hairCap = new THREE.Mesh(
    new THREE.SphereGeometry(0.36, 28, 24, 0, Math.PI * 2, 0, Math.PI / 1.9),
    hairMat
  );
  hairCap.position.y = 3.92;
  hairCap.scale.set(0.95, 1.0, 1.02);
  headGroup.add(hairCap);

  // Individual curls scattered around the upper head
  for (let i = 0; i < 24; i++) {
    const curl = new THREE.Mesh(
      new THREE.SphereGeometry(0.07 + Math.random() * 0.03, 12, 12),
      hairMat
    );
    const phi = Math.random() * Math.PI * 0.55;
    const theta = Math.random() * Math.PI * 2;
    curl.position.set(
      Math.sin(phi) * Math.cos(theta) * 0.39,
      3.92 + Math.cos(phi) * 0.20,
      Math.sin(phi) * Math.sin(theta) * 0.39
    );
    // Skip if it would clash with the face front
    if (curl.position.z > 0.20 && curl.position.y < 3.95) continue;
    headGroup.add(curl);
  }

  return { headGroup, headMesh: head };
}

// ---------- NECK ----------
function makeNeck(skinMat) {
  const neck = new THREE.Mesh(
    new THREE.CylinderGeometry(0.13, 0.18, 0.34, 24),
    skinMat
  );
  neck.position.y = 3.36;
  return neck;
}

// ---------- ARM (tube curve with shoulder, elbow, hand) ----------
function makeArm(side, elbow, wrist, skinMat) {
  const group = new THREE.Group();
  const shoulder = new THREE.Vector3(side * 0.62, 3.18, 0.04);

  // Shoulder cap
  const shoulderBulb = new THREE.Mesh(new THREE.SphereGeometry(0.16, 18, 18), skinMat);
  shoulderBulb.position.copy(shoulder);
  shoulderBulb.scale.set(1.1, 0.9, 1);
  group.add(shoulderBulb);

  // Curve through arm
  const curve = new THREE.CatmullRomCurve3([
    shoulder.clone(),
    shoulder.clone().lerp(elbow, 0.5),
    elbow.clone(),
    elbow.clone().lerp(wrist, 0.5),
    wrist.clone()
  ]);
  const armGeo = new THREE.TubeGeometry(curve, 28, 0.085, 14, false);
  // Taper using vertex displacement (radius decreases along length)
  const pos = armGeo.attributes.position;
  const segments = 29;  // tubularSegments + 1
  for (let i = 0; i < pos.count; i++) {
    const segIdx = Math.floor(i / 15);
    const t = segIdx / segments;
    // Get the tube center at this segment
    const center = curve.getPoint(t);
    const x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
    const dx = x - center.x, dy = y - center.y, dz = z - center.z;
    const taper = 1.0 - t * 0.28;  // narrow toward wrist by ~28%
    pos.setX(i, center.x + dx * taper);
    pos.setY(i, center.y + dy * taper);
    pos.setZ(i, center.z + dz * taper);
  }
  armGeo.computeVertexNormals();
  group.add(new THREE.Mesh(armGeo, skinMat));

  // Elbow joint
  const elbowBulb = new THREE.Mesh(new THREE.SphereGeometry(0.085, 14, 14), skinMat);
  elbowBulb.position.copy(elbow);
  group.add(elbowBulb);

  // Hand (palm)
  const hand = new THREE.Mesh(new THREE.SphereGeometry(0.11, 18, 18), skinMat);
  hand.position.copy(wrist);
  // Orient flat palm — direction from elbow to wrist
  const forearm = wrist.clone().sub(elbow).normalize();
  hand.lookAt(wrist.clone().add(forearm));
  hand.scale.set(1, 0.5, 1.35);
  group.add(hand);

  // Fingers (simplified mitten — 4 small extrusions)
  for (let f = 0; f < 4; f++) {
    const finger = new THREE.Mesh(
      new THREE.CylinderGeometry(0.022, 0.018, 0.10, 8),
      skinMat
    );
    const offset = (f - 1.5) * 0.04;
    finger.position.copy(wrist);
    finger.position.add(forearm.clone().multiplyScalar(0.12));
    finger.position.x += offset * Math.cos(Math.atan2(forearm.z, forearm.x) + Math.PI/2) * 0.7;
    finger.position.z += offset * Math.sin(Math.atan2(forearm.z, forearm.x) + Math.PI/2) * 0.7;
    finger.lookAt(finger.position.clone().add(forearm));
    finger.rotateX(Math.PI / 2);
    group.add(finger);
  }
  // Thumb
  const thumb = new THREE.Mesh(
    new THREE.CylinderGeometry(0.025, 0.020, 0.085, 8),
    skinMat
  );
  thumb.position.copy(wrist);
  thumb.position.add(forearm.clone().multiplyScalar(0.05));
  thumb.position.y -= 0.04;
  thumb.lookAt(thumb.position.clone().add(forearm));
  thumb.rotateX(Math.PI / 2.5);
  group.add(thumb);

  group.userData = { shoulder: shoulder.clone(), elbow: elbow.clone(), wrist: wrist.clone(), forearm };
  return group;
}

// ---------- WINGS (anatomical with feathers) ----------
function makeWing(side, primary, secondary) {
  const wg = new THREE.Group();

  // Shoulder bulb where wing attaches to back
  const wingShoulder = new THREE.Mesh(
    new THREE.SphereGeometry(0.16, 18, 18),
    new THREE.MeshPhongMaterial({
      color: 0xfff5d4, emissive: new THREE.Color(secondary), emissiveIntensity: 0.4, shininess: 60
    })
  );
  wingShoulder.position.set(side * 0.12, 0, 0);
  wg.add(wingShoulder);

  // ===== PRIMARY FEATHERS (the long outer feathers) =====
  // Arc curve along which feathers are placed
  const armCurve = new THREE.CatmullRomCurve3([
    new THREE.Vector3(side * 0.15, 0.25, 0),
    new THREE.Vector3(side * 0.95, 0.55, -0.05),
    new THREE.Vector3(side * 1.85, 0.35, -0.15),
    new THREE.Vector3(side * 2.55, -0.35, -0.25)
  ]);

  const primaryCount = 13;
  for (let i = 0; i < primaryCount; i++) {
    const t = i / (primaryCount - 1);
    const armPt = armCurve.getPoint(t);
    // Size: largest in the mid-region, smaller at base and tip
    const sizeF = 1.0 - Math.abs(t - 0.45) * 0.75;
    const length = 1.0 + sizeF * 1.6;
    const width = 0.35 + sizeF * 0.25;

    // Two-layer feather: outer (colored) + inner (white highlight)
    for (let layer = 0; layer < 2; layer++) {
      const isOuter = layer === 0;
      const fMat = new THREE.MeshBasicMaterial({
        color: isOuter ? secondary : 0xfff8e8,
        transparent: true,
        opacity: isOuter ? 0.55 : 0.7,
        side: THREE.DoubleSide,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      });
      const feather = new THREE.Mesh(FEATHER_GEO, fMat);

      // Scale: width × length
      const fs = isOuter ? 1.05 : 0.92;
      feather.scale.set(width * fs, length * fs, 1);

      // Position at arm point with slight depth offset for layering
      feather.position.copy(armPt);
      feather.position.z += isOuter ? -0.012 : 0.005;
      feather.position.y -= isOuter ? 0.0 : 0.02;

      // Orient: feather points outward and slightly downward toward tip
      // Base feather points +Y. We rotate around Z so it fans outward.
      const fanAngle = side * (-0.35 - t * 1.05);  // increasing outward angle
      feather.rotation.z = fanAngle;
      // Slight twist for natural variation
      feather.rotation.y = side * (-0.08 + (Math.random() - 0.5) * 0.05);
      feather.rotation.x = (Math.random() - 0.5) * 0.05;
      wg.add(feather);
    }
  }

  // ===== SECONDARY FEATHERS (smaller, behind primaries) =====
  const secondaryCount = 9;
  for (let i = 0; i < secondaryCount; i++) {
    const t = i / (secondaryCount - 1);
    const innerCurve = new THREE.CatmullRomCurve3([
      new THREE.Vector3(side * 0.12, 0.18, 0.08),
      new THREE.Vector3(side * 0.65, 0.35, 0.1),
      new THREE.Vector3(side * 1.20, 0.20, 0.12),
      new THREE.Vector3(side * 1.65, -0.10, 0.14)
    ]);
    const pt = innerCurve.getPoint(t);

    const fMat = new THREE.MeshBasicMaterial({
      color: 0xfff5e0, transparent: true, opacity: 0.55,
      side: THREE.DoubleSide, blending: THREE.AdditiveBlending, depthWrite: false
    });
    const feather = new THREE.Mesh(FEATHER_GEO, fMat);
    const sizeF = 0.55 + (1 - Math.abs(t - 0.5) * 1.5) * 0.4;
    feather.scale.set(0.22 + sizeF * 0.1, 0.7 + sizeF * 0.3, 1);
    feather.position.copy(pt);
    feather.rotation.z = side * (-0.25 - t * 0.85);
    feather.rotation.y = side * (-0.05);
    wg.add(feather);
  }

  // ===== COVERT FEATHERS (smallest, closest to body) =====
  const covertCount = 7;
  for (let i = 0; i < covertCount; i++) {
    const t = i / (covertCount - 1);
    const pt = new THREE.Vector3(
      side * (0.18 + t * 0.6),
      0.28 + t * 0.05,
      0.18
    );
    const fMat = new THREE.MeshBasicMaterial({
      color: 0xfff5d0, transparent: true, opacity: 0.5,
      side: THREE.DoubleSide, blending: THREE.AdditiveBlending, depthWrite: false
    });
    const feather = new THREE.Mesh(FEATHER_GEO, fMat);
    feather.scale.set(0.2, 0.55, 1);
    feather.position.copy(pt);
    feather.rotation.z = side * (-0.20 - t * 0.7);
    wg.add(feather);
  }

  // Wing-tip sparkles
  const sparkGeo = new THREE.BufferGeometry();
  const sparkN = 18;
  const sparkPos = new Float32Array(sparkN * 3);
  for (let i = 0; i < sparkN; i++) {
    const t = 0.7 + Math.random() * 0.3;
    const p = armCurve.getPoint(t);
    sparkPos[i*3]   = p.x + (Math.random() - 0.5) * 0.3;
    sparkPos[i*3+1] = p.y + (Math.random() - 0.5) * 0.5;
    sparkPos[i*3+2] = p.z + (Math.random() - 0.5) * 0.15;
  }
  sparkGeo.setAttribute('position', new THREE.BufferAttribute(sparkPos, 3));
  wg.add(new THREE.Points(sparkGeo, new THREE.PointsMaterial({
    color: 0xfff8e0, size: 0.09, transparent: true, opacity: 0.85,
    blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true
  })));

  return wg;
}

// ---------- HALO with sun rays ----------
function makeHalo(haloColor) {
  const group = new THREE.Group();

  // Inner solid ring
  group.add(new THREE.Mesh(
    new THREE.TorusGeometry(0.52, 0.022, 12, 64),
    new THREE.MeshBasicMaterial({ color: haloColor, transparent: true, opacity: 0.95 })
  ));

  // Outer glow disc
  group.add(new THREE.Mesh(
    new THREE.RingGeometry(0.3, 0.78, 64),
    new THREE.MeshBasicMaterial({
      color: haloColor, transparent: true, opacity: 0.35,
      side: THREE.DoubleSide, blending: THREE.AdditiveBlending, depthWrite: false
    })
  ));

  // Inner bright disc
  group.add(new THREE.Mesh(
    new THREE.CircleGeometry(0.25, 32),
    new THREE.MeshBasicMaterial({
      color: 0xfff8d0, transparent: true, opacity: 0.55,
      side: THREE.DoubleSide, blending: THREE.AdditiveBlending, depthWrite: false
    })
  ));

  // Sun rays — 16 radiating lines, alternating length
  const rayMat = new THREE.LineBasicMaterial({
    color: haloColor, transparent: true, opacity: 0.7,
    blending: THREE.AdditiveBlending, depthWrite: false
  });
  for (let i = 0; i < 16; i++) {
    const a = (i / 16) * Math.PI * 2;
    const inner = 0.6;
    const outer = inner + (i % 4 === 0 ? 0.85 : (i % 2 === 0 ? 0.55 : 0.4));
    const pts = [
      new THREE.Vector3(Math.cos(a) * inner, Math.sin(a) * inner, 0),
      new THREE.Vector3(Math.cos(a) * outer, Math.sin(a) * outer, 0)
    ];
    group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), rayMat.clone()));
  }
  return group;
}

//   SYMBOLIC PROPS
// ============================================================

function makeCaduceus(goldMat) {
  const g = new THREE.Group();

  // Central rod
  const rod = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 1.6, 16), goldMat);
  rod.position.y = 0;
  g.add(rod);

  // Bottom finial
  const finial = new THREE.Mesh(new THREE.SphereGeometry(0.04, 14, 14), goldMat);
  finial.position.y = -0.8;
  g.add(finial);

  // Twin serpents — intertwined as curved tubes
  for (let s = 0; s < 2; s++) {
    const sign = s === 0 ? 1 : -1;
    const turns = 3;
    const pts = [];
    for (let i = 0; i <= 40; i++) {
      const t = i / 40;
      const y = -0.6 + t * 1.4;
      const angle = sign * t * Math.PI * 2 * turns;
      pts.push(new THREE.Vector3(Math.cos(angle) * 0.09, y, Math.sin(angle) * 0.09));
    }
    const curve = new THREE.CatmullRomCurve3(pts);
    const tube = new THREE.Mesh(new THREE.TubeGeometry(curve, 80, 0.018, 6, false), goldMat);
    g.add(tube);

    // Serpent head at top
    const head = new THREE.Mesh(new THREE.ConeGeometry(0.045, 0.10, 10), goldMat);
    const topPt = pts[pts.length - 1];
    head.position.copy(topPt);
    head.lookAt(topPt.x * 1.3, topPt.y + 0.1, topPt.z * 1.3);
    head.rotateX(Math.PI / 2);
    g.add(head);
  }

  // Top orb (the healing light)
  const orb = new THREE.Mesh(
    new THREE.SphereGeometry(0.10, 22, 22),
    new THREE.MeshBasicMaterial({ color: 0xfff8b0 })
  );
  orb.position.y = 0.88;
  g.add(orb);

  // Orb glow
  const orbGlow = new THREE.Mesh(
    new THREE.SphereGeometry(0.25, 18, 18),
    new THREE.MeshBasicMaterial({
      color: 0xfff8b0, transparent: true, opacity: 0.4,
      blending: THREE.AdditiveBlending, depthWrite: false
    })
  );
  orbGlow.position.y = 0.88;
  g.add(orbGlow);

  // Wings on the staff (the caduceus wings)
  for (let side of [1, -1]) {
    const wShape = new THREE.Shape();
    wShape.moveTo(0, 0);
    wShape.bezierCurveTo(0.05, 0.18, 0.30, 0.18, 0.42, 0.05);
    wShape.bezierCurveTo(0.40, -0.02, 0.30, -0.06, 0.15, -0.05);
    wShape.bezierCurveTo(0.08, -0.04, 0.03, -0.02, 0, 0);
    const wGeo = new THREE.ShapeGeometry(wShape, 20);
    const w = new THREE.Mesh(wGeo, new THREE.MeshPhongMaterial({
      color: 0xe8c860, emissive: 0x806015, emissiveIntensity: 0.5,
      shininess: 100, side: THREE.DoubleSide,
      transparent: true, opacity: 0.92
    }));
    w.position.set(side * 0.08, 0.78, 0);
    w.scale.set(side, 1, 1);
    g.add(w);
  }

  g.userData = { orb, orbGlow };
  return g;
}

function makeChalice(goldMat) {
  const g = new THREE.Group();
  // Cup (using lathe for shape)
  const cupProfile = [
    new THREE.Vector2(0,    0),
    new THREE.Vector2(0.10, 0),
    new THREE.Vector2(0.10, 0.02),
    new THREE.Vector2(0.02, 0.05),
    new THREE.Vector2(0.022,0.20),
    new THREE.Vector2(0.025,0.30),
    new THREE.Vector2(0.08, 0.36),
    new THREE.Vector2(0.16, 0.46),
    new THREE.Vector2(0.165,0.50),
  ];
  const cup = new THREE.Mesh(new THREE.LatheGeometry(cupProfile, 32), goldMat);
  g.add(cup);
  // Liquid surface
  const liquid = new THREE.Mesh(
    new THREE.CircleGeometry(0.14, 28),
    new THREE.MeshBasicMaterial({
      color: 0xa8d4ff, transparent: true, opacity: 0.85,
      blending: THREE.AdditiveBlending, side: THREE.DoubleSide
    })
  );
  liquid.position.y = 0.46;
  liquid.rotation.x = -Math.PI / 2;
  g.add(liquid);
  return g;
}

function makeTrumpet(goldMat) {
  const g = new THREE.Group();
  // Tube
  const tube = new THREE.Mesh(new THREE.CylinderGeometry(0.045, 0.045, 1.4, 16), goldMat);
  tube.position.y = 0;
  g.add(tube);
  // Mouthpiece
  const mp = new THREE.Mesh(new THREE.CylinderGeometry(0.058, 0.045, 0.09, 14), goldMat);
  mp.position.y = -0.74;
  g.add(mp);
  // Bell — lathe profile for natural flare
  const bellProfile = [
    new THREE.Vector2(0.045, 0),
    new THREE.Vector2(0.06,  0.08),
    new THREE.Vector2(0.10,  0.20),
    new THREE.Vector2(0.18,  0.32),
    new THREE.Vector2(0.28,  0.42),
    new THREE.Vector2(0.32,  0.48),
    new THREE.Vector2(0.31,  0.52)
  ];
  const bell = new THREE.Mesh(new THREE.LatheGeometry(bellProfile, 32), goldMat);
  bell.position.y = 0.7;
  g.add(bell);
  // Light burst from bell
  const burst = new THREE.Mesh(
    new THREE.ConeGeometry(0.55, 1.3, 32, 1, true),
    new THREE.MeshBasicMaterial({
      color: 0xfff5e0, transparent: true, opacity: 0.32,
      side: THREE.DoubleSide, blending: THREE.AdditiveBlending, depthWrite: false
    })
  );
  burst.position.y = 1.6;
  g.add(burst);
  const burstCore = new THREE.Mesh(
    new THREE.ConeGeometry(0.27, 0.95, 24, 1, true),
    new THREE.MeshBasicMaterial({
      color: 0xfffae8, transparent: true, opacity: 0.65,
      side: THREE.DoubleSide, blending: THREE.AdditiveBlending, depthWrite: false
    })
  );
  burstCore.position.y = 1.45;
  g.add(burstCore);
  g.userData = { burst, burstCore };
  return g;
}

// ============================================================
//   ANGEL ASSEMBLY
// ============================================================
function createAngel(config) {
  const mats = makeMaterials(config);
  const g = new THREE.Group();

  // === BODY ===
  g.add(makeRobe(mats.robeMat));
  g.add(makeTorso(mats.robeMat));
  g.add(makeNeck(mats.skinMat));
  const { headGroup, headMesh } = makeHead(mats.skinMat, mats.hairMat);
  g.add(headGroup);

  // === SASH ===
  const sash = new THREE.Mesh(
    new THREE.TorusGeometry(0.5, 0.045, 10, 36),
    new THREE.MeshPhongMaterial({
      color: 0xd4a93e, emissive: 0x806015, emissiveIntensity: 0.5, shininess: 110
    })
  );
  sash.position.y = 2.32;
  sash.rotation.x = Math.PI / 2;
  sash.scale.set(1.05, 0.65, 1);
  g.add(sash);

  // === HALO ===
  const halo = makeHalo(config.haloColor || 0xffd870);
  halo.position.set(0, 3.92, -0.20);
  halo.rotation.x = -0.15;
  g.add(halo);

  // === WINGS ===
  const wingL = makeWing(1, config.primary, config.secondary);
  const wingR = makeWing(-1, config.primary, config.secondary);
  wingL.position.set(0, 3.05, 0.12);
  wingR.position.set(0, 3.05, 0.12);
  g.add(wingL);
  g.add(wingR);

  // === ARMS — pose-specific ===
  let leftArm, rightArm;
  if (config.type === 'raphael') {
    // Blessing: arms outstretched and slightly forward, palms forward/down
    leftArm = makeArm(1,
      new THREE.Vector3(1.1, 2.8, 0.20),
      new THREE.Vector3(1.55, 2.25, 0.55),
      mats.skinMat
    );
    rightArm = makeArm(-1,
      new THREE.Vector3(-1.1, 2.8, 0.20),
      new THREE.Vector3(-1.55, 2.25, 0.55),
      mats.skinMat
    );
  } else if (config.type === 'michael') {
    // Holding chalices — left arm up, right arm down
    leftArm = makeArm(1,
      new THREE.Vector3(0.95, 3.10, 0.30),
      new THREE.Vector3(0.55, 3.45, 0.60),
      mats.skinMat
    );
    rightArm = makeArm(-1,
      new THREE.Vector3(-0.85, 2.55, 0.30),
      new THREE.Vector3(-0.45, 2.30, 0.60),
      mats.skinMat
    );
  } else if (config.type === 'gabriel') {
    // Right arm raised holding trumpet near face
    rightArm = makeArm(-1,
      new THREE.Vector3(-0.85, 3.20, 0.35),
      new THREE.Vector3(-0.25, 3.55, 0.55),
      mats.skinMat
    );
    leftArm = makeArm(1,
      new THREE.Vector3(1.0, 2.6, 0.25),
      new THREE.Vector3(1.20, 1.95, 0.50),
      mats.skinMat
    );
  }
  g.add(leftArm);
  g.add(rightArm);

  // === SYMBOLIC PROP ===
  let propAnim = null;
  if (config.type === 'raphael') {
    const cad = makeCaduceus(mats.goldMat);
    // Floating in front of chest, vertical
    cad.position.set(0, 2.55, 0.85);
    g.add(cad);
    propAnim = { type: 'caduceus', obj: cad };
  } else if (config.type === 'michael') {
    const chaliceUp = makeChalice(mats.goldMat);
    chaliceUp.position.copy(leftArm.userData.wrist);
    chaliceUp.position.y -= 0.05;
    g.add(chaliceUp);

    const chaliceDown = makeChalice(mats.goldMat);
    chaliceDown.position.copy(rightArm.userData.wrist);
    chaliceDown.position.y -= 0.05;
    g.add(chaliceDown);

    // Light arc between cups
    const arcPts = [];
    const startP = leftArm.userData.wrist.clone(); startP.y += 0.15;
    const endP = rightArm.userData.wrist.clone(); endP.y += 0.45;
    for (let i = 0; i <= 30; i++) {
      const t = i / 30;
      const x = startP.x + (endP.x - startP.x) * t;
      const z = startP.z + (endP.z - startP.z) * t + 0.1;
      const y = startP.y + (endP.y - startP.y) * t + Math.sin(t * Math.PI) * 0.18;
      arcPts.push(new THREE.Vector3(x, y, z));
    }
    const arc = new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(arcPts),
      new THREE.LineBasicMaterial({
        color: 0xa8d4ff, transparent: true, opacity: 0.95,
        blending: THREE.AdditiveBlending, depthWrite: false
      })
    );
    g.add(arc);

    // Drop particles along arc
    const dropGeo = new THREE.BufferGeometry();
    const dropPos = new Float32Array(28 * 3);
    const dropPhase = new Float32Array(28);
    for (let i = 0; i < 28; i++) { dropPhase[i] = Math.random(); }
    dropGeo.setAttribute('position', new THREE.BufferAttribute(dropPos, 3));
    const drops = new THREE.Points(dropGeo, new THREE.PointsMaterial({
      color: 0xc8e8ff, size: 0.085, transparent: true, opacity: 0.95,
      blending: THREE.AdditiveBlending, depthWrite: false
    }));
    g.add(drops);
    propAnim = { type: 'temperance', drops, dropPhase, startP, endP };

    // Solar disc on forehead
    const sun = new THREE.Mesh(
      new THREE.CircleGeometry(0.08, 24),
      new THREE.MeshBasicMaterial({
        color: 0xffe080, side: THREE.DoubleSide, blending: THREE.AdditiveBlending
      })
    );
    sun.position.set(0, 3.92, 0.32);
    g.add(sun);
  } else if (config.type === 'gabriel') {
    const trumpet = makeTrumpet(mats.goldMat);
    // Position at right wrist, angled upward and outward
    trumpet.position.copy(rightArm.userData.wrist);
    trumpet.rotation.set(-0.45, 0, 0.7);
    g.add(trumpet);
    propAnim = { type: 'judgement', trumpet };

    // Outgoing sound particles from bell
    const soundGeo = new THREE.BufferGeometry();
    const sN = 38;
    const sPos = new Float32Array(sN * 3);
    const sPhase = new Float32Array(sN);
    for (let i = 0; i < sN; i++) { sPhase[i] = Math.random(); }
    soundGeo.setAttribute('position', new THREE.BufferAttribute(sPos, 3));
    const sound = new THREE.Points(soundGeo, new THREE.PointsMaterial({
      color: 0xfff5e0, size: 0.095, transparent: true, opacity: 0.85,
      blending: THREE.AdditiveBlending, depthWrite: false
    }));
    g.add(sound);
    // Bell world-position will be computed each frame
    propAnim.sound = sound;
    propAnim.soundPhase = sPhase;
  }

  // === INNER LIGHT (aura) ===
  const aura = new THREE.Mesh(
    new THREE.SphereGeometry(1.4, 24, 24),
    new THREE.MeshBasicMaterial({
      color: config.secondary, transparent: true, opacity: 0.05,
      blending: THREE.AdditiveBlending, depthWrite: false
    })
  );
  aura.position.y = 2.3;
  aura.scale.set(1.1, 1.6, 0.9);
  g.add(aura);

  // === ASCENDING PARTICLES ===
  const partGeo = new THREE.BufferGeometry();
  const partN = 60;
  const partPos = new Float32Array(partN * 3);
  const partSpeed = new Float32Array(partN);
  for (let i = 0; i < partN; i++) {
    const a = Math.random() * Math.PI * 2;
    const r = 1.0 + Math.random() * 2.0;
    partPos[i*3]   = Math.cos(a) * r;
    partPos[i*3+1] = Math.random() * 5;
    partPos[i*3+2] = Math.sin(a) * r;
    partSpeed[i] = 0.006 + Math.random() * 0.008;
  }
  partGeo.setAttribute('position', new THREE.BufferAttribute(partPos, 3));
  const particles = new THREE.Points(partGeo, new THREE.PointsMaterial({
    color: config.secondary, size: 0.075, transparent: true, opacity: 0.65,
    blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true
  }));
  g.add(particles);

  g.userData = {
    config, type: config.type,
    halo, aura, headMesh, propAnim,
    particles, particleSpeeds: partSpeed,
    headBobPhase: Math.random() * Math.PI * 2
  };

  return g;
}

// ============================================================
//   ANGEL DATA
// ============================================================
const angelData = [
  {
    name: 'RAPHAEL', hebrew: 'רָפָאֵל',
    card: 'THE LOVERS', roman: 'VI',
    element: 'AIR · MERCURY · TIPHARETH',
    primary: 0x6dc28a,        // emerald viriditas (Raphael's color)
    secondary: 0xb8e8a8,      // pale jade
    haloColor: 0xfff0a0,
    hairColor: 0xc8a865,      // honey gold
    type: 'raphael',
    text: '"God heals." The angel of the noonday sun who presides over The Lovers, sixth of the Major Arcana. He hovers above Eden bearing the breath of life — the principle of conscious choice between sacred and profane love. His element is Air; his hour, midday; his gift, the healing of the divided self. His sign is viriditas, the green-power of living things.',
    angle: Math.PI / 2
  },
  {
    name: 'MICHAEL', hebrew: 'מִיכָאֵל',
    card: 'TEMPERANCE', roman: 'XIV',
    element: 'FIRE · SOL · YESOD',
    primary: 0xe88455,        // ember orange
    secondary: 0xffb878,      // warm flame
    haloColor: 0xffd870,
    hairColor: 0xa86830,      // deep auburn
    type: 'michael',
    text: '"Who is like God?" Captain of the heavenly host, alchemist of Temperance. He pours the essence between two chalices, one foot upon land, one upon water — solving the equation of opposites. The sun disc burns upon his brow. His work is the tempering of fire by water, of impulse by patience.',
    angle: Math.PI / 2 + (2 * Math.PI / 3)
  },
  {
    name: 'GABRIEL', hebrew: 'גַּבְרִיאֵל',
    card: 'JUDGEMENT', roman: 'XX',
    element: 'WATER · LUNA · HOD',
    primary: 0x9cb8e8,        // moon silver-blue
    secondary: 0xc8d8ff,      // pearl
    haloColor: 0xe8e0ff,
    hairColor: 0xd8c898,      // pale wheat
    type: 'gabriel',
    text: '"God is my strength." Herald of awakenings, whose trumpet on Judgement calls the dead from their coffins to a new aeon. He is the angel of annunciation, of water and the moon, of the dream that speaks before dawn. His sound is the resonance that ends one cycle and begins another.',
    angle: Math.PI / 2 + (4 * Math.PI / 3)
  }
];

const angelObjects = [];
const RADIUS = 5.4;
angelData.forEach((cfg, i) => {
  const a = createAngel(cfg);
  a.position.set(Math.cos(cfg.angle) * RADIUS, -1.5, Math.sin(cfg.angle) * RADIUS);
  // Face outward (away from center) so the viewer sees the face
  const outward = new THREE.Vector3(a.position.x * 2, a.position.y, a.position.z * 2);
  a.lookAt(outward);
  a.userData.basePos = a.position.clone();
  a.userData.baseRotY = a.rotation.y;
  a.userData.index = i;
  scene.add(a);
  angelObjects.push(a);
});

// ---------- FLOATING SACRED GEOMETRY ----------
const symbols = [];
function makeHexagram(size, color, opacity) {
  const grp = new THREE.Group();
  function tri(rot) {
    const pts = [];
    for (let i = 0; i <= 3; i++) {
      const a = rot + i * Math.PI * 2 / 3;
      pts.push(new THREE.Vector3(Math.cos(a) * size, Math.sin(a) * size, 0));
    }
    return new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(pts),
      new THREE.LineBasicMaterial({
        color, transparent: true, opacity,
        blending: THREE.AdditiveBlending, depthWrite: false
      })
    );
  }
  grp.add(tri(Math.PI / 2));
  grp.add(tri(-Math.PI / 2));
  return grp;
}
function makeCircleSymbol(size, color, opacity) {
  const pts = [];
  for (let i = 0; i <= 64; i++) {
    const a = i / 64 * Math.PI * 2;
    pts.push(new THREE.Vector3(Math.cos(a) * size, Math.sin(a) * size, 0));
  }
  return new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({
      color, transparent: true, opacity,
      blending: THREE.AdditiveBlending, depthWrite: false
    })
  );
}
for (let i = 0; i < 7; i++) {
  const sym = (Math.random() > 0.5)
    ? makeHexagram(0.35 + Math.random() * 0.4, 0xc8a154, 0.32)
    : makeCircleSymbol(0.35 + Math.random() * 0.4, 0xc8a154, 0.28);
  const a = Math.random() * Math.PI * 2;
  const r = 8 + Math.random() * 5;
  sym.position.set(Math.cos(a) * r, 1 + Math.random() * 5, Math.sin(a) * r);
  sym.userData = {
    spinZ: (Math.random() - 0.5) * 0.4,
    spinX: (Math.random() - 0.5) * 0.3,
    floatPhase: Math.random() * Math.PI * 2,
    baseY: sym.position.y,
    floatAmp: 0.2 + Math.random() * 0.4
  };
  scene.add(sym);
  symbols.push(sym);
}

// ============================================================
//   CAMERA + INPUT
// ============================================================
const cam = {
  az: -Math.PI / 2 - 0.4, el: 0.05, dist: 16,
  targetAz: -Math.PI / 2 - 0.4, targetEl: 0.05, targetDist: 16,
  dragging: false, lastX: 0, lastY: 0,
  autoOrbit: true, lastInteract: performance.now()
};

// Cinematic opening
const opening = {
  active: true, t: 0, duration: 4.0,
  startAz: -Math.PI / 2 + 0.1, startEl: -0.15, startDist: 8,
  endAz: -Math.PI / 2 - 0.4, endEl: 0.18, endDist: 13
};

function easeInOutCubic(t) {
  return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

function updateCam(dt) {
  if (opening.active) {
    opening.t += dt;
    const p = Math.min(opening.t / opening.duration, 1);
    const e = easeInOutCubic(p);
    cam.targetAz = opening.startAz + (opening.endAz - opening.startAz) * e;
    cam.targetEl = opening.startEl + (opening.endEl - opening.startEl) * e;
    cam.targetDist = opening.startDist + (opening.endDist - opening.startDist) * e;
    cam.az = cam.targetAz; cam.el = cam.targetEl; cam.dist = cam.targetDist;
    if (p >= 1) opening.active = false;
  } else {
    if (cam.autoOrbit) cam.targetAz += 0.001;
    cam.az  += (cam.targetAz  - cam.az)  * 0.07;
    cam.el  += (cam.targetEl  - cam.el)  * 0.07;
    cam.dist += (cam.targetDist - cam.dist) * 0.07;
  }
  const x = cam.dist * Math.cos(cam.el) * Math.cos(cam.az);
  const y = cam.dist * Math.sin(cam.el) + 1.5;
  const z = cam.dist * Math.cos(cam.el) * Math.sin(cam.az);
  camera.position.set(x, y, z);
  camera.lookAt(0, 1.2, 0);
}

let downPos = null;
canvas.addEventListener('mousedown', e => {
  cam.dragging = true; cam.lastX = e.clientX; cam.lastY = e.clientY;
  cam.autoOrbit = false; cam.lastInteract = performance.now();
  downPos = { x: e.clientX, y: e.clientY };
});
window.addEventListener('mousemove', e => {
  if (cam.dragging) {
    const dx = e.clientX - cam.lastX, dy = e.clientY - cam.lastY;
    cam.targetAz  -= dx * 0.005;
    cam.targetEl  = Math.max(-0.4, Math.min(1.2, cam.targetEl + dy * 0.005));
    cam.lastX = e.clientX; cam.lastY = e.clientY;
  }
});
window.addEventListener('mouseup', e => {
  cam.dragging = false;
  if (downPos && Math.abs(e.clientX - downPos.x) < 5 && Math.abs(e.clientY - downPos.y) < 5) {
    handleClick(e.clientX, e.clientY);
  }
  downPos = null;
});
window.addEventListener('wheel', e => {
  cam.targetDist = Math.max(7, Math.min(24, cam.targetDist + e.deltaY * 0.012));
  cam.lastInteract = performance.now();
}, { passive: true });

canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    cam.dragging = true;
    cam.lastX = e.touches[0].clientX; cam.lastY = e.touches[0].clientY;
    cam.autoOrbit = false;
    downPos = { x: cam.lastX, y: cam.lastY };
  }
}, { passive: true });
canvas.addEventListener('touchmove', e => {
  if (cam.dragging && e.touches.length === 1) {
    const dx = e.touches[0].clientX - cam.lastX, dy = e.touches[0].clientY - cam.lastY;
    cam.targetAz  -= dx * 0.005;
    cam.targetEl  = Math.max(-0.4, Math.min(1.2, cam.targetEl + dy * 0.005));
    cam.lastX = e.touches[0].clientX; cam.lastY = e.touches[0].clientY;
  }
}, { passive: true });
canvas.addEventListener('touchend', e => {
  cam.dragging = false;
  if (e.changedTouches && downPos) {
    const t = e.changedTouches[0];
    if (Math.abs(t.clientX - downPos.x) < 5 && Math.abs(t.clientY - downPos.y) < 5) {
      handleClick(t.clientX, t.clientY);
    }
  }
  downPos = null;
});

// ---------- INTERACTION ----------
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const panel = document.getElementById('panel');
const panelName = document.getElementById('panel-name');
const panelHebrew = document.getElementById('panel-hebrew');
const panelSub = document.getElementById('panel-sub');
const panelText = document.getElementById('panel-text');
const rosterItems = document.querySelectorAll('#roster .name');
let activeAngel = null;

function selectAngel(idx) {
  const a = angelObjects[idx];
  const cfg = a.userData.config;
  panelName.textContent = cfg.name;
  panelHebrew.textContent = cfg.hebrew;
  panelSub.textContent = `${cfg.card} · ${cfg.roman} · ${cfg.element}`;
  panelText.textContent = cfg.text;
  panel.classList.add('active');
  activeAngel = a;
  rosterItems.forEach((el, i) => el.classList.toggle('active', i === idx));
  const targetAngle = Math.atan2(a.position.z, a.position.x);
  cam.targetAz = targetAngle + Math.PI / 7;
  cam.autoOrbit = false;
  cam.lastInteract = performance.now();
}
function deselect() {
  panel.classList.remove('active');
  activeAngel = null;
  rosterItems.forEach(el => el.classList.remove('active'));
}
function handleClick(x, y) {
  mouse.x = (x / window.innerWidth) * 2 - 1;
  mouse.y = -(y / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(angelObjects, true);
  if (hits.length > 0) {
    let obj = hits[0].object;
    while (obj.parent && angelObjects.indexOf(obj) === -1) obj = obj.parent;
    const idx = angelObjects.indexOf(obj);
    if (idx >= 0) { selectAngel(idx); return; }
  }
  deselect();
}
rosterItems.forEach(el => {
  el.addEventListener('click', () => selectAngel(parseInt(el.dataset.angel)));
});

// ---------- RESIZE ----------
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============================================================
//   ANIMATION LOOP
// ============================================================
const clock = new THREE.Clock();
function animate() {
  const dt = clock.getDelta();
  const t = clock.getElapsedTime();

  if (!cam.autoOrbit && performance.now() - cam.lastInteract > 12000 && !cam.dragging && !opening.active) {
    cam.autoOrbit = true;
  }
  updateCam(dt);

  // Angels
  angelObjects.forEach((a, i) => {
    const ud = a.userData;

    // Breath hover
    a.position.y = ud.basePos.y + Math.sin(t * 0.5 + i * 1.4) * 0.09;

    // Halo subtle rotation
    ud.halo.rotation.z = Math.sin(t * 0.3 + i) * 0.05;

    // Aura pulse
    const pulse = (a === activeAngel ? 0.13 : 0.06) + Math.sin(t * 0.9 + i * 0.7) * 0.025;
    ud.aura.material.opacity = pulse;
    ud.aura.scale.setScalar(0.95 + Math.sin(t * 0.7 + i) * 0.08);

    // Particles ascending and swirling
    const pos = ud.particles.geometry.attributes.position.array;
    for (let p = 0; p < pos.length / 3; p++) {
      pos[p*3+1] += ud.particleSpeeds[p];
      const r = Math.sqrt(pos[p*3]**2 + pos[p*3+2]**2);
      const ang = Math.atan2(pos[p*3+2], pos[p*3]) + 0.004;
      pos[p*3]   = Math.cos(ang) * r;
      pos[p*3+2] = Math.sin(ang) * r;
      if (pos[p*3+1] > 5) {
        pos[p*3+1] = 0;
        const aa = Math.random() * Math.PI * 2;
        const rr = 0.8 + Math.random() * 2.0;
        pos[p*3]   = Math.cos(aa) * rr;
        pos[p*3+2] = Math.sin(aa) * rr;
      }
    }
    ud.particles.geometry.attributes.position.needsUpdate = true;

    // Type-specific animations
    if (ud.type === 'raphael' && ud.propAnim) {
      const cad = ud.propAnim.obj;
      cad.rotation.y = t * 0.3;
      cad.position.y = 2.55 + Math.sin(t * 0.8) * 0.04;
      cad.userData.orbGlow.scale.setScalar(1.0 + Math.sin(t * 2.2) * 0.18);
    } else if (ud.type === 'michael' && ud.propAnim) {
      const dp = ud.propAnim.drops.geometry.attributes.position.array;
      const sP = ud.propAnim.startP, eP = ud.propAnim.endP;
      for (let p = 0; p < dp.length / 3; p++) {
        ud.propAnim.dropPhase[p] += 0.012;
        if (ud.propAnim.dropPhase[p] > 1) ud.propAnim.dropPhase[p] -= 1;
        const tt = ud.propAnim.dropPhase[p];
        dp[p*3]   = sP.x + (eP.x - sP.x) * tt;
        dp[p*3+1] = sP.y + (eP.y - sP.y) * tt + Math.sin(tt * Math.PI) * 0.18;
        dp[p*3+2] = sP.z + (eP.z - sP.z) * tt + 0.1;
      }
      ud.propAnim.drops.geometry.attributes.position.needsUpdate = true;
    } else if (ud.type === 'gabriel' && ud.propAnim) {
      // Update bell world position
      const sP = ud.propAnim.sound.geometry.attributes.position.array;
      // Trumpet bell tip in local space ≈ wrist + offset
      // We'll use a fixed local emission point relative to angel
      const bell = new THREE.Vector3(0.10, 4.0, -0.30);
      for (let p = 0; p < sP.length / 3; p++) {
        ud.propAnim.soundPhase[p] += 0.007;
        if (ud.propAnim.soundPhase[p] > 1) ud.propAnim.soundPhase[p] = 0;
        const tt = ud.propAnim.soundPhase[p];
        const dx = -0.45 + (p % 5 - 2) * 0.13;
        const dy = 1.05;
        const dz = -0.55 + ((p * 7) % 5 - 2) * 0.13;
        const dist = tt * 2.6;
        sP[p*3]   = bell.x + dx * dist;
        sP[p*3+1] = bell.y + dy * dist;
        sP[p*3+2] = bell.z + dz * dist;
      }
      ud.propAnim.sound.geometry.attributes.position.needsUpdate = true;
    }
  });

  // Floating symbols
  symbols.forEach(s => {
    s.rotation.z += s.userData.spinZ * 0.007;
    s.rotation.x += s.userData.spinX * 0.005;
    s.position.y = s.userData.baseY + Math.sin(t * 0.35 + s.userData.floatPhase) * s.userData.floatAmp;
  });

  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
animate();

// Open with Raphael auto-selected after the opening sequence
setTimeout(() => { if (!activeAngel) selectAngel(0); }, 5500);
</script>
</body>
</html>
