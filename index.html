<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>🌳 Yggdrasil v3 — Tubular Knowledge Tree</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8C%B3%3C/text%3E%3C/svg%3E">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --void: #060A12;
      --gold: #C9A84C;
      --rune: #E8D5A3;
      --amber: #F0A830;
      --mother: #3BF08C;
      --father: #3BB8F0;
      --hybrid: #E0A0FF;
      --bark: #5C3D2E;
      --young: #7FFF7F;
      --old: #FF6B3D;
      --ancient: #C8A0FF;
      --panel: rgba(6, 10, 18, 0.92);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'IBM Plex Mono', monospace;
      background: var(--void);
      color: var(--rune);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    canvas#c {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    #hud {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 20;
      pointer-events: none;
    }

    #hud > * { pointer-events: auto; }

    .hud-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      background: linear-gradient(180deg, rgba(6,10,18,0.96) 0%, rgba(6,10,18,0.7) 70%, transparent 100%);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(201,168,76,0.12);
      gap: 8px;
    }

    .hud-title {
      font-family: 'Cinzel', serif;
      font-weight: 900;
      font-size: 1.15rem;
      letter-spacing: 0.12em;
      background: linear-gradient(135deg, var(--gold), var(--amber), #fff, var(--gold));
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 4s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .hud-sub {
      font-size: 8px;
      opacity: 0.25;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-left: 10px;
    }

    .hud-controls {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .hud-btn {
      background: rgba(201,168,76,0.06);
      border: 1px solid rgba(201,168,76,0.15);
      color: var(--rune);
      padding: 4px 10px;
      border-radius: 5px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      cursor: pointer;
      transition: all 0.25s;
      white-space: nowrap;
    }

    .hud-btn:hover {
      background: rgba(201,168,76,0.18);
      border-color: var(--gold);
      box-shadow: 0 0 10px rgba(201,168,76,0.12);
    }

    .hud-btn.active {
      background: rgba(201,168,76,0.22);
      border-color: var(--gold);
      color: var(--gold);
    }

    #search-box {
      background: rgba(6,10,18,0.85);
      border: 1px solid rgba(201,168,76,0.15);
      color: var(--rune);
      padding: 4px 10px;
      border-radius: 5px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      width: 180px;
      outline: none;
      transition: border-color 0.3s;
    }

    #search-box:focus {
      border-color: var(--gold);
      box-shadow: 0 0 8px rgba(201,168,76,0.15);
    }

    #search-box::placeholder {
      color: rgba(232,213,163,0.2);
    }

    #filter-row,
    #lang-row {
      display: flex;
      gap: 3px;
      padding-left: 14px;
      padding-right: 14px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    #filter-row::-webkit-scrollbar,
    #lang-row::-webkit-scrollbar {
      display: none;
    }

    #filter-row {
      padding-top: 5px;
      padding-bottom: 5px;
      background: rgba(6,10,18,0.4);
    }

    #lang-row {
      padding-top: 4px;
      padding-bottom: 4px;
      background: rgba(6,10,18,0.25);
    }

    .fpill {
      flex-shrink: 0;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 9px;
      cursor: pointer;
      border: 1px solid rgba(201,168,76,0.08);
      background: transparent;
      color: rgba(232,213,163,0.35);
      transition: all 0.2s;
      font-family: 'IBM Plex Mono', monospace;
    }

    .fpill:hover {
      color: var(--rune);
      border-color: rgba(201,168,76,0.25);
    }

    .fpill.active {
      background: rgba(201,168,76,0.12);
      color: var(--gold);
      border-color: rgba(201,168,76,0.35);
    }

    .lpill {
      flex-shrink: 0;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 9px;
      cursor: pointer;
      border: 1px solid rgba(59,240,140,0.1);
      background: transparent;
      color: rgba(59,240,140,0.4);
      transition: all 0.2s;
      font-family: 'IBM Plex Mono', monospace;
    }

    .lpill:hover {
      color: var(--mother);
      border-color: rgba(59,240,140,0.3);
    }

    .lpill.active {
      background: rgba(59,240,140,0.1);
      color: var(--mother);
      border-color: rgba(59,240,140,0.4);
    }

    #card-dock {
      position: fixed;
      right: 14px;
      top: 104px;
      bottom: 52px;
      width: min(360px, calc(100vw - 28px));
      z-index: 18;
      display: none;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }

    #card-dock.visible {
      display: flex;
    }

    .dock-header {
      pointer-events: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(6,10,18,0.90);
      border: 1px solid rgba(201,168,76,0.12);
      backdrop-filter: blur(14px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .dock-header-title {
      font-family: 'Cinzel', serif;
      color: var(--gold);
      font-size: 12px;
      letter-spacing: 0.08em;
      font-weight: 700;
    }

    .dock-header-sub {
      font-size: 8px;
      color: rgba(232,213,163,0.38);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .dock-list {
      min-height: 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-right: 2px;
      pointer-events: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(201,168,76,0.25) transparent;
    }

    .node-card {
      background: rgba(6,10,18,0.94);
      border: 1px solid rgba(201,168,76,0.12);
      border-radius: 14px;
      padding: 12px 12px 10px 12px;
      backdrop-filter: blur(14px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    .node-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 6px;
    }

    .node-card-top-left {
      min-width: 0;
      flex: 1;
    }

    .node-file-label {
      font-size: 8px;
      color: rgba(232,213,163,0.34);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .node-card-name {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      color: var(--gold);
      line-height: 1.25;
      margin-bottom: 4px;
      word-break: break-word;
    }

    .node-card-title {
      font-size: 10px;
      color: rgba(255,255,255,0.8);
      line-height: 1.45;
      margin-bottom: 6px;
      word-break: break-word;
    }

    .node-card-title.muted {
      color: rgba(232,213,163,0.45);
      font-style: italic;
    }

    .card-close {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: 1px solid rgba(201,168,76,0.16);
      background: rgba(201,168,76,0.05);
      color: var(--rune);
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
      line-height: 1;
      transition: all 0.2s;
    }

    .card-close:hover {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(201,168,76,0.12);
    }

    .node-meta {
      color: rgba(232,213,163,0.46);
      font-size: 8px;
      margin-bottom: 8px;
      letter-spacing: 0.04em;
      line-height: 1.55;
    }

    .node-age-bar {
      height: 4px;
      border-radius: 999px;
      margin: 6px 0 8px 0;
      background: rgba(255,255,255,0.05);
      overflow: hidden;
    }

    .node-age-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.4s ease;
    }

    .node-gene {
      font-size: 9px;
      margin-bottom: 8px;
      opacity: 0.7;
      line-height: 1.5;
    }

    .node-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    .node-actions button {
      flex: 1;
      padding: 8px 6px;
      border-radius: 8px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid;
      transition: all 0.2s;
      letter-spacing: 0.05em;
    }

    .btn-play {
      background: rgba(59,240,140,0.12);
      border-color: rgba(59,240,140,0.25) !important;
      color: var(--mother);
    }

    .btn-play:hover {
      background: rgba(59,240,140,0.25);
      box-shadow: 0 0 12px rgba(59,240,140,0.15);
    }

    .btn-code {
      background: rgba(59,184,240,0.08);
      border-color: rgba(59,184,240,0.2) !important;
      color: var(--father);
    }

    .btn-code:hover {
      background: rgba(59,184,240,0.2);
      box-shadow: 0 0 12px rgba(59,184,240,0.12);
    }

    .btn-focus {
      background: rgba(201,168,76,0.08);
      border-color: rgba(201,168,76,0.20) !important;
      color: var(--gold);
    }

    .btn-focus:hover {
      background: rgba(201,168,76,0.18);
      box-shadow: 0 0 12px rgba(201,168,76,0.12);
    }

    .legend {
      position: fixed;
      bottom: 14px;
      left: 14px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 9px;
      opacity: 0.6;
    }

    .leg-item {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 8px;
      background: rgba(6,10,18,0.75);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.04);
      backdrop-filter: blur(6px);
    }

    .leg-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
    }

    #gen-box {
      position: fixed;
      top: 100px;
      right: 14px;
      z-index: 10;
      font-family: 'Cinzel', serif;
      text-align: right;
      pointer-events: none;
    }

    #gen-box .gen-label {
      font-size: 8px;
      color: rgba(201,168,76,0.3);
      letter-spacing: 0.15em;
    }

    #gen-box .gen-num {
      font-size: 32px;
      font-weight: 900;
      color: var(--gold);
      opacity: 0.5;
      line-height: 1;
    }

    #stats {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 8;
      text-align: center;
      padding: 3px;
      font-size: 8px;
      color: rgba(232,213,163,0.2);
      letter-spacing: 0.08em;
      background: linear-gradient(0deg, rgba(6,10,18,0.85) 0%, transparent 100%);
    }

    .age-legend {
      position: fixed;
      top: 100px;
      left: 14px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 3px;
      font-size: 8px;
      opacity: 0.5;
    }

    .age-legend .age-bar {
      width: 80px;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--ancient), var(--old), var(--amber), var(--young));
    }

    .age-legend .age-labels {
      display: flex;
      justify-content: space-between;
      font-size: 7px;
      color: rgba(232,213,163,0.3);
    }

    #loader {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: var(--void);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.8s;
    }

    #loader.gone {
      opacity: 0;
      pointer-events: none;
    }

    .loader-icon {
      font-size: 52px;
      animation: breathe 2.5s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.3; transform: scale(0.92); }
      50% { opacity: 1; transform: scale(1.08); }
    }

    .loader-txt {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      color: var(--gold);
      margin-top: 14px;
      letter-spacing: 0.2em;
      opacity: 0.5;
    }

    @media (max-width: 900px) {
      #card-dock {
        top: auto;
        left: 10px;
        right: 10px;
        bottom: 46px;
        width: auto;
        max-height: 54vh;
      }

      .dock-header {
        padding: 9px 10px;
      }

      .node-card {
        padding: 11px 10px 9px 10px;
      }

      #gen-box {
        display: none;
      }

      .legend {
        left: 10px;
        bottom: 36px;
      }
    }
  </style>
</head>
<body>
  <div id="loader">
    <div class="loader-icon">🌳</div>
    <div class="loader-txt">GERMINATING YGGDRASIL…</div>
  </div>

  <canvas id="c"></canvas>

  <div id="hud">
    <div class="hud-bar">
      <div style="display:flex;align-items:center;min-width:0;">
        <span class="hud-title">🌳 YGGDRASIL</span>
        <span class="hud-sub">tubular knowledge tree v3</span>
      </div>

      <div class="hud-controls">
        <input type="text" id="search-box" placeholder="⌘K search…" />
        <button class="hud-btn" id="btn-grow">🌱 Grow</button>
        <button class="hud-btn" id="btn-clear-cards">🗂 Clear Cards</button>
        <button class="hud-btn" id="btn-reset">⟲ Reset</button>
      </div>
    </div>

    <div id="filter-row"></div>
    <div id="lang-row"></div>
  </div>

  <div id="card-dock"></div>

  <div class="legend">
    <div class="leg-item"><div class="leg-dot" style="background:var(--mother);box-shadow:0 0 5px var(--mother)"></div>🧬 Mother — Structure</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--father);box-shadow:0 0 5px var(--father)"></div>🧬 Father — Creative</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--hybrid);box-shadow:0 0 5px var(--hybrid)"></div>🧬 Hybrid — Emergent</div>
  </div>

  <div id="gen-box">
    <div class="gen-label">GENERATION</div>
    <div class="gen-num" id="gen-num">0</div>
  </div>

  <div class="age-legend">
    <div style="font-size:7px;color:rgba(232,213,163,0.3);margin-bottom:2px;">AGE SPECTRUM</div>
    <div class="age-bar"></div>
    <div class="age-labels"><span>ancient</span><span>mid</span><span>new</span></div>
  </div>

  <div id="stats">⏳ seeding…</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    const CFG = {
      user: 'aaroncwacker',
      repo: 'AI-UI-UX-JS',
      root: 'https://aaroncwacker.github.io/AI-UI-UX-JS/',
    };

    const FILE_TYPES = [
      { id: 'all',   keys: ['all'], label: 'All',    emoji: '💠' },
      { id: 'ai',    keys: ['ai','bot','gpt','gemini','claude','llm','agent','speech','voice'], label: 'AI', emoji: '🧠' },
      { id: 'sim',   keys: ['sim','city','traffic','evolution','network','population'], label: 'Sim', emoji: '🌍' },
      { id: 'tool',  keys: ['builder','editor','visualizer','dashboard','teleprompter','graph','art','creator'], label: 'Tools', emoji: '🛠️' },
      { id: 'audio', keys: ['mp3','audio','jam','looper','chord','music','sound'], label: 'Audio', emoji: '🎵' },
      { id: 'video', keys: ['video','cam','cinema','timeline','sequencer','mp4'], label: 'Video', emoji: '📹' },
      { id: 'game',  keys: ['game','arcade','quest','brawl','combat','retro','memory','play','versus'], label: 'Arcade', emoji: '🕹️' },
      { id: 'drive', keys: ['drive','racer','rally','racing','car'], label: 'Racing', emoji: '🏎️' },
      { id: 'cards', keys: ['tarot','oracle','deck','spirit','card'], label: 'Tarot', emoji: '🔮' },
      { id: '3d',    keys: ['3d','webgl','three','canvas','skyforge'], label: '3D', emoji: '🧊' },
      { id: 'gps',   keys: ['gps','map','zipcode','location'], label: 'Maps', emoji: '📍' },
      { id: 'space', keys: ['alien','ufo','space','starship','thor'], label: 'Sci-Fi', emoji: '🚀' },
    ];

    function detectLang(name) {
      if (name.endsWith('.py')) return 'Python';
      const n = name.toLowerCase();
      if (n.includes('three') || n.includes('3d') || n.includes('webgl') || n.includes('skyforge')) return 'Three.js';
      if (n.includes('phaser')) return 'Phaser';
      if (n.includes('pixi')) return 'PixiJS';
      if (n.includes('babylon')) return 'Babylon';
      if (n.includes('aframe') || n.includes('a-frame')) return 'A-Frame';
      if (n.includes('matter')) return 'Matter.js';
      if (n.includes('tone') || n.includes('audio') || n.includes('synth') || n.includes('music')) return 'WebAudio';
      if (n.includes('canvas') || n.includes('draw') || n.includes('paint')) return 'Canvas2D';
      if (n.includes('map') || n.includes('gps') || n.includes('leaflet')) return 'Maps/Geo';
      if (n.includes('chart') || n.includes('graph') || n.includes('viz') || n.includes('plot')) return 'DataViz';
      return 'HTML/JS';
    }

    const LANG_COLORS = {
      'Python': 0x3572A5,
      'Three.js': 0x049EF4,
      'Phaser': 0xF1007E,
      'PixiJS': 0xE72264,
      'Babylon': 0xBB464B,
      'A-Frame': 0xEF2D5E,
      'Matter.js': 0x4B5563,
      'WebAudio': 0x7C3AED,
      'Canvas2D': 0xF59E0B,
      'Maps/Geo': 0x10B981,
      'DataViz': 0x06B6D4,
      'HTML/JS': 0xF0DB4F,
      'Other': 0x9CA3AF,
    };

    let apps = [];
    let treeNodes = [];
    let branchMeshes = [];

    let generation = 0;
    let activeFilter = 'all';
    let activeLang = 'all';
    let searchTerm = '';

    let selectedNode = null;
    let openCardNames = [];

    let oldestDate = Date.now();
    let newestDate = Date.now();

    // === THREE ===
    const canvas = document.getElementById('c');
    const R = new THREE.WebGLRenderer({ canvas, antialias: true });
    R.setSize(innerWidth, innerHeight);
    R.setPixelRatio(Math.min(devicePixelRatio, 2));
    R.setClearColor(0x060A12);
    R.shadowMap.enabled = true;
    R.shadowMap.type = THREE.PCFSoftShadowMap;

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x060A12, 0.008);

    const cam = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 600);
    cam.position.set(0, 18, 45);

    scene.add(new THREE.AmbientLight(0x151525, 0.5));

    const sun = new THREE.DirectionalLight(0xC9A84C, 0.35);
    sun.position.set(25, 50, 15);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    scene.add(sun);

    const mL = new THREE.PointLight(0x3BF08C, 0.7, 70);
    mL.position.set(-18, 22, 8);
    scene.add(mL);

    const fL = new THREE.PointLight(0x3BB8F0, 0.7, 70);
    fL.position.set(18, 22, -8);
    scene.add(fL);

    const hL = new THREE.PointLight(0xE0A0FF, 0.4, 50);
    hL.position.set(0, 30, 0);
    scene.add(hL);

    const gnd = new THREE.Mesh(
      new THREE.CircleGeometry(55, 64),
      new THREE.MeshStandardMaterial({ color: 0x080C16, roughness: 0.95, metalness: 0.05 })
    );
    gnd.rotation.x = -Math.PI / 2;
    gnd.receiveShadow = true;
    scene.add(gnd);

    for (let i = 0; i < 3; i++) {
      const rr = new THREE.Mesh(
        new THREE.RingGeometry(12 + i * 8, 12.15 + i * 8, 96),
        new THREE.MeshBasicMaterial({
          color: 0xC9A84C,
          transparent: true,
          opacity: 0.035 - i * 0.008,
          side: THREE.DoubleSide
        })
      );
      rr.rotation.x = -Math.PI / 2;
      rr.position.y = 0.01;
      scene.add(rr);
    }

    const pCount = 800;
    const pGeo = new THREE.BufferGeometry();
    const pPos = new Float32Array(pCount * 3);
    const pCol = new Float32Array(pCount * 3);

    for (let i = 0; i < pCount; i++) {
      pPos[i * 3] = (Math.random() - 0.5) * 90;
      pPos[i * 3 + 1] = Math.random() * 40;
      pPos[i * 3 + 2] = (Math.random() - 0.5) * 90;

      const c = new THREE.Color().setHSL(0.12 + Math.random() * 0.05, 0.5, 0.4 + Math.random() * 0.2);
      pCol[i * 3] = c.r;
      pCol[i * 3 + 1] = c.g;
      pCol[i * 3 + 2] = c.b;
    }

    pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
    pGeo.setAttribute('color', new THREE.BufferAttribute(pCol, 3));

    const particles = new THREE.Points(
      pGeo,
      new THREE.PointsMaterial({ size: 0.12, transparent: true, opacity: 0.25, vertexColors: true })
    );
    scene.add(particles);

    // === L-SYSTEM ===
    const LS = {
      mother: { axiom: 'F', rules: { 'F': 'F[+F]F[-F]F' }, angle: 25.7, scale: 0.85 },
      father: { axiom: 'F', rules: { 'F': 'FF+[+F-F-F]-[-F+F+F]' }, angle: 22.5, scale: 0.78 },
    };

    function expand(ax, ru, it) {
      let s = ax;
      for (let i = 0; i < it; i++) {
        let n = '';
        for (const c of s) n += ru[c] || c;
        s = n;
      }
      return s;
    }

    function cleanName(f) {
      return f.replace(/\.html$/i, '').replace(/\.py$/i, '').replace(/[-_]/g, ' ');
    }

    function getFileType(name) {
      const l = name.toLowerCase();
      return FILE_TYPES.slice(1).find(t => t.keys.some(k => l.includes(k))) || { id: 'other', label: 'App', emoji: '⚡' };
    }

    function hashString(str) {
      let h = 0;
      for (let i = 0; i < str.length; i++) {
        h = ((h << 5) - h + str.charCodeAt(i)) | 0;
      }
      return Math.abs(h);
    }

    function lineageFromName(name) {
      const idx = hashString(name) % 3;
      return idx === 0 ? 'mother' : idx === 1 ? 'father' : 'hybrid';
    }

    function lineageText(lineage) {
      if (lineage === 'mother') {
        return {
          label: 'mother',
          gene: '🌿 Structure lineage — orderly branching',
          color: 0x3BF08C,
        };
      }
      if (lineage === 'father') {
        return {
          label: 'father',
          gene: '🌊 Chaos lineage — exploratory branching',
          color: 0x3BB8F0,
        };
      }
      return {
        label: 'hybrid',
        gene: '✨ Hybrid — emergent traits from both',
        color: 0xE0A0FF,
      };
    }

    // === AGE ===
    function getAge01(d) {
      if (!d || oldestDate === newestDate) return 0.5;
      return Math.max(0, Math.min(1, (d - oldestDate) / (newestDate - oldestDate)));
    }

    function ageColor(a) {
      if (a > 0.7) return new THREE.Color(0x7FFF7F);
      if (a > 0.4) return new THREE.Color(0xF0A830);
      if (a > 0.15) return new THREE.Color(0xFF6B3D);
      return new THREE.Color(0xC8A0FF);
    }

    function ageDays(d) {
      if (!d) return '?';
      const days = Math.floor((Date.now() - d) / 86400000);
      if (days === 0) return 'today';
      if (days < 30) return days + 'd';
      if (days < 365) return Math.floor(days / 30) + 'mo';
      return Math.floor(days / 365) + 'yr ' + Math.floor((days % 365) / 30) + 'mo';
    }

    // === TREE ===
    function clearTree() {
      treeNodes.forEach(n => {
        if (n.mesh) scene.remove(n.mesh);
        if (n.glow) scene.remove(n.glow);
      });
      branchMeshes.forEach(m => scene.remove(m));
      treeNodes = [];
      branchMeshes = [];
    }

    function buildTree(appList, gen) {
      clearTree();
      if (!appList.length) return;

      const langGroups = {};
      appList.forEach(a => {
        const l = a.lang || 'HTML/JS';
        if (!langGroups[l]) langGroups[l] = [];
        langGroups[l].push(a);
      });

      const langs = Object.keys(langGroups).sort((a, b) => langGroups[b].length - langGroups[a].length);

      const trunkH = 5 + gen * 1.2;
      const iters = Math.min(gen + 2, 4);
      const mStr = expand(LS.mother.axiom, LS.mother.rules, Math.min(iters, 3));
      const fStr = expand(LS.father.axiom, LS.father.rules, Math.min(iters, 3));

      const tPts = [];
      for (let i = 0; i <= 16; i++) {
        const t = i / 16;
        tPts.push(new THREE.Vector3(
          Math.sin(t * 5 + gen) * 0.25,
          t * trunkH,
          Math.cos(t * 3 + gen) * 0.15
        ));
      }

      const tCurve = new THREE.CatmullRomCurve3(tPts);
      const trunk = new THREE.Mesh(
        new THREE.TubeGeometry(tCurve, 24, 0.7 - gen * 0.012, 10, false),
        new THREE.MeshStandardMaterial({ color: 0x5C3D2E, roughness: 0.88, metalness: 0.08 })
      );
      trunk.castShadow = true;
      scene.add(trunk);
      branchMeshes.push(trunk);

      for (let r = 0; r < 6; r++) {
        const a = (r / 6) * Math.PI * 2;
        const rc = new THREE.CatmullRomCurve3([
          new THREE.Vector3(0, 0, 0),
          new THREE.Vector3(Math.cos(a) * 3.5, -0.6, Math.sin(a) * 3.5),
          new THREE.Vector3(Math.cos(a) * 7, -2, Math.sin(a) * 7),
        ]);

        const rm = new THREE.Mesh(
          new THREE.TubeGeometry(rc, 10, 0.12, 6, false),
          new THREE.MeshStandardMaterial({ color: 0x3D2917, roughness: 0.95 })
        );
        scene.add(rm);
        branchMeshes.push(rm);
      }

      const GA = Math.PI * (3 - Math.sqrt(5));
      let gIdx = 0;

      langs.forEach((lang, lIdx) => {
        const group = langGroups[lang];
        const lc = new THREE.Color(LANG_COLORS[lang] || 0x9CA3AF);
        const brT = (lIdx + 1) / (langs.length + 1);
        const brOrigin = tCurve.getPoint(brT);
        const brAngle = lIdx * GA;
        const brLen = 4 + group.length * 0.25 + gen * 0.7;
        const bDir = new THREE.Vector3(Math.cos(brAngle), 0.55 + Math.random() * 0.25, Math.sin(brAngle)).normalize();
        const lStr = lIdx % 2 === 0 ? mStr : fStr;
        const bPts = [];

        for (let s = 0; s <= 8; s++) {
          const st = s / 8;
          const lch = lStr[(lIdx * 7 + s) % lStr.length];
          const pert = lch === '+' ? 0.15 : lch === '-' ? -0.15 : 0;
          bPts.push(
            brOrigin.clone().add(
              bDir.clone().multiplyScalar(st * brLen).add(
                new THREE.Vector3(
                  Math.sin(st * 4 + lIdx) * 0.5 + pert * 2,
                  st * brLen * 0.4,
                  Math.cos(st * 3 + lIdx) * 0.5
                )
              )
            )
          );
        }

        const bCurve = new THREE.CatmullRomCurve3(bPts);
        const bTR = 0.16 + group.length * 0.01;

        const bTube = new THREE.Mesh(
          new THREE.TubeGeometry(bCurve, 16, bTR, 8, false),
          new THREE.MeshStandardMaterial({
            color: lc.clone().multiplyScalar(0.35),
            emissive: lc,
            emissiveIntensity: 0.05,
            roughness: 0.7,
            metalness: 0.15,
            transparent: true,
            opacity: 0.7,
          })
        );
        bTube.castShadow = true;
        scene.add(bTube);
        branchMeshes.push(bTube);

        group.forEach((app, sIdx) => {
          const st = (sIdx + 1) / (group.length + 1);
          const nPos = bCurve.getPoint(st);
          const outA = sIdx * GA * 2.5;
          const outR = bTR * 2 + 0.55 + Math.sin(sIdx * 1.7) * 0.25;
          const tan = bCurve.getTangent(st);
          const up = new THREE.Vector3(0, 1, 0);
          const side = new THREE.Vector3().crossVectors(tan, up).normalize();
          const upD = new THREE.Vector3().crossVectors(side, tan).normalize();

          nPos.add(side.clone().multiplyScalar(Math.cos(outA) * outR));
          nPos.add(upD.clone().multiplyScalar(Math.sin(outA) * outR));

          const lineage = gIdx % 3 === 0 ? 'mother' : gIdx % 3 === 1 ? 'father' : 'hybrid';
          const linCol = lineage === 'mother' ? 0x3BF08C : lineage === 'father' ? 0x3BB8F0 : 0xE0A0FF;
          const age01 = getAge01(app.date);
          const ac = ageColor(age01);
          const nSize = 0.28 + age01 * 0.22;
          const detail = age01 > 0.6 ? 2 : age01 > 0.3 ? 1 : 0;

          const mesh = new THREE.Mesh(
            new THREE.IcosahedronGeometry(nSize, detail),
            new THREE.MeshStandardMaterial({
              color: lc.clone().lerp(ac, 0.4),
              emissive: linCol,
              emissiveIntensity: 0.1 + age01 * 0.18,
              roughness: 0.35,
              metalness: 0.25,
              transparent: true,
              opacity: 0.88,
            })
          );
          mesh.position.copy(nPos);
          mesh.castShadow = true;
          scene.add(mesh);

          const gMesh = new THREE.Mesh(
            new THREE.SphereGeometry(nSize * 1.8, 8, 8),
            new THREE.MeshBasicMaterial({
              color: linCol,
              transparent: true,
              opacity: 0.035 + age01 * 0.025
            })
          );
          gMesh.position.copy(nPos);
          scene.add(gMesh);

          const connPt = bCurve.getPoint(st);
          const connLine = new THREE.Line(
            new THREE.BufferGeometry().setFromPoints([connPt, nPos]),
            new THREE.LineBasicMaterial({ color: lc, transparent: true, opacity: 0.15 })
          );
          scene.add(connLine);
          branchMeshes.push(connLine);

          mesh.userData = { nodeIndex: treeNodes.length };
          treeNodes.push({
            mesh,
            glow: gMesh,
            app,
            lineage,
            lang,
            fileType: getFileType(app.name),
            age01,
            baseColor: linCol,
            originalScale: mesh.scale.clone(),
          });

          gIdx++;
        });
      });
    }

    function getAppByName(name) {
      return apps.find(a => a.name === name) || null;
    }

    function getNodeByAppName(name) {
      return treeNodes.find(n => n.app && n.app.name === name) || null;
    }

    function getPlayUrl(app) {
      return app.name.endsWith('.py')
        ? ('python-runner.html?file=' + encodeURIComponent(app.name))
        : (CFG.root + app.name);
    }

    async function ensureHtmlTitle(app) {
      if (!app || !app.name.endsWith('.html') || app.titleLoaded) return;
      app.titleLoaded = true;

      try {
        const res = await fetch(CFG.root + app.name, { cache: 'force-cache' });
        if (!res.ok) throw new Error('title fetch failed');

        const text = await res.text();
        const doc = new DOMParser().parseFromString(text, 'text/html');
        const title = (doc.querySelector('title')?.textContent || '').trim();

        if (title) {
          app.pageTitle = title;
        }
      } catch (err) {
        // Deliberately silent fallback to filename
      }

      renderOpenCards();
    }

    function openNodeCard(node) {
      if (!node || !node.app) return;

      const name = node.app.name;
      selectedNode = node;

      if (!openCardNames.includes(name)) {
        openCardNames.push(name);
      } else {
        openCardNames = openCardNames.filter(n => n !== name);
        openCardNames.push(name);
      }

      tHt = node.mesh.position.y;
      tDt = 22;

      renderOpenCards();
      ensureHtmlTitle(node.app);
    }

    function closeNodeCard(name) {
      openCardNames = openCardNames.filter(n => n !== name);
      if (selectedNode && selectedNode.app && selectedNode.app.name === name) {
        selectedNode = null;
      }
      renderOpenCards();
    }

    function clearCards() {
      openCardNames = [];
      selectedNode = null;
      renderOpenCards();
    }

    function focusNodeByName(name) {
      const node = getNodeByAppName(name);
      if (!node) return;
      selectedNode = node;
      tHt = node.mesh.position.y;
      tDt = 22;
      autoR = false;
    }

    function renderOpenCards() {
      const dock = document.getElementById('card-dock');
      dock.innerHTML = '';

      const validNames = openCardNames.filter(name => !!getAppByName(name));
      openCardNames = validNames;

      if (!openCardNames.length) {
        dock.classList.remove('visible');
        return;
      }

      dock.classList.add('visible');

      const header = document.createElement('div');
      header.className = 'dock-header';

      const headerLeft = document.createElement('div');

      const headerTitle = document.createElement('div');
      headerTitle.className = 'dock-header-title';
      headerTitle.textContent = '🗂 Open App Cards';

      const headerSub = document.createElement('div');
      headerSub.className = 'dock-header-sub';
      headerSub.textContent = openCardNames.length + ' pinned for compare / play / code';

      headerLeft.appendChild(headerTitle);
      headerLeft.appendChild(headerSub);

      const clearBtn = document.createElement('button');
      clearBtn.className = 'hud-btn';
      clearBtn.textContent = 'Clear All';
      clearBtn.onclick = clearCards;

      header.appendChild(headerLeft);
      header.appendChild(clearBtn);
      dock.appendChild(header);

      const list = document.createElement('div');
      list.className = 'dock-list';

      [...openCardNames].reverse().forEach(name => {
        const app = getAppByName(name);
        if (!app) return;

        const node = getNodeByAppName(name);
        const lineage = node?.lineage || lineageFromName(name);
        const lineageInfo = lineageText(lineage);
        const fileType = getFileType(app.name);
        const age01 = node?.age01 ?? getAge01(app.date);
        const ac = ageColor(age01);
        const ageRgb = `rgb(${(ac.r * 255) | 0}, ${(ac.g * 255) | 0}, ${(ac.b * 255) | 0})`;

        const card = document.createElement('div');
        card.className = 'node-card';

        const top = document.createElement('div');
        top.className = 'node-card-top';

        const left = document.createElement('div');
        left.className = 'node-card-top-left';

        const fileLabel = document.createElement('div');
        fileLabel.className = 'node-file-label';
        fileLabel.textContent = 'FILE';

        const cardName = document.createElement('div');
        cardName.className = 'node-card-name';
        cardName.textContent = `${fileType.emoji} ${cleanName(app.name)}`;

        const cardTitle = document.createElement('div');
        cardTitle.className = 'node-card-title';

        if (app.name.endsWith('.html')) {
          if (app.pageTitle) {
            cardTitle.textContent = `🪪 ${app.pageTitle}`;
          } else {
            cardTitle.textContent = '🪪 reading page title…';
            cardTitle.classList.add('muted');
          }
        } else {
          cardTitle.textContent = '🐍 Python source app';
          cardTitle.classList.add('muted');
        }

        left.appendChild(fileLabel);
        left.appendChild(cardName);
        left.appendChild(cardTitle);

        const closeBtn = document.createElement('button');
        closeBtn.className = 'card-close';
        closeBtn.textContent = '✕';
        closeBtn.title = 'Close card';
        closeBtn.onclick = () => closeNodeCard(name);

        top.appendChild(left);
        top.appendChild(closeBtn);
        card.appendChild(top);

        const meta = document.createElement('div');
        meta.className = 'node-meta';
        meta.textContent =
          `📄 ${app.name} · 📅 ${app.date ? new Date(app.date).toLocaleDateString() : 'unknown'} · ` +
          `⏱ ${ageDays(app.date)} · 🏷 ${fileType.label} · 💬 ${app.lang || 'HTML/JS'} · 🧬 ${lineageInfo.label}`;
        card.appendChild(meta);

        const ageBar = document.createElement('div');
        ageBar.className = 'node-age-bar';

        const ageFill = document.createElement('div');
        ageFill.className = 'node-age-fill';
        ageFill.style.width = `${age01 * 100}%`;
        ageFill.style.background = ageRgb;

        ageBar.appendChild(ageFill);
        card.appendChild(ageBar);

        const gene = document.createElement('div');
        gene.className = 'node-gene';
        gene.textContent = lineageInfo.gene;
        card.appendChild(gene);

        const actions = document.createElement('div');
        actions.className = 'node-actions';

        const playBtn = document.createElement('button');
        playBtn.className = 'btn-play';
        playBtn.textContent = '▶ Play';
        playBtn.onclick = () => window.open(getPlayUrl(app), '_blank', 'noopener');

        const codeBtn = document.createElement('button');
        codeBtn.className = 'btn-code';
        codeBtn.textContent = '{ } Code';
        codeBtn.onclick = () => window.open(`https://github.com/${CFG.user}/${CFG.repo}/blob/main/${app.name}`, '_blank', 'noopener');

        const focusBtn = document.createElement('button');
        focusBtn.className = 'btn-focus';
        focusBtn.textContent = '◎ Focus';
        focusBtn.onclick = () => focusNodeByName(name);

        actions.appendChild(playBtn);
        actions.appendChild(codeBtn);
        actions.appendChild(focusBtn);
        card.appendChild(actions);

        list.appendChild(card);

        if (app.name.endsWith('.html') && !app.pageTitle && !app.titleLoaded) {
          ensureHtmlTitle(app);
        }
      });

      dock.appendChild(list);
    }

    // === CAMERA ===
    let dragging = false;
    let pM = { x: 0, y: 0 };
    let cA = 0, cH = 18, cD = 45;
    let tA = 0, tHt = 18, tDt = 45;
    let autoR = true;

    canvas.addEventListener('pointerdown', e => {
      dragging = true;
      pM = { x: e.clientX, y: e.clientY };
      autoR = false;
    });

    canvas.addEventListener('pointermove', e => {
      if (!dragging) return;
      tA += (e.clientX - pM.x) * 0.005;
      tHt = Math.max(2, Math.min(40, tHt - (e.clientY - pM.y) * 0.1));
      pM = { x: e.clientX, y: e.clientY };
    });

    canvas.addEventListener('pointerup', () => dragging = false);
    canvas.addEventListener('pointerleave', () => dragging = false);

    canvas.addEventListener('wheel', e => {
      tDt = Math.max(8, Math.min(90, tDt + e.deltaY * 0.05));
    });

    // === RAYCAST ===
    const ray = new THREE.Raycaster();
    const mPos = new THREE.Vector2();
    let hovered = null;

    canvas.addEventListener('pointermove', e => {
      mPos.x = (e.clientX / innerWidth) * 2 - 1;
      mPos.y = -(e.clientY / innerHeight) * 2 + 1;
    });

    canvas.addEventListener('click', () => {
      if (hovered) {
        openNodeCard(hovered);
      }
    });

    // === FILTERS ===
    function buildFilters() {
      const row = document.getElementById('filter-row');
      row.innerHTML = '';

      FILE_TYPES.forEach(ft => {
        const b = document.createElement('button');
        b.className = `fpill ${ft.id === activeFilter ? 'active' : ''}`;
        b.textContent = `${ft.emoji} ${ft.label}`;
        b.onclick = () => {
          activeFilter = ft.id;
          document.querySelectorAll('.fpill').forEach(p => p.classList.remove('active'));
          b.classList.add('active');
          rebuild();
        };
        row.appendChild(b);
      });
    }

    function buildLangFilters() {
      const row = document.getElementById('lang-row');
      row.innerHTML = '';

      const counts = {};
      apps.forEach(a => {
        const l = a.lang || 'HTML/JS';
        counts[l] = (counts[l] || 0) + 1;
      });

      const sorted = ['all', ...Object.keys(counts).sort((a, b) => counts[b] - counts[a])];

      sorted.forEach(lang => {
        const b = document.createElement('button');
        b.className = `lpill ${lang === activeLang ? 'active' : ''}`;
        const ct = lang === 'all' ? apps.length : (counts[lang] || 0);
        b.textContent = lang === 'all' ? `🌐 All (${ct})` : `${lang} (${ct})`;

        b.onclick = () => {
          activeLang = lang;
          document.querySelectorAll('.lpill').forEach(p => p.classList.remove('active'));
          b.classList.add('active');
          rebuild();
        };

        row.appendChild(b);
      });
    }

    function getFiltered() {
      return apps.filter(a => {
        const n = cleanName(a.name).toLowerCase();
        const l = a.lang || 'HTML/JS';
        return n.includes(searchTerm) &&
          (
            activeFilter === 'all' ||
            FILE_TYPES.find(f => f.id === activeFilter)?.keys.some(k => n.includes(k))
          ) &&
          (activeLang === 'all' || l === activeLang);
      });
    }

    function rebuild() {
      const f = getFiltered();
      buildTree(f, generation);

      document.getElementById('stats').textContent =
        `🌳 ${f.length} nodes · Gen ${generation} · 🧬 M∠${LS.mother.angle.toFixed(1)}° F∠${LS.father.angle.toFixed(1)}° · ${apps.length} total · 🗂 ${openCardNames.length} open`;

      renderOpenCards();
    }

    // === FETCH ===
    async function fetchApps() {
      try {
        const prevMeta = new Map(
          apps.map(a => [
            a.name,
            {
              date: a.date || 0,
              pageTitle: a.pageTitle || '',
              titleLoaded: !!a.titleLoaded,
            }
          ])
        );

        const res = await fetch(`https://api.github.com/repos/${CFG.user}/${CFG.repo}/contents/`);
        const data = await res.json();

        apps = data
          .filter(f =>
            f.type === 'file' &&
            (f.name.endsWith('.html') || f.name.endsWith('.py')) &&
            f.name !== 'index.html' &&
            f.name !== 'python-runner.html'
          )
          .map(f => {
            const prev = prevMeta.get(f.name) || {};
            return {
              name: f.name,
              date: prev.date || 0,
              lang: detectLang(f.name),
              pageTitle: prev.pageTitle || '',
              titleLoaded: prev.titleLoaded || false,
            };
          });

        buildFilters();
        buildLangFilters();
        rebuild();
        fetchDates();

        setTimeout(() => {
          document.getElementById('loader').classList.add('gone');
          setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
          }, 800);
        }, 400);
      } catch (e) {
        document.getElementById('stats').textContent = '💥 fetch failed';
      }
    }

    async function fetchDates() {
      let changed = false;

      for (const app of apps) {
        if (app.date) continue;
        try {
          const r = await fetch(CFG.root + app.name, { method: 'HEAD' });
          const lm = r.headers.get('Last-Modified');
          if (lm) {
            app.date = new Date(lm).getTime();
            changed = true;
          }
        } catch (e) {}
      }

      if (changed) {
        apps.sort((a, b) => (b.date || 0) - (a.date || 0));
        const dated = apps.filter(a => a.date > 0);
        if (dated.length) {
          newestDate = dated[0].date;
          oldestDate = dated[dated.length - 1].date;
        }
        rebuild();
      }
    }

    // === CONTROLS ===
    document.getElementById('btn-grow').onclick = () => {
      generation++;
      document.getElementById('gen-num').textContent = generation;
      LS.mother.angle += (Math.random() - 0.5) * 2.5;
      LS.father.angle += (Math.random() - 0.5) * 3.5;
      LS.mother.scale = Math.max(0.6, Math.min(0.95, LS.mother.scale + (Math.random() - 0.5) * 0.05));
      LS.father.scale = Math.max(0.5, Math.min(0.9, LS.father.scale + (Math.random() - 0.5) * 0.08));
      rebuild();
    };

    document.getElementById('btn-clear-cards').onclick = clearCards;

    document.getElementById('btn-reset').onclick = () => {
      tA = 0;
      tHt = 18;
      tDt = 45;
      autoR = true;
      selectedNode = null;
    };

    document.getElementById('search-box').addEventListener('input', e => {
      searchTerm = e.target.value.toLowerCase();
      rebuild();
    });

    window.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') {
        e.preventDefault();
        document.getElementById('search-box').focus();
      }
    });

    // === RENDER ===
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const dt = clock.getDelta();
      const t = clock.getElapsedTime();

      if (autoR) tA += dt * 0.06;

      cA += (tA - cA) * 0.04;
      cH += (tHt - cH) * 0.04;
      cD += (tDt - cD) * 0.04;

      cam.position.set(Math.sin(cA) * cD, cH, Math.cos(cA) * cD);
      cam.lookAt(0, Math.max(cH * 0.45, 4), 0);

      treeNodes.forEach((n, i) => {
        if (!n.mesh) return;

        n.mesh.position.y += Math.sin(t * 0.7 + i * 0.4) * 0.002;
        n.mesh.rotation.y += dt * 0.15;
        n.mesh.rotation.z = Math.sin(t * 0.4 + i * 1.1) * 0.06;

        const isPinned = openCardNames.includes(n.app.name);
        if (isPinned) {
          n.glow.material.opacity = Math.max(n.glow.material.opacity, 0.12);
        }
      });

      const pp = particles.geometry.attributes.position.array;
      for (let i = 0; i < pCount; i++) {
        pp[i * 3 + 1] += Math.sin(t * 0.25 + i * 0.08) * 0.004;
        if (pp[i * 3 + 1] > 40) pp[i * 3 + 1] = 0;
      }
      particles.geometry.attributes.position.needsUpdate = true;

      ray.setFromCamera(mPos, cam);
      const hits = ray.intersectObjects(treeNodes.map(n => n.mesh).filter(Boolean));

      if (hovered) {
        hovered.mesh.scale.copy(hovered.originalScale);
        hovered.mesh.material.emissiveIntensity = 0.1 + hovered.age01 * 0.18;
        hovered.glow.material.opacity = openCardNames.includes(hovered.app.name)
          ? 0.12
          : (0.035 + hovered.age01 * 0.025);
        canvas.style.cursor = 'default';
      }

      hovered = null;

      if (hits.length) {
        const idx = hits[0].object.userData.nodeIndex;
        if (idx !== undefined && treeNodes[idx]) {
          hovered = treeNodes[idx];
          hovered.mesh.scale.multiplyScalar(1.5);
          hovered.mesh.material.emissiveIntensity = 0.7;
          hovered.glow.material.opacity = 0.25;
          canvas.style.cursor = 'pointer';
        }
      }

      R.render(scene, cam);
    }

    window.addEventListener('resize', () => {
      cam.aspect = innerWidth / innerHeight;
      cam.updateProjectionMatrix();
      R.setSize(innerWidth, innerHeight);
    });

    animate();
    fetchApps();
    setInterval(() => fetchApps(), 120000);
  </script>
</body>
</html>
