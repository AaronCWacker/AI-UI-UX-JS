<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#F7F7F5" />
  <title>🧩 AI-UI-UX-JS — AllAIInc.Org</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #F7F7F5; --bg2: #FFF; --ink: #1A1A1A; --ink2: #444; --muted: #888;
      --faint: #C8C8C0; --line: #E4E4DE; --line2: #EEEEEA;
      --accent: #2563EB; --accent-bg: #EFF6FF;
      --green: #16A34A; --green-bg: #F0FDF4;
      --red: #DC2626; --red-bg: #FEF2F2;
      --purple: #9333EA; --purple-bg: #FAF5FF;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
      --r: 12px; --r-sm: 8px; --r-lg: 16px;
      --pad: 14px;
      --max: 1600px;
      --font: 'DM Sans', system-ui, -apple-system, sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0F0F0E; --bg2: #1A1A18; --ink: #F5F5F0; --ink2: #C8C8C0;
        --muted: #888; --faint: #444; --line: #2A2A26; --line2: #1E1E1B;
        --accent-bg: #1E293B; --green-bg: #14201A; --red-bg: #2A1515; --purple-bg: #1F1827;
      }
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; }
    html { height: 100%; -webkit-text-size-adjust: 100%; }
    body { min-height: 100%; background: var(--bg); color: var(--ink); font: 14px/1.45 var(--font); -webkit-font-smoothing: antialiased; overscroll-behavior-y: contain; }
    .shell { display: flex; flex-direction: column; min-height: 100vh; }
    .row { max-width: var(--max); margin: 0 auto; width: 100%; padding-left: var(--pad); padding-right: var(--pad); }
    button { font: inherit; color: inherit; }

    /* ═══ TOPBAR ═══ */
    .topbar { position: sticky; top: 0; z-index: 50; background: var(--bg2); border-bottom: 1px solid var(--line); box-shadow: var(--shadow-sm); }
    .topbar-main { display: flex; align-items: center; gap: 6px; padding-top: 8px; padding-bottom: 8px; flex-wrap: wrap; }
    .logo { font: 800 16px/1 var(--font); color: var(--ink); white-space: nowrap; display: flex; align-items: center; gap: 4px; }
    .logo-e { font-size: 20px; }
    .domain-link { font: 700 11px/1 var(--font); color: var(--accent); cursor: pointer; padding: 3px 6px; border-radius: 6px; text-decoration: none; }
    .domain-link:hover { background: var(--accent-bg); }
    .app-count { font: 700 11px/1 var(--font); color: var(--muted); padding: 3px 7px; background: var(--line2); border-radius: 6px; white-space: nowrap; }
    .spacer { flex: 1; min-width: 4px; }

    .tb { display: inline-flex; align-items: center; justify-content: center; gap: 3px; padding: 5px 9px; border: 1px solid var(--line); border-radius: 7px; background: var(--bg2); color: var(--ink2); font: 700 11px/1.1 var(--font); cursor: pointer; text-decoration: none; white-space: nowrap; transition: all .12s; min-height: 30px; min-width: 30px; }
    .tb:hover, .tb:active { border-color: var(--accent); color: var(--accent); }
    .tb.new-b { border-color: #BBF7D0; color: var(--green); background: var(--green-bg); }
    .tb.new-b:hover { background: #DCFCE7; }
    .tb.live { border-color: #FCA5A5; color: var(--red); background: var(--red-bg); animation: pulse-soft 1.2s infinite alternate; }
    @keyframes pulse-soft { to { opacity: .65; } }
    .tb .tbl { display: inline; }

    .clock-area { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
    .clock { font: 700 11px/1 var(--font); color: var(--ink2); white-space: nowrap; padding: 3px 7px; background: var(--line2); border-radius: 6px; cursor: default; }
    .timer-btns { display: flex; gap: 3px; }
    .timer-b { padding: 3px 7px; border: 1px solid var(--line); border-radius: 6px; background: var(--bg2); font: 700 10px/1.2 var(--font); color: var(--ink2); cursor: pointer; min-height: 26px; }
    .timer-b:hover { border-color: var(--accent); color: var(--accent); }
    .timer-b.running { border-color: #F87171; color: var(--red); background: var(--red-bg); animation: pulse-soft .8s infinite alternate; }
    .timer-overlay { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.55); justify-content: center; align-items: center; }
    .timer-overlay.show { display: flex; }
    .timer-card { background: var(--bg2); border-radius: 16px; padding: 28px 36px; text-align: center; box-shadow: var(--shadow-lg); }
    .timer-card h2 { font-size: 48px; margin-bottom: 8px; }
    .timer-card p { color: var(--muted); font-size: 13px; margin-bottom: 14px; }
    .timer-card button { padding: 10px 28px; border-radius: 10px; border: 1px solid var(--line); background: var(--bg2); font: 700 14px var(--font); cursor: pointer; }

    /* ═══ AI TOOL BAR ═══ */
    .ai-bar { display: flex; gap: 4px; padding-top: 6px; padding-bottom: 6px; overflow-x: auto; scrollbar-width: none; align-items: center; border-bottom: 1px solid var(--line2); background: var(--bg); }
    .ai-bar::-webkit-scrollbar { display: none; }
    .ai-bar .lbl { font: 700 9px/1 var(--font); color: var(--muted); text-transform: uppercase; letter-spacing: .1em; flex-shrink: 0; padding-right: 2px; }

    /* ═══ RECENTS ═══ */
    .recents-bar { display: flex; align-items: center; gap: 6px; padding-top: 5px; padding-bottom: 5px; overflow-x: auto; border-bottom: 1px solid var(--line2); background: var(--bg); scrollbar-width: none; }
    .recents-bar::-webkit-scrollbar { display: none; }
    .rlabel { font: 700 9px/1 var(--font); color: var(--muted); text-transform: uppercase; letter-spacing: .1em; white-space: nowrap; flex-shrink: 0; }
    .rchip { display: inline-flex; align-items: center; padding: 4px 9px; border-radius: 7px; background: var(--bg2); border: 1px solid var(--line); font: 600 11px/1.2 var(--font); color: var(--ink2); cursor: pointer; white-space: nowrap; text-decoration: none; flex-shrink: 0; max-width: 200px; overflow: hidden; text-overflow: ellipsis; }
    .rchip:hover, .rchip:active { border-color: var(--accent); color: var(--accent); }

    /* ═══ SEARCH ═══ */
    .search-row { display: flex; gap: 8px; align-items: center; padding-top: 10px; padding-bottom: 8px; }
    .search-input-wrap { flex: 1; position: relative; min-width: 0; }
    .search-input { width: 100%; padding: 11px 42px 11px 14px; border: 1.5px solid var(--line); border-radius: 10px; background: var(--bg2); font: 500 15px/1.3 var(--font); color: var(--ink); outline: none; }
    .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
    .search-input::placeholder { color: var(--faint); }
    .mic-btn { position: absolute; right: 5px; top: 50%; transform: translateY(-50%); width: 34px; height: 34px; border-radius: 8px; border: none; background: transparent; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
    .mic-btn:hover { background: var(--line2); }
    .mic-btn.rec { background: var(--red-bg); color: var(--red); animation: pulse-soft .8s infinite alternate; }
    .sort-sel { padding: 10px 8px; border: 1.5px solid var(--line); border-radius: 10px; background: var(--bg2); font: 600 13px/1.3 var(--font); color: var(--ink2); cursor: pointer; outline: none; }

    /* ═══ GROUP CHIPS ═══ */
    .group-bar { display: flex; gap: 5px; padding-top: 4px; padding-bottom: 8px; overflow-x: auto; scrollbar-width: none; }
    .group-bar::-webkit-scrollbar { display: none; }
    .gchip { display: inline-flex; align-items: center; gap: 4px; padding: 6px 11px; border: 1.5px solid var(--line); border-radius: 18px; background: var(--bg2); font: 600 12px/1.1 var(--font); color: var(--ink2); cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: all .12s; min-height: 30px; }
    .gchip:hover, .gchip:active { border-color: var(--accent); color: var(--accent); }
    .gchip.act { background: var(--accent); border-color: var(--accent); color: #fff; }
    .gchip .gc { font-size: 10px; opacity: .65; font-weight: 700; }
    .gchip.act .gc { opacity: .9; }

    /* ═══ MAIN ═══ */
    .main { flex: 1; padding-top: 4px; padding-bottom: 32px; }
    .result-info { font: 500 12px/1.3 var(--font); color: var(--muted); padding: 4px 0 8px; }
    .result-info strong { color: var(--ink); font-weight: 700; }
    .result-info .badge { display: inline-block; padding: 1px 7px; background: var(--green-bg); color: var(--green); border-radius: 99px; font-size: 10px; font-weight: 700; margin-left: 4px; }

    .grp { margin-bottom: 14px; }
    .grp-h { display: flex; align-items: center; gap: 7px; padding: 6px 0 5px; font: 800 14px/1.2 var(--font); color: var(--ink); border-bottom: 1.5px solid var(--line2); margin-bottom: 8px; }
    .grp-h .ge { font-size: 18px; }
    .grp-h .gc { font: 700 10px/1 var(--font); color: var(--muted); background: var(--line2); padding: 2px 8px; border-radius: 99px; }

    /* ═══ TILES — MOBILE FIRST ═══ */
    .tiles { display: grid; grid-template-columns: 1fr; gap: 8px; }
    @media (min-width: 480px) { .tiles { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 720px) { .tiles { grid-template-columns: repeat(3, 1fr); gap: 10px; } }
    @media (min-width: 980px) { .tiles { grid-template-columns: repeat(4, 1fr); } }
    @media (min-width: 1280px) { .tiles { grid-template-columns: repeat(5, 1fr); } }
    @media (min-width: 1500px) { .tiles { grid-template-columns: repeat(6, 1fr); } }

    .tile { display: flex; flex-direction: column; gap: 10px; padding: 14px 14px 12px; border: 1.5px solid var(--line); border-radius: var(--r); background: var(--bg2); transition: border-color .12s, box-shadow .12s, transform .1s; min-width: 0; position: relative; overflow: hidden; }
    .tile::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--dot, var(--accent)); }
    .tile:hover { border-color: var(--dot, #CCC); box-shadow: var(--shadow); }
    .tile:active { transform: scale(.99); }

    .t-name { font: 800 17px/1.2 var(--font); color: var(--ink); word-break: break-word; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; padding-left: 4px; }

    .t-meta { display: flex; align-items: center; gap: 6px; font: 600 10px/1 var(--font); color: var(--muted); padding-left: 4px; }
    .t-meta .t-fresh { color: var(--green); font-weight: 700; }

    .t-acts { display: flex; gap: 8px; margin-top: auto; }
    .t-btn { flex: 1; display: inline-flex; align-items: center; justify-content: center; padding: 12px 0; border: 1.5px solid var(--line); border-radius: 10px; background: var(--bg); font-size: 22px; cursor: pointer; transition: all .12s; text-decoration: none; min-height: 48px; line-height: 1; }
    .t-btn:hover, .t-btn:active { transform: translateY(-1px); box-shadow: var(--shadow-sm); }
    .t-btn.play { border-color: #BBF7D0; background: var(--green-bg); }
    .t-btn.play:hover { background: #DCFCE7; border-color: var(--green); }
    .t-btn.code { border-color: #DDD6FE; background: var(--purple-bg); }
    .t-btn.code:hover { background: #EDE9FE; border-color: var(--purple); }
    .t-btn span.tlb { font-size: 11px; font-weight: 700; margin-left: 6px; }

    /* Larger tiles on small screens for readability */
    @media (max-width: 479px) {
      .t-name { font-size: 18px; -webkit-line-clamp: 3; }
      .tile { padding: 16px 14px 14px; gap: 12px; }
      .t-btn { padding: 14px 0; font-size: 26px; min-height: 54px; }
    }

    .empty-s { padding: 40px 16px; text-align: center; color: var(--muted); font-size: 14px; border: 2px dashed var(--line); border-radius: var(--r); }
    .empty-s .big { font-size: 36px; margin-bottom: 8px; }

    /* ═══ HISTORY ═══ */
    .hist-toggle { display: flex; align-items: center; gap: 6px; padding: 12px 0 6px; cursor: pointer; font: 700 13px/1.2 var(--font); color: var(--accent); border: none; background: none; }
    .hist-toggle:hover { text-decoration: underline; }
    .hist-wrap { display: none; padding-bottom: 12px; }
    .hist-wrap.open { display: block; }
    .hist-list { display: flex; flex-direction: column; gap: 4px; }
    .hist-item { display: flex; align-items: center; gap: 8px; font: 500 12px/1.3 var(--font); color: var(--ink2); padding: 6px 10px; border-radius: 7px; background: var(--bg2); border: 1px solid var(--line2); }
    .hist-item .htime { font: 700 10px/1 var(--font); color: var(--muted); white-space: nowrap; flex-shrink: 0; }
    .hist-item .hname { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .hist-item a { color: var(--accent); text-decoration: none; font-weight: 700; flex-shrink: 0; font-size: 16px; }

    /* ═══ MEDIAPIPE OVERLAY ═══ */
    .mp-overlay { display: none; position: fixed; inset: 0; z-index: 250; background: rgba(0,0,0,.85); justify-content: center; align-items: center; flex-direction: column; padding: 16px; }
    .mp-overlay.show { display: flex; }
    .mp-stage { position: relative; max-width: 100%; max-height: 70vh; border-radius: 14px; overflow: hidden; box-shadow: var(--shadow-lg); background: #000; }
    .mp-stage video, .mp-stage canvas { display: block; width: 100%; height: auto; max-width: 720px; }
    .mp-stage canvas { position: absolute; inset: 0; }
    .mp-readout { color: #fff; font: 700 18px var(--font); margin-top: 12px; padding: 10px 16px; background: rgba(255,255,255,.1); border-radius: 10px; min-height: 44px; display: flex; align-items: center; gap: 8px; }
    .mp-close { margin-top: 12px; padding: 10px 24px; border-radius: 10px; border: 1px solid #444; background: #1a1a1a; color: #fff; font: 700 14px var(--font); cursor: pointer; }
    .mp-close:hover { background: #2a2a2a; }

    /* ═══ TOAST ═══ */
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--ink); color: var(--bg2); padding: 10px 20px; border-radius: 10px; font: 700 13px/1.3 var(--font); box-shadow: var(--shadow); z-index: 999; opacity: 0; pointer-events: none; transition: opacity .2s; }
    .toast.show { opacity: 1; }

    /* ═══ MOBILE TOPBAR ═══ */
    @media (max-width: 640px) {
      :root { --pad: 10px; }
      .topbar-main { gap: 4px; padding-top: 6px; padding-bottom: 6px; }
      .logo { font-size: 14px; }
      .logo-e { font-size: 16px; }
      .tb .tbl { display: none; }
      .tb { padding: 5px 8px; }
      .clock { font-size: 10px; padding: 3px 5px; }
      .timer-b { padding: 3px 5px; font-size: 9px; }
      .domain-link { font-size: 10px; }
    }
  </style>
</head>
<body>
<div class="shell">

  <!-- ═══ TOPBAR ═══ -->
  <header class="topbar">
    <div class="topbar-main row">
      <div class="logo"><span class="logo-e">🧩</span><span>AI-UI-UX-JS</span></div>
      <a class="domain-link" id="domainBtn" title="Copy URL">AllAIInc.Org</a>
      <span class="app-count" id="appCount">📦 …</span>

      <a class="tb new-b" href="https://github.com/AaronCWacker/AI-UI-UX-JS/new/main" target="_blank" rel="noopener" title="New app">➕<span class="tbl">New</span></a>
      <a class="tb" href="https://github.com/AaronCWacker/AI-UI-UX-JS/" target="_blank" rel="noopener" title="Code repo">💻<span class="tbl">Code</span></a>
      <a class="tb" href="https://allaiinc.org/" target="_blank" rel="noopener" title="Play live">▶️<span class="tbl">Play</span></a>

      <div class="spacer"></div>

      <div class="clock-area">
        <div class="clock" id="clock">…</div>
        <div class="timer-btns">
          <button class="timer-b" data-sec="60">⏱1m</button>
          <button class="timer-b" data-sec="120">⏱2m</button>
          <button class="timer-b" data-sec="300">⏱5m</button>
        </div>
      </div>
    </div>

    <!-- AI TOOL BAR (browser AI capabilities) -->
    <div class="ai-bar row">
      <span class="lbl">AI</span>
      <button class="tb" id="btnSpeak" title="Read page aloud (speech synthesis)">🗣️<span class="tbl">Speak</span></button>
      <button class="tb" id="btnDictate" title="Dictate filter (speech recognition)">🎤<span class="tbl">Dictate</span></button>
      <button class="tb" id="btnHand" title="Hand gestures (MediaPipe)">✋<span class="tbl">Hands</span></button>
      <button class="tb" id="btnFace" title="Face detect (MediaPipe)">😊<span class="tbl">Face</span></button>
      <span class="lbl" style="margin-left:6px">REC</span>
      <button class="tb" id="btnScreenshot" title="Screenshot">📸</button>
      <button class="tb" id="btnRecAudio" title="Record audio">🎙️</button>
      <button class="tb" id="btnRecVideo" title="Record screen video">⏺️</button>
    </div>
  </header>

  <!-- Timer overlay -->
  <div class="timer-overlay" id="timerOverlay">
    <div class="timer-card">
      <h2>⏰ Time!</h2>
      <p id="timerReport">1:00 elapsed</p>
      <button id="timerDismiss">OK</button>
    </div>
  </div>

  <!-- MediaPipe overlay -->
  <div class="mp-overlay" id="mpOverlay">
    <div class="mp-stage">
      <video id="mpVideo" autoplay playsinline muted></video>
      <canvas id="mpCanvas"></canvas>
    </div>
    <div class="mp-readout" id="mpReadout">Loading model…</div>
    <button class="mp-close" id="mpClose">✕ Close</button>
  </div>

  <!-- ═══ RECENTS ═══ -->
  <div class="recents-bar row" id="recentsBar"><span class="rlabel">Recent</span></div>

  <!-- ═══ SEARCH ═══ -->
  <div class="search-row row">
    <div class="search-input-wrap">
      <input class="search-input" id="searchBox" type="text" placeholder="🔍 Filter apps by name…" autocomplete="off" />
      <button class="mic-btn" id="micBtn" title="Voice filter">🎤</button>
    </div>
    <select class="sort-sel" id="sortSel">
      <option value="newest">🆕 Newest</option>
      <option value="cluster">📁 Grouped</option>
      <option value="az">A→Z</option>
      <option value="za">Z→A</option>
    </select>
  </div>

  <!-- ═══ GROUP CHIPS ═══ -->
  <div class="group-bar row" id="groupBar"></div>

  <!-- ═══ MAIN ═══ -->
  <main class="main row">
    <div class="result-info" id="resultInfo"></div>
    <div id="deck"></div>
    <button class="hist-toggle" id="histToggle">📜 History <span id="histCount"></span></button>
    <div class="hist-wrap" id="histWrap">
      <div class="hist-list" id="histList"></div>
    </div>
  </main>
</div>
<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════════════════════════════════════════
   AI-UI-UX-JS — Front door for AllAIInc.Org
   First principles: procedural grouping, real recency, mobile-first tiles
   ══════════════════════════════════════════════════════════════════════ */

const CFG = {
  user: 'aaroncwacker',
  repo: 'AI-UI-UX-JS',
  root: 'https://aaroncwacker.github.io/AI-UI-UX-JS/',
  api:  'https://api.github.com/repos/aaroncwacker/AI-UI-UX-JS/contents/',
  commitsApi: 'https://api.github.com/repos/aaroncwacker/AI-UI-UX-JS/commits',
  exclude: new Set(['index.html','python-runner.html']),
  cacheKey: 'ygg-cache-v2',
  cacheTTL: 1000 * 60 * 30, // 30 min
};

/* ── Stopwords for procedural grouping ── */
const STOPWORDS = new Set([
  'the','and','for','with','from','your','app','apps','new','old','best','top','main',
  'html','python','js','py','v','ver','version','copy','final','draft','demo','test',
  'pro','plus','mini','ultra','super','edition','series','part','mode','view','page',
  'file','files','index','of','a','an','in','on','to','by','at','or','is','it','be',
  'my','our','this','that','these','those','very','just','more','less','only','also',
]);

/* ── Emoji map: first significant word → emoji for group header ── */
const GROUP_EMOJI = {
  // 3d/graphics
  three:'🧊', threejs:'🧊', webgl:'🧊', webgpu:'🧊', tsl:'🧊', '3d':'🧊', cube:'🧊', voxel:'🧊',
  // ai
  ai:'🧠', smart:'🧠', neural:'🧠', llm:'🧠', gpt:'🤖', claude:'🤖', gemini:'🤖', grok:'🤖',
  agent:'🤖', agentic:'🤖', bot:'🤖', factory:'🏭',
  // games
  game:'🎮', arcade:'🕹️', combat:'⚔️', battle:'⚔️', arena:'🏟️', quest:'🗺️', rpg:'🎲',
  joust:'🏇', racing:'🏁', racer:'🏁', drift:'🏎️', coaster:'🎢', maze:'🌀',
  // media
  music:'🎵', song:'🎵', chord:'🎼', synth:'🎹', audio:'🔊', sound:'🔊', melody:'🎵', looper:'🔁',
  video:'📹', camera:'📷', record:'🎥', screen:'🖥️', stream:'📡',
  // vision/sensors
  gesture:'🫳', hand:'✋', mediapipe:'👁️', pose:'🤸', face:'😊', eye:'👁️',
  // sci/sim
  space:'🚀', starship:'🚀', rocket:'🚀', warp:'🌌', cosmic:'✨', void:'⚫', nebula:'🌌', galaxy:'🌌',

function hashColor(s){let h=0;for(let i=0;i<s.length;i++)h=((h<<5)-h+s.charCodeAt(i))|0;return PALETTE[Math.abs(h)%PALETTE.length];}

function cleanName(n){return n.replace(/\.(html|py)$/i,'').replace(/[_-]+/g,' ').replace(/\s+/g,' ').trim();}
function tokenize(n){return cleanName(n).toLowerCase().replace(/[^a-z0-9]+/g,' ').split(/\s+/).filter(t=>t.length>1&&!STOPWORDS.has(t));}
function firstWord(n){const toks=tokenize(n);return toks[0]||'misc';}

function escH(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function toast(m){const e=$('toast');e.textContent=m;e.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(()=>e.classList.remove('show'),1600);}
function getMods(tokens){const seen=new Set(),r=[];for(const m of MOD_HINTS)if(m.words.some(w=>tokens.includes(w))&&!seen.has(m.emoji)){seen.add(m.emoji);r.push(m.emoji);if(r.length>=2)break;}return r;}
function relTime(ts){if(!ts)return '';const s=(Date.now()-ts)/1000;if(s<60)return 'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';const d=Math.floor(s/86400);if(d<7)return d+'d ago';if(d<30)return Math.floor(d/7)+'w ago';if(d<365)return Math.floor(d/30)+'mo ago';return Math.floor(d/365)+'y ago';}

let timerInt=null,timerBtn=null,timerStart=null;

  btn.addEventListener('click',()=>{
    if(timerInt&&timerBtn===btn){clearInterval(timerInt);timerInt=null;btn.classList.remove('running');btn.textContent=btn.dataset.orig;return;}

        clearInterval(timerInt);timerInt=null;btn.classList.remove('running');btn.textContent=btn.dataset.orig;
        const end=new Date();
        const fmt=d=>`${(d.getHours()%12||12)}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')} ${d.getHours()>=12?'PM':'AM'}`;

const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
let recog=null, recogActive=false;
function setupRecog(){
  if(!SpeechRec){$('btnDictate').style.opacity=.4;$('micBtn').style.opacity=.4;return false;}
  recog=new SpeechRec();recog.continuous=false;recog.interimResults=true;recog.lang='en-US';

  recog.onerror=e=>{recogActive=false;$('btnDictate').classList.remove('live');$('micBtn').classList.remove('rec');toast('🎤 '+(e.error||'error'));};
  return true;
}
function toggleDictate(srcBtn){

let mpModule=null, mpHand=null, mpFace=null, mpRAF=null, mpStream=null;
async function loadMP(){
  if(mpModule)return mpModule;
  $('mpReadout').textContent='⏳ Loading MediaPipe…';
  mpModule=await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs');
  return mpModule;
}
async function startMP(kind){
  $('mpOverlay').classList.add('show');
  try{
    const mp=await loadMP();
    const vision=await mp.FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm');
    if(kind==='hand'&&!mpHand){
      $('mpReadout').textContent='⏳ Loading hand model…';
      mpHand=await mp.HandLandmarker.createFromOptions(vision,{
        baseOptions:{modelAssetPath:'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',delegate:'GPU'},
        numHands:2,runningMode:'VIDEO'
      });
    }
    if(kind==='face'&&!mpFace){
      $('mpReadout').textContent='⏳ Loading face model…';
      mpFace=await mp.FaceLandmarker.createFromOptions(vision,{
        baseOptions:{modelAssetPath:'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',delegate:'GPU'},
        outputFaceBlendshapes:true,runningMode:'VIDEO',numFaces:1
      });
    }
    const video=$('mpVideo'),canvas=$('mpCanvas');
    mpStream=await navigator.mediaDevices.getUserMedia({video:{width:720,height:540,facingMode:'user'}});
    video.srcObject=mpStream;
    await new Promise(r=>video.onloadedmetadata=r);
    canvas.width=video.videoWidth;canvas.height=video.videoHeight;
    const ctx=canvas.getContext('2d');
    const loop=()=>{
      if(!$('mpOverlay').classList.contains('show'))return;
      ctx.clearRect(0,0,canvas.width,canvas.height);
      const ts=performance.now();
      if(kind==='hand'){
        const res=mpHand.detectForVideo(video,ts);
        const lm=res.landmarks;
        if(lm&&lm.length){
          ctx.strokeStyle='#16A34A';ctx.lineWidth=3;ctx.fillStyle='#FBBF24';
          for(const hand of lm){
            for(const p of hand){ctx.beginPath();ctx.arc(p.x*canvas.width,p.y*canvas.height,4,0,Math.PI*2);ctx.fill();}
          }
          const hands=lm.length;
          const fingers=lm.map(h=>{
            // Count extended fingers: tip above pip in y (rough)
            const tips=[4,8,12,16,20],pips=[3,6,10,14,18];let c=0;
            for(let i=0;i<5;i++){if(h[tips[i]].y<h[pips[i]].y)c++;}
            return c;
          });
          $('mpReadout').innerHTML=`✋ ${hands} hand${hands>1?'s':''} · fingers up: <strong>${fingers.join(', ')}</strong>`;
        }else $('mpReadout').textContent='✋ Show your hand to the camera';
      }else{
        const res=mpFace.detectForVideo(video,ts);
        const lm=res.faceLandmarks;
        if(lm&&lm.length){
          ctx.fillStyle='#2563EB';
          for(const p of lm[0])if(Math.random()<0.3){ctx.beginPath();ctx.arc(p.x*canvas.width,p.y*canvas.height,1.5,0,Math.PI*2);ctx.fill();}
          let mood='neutral';
          if(res.faceBlendshapes&&res.faceBlendshapes[0]){
            const bs=res.faceBlendshapes[0].categories;
            const get=n=>(bs.find(c=>c.categoryName===n)?.score||0);
            const smile=Math.max(get('mouthSmileLeft'),get('mouthSmileRight'));
            const frown=Math.max(get('mouthFrownLeft'),get('mouthFrownRight'));
            const browUp=Math.max(get('browInnerUp'),get('browOuterUpLeft'),get('browOuterUpRight'));
            if(smile>0.4)mood='😊 smiling';else if(frown>0.3)mood='😟 frowning';else if(browUp>0.4)mood='😮 surprised';
          }
          $('mpReadout').innerHTML=`😊 Face detected · <strong>${mood}</strong>`;
        }else $('mpReadout').textContent='😊 Look at the camera';
      }
      mpRAF=requestAnimationFrame(loop);
    };
    loop();
  }catch(e){
    console.error(e);
    $('mpReadout').textContent='❌ '+(e.message||'failed to start');
  }
}
function stopMP(){
  if(mpRAF){cancelAnimationFrame(mpRAF);mpRAF=null;}
  if(mpStream){mpStream.getTracks().forEach(t=>t.stop());mpStream=null;}
  $('mpOverlay').classList.remove('show');
  $('mpVideo').srcObject=null;
}
$('btnHand').onclick=()=>startMP('hand');
$('btnFace').onclick=()=>startMP('face');

$('mpOverlay').addEventListener('click',e=>{if(e.target===$('mpOverlay'))stopMP();});

   DATA: fetch apps + commit dates

/* Cache layer */
function loadCache(){
  try{
    const c=JSON.parse(localStorage.getItem(CFG.cacheKey)||'null');
    if(c && Date.now()-c.ts<CFG.cacheTTL)return c;
  }catch{}
  return null;
}
function saveCache(apps,dates){
  try{localStorage.setItem(CFG.cacheKey,JSON.stringify({ts:Date.now(),apps,dates:[...dates.entries()]}));}catch{}
}

async function fetchApps(){
  // Try cache first
  const cached=loadCache();
  if(cached){
    S.apps=cached.apps;
    S.dates=new Map(cached.dates);
    for(const a of S.apps){a.date=S.dates.get(a.name)||0;}
    render();
    // Refresh in background
    setTimeout(()=>fetchFresh().catch(()=>{}),100);
    return;
  }
  await fetchFresh();
}

async function fetchFresh(){
  const res=await fetch(CFG.api,{headers:{Accept:'application/vnd.github+json'}});
  if(!res.ok)throw new Error(`GitHub API ${res.status}`);
  const files=await res.json();
  const apps=files.filter(f=>f.type==='file'&&/\.(html|py)$/i.test(f.name)&&!CFG.exclude.has(f.name)).map(f=>{
    const ext=f.name.toLowerCase().endsWith('.py')?'py':'html';
    const display=cleanName(f.name),tokens=tokenize(f.name);
    return{name:f.name,ext,display,tokens,mods:getMods(tokens),color:hashColor(display),size:f.size||0,date:0,fw:firstWord(f.name)};
  });
  S.apps=apps;
  render(); // initial paint without dates
  // Fetch commit dates in background
  fetchCommitDates().then(()=>{saveCache(S.apps,S.dates);render();}).catch(e=>console.warn('commits',e));
}

async function fetchCommitDates(){
  // Strategy: list commits (no per-commit detail), then fetch the most recent commit-per-file
  // via parallel batches with concurrency cap. Render after each batch so the UI updates
  // progressively while the user can already browse.
  const dates=new Map();
  const commitMeta=[];
  // 1) Get up to 3 pages of commit summaries
  for(let page=1;page<=3;page++){
    const res=await fetch(`${CFG.commitsApi}?per_page=100&page=${page}`,{headers:{Accept:'application/vnd.github+json'}});
    if(!res.ok)break;
    const commits=await res.json();
    if(!commits.length)break;
    for(const c of commits)commitMeta.push({url:c.url,date:new Date(c.commit.committer.date).getTime()});
    if(commits.length<100)break;
  }
  // 2) Walk commits newest→oldest, fetching details in parallel batches of 6
  const BATCH=6;
  for(let i=0;i<commitMeta.length;i+=BATCH){
    if(dates.size>=S.apps.length)break;
    const slice=commitMeta.slice(i,i+BATCH);
    const details=await Promise.all(slice.map(c=>
      fetch(c.url,{headers:{Accept:'application/vnd.github+json'}}).then(r=>r.ok?r.json():null).catch(()=>null)
    ));
    for(let j=0;j<details.length;j++){
      const detail=details[j];if(!detail)continue;
      const ts=slice[j].date;
      for(const f of (detail.files||[])){
        if(!dates.has(f.filename))dates.set(f.filename,ts);
      }
    }
    // Live-update the running map and re-render every batch
    S.dates=dates;
    for(const a of S.apps){a.date=dates.get(a.name)||0;}
    render();
  }
  S.dates=dates;
  for(const a of S.apps){a.date=dates.get(a.name)||0;}
}

  if(!names.length){
    // fallback to newest
    const newest=[...S.apps].sort((a,b)=>(b.date||0)-(a.date||0)).slice(0,6);
    for(const app of newest){
      const a=document.createElement('a');a.className='rchip';a.textContent=app.display;
      a.href=playUrl(app);a.target='_blank';a.rel='noopener';
      a.onclick=()=>saveRecent(app.name);bar.appendChild(a);
    }
    return;
  }
  for(const nm of names){
    const app=S.apps.find(a=>a.name===nm);if(!app)continue;
    const a=document.createElement('a');a.className='rchip';a.textContent=app.display;
    a.href=playUrl(app);a.target='_blank';a.rel='noopener';
    a.onclick=()=>saveRecent(app.name);bar.appendChild(a);
  }
}

function buildHistory(){
  const list=$('histList');list.innerHTML='';
  $('histCount').textContent=`(${S.history.length})`;
  for(const h of S.history.slice(0,50)){
    const app=S.apps.find(a=>a.name===h.name);
    const d=new Date(h.ts);const pad=n=>String(n).padStart(2,'0');
    const timeStr=`${d.getMonth()+1}/${d.getDate()} ${pad(d.getHours()%12||12)}:${pad(d.getMinutes())} ${d.getHours()>=12?'PM':'AM'}`;
    const div=document.createElement('div');div.className='hist-item';
    div.innerHTML=`<span class="htime">${timeStr}</span><span class="hname">${escH(h.name)}</span>${app?`<a href="${playUrl(app)}" target="_blank" rel="noopener">▶</a>`:''}`;
    list.appendChild(div);
  }
}

function filterApps(){
  const q=S.search.trim().toLowerCase();
  return S.apps.filter(a=>{
    if(S.group!=='all'&&a.fw!==S.group)return false;
    if(q){
      const hay=(a.name+' '+a.display+' '+a.tokens.join(' ')).toLowerCase();
      if(!hay.includes(q))return false;
    }
    return true;
  });
}

function sortApps(apps){
  return[...apps].sort((a,b)=>{
    if(S.sort==='az')return a.display.localeCompare(b.display);
    if(S.sort==='za')return b.display.localeCompare(a.display);
    if(S.sort==='newest')return (b.date||0)-(a.date||0)||a.display.localeCompare(b.display);
    // cluster: by group then alpha
    return a.fw.localeCompare(b.fw)||a.display.localeCompare(b.display);
  });
}

function groupForRender(apps){
  const m=new Map();
  for(const a of apps){if(!m.has(a.fw))m.set(a.fw,[]);m.get(a.fw).push(a);}
  return[...m.entries()].sort((a,b)=>b[1].length-a[1].length||a[0].localeCompare(b[0]));
}

function render(){
  const filtered=filterApps(),sorted=sortApps(filtered);S.filtered=sorted;
  $('appCount').textContent=`📦 ${S.apps.length}`;
  const hasDates=S.dates.size>0;
  $('resultInfo').innerHTML=`Showing <strong>${sorted.length}</strong> of <strong>${S.apps.length}</strong>${hasDates?'<span class="badge">📅 dated</span>':''}`;
  buildGroupBar();buildRecents();buildHistory();
  const deck=$('deck');deck.innerHTML='';
  if(!sorted.length){deck.innerHTML='<div class="empty-s"><div class="big">🔍</div>No apps match your filter.</div>';return;}

  if(S.sort==='cluster'&&S.group==='all'){
    for(const[w,apps]of groupForRender(sorted)){
      const g=document.createElement('div');g.className='grp';
      const emoji=GROUP_EMOJI[w]||'🔹';
      g.innerHTML=`<div class="grp-h"><span class="ge">${emoji}</span><span>${escH(w.charAt(0).toUpperCase()+w.slice(1))}</span><span class="gc">${apps.length}</span></div>`;
      const grid=document.createElement('div');grid.className='tiles';
      for(const a of apps)grid.appendChild(mkTile(a));
      g.appendChild(grid);deck.appendChild(g);
    }
  }else{
    const grid=document.createElement('div');grid.className='tiles';
    for(const a of sorted)grid.appendChild(mkTile(a));
    deck.appendChild(grid);
  }
}

function mkTile(app){
  const t=document.createElement('article');t.className='tile';t.style.setProperty('--dot',app.color);
  const modsStr=app.mods.join(' ');
  const isFresh=app.date && (Date.now()-app.date<1000*60*60*24*7);
  const dateStr=app.date?relTime(app.date):'';
  t.innerHTML=`
    <div class="t-name">${escH(app.display)}</div>
    <div class="t-meta">
      <span>${app.ext==='py'?'🐍':'🌐'}</span>
      ${modsStr?`<span>${modsStr}</span>`:''}
      ${dateStr?`<span class="${isFresh?'t-fresh':''}">${dateStr}${isFresh?' 🔥':''}</span>`:''}
    </div>
    <div class="t-acts">
      <a class="t-btn play" data-a="play" title="Play ${escH(app.display)}" aria-label="Play">🕹️</a>
      <a class="t-btn code" data-a="code" title="View code on GitHub" aria-label="Code">💻</a>
    </div>`;
  const playBtn=t.querySelector('[data-a="play"]');
  playBtn.href=playUrl(app);playBtn.target='_blank';playBtn.rel='noopener';
  playBtn.addEventListener('click',()=>saveRecent(app.name));
  const codeBtn=t.querySelector('[data-a="code"]');
  codeBtn.href=codeUrl(app);codeBtn.target='_blank';codeBtn.rel='noopener';
  return t;
}

});
