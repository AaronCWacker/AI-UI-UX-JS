  <style>
    :root {
      --bg: #F7F7F5; --bg2: #FFF; --ink: #1A1A1A; --ink2: #444; --muted: #888;
      --faint: #C8C8C0; --line: #E4E4DE; --line2: #EEEEEA;
      --accent: #2563EB; --accent-bg: #EFF6FF;
      --green: #16A34A; --green-bg: #F0FDF4;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow: 0 2px 6px rgba(0,0,0,0.07);
      --r: 8px; --r-sm: 6px;
      --pad: 12px;
      --max: 1600px;
      --font: 'DM Sans', system-ui, -apple-system, sans-serif;
      --fs: 13px; /* user-adjustable base font size */
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; }
    html { height: 100%; -webkit-text-size-adjust: 100%; }
    body { min-height: 100%; background: var(--bg); color: var(--ink); font: var(--fs)/1.45 var(--font); -webkit-font-smoothing: antialiased; }
    .shell { display: flex; flex-direction: column; min-height: 100vh; }
    .row { max-width: var(--max); margin: 0 auto; width: 100%; padding-left: var(--pad); padding-right: var(--pad); }

    /* ═══ TOPBAR ═══ */
    .topbar { position: sticky; top: 0; z-index: 50; background: var(--bg2); border-bottom: 1px solid var(--line); box-shadow: var(--shadow-sm); }
    .topbar-main { display: flex; align-items: center; gap: 5px; padding-top: 5px; padding-bottom: 5px; flex-wrap: wrap; }
    .logo { font: 700 15px/1 var(--font); color: var(--ink); white-space: nowrap; display: flex; align-items: center; gap: 3px; }
    .logo-e { font-size: 17px; }
    .brand-brain { width: 24px; height: 24px; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .brand-brain svg { width: 24px; height: 24px; display: block; }
    .brand-factory { font-size: 18px; line-height: 1; margin-left: -2px; }
    .repo-link { font: 700 15px/1 var(--font); color: var(--ink); cursor: pointer; padding: 2px 4px; border-radius: 4px; text-decoration: none; }
    .repo-link:hover { background: var(--accent-bg); color: var(--accent); }
    .brand-on { font: 600 11px/1 var(--font); color: var(--muted); padding: 0 2px; }
    .sep { color: var(--faint); font-weight: 300; margin: 0 1px; }
    .domain-link { font: 600 11px/1 var(--font); color: var(--accent); cursor: pointer; padding: 2px 5px; border-radius: 4px; text-decoration: none; }
    .domain-link:hover { background: var(--accent-bg); }
    .app-count { font: 600 11px/1 var(--font); color: var(--muted); padding: 2px 6px; background: var(--line2); border-radius: 5px; white-space: nowrap; }
    .spacer { flex: 1; min-width: 4px; }

    .tb { display: inline-flex; align-items: center; justify-content: center; gap: 2px; padding: 3px 7px; border: 1px solid var(--line); border-radius: 5px; background: var(--bg2); color: var(--ink2); font: 600 11px/1.1 var(--font); cursor: pointer; text-decoration: none; white-space: nowrap; transition: all .12s; min-height: 26px; }
    .tb:hover { border-color: var(--accent); color: var(--accent); }
    .tb.new-b { border-color: #BBF7D0; color: var(--green); background: var(--green-bg); }
    .tb.new-b:hover { background: #DCFCE7; }
    .tb .tbl { display: inline; }

    .clock-area { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
    .clock { font: 600 11px/1 var(--font); color: var(--ink2); white-space: nowrap; padding: 2px 5px; background: var(--line2); border-radius: 5px; cursor: default; }
    .timer-btns { display: flex; gap: 2px; }
    .timer-b { padding: 2px 6px; border: 1px solid var(--line); border-radius: 4px; background: var(--bg2); font: 600 10px/1.2 var(--font); color: var(--ink2); cursor: pointer; }
    .timer-b:hover { border-color: var(--accent); color: var(--accent); }
    .timer-b.running { border-color: #F87171; color: #DC2626; background: #FEF2F2; animation: pulse .8s infinite alternate; }
    @keyframes pulse { to { opacity: .7; } }
    .timer-overlay { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.55); justify-content: center; align-items: center; }
    .timer-overlay.show { display: flex; }
    .timer-card { background: #fff; border-radius: 14px; padding: 28px 36px; text-align: center; box-shadow: 0 12px 40px rgba(0,0,0,.2); }
    .timer-card h2 { font-size: 48px; margin-bottom: 8px; }
    .timer-card p { color: var(--muted); font-size: 13px; margin-bottom: 14px; }
    .timer-card button { padding: 8px 24px; border-radius: 8px; border: 1px solid var(--line); background: var(--bg2); font: 600 14px var(--font); cursor: pointer; }

    .util-btns { display: flex; gap: 2px; }

    /* ═══ FONT-SIZE CONTROL ═══ */
    .fs-ctrl { display: flex; align-items: center; gap: 2px; padding: 2px 4px; background: var(--line2); border-radius: 5px; }
    .fs-ctrl button { padding: 2px 6px; border: none; background: transparent; font: 700 13px/1 var(--font); color: var(--ink2); cursor: pointer; border-radius: 3px; }
    .fs-ctrl button:hover { background: var(--bg2); color: var(--accent); }
    .fs-ctrl span { font: 600 10px/1 var(--font); color: var(--muted); padding: 0 3px; min-width: 26px; text-align: center; }

    /* ═══ BOOKMARK BAR ═══ */
    .bm-bar { display: flex; gap: 6px; padding-top: 5px; padding-bottom: 5px; overflow-x: auto; border-bottom: 1px solid var(--line); background: var(--bg2); scrollbar-width: thin; align-items: stretch; }
    .bm-bar::-webkit-scrollbar { height: 4px; }
    .bm-bar::-webkit-scrollbar-thumb { background: var(--faint); border-radius: 2px; }
    .bm-group { display: flex; align-items: center; gap: 3px; padding: 0 5px 0 0; border-right: 1px solid var(--line2); flex-shrink: 0; }
    .bm-group:last-child { border-right: none; }
    .bm-glabel { font: 700 9px/1 var(--font); color: var(--muted); text-transform: uppercase; letter-spacing: .05em; padding-right: 3px; white-space: nowrap; align-self: center; }
    .bm-btn { display: inline-flex; align-items: center; justify-content: center; gap: 3px; padding: 4px 7px; border: 1px solid var(--line); border-radius: 5px; background: var(--bg); text-decoration: none; color: var(--ink2); font: 700 11px/1 var(--font); cursor: pointer; transition: all .12s; flex-shrink: 0; min-height: 28px; }
    .bm-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); transform: translateY(-1px); }
    .bm-emoji { font-size: 13px; line-height: 1; }
    .bm-favicon { width: 14px; height: 14px; border-radius: 2px; display: block; }
    .bm-letter { font: 700 11px/1 var(--font); }

    /* ═══ RECENTS ═══ */
    .recents-bar { display: flex; align-items: center; gap: 5px; padding-top: 4px; padding-bottom: 4px; overflow-x: auto; border-bottom: 1px solid var(--line2); background: var(--bg); scrollbar-width: none; }
    .recents-bar::-webkit-scrollbar { display: none; }
    .rlabel { font: 600 9px/1 var(--font); color: var(--muted); text-transform: uppercase; letter-spacing: .08em; white-space: nowrap; flex-shrink: 0; }
    .rchip { display: inline-flex; align-items: center; padding: 2px 7px; border-radius: 4px; background: var(--bg2); border: 1px solid var(--line); font: 400 11px/1.2 var(--font); color: var(--ink2); cursor: pointer; white-space: nowrap; text-decoration: none; flex-shrink: 0; }
    .rchip:hover { border-color: var(--accent); color: var(--accent); }

    /* ═══ SEARCH ═══ */
    .search-row { display: flex; gap: 6px; align-items: center; padding-top: 6px; padding-bottom: 5px; }
    .search-input { flex: 1; min-width: 0; padding: 6px 10px; border: 1px solid var(--line); border-radius: var(--r-sm); background: var(--bg2); font: 400 var(--fs)/1.3 var(--font); color: var(--ink); outline: none; }
    .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(37,99,235,.1); }
    .search-input::placeholder { color: var(--faint); }
    .sort-sel { padding: 6px 6px; border: 1px solid var(--line); border-radius: var(--r-sm); background: var(--bg2); font: 400 11px/1.3 var(--font); color: var(--ink2); cursor: pointer; outline: none; }

    /* ═══ CLUSTERS ═══ */
    .cluster-bar { display: flex; gap: 3px; flex-wrap: wrap; padding-top: 4px; padding-bottom: 5px; }
    .cb { display: inline-flex; align-items: center; gap: 2px; padding: 3px 7px; border: 1px solid var(--line); border-radius: 5px; background: var(--bg2); font: 500 11px/1.1 var(--font); color: var(--ink2); cursor: pointer; white-space: nowrap; transition: all .12s; }
    .cb:hover { border-color: var(--accent); color: var(--accent); }
    .cb.act { background: var(--accent); border-color: var(--accent); color: #fff; }
    .cb .cc { font-size: 10px; opacity: .6; }

    /* ═══ MAIN ═══ */
    .main { flex: 1; padding-bottom: 24px; padding-top: 6px; }
    .result-info { font: 400 11px/1.3 var(--font); color: var(--muted); padding: 3px 0 6px; }
    .result-info strong { color: var(--ink); }

    .grp { margin-bottom: 8px; }
    .grp-h { display: flex; align-items: center; gap: 5px; padding: 4px 0 3px; font: 700 12px/1.2 var(--font); color: var(--ink); border-bottom: 1px solid var(--line2); margin-bottom: 5px; }
    .grp-h .gc { font: 400 10px/1 var(--font); color: var(--muted); background: var(--line2); padding: 1px 6px; border-radius: 99px; }

    /* ═══ TILES (simplified) ═══ */
    .tiles { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 6px; }
    .tile { display: flex; flex-direction: column; gap: 5px; padding: 8px; border: 1px solid var(--line); border-radius: var(--r); background: var(--bg2); transition: border-color .12s, box-shadow .12s; min-width: 0; }
    .tile:hover { border-color: #CCC; box-shadow: var(--shadow); }
    .t-head { display: flex; align-items: flex-start; gap: 5px; min-width: 0; }
    .t-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
    .t-name { font: 700 var(--fs)/1.25 var(--font); color: var(--ink); word-break: break-word; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; flex: 1; min-width: 0; }
    .t-acts { display: flex; gap: 4px; }
    .t-btn { flex: 1; display: inline-flex; align-items: center; justify-content: center; gap: 3px; padding: 5px 0; border: 1px solid var(--line); border-radius: 5px; background: var(--bg); font: 600 11px/1 var(--font); color: var(--ink2); cursor: pointer; transition: all .12s; text-decoration: none; white-space: nowrap; }
    .t-btn:hover { border-color: var(--accent); color: var(--accent); }
    .t-btn.play { border-color: #BBF7D0; color: var(--green); background: var(--green-bg); }
    .t-btn.play:hover { background: #DCFCE7; }

    .empty-s { padding: 30px 12px; text-align: center; color: var(--muted); font-size: 13px; border: 1px dashed var(--line); border-radius: var(--r); }

    /* ═══ HISTORY ═══ */
    .hist-toggle { display: flex; align-items: center; gap: 5px; padding: 8px 0 4px; cursor: pointer; font: 600 12px/1.2 var(--font); color: var(--accent); border: none; background: none; }
    .hist-toggle:hover { text-decoration: underline; }
    .hist-wrap { display: none; padding-bottom: 12px; }
    .hist-wrap.open { display: block; }
    .hist-list { display: flex; flex-direction: column; gap: 3px; }
    .hist-item { display: flex; align-items: center; gap: 6px; font: 400 11px/1.3 var(--font); color: var(--ink2); padding: 3px 6px; border-radius: 5px; background: var(--bg2); border: 1px solid var(--line2); }
    .hist-item .htime { font: 600 10px/1 var(--font); color: var(--muted); white-space: nowrap; flex-shrink: 0; }
    .hist-item .hname { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .hist-item a { color: var(--accent); text-decoration: none; font-weight: 600; flex-shrink: 0; }

    /* ═══ TOAST ═══ */
    .toast { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); background: var(--ink); color: #fff; padding: 7px 16px; border-radius: 7px; font: 600 12px/1.3 var(--font); box-shadow: var(--shadow); z-index: 999; opacity: 0; pointer-events: none; transition: opacity .2s; }
    .toast.show { opacity: 1; }

    /* ═══ RESPONSIVE ═══ */
    @media (max-width: 768px) {
      :root { --pad: 8px; }
      .topbar-main { gap: 3px; }
      .tb .tbl { display: none; }
      .clock { font-size: 10px; }
      .tiles { grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 5px; }
      .tile { padding: 6px; }
      .bm-glabel { display: none; }
      .bm-group { padding-right: 4px; gap: 2px; }
    }
    @media (max-width: 380px) {
      .tiles { grid-template-columns: 1fr 1fr; gap: 4px; }
      .t-btn { font-size: 10px; padding: 4px 0; }
      .clock-area { width: 100%; justify-content: space-between; }
    }
  </style>
</head>

const STOPWORDS = new Set([
  'the','and','for','with','from','your','app','apps','new','old','best','top','main',
  'html','python','js','py','v','ver','version','copy','final','draft','demo','test',
  'pro','plus','mini','ultra','super','edition','series','part','mode','view','page',
  'file','files','index','of','a','an','in','on','to','by','at','or','is','it','be',
]);

const PALETTE = [
  '#2563EB','#7C3AED','#D97706','#0891B2','#16A34A','#E11D48',
  '#4F46E5','#0D9488','#CA8A04','#9333EA','#0284C7','#DC2626',
  '#059669','#6D28D9','#EA580C','#DB2777','#1D4ED8','#15803D',
];
function hashColor(s){let h=0;for(let i=0;i<s.length;i++)h=((h<<5)-h+s.charCodeAt(i))|0;return PALETTE[Math.abs(h)%PALETTE.length];}

const S={apps:[],filtered:[],search:'',cluster:'all',sort:'az',recents:[],history:[]};
const $=id=>document.getElementById(id);
function cleanName(n){return n.replace(/\.(html|py)$/i,'').replace(/[_-]+/g,' ').replace(/\s+/g,' ').trim();}
function tokenize(n){return cleanName(n).toLowerCase().replace(/[^a-z0-9]+/g,' ').split(/\s+/).filter(t=>t.length>1&&!STOPWORDS.has(t));}
function playUrl(a){return a.ext==='py'?`python-runner.html?file=${encodeURIComponent(a.name)}`:`${CFG.root}${a.name}`;}
function codeUrl(a){return `https://github.com/${CFG.user}/${CFG.repo}/blob/main/${a.name}`;}
function escH(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function toast(m){const e=$('toast');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),1400);}
function matchCluster(app,cid){
  if(cid==='all')return true;
  const c=CLUSTERS.find(x=>x.id===cid);
  if(!c)return true;
  if(cid==='ai'){
    return /(^|[^A-Za-z0-9])AI([^A-Za-z0-9]|$)/.test(app.name) || /(^|[^A-Za-z0-9])(GPT|Grok|Claude|Gemini|LLM|Copilot)([^A-Za-z0-9]|$)/.test(app.name);
  }
  const lo=app.name.toLowerCase();
  return c.words.some(w=>lo.includes(String(w).toLowerCase()));
}

/* ── Bookmark bar render ── */
function buildBookmarkBar(){
  const bar = $('bmBar'); bar.innerHTML = '';
  for (const grp of BOOKMARKS) {
    const g = document.createElement('div'); g.className = 'bm-group';
    const lbl = document.createElement('span'); lbl.className = 'bm-glabel';
    lbl.textContent = `${grp.label} ${grp.group}`;
    g.appendChild(lbl);
    for (const [emoji, letter, url, title] of grp.items) {
      const a = document.createElement('a');
      a.className = 'bm-btn';
      a.href = url; a.target = '_blank'; a.rel = 'noopener';
      a.title = title;
      // Try favicon image; fall back to emoji if it fails to load
      const fav = faviconUrl(url);
      const img = document.createElement('img');
      img.className = 'bm-favicon'; img.src = fav; img.alt = '';
      img.referrerPolicy = 'no-referrer';
      img.onerror = () => {
        const em = document.createElement('span'); em.className = 'bm-emoji'; em.textContent = emoji;
        a.replaceChild(em, img);
      };
      a.appendChild(img);
      const ltr = document.createElement('span'); ltr.className = 'bm-letter'; ltr.textContent = letter;
      a.appendChild(ltr);
      g.appendChild(a);
    }
    bar.appendChild(g);
  }
}

/* ── Font size ── */
function loadFs(){
  const v = parseInt(localStorage.getItem('ygg-fs')||'13');
  setFs(v);
}
function setFs(v){
  v = Math.max(11, Math.min(22, v));
  document.documentElement.style.setProperty('--fs', v+'px');
  $('fsVal').textContent = v;
  localStorage.setItem('ygg-fs', v);
}
$('fsUp').onclick = () => setFs(parseInt(getComputedStyle(document.documentElement).getPropertyValue('--fs'))+1);
$('fsDown').onclick = () => setFs(parseInt(getComputedStyle(document.documentElement).getPropertyValue('--fs'))-1);

/* ── Recents + History ── */
function loadRecents(){try{S.recents=JSON.parse(localStorage.getItem('ygg-rec')||'[]');}catch{S.recents=[];}}
function loadHistory(){try{S.history=JSON.parse(localStorage.getItem('ygg-hist')||'[]');}catch{S.history=[];}}
function saveRecent(name){
  S.recents=S.recents.filter(n=>n!==name);S.recents.unshift(name);S.recents=S.recents.slice(0,5);
  localStorage.setItem('ygg-rec',JSON.stringify(S.recents));
  S.history=S.history.filter(h=>!(h.name===name&&Date.now()-h.ts<60000));
  S.history.unshift({name,ts:Date.now()});S.history=S.history.slice(0,200);
  localStorage.setItem('ygg-hist',JSON.stringify(S.history));
}

/* ── Clock ── */
function updateClock(){
  const now=new Date();
  const days=['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const pad=n=>String(n).padStart(2,'0');
  const h=now.getHours(),h12=h%12||12,ampm=h>=12?'PM':'AM';
  $('clock').textContent=`${days[now.getDay()]} ${months[now.getMonth()]} ${now.getDate()} ${pad(h12)}:${pad(now.getMinutes())}:${pad(now.getSeconds())} ${ampm}`;
}
setInterval(updateClock,1000);updateClock();

/* ── Timer ── */
let timerInt=null,timerBtn=null,timerStart=null;
document.querySelectorAll('.timer-b').forEach(btn=>{
  btn.addEventListener('click',()=>{
    if(timerInt&&timerBtn===btn){clearInterval(timerInt);timerInt=null;btn.classList.remove('running');btn.textContent=btn.dataset.orig;return;}
    if(timerInt){clearInterval(timerInt);timerBtn.classList.remove('running');timerBtn.textContent=timerBtn.dataset.orig;}
    const secs=parseInt(btn.dataset.sec);
    btn.dataset.orig=btn.textContent;timerBtn=btn;timerStart=new Date();let rem=secs;
    btn.classList.add('running');
    timerInt=setInterval(()=>{
      rem--;const mm=Math.floor(rem/60),ss=rem%60;btn.textContent=`${mm}:${String(ss).padStart(2,'0')}`;
      if(rem<=0){
        clearInterval(timerInt);timerInt=null;btn.classList.remove('running');btn.textContent=btn.dataset.orig;
        const end=new Date();
        const fmt=d=>`${(d.getHours()%12||12)}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')} ${d.getHours()>=12?'PM':'AM'}`;
        $('timerReport').textContent=`${secs/60}m timer · Start ${fmt(timerStart)} → End ${fmt(end)}`;
        $('timerOverlay').classList.add('show');
        try{const ac=new AudioContext(),o=ac.createOscillator(),g=ac.createGain();o.frequency.value=880;o.connect(g);g.connect(ac.destination);o.start();g.gain.setValueAtTime(0.3,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.8);o.stop(ac.currentTime+0.8);}catch{}
      }
    },1000);
  });
});
$('timerDismiss').onclick=()=>$('timerOverlay').classList.remove('show');

/* ── Screenshot ── */
$('btnScreenshot').onclick=async()=>{
  try{
    const stream=await navigator.mediaDevices.getDisplayMedia({video:{displaySurface:'browser'},preferCurrentTab:true});
    const track=stream.getVideoTracks()[0];const capture=new ImageCapture(track);const bitmap=await capture.grabFrame();track.stop();
    const canvas=document.createElement('canvas');canvas.width=bitmap.width;canvas.height=bitmap.height;
    canvas.getContext('2d').drawImage(bitmap,0,0);
    canvas.toBlob(async blob=>{
      try{await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);toast('📸 Copied!');}
      catch{const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`screenshot-${Date.now()}.png`;a.click();toast('📸 Saved!');}
    },'image/png');
  }catch{toast('📸 Cancelled');}
};

/* ── Audio Record ── */
let audioRec=null;
$('btnRecAudio').onclick=async()=>{
  if(audioRec){audioRec.stop();return;}
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    audioRec=new MediaRecorder(stream,{mimeType:'audio/webm'});const chunks=[];
    audioRec.ondataavailable=e=>chunks.push(e.data);
    audioRec.onstop=()=>{stream.getTracks().forEach(t=>t.stop());const blob=new Blob(chunks,{type:'audio/webm'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`recording-${Date.now()}.webm`;a.click();toast('🎙️ Saved!');$('btnRecAudio').textContent='🎙️';audioRec=null;};
    audioRec.start();$('btnRecAudio').textContent='⏹️';toast('🎙️ Recording…');
  }catch{toast('🎙️ Denied');}
};

/* ── Video Record ── */

/* ══════════════════════════════════════════════════════════════
   DATA + RENDER
   ══════════════════════════════════════════════════════════════ */
async function fetchApps(){
  const res=await fetch(CFG.api,{headers:{Accept:'application/vnd.github+json'}});
  if(!res.ok) throw new Error(`GitHub API ${res.status}`);
  const files=await res.json();
  S.apps=files.filter(f=>f.type==='file'&&/\.(html|py)$/i.test(f.name)&&!CFG.exclude.has(f.name)).map(f=>{
    const ext=f.name.toLowerCase().endsWith('.py')?'py':'html';
    const display=cleanName(f.name),tokens=tokenize(f.name);
    return{name:f.name,ext,display,tokens,color:hashColor(display),size:f.size||0};
  });
  render();
}

function buildClusterBar(){
  const bar=$('clusterBar');bar.innerHTML='';
  for(const c of CLUSTERS){
    const cnt=c.id==='all'?S.apps.length:S.apps.filter(a=>matchCluster(a,c.id)).length;
    if(c.id!=='all'&&cnt===0)continue;
    const b=document.createElement('button');b.className=`cb${S.cluster===c.id?' act':''}`;
    b.innerHTML=`${c.emoji}${c.label}<span class="cc">${cnt}</span>`;
    b.onclick=()=>{S.cluster=c.id;render();};bar.appendChild(b);
  }
}

function buildRecents(){
  const bar=$('recentsBar');bar.innerHTML='<span class="rlabel">Recent</span>';
  const names=S.recents.filter(n=>S.apps.some(a=>a.name===n));
  const show=names.length?names.slice(0,5):S.apps.slice(0,5).map(a=>a.name);
  for(const nm of show){
    const app=S.apps.find(a=>a.name===nm);if(!app)continue;
    const a=document.createElement('a');a.className='rchip';a.textContent=app.display;
    a.href=playUrl(app);a.target='_blank';a.rel='noopener';
    a.onclick=()=>saveRecent(app.name);bar.appendChild(a);
  }
}

function buildHistory(){
  const list=$('histList');list.innerHTML='';
  $('histCount').textContent=`(${S.history.length})`;
  for(const h of S.history.slice(0,50)){
    const app=S.apps.find(a=>a.name===h.name);
    const d=new Date(h.ts);const pad=n=>String(n).padStart(2,'0');
    const timeStr=`${d.getMonth()+1}/${d.getDate()} ${pad(d.getHours()%12||12)}:${pad(d.getMinutes())} ${d.getHours()>=12?'PM':'AM'}`;
    const div=document.createElement('div');div.className='hist-item';
    div.innerHTML=`<span class="htime">${timeStr}</span><span class="hname">${escH(h.name)}</span>${app?`<a href="${playUrl(app)}" target="_blank" rel="noopener">▶</a>`:''}`;
    list.appendChild(div);
  }
}

function filterApps(){
  const q=S.search.trim().toLowerCase();
  return S.apps.filter(a=>{
    if(!matchCluster(a,S.cluster))return false;
    if(q&&!a.name.toLowerCase().includes(q)&&!a.display.toLowerCase().includes(q))return false;
    return true;
  });
}

function sortApps(apps){
  return[...apps].sort((a,b)=>{
    if(S.sort==='az')return a.display.localeCompare(b.display);
    if(S.sort==='za')return b.display.localeCompare(a.display);
    if(S.sort==='newest')return b.name.localeCompare(a.name);
    return a.display.localeCompare(b.display);
  });
}

function groupByFirst(apps){
  const m=new Map();
  for(const a of apps){const w=a.tokens[0]||'misc';if(!m.has(w))m.set(w,[]);m.get(w).push(a);}
  return[...m.entries()].sort((a,b)=>b[1].length-a[1].length||a[0].localeCompare(b[0]));
}

function render(){
  const filtered=filterApps(),sorted=sortApps(filtered);S.filtered=sorted;
  $('appCount').textContent=`📦 ${S.apps.length}`;
  document.title = `🏭 All AI (${S.apps.length})`;
  $('resultInfo').innerHTML=`Showing <strong>${sorted.length}</strong> of <strong>${S.apps.length}</strong>`;
  buildClusterBar();buildRecents();buildHistory();
  const deck=$('deck');deck.innerHTML='';
  if(!sorted.length){deck.innerHTML='<div class="empty-s">No apps match.</div>';return;}
  if(S.sort==='cluster'&&S.cluster==='all'){
    for(const[w,apps]of groupByFirst(sorted)){
      const g=document.createElement('div');g.className='grp';
      g.innerHTML=`<div class="grp-h"><span>${escH(w.charAt(0).toUpperCase()+w.slice(1))}</span><span class="gc">${apps.length}</span></div>`;
      const grid=document.createElement('div');grid.className='tiles';
      for(const a of apps)grid.appendChild(mkTile(a));
      g.appendChild(grid);deck.appendChild(g);
    }
  }else{
    const grid=document.createElement('div');grid.className='tiles';
    for(const a of sorted)grid.appendChild(mkTile(a));
    deck.appendChild(grid);
  }
}

function mkTile(app){
  const t=document.createElement('article');t.className='tile';
  t.innerHTML=`
    <div class="t-head"><div class="t-dot" style="background:${app.color}"></div><div class="t-name">${escH(app.display)}</div></div>
    <div class="t-acts">
      <button class="t-btn play" data-a="play">▶ Play</button>
      <button class="t-btn" data-a="code">💻 Code</button>
    </div>`;
  t.querySelector('[data-a="play"]').onclick=()=>{saveRecent(app.name);window.open(playUrl(app),'_blank','noopener');};
  t.querySelector('[data-a="code"]').onclick=()=>window.open(codeUrl(app),'_blank','noopener');
  return t;
}

window.addEventListener('keydown',e=>{
  const k=(e.key||'').toLowerCase();
  const tag=(document.activeElement&&document.activeElement.tagName||'').toLowerCase();
  const typing=tag==='input'||tag==='textarea'||document.activeElement?.isContentEditable;
  if((e.ctrlKey||e.metaKey)&&k==='k'){e.preventDefault();$('searchBox').focus();$('searchBox').select();return;}
  if(k==='/'&&!typing){e.preventDefault();$('searchBox').focus();$('searchBox').select();return;}
  if(typing||e.ctrlKey||e.metaKey||e.altKey)return;
  if(k==='n'){window.open('https://github.com/AaronCWacker/AI-UI-UX-JS/new/main','_blank','noopener');return;}
  if(k==='c'){window.open('https://github.com/AaronCWacker/AI-UI-UX-JS/','_blank','noopener');return;}
  if(k==='p'){window.open('https://allaiinc.org/','_blank','noopener');return;}
});
