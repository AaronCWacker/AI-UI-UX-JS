<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>🤖✨ AI UI/UX Gallery</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%A4%96%3C/text%3E%3C/svg%3E">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem; width: 100%;
    }
    @media (max-width: 400px) {
      .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(135px, 1fr)); gap: 0.5rem; }
    }
    .app-card {
      background: white; border: 1px solid #e2e8f0;
      transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .app-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      border-color: #6366f1;
    }
    .recents-scroll {
      display: flex; gap: 0.5rem; overflow-x: auto; padding: 4px 0 8px 0;
      scrollbar-width: none; -ms-overflow-style: none;
    }
    .recents-scroll::-webkit-scrollbar { display: none; }
    .recent-pill {
      flex-shrink: 0; display: flex; align-items: center; gap: 6px;
      padding: 4px 10px; background: white; border: 1px solid #e5e7eb;
      border-radius: 9999px; font-size: 11px; cursor: pointer; transition: all 0.2s;
      max-width: 170px;
    }
    .recent-pill:hover { background: #f1f5f9; border-color: #94a3b8; }
    .line-clamp-3 { display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 3; overflow: hidden; }
    .filter-btn.active { background-color: #e0e7ff; color: #4338ca; border-color: transparent; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    .animate-in { animation: fadeIn 0.3s ease-out forwards; }
    .emoji-chip {
      display:inline-flex; align-items:center; gap:8px;
      padding: 6px 10px; background: rgba(255,255,255,0.75);
      border: 1px solid rgba(226,232,240,0.9); border-radius: 9999px;
      font-size: 11px; color: #475569; backdrop-filter: blur(6px);
    }
    .kbd {
      font-size: 10px; padding: 2px 6px; border-radius: 6px;
      border: 1px solid #e2e8f0; background: #fff; color: #64748b;
    }
    .group-section {
      grid-column: 1 / -1; margin-top: 1rem; margin-bottom: 0.5rem;
      border-bottom: 1px solid #e2e8f0; padding-bottom: 0.5rem;
    }
    .group-title {
      font-size: 1.1rem; font-weight: 700; color: #1e293b;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .date-status {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 10px; color: #94a3b8; padding: 2px 8px;
      background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 9999px;
    }
    .date-status.loaded { color: #22c55e; border-color: #bbf7d0; background: #f0fdf4; }
  </style>
</head>
<body class="text-gray-800 min-h-screen flex flex-col">
  <div class="w-full px-4 py-4 max-w-[1920px] mx-auto flex-grow flex flex-col">
    <header class="mb-2 space-y-3">
      <div class="flex flex-col md:flex-row justify-between md:items-center gap-3 border-b border-gray-200 pb-3">
        <div class="flex items-center gap-3">
          <h1 class="text-xl font-bold tracking-tight text-gray-900">
            🤖 AI UI/UX <span class="text-indigo-600">Gallery</span> ✨
          </h1>
          <button id="sound-toggle" class="p-1.5 rounded-full hover:bg-gray-200 text-gray-400 text-xs transition" title="🔇 Mute / 🔊 Unmute">🔇</button>
          <span id="date-status" class="date-status hidden">📅 loading…</span>
          <span class="emoji-chip hidden md:inline-flex" title="Tips">
            🧭 <span>Use filters + search</span>
            <span class="kbd">/</span><span class="kbd">⌘K</span>
          </span>
        </div>
        <div class="w-full flex flex-wrap md:flex-nowrap justify-end gap-2 items-center">
          <input type="text" id="search-input" placeholder="🔎 Search apps…"
                 class="flex-grow md:max-w-xs px-3 py-2 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none shadow-sm">
          <select id="group-select" class="px-2 py-2 text-sm border border-gray-300 rounded-lg outline-none bg-white cursor-pointer shadow-sm">
            <option value="flat">🔲 Flat Grid</option>
            <option value="category">📂 Group by Category</option>
          </select>
          <select id="sort-select" class="px-2 py-2 text-sm border border-gray-300 rounded-lg outline-none bg-white cursor-pointer shadow-sm">
            <option value="added-new">📥 Date Added (Newest)</option>
            <option value="added-old">📤 Date Added (Oldest)</option>
            <option value="commit-new">🔄 Last Commit (Newest)</option>
            <option value="commit-old">🔄 Last Commit (Oldest)</option>
            <option value="alpha-asc">🔤 Name (A-Z)</option>
            <option value="alpha-desc">🔠 Name (Z-A)</option>
          </select>
          <div class="flex items-center px-2 text-xs text-gray-400 font-medium" title="Auto-reloads every 60s">
            <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse mr-1.5"></span>Live
          </div>
        </div>
      </div>
      <div id="recents-container" class="hidden">
        <div class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1">🕘 Recently Used</div>
        <div id="recents-bar" class="recents-scroll"></div>
      </div>
      <div id="filter-container" class="flex flex-wrap gap-2 pt-1"></div>
    </header>
    <main id="app-gallery" class="gallery-grid flex-grow relative min-h-[300px] content-start"></main>
  </div>

  <footer class="py-6 text-center text-gray-400 text-[10px] border-t border-gray-200 mt-auto">
    <span id="count-display">⏳ Loading…</span>
    <p class="mt-1">© 2026 🧠⚙️ Aaron Wacker</p>
  </footer>

  <script>
    /* ==================================================================
       CONFIG
    ================================================================== */
    var CONFIG = {
      user:       'aaroncwacker',
      repo:       'AI-UI-UX-JS',
      root:       'https://aaroncwacker.github.io/AI-UI-UX-JS/',
      storageKey: 'gallery_recents_v2'
    };

    var FILE_TYPES = [
      { id: 'all',   keys: ['all'],  label: 'All',      emoji: '💠', color: 'bg-gray-100 text-gray-700' },
      { id: 'ai',    keys: ['ai','bot','gpt','gemini','claude','llm','agent','speech','voice'], label: 'AI/LLM', emoji: '🧠', color: 'bg-indigo-50 text-indigo-700' },
      { id: 'sim',   keys: ['sim','city','traffic','evolution','network','population'], label: 'World Sim', emoji: '🌍', color: 'bg-blue-50 text-blue-700' },
      { id: 'tool',  keys: ['builder','editor','visualizer','dashboard','teleprompter','graph','art','creator'], label: 'Tools', emoji: '🛠️', color: 'bg-slate-100 text-slate-700' },
      { id: 'audio', keys: ['mp3','audio','jam','looper','chord','music','sound'], label: 'Audio', emoji: '🎵', color: 'bg-pink-50 text-pink-700' },
      { id: 'video', keys: ['video','cam','cinema','timeline','sequencer','mp4'], label: 'Video', emoji: '📹', color: 'bg-rose-50 text-rose-700' },
      { id: 'game',  keys: ['game','arcade','quest','brawl','combat','retro','memory','play','versus'], label: 'Arcade', emoji: '🕹️', color: 'bg-amber-50 text-amber-700' },
      { id: 'drive', keys: ['drive','racer','rally','racing','car'], label: 'Racing', emoji: '🏎️', color: 'bg-orange-50 text-orange-700' },
      { id: 'cards', keys: ['tarot','oracle','deck','spirit','card'], label: 'Tarot', emoji: '🔮', color: 'bg-purple-50 text-purple-700' },
      { id: '3d',    keys: ['3d','webgl','three','canvas','skyforge'], label: '3D', emoji: '🧊', color: 'bg-cyan-50 text-cyan-700' },
      { id: 'gps',   keys: ['gps','map','zipcode','location'], label: 'Maps', emoji: '📍', color: 'bg-teal-50 text-teal-700' },
      { id: 'space', keys: ['alien','ufo','space','starship','thor'], label: 'Sci-Fi', emoji: '🚀', color: 'bg-emerald-50 text-emerald-700' }
    ];

    /* ==================================================================
       STATE
    ================================================================== */
    var STATE = {
      apps: [],
      dates: {},          // from dates.json: { "file.html": { added: "ISO", lastCommit: "ISO" } }
      datesLoaded: false,
      filterKeys: ['all'],
      searchTerm: '',
      soundsOn: false,
      viewMode: 'flat',
      reloadInterval: null
    };

    /* ==================================================================
       AUDIO
    ================================================================== */
    var SFX = {
      play: function(type) {
        if (!STATE.soundsOn) return;
        var src = type === 'hover'
          ? 'data:audio/wav;base64,UklGRl9vT1BXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YU'
          : 'data:audio/wav;base64,UklGRi4AAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAEA//8AAP///wAA';
        new Audio(src).play().catch(function(){});
      },
      toggle: function() {
        STATE.soundsOn = !STATE.soundsOn;
        var el = document.getElementById('sound-toggle');
        el.textContent = STATE.soundsOn ? '🔊' : '🔇';
        el.title = STATE.soundsOn ? '🔊 Sound On' : '🔇 Sound Off';
      }
    };

    /* ==================================================================
       HELPERS
    ================================================================== */
    function cleanName(f) { return f.replace(/\.html$/, '').replace(/\.py$/, '').replace(/[\-_]/g, ' '); }

    function getFileType(name) {
      var lower = name.toLowerCase();
      for (var i = 1; i < FILE_TYPES.length; i++) {
        var t = FILE_TYPES[i];
        for (var j = 0; j < t.keys.length; j++) {
          if (lower.indexOf(t.keys[j]) !== -1) return t;
        }
      }
      return { id: 'other', label: 'App', emoji: '⚡', color: 'bg-gray-50 text-gray-600' };
    }

    function fmtDate(ts) { return ts ? new Date(ts).toLocaleDateString() : '—'; }

    function fmtRelative(ts) {
      if (!ts) return '';
      var diff = Date.now() - ts;
      var d = Math.floor(diff / 86400000);
      var h = Math.floor(diff / 3600000);
      var m = Math.floor(diff / 60000);
      if (d > 30) return fmtDate(ts);
      if (d > 0) return d + 'd ago';
      if (h > 0) return h + 'h ago';
      if (m > 0) return m + 'm ago';
      return 'just now';
    }

    /* ==================================================================
       RECENTS
    ================================================================== */
    var Recents = {
      add: function(filename) {
        var list = JSON.parse(localStorage.getItem(CONFIG.storageKey) || '[]');
        list = list.filter(function(f) { return f !== filename; });
        list.unshift(filename);
        if (list.length > 8) list.pop();
        localStorage.setItem(CONFIG.storageKey, JSON.stringify(list));
        this.render();
      },
      render: function() {
        var list = JSON.parse(localStorage.getItem(CONFIG.storageKey) || '[]');
        var container = document.getElementById('recents-container');
        if (list.length === 0) { container.classList.add('hidden'); return; }
        container.classList.remove('hidden');
        document.getElementById('recents-bar').innerHTML = list.map(function(f) {
          var type = getFileType(f);
          var safe = f.replace(/'/g, "\\'");
          return '<div class="recent-pill" onclick="launchApp(\'' + safe + '\')">'
               + '<span class="text-sm">' + type.emoji + '</span>'
               + '<span class="font-medium truncate">✨ ' + cleanName(f) + '</span></div>';
        }).join('');
      }
    };

    /* ==================================================================
       DATES.JSON LOADER
       Fetches the static dates.json generated by the GitHub Action.
       This is a single tiny file — no API rate limits, no tokens needed.
    ================================================================== */
    async function fetchDatesJSON() {
      var statusEl = document.getElementById('date-status');
      statusEl.classList.remove('hidden');
      statusEl.textContent = '📅 loading dates…';

      try {
        // Cache-bust to always get the latest after a push
        var res = await fetch(CONFIG.root + 'dates.json?_=' + Date.now());
        if (!res.ok) throw new Error('HTTP ' + res.status);
        var data = await res.json();

        // Convert ISO strings to timestamps
        var dates = {};
        for (var key in data) {
          if (!data.hasOwnProperty(key)) continue;
          dates[key] = {
            added:      new Date(data[key].added).getTime(),
            lastCommit: new Date(data[key].lastCommit).getTime()
          };
        }

        STATE.dates = dates;
        STATE.datesLoaded = true;

        // Apply to any already-loaded apps
        applyDatesToApps();

        var count = Object.keys(dates).length;
        statusEl.textContent = '📅 ' + count + ' files dated';
        statusEl.classList.add('loaded');
        setTimeout(function() { statusEl.classList.add('hidden'); }, 5000);

      } catch(e) {
        console.warn('dates.json not available:', e.message);
        statusEl.textContent = '📅 dates.json not found — using fallback';
        setTimeout(function() { statusEl.classList.add('hidden'); }, 4000);
        // Not fatal — gallery works fine without dates, just can't sort by date
      }
    }

    function applyDatesToApps() {
      for (var i = 0; i < STATE.apps.length; i++) {
        var app = STATE.apps[i];
        var d = STATE.dates[app.name];
        if (d) {
          app.added      = d.added;
          app.lastCommit = d.lastCommit;
        }
      }
      refreshGrid();
    }

    /* ==================================================================
       MAIN FETCH (GitHub Contents — NO custom headers)
    ================================================================== */
    async function fetchRepoData(isSilent) {
      if (!isSilent) {
        document.getElementById('app-gallery').innerHTML =
          '<div id="loading" class="col-span-full flex flex-col items-center justify-center pt-20 text-gray-400">'
          + '<div class="w-8 h-8 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mb-3"></div>'
          + '<p class="text-xs font-medium animate-pulse">🛰️ Scanning Repo…</p></div>';
      }
      try {
        var res = await fetch('https://api.github.com/repos/' + CONFIG.user + '/' + CONFIG.repo + '/contents/');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        var data = await res.json();
        if (!Array.isArray(data)) throw new Error('Unexpected response');

        var newApps = [];
        for (var i = 0; i < data.length; i++) {
          var f = data[i];
          if (f.type !== 'file') continue;
          if (!f.name.endsWith('.html') && !f.name.endsWith('.py')) continue;
          if (f.name === 'index.html' || f.name === 'python-runner.html') continue;

          var d = STATE.dates[f.name];
          newApps.push({
            name:       f.name,
            date:       0,
            added:      d ? d.added      : 0,
            lastCommit: d ? d.lastCommit  : 0
          });
        }

        STATE.apps = newApps;
        refreshGrid();

        // Fallback: HTTP Last-Modified dates (for files missing from dates.json)
        fetchHTTPDates();

      } catch(e) {
        console.error('Gallery load error:', e);
        if (!isSilent) {
          document.getElementById('app-gallery').innerHTML =
            '<p class="text-red-500 col-span-full text-center mt-10">'
            + '💥 Could not load gallery. <button onclick="location.reload()" class="underline">Retry</button></p>';
        }
      }
    }

    async function fetchHTTPDates() {
      var updated = false;
      for (var i = 0; i < STATE.apps.length; i++) {
        var app = STATE.apps[i];
        if (app.date) continue;
        try {
          var r = await fetch(CONFIG.root + app.name, { method: 'HEAD' });
          var lm = r.headers.get('Last-Modified');
          if (lm) { app.date = new Date(lm).getTime(); updated = true; }
        } catch(e) {}
      }
      if (updated) refreshGrid();
    }

    function startAutoReload() {
      if (STATE.reloadInterval) clearInterval(STATE.reloadInterval);
      STATE.reloadInterval = setInterval(function() { fetchRepoData(true); }, 60000);
    }

    /* ==================================================================
       CARD + GRID
    ================================================================== */
    function createCardHTML(app, index) {
      var type = getFileType(app.name);
      var card = document.createElement('div');
      card.className = 'app-card rounded-xl p-3 flex flex-col justify-between h-full animate-in';
      card.onmouseenter = function() { SFX.play('hover'); };

      var dateHTML = '';
      if (app.added && app.lastCommit) {
        dateHTML = '<div class="mt-2 space-y-0.5 text-[9px] text-gray-400 text-right">'
                 + '<div>📥 ' + fmtDate(app.added) + '</div>'
                 + '<div>🔄 ' + fmtRelative(app.lastCommit) + '</div></div>';
      } else if (app.date) {
        dateHTML = '<div class="mt-2 text-[9px] text-gray-400 text-right">🗓️ ' + fmtDate(app.date) + '</div>';
      } else {
        dateHTML = '<div class="h-5"></div>';
      }

      var safe = app.name.replace(/'/g, "\\'");
      card.innerHTML =
        '<div>'
        + '<div class="flex justify-between items-start mb-2">'
        + '<span class="text-[10px] font-bold text-gray-300">🏷️ #' + index + '</span>'
        + '<div class="px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider ' + type.color + '">'
        + type.emoji + ' ' + type.label + '</div></div>'
        + '<h3 class="text-sm font-bold text-gray-900 leading-tight line-clamp-3 mb-2" title="' + cleanName(app.name) + '">'
        + '✨ ' + cleanName(app.name) + '</h3></div>'
        + '<div><div class="flex gap-2 mt-auto">'
        + '<button onclick="launchApp(\'' + safe + '\')" class="flex-1 bg-indigo-600 text-white text-xs py-1.5 rounded hover:bg-indigo-700 transition shadow-sm font-medium">🚀 Launch</button>'
        + '<a href="https://github.com/' + CONFIG.user + '/' + CONFIG.repo + '/blob/main/' + app.name + '" target="_blank" class="px-2.5 py-1.5 border border-gray-200 rounded text-gray-500 hover:bg-gray-50 hover:text-gray-900 text-xs transition">🧾 Code</a>'
        + '</div>' + dateHTML + '</div>';
      return card;
    }

    function refreshGrid() {
      var gallery      = document.getElementById('app-gallery');
      var countDisplay = document.getElementById('count-display');
      var sortMode     = document.getElementById('sort-select').value;
      gallery.innerHTML = '';

      // Sort
      STATE.apps.sort(function(a, b) {
        switch (sortMode) {
          case 'added-new':  return (b.added || 0)        - (a.added || 0);
          case 'added-old':  return (a.added || 9e15)     - (b.added || 9e15);
          case 'commit-new': return (b.lastCommit || 0)   - (a.lastCommit || 0);
          case 'commit-old': return (a.lastCommit || 9e15)- (b.lastCommit || 9e15);
          case 'alpha-asc':  return a.name.localeCompare(b.name);
          case 'alpha-desc': return b.name.localeCompare(a.name);
          default: return 0;
        }
      });

      // Filter
      var filtered = STATE.apps.filter(function(app) {
        var nl = cleanName(app.name).toLowerCase();
        var ms = nl.indexOf(STATE.searchTerm) !== -1;
        var isAll = STATE.filterKeys.indexOf('all') !== -1;
        var mf = isAll;
        if (!mf) {
          for (var k = 0; k < STATE.filterKeys.length; k++) {
            if (nl.indexOf(STATE.filterKeys[k]) !== -1) { mf = true; break; }
          }
        }
        return ms && mf;
      });

      var vis = 0;

      if (STATE.viewMode === 'flat') {
        for (var i = 0; i < filtered.length; i++) {
          vis++;
          gallery.appendChild(createCardHTML(filtered[i], vis));
        }
      } else {
        for (var ti = 1; ti < FILE_TYPES.length; ti++) {
          var type = FILE_TYPES[ti];
          var catApps = filtered.filter(function(a) { return getFileType(a.name).id === type.id; });
          if (catApps.length > 0) {
            var hdr = document.createElement('div');
            hdr.className = 'group-section animate-in';
            hdr.innerHTML = '<h2 class="group-title">' + type.emoji + ' ' + type.label
              + ' <span class="text-sm font-normal text-gray-400">(' + catApps.length + ')</span></h2>';
            gallery.appendChild(hdr);
            for (var ci = 0; ci < catApps.length; ci++) { vis++; gallery.appendChild(createCardHTML(catApps[ci], vis)); }
          }
        }
        var otherApps = filtered.filter(function(a) { return getFileType(a.name).id === 'other'; });
        if (otherApps.length > 0) {
          var hdr2 = document.createElement('div');
          hdr2.className = 'group-section animate-in';
          hdr2.innerHTML = '<h2 class="group-title">⚡ Uncategorized <span class="text-sm font-normal text-gray-400">(' + otherApps.length + ')</span></h2>';
          gallery.appendChild(hdr2);
          for (var oi = 0; oi < otherApps.length; oi++) { vis++; gallery.appendChild(createCardHTML(otherApps[oi], vis)); }
        }
      }

      if (vis === 0) {
        gallery.innerHTML = '<div class="col-span-full text-center py-10 text-gray-400">😅 No apps found matching "' + STATE.searchTerm + '"</div>';
      }

      var dated = 0;
      for (var di = 0; di < STATE.apps.length; di++) { if (STATE.apps[di].added > 0) dated++; }
      countDisplay.textContent = '📦 ' + vis + ' Apps' + (STATE.datesLoaded ? '  ·  📅 ' + dated + '/' + STATE.apps.length + ' dated' : '');
    }

    /* ==================================================================
       INIT
    ================================================================== */
    function setFilter(keys, btnEl) {
      SFX.play('click');
      STATE.filterKeys = keys;
      var btns = document.querySelectorAll('.filter-btn');
      for (var i = 0; i < btns.length; i++) {
        btns[i].classList.remove('active');
        btns[i].classList.add('bg-white', 'text-gray-600');
      }
      btnEl.classList.remove('bg-white', 'text-gray-600');
      btnEl.classList.add('active');
      refreshGrid();
    }

    function init() {
      var fc = document.getElementById('filter-container');
      FILE_TYPES.forEach(function(type, idx) {
        var btn = document.createElement('button');
        btn.className = 'filter-btn px-3 py-1.5 rounded-lg text-xs font-semibold border border-gray-200 bg-white text-gray-600 hover:bg-gray-50 transition-colors' + (idx === 0 ? ' active' : '');
        btn.innerHTML = type.emoji + ' ' + type.label;
        btn.onclick = function() { setFilter(type.keys, btn); };
        fc.appendChild(btn);
      });

      document.getElementById('search-input').addEventListener('input', function(e) {
        STATE.searchTerm = e.target.value.toLowerCase();
        refreshGrid();
      });
      document.getElementById('sort-select').addEventListener('change', refreshGrid);
      document.getElementById('group-select').addEventListener('change', function(e) {
        STATE.viewMode = e.target.value;
        refreshGrid();
      });
      document.getElementById('sound-toggle').onclick = SFX.toggle;

      window.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') { e.preventDefault(); document.getElementById('search-input').focus(); }
        if (e.key === '/') { e.preventDefault(); document.getElementById('search-input').focus(); }
      });

      Recents.render();

      // 1. Fetch dates.json first (fast, static file)
      // 2. Then fetch the file list from GitHub Contents API
      // dates.json loads in parallel — whichever finishes first gets applied
      fetchDatesJSON();
      fetchRepoData(false);
      startAutoReload();
    }

    window.launchApp = function(filename) {
      SFX.play('click');
      Recents.add(filename);
      if (filename.endsWith('.py')) {
        window.open('python-runner.html?file=' + filename, '_blank');
      } else {
        window.open(CONFIG.root + filename, '_blank');
      }
    };

    init();
  </script>
</body>
</html>
