<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>🗂 Yggdrasil Deck — App Index</title>
  <meta name="color-scheme" content="dark" />
  <style>
    :root {
      --bg: #060A12;
      --bg-2: #0B1120;
      --panel: rgba(7, 12, 22, 0.88);
      --panel-2: rgba(11, 17, 32, 0.78);
      --line: rgba(201, 168, 76, 0.16);
      --line-strong: rgba(201, 168, 76, 0.30);
      --gold: #C9A84C;
      --amber: #F0A830;
      --rune: #E8D5A3;
      --ink: #F8F2DF;
      --muted: rgba(232, 213, 163, 0.55);
      --soft: rgba(232, 213, 163, 0.22);
      --green: #3BF08C;
      --blue: #3BB8F0;
      --violet: #C8A0FF;
      --danger: #FF6B6B;
      --shadow: 0 14px 44px rgba(0, 0, 0, 0.35);
      --radius: 16px;
      --radius-sm: 12px;
      --pad: 16px;
      --max: 1560px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background:
        radial-gradient(circle at top, rgba(201,168,76,0.08), transparent 26%),
        radial-gradient(circle at 20% 20%, rgba(59,184,240,0.06), transparent 24%),
        linear-gradient(180deg, #050811 0%, #060A12 45%, #08101D 100%);
      color: var(--rune);
      font: 14px/1.45 Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    .shell {
      min-height: 100%;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(16px);
      background: linear-gradient(180deg, rgba(6,10,18,0.96), rgba(6,10,18,0.84));
      border-bottom: 1px solid var(--line);
    }

    .topbar-inner,
    .toolbar,
    .cluster-strip,
    .lang-strip,
    .content,
    .footer {
      width: min(calc(100vw - 24px), var(--max));
      margin: 0 auto;
    }

    .topbar-inner {
      display: flex;
      gap: 14px;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0 12px;
    }

    .brand {
      min-width: 0;
    }

    .title {
      margin: 0;
      font: 800 clamp(20px, 2.2vw, 30px)/1.05 Georgia, ui-serif, serif;
      letter-spacing: 0.06em;
      color: var(--ink);
    }

    .subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .stat {
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(201,168,76,0.06);
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .toolbar-wrap {
      border-top: 1px solid rgba(255,255,255,0.03);
      border-bottom: 1px solid rgba(255,255,255,0.03);
      background: rgba(6,10,18,0.42);
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(220px, 2fr) repeat(5, minmax(120px, 1fr));
      gap: 10px;
      padding: 12px 0;
    }

    .field, .actions {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .search {
      width: 100%;
      min-width: 0;
    }

    input, select, button {
      appearance: none;
      border: 1px solid var(--line);
      background: rgba(9, 15, 28, 0.88);
      color: var(--rune);
      border-radius: 12px;
      min-height: 42px;
      padding: 0 12px;
      font: inherit;
      outline: none;
      transition: 160ms ease;
    }

    input::placeholder { color: rgba(232,213,163,0.36); }
    input:focus, select:focus, button:focus { border-color: var(--line-strong); box-shadow: 0 0 0 3px rgba(201,168,76,0.10); }
    button:hover, select:hover { border-color: var(--line-strong); }
    button { cursor: pointer; }

    .btn {
      background: rgba(201,168,76,0.08);
      color: var(--rune);
      white-space: nowrap;
    }

    .btn-ghost { background: rgba(59,184,240,0.08); }
    .btn-good { background: rgba(59,240,140,0.08); }

    .cluster-strip-wrap,
    .lang-strip-wrap {
      background: rgba(6,10,18,0.24);
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }

    .cluster-strip,
    .lang-strip {
      display: flex;
      gap: 8px;
      overflow: auto;
      padding: 10px 0;
      scrollbar-width: thin;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
      min-height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid rgba(201,168,76,0.14);
      background: rgba(201,168,76,0.04);
      color: var(--muted);
      cursor: pointer;
      user-select: none;
      transition: 160ms ease;
      white-space: nowrap;
    }

    .pill:hover { color: var(--ink); border-color: var(--line-strong); }
    .pill.active {
      background: rgba(201,168,76,0.14);
      border-color: rgba(201,168,76,0.34);
      color: var(--ink);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03);
    }

    .pill .count {
      color: rgba(232,213,163,0.55);
      font-size: 12px;
    }

    .content {
      min-height: 0;
      overflow: auto;
      padding: 18px 0 26px;
    }

    .summary {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      padding: 0 0 14px;
      color: var(--muted);
      font-size: 13px;
    }

    .summary strong { color: var(--ink); }

    .deck {
      display: grid;
      gap: 18px;
    }

    .cluster-group {
      border: 1px solid rgba(201,168,76,0.10);
      background: linear-gradient(180deg, rgba(8,12,22,0.80), rgba(8,12,22,0.50));
      border-radius: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .cluster-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      background: linear-gradient(180deg, rgba(201,168,76,0.08), rgba(201,168,76,0.03));
      border-bottom: 1px solid rgba(201,168,76,0.08);
    }

    .cluster-meta {
      min-width: 0;
    }

    .cluster-title {
      font: 700 16px/1.2 Georgia, ui-serif, serif;
      color: var(--ink);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .cluster-sub {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .cluster-badge {
      border: 1px solid rgba(201,168,76,0.18);
      background: rgba(201,168,76,0.05);
      color: var(--muted);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      white-space: nowrap;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
      padding: 16px;
    }

    .card {
      display: grid;
      gap: 10px;
      padding: 14px;
      border-radius: 16px;
      border: 1px solid rgba(201,168,76,0.10);
      background: linear-gradient(180deg, rgba(12,18,32,0.92), rgba(8,12,22,0.84));
      box-shadow: 0 10px 28px rgba(0,0,0,0.28);
      min-width: 0;
    }

    .card:hover {
      border-color: rgba(201,168,76,0.28);
      transform: translateY(-1px);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      min-width: 0;
    }

    .eyebrow {
      color: rgba(232,213,163,0.38);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 10px;
      margin-bottom: 4px;
    }

    .card-name {
      color: var(--ink);
      font: 700 15px/1.25 Georgia, ui-serif, serif;
      word-break: break-word;
    }

    .card-title {
      color: var(--muted);
      font-size: 13px;
      min-height: 1.4em;
      word-break: break-word;
    }

    .filetype {
      border-radius: 999px;
      padding: 6px 9px;
      border: 1px solid rgba(59,184,240,0.18);
      background: rgba(59,184,240,0.06);
      color: #bfe9ff;
      font-size: 12px;
      white-space: nowrap;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: rgba(232,213,163,0.65);
      font-size: 12px;
    }

    .meta span {
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.04);
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      max-width: 100%;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid rgba(201,168,76,0.12);
      background: rgba(201,168,76,0.04);
      color: var(--rune);
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
    }

    .chip.primary {
      background: rgba(201,168,76,0.14);
      border-color: rgba(201,168,76,0.30);
      color: var(--ink);
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .actions button {
      min-width: 0;
      padding: 0 8px;
      font-weight: 600;
    }

    .play { background: rgba(59,240,140,0.12); border-color: rgba(59,240,140,0.25); color: #b8ffd5; }
    .code { background: rgba(59,184,240,0.12); border-color: rgba(59,184,240,0.25); color: #bfe9ff; }
    .copy { background: rgba(201,168,76,0.12); border-color: rgba(201,168,76,0.25); color: var(--ink); }

    .empty {
      padding: 36px 20px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed rgba(201,168,76,0.18);
      border-radius: 16px;
      background: rgba(201,168,76,0.03);
    }

    .footer {
      padding: 10px 0 14px;
      color: rgba(232,213,163,0.34);
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .footer strong { color: rgba(232,213,163,0.54); }

    @media (max-width: 1160px) {
      .toolbar {
        grid-template-columns: 1fr 1fr 1fr;
      }
    }

    @media (max-width: 760px) {
      body { overflow: auto; }
      .shell { grid-template-rows: auto auto auto 1fr auto; }
      .toolbar { grid-template-columns: 1fr; }
      .topbar-inner, .summary, .footer { align-items: flex-start; }
      .topbar-inner, .summary { flex-direction: column; }
      .stats { justify-content: flex-start; }
      .card-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <h1 class="title">🗂 YGGDRASIL DECK</h1>
          <div class="subtitle">low-risk static card index • clustered by filename vocabulary • built for fast demo recall</div>
        </div>
        <div class="stats" id="stats"></div>
      </div>
    </header>

    <section class="toolbar-wrap">
      <div class="toolbar">
        <div class="field search">
          <input id="searchBox" type="text" placeholder="⌘K search filenames, page titles, keywords, language…" />
        </div>
        <div class="field">
          <select id="sortSelect" title="Sort order">
            <option value="cluster">Sort: Cluster Deck</option>
            <option value="newest">Sort: Newest</option>
            <option value="oldest">Sort: Oldest</option>
            <option value="az">Sort: A → Z</option>
            <option value="za">Sort: Z → A</option>
            <option value="lang">Sort: Language</option>
          </select>
        </div>
        <div class="field">
          <select id="groupSelect" title="Grouping">
            <option value="cluster">Group: Cluster</option>
            <option value="flat">Group: Flat Deck</option>
          </select>
        </div>
        <div class="field">
          <select id="typeSelect" title="File type">
            <option value="all">Type: All</option>
            <option value="html">Type: HTML</option>
            <option value="py">Type: Python</option>
          </select>
        </div>
        <div class="field">
          <select id="langSelect" title="Language family">
            <option value="all">Language: All</option>
          </select>
        </div>
        <div class="actions">
          <button class="btn btn-good" id="refreshBtn">↻ Refresh</button>
          <button class="btn btn-ghost" id="clearBtn">✦ Clear</button>
          <button class="btn" id="recentBtn">⏱ Recent</button>
        </div>
      </div>
    </section>

    <section class="cluster-strip-wrap">
      <div class="cluster-strip" id="clusterStrip"></div>
    </section>

    <section class="lang-strip-wrap">
      <div class="lang-strip" id="langStrip"></div>
    </section>

    <main class="content">
      <div class="summary" id="summary"></div>
      <div class="deck" id="deck"></div>
    </main>

    <footer class="footer">
      <div>🧠 <strong>Primary cluster</strong> is assigned from the strongest shared filename token, so a new <strong>Coaster</strong> file will auto-land with the other coaster apps.</div>
      <div id="footerMeta">…</div>
    </footer>
  </div>

  <script>
    const CFG = {
      user: 'aaroncwacker',
      repo: 'AI-UI-UX-JS',
      root: 'https://aaroncwacker.github.io/AI-UI-UX-JS/',
      apiRoot: 'https://api.github.com/repos/aaroncwacker/AI-UI-UX-JS/contents/',
      exclude: new Set(['index.html', 'python-runner.html'])
    };

    const CLUSTER_EMOJI = {
      coaster: '🎢',
      drift: '🛞',
      city: '🏙️',
      promise: '🏛️',
      sim: '🌍',
      world: '🌐',
      traffic: '🚦',
      maritime: '🚢',
      map: '🗺️',
      population: '📊',
      graph: '📈',
      chart: '📉',
      deck: '🃏',
      tarot: '🔮',
      card: '🃏',
      ai: '🧠',
      agent: '🤖',
      memory: '🧠',
      rag: '🧠',
      voice: '🗣️',
      speech: '🎙️',
      video: '📹',
      camera: '📷',
      capture: '📸',
      screen: '🖥️',
      replay: '⏯️',
      audio: '🎵',
      music: '🎵',
      song: '🎶',
      chord: '🎼',
      jam: '🥁',
      '3d': '🧊',
      three: '🧊',
      webgl: '🧊',
      webgpu: '⚙️',
      tsl: '✨',
      gesture: '🫳',
      hand: '✋',
      mediapipe: '🫳',
      game: '🕹️',
      arena: '⚔️',
      quest: '🗡️',
      health: '🏥',
      symptom: '🩺',
      triage: '🚑',
      note: '📝',
      teleprompter: '📜',
      code: '💻',
      dashboard: '🛠️',
      editor: '🧰',
      visualizer: '🔬',
      dragon: '🐉',
      starship: '🚀',
      cruiser: '🛸',
      default: '⚡'
    };

    const TOKEN_FAMILIES = {
      coaster: ['coaster', 'roller', 'ride', 'tubular'],
      drift: ['drift', 'racer', 'racing', 'rally', 'drive'],
      city: ['city', 'town'],
      promise: ['promise'],
      sim: ['sim', 'simulation'],
      world: ['world'],
      traffic: ['traffic'],
      maritime: ['maritime', 'ship', 'boat', 'harbor'],
      map: ['map', 'maps', 'gps', 'geo', 'zipcode', 'states'],
      population: ['population', 'populations'],
      graph: ['graph', 'graphs', 'viz', 'visualization', 'visualizer', 'plot'],
      chart: ['chart', 'charts'],
      deck: ['deck', 'decks'],
      card: ['card', 'cards'],
      tarot: ['tarot', 'oracle'],
      ai: ['ai', 'llm', 'gpt', 'claude', 'gemini', 'grok'],
      agent: ['agent', 'agents', 'agentic', 'factory', 'copilot'],
      memory: ['memory', 'episodic', 'semantic'],
      rag: ['rag'],
      voice: ['voice'],
      speech: ['speech'],
      video: ['video', 'videos', 'cinema', 'movie', 'movies', 'mp4'],
      camera: ['camera', 'cam'],
      capture: ['capture', 'capturer', 'record', 'recording'],
      screen: ['screen'],
      replay: ['replay', 'playback'],
      audio: ['audio', 'sound'],
      music: ['music'],
      song: ['song', 'songs', 'suno'],
      chord: ['chord', 'chords'],
      jam: ['jam', 'looper', 'pad', 'pads', 'synth'],
      '3d': ['3d'],
      three: ['three', 'threejs'],
      webgl: ['webgl'],
      webgpu: ['webgpu'],
      tsl: ['tsl'],
      gesture: ['gesture', 'gestures'],
      hand: ['hand', 'hands', 'pose'],
      mediapipe: ['mediapipe'],
      game: ['game', 'games', 'arcade', 'retro', 'versus', 'combat', 'battle'],
      arena: ['arena'],
      quest: ['quest'],
      health: ['health', 'healthcare', 'medical', 'med'],
      symptom: ['symptom', 'symptoms'],
      triage: ['triage'],
      note: ['note', 'notes'],
      teleprompter: ['teleprompter'],
      code: ['code'],
      dashboard: ['dashboard'],
      editor: ['editor'],
      visualizer: ['visualizer'],
      dragon: ['dragon', 'dragons'],
      starship: ['starship', 'starships', 'space', 'spacecraft'],
      cruiser: ['cruiser', 'cruisers']
    };

    const STOPWORDS = new Set([
      'the','and','for','with','from','your','wacker','aaron','allaiinc','app','apps','new','old','best','top','main',
      'html','python','js','py','v','ver','version','copy','final','draft','demo','test','tests','alpha','beta',
      'pro','plus','mini','ultra','super','edition','series','part','mode','view','page','file','files','index'
    ]);

    const LANG_MAP = [
      { label: 'Python', test: n => n.endsWith('.py') },
      { label: 'Three.js', test: n => /(three|threejs|webgl|3d|skyforge)/i.test(n) },
      { label: 'WebGPU', test: n => /(webgpu|tsl)/i.test(n) },
      { label: 'MediaPipe', test: n => /mediapipe/i.test(n) },
      { label: 'Canvas2D', test: n => /(canvas|paint|draw)/i.test(n) },
      { label: 'Maps/Geo', test: n => /(map|gps|zipcode|population|states)/i.test(n) },
      { label: 'WebAudio', test: n => /(audio|music|song|sound|synth|jam|chord)/i.test(n) },
      { label: 'HTML/JS', test: _ => true }
    ];

    const state = {
      apps: [],
      filtered: [],
      search: '',
      type: 'all',
      cluster: 'all',
      lang: 'all',
      sort: 'cluster',
      group: 'cluster',
      titleQueue: [],
      titleWorkers: 0,
      clusterStats: new Map(),
      lastFetched: null
    };

    const els = {
      stats: document.getElementById('stats'),
      summary: document.getElementById('summary'),
      deck: document.getElementById('deck'),
      clusterStrip: document.getElementById('clusterStrip'),
      langStrip: document.getElementById('langStrip'),
      langSelect: document.getElementById('langSelect'),
      footerMeta: document.getElementById('footerMeta'),
      searchBox: document.getElementById('searchBox'),
      sortSelect: document.getElementById('sortSelect'),
      groupSelect: document.getElementById('groupSelect'),
      typeSelect: document.getElementById('typeSelect'),
      refreshBtn: document.getElementById('refreshBtn'),
      clearBtn: document.getElementById('clearBtn'),
      recentBtn: document.getElementById('recentBtn')
    };

    function cleanName(name) {
      return name.replace(/\.(html|py)$/i, '').replace(/[_-]+/g, ' ').replace(/\s+/g, ' ').trim();
    }

    function detectLang(name) {
      const lower = name.toLowerCase();
      return (LANG_MAP.find(entry => entry.test(lower)) || LANG_MAP.at(-1)).label;
    }

    function getPlayUrl(app) {
      return app.ext === 'py'
        ? `python-runner.html?file=${encodeURIComponent(app.name)}`
        : `${CFG.root}${app.name}`;
    }

    function tokenize(name) {
      return cleanName(name)
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, ' ')
        .split(/\s+/)
        .map(t => t.trim())
        .filter(Boolean)
        .map(stemToken)
        .filter(t => t.length > 1 && !STOPWORDS.has(t));
    }

    function stemToken(token) {
      const mapHit = Object.entries(TOKEN_FAMILIES).find(([, variants]) => variants.includes(token));
      if (mapHit) return mapHit[0];
      if (/^[a-z]+\d+$/.test(token)) return token.replace(/\d+$/g, '');
      if (token.endsWith('ies') && token.length > 4) return token.slice(0, -3) + 'y';
      if (token.endsWith('s') && token.length > 3 && !token.endsWith('ss')) return token.slice(0, -1);
      return token;
    }

    function emojiFor(token) {
      return CLUSTER_EMOJI[token] || CLUSTER_EMOJI.default;
    }

    function titleCacheKey(name) { return `ygg-title:${CFG.repo}:${name}`; }
    function dateCacheKey(name) { return `ygg-date:${CFG.repo}:${name}`; }

    function readCache(key) {
      try { return localStorage.getItem(key); } catch { return null; }
    }

    function writeCache(key, value) {
      try { localStorage.setItem(key, value); } catch {}
    }

    function computeTokenStats(apps) {
      const stats = new Map();
      for (const app of apps) {
        const uniq = [...new Set(app.tokens)];
        for (const token of uniq) {
          const entry = stats.get(token) || { token, count: 0, latest: 0, emoji: emojiFor(token) };
          entry.count += 1;
          entry.latest = Math.max(entry.latest, app.date || 0);
          stats.set(token, entry);
        }
      }
      return stats;
    }

    function pickPrimaryCluster(app, stats) {
      const candidates = [...new Set(app.tokens)]
        .map((token, idx) => {
          const meta = stats.get(token);
          return {
            token,
            idx,
            count: meta?.count || 1,
            latest: meta?.latest || 0,
            score: (meta?.count || 1) * 100 + (app.tokens.length - idx)
          };
        })
        .filter(item => item.count > 1 || CLUSTER_EMOJI[item.token]);

      if (!candidates.length) {
        const fallback = app.ext === 'py' ? 'code' : (app.lang === 'Three.js' ? 'three' : 'ai');
        return { token: fallback, emoji: emojiFor(fallback), count: 1 };
      }

      candidates.sort((a, b) => b.score - a.score || b.latest - a.latest || a.idx - b.idx || a.token.localeCompare(b.token));
      const winner = candidates[0];
      return { token: winner.token, emoji: emojiFor(winner.token), count: winner.count };
    }

    function clusterLabel(token) {
      if (!token) return 'Other';
      return token === '3d' ? '3D' : token.charAt(0).toUpperCase() + token.slice(1);
    }

    function formatDate(ts) {
      if (!ts) return 'unknown';
      try {
        return new Date(ts).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
      } catch {
        return 'unknown';
      }
    }

    function ageText(ts) {
      if (!ts) return 'date ?';
      const days = Math.floor((Date.now() - ts) / 86400000);
      if (days <= 0) return 'today';
      if (days < 30) return `${days}d`;
      if (days < 365) return `${Math.floor(days / 30)}mo`;
      return `${Math.floor(days / 365)}yr`;
    }

    function compareApps(a, b, sortMode = state.sort) {
      if (sortMode === 'newest') return (b.date || 0) - (a.date || 0) || a.name.localeCompare(b.name);
      if (sortMode === 'oldest') return (a.date || 0) - (b.date || 0) || a.name.localeCompare(b.name);
      if (sortMode === 'az') return a.displayName.localeCompare(b.displayName);
      if (sortMode === 'za') return b.displayName.localeCompare(a.displayName);
      if (sortMode === 'lang') return a.lang.localeCompare(b.lang) || b.date - a.date;
      return (
        (state.clusterStats.get(b.primaryCluster.token)?.count || 0) - (state.clusterStats.get(a.primaryCluster.token)?.count || 0) ||
        (b.date || 0) - (a.date || 0) ||
        a.displayName.localeCompare(b.displayName)
      );
    }

    function makePill({ text, count, emoji, active, onClick }) {
      const btn = document.createElement('button');
      btn.className = `pill ${active ? 'active' : ''}`;
      btn.innerHTML = `${emoji ? `<span>${emoji}</span>` : ''}<span>${text}</span><span class="count">${count}</span>`;
      btn.onclick = onClick;
      return btn;
    }

    function buildLanguageControls(apps) {
      const counts = new Map();
      for (const app of apps) counts.set(app.lang, (counts.get(app.lang) || 0) + 1);
      const langs = [...counts.entries()].sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));

      els.langSelect.innerHTML = '<option value="all">Language: All</option>';
      els.langStrip.innerHTML = '';

      els.langStrip.appendChild(makePill({
        text: 'All Languages', count: apps.length, emoji: '🌐', active: state.lang === 'all',
        onClick: () => { state.lang = 'all'; els.langSelect.value = 'all'; render(); }
      }));

      for (const [lang, count] of langs) {
        const option = document.createElement('option');
        option.value = lang;
        option.textContent = `Language: ${lang}`;
        els.langSelect.appendChild(option);

        els.langStrip.appendChild(makePill({
          text: lang, count, emoji: lang === 'Python' ? '🐍' : lang === 'Three.js' ? '🧊' : lang === 'WebAudio' ? '🎵' : '⚙️',
          active: state.lang === lang,
          onClick: () => { state.lang = lang; els.langSelect.value = lang; render(); }
        }));
      }
      els.langSelect.value = state.lang;
    }

    function buildClusterControls(filteredApps) {
      const counts = new Map();
      for (const app of filteredApps) {
        const key = app.primaryCluster.token;
        counts.set(key, (counts.get(key) || 0) + 1);
      }

      const ordered = [...counts.entries()]
        .sort((a, b) => (state.clusterStats.get(b[0])?.count || 0) - (state.clusterStats.get(a[0])?.count || 0) || a[0].localeCompare(b[0]));

      els.clusterStrip.innerHTML = '';
      els.clusterStrip.appendChild(makePill({
        text: 'All Clusters', count: filteredApps.length, emoji: '💠', active: state.cluster === 'all',
        onClick: () => { state.cluster = 'all'; render(); }
      }));

      for (const [token, count] of ordered) {
        els.clusterStrip.appendChild(makePill({
          text: clusterLabel(token), count, emoji: emojiFor(token), active: state.cluster === token,
          onClick: () => { state.cluster = token; render(); }
        }));
      }
    }

    function filterApps() {
      const q = state.search.trim().toLowerCase();
      return state.apps.filter(app => {
        if (state.type !== 'all' && app.ext !== state.type) return false;
        if (state.lang !== 'all' && app.lang !== state.lang) return false;
        if (state.cluster !== 'all' && app.primaryCluster.token !== state.cluster) return false;
        if (!q) return true;

        const hay = [
          app.name,
          app.displayName,
          app.pageTitle || '',
          app.lang,
          app.primaryCluster.token,
          ...app.keywords
        ].join(' ').toLowerCase();

        return hay.includes(q);
      });
    }

    function groupApps(apps) {
      if (state.group === 'flat') {
        const sorted = [...apps].sort(compareApps);
        return [{
          token: 'flat',
          emoji: '🃏',
          label: 'Flat Deck',
          description: `${sorted.length} cards in one sortable deck`,
          apps: sorted
        }];
      }

      const map = new Map();
      for (const app of apps) {
        const token = app.primaryCluster.token;
        if (!map.has(token)) map.set(token, []);
        map.get(token).push(app);
      }

      return [...map.entries()]
        .map(([token, list]) => ({
          token,
          emoji: emojiFor(token),
          label: clusterLabel(token),
          description: `shared filename family · ${list.length} app${list.length === 1 ? '' : 's'}`,
          apps: list.sort(compareApps)
        }))
        .sort((a, b) => {
          const sa = state.clusterStats.get(a.token)?.count || a.apps.length;
          const sb = state.clusterStats.get(b.token)?.count || b.apps.length;
          return sb - sa || compareApps(b.apps[0], a.apps[0], 'newest') || a.label.localeCompare(b.label);
        });
    }

    function createMetaChip(text) {
      const span = document.createElement('span');
      span.textContent = text;
      return span;
    }

    function appKeywords(app) {
      const uniq = [...new Set([app.primaryCluster.token, ...app.tokens])].filter(Boolean);
      const scored = uniq
        .map((token, idx) => ({ token, idx, count: state.clusterStats.get(token)?.count || 1 }))
        .sort((a, b) => (b.token === app.primaryCluster.token) - (a.token === app.primaryCluster.token) || b.count - a.count || a.idx - b.idx)
        .slice(0, 5);
      return scored.map(item => item.token);
    }

    function renderStats(apps) {
      const htmlCount = apps.filter(a => a.ext === 'html').length;
      const pyCount = apps.filter(a => a.ext === 'py').length;
      const clusterCount = new Set(apps.map(a => a.primaryCluster.token)).size;

      els.stats.innerHTML = [
        `📦 <strong>${apps.length}</strong> apps`,
        `🧬 <strong>${clusterCount}</strong> clusters`,
        `🌐 <strong>${htmlCount}</strong> html`,
        `🐍 <strong>${pyCount}</strong> python`
      ].map(text => `<div class="stat">${text}</div>`).join('');
    }

    function renderSummary(filtered, groups) {
      const top = groups[0];
      const clusterTxt = state.cluster === 'all' ? 'all clusters' : `${emojiFor(state.cluster)} ${clusterLabel(state.cluster)}`;
      const searchTxt = state.search ? ` • search: “${state.search}”` : '';
      els.summary.innerHTML = `
        <div>Showing <strong>${filtered.length}</strong> of <strong>${state.apps.length}</strong> apps across <strong>${groups.length}</strong> ${groups.length === 1 ? 'group' : 'groups'} • ${clusterTxt}${searchTxt}</div>
        <div>${top ? `${top.emoji} strongest visible family: <strong>${top.label}</strong>` : 'No visible family'}</div>
      `;
    }

    function renderDeck(filtered) {
      const groups = groupApps(filtered);
      renderSummary(filtered, groups);
      els.deck.innerHTML = '';

      if (!filtered.length) {
        els.deck.innerHTML = '<div class="empty">No cards matched this filter. Clear search or switch cluster/language filters.</div>';
        return;
      }

      for (const group of groups) {
        const section = document.createElement('section');
        section.className = 'cluster-group';

        const head = document.createElement('div');
        head.className = 'cluster-head';
        head.innerHTML = `
          <div class="cluster-meta">
            <div class="cluster-title"><span>${group.emoji}</span><span>${group.label}</span></div>
            <div class="cluster-sub">${group.description}</div>
          </div>
          <div class="cluster-badge">${group.apps.length} cards</div>
        `;
        section.appendChild(head);

        const grid = document.createElement('div');
        grid.className = 'card-grid';

        for (const app of group.apps) {
          const card = document.createElement('article');
          card.className = 'card';

          const title = app.pageTitle ? `🪪 ${app.pageTitle}` : '🪪 reading page title…';
          const keywords = appKeywords(app);

          card.innerHTML = `
            <div class="card-top">
              <div style="min-width:0">
                <div class="eyebrow">FILE</div>
                <div class="card-name">${app.primaryCluster.emoji} ${escapeHtml(app.displayName)}</div>
                <div class="card-title">${escapeHtml(title)}</div>
              </div>
              <div class="filetype">${app.ext === 'py' ? '🐍 Python' : '🌐 HTML'}</div>
            </div>
            <div class="meta"></div>
            <div class="chips"></div>
            <div class="actions">
              <button class="play">▶ Play</button>
              <button class="code">{ } Code</button>
              <button class="copy">⧉ Copy</button>
            </div>
          `;

          const meta = card.querySelector('.meta');
          meta.append(
            createMetaChip(`📄 ${app.name}`),
            createMetaChip(`💬 ${app.lang}`),
            createMetaChip(`📅 ${formatDate(app.date)}`),
            createMetaChip(`⏱ ${ageText(app.date)}`)
          );

          const chipWrap = card.querySelector('.chips');
          keywords.forEach((token, index) => {
            const chip = document.createElement('button');
            chip.className = `chip ${index === 0 ? 'primary' : ''}`;
            chip.innerHTML = `${emojiFor(token)} <span>${clusterLabel(token)}</span>`;
            chip.onclick = () => {
              state.cluster = token;
              render();
            };
            chipWrap.appendChild(chip);
          });

          const [playBtn, codeBtn, copyBtn] = card.querySelectorAll('button.play, button.code, button.copy');
          playBtn.onclick = () => window.open(getPlayUrl(app), '_blank', 'noopener');
          codeBtn.onclick = () => window.open(`https://github.com/${CFG.user}/${CFG.repo}/blob/main/${app.name}`, '_blank', 'noopener');
          copyBtn.onclick = async () => {
            const url = app.ext === 'py' ? `${location.origin}${location.pathname.replace(/[^/]*$/, '')}python-runner.html?file=${encodeURIComponent(app.name)}` : `${CFG.root}${app.name}`;
            try {
              await navigator.clipboard.writeText(url);
              copyBtn.textContent = '✓ Copied';
              setTimeout(() => copyBtn.textContent = '⧉ Copy', 900);
            } catch {
              copyBtn.textContent = '✕ Copy';
              setTimeout(() => copyBtn.textContent = '⧉ Copy', 900);
            }
          };

          grid.appendChild(card);
          if (app.ext === 'html' && !app.pageTitle && !app.titleQueued) queueTitleFetch(app);
        }

        section.appendChild(grid);
        els.deck.appendChild(section);
      }
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, s => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[s]));
    }

    function queueTitleFetch(app) {
      app.titleQueued = true;
      state.titleQueue.push(app);
      drainTitleQueue();
    }

    async function drainTitleQueue() {
      if (state.titleWorkers >= 4 || !state.titleQueue.length) return;
      const app = state.titleQueue.shift();
      if (!app) return;
      state.titleWorkers += 1;

      try {
        const cached = readCache(titleCacheKey(app.name));
        if (cached) {
          app.pageTitle = cached;
        } else {
          const res = await fetch(`${CFG.root}${app.name}`, { cache: 'force-cache' });
          const text = await res.text();
          const match = text.match(/<title[^>]*>([\s\S]*?)<\/title>/i);
          const title = (match?.[1] || '').trim();
          if (title) {
            app.pageTitle = title;
            writeCache(titleCacheKey(app.name), title);
          }
        }
      } catch {}
      finally {
        state.titleWorkers -= 1;
        requestAnimationFrame(() => renderDeck(state.filtered));
        if (state.titleQueue.length) drainTitleQueue();
      }
    }

    async function hydrateDates(apps) {
      const queue = apps.filter(app => !app.date);
      const workers = Array.from({ length: 5 }, async () => {
        while (queue.length) {
          const app = queue.shift();
          if (!app) break;
          const cached = readCache(dateCacheKey(app.name));
          if (cached) {
            app.date = Number(cached) || 0;
            continue;
          }
          try {
            const res = await fetch(`${CFG.root}${app.name}`, { method: 'HEAD', cache: 'no-cache' });
            const lastMod = res.headers.get('Last-Modified');
            if (lastMod) {
              app.date = new Date(lastMod).getTime();
              writeCache(dateCacheKey(app.name), String(app.date));
            }
          } catch {}
        }
      });
      await Promise.all(workers);
    }

    function materializeApps(files) {
      return files
        .filter(file => file.type === 'file')
        .filter(file => /\.(html|py)$/i.test(file.name))
        .filter(file => !CFG.exclude.has(file.name))
        .map(file => {
          const ext = file.name.toLowerCase().endsWith('.py') ? 'py' : 'html';
          const displayName = cleanName(file.name);
          const tokens = tokenize(file.name);
          return {
            name: file.name,
            ext,
            displayName,
            lang: detectLang(file.name),
            tokens,
            keywords: tokens,
            pageTitle: readCache(titleCacheKey(file.name)) || '',
            titleQueued: false,
            date: Number(readCache(dateCacheKey(file.name))) || 0,
            size: file.size || 0,
            raw: file
          };
        });
    }

    async function fetchApps() {
      els.footerMeta.textContent = 'Loading repo inventory…';
      const res = await fetch(CFG.apiRoot, { headers: { Accept: 'application/vnd.github+json' } });
      if (!res.ok) throw new Error(`GitHub listing failed: ${res.status}`);
      const files = await res.json();
      const apps = materializeApps(files);
      await hydrateDates(apps);
      state.lastFetched = Date.now();
      state.apps = apps;
      state.clusterStats = computeTokenStats(apps);
      state.apps.forEach(app => {
        app.primaryCluster = pickPrimaryCluster(app, state.clusterStats);
        app.keywords = appKeywords(app);
      });
      buildLanguageControls(state.apps);
      render();
    }

    function render() {
      state.filtered = filterApps();
      renderStats(state.apps);
      buildClusterControls(state.filtered);
      renderDeck(state.filtered);
      renderFooter();
    }

    function renderFooter() {
      const newest = [...state.apps].filter(a => a.date).sort((a, b) => b.date - a.date)[0];
      els.footerMeta.textContent = `Last refresh ${state.lastFetched ? new Date(state.lastFetched).toLocaleTimeString() : '—'} • newest seen: ${newest ? `${newest.primaryCluster.emoji} ${newest.displayName}` : 'unknown'}`;
    }

    function wireEvents() {
      els.searchBox.addEventListener('input', e => {
        state.search = e.target.value;
        render();
      });

      els.sortSelect.addEventListener('change', e => {
        state.sort = e.target.value;
        render();
      });

      els.groupSelect.addEventListener('change', e => {
        state.group = e.target.value;
        render();
      });

      els.typeSelect.addEventListener('change', e => {
        state.type = e.target.value;
        render();
      });

      els.langSelect.addEventListener('change', e => {
        state.lang = e.target.value;
        render();
      });

      els.refreshBtn.addEventListener('click', () => fetchApps().catch(showError));
      els.clearBtn.addEventListener('click', () => {
        state.search = '';
        state.type = 'all';
        state.cluster = 'all';
        state.lang = 'all';
        state.sort = 'cluster';
        state.group = 'cluster';
        els.searchBox.value = '';
        els.sortSelect.value = 'cluster';
        els.groupSelect.value = 'cluster';
        els.typeSelect.value = 'all';
        els.langSelect.value = 'all';
        render();
      });

      els.recentBtn.addEventListener('click', () => {
        state.sort = 'newest';
        state.group = 'flat';
        els.sortSelect.value = 'newest';
        els.groupSelect.value = 'flat';
        render();
      });

      window.addEventListener('keydown', e => {
        if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') {
          e.preventDefault();
          els.searchBox.focus();
          els.searchBox.select();
        }
      });
    }

    function showError(err) {
      console.error(err);
      els.deck.innerHTML = `<div class="empty">💥 ${escapeHtml(err?.message || 'Failed to load repo index.')}</div>`;
      els.summary.textContent = 'Could not build card deck.';
      els.footerMeta.textContent = 'Load failed.';
    }

    wireEvents();
    fetchApps().catch(showError);
    setInterval(() => fetchApps().catch(() => {}), 120000);
  </script>
</body>
</html>
