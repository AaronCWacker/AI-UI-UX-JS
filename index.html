<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>🌳 Yggdrasil v3 — Neural Grove</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8C%B3%3C/text%3E%3C/svg%3E">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --void: #060A12;
      --gold: #C9A84C;
      --rune: #E8D5A3;
      --amber: #F0A830;
      --bark: #5C3D2E;
      --young: #7FFF7F;
      --old: #FF6B3D;
      --ancient: #C8A0FF;
      --neural: #E0A0FF;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'IBM Plex Mono', monospace;
      background: var(--void);
      color: var(--rune);
      overflow: hidden;
      height: 100vh; width: 100vw;
    }
    canvas#c { position:fixed; inset:0; z-index:0; }
    #hud { position:fixed; top:0; left:0; right:0; z-index:10; pointer-events:none; }
    #hud>* { pointer-events:auto; }
    .hud-bar {
      display:flex; align-items:center; justify-content:space-between;
      padding:8px 14px;
      background:linear-gradient(180deg, rgba(6,10,18,0.96) 0%, rgba(6,10,18,0.7) 70%, transparent 100%);
      backdrop-filter:blur(14px);
      border-bottom:1px solid rgba(201,168,76,0.12);
    }
    .hud-title {
      font-family:'Cinzel',serif; font-weight:900; font-size:1.15rem;
      letter-spacing:0.12em;
      background:linear-gradient(135deg,var(--gold),var(--amber),#fff,var(--gold));
      background-size:200% 200%;
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      animation:shimmer 4s ease-in-out infinite;
    }
    @keyframes shimmer { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
    .hud-sub { font-size:8px; opacity:0.25; letter-spacing:0.15em; text-transform:uppercase; margin-left:10px; }
    .hud-controls { display:flex; gap:6px; align-items:center; flex-wrap:wrap; justify-content:flex-end; }
    .hud-btn {
      background:rgba(201,168,76,0.06); border:1px solid rgba(201,168,76,0.15);
      color:var(--rune); padding:4px 10px; border-radius:5px;
      font-family:'IBM Plex Mono',monospace; font-size:10px;
      cursor:pointer; transition:all 0.25s; white-space:nowrap;
    }
    .hud-btn:hover { background:rgba(201,168,76,0.18); border-color:var(--gold); box-shadow:0 0 10px rgba(201,168,76,0.12); }
    .hud-btn.active { background:rgba(201,168,76,0.22); border-color:var(--gold); color:var(--gold); }
    #search-box {
      background:rgba(6,10,18,0.85); border:1px solid rgba(201,168,76,0.15);
      color:var(--rune); padding:4px 10px; border-radius:5px;
      font-family:'IBM Plex Mono',monospace; font-size:10px;
      width:160px; outline:none; transition:border-color 0.3s;
    }
    #search-box:focus { border-color:var(--gold); box-shadow:0 0 8px rgba(201,168,76,0.15); }
    #search-box::placeholder { color:rgba(232,213,163,0.2); }
    #filter-row, #lang-row { display:flex; gap:3px; padding:5px 14px; overflow-x:auto; scrollbar-width:none; }
    #filter-row::-webkit-scrollbar, #lang-row::-webkit-scrollbar { display:none; }
    .fpill, .lpill {
      flex-shrink:0; padding:2px 8px; border-radius:12px; font-size:9px;
      cursor:pointer; border:1px solid rgba(201,168,76,0.08);
      background:transparent; color:rgba(232,213,163,0.35); transition:all 0.2s;
      font-family:'IBM Plex Mono',monospace;
    }
    .fpill:hover, .lpill:hover { color:var(--rune); border-color:rgba(201,168,76,0.25); }
    .fpill.active { background:rgba(201,168,76,0.12); color:var(--gold); border-color:rgba(201,168,76,0.35); }
    .lpill { border-color:rgba(59,240,140,0.1); color:rgba(59,240,140,0.4); }
    .lpill:hover { color:#3BF08C; border-color:rgba(59,240,140,0.3); }
    .lpill.active { background:rgba(59,240,140,0.1); color:#3BF08C; border-color:rgba(59,240,140,0.4); }
    #info-panel {
      position:fixed; bottom:14px; right:14px; z-index:10;
      background:rgba(6,10,18,0.92); border:1px solid rgba(201,168,76,0.12);
      border-radius:10px; padding:12px 14px; font-size:10px;
      backdrop-filter:blur(14px); max-width:300px; display:none;
      box-shadow:0 8px 32px rgba(0,0,0,0.5);
    }
    .info-name { font-family:'Cinzel',serif; font-weight:700; font-size:13px; color:var(--gold); margin-bottom:4px; line-height:1.3; }
    .info-meta { color:rgba(232,213,163,0.4); font-size:8px; margin-bottom:6px; letter-spacing:0.05em; }
    .info-age-bar { height:4px; border-radius:2px; margin:6px 0; background:rgba(255,255,255,0.05); overflow:hidden; }
    .info-age-fill { height:100%; border-radius:2px; transition:width 0.5s ease; }
    .info-gene { font-size:9px; margin-bottom:6px; opacity:0.6; }
    .info-actions { display:flex; gap:6px; margin-top:8px; }
    .info-actions button {
      flex:1; padding:7px 6px; border-radius:6px;
      font-family:'IBM Plex Mono',monospace; font-size:10px; font-weight:600;
      cursor:pointer; border:1px solid; transition:all 0.2s;
      letter-spacing:0.05em;
    }
    .btn-play { background:rgba(59,240,140,0.12); border-color:rgba(59,240,140,0.25)!important; color:#3BF08C; }
    .btn-play:hover { background:rgba(59,240,140,0.25); box-shadow:0 0 12px rgba(59,240,140,0.15); }
    .btn-code { background:rgba(59,184,240,0.08); border-color:rgba(59,184,240,0.2)!important; color:#3BB8F0; }
    .btn-code:hover { background:rgba(59,184,240,0.2); box-shadow:0 0 12px rgba(59,184,240,0.12); }
    .legend {
      position:fixed; bottom:14px; left:14px; z-index:10;
      display:flex; flex-direction:column; gap:4px; font-size:9px; opacity:0.6;
    }
    .leg-item { display:flex; align-items:center; gap:5px; padding:3px 8px; background:rgba(6,10,18,0.75); border-radius:12px; border:1px solid rgba(255,255,255,0.04); backdrop-filter:blur(6px); }
    .leg-dot { width:7px; height:7px; border-radius:50%; }
    #gen-box { position:fixed; top:100px; right:14px; z-index:10; font-family:'Cinzel',serif; text-align:right; }
    #gen-box .gen-label { font-size:8px; color:rgba(201,168,76,0.3); letter-spacing:0.15em; }
    #gen-box .gen-num { font-size:32px; font-weight:900; color:var(--gold); opacity:0.5; line-height:1; }
    #stats {
      position:fixed; bottom:0; left:0; right:0; z-index:8;
      text-align:center; padding:3px; font-size:8px;
      color:rgba(232,213,163,0.2); letter-spacing:0.08em;
      background:linear-gradient(0deg,rgba(6,10,18,0.85) 0%,transparent 100%);
    }
    .age-legend {
      position:fixed; top:100px; left:14px; z-index:10;
      display:flex; flex-direction:column; gap:3px; font-size:8px; opacity:0.5;
    }
    .age-legend .age-bar { width:80px; height:6px; border-radius:3px; background:linear-gradient(90deg, var(--ancient), var(--old), var(--amber), var(--young)); }
    .age-legend .age-labels { display:flex; justify-content:space-between; font-size:7px; color:rgba(232,213,163,0.3); }
    #loader {
      position:fixed; inset:0; z-index:100; background:var(--void);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      transition:opacity 0.8s;
    }
    #loader.gone { opacity:0; pointer-events:none; }
    .loader-icon { font-size:52px; animation:breathe 2.5s ease-in-out infinite; }
    @keyframes breathe { 0%,100%{opacity:0.3;transform:scale(0.92)} 50%{opacity:1;transform:scale(1.08)} }
    .loader-txt { font-family:'Cinzel',serif; font-size:13px; color:var(--gold); margin-top:14px; letter-spacing:0.2em; opacity:0.5; }
  </style>
</head>
<body>
  <div id="loader"><div class="loader-icon">🌳</div><div class="loader-txt">GERMINATING NEURAL GROVE…</div></div>
  <canvas id="c"></canvas>
  <div id="hud">
    <div class="hud-bar">
      <div style="display:flex;align-items:center;">
        <span class="hud-title">🌳 YGGDRASIL v3</span>
        <span class="hud-sub">neural grove • word-connected neocortex</span>
      </div>
      <div class="hud-controls">
        <input type="text" id="search-box" placeholder="⌘K search titles…" />
        <button class="hud-btn active" id="btn-grove">🌲 Grove</button>
        <button class="hud-btn" id="btn-neural">🧠 Neural</button>
        <button class="hud-btn" id="btn-grow">🌱 Grow</button>
        <button class="hud-btn" id="btn-reset">⟲ Reset</button>
      </div>
    </div>
    <div id="filter-row"></div>
    <div id="lang-row"></div>
  </div>
  <div id="info-panel">
    <div class="info-name" id="ip-name">—</div>
    <div class="info-meta" id="ip-meta">—</div>
    <div class="info-age-bar"><div class="info-age-fill" id="ip-age-fill"></div></div>
    <div class="info-gene" id="ip-gene">—</div>
    <div class="info-actions">
      <button class="btn-play" id="ip-play">▶ Play</button>
      <button class="btn-code" id="ip-code">{ } Code</button>
    </div>
  </div>
  <div class="legend">
    <div class="leg-item"><div class="leg-dot" style="background:#7FFF7F;box-shadow:0 0 5px #7FFF7F"></div>New — bright / larger / pulsing</div>
    <div class="leg-item"><div class="leg-dot" style="background:#C8A0FF;box-shadow:0 0 5px #C8A0FF"></div>Old — deep roots</div>
  </div>
  <div id="gen-box"><div class="gen-label">GENERATION</div><div class="gen-num" id="gen-num">0</div></div>
  <div class="age-legend">
    <div style="font-size:7px;color:rgba(232,213,163,0.3);margin-bottom:2px;">RECENCY SPECTRUM</div>
    <div class="age-bar"></div>
    <div class="age-labels"><span>ancient</span><span>mid</span><span>new</span></div>
  </div>
  <div id="stats">⏳ seeding neural grove…</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    const CFG = { user:'aaroncwacker', repo:'AI-UI-UX-JS', root:'https://aaroncwacker.github.io/AI-UI-UX-JS/' };
    const FILE_TYPES = [ /* unchanged from your original */ 
      {id:'all',keys:['all'],label:'All',emoji:'💠'},
      {id:'ai',keys:['ai','bot','gpt','gemini','claude','llm','agent','speech','voice'],label:'AI',emoji:'🧠'},
      {id:'sim',keys:['sim','city','traffic','evolution','network','population'],label:'Sim',emoji:'🌍'},
      {id:'tool',keys:['builder','editor','visualizer','dashboard','teleprompter','graph','art','creator'],label:'Tools',emoji:'🛠️'},
      {id:'audio',keys:['mp3','audio','jam','looper','chord','music','sound'],label:'Audio',emoji:'🎵'},
      {id:'video',keys:['video','cam','cinema','timeline','sequencer','mp4'],label:'Video',emoji:'📹'},
      {id:'game',keys:['game','arcade','quest','brawl','combat','retro','memory','play','versus'],label:'Arcade',emoji:'🕹️'},
      {id:'drive',keys:['drive','racer','rally','racing','car'],label:'Racing',emoji:'🏎️'},
      {id:'cards',keys:['tarot','oracle','deck','spirit','card'],label:'Tarot',emoji:'🔮'},
      {id:'3d',keys:['3d','webgl','three','canvas','skyforge'],label:'3D',emoji:'🧊'},
      {id:'gps',keys:['gps','map','zipcode','location'],label:'Maps',emoji:'📍'},
      {id:'space',keys:['alien','ufo','space','starship','thor'],label:'Sci-Fi',emoji:'🚀'},
    ];

    // === NEW: SEMANTIC KEYWORDS (procedural clustering) ===
    const STOP_WORDS = new Set(['the','and','for','with','from','this','that','app','demo','ui','ux','js','ai','web','simple','basic','test','example','v2','v1']);
    function getKeywords(name) {
      const clean = cleanName(name).toLowerCase().replace(/[^a-z0-9\s]/g, ' ');
      const words = clean.split(/\s+/).filter(w => w.length > 2 && !STOP_WORDS.has(w));
      return [...new Set(words)]; // unique
    }
    function cleanName(f) {
      return f.replace(/\.html$|\.py$/, '').replace(/[-_]/g, ' ');
    }
    function detectLang(name) { /* unchanged from your original */ 
      if (name.endsWith('.py')) return 'Python';
      const n = name.toLowerCase();
      if (n.includes('three') || n.includes('3d') || n.includes('webgl') || n.includes('skyforge')) return 'Three.js';
      if (n.includes('phaser')) return 'Phaser';
      if (n.includes('pixi')) return 'PixiJS';
      if (n.includes('babylon')) return 'Babylon';
      if (n.includes('aframe') || n.includes('a-frame')) return 'A-Frame';
      if (n.includes('matter')) return 'Matter.js';
      if (n.includes('tone') || n.includes('audio') || n.includes('synth') || n.includes('music')) return 'WebAudio';
      if (n.includes('canvas') || n.includes('draw') || n.includes('paint')) return 'Canvas2D';
      if (n.includes('map') || n.includes('gps') || n.includes('leaflet')) return 'Maps/Geo';
      if (n.includes('chart') || n.includes('graph') || n.includes('viz') || n.includes('plot')) return 'DataViz';
      return 'HTML/JS';
    }
    const LANG_COLORS = { /* unchanged */ 
      'Python':0x3572A5, 'Three.js':0x049EF4, 'Phaser':0xF1007E,
      'PixiJS':0xE72264, 'Babylon':0xBB464B, 'A-Frame':0xEF2D5E,
      'Matter.js':0x4B5563, 'WebAudio':0x7C3AED, 'Canvas2D':0xF59E0B,
      'Maps/Geo':0x10B981, 'DataViz':0x06B6D4, 'HTML/JS':0xF0DB4F,
      'Other':0x9CA3AF,
    };

    let apps = [], treeNodes = [], branchMeshes = [], edgeLines = [];
    let generation = 0, activeFilter = 'all', activeLang = 'all', searchTerm = '';
    let selectedNode = null, currentMode = 'grove'; // 'grove' or 'neural'
    let oldestDate = Date.now(), newestDate = Date.now();

    // === THREE.JS SETUP (unchanged except minor tweaks) ===
    const canvas = document.getElementById('c');
    const R = new THREE.WebGLRenderer({canvas, antialias:true});
    R.setSize(innerWidth, innerHeight);
    R.setPixelRatio(Math.min(devicePixelRatio,2));
    R.setClearColor(0x060A12);
    R.shadowMap.enabled = true;
    R.shadowMap.type = THREE.PCFSoftShadowMap;
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x060A12, 0.008);
    const cam = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 600);
    cam.position.set(0,18,45);
    scene.add(new THREE.AmbientLight(0x151525, 0.5));
    const sun = new THREE.DirectionalLight(0xC9A84C, 0.35); sun.position.set(25,50,15); sun.castShadow=true; scene.add(sun);
    const gnd = new THREE.Mesh(new THREE.CircleGeometry(80,64), new THREE.MeshStandardMaterial({color:0x080C16, roughness:0.95}));
    gnd.rotation.x = -Math.PI/2; gnd.receiveShadow = true; scene.add(gnd);
    // particles unchanged...
    const pCount=800; const pGeo=new THREE.BufferGeometry(); const pPos=new Float32Array(pCount*3); const pCol=new Float32Array(pCount*3);
    for(let i=0;i<pCount;i++){ pPos[i*3]=(Math.random()-0.5)*120; pPos[i*3+1]=Math.random()*60; pPos[i*3+2]=(Math.random()-0.5)*120;
      const c=new THREE.Color().setHSL(0.12+Math.random()*0.05,0.5,0.4+Math.random()*0.2); pCol[i*3]=c.r; pCol[i*3+1]=c.g; pCol[i*3+2]=c.b; }
    pGeo.setAttribute('position',new THREE.BufferAttribute(pPos,3)); pGeo.setAttribute('color',new THREE.BufferAttribute(pCol,3));
    const particles = new THREE.Points(pGeo, new THREE.PointsMaterial({size:0.15,transparent:true,opacity:0.25,vertexColors:true}));
    scene.add(particles);

    // === AGE & RECENCY (enhanced) ===
    function getAge01(d){ if(!d||oldestDate===newestDate) return 0.5; return Math.max(0,Math.min(1,(d-oldestDate)/(newestDate-oldestDate))); }
    function ageColor(a){ if(a>0.7) return new THREE.Color(0x7FFF7F); if(a>0.4) return new THREE.Color(0xF0A830); if(a>0.15) return new THREE.Color(0xFF6B3D); return new THREE.Color(0xC8A0FF); }
    function ageDays(d){ /* unchanged */ 
      if(!d) return '?'; const days=Math.floor((Date.now()-d)/86400000); if(days===0) return 'today'; if(days<30) return days+'d'; if(days<365) return Math.floor(days/30)+'mo'; return Math.floor(days/365)+'yr '+Math.floor((days%365)/30)+'mo';
    }

    // === SPRITE LABELS (card titles) ===
    function makeTextSprite(text) {
      const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 64;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = 'rgba(6,10,18,0.85)'; ctx.fillRect(0,0,256,64);
      ctx.strokeStyle = '#C9A84C'; ctx.lineWidth = 4; ctx.strokeRect(8,8,240,48);
      ctx.font = 'bold 28px Cinzel'; ctx.fillStyle = '#E8D5A3'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(text.substring(0,18) + (text.length>18?'…':''), 128, 32);
      const texture = new THREE.CanvasTexture(canvas);
      const spriteMat = new THREE.SpriteMaterial({map:texture, transparent:true, depthTest:false});
      const sprite = new THREE.Sprite(spriteMat);
      sprite.scale.set(8,2,1);
      return sprite;
    }

    // === CLEAR SCENE ===
    function clearTree(){
      treeNodes.forEach(n=>{ if(n.mesh) scene.remove(n.mesh); if(n.glow) scene.remove(n.glow); if(n.label) scene.remove(n.label); });
      branchMeshes.forEach(m=>scene.remove(m)); edgeLines.forEach(l=>scene.remove(l));
      treeNodes=[]; branchMeshes=[]; edgeLines=[];
    }

    // === NEW: FORCE-DIRECTED SIM (procedural clustering by title words) ===
    function computePositions(filteredApps, mode = 'grove', iterations = 140) {
      const nodes = filteredApps.map(app => ({
        app,
        keywords: app.keywords || getKeywords(app.name),
        pos: new THREE.Vector3(),
        vel: new THREE.Vector3(),
        age01: getAge01(app.date)
      }));

      // 1. Compute top thematic clusters (for grove feel)
      const wordFreq = {};
      nodes.forEach(n => n.keywords.forEach(kw => wordFreq[kw] = (wordFreq[kw]||0)+1));
      const topClusters = Object.keys(wordFreq).sort((a,b)=>wordFreq[b]-wordFreq[a]).slice(0,9);

      // 2. Assign primary cluster & initial positions
      const clusterCenters = {};
      topClusters.forEach((cl,i) => {
        const angle = (i / Math.max(topClusters.length,1)) * Math.PI * 2;
        clusterCenters[cl] = new THREE.Vector3(Math.cos(angle)*35, 2, Math.sin(angle)*35);
      });
      nodes.forEach((n,i) => {
        let primary = topClusters[0] || 'other';
        let bestScore = 0;
        n.keywords.forEach(kw => {
          if(topClusters.includes(kw) && wordFreq[kw] > bestScore){ bestScore = wordFreq[kw]; primary = kw; }
        });
        n.cluster = primary;
        const center = clusterCenters[primary] || new THREE.Vector3((Math.random()-0.5)*20, 4, (Math.random()-0.5)*20);
        n.pos.copy(center).add(new THREE.Vector3((Math.random()-0.5)*12, n.age01*12 + 4, (Math.random()-0.5)*12)); // newer float higher
      });

      // 3. Build similarity edges (word overlap = connection strength)
      const edges = [];
      for(let i=0; i<nodes.length; i++){
        for(let j=i+1; j<nodes.length; j++){
          const shared = nodes[i].keywords.filter(k => nodes[j].keywords.includes(k)).length;
          if(shared >= 1){
            edges.push({a:i, b:j, weight: shared + (nodes[i].cluster === nodes[j].cluster ? 2 : 0)});
          }
        }
      }

      // 4. Run force simulation (neural + grove hybrid)
      for(let it=0; it<iterations; it++){
        // Repulsion (all nodes push apart)
        for(let i=0; i<nodes.length; i++){
          for(let j=i+1; j<nodes.length; j++){
            const dx = nodes[i].pos.x - nodes[j].pos.x;
            const dy = nodes[i].pos.y - nodes[j].pos.y;
            const dz = nodes[i].pos.z - nodes[j].pos.z;
            const distSq = dx*dx + dy*dy + dz*dz + 1;
            const force = 1200 / distSq;
            const fx = dx * force, fy = dy * force * 0.4, fz = dz * force;
            nodes[i].vel.add(new THREE.Vector3(fx, fy, fz));
            nodes[j].vel.add(new THREE.Vector3(-fx, -fy, -fz));
          }
        }
        // Attraction along edges
        edges.forEach(e => {
          const a = nodes[e.a], b = nodes[e.b];
          const dx = b.pos.x - a.pos.x, dy = b.pos.y - a.pos.y, dz = b.pos.z - a.pos.z;
          const dist = Math.hypot(dx,dy,dz) + 0.01;
          const targetDist = mode === 'grove' ? 18 : 9;
          const force = (dist - targetDist) * 0.12 * e.weight;
          const fx = (dx/dist) * force, fy = (dy/dist) * force * 0.6, fz = (dz/dist) * force;
          a.vel.add(new THREE.Vector3(fx,fy,fz));
          b.vel.add(new THREE.Vector3(-fx,-fy,-fz));
        });
        // Grove-mode extra pull toward cluster centers
        if(mode === 'grove'){
          nodes.forEach(n => {
            const center = clusterCenters[n.cluster];
            if(center){
              const dx = center.x - n.pos.x, dy = center.y - n.pos.y, dz = center.z - n.pos.z;
              const dist = Math.hypot(dx,dy,dz) + 1;
              n.vel.add(new THREE.Vector3(dx/dist*4, dy/dist*2, dz/dist*4));
            }
          });
        }
        // Update + damping
        nodes.forEach(n => {
          n.pos.add(n.vel);
          n.vel.multiplyScalar(0.78);
          n.pos.y = Math.max(3, n.pos.y); // stay above ground
        });
      }
      return {nodes, edges, clusterCenters};
    }

    // === NEW: BUILD PROCEDURAL GROVE / NEURAL NETWORK ===
    function buildNetwork(appList, gen){
      clearTree();
      if(!appList.length) return;

      const {nodes: simNodes, edges} = computePositions(appList, currentMode, 160);

      // Create card-like nodes + labels
      simNodes.forEach((sn, i) => {
        const app = sn.app;
        const age01 = sn.age01;
        const lc = new THREE.Color(LANG_COLORS[app.lang||'HTML/JS'] || 0x9CA3AF);
        const ac = ageColor(age01);
        const size = 0.55 + age01 * 0.45; // newer = bigger

        // Card geometry (flat box for "card" look)
        const mesh = new THREE.Mesh(
          new THREE.BoxGeometry(size*2.8, size*1.6, size*0.4),
          new THREE.MeshStandardMaterial({
            color: lc.clone().lerp(ac, 0.45),
            emissive: 0xE0A0FF,
            emissiveIntensity: 0.25 + age01*0.55,
            roughness: 0.35,
            metalness: 0.2,
            transparent: true,
            opacity: 0.95
          })
        );
        mesh.position.copy(sn.pos);
        mesh.castShadow = true;
        scene.add(mesh);

        // Glow sphere
        const glow = new THREE.Mesh(
          new THREE.SphereGeometry(size*1.9, 12, 12),
          new THREE.MeshBasicMaterial({color:0xE0A0FF, transparent:true, opacity:0.08 + age01*0.18})
        );
        glow.position.copy(sn.pos);
        scene.add(glow);

        // Billboard title label
        const label = makeTextSprite(cleanName(app.name));
        label.position.copy(sn.pos).add(new THREE.Vector3(0, size*1.8 + 1.5, 0));
        scene.add(label);

        mesh.userData = {nodeIndex: treeNodes.length};
        treeNodes.push({
          mesh, glow, label, app, age01,
          fileType: getFileType(app.name),
          lang: app.lang || 'HTML/JS',
          originalScale: mesh.scale.clone()
        });
      });

      // Add word-overlap branches (the "neural connections")
      const edgeMat = new THREE.LineBasicMaterial({color:0xE0A0FF, transparent:true, opacity:0.22});
      edges.forEach(e => {
        if(e.weight < 1.5) return; // only stronger connections
        const aPos = simNodes[e.a].pos;
        const bPos = simNodes[e.b].pos;
        const lineGeo = new THREE.BufferGeometry().setFromPoints([aPos, bPos]);
        const line = new THREE.Line(lineGeo, edgeMat);
        scene.add(line);
        edgeLines.push(line);
      });

      document.getElementById('stats').textContent = `🌳 ${appList.length} apps • ${topClusters.length||0} clusters • ${edgeLines.length} word-links • Gen ${gen}`;
    }

    function getFileType(name){ /* unchanged */ 
      const l=name.toLowerCase();
      return FILE_TYPES.slice(1).find(t=>t.keys.some(k=>l.includes(k)))||{id:'other',label:'App',emoji:'⚡'};
    }

    // === CAMERA, RAYCAST, SELECT (unchanged except minor) ===
    /* ... your original camera, raycast, selectNode, deselectNode code remains identical ... */
    // (I kept it exactly the same for brevity – just copy from your original script)

    // === FILTERS & REBUILD (updated to call new builder) ===
    function buildFilters(){ /* unchanged */ }
    function buildLangFilters(){ /* unchanged */ }
    function getFiltered(){
      return apps.filter(a=>{
        const n=cleanName(a.name).toLowerCase();
        const l=a.lang||'HTML/JS';
        return n.includes(searchTerm) &&
          (activeFilter==='all'||FILE_TYPES.find(f=>f.id===activeFilter)?.keys.some(k=>n.includes(k))) &&
          (activeLang==='all'||l===activeLang);
      });
    }
    function rebuild(){
      const f = getFiltered();
      buildNetwork(f, generation);
    }

    // === FETCH (now adds keywords automatically) ===
    async function fetchApps(){
      try{
        const res=await fetch(`https://api.github.com/repos/${CFG.user}/${CFG.repo}/contents/`);
        const data=await res.json();
        apps=data
          .filter(f=>f.type==='file'&&(f.name.endsWith('.html')||f.name.endsWith('.py'))&&f.name!=='index.html'&&f.name!=='python-runner.html')
          .map(f=>({name:f.name, date:0, lang:detectLang(f.name), keywords: getKeywords(f.name)}));
        buildFilters();
        buildLangFilters();
        rebuild();
        fetchDates();
        setTimeout(()=>{ document.getElementById('loader').classList.add('gone'); setTimeout(()=>document.getElementById('loader').style.display='none',800); },400);
      }catch(e){ document.getElementById('stats').textContent='💥 fetch failed'; }
    }
    async function fetchDates(){ /* unchanged */ }

    // === MODE TOGGLE ===
    document.getElementById('btn-grove').onclick = () => { currentMode='grove'; document.querySelectorAll('.hud-btn').forEach(b=>b.classList.remove('active')); document.getElementById('btn-grove').classList.add('active'); rebuild(); };
    document.getElementById('btn-neural').onclick = () => { currentMode='neural'; document.querySelectorAll('.hud-btn').forEach(b=>b.classList.remove('active')); document.getElementById('btn-neural').classList.add('active'); rebuild(); };

    // === CONTROLS (unchanged) ===
    document.getElementById('btn-grow').onclick=()=>{ generation++; document.getElementById('gen-num').textContent=generation; rebuild(); };
    document.getElementById('btn-reset').onclick=()=>{ /* unchanged */ };
    document.getElementById('search-box').addEventListener('input',e=>{searchTerm=e.target.value.toLowerCase();rebuild();});

    // === RENDER LOOP (minor updates for labels) ===
    const clock=new THREE.Clock();
    function animate(){
      requestAnimationFrame(animate);
      const dt=clock.getDelta(), t=clock.getElapsedTime();
      // auto rotate etc. unchanged...
      treeNodes.forEach((n,i)=>{
        if(!n.mesh) return;
        n.mesh.rotation.y = Math.sin(t*1.2 + i)*0.08; // gentle card sway
        if(n.label) n.label.lookAt(cam.position); // billboard
        // recency pulse for new nodes
        if(n.age01 > 0.7) n.glow.scale.setScalar(1 + Math.sin(t*8)*0.15);
      });
      // particles unchanged...
      R.render(scene,cam);
    }
    window.addEventListener('resize',()=>{ cam.aspect=innerWidth/innerHeight; cam.updateProjectionMatrix(); R.setSize(innerWidth,innerHeight); });

    // START
    animate();
    fetchApps();
    setInterval(()=>fetchApps(), 120000);
  </script>
</body>
