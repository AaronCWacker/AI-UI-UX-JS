<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>🧩 AI-UI-UX-JS — AllAIInc.Org</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:opsz,wght@9..144,700;9..144,800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #FAFAF8;
      --bg2: #FFFFFF;
      --ink: #1A1A1A;
      --ink2: #444;
      --muted: #888;
      --faint: #C8C8C0;
      --line: #E8E8E2;
      --line2: #F0F0EA;
      --accent: #2563EB;
      --accent-bg: #EFF6FF;
      --green: #16A34A;
      --green-bg: #F0FDF4;
      --violet: #7C3AED;
      --violet-bg: #F5F3FF;
      --amber: #D97706;
      --amber-bg: #FFFBEB;
      --rose: #E11D48;
      --rose-bg: #FFF1F2;
      --cyan: #0891B2;
      --cyan-bg: #ECFEFF;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
      --shadow-lg: 0 4px 16px rgba(0,0,0,0.10);
      --r: 10px;
      --r-sm: 7px;
      --max: 1400px;
      --font: 'DM Sans', system-ui, sans-serif;
      --display: 'Fraunces', Georgia, serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; }
    html { height: 100%; }
    body {
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
      font: 13px/1.5 var(--font);
      -webkit-font-smoothing: antialiased;
    }

    /* ── SHELL ── */
    .shell { display: flex; flex-direction: column; min-height: 100vh; }

    /* ── TOP BAR (bookmark-bar dense) ── */
    .topbar {
      position: sticky; top: 0; z-index: 50;
      background: var(--bg2);
      border-bottom: 1px solid var(--line);
      box-shadow: var(--shadow-sm);
    }
    .topbar-row {
      max-width: var(--max); margin: 0 auto;
      display: flex; align-items: center; gap: 6px;
      padding: 6px 12px;
      flex-wrap: wrap;
      min-height: 40px;
    }
    .logo {
      font: 700 15px/1 var(--display);
      color: var(--ink);
      white-space: nowrap;
      letter-spacing: -0.02em;
      display: flex; align-items: center; gap: 4px;
    }
    .logo-emoji { font-size: 18px; }
    .sep { color: var(--faint); font-weight: 300; margin: 0 2px; }
    .domain-link {
      font: 600 12px/1 var(--font);
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
      padding: 3px 6px;
      border-radius: 4px;
      transition: background 0.15s;
    }
    .domain-link:hover { background: var(--accent-bg); }

    .top-actions {
      display: flex; gap: 4px; margin-left: auto;
    }
    .top-btn {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 4px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--bg2);
      color: var(--ink2);
      font: 600 12px/1.2 var(--font);
      cursor: pointer;
      text-decoration: none;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .top-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
    .top-btn.new-btn { border-color: #BBF7D0; background: var(--green-bg); color: var(--green); }
    .top-btn.new-btn:hover { background: #DCFCE7; }
    .app-count {
      display: inline-flex; align-items: center; gap: 3px;
      font: 600 12px/1 var(--font);
      color: var(--muted);
      padding: 4px 8px;
      background: var(--line2);
      border-radius: 6px;
      white-space: nowrap;
    }

    /* ── RECENTS BAR ── */
    .recents-bar {
      max-width: var(--max); margin: 0 auto;
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px;
      overflow-x: auto;
      border-bottom: 1px solid var(--line2);
      background: var(--bg);
    }
    .recents-label {
      font: 600 10px/1 var(--font);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .recent-chip {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 3px 8px;
      border-radius: 5px;
      background: var(--bg2);
      border: 1px solid var(--line);
      font: 400 11px/1.2 var(--font);
      color: var(--ink2);
      cursor: pointer;
      white-space: nowrap;
      text-decoration: none;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .recent-chip:hover { border-color: var(--accent); color: var(--accent); }

    /* ── SEARCH ROW ── */
    .search-row {
      max-width: var(--max); margin: 0 auto;
      padding: 8px 12px;
      display: flex; gap: 8px; align-items: center;
    }
    .search-input {
      flex: 1; min-width: 0;
      padding: 7px 12px;
      border: 1px solid var(--line);
      border-radius: var(--r-sm);
      background: var(--bg2);
      font: 400 13px/1.4 var(--font);
      color: var(--ink);
      outline: none;
      transition: border 0.15s, box-shadow 0.15s;
    }
    .search-input::placeholder { color: var(--faint); }
    .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.10); }
    .sort-select {
      padding: 7px 8px;
      border: 1px solid var(--line);
      border-radius: var(--r-sm);
      background: var(--bg2);
      font: 400 12px/1.4 var(--font);
      color: var(--ink2);
      cursor: pointer;
      outline: none;
    }

    /* ── CLUSTER BAR ── */
    .cluster-bar {
      max-width: var(--max); margin: 0 auto;
      display: flex; gap: 4px; flex-wrap: wrap;
      padding: 6px 12px 8px;
    }
    .cluster-btn {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 4px 9px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--bg2);
      font: 500 11px/1.2 var(--font);
      color: var(--ink2);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .cluster-btn:hover { border-color: var(--accent); color: var(--accent); }
    .cluster-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .cluster-btn .cnt {
      font-size: 10px;
      color: inherit;
      opacity: 0.65;
    }

    /* ── WORD CLOUD ── */
    .wordcloud-wrap {
      max-width: var(--max); margin: 0 auto;
      padding: 4px 12px 6px;
    }
    .wordcloud {
      display: flex; flex-wrap: wrap; gap: 3px 6px;
      align-items: baseline;
    }
    .wc-word {
      cursor: pointer;
      font-family: var(--font);
      font-weight: 600;
      transition: color 0.15s, transform 0.1s;
      line-height: 1.2;
    }
    .wc-word:hover { transform: scale(1.12); }

    /* ── MAIN CONTENT ── */
    .main {
      flex: 1;
      max-width: var(--max); margin: 0 auto; width: 100%;
      padding: 4px 12px 32px;
    }
    .result-info {
      font: 400 12px/1.4 var(--font);
      color: var(--muted);
      padding: 4px 0 8px;
    }
    .result-info strong { color: var(--ink); }

    /* ── CLUSTER GROUP ── */
    .group {
      margin-bottom: 12px;
    }
    .group-head {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 0 4px;
      font: 700 13px/1.3 var(--font);
      color: var(--ink);
      border-bottom: 1px solid var(--line2);
      margin-bottom: 6px;
    }
    .group-head .gcnt {
      font: 400 11px/1 var(--font);
      color: var(--muted);
      background: var(--line2);
      padding: 2px 7px;
      border-radius: 99px;
    }

    /* ── TILE GRID ── */
    .tiles {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 8px;
    }
    .tile {
      display: flex; flex-direction: column;
      padding: 10px 11px 8px;
      border: 1px solid var(--line);
      border-radius: var(--r);
      background: var(--bg2);
      transition: border-color 0.15s, box-shadow 0.15s;
      min-width: 0;
      position: relative;
    }
    .tile:hover { border-color: #CCC; box-shadow: var(--shadow); }
    .tile-header {
      display: flex; align-items: flex-start; gap: 6px; min-width: 0;
    }
    .tile-emoji { font-size: 22px; line-height: 1; flex-shrink: 0; }
    .tile-info { min-width: 0; flex: 1; }
    .tile-name {
      font: 700 13px/1.25 var(--font);
      color: var(--ink);
      word-break: break-word;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .tile-meta {
      font: 400 10px/1.3 var(--font);
      color: var(--muted);
      margin-top: 2px;
    }
    .tile-modalities {
      display: flex; gap: 2px; flex-wrap: wrap;
      margin-top: 5px;
    }
    .mod-emoji {
      font-size: 16px;
      line-height: 1;
      cursor: default;
      title: attr(data-label);
    }
    .tile-actions {
      display: flex; gap: 4px; margin-top: 6px;
    }
    .tile-btn {
      flex: 1;
      display: inline-flex; align-items: center; justify-content: center; gap: 3px;
      padding: 4px 0;
      border: 1px solid var(--line);
      border-radius: 5px;
      background: var(--bg);
      font: 600 10px/1 var(--font);
      color: var(--ink2);
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
      white-space: nowrap;
    }
    .tile-btn:hover { border-color: var(--accent); color: var(--accent); }
    .tile-btn.play-btn { border-color: #BBF7D0; color: var(--green); background: var(--green-bg); }
    .tile-btn.play-btn:hover { background: #DCFCE7; }

    .color-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
      margin-top: 4px;
    }

    .empty-state {
      padding: 40px 16px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      border: 1px dashed var(--line);
      border-radius: var(--r);
    }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: var(--ink); color: #fff;
      padding: 8px 18px; border-radius: 8px;
      font: 600 12px/1.4 var(--font);
      box-shadow: var(--shadow-lg);
      z-index: 999;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .toast.show { opacity: 1; }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      .topbar-row { padding: 5px 8px; }
      .search-row, .cluster-bar, .recents-bar, .wordcloud-wrap, .main { padding-left: 8px; padding-right: 8px; }
      .tiles { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 6px; }
      .tile { padding: 8px 8px 6px; }
      .tile-emoji { font-size: 18px; }
      .tile-name { font-size: 12px; }
      .top-btn span.label-text { display: none; }
    }
  </style>
</head>
<body>
<div class="shell">

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="topbar-row">
      <div class="logo">
        <span class="logo-emoji">🧩</span>
        <span>AI-UI-UX-JS</span>
      </div>
      <span class="sep">—</span>
      <a class="domain-link" id="domainBtn" title="Copy AllAIInc.Org to clipboard">AllAIInc.Org</a>
      <span class="app-count" id="appCount">📦 …</span>
      <div class="top-actions">
        <a class="top-btn new-btn" href="https://github.com/AaronCWacker/AI-UI-UX-JS/new/main" target="_blank" rel="noopener">➕ <span class="label-text">New</span></a>
        <a class="top-btn" href="https://github.com/AaronCWacker/AI-UI-UX-JS/" target="_blank" rel="noopener">💻 <span class="label-text">Code</span></a>
        <a class="top-btn" href="https://allaiinc.org/" target="_blank" rel="noopener">▶️ <span class="label-text">Play</span></a>
      </div>
    </div>
  </header>

  <!-- RECENTS -->
  <div class="recents-bar" id="recentsBar">
    <span class="recents-label">Recent</span>
  </div>

  <!-- SEARCH -->
  <div class="search-row">
    <input class="search-input" id="searchBox" type="text" placeholder="🔍 Filter apps by name…" />
    <select class="sort-select" id="sortSelect">
      <option value="cluster">Clustered</option>
      <option value="newest">Newest</option>
      <option value="az">A → Z</option>
      <option value="za">Z → A</option>
    </select>
  </div>

  <!-- CLUSTER BUTTONS -->
  <div class="cluster-bar" id="clusterBar"></div>

  <!-- WORD CLOUD -->
  <div class="wordcloud-wrap">
    <div class="wordcloud" id="wordCloud"></div>
  </div>

  <!-- MAIN -->
  <main class="main">
    <div class="result-info" id="resultInfo"></div>
    <div id="deck"></div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
const CFG = {
  user: 'aaroncwacker',
  repo: 'AI-UI-UX-JS',
  root: 'https://aaroncwacker.github.io/AI-UI-UX-JS/',
  api: 'https://api.github.com/repos/aaroncwacker/AI-UI-UX-JS/contents/',
  exclude: new Set(['index.html', 'python-runner.html'])
};

/* ── CLUSTER DEFINITIONS ── */
const CLUSTERS = [
  { id: 'all',        label: 'All',        emoji: '📦', words: [] },
  { id: '3d',         label: '3D',         emoji: '🧊', words: ['3d','three','threejs','webgl','webgpu','tsl','skyforge'] },
  { id: 'ai',         label: 'AI',         emoji: '🧠', words: ['ai','smart','gpt','grok','claude','gemini','llm','copilot'] },
  { id: 'multiplayer',label: 'Multi',      emoji: '👥', words: ['multiplayer','two','versus','pvp','coop'] },
  { id: 'scifi',      label: 'SciFi',      emoji: '🚀', words: ['scifi','sci','space','starship','alien','void','nebula','galaxy','cosmic','warp'] },
  { id: 'sim',        label: 'Sim',        emoji: '🌍', words: ['sim','simulation','simulator','traffic','population','city','maritime','world'] },
  { id: 'arxiv',      label: 'arXiv',      emoji: '📄', words: ['arxiv','paper','research'] },
  { id: 'aaron',      label: 'Aaron',      emoji: '👤', words: ['aaron','wacker'] },
  { id: 'agentic',    label: 'Agentic',    emoji: '🤖', words: ['agentic','agent','factory','pipeline','nanobot'] },
  { id: 'alien',      label: 'Alien',      emoji: '👽', words: ['alien','aliens','xenomorph'] },
  { id: 'card',       label: 'Card',       emoji: '🃏', words: ['card','cards','tarot','oracle','deck'] },
  { id: 'slots',      label: 'Slots',      emoji: '🎰', words: ['slot','slots','casino','jackpot'] },
  { id: 'audio',      label: 'Audio',      emoji: '🔊', words: ['audio','sound','synth','tone'] },
  { id: 'video',      label: 'Video',      emoji: '📹', words: ['video','capture','camera','record','screen'] },
  { id: 'art',        label: 'Art',        emoji: '🎨', words: ['art','image','paint','draw','canvas','pixel'] },
  { id: 'music',      label: 'Music',      emoji: '🎵', words: ['music','song','chord','jam','looper','suno','melody'] },
  { id: 'markdown',   label: 'Markdown',   emoji: '📝', words: ['markdown','md','note','notes','editor'] },
  { id: 'evolution',  label: 'Evolve',     emoji: '🧬', words: ['evolution','evolve','genetic','dna','life','neural'] },
  { id: 'media',      label: 'Media',      emoji: '📺', words: ['media','stream','broadcast'] },
  { id: 'learn',      label: 'Learn',      emoji: '📚', words: ['learn','word','teleprompter','quiz','teach','study','flash'] },
];

/* ── COLOR PALETTE for word hashing ── */
const PALETTE = [
  '#2563EB','#7C3AED','#D97706','#0891B2','#16A34A','#E11D48',
  '#4F46E5','#0D9488','#CA8A04','#9333EA','#0284C7','#DC2626',
  '#059669','#6D28D9','#EA580C','#DB2777','#1D4ED8','#15803D',
];

function hashColor(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) h = ((h << 5) - h + str.charCodeAt(i)) | 0;
  return PALETTE[Math.abs(h) % PALETTE.length];
}

/* ── MODALITY EMOJIS based on filename words ── */
const MODALITIES = [
  { emoji: '🧊', words: ['3d','three','threejs','webgl','webgpu'] },
  { emoji: '🧠', words: ['ai','gpt','claude','gemini','grok','llm','smart'] },
  { emoji: '🎮', words: ['game','arcade','retro','combat','battle','arena','quest','rpg'] },
  { emoji: '🎵', words: ['music','song','chord','jam','looper','synth','audio','sound','melody','suno'] },
  { emoji: '📹', words: ['video','camera','capture','record','screen'] },
  { emoji: '🗺️', words: ['map','maps','geo','gps','zipcode'] },
  { emoji: '🫳', words: ['gesture','hand','mediapipe','pose'] },
  { emoji: '🚀', words: ['space','starship','rocket','warp','cosmic','void'] },
  { emoji: '🎨', words: ['art','paint','draw','canvas','pixel','image'] },
  { emoji: '🃏', words: ['card','cards','tarot','deck','oracle'] },
  { emoji: '🎰', words: ['slot','slots','casino'] },
  { emoji: '🤖', words: ['agent','agentic','robot','bot'] },
  { emoji: '📊', words: ['chart','graph','plot','dashboard','data','viz'] },
  { emoji: '🏙️', words: ['city','town','traffic','maritime','sim'] },
  { emoji: '📝', words: ['markdown','editor','note','notes'] },
  { emoji: '🧬', words: ['evolution','genetic','dna','neural','life'] },
  { emoji: '🐉', words: ['dragon','dragons'] },
  { emoji: '🎢', words: ['coaster','roller','ride'] },
];

const STOPWORDS = new Set([
  'the','and','for','with','from','your','app','apps','new','old','best','top','main',
  'html','python','js','py','v','ver','version','copy','final','draft','demo','test',
  'pro','plus','mini','ultra','super','edition','series','part','mode','view','page',
  'file','files','index','of','a','an','in','on','to','by','at','or','is','it','be',
]);

/* ── STATE ── */
const state = {
  apps: [],
  filtered: [],
  search: '',
  cluster: 'all',
  sort: 'cluster',
  recents: [],
};

/* ── HELPERS ── */
function cleanName(name) {
  return name.replace(/\.(html|py)$/i, '').replace(/[_-]+/g, ' ').replace(/\s+/g, ' ').trim();
}

function tokenize(name) {
  return cleanName(name).toLowerCase().replace(/[^a-z0-9]+/g, ' ').split(/\s+/).filter(t => t.length > 1 && !STOPWORDS.has(t));
}

function getPlayUrl(app) {
  return app.ext === 'py'
    ? `python-runner.html?file=${encodeURIComponent(app.name)}`
    : `${CFG.root}${app.name}`;
}

function getModalities(tokens) {
  const seen = new Set();
  const result = [];
  for (const mod of MODALITIES) {
    if (mod.words.some(w => tokens.includes(w)) && !seen.has(mod.emoji)) {
      seen.add(mod.emoji);
      result.push(mod.emoji);
    }
  }
  return result;
}

function matchesCluster(app, clusterId) {
  if (clusterId === 'all') return true;
  const cluster = CLUSTERS.find(c => c.id === clusterId);
  if (!cluster) return true;
  const lower = app.name.toLowerCase();
  return cluster.words.some(w => lower.includes(w));
}

function escHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1400);
}

function saveRecent(name) {
  let r = JSON.parse(localStorage.getItem('ygg-recents') || '[]');
  r = r.filter(n => n !== name);
  r.unshift(name);
  r = r.slice(0, 5);
  localStorage.setItem('ygg-recents', JSON.stringify(r));
  state.recents = r;
}

function loadRecents() {
  try { state.recents = JSON.parse(localStorage.getItem('ygg-recents') || '[]'); } catch { state.recents = []; }
}

/* ── DATA FETCH ── */
async function fetchApps() {
  const res = await fetch(CFG.api, { headers: { Accept: 'application/vnd.github+json' } });
  if (!res.ok) throw new Error(`GitHub API ${res.status}`);
  const files = await res.json();
  state.apps = files
    .filter(f => f.type === 'file' && /\.(html|py)$/i.test(f.name) && !CFG.exclude.has(f.name))
    .map(f => {
      const ext = f.name.toLowerCase().endsWith('.py') ? 'py' : 'html';
      const display = cleanName(f.name);
      const tokens = tokenize(f.name);
      const mods = getModalities(tokens);
      const color = hashColor(display);
      // Find primary cluster
      let primaryCluster = 'all';
      for (const c of CLUSTERS) {
        if (c.id === 'all') continue;
        if (c.words.some(w => f.name.toLowerCase().includes(w))) { primaryCluster = c.id; break; }
      }
      return { name: f.name, ext, display, tokens, mods, color, primaryCluster, size: f.size || 0 };
    });
  render();
}

/* ── WORD CLOUD ── */
function buildWordCloud() {
  const counts = new Map();
  for (const app of state.apps) {
    for (const t of app.tokens) {
      counts.set(t, (counts.get(t) || 0) + 1);
    }
  }
  // Top 40 words shared across 2+ apps
  const words = [...counts.entries()]
    .filter(([, c]) => c >= 2)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 40);

  const maxC = words[0]?.[1] || 1;
  const el = document.getElementById('wordCloud');
  el.innerHTML = '';
  for (const [word, count] of words) {
    const size = Math.round(10 + (count / maxC) * 18);
    const span = document.createElement('span');
    span.className = 'wc-word';
    span.textContent = word;
    span.style.fontSize = size + 'px';
    span.style.color = hashColor(word);
    span.title = `${word}: ${count} apps`;
    span.onclick = () => {
      document.getElementById('searchBox').value = word;
      state.search = word;
      render();
    };
    el.appendChild(span);
  }
}

/* ── CLUSTER BAR ── */
function buildClusterBar() {
  const bar = document.getElementById('clusterBar');
  bar.innerHTML = '';
  for (const c of CLUSTERS) {
    const count = c.id === 'all'
      ? state.apps.length
      : state.apps.filter(a => matchesCluster(a, c.id)).length;
    if (c.id !== 'all' && count === 0) continue;
    const btn = document.createElement('button');
    btn.className = `cluster-btn${state.cluster === c.id ? ' active' : ''}`;
    btn.innerHTML = `${c.emoji} ${c.label} <span class="cnt">${count}</span>`;
    btn.onclick = () => { state.cluster = c.id; render(); };
    bar.appendChild(btn);
  }
}

/* ── RECENTS BAR ── */
function buildRecentsBar() {
  const bar = document.getElementById('recentsBar');
  bar.innerHTML = '<span class="recents-label">Recent</span>';
  const names = state.recents.filter(n => state.apps.some(a => a.name === n));
  if (!names.length) {
    // Show latest 5 by name alpha
    const latest = [...state.apps].slice(0, 5);
    for (const app of latest) {
      const a = document.createElement('a');
      a.className = 'recent-chip';
      a.textContent = app.display;
      a.href = getPlayUrl(app);
      a.target = '_blank';
      a.rel = 'noopener';
      a.onclick = () => saveRecent(app.name);
      bar.appendChild(a);
    }
    return;
  }
  for (const name of names.slice(0, 5)) {
    const app = state.apps.find(a => a.name === name);
    if (!app) continue;
    const a = document.createElement('a');
    a.className = 'recent-chip';
    a.textContent = app.display;
    a.href = getPlayUrl(app);
    a.target = '_blank';
    a.rel = 'noopener';
    a.onclick = () => saveRecent(app.name);
    bar.appendChild(a);
  }
}

/* ── FILTER + SORT ── */
function filterApps() {
  const q = state.search.trim().toLowerCase();
  return state.apps.filter(app => {
    if (!matchesCluster(app, state.cluster)) return false;
    if (q && !app.name.toLowerCase().includes(q) && !app.display.toLowerCase().includes(q)) return false;
    return true;
  });
}

function sortApps(apps) {
  const s = state.sort;
  return [...apps].sort((a, b) => {
    if (s === 'az') return a.display.localeCompare(b.display);
    if (s === 'za') return b.display.localeCompare(a.display);
    if (s === 'newest') return b.name.localeCompare(a.name); // proxy
    return a.display.localeCompare(b.display);
  });
}

/* ── GROUP BY FIRST WORD (for cluster view) ── */
function groupByFirstWord(apps) {
  const map = new Map();
  for (const app of apps) {
    const firstWord = app.tokens[0] || 'other';
    if (!map.has(firstWord)) map.set(firstWord, []);
    map.get(firstWord).push(app);
  }
  return [...map.entries()]
    .sort((a, b) => b[1].length - a[1].length || a[0].localeCompare(b[0]));
}

/* ── RENDER ── */
function render() {
  const filtered = filterApps();
  const sorted = sortApps(filtered);
  state.filtered = sorted;

  document.getElementById('appCount').innerHTML = `📦 ${state.apps.length}`;
  document.getElementById('resultInfo').innerHTML = `Showing <strong>${sorted.length}</strong> of <strong>${state.apps.length}</strong> apps`;

  buildClusterBar();
  buildRecentsBar();
  buildWordCloud();

  const deck = document.getElementById('deck');
  deck.innerHTML = '';

  if (!sorted.length) {
    deck.innerHTML = '<div class="empty-state">No apps match this filter.</div>';
    return;
  }

  if (state.sort === 'cluster' && state.cluster === 'all') {
    // Group by first word
    const groups = groupByFirstWord(sorted);
    for (const [word, apps] of groups) {
      const group = document.createElement('div');
      group.className = 'group';
      group.innerHTML = `<div class="group-head"><span>${escHtml(word.charAt(0).toUpperCase() + word.slice(1))}</span><span class="gcnt">${apps.length}</span></div>`;
      const grid = document.createElement('div');
      grid.className = 'tiles';
      for (const app of apps) grid.appendChild(makeTile(app));
      group.appendChild(grid);
      deck.appendChild(group);
    }
  } else {
    const grid = document.createElement('div');
    grid.className = 'tiles';
    for (const app of sorted) grid.appendChild(makeTile(app));
    deck.appendChild(grid);
  }
}

function makeTile(app) {
  const tile = document.createElement('article');
  tile.className = 'tile';

  // Modality emojis row
  const modsHtml = app.mods.length
    ? `<div class="tile-modalities">${app.mods.map(e => `<span class="mod-emoji">${e}</span>`).join('')}</div>`
    : '';

  tile.innerHTML = `
    <div class="tile-header">
      <div class="color-dot" style="background:${app.color}"></div>
      <div class="tile-info">
        <div class="tile-name">${escHtml(app.display)}</div>
        <div class="tile-meta">${app.ext === 'py' ? '🐍 Python' : '🌐 HTML'}</div>
      </div>
    </div>
    ${modsHtml}
    <div class="tile-actions">
      <button class="tile-btn play-btn" data-action="play">▶ Play</button>
      <button class="tile-btn" data-action="code">💻 Code</button>
      <button class="tile-btn" data-action="copy">📋 Copy</button>
    </div>
  `;

  tile.querySelector('[data-action="play"]').onclick = () => {
    saveRecent(app.name);
    window.open(getPlayUrl(app), '_blank', 'noopener');
  };
  tile.querySelector('[data-action="code"]').onclick = () => {
    window.open(`https://github.com/${CFG.user}/${CFG.repo}/blob/main/${app.name}`, '_blank', 'noopener');
  };
  tile.querySelector('[data-action="copy"]').onclick = async () => {
    const url = getPlayUrl(app);
    try { await navigator.clipboard.writeText(url); toast('✓ Copied link'); }
    catch { toast('✕ Copy failed'); }
  };

  return tile;
}

/* ── EVENTS ── */
document.getElementById('searchBox').addEventListener('input', e => {
  state.search = e.target.value;
  render();
});
document.getElementById('sortSelect').addEventListener('change', e => {
  state.sort = e.target.value;
  render();
});
document.getElementById('domainBtn').addEventListener('click', async e => {
  e.preventDefault();
  try { await navigator.clipboard.writeText('https://AllAIInc.Org'); toast('✓ Copied AllAIInc.Org'); }
  catch { window.open('https://allaiinc.org', '_blank'); }
});
window.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('searchBox').focus();
    document.getElementById('searchBox').select();
  }
});

/* ── INIT ── */
loadRecents();
fetchApps().catch(err => {
  console.error(err);
  document.getElementById('deck').innerHTML = `<div class="empty-state">💥 ${escHtml(err.message)}</div>`;
});
</script>
</body>
</html>
