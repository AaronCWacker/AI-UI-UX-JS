<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.172.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';

/* ════════════════════════════════════════════
   AUDIO - Proximity-based, player-focused
   ════════════════════════════════════════════ */
class Audio {
  constructor(){ this.ctx=null; this.ok=false; }
  init(){ if(this.ok)return; try{this.ctx=new(window.AudioContext||window.webkitAudioContext)();this.ok=true}catch(e){} }
  _play(type,freq,dur,vol){
    if(!this.ok)return;
    try{const o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type=type;o.frequency.setValueAtTime(freq,this.ctx.currentTime);
    g.gain.setValueAtTime(vol,this.ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,this.ctx.currentTime+dur);
    o.connect(g).connect(this.ctx.destination);o.start();o.stop(this.ctx.currentTime+dur)}catch(e){}
  }
  // Only play if source is near player
  _near(pos,range=25){
    if(!GS.player||!GS.player.alive)return 0;
    const d=GS.player.mesh.position.distanceTo(pos);
    return d<range?Math.max(0,1-d/range):0;
  }
  flap(pos)     { const v=this._near(pos,20); if(v>0.3) this._play('triangle',600,0.07,0.12*v); }
  hit(pos)      { const v=this._near(pos,30); if(v>0.2){this._play('sawtooth',200,0.2,0.35*v);this._play('square',100,0.15,0.15*v);} }
  stomp(pos)    { const v=this._near(pos,35); if(v>0.1){this._play('sawtooth',150,0.3,0.45*v);this._play('square',80,0.25,0.25*v);} }
  kill(pos)     { const v=this._near(pos,35); if(v>0.15){this._play('sawtooth',300,0.4,0.4*v);setTimeout(()=>this._play('square',150,0.3,0.25*v),100);} }
  eggGet()      { this._play('sine',880,0.1,0.2);this._play('sine',1100,0.1,0.15); }
  levelUp()     { [440,554,659,880].forEach((f,i)=>setTimeout(()=>this._play('sine',f,0.2,0.25),i*80)); }
  powerup()     { [660,880,1100].forEach((f,i)=>setTimeout(()=>this._play('sine',f,0.15,0.2),i*60)); }
  dragonHit()   { this._play('sawtooth',100,0.5,0.5);this._play('square',60,0.4,0.35); }
  dragonDie()   { for(let i=0;i<6;i++)setTimeout(()=>this._play('sawtooth',80+i*30,0.3,0.4-i*0.06),i*100); }
  dragonBreath(pos){ const v=this._near(pos,30); if(v>0.1) this._play('sawtooth',50+Math.random()*30,0.4,0.3*v); }
  bounce(pos)   { const v=this._near(pos,20); if(v>0.2) this._play('triangle',500+Math.random()*300,0.1,0.15*v); }
  lance()       { this._play('sawtooth',1200,0.05,0.12);this._play('square',900,0.08,0.08); }
  // Player-only sounds (always full volume)
  playerFlap()  { this._play('triangle',620,0.08,0.15);this._play('sine',820,0.05,0.08); }
  playerHit()   { this._play('sawtooth',180,0.25,0.5);this._play('square',90,0.2,0.3); }
  playerStomp() { this._play('sawtooth',140,0.35,0.55);this._play('square',70,0.3,0.35);this._play('triangle',500,0.1,0.2); }
}
const sfx=new Audio();

/* ════════════════════════════════════════════
   CONSTANTS
   ════════════════════════════════════════════ */
const GRAV=-18,FLAP=9.5,MAX_VY=15,MSPD=13;
const AW=80,AH=55,WRAP=AW/2;
const FLOOR=-AH/2+2,CEIL=AH/2-2;
const EGG_HATCH=10,DRAGON_INT=28;
const FC={cowboys:{color:0xe8a735,name:'Cowboys'},outlaws:{color:0xd43d3d,name:'Outlaws'},law:{color:0x3d8dd4,name:'Law&Order'}};
const RN={cowboys:['Sheriff','Deputy','Ranger'],outlaws:['Bandit','Rustler','Renegade'],law:['Marshal','Judge','Warden']};
const POWERUP_TYPES=['heal','speed','damage','shield','magnet'];

// XY-only distance for side-scroller combat (Z is cosmetic depth)
function dist2D(a,b){
  const dx=a.x-b.x, dy=a.y-b.y;
  return Math.sqrt(dx*dx+dy*dy);
}

/* ════════════════════════════════════════════
   RENDERER + SCENE
   ════════════════════════════════════════════ */
const cv=document.getElementById('c');
const R=new THREE.WebGLRenderer({canvas:cv,antialias:true});
R.setSize(innerWidth,innerHeight);R.setPixelRatio(Math.min(devicePixelRatio,2));
R.shadowMap.enabled=true;R.shadowMap.type=THREE.PCFSoftShadowMap;
R.toneMapping=THREE.ACESFilmicToneMapping;R.toneMappingExposure=1.3;
const S=new THREE.Scene();
S.fog=new THREE.FogExp2(0x1a0a1e,0.006);S.background=new THREE.Color(0x0d0618);
const cam=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.5,200);
cam.position.set(0,5,55);
let shakeAmt=0;

// Lights
S.add(new THREE.AmbientLight(0x2a1a3a,0.5));
const dL=new THREE.DirectionalLight(0xffeedd,1.2);
dL.position.set(20,40,30);dL.castShadow=true;
dL.shadow.mapSize.set(1024,1024);
dL.shadow.camera.left=-50;dL.shadow.camera.right=50;
dL.shadow.camera.top=40;dL.shadow.camera.bottom=-40;S.add(dL);
const rimL=new THREE.DirectionalLight(0x6644aa,0.3);rimL.position.set(-20,10,-20);S.add(rimL);
const lavaL=new THREE.PointLight(0xff4400,2,60);lavaL.position.set(0,FLOOR-5,0);S.add(lavaL);

/* ════════════════════════════════════════════
   PARTICLES
   ════════════════════════════════════════════ */
class Particles{
  constructor(){this.ps=[];this.max=500}
  emit(pos,color,count=5,spread=2,life=1,grav=true){
    for(let i=0;i<count&&this.ps.length<this.max;i++){
      const g=new THREE.SphereGeometry(0.06+Math.random()*0.14,4,4);
      const m=new THREE.MeshBasicMaterial({color,transparent:true});
      const mesh=new THREE.Mesh(g,m);mesh.position.copy(pos);S.add(mesh);
      this.ps.push({mesh,life,ml:life,vx:(Math.random()-0.5)*spread,vy:Math.random()*spread*0.5+1,vz:(Math.random()-0.5)*spread*0.3,grav});
    }
  }
  fire(pos,color=0xff6600,count=3){this.emit(pos,color,count,1.5,0.6);this.emit(pos,0xffcc00,Math.ceil(count/2),1,0.4)}
  explode(pos,color,count=25){this.emit(pos,color,count,6,1.5);this.emit(pos,0xffffff,Math.ceil(count/3),4,0.8);this.emit(pos,0xffff00,Math.ceil(count/4),3,1.0)}
  lightning(pos,count=8){this.emit(pos,0x88ccff,count,5,0.3,false);this.emit(pos,0xffffff,Math.ceil(count/2),3,0.2,false)}
  update(dt){
    for(let i=this.ps.length-1;i>=0;i--){
      const p=this.ps[i];p.life-=dt;
      if(p.life<=0){S.remove(p.mesh);p.mesh.geometry.dispose();p.mesh.material.dispose();this.ps.splice(i,1);continue}
      p.mesh.position.x+=p.vx*dt;p.mesh.position.y+=p.vy*dt;p.mesh.position.z+=p.vz*dt;
      if(p.grav)p.vy-=8*dt;
      const a=p.life/p.ml;p.mesh.material.opacity=a;p.mesh.scale.setScalar(0.5+a*0.5);
    }
  }
}

/* ════════════════════════════════════════════
   FLOATING NUMBERS + MISSILE COMMAND RINGS
   ════════════════════════════════════════════ */
class FloatingNumbers{
  constructor(){this.items=[];this.rings=[]}
  // Rising XP/damage text
  spawn(pos,text,color=0xffff00,size=1){
    const canvas=document.createElement('canvas');canvas.width=128;canvas.height=48;
    const ctx=canvas.getContext('2d');
    ctx.font='bold 32px MedievalSharp, serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='#000';ctx.fillText(text,65,26);
    ctx.fillStyle='#'+new THREE.Color(color).getHexString();ctx.fillText(text,64,24);
    const tex=new THREE.CanvasTexture(canvas);
    const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,depthTest:false}));
    sp.position.copy(pos);sp.scale.set(2*size,0.7*size,1);
    S.add(sp);
    this.items.push({sp,tex,canvas,life:1.5,vy:4+Math.random()*2,vx:(Math.random()-0.5)*2});
  }
  // Missile Command expanding ring explosion
  spawnRing(pos,color=0xff4400,maxRadius=4){
    const ringGeo=new THREE.RingGeometry(0.1,0.3,24);
    const ringMat=new THREE.MeshBasicMaterial({color,transparent:true,side:THREE.DoubleSide,depthTest:false});
    const ring=new THREE.Mesh(ringGeo,ringMat);
    ring.position.copy(pos);ring.lookAt(cam.position);
    S.add(ring);
    // Second inner ring
    const ring2Geo=new THREE.RingGeometry(0.05,0.15,24);
    const ring2Mat=new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,side:THREE.DoubleSide,depthTest:false});
    const ring2=new THREE.Mesh(ring2Geo,ring2Mat);
    ring2.position.copy(pos);ring2.lookAt(cam.position);
    S.add(ring2);
    // Filled explosion disc
    const discGeo=new THREE.CircleGeometry(0.5,16);
    const discMat=new THREE.MeshBasicMaterial({color,transparent:true,side:THREE.DoubleSide,depthTest:false,opacity:0.7});
    const disc=new THREE.Mesh(discGeo,discMat);
    disc.position.copy(pos);disc.lookAt(cam.position);
    S.add(disc);
    this.rings.push({ring,ring2,disc,ringMat,ring2Mat,discMat,life:0.8,maxR:maxRadius,pos:pos.clone()});
  }
  update(dt){
    // Numbers
    for(let i=this.items.length-1;i>=0;i--){
      const n=this.items[i];n.life-=dt;
      if(n.life<=0){S.remove(n.sp);n.sp.material.map.dispose();n.sp.material.dispose();this.items.splice(i,1);continue}
      n.sp.position.y+=n.vy*dt;n.sp.position.x+=n.vx*dt;
      n.vy*=0.97;n.sp.material.opacity=Math.min(1,n.life*2);
      n.sp.scale.x+=dt*0.5;n.sp.scale.y+=dt*0.2;
    }
    // Rings
    for(let i=this.rings.length-1;i>=0;i--){
      const r=this.rings[i];r.life-=dt;
      if(r.life<=0){
        S.remove(r.ring);S.remove(r.ring2);S.remove(r.disc);
        r.ring.geometry.dispose();r.ringMat.dispose();
        r.ring2.geometry.dispose();r.ring2Mat.dispose();
        r.disc.geometry.dispose();r.discMat.dispose();
        this.rings.splice(i,1);continue;
      }
      const t=1-r.life/0.8;
      const radius=r.maxR*t;
      // Expand rings
      r.ring.scale.setScalar(radius*3);
      r.ring2.scale.setScalar(radius*2);
      r.disc.scale.setScalar(radius*1.5);
      // Fade
      r.ringMat.opacity=r.life/0.8*0.9;
      r.ring2Mat.opacity=r.life/0.8*0.7;
      r.discMat.opacity=r.life/0.8*0.5;
      // Face camera
      r.ring.lookAt(cam.position);
      r.ring2.lookAt(cam.position);
      r.disc.lookAt(cam.position);
    }
  }
}

/* ════════════════════════════════════════════
   LANCE SKEWER VISUAL EFFECTS
   ════════════════════════════════════════════ */
class SkewerFX {
  constructor(){ this.skewers=[]; }
  // Create a lance-through-body skewer effect
  spawn(winnerPos, loserPos, color, lanceLevel=0){
    // Direction from winner to loser
    const dir = loserPos.clone().sub(winnerPos).normalize();
    // Lance line from winner through loser and beyond
    const start = winnerPos.clone().add(dir.clone().multiplyScalar(1));
    const end = loserPos.clone().add(dir.clone().multiplyScalar(3));
    // Main lance shaft
    const points = [start, loserPos.clone(), end];
    const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
    const lineMat = new THREE.LineBasicMaterial({color:0xcccccc, transparent:true, linewidth:2});
    const line = new THREE.Line(lineGeo, lineMat);
    S.add(line);
    // Glowing impact point at loser
    const impactGeo = new THREE.SphereGeometry(0.5, 8, 8);
    const impactMat = new THREE.MeshBasicMaterial({color, transparent:true, opacity:0.9});
    const impact = new THREE.Mesh(impactGeo, impactMat);
    impact.position.copy(loserPos);
    S.add(impact);
    // Blood/spark trail along the skewer path
    const trailMeshes = [];
    const trailCount = 8;
    for(let i=0; i<trailCount; i++){
      const t = i/trailCount;
      const pos = start.clone().lerp(end, t);
      pos.x += (Math.random()-0.5)*0.3;
      pos.y += (Math.random()-0.5)*0.3;
      const sparkGeo = new THREE.SphereGeometry(0.08+Math.random()*0.12, 4, 4);
      let sparkColor = color;
      if(lanceLevel>=3) sparkColor = Math.random()>0.5 ? 0xff00ff : 0x88ccff;
      else if(lanceLevel>=2) sparkColor = 0x88ccff;
      else if(lanceLevel>=1) sparkColor = 0xff6600;
      const sparkMat = new THREE.MeshBasicMaterial({color:sparkColor, transparent:true});
      const spark = new THREE.Mesh(sparkGeo, sparkMat);
      spark.position.copy(pos);
      S.add(spark);
      trailMeshes.push({mesh:spark, mat:sparkMat, vx:(Math.random()-0.5)*4, vy:Math.random()*3+1, vz:(Math.random()-0.5)*2});
    }
    // Fire burst at lance tip for fire lance
    if(lanceLevel >= 1){
      const burstGeo = new THREE.SphereGeometry(0.6, 6, 6);
      const burstMat = new THREE.MeshBasicMaterial({color:0xff4400, transparent:true, opacity:0.8});
      const burst = new THREE.Mesh(burstGeo, burstMat);
      burst.position.copy(loserPos);
      S.add(burst);
      trailMeshes.push({mesh:burst, mat:burstMat, vx:0, vy:0, vz:0, isBurst:true});
    }
    // Lightning flash for lightning lance
    if(lanceLevel >= 2){
      const flashGeo = new THREE.SphereGeometry(1.0, 6, 6);
      const flashMat = new THREE.MeshBasicMaterial({color:0x88ccff, transparent:true, opacity:0.6});
      const flash = new THREE.Mesh(flashGeo, flashMat);
      flash.position.copy(loserPos);
      S.add(flash);
      trailMeshes.push({mesh:flash, mat:flashMat, vx:0, vy:0, vz:0, isBurst:true});
    }
    this.skewers.push({
      line, lineGeo, lineMat,
      impact, impactGeo, impactMat,
      trails: trailMeshes,
      life: 0.6, maxLife: 0.6,
      dir: dir.clone()
    });
  }
  update(dt){
    for(let i=this.skewers.length-1; i>=0; i--){
      const s = this.skewers[i];
      s.life -= dt;
      if(s.life <= 0){
        S.remove(s.line); s.lineGeo.dispose(); s.lineMat.dispose();
        S.remove(s.impact); s.impactGeo.dispose(); s.impactMat.dispose();
        s.trails.forEach(t=>{S.remove(t.mesh); t.mesh.geometry.dispose(); t.mat.dispose()});
        this.skewers.splice(i, 1);
        continue;
      }
      const alpha = s.life / s.maxLife;
      s.lineMat.opacity = alpha;
      s.impactMat.opacity = alpha * 0.9;
      s.impact.scale.setScalar(1 + (1-alpha)*2);
      // Sparks scatter outward
      s.trails.forEach(t=>{
        if(t.isBurst){
          t.mesh.scale.setScalar(1 + (1-alpha)*3);
          t.mat.opacity = alpha * 0.5;
        } else {
          t.mesh.position.x += t.vx * dt;
          t.mesh.position.y += t.vy * dt;
          t.mesh.position.z += t.vz * dt;
          t.vy -= 6 * dt;
          t.mat.opacity = alpha;
          t.mesh.scale.setScalar(alpha);
        }
      });
    }
  }
}

/* ════════════════════════════════════════════
   ARENA
   ════════════════════════════════════════════ */
function buildArena(){
  const lG=new THREE.PlaneGeometry(AW+20,40+20);
  const lM=new THREE.MeshStandardMaterial({color:0xff3300,emissive:0xff2200,emissiveIntensity:0.8,roughness:0.9});
  const lava=new THREE.Mesh(lG,lM);lava.rotation.x=-Math.PI/2;lava.position.y=FLOOR-3;lava.receiveShadow=true;S.add(lava);
  const bG=new THREE.SphereGeometry(0.3,8,8);

/* ════════════════════════════════════════════
   RPG STATS
   ════════════════════════════════════════════ */
class Stats{
  constructor(isP=false){
    this.level=1;this.xp=0;this.xpNext=100;this.maxHP=3;this.hp=3;this.damage=1;
    this.lanceLevel=0;this.autoFloat=0;this.targetAssist=0;this.modelScale=1;
    this.moveSpeedMult=1;this.flapMult=1;this.isPlayer=isP;this.veteranXP=0;this.killCount=0;
    this.shieldTimer=0;this.speedTimer=0;this.magnetTimer=0;this.dmgBoostTimer=0;
  }
  addXP(amt){this.xp+=amt;this.veteranXP+=amt;while(this.xp>=this.xpNext)this._lvl()}
  _lvl(){
    this.xp-=this.xpNext;this.level++;this.xpNext=Math.floor(this.xpNext*1.35);
    this.maxHP=Math.min(3+Math.floor(this.level/2),8);this.hp=this.maxHP;
    this.damage=1+this.level*0.15;this.modelScale=1+this.level*0.04;
    this.moveSpeedMult=1+this.level*0.03;this.flapMult=1+this.level*0.02;
    if(this.isPlayer){
      this.lanceLevel=Math.min(Math.floor(this.level/3),3);
      this.autoFloat=Math.min(this.level*0.06,0.7);
      this.targetAssist=Math.min(this.level*0.04,0.5);
      sfx.levelUp();
    }
  }
  heal(amt){this.hp=Math.min(this.hp+amt,this.maxHP)}
  updateTimers(dt){this.shieldTimer=Math.max(0,this.shieldTimer-dt);this.speedTimer=Math.max(0,this.speedTimer-dt);this.magnetTimer=Math.max(0,this.magnetTimer-dt);this.dmgBoostTimer=Math.max(0,this.dmgBoostTimer-dt)}
  get spdMult(){return this.moveSpeedMult*(this.speedTimer>0?1.5:1)}
}

/* ════════════════════════════════════════════
   AI BRAIN - Swooping flight patterns
   ════════════════════════════════════════════ */
class Brain{
  constructor(){
    this.w=new Float32Array(6);
    for(let i=0;i<6;i++)this.w[i]=0.25+Math.random()*0.5;
    this.w[0]=0.5;this.w[4]=0.6;
    this.reward=0;this.learnRate=0.02;this.lastAction=-1;
    // Swooping flight state
    this.flyDir=Math.random()>0.5?1:-1; // current horizontal direction
    this.flyAngle=(Math.random()-0.5)*0.6; // angle of flight (-1 dive, +1 climb)
    this.swoopTimer=2+Math.random()*4; // time before changing swoop
    this.reverseChance=0.15; // low chance of reversing
    this.huntPlayer=Math.random()<0.35; // some enemies specifically chase player
    this.preferredAltitude=FLOOR+8+Math.random()*(CEIL-FLOOR-16); // spread out vertically
    this.patrolLane=Math.random()>0.5?1:-1; // left or right side preference
  }
  decide(self,enemies,eggs,dragon,platforms,player){
    const scores=new Float32Array(6);
    let nearE=null,neDist=999,nearEgg=null,neeDist=999;
    for(const e of enemies){if(!e.alive||e.invincible>0)continue;const d=dist2D(self.mesh.position,e.mesh.position);if(d<neDist){neDist=d;nearE=e}}
    for(const e of eggs){const d=dist2D(self.mesh.position,e.mesh.position);if(d<neeDist){neeDist=d;nearEgg=e}}
    // If hunting player, override target
    if(this.huntPlayer&&player&&player.alive&&player.invincible<=0){
      const pd=dist2D(self.mesh.position,player.mesh.position);
      if(pd<40){nearE=player;neDist=pd;scores[0]+=0.4;scores[5]+=0.3}
    }
    scores[0]=nearE?(20-neDist)/20:0;
    scores[1]=dragon&&dragon.alive?(15-dist2D(self.mesh.position,dragon.mesh.position))/15:0;
    scores[2]=nearEgg?(15-neeDist)/15:0;
    scores[3]=0.25;
    scores[4]=nearE&&neDist<12?(self.mesh.position.y<nearE.mesh.position.y?0.8:0.15):0;
    scores[5]=nearE&&neDist<8&&self.mesh.position.y>nearE.mesh.position.y+1.5?0.9:0;
    let best=0,bs=-1;
    for(let i=0;i<6;i++){const s=scores[i]*this.w[i];if(s>bs){bs=s;best=i}}
    this.lastAction=best;
    return{action:best,target:nearE,egg:nearEgg};
  }
  reward_action(amt){if(this.lastAction>=0){this.w[this.lastAction]+=amt*this.learnRate;this.w[this.lastAction]=Math.max(0.1,Math.min(2,this.w[this.lastAction]))}}
  copyFrom(other){for(let i=0;i<6;i++)this.w[i]=other.w[i]+(Math.random()-0.5)*0.1;this.huntPlayer=Math.random()<0.4}
}

  const rw=new THREE.Mesh(wG,wM);rw.position.set(-0.3,0.8,-0.5);rw.rotation.y=Math.PI+0.1;rw.castShadow=true;g.add(rw);
  // Rider
  const rg=new THREE.Group();
  const rB=new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.25,1.2,6),m);rB.position.set(0,0.6,0);rg.add(rB);
  const rH=new THREE.Mesh(new THREE.SphereGeometry(0.3,6,6),new THREE.MeshStandardMaterial({color:0xddbb88,roughness:0.6}));rH.position.set(0,1.4,0);rg.add(rH);
  const hBr=new THREE.Mesh(new THREE.CylinderGeometry(0.5,0.5,0.08,8),dm);hBr.position.set(0,1.65,0);rg.add(hBr);
  const hTp=new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.3,0.35,8),dm);hTp.position.set(0,1.85,0);rg.add(hTp);
  // Lance

  lnc.rotation.z=Math.PI/2;lcG.add(lnc);
  const tip=new THREE.Mesh(new THREE.ConeGeometry(0.12,0.4,5),new THREE.MeshStandardMaterial({color:0xffdd44,metalness:0.9,roughness:0.1}));
  tip.position.set(1.5,0,0);tip.rotation.z=-Math.PI/2;lcG.add(tip);
  lcG.position.set(1.5,0.8,0);rg.add(lcG);

/* ════════════════════════════════════════════
   RIDER
   ════════════════════════════════════════════ */
class Rider{
  constructor(faction,idx,isPlayer=false){
    this.faction=faction;this.name=RN[faction][idx];this.isPlayer=isPlayer;
    this.alive=true;this.stats=new Stats(isPlayer);this.brain=new Brain();
    const peg=mkPeg(FC[faction].color);
    this.mesh=peg.group;this.leftWing=peg.leftWing;this.rightWing=peg.rightWing;
    this.legs=peg.legs;this.rider=peg.rider;this.lanceGroup=peg.lanceGroup;
    this.barCanvas=peg.barCanvas;this.barTex=peg.barTex;
    this.xpCanvas=peg.xpCanvas;this.xpTex=peg.xpTex;this.lanceGlow=peg.lanceGlow;
    this.vx=0;this.vy=0;this.vz=0;
    this.facingRight=true;this.flapCD=0;this.wingAngle=0;
    this.invincible=0;this.stompCount=0;this.respawnTimer=0;
    this.lanceEffT=0;this.onGround=false;
    this.spawnPos=new THREE.Vector3((Math.random()-0.5)*40,5+Math.random()*15,(Math.random()-0.5)*2);
    this.mesh.position.copy(this.spawnPos);
    S.add(this.mesh);
  }
  flap(){
    if(this.flapCD>0||!this.alive)return;
    this.vy=Math.min(this.vy+FLAP*this.stats.flapMult,MAX_VY);
    this.flapCD=0.13;this.wingAngle=-1.3;
    if(this.isPlayer)sfx.playerFlap();else sfx.flap(this.mesh.position);
  }
  takeDamage(amt,st){
    if(!this.alive||this.invincible>0||this.stats.shieldTimer>0)return false;
    this.stats.hp-=amt;
    if(this.stats.hp<=0){this.die(st);return true}
    this.invincible=0.5;shakeAmt=Math.max(shakeAmt,3);
    if(this.isPlayer)sfx.playerHit();else sfx.hit(this.mesh.position);
    return false;
  }
  die(st){
    if(!this.alive)return;this.alive=false;this.stats.hp=0;this.mesh.visible=false;
    const egg={mesh:mkEgg(FC[this.faction].color),vy:-2,hatchTimer:EGG_HATCH,faction:this.faction,collected:false,xpValue:50+this.stats.level*20};
    egg.mesh.position.copy(this.mesh.position);S.add(egg.mesh);st.eggs.push(egg);
    st.particles.explode(this.mesh.position,FC[this.faction].color,30);
    st.floats.spawnRing(this.mesh.position,FC[this.faction].color,5);
    shakeAmt=Math.max(shakeAmt,6);
    if(this.isPlayer)sfx.playerHit();else sfx.kill(this.mesh.position);
    // Maybe drop powerup
    if(Math.random()<0.35) spawnPowerup(this.mesh.position.clone(),st);
    this.stats.maxHP=Math.max(1,this.stats.maxHP-1);
    if(this.stats.maxHP>0)this.respawnTimer=3.5;else S.remove(this.mesh);
    this.brain.reward_action(-0.5);
  }
  update(dt,st){
    if(!this.alive){
      this.respawnTimer-=dt;
      if(this.respawnTimer<=0&&this.stats.maxHP>0){
        this.alive=true;this.invincible=2.5;this.stats.hp=this.stats.maxHP;
        this.mesh.position.copy(this.spawnPos);this.vx=0;this.vy=0;this.vz=0;this.mesh.visible=true;
      }
      return;
    }
    this.invincible=Math.max(0,this.invincible-dt);
    this.flapCD=Math.max(0,this.flapCD-dt);
    this.stats.updateTimers(dt);
    this.onGround=false;
    // Auto-float
    if(this.stats.autoFloat>0&&this.vy<-3)this.vy+=this.stats.autoFloat*12*dt;
    // Gravity
    this.vy+=GRAV*dt;this.vy=Math.max(this.vy,-MAX_VY);
    // AI
    if(!this.isPlayer)this.updateAI(dt,st);
    // Move
    this.mesh.position.x+=this.vx*dt;this.mesh.position.y+=this.vy*dt;this.mesh.position.z+=this.vz*dt;
    this.vx*=0.97;this.vz*=(1-2*dt);
    // Wrap
    if(this.mesh.position.x>WRAP)this.mesh.position.x=-WRAP;
    if(this.mesh.position.x<-WRAP)this.mesh.position.x=WRAP;
    this.mesh.position.z=THREE.MathUtils.clamp(this.mesh.position.z,-2,2);
    // Ceiling
    if(this.mesh.position.y>CEIL){this.mesh.position.y=CEIL;this.vy=-Math.abs(this.vy)*0.3}
    // Lava
    if(this.mesh.position.y<FLOOR){this.die(st);return}
    // Platforms
    for(const p of st.platforms){
      if(this.vy<=0&&this.mesh.position.y>=p.y+0.3&&this.mesh.position.y<p.y+2.5&&
        Math.abs(this.mesh.position.x-p.x)<p.w/2&&Math.abs(this.mesh.position.z)<p.d/2+0.5){
        this.mesh.position.y=p.y+p.h/2+0.7;this.vy=0;this.onGround=true;
      }
    }
    if(this.onGround)this.stompCount=0;
    // Magnet: pull nearby eggs
    if(this.stats.magnetTimer>0){
      for(const e of st.eggs){
        if(e.collected||e.faction===this.faction)continue;
        const d=dist2D(this.mesh.position,e.mesh.position);
        if(d<12){const dir=this.mesh.position.clone().sub(e.mesh.position).normalize();e.mesh.position.add(dir.multiplyScalar(dt*8))}
      }
    }
    // Anims
    const tw=this.vy>2?-0.8:(this.vy<-2?0.6:0.1);
    this.wingAngle+=(tw-this.wingAngle)*5*dt;
    if(this.leftWing){this.leftWing.rotation.x=this.wingAngle;this.rightWing.rotation.x=-this.wingAngle}
    const la=Math.sin(st.time*6)*0.3;
    if(this.legs.length>=4){this.legs[0].rotation.x=la;this.legs[1].rotation.x=-la;this.legs[2].rotation.x=-la;this.legs[3].rotation.x=la}
    if(Math.abs(this.vx)>0.5)this.facingRight=this.vx>0;
    this.mesh.rotation.y=this.facingRight?0:Math.PI;
    this.mesh.rotation.z=THREE.MathUtils.clamp(-this.vy*0.03,-0.3,0.3);
    this.mesh.visible=this.invincible>0?Math.floor(this.invincible*10)%2===0:true;
    // Shield glow
    if(this.stats.shieldTimer>0){
      this.lanceGlow.color.set(0x44ffff);this.lanceGlow.intensity=3+Math.sin(st.time*10)*1;
    }
    this.mesh.scale.setScalar(0.7*this.stats.modelScale);
    this.updateLance(dt,st);this.updateBars();
    // Veteran healing for AI
    if(!this.isPlayer&&this.stats.veteranXP>200&&this.stats.hp<this.stats.maxHP&&Math.random()<0.001)this.stats.heal(1);
    // Fire trail when rising
    if(this.isPlayer&&this.vy>4){const gp=this.mesh.position.clone();gp.y-=1;st.particles.fire(gp,0xff8800,1)}
  }
  updateLance(dt,st){
    this.lanceEffT+=dt;
    const ll=this.stats.lanceLevel;
    const dmgB=this.stats.dmgBoostTimer>0;
    if(ll===0&&!dmgB){this.lanceGlow.intensity=0;return}
    if(this.stats.shieldTimer>0)return; // shield overrides lance glow
    const dir=this.facingRight?1:-1;
    if(ll>=1||dmgB){
      this.lanceGlow.color.set(dmgB?0xff0000:0xff4400);
      this.lanceGlow.intensity=1+Math.sin(this.lanceEffT*10)*0.5;
      if(Math.random()<0.3){const p=this.mesh.position.clone();p.x+=dir*2.1*0.7;p.y+=0.84;st.particles.fire(p,dmgB?0xff0000:0xff4400,1)}
    }
    if(ll>=2){
      this.lanceGlow.color.set(0x44aaff);this.lanceGlow.intensity=2+Math.sin(this.lanceEffT*20);
      if(Math.random()<0.1){const p=this.mesh.position.clone();p.x+=dir*2.1*0.7;p.y+=0.84;st.particles.lightning(p,2)}
    }
    if(ll>=3){
      this.lanceGlow.color.set(0xff88ff);this.lanceGlow.intensity=3+Math.sin(this.lanceEffT*15)*1.5;
      if(Math.random()<0.15){const p=this.mesh.position.clone();p.x+=dir*2.1*0.7;p.y+=0.84;st.particles.fire(p,0xff00ff,2);st.particles.lightning(p,2)}
    }
  }
  updateBars(){
    const bc=this.barCanvas.getContext('2d');bc.clearRect(0,0,64,12);
    bc.fillStyle='rgba(0,0,0,0.6)';bc.fillRect(0,0,64,12);
    const hpP=Math.max(0,this.stats.hp/this.stats.maxHP);
    bc.fillStyle=hpP>0.5?'#44cc44':hpP>0.25?'#cccc44':'#cc4444';
    bc.fillRect(1,1,62*hpP,10);
    bc.fillStyle='#fff';bc.font='8px sans-serif';bc.fillText(`Lv${this.stats.level}`,2,9);
    // Shield indicator
    if(this.stats.shieldTimer>0){bc.fillStyle='#44ffff';bc.fillText('🛡',48,9)}
    this.barTex.needsUpdate=true;
    const xc=this.xpCanvas.getContext('2d');xc.clearRect(0,0,64,8);
    xc.fillStyle='rgba(0,0,0,0.4)';xc.fillRect(0,0,64,8);
    xc.fillStyle='#8844cc';xc.fillRect(1,1,62*(this.stats.xp/this.stats.xpNext),6);
    this.xpTex.needsUpdate=true;
  }
  /* ── SWOOPING AI ────────────────────────── */
  updateAI(dt,st){
    const brain=this.brain;
    brain.swoopTimer-=dt;

    // Swoop direction changes: long committed runs with rare reversals
    if(brain.swoopTimer<=0){
      brain.swoopTimer=2.5+Math.random()*5; // long commitment to direction
      brain.flyAngle=(Math.random()-0.5)*0.8; // angle: neg=dive, pos=climb
      // Rarely reverse direction
      if(Math.random()<brain.reverseChance){
        brain.flyDir*=-1;
        brain.reverseChance=0.08; // reset after reversing
      } else {
        brain.reverseChance=Math.min(brain.reverseChance+0.05,0.4); // increases until they do reverse
      }
      // Vary altitude preference
      brain.preferredAltitude=THREE.MathUtils.clamp(
        brain.preferredAltitude+(Math.random()-0.5)*15,
        FLOOR+6,CEIL-5
      );
    }

    // Base swooping movement: fly in committed direction at angle
    const swoopSpeed=MSPD*this.stats.spdMult*0.7;
    this.vx+=(brain.flyDir*swoopSpeed-this.vx)*1.5*dt;

    // Altitude control: flap to reach preferred altitude with angle
    const altDiff=brain.preferredAltitude+brain.flyAngle*8-this.mesh.position.y;
    if(altDiff>2&&this.flapCD<=0){
      this.flap();
    }
    // If too high, stop flapping and let gravity pull down (creates diving behavior)

    // Decision overlay: occasionally break from swoop to chase/collect/stomp
    if(Math.random()<0.04){
      const enemies=st.riders.filter(r=>r!==this&&r.alive&&r.faction!==this.faction&&r.invincible<=0);
      const decision=brain.decide(this,enemies,st.eggs,st.dragon,st.platforms,st.player);

      switch(decision.action){
        case 0: // Chase
        case 5: // Stomp attempt
          if(decision.target){
            const dx=decision.target.mesh.position.x-this.mesh.position.x;
            const dy=decision.target.mesh.position.y-this.mesh.position.y;
            // Adjust fly direction toward target (don't snap, nudge)
            if(Math.abs(dx)>5) brain.flyDir=Math.sign(dx);
            // For stomp: aim above
            if(decision.action===5||dy<-1){
              brain.preferredAltitude=decision.target.mesh.position.y+4+Math.random()*3;
              brain.flyAngle=0.5;
            } else {
              brain.preferredAltitude=decision.target.mesh.position.y+2;
            }
            brain.swoopTimer=Math.min(brain.swoopTimer,1.5); // re-evaluate sooner
          }
          break;
        case 1: // Flee dragon
          if(st.dragon&&st.dragon.alive){
            brain.flyDir=Math.sign(this.mesh.position.x-st.dragon.mesh.position.x)||1;
            brain.preferredAltitude=Math.min(CEIL-5,st.dragon.mesh.position.y+10);
            brain.swoopTimer=1;
          }
          break;
        case 2: // Egg
          if(decision.egg){
            brain.flyDir=Math.sign(decision.egg.mesh.position.x-this.mesh.position.x)||brain.flyDir;
            brain.preferredAltitude=decision.egg.mesh.position.y+2;
            brain.swoopTimer=1;
          }
          break;
        case 4: // Climb
          brain.preferredAltitude=Math.min(CEIL-5,this.mesh.position.y+8+Math.random()*5);
          brain.flyAngle=0.6;
          brain.swoopTimer=1.5;
          break;
      }
    }

    // Anti-clustering: separation from same-faction allies
    for(const r of st.riders){
      if(r===this||!r.alive||r.faction!==this.faction)continue;
      const d=dist2D(this.mesh.position,r.mesh.position);
      if(d<6){
        const sep=(6-d)/6*4;
        this.vx+=Math.sign(this.mesh.position.x-r.mesh.position.x)*sep*dt;
        // Vertical separation too
        brain.preferredAltitude+=(this.mesh.position.y>r.mesh.position.y?3:-3);
      }
    }

    // Speed clamp
    this.vx=THREE.MathUtils.clamp(this.vx,-MSPD*this.stats.spdMult,MSPD*this.stats.spdMult);
    // Emergency: near lava
    if(this.mesh.position.y<FLOOR+6){this.flap();brain.preferredAltitude=FLOOR+12}
    // Emergency: near ceiling, stop flapping
    // (gravity handles this automatically)
  }
}

   DRAGON BOSS
   ════════════════════════════════════════════ */
function mkDragonMesh(){
  const g=new THREE.Group();
  const dM=new THREE.MeshStandardMaterial({color:0x44ff44,emissive:0x22aa22,emissiveIntensity:0.4,roughness:0.4});
  const body=new THREE.Mesh(new THREE.CapsuleGeometry(0.8,2.5,6,10),dM);body.rotation.z=Math.PI/2;g.add(body);
  const head=new THREE.Mesh(new THREE.ConeGeometry(0.5,1.5,6),dM);head.position.set(2.2,0.3,0);head.rotation.z=-Math.PI/2;g.add(head);
  const eM=new THREE.MeshStandardMaterial({color:0xff0000,emissive:0xff0000,emissiveIntensity:1});
  [-0.35,0.35].forEach(z=>{const e=new THREE.Mesh(new THREE.SphereGeometry(0.15,6,6),eM);e.position.set(2,0.6,z);g.add(e)});
  const wS=new THREE.Shape();wS.moveTo(0,0);wS.quadraticCurveTo(2,3,5,3.5);wS.quadraticCurveTo(4,1.5,3,0);wS.lineTo(0,0);
  const wG=new THREE.ExtrudeGeometry(wS,{depth:0.03,bevelEnabled:false});
  const wM=new THREE.MeshStandardMaterial({color:0x338833,side:THREE.DoubleSide,transparent:true,opacity:0.7});
  const lw=new THREE.Mesh(wG,wM);lw.position.set(-0.5,0.5,0.3);g.add(lw);
  const rw=new THREE.Mesh(wG,wM);rw.position.set(-0.5,0.5,-0.3);rw.rotation.y=Math.PI;g.add(rw);
  g.scale.set(0.9,0.9,0.9);
  return{group:g,leftWing:lw,rightWing:rw};
}

class DragonBoss{
  constructor(wave){
    const d=mkDragonMesh();
    this.mesh=d.group;this.leftWing=d.leftWing;this.rightWing=d.rightWing;
    this.alive=true;this.maxHP=3+wave*2;this.hp=this.maxHP;
    this.damage=1+wave*0.3;this.speed=6+wave*0.5;
    this.mesh.position.set(WRAP+5,5,0);
    this.vx=-this.speed;this.vy=0;this.time=0;
    this.target=null;this.targetTimer=0;this.killCount=0;this.enraged=false;this.breathTimer=0;
    const sc=0.9+wave*0.08;this.mesh.scale.setScalar(sc);
    S.add(this.mesh);
    this.glow=new THREE.PointLight(0x44ff44,2,15);this.mesh.add(this.glow);
  }
  onKill(){
    this.killCount++;this.damage+=0.2;this.speed=Math.min(this.speed+0.5,16);
    this.mesh.scale.multiplyScalar(1.04);
    if(this.killCount>=2&&!this.enraged){this.enraged=true;this.glow.color.set(0xff4444);this.glow.intensity=4}
  }
  update(dt,st){
    if(!this.alive)return;this.time+=dt;this.targetTimer-=dt;this.breathTimer-=dt;
    if(this.targetTimer<=0||!this.target||!this.target.alive){
      this.targetTimer=2+Math.random()*3;
      let best=null,bd=999;
      for(const r of st.riders){if(!r.alive)continue;const d=dist2D(this.mesh.position,r.mesh.position);if(d<bd){bd=d;best=r}}
      this.target=best;
    }
    if(this.target){
      const dx=this.target.mesh.position.x-this.mesh.position.x;
      const dy=this.target.mesh.position.y-this.mesh.position.y;
      const spd=this.enraged?this.speed*1.3:this.speed;
      this.vx+=(Math.sign(dx)*spd-this.vx)*2*dt;
      this.vy+=(Math.sign(dy)*spd*0.7-this.vy)*2*dt;
    }
    this.vy+=Math.sin(this.time*2)*3*dt;
    this.vx=THREE.MathUtils.clamp(this.vx,-this.speed*1.5,this.speed*1.5);
    this.vy=THREE.MathUtils.clamp(this.vy,-8,8);
    this.mesh.position.x+=this.vx*dt;this.mesh.position.y+=this.vy*dt;
    this.mesh.position.y=THREE.MathUtils.clamp(this.mesh.position.y,FLOOR+4,CEIL-3);
    if(this.mesh.position.x>WRAP)this.mesh.position.x=-WRAP;
    if(this.mesh.position.x<-WRAP)this.mesh.position.x=WRAP;
    this.mesh.rotation.y=this.vx>0?0:Math.PI;
    const wA=Math.sin(this.time*8)*0.8;this.leftWing.rotation.x=wA;this.rightWing.rotation.x=-wA;
    // Fire breath
    if(this.breathTimer<=0&&this.target){
      this.breathTimer=0.25;
      const bp=this.mesh.position.clone();bp.x+=(this.vx>0?2.5:-2.5)*this.mesh.scale.x;
      st.particles.fire(bp,this.enraged?0xff2200:0x44ff44,4);
      sfx.dragonBreath(this.mesh.position);
    }
    // Collisions
    for(const r of st.riders){
      if(!r.alive||r.invincible>0)continue;
      const dist=dist2D(this.mesh.position,r.mesh.position);
      const hitR=3.5*this.mesh.scale.x;
      if(dist<hitR){
        if(r.mesh.position.y>this.mesh.position.y+1.2*this.mesh.scale.x){
          // Rider above: damage dragon
          this.hp-=r.stats.damage;
          r.vy=FLAP*1.2;r.invincible=0.8;
          st.particles.explode(this.mesh.position,0x44ff44,20);
          st.floats.spawnRing(this.mesh.position,0x44ff44,4);
          st.skewers.spawn(r.mesh.position.clone(),this.mesh.position.clone(),0x44ff44,r.stats.lanceLevel);
          st.floats.spawn(this.mesh.position.clone(),`-${Math.floor(r.stats.damage)} HP`,0xff4444,1.2);
          st.floats.spawn(r.mesh.position.clone(),`+100 XP`,0xffff00);
          shakeAmt=Math.max(shakeAmt,5);sfx.dragonHit();
          r.stats.addXP(100);r.brain.reward_action(1);
          document.getElementById('boss-fill').style.width=`${Math.max(0,this.hp/this.maxHP*100)}%`;
          if(this.hp<=0){
            this.alive=false;this.mesh.visible=false;
            st.particles.explode(this.mesh.position,0x44ff44,50);
            st.particles.explode(this.mesh.position,0xffff00,30);
            st.floats.spawnRing(this.mesh.position,0xffff00,8);
            st.floats.spawnRing(this.mesh.position,0x44ff44,6);
            st.floats.spawn(this.mesh.position.clone(),'DRAGON SLAIN!',0x44ff44,2);
            shakeAmt=12;sfx.dragonDie();
            if(r.isPlayer)st.score+=1500+st.wave*500;
            r.stats.addXP(500);
            spawnPowerup(this.mesh.position.clone(),st);
            spawnPowerup(this.mesh.position.clone().add(new THREE.Vector3(2,1,0)),st);
            document.getElementById('boss-bar').style.display='none';
          }
        } else {
          const killed=r.takeDamage(this.damage,st);
          if(killed){
            this.onKill();
            st.floats.spawn(this.mesh.position.clone(),'DEVOURED!',0xff2200,1.5);
            st.skewers.spawn(this.mesh.position.clone(),r.mesh.position.clone(),0xff2200,0);
          }
          r.vy=8;r.vx=(r.mesh.position.x-this.mesh.position.x)*4;
          st.floats.spawnRing(r.mesh.position,0xff4400,3);
        }
      }
    }
  }
}

/* ════════════════════════════════════════════
   COMBAT
   ════════════════════════════════════════════ */
function checkCombat(dt){
  for(let i=0;i<GS.riders.length;i++){
    for(let j=i+1;j<GS.riders.length;j++){
      const a=GS.riders[i],b=GS.riders[j];
      if(!a.alive||!b.alive||a.faction===b.faction)continue;
      if(a.invincible>0||b.invincible>0)continue;
      // XY-only distance — Z is just cosmetic depth, ignore it for combat
      const dist=dist2D(a.mesh.position,b.mesh.position);
      const hitR=3.5*(a.stats.modelScale+b.stats.modelScale)/2;
      if(dist<hitR){
        const hD=a.mesh.position.y-b.mesh.position.y;
        const hitPos=a.mesh.position.clone().lerp(b.mesh.position,0.5);

        if(Math.abs(hD)<0.8){
          // Near tie — player gets advantage bias
          const playerBias=(a.isPlayer?0.5:0)-(b.isPlayer?0.5:0);
          if(Math.abs(hD+playerBias)<0.5){
            a.vx=-Math.sign(a.mesh.position.x-b.mesh.position.x)*8;
            b.vx=Math.sign(a.mesh.position.x-b.mesh.position.x)*8;
            a.vy=5;b.vy=5;
            GS.particles.emit(hitPos,0xffffff,10,3,0.5);
            GS.floats.spawnRing(hitPos,0xffffff,2);
            shakeAmt=Math.max(shakeAmt,2);sfx.bounce(hitPos);
          } else {
            const winner=hD+playerBias>0?a:b;
            const loser=hD+playerBias>0?b:a;
            doJoustWin(winner,loser,hitPos);
          }
        } else {
          const winner=hD>0?a:b;
          const loser=hD>0?b:a;
          doJoustWin(winner,loser,hitPos);
        }
      }
    }
  }
}

function doJoustWin(winner,loser,hitPos){
  // Bounce up (head stomp)
  winner.vy=FLAP*1.1;
  winner.stompCount++;
  winner.invincible=0.4;

  // Lance damage calc
  let dmg=winner.stats.damage;
  if(winner.stats.dmgBoostTimer>0)dmg*=1.5;
  if(winner.stats.lanceLevel>=1)dmg*=1.3;
  if(winner.stats.lanceLevel>=2)dmg*=1.3;
  if(winner.stats.lanceLevel>=3)dmg*=1.5;

  const killed=loser.takeDamage(dmg,GS);

  // ── LANCE SKEWER VISUAL ──
  // Show the lance punching through the loser
  const winP=winner.mesh.position.clone();
  const losP=loser.mesh.position.clone();
  const lanceColor=FC[winner.faction].color;
  GS.skewers.spawn(winP, losP, lanceColor, winner.stats.lanceLevel);

  // Push loser away in lance direction (feels like a real hit)
  const pushDir=losP.clone().sub(winP).normalize();
  loser.vx+=pushDir.x*12;
  loser.vy+=pushDir.y*4+3; // slight upward arc

  // VFX at impact point
  if(winner.stats.lanceLevel>=2)GS.particles.lightning(hitPos,12);
  if(winner.stats.lanceLevel>=1)GS.particles.fire(hitPos,0xff4400,8);
  GS.particles.explode(hitPos,FC[loser.faction].color,12);

  // Missile Command ring explosion!
  const ringColor=winner.isPlayer?0xffaa00:FC[winner.faction].color;
  GS.floats.spawnRing(hitPos,ringColor,killed?5:3);

  // Rising XP/damage numbers
  const xpAmt=30+loser.stats.level*10;
  const stompBonus=winner.stompCount>1?winner.stompCount*100:0;
  GS.floats.spawn(hitPos.clone().add(new THREE.Vector3(0,1,0)),`${Math.floor(dmg)} DMG`,0xff6644);
  if(winner.isPlayer){
    const scoreAmt=(200+stompBonus)*GS.combo;
    GS.floats.spawn(hitPos.clone().add(new THREE.Vector3(1,2,0)),`+${xpAmt} XP`,0xffff00);
    GS.floats.spawn(hitPos.clone().add(new THREE.Vector3(-1,1.5,0)),`+${scoreAmt}`,0xffffff,0.8);
    if(winner.stompCount>1)GS.floats.spawn(hitPos.clone().add(new THREE.Vector3(0,3,0)),`${winner.stompCount}x STOMP!`,0xff44ff,1.3);
  }

  shakeAmt=Math.max(shakeAmt,4+winner.stompCount);
  if(winner.isPlayer)sfx.playerStomp();else sfx.stomp(hitPos);

  // Fiery glow on winner
  if(winner.isPlayer)GS.particles.fire(winner.mesh.position.clone(),0xffaa00,6);

  if(winner.isPlayer){
    GS.score+=(200+stompBonus)*GS.combo;
    GS.combo++;GS.comboTimer=3;
  }
  winner.stats.addXP(xpAmt);
  winner.brain.reward_action(1);

  if(killed){
    loser.brain.reward_action(-0.5);
    winner.stats.killCount++;
    if(winner.stats.lanceLevel>=3){GS.particles.explode(hitPos,0xff00ff,20);GS.particles.lightning(hitPos,15)}
    sfx.lance();
    GS.floats.spawn(hitPos.clone().add(new THREE.Vector3(0,4,0)),'💀 ELIMINATED!',FC[loser.faction].color,1.5);
  }
}

/* ════════════════════════════════════════════
   EGGS
   ════════════════════════════════════════════ */
function updateEggs(dt){
  for(let i=GS.eggs.length-1;i>=0;i--){
    const e=GS.eggs[i];
    if(e.collected){S.remove(e.mesh);GS.eggs.splice(i,1);continue}
    e.vy+=GRAV*0.3*dt;e.mesh.position.y+=e.vy*dt;
    for(const p of GS.platforms){
      if(e.vy<=0&&e.mesh.position.y>=p.y&&e.mesh.position.y<p.y+2&&Math.abs(e.mesh.position.x-p.x)<p.w/2){
        e.mesh.position.y=p.y+p.h/2+0.4;e.vy=0;
      }
    }
    if(e.mesh.position.y<FLOOR){S.remove(e.mesh);GS.eggs.splice(i,1);continue}
    e.hatchTimer-=dt;
    const pulse=e.hatchTimer<2?1+Math.sin(GS.time*15)*0.2:1+Math.sin(GS.time*4)*0.08;
    e.mesh.scale.setScalar(pulse);e.mesh.rotation.y+=dt*2;
    if(e.hatchTimer<=0){
      S.remove(e.mesh);GS.eggs.splice(i,1);
      const nr=new Rider(e.faction,Math.floor(Math.random()*3),false);
      nr.mesh.position.copy(e.mesh.position);
      nr.stats.level=Math.max(2,GS.wave);
      nr.stats.maxHP=Math.min(2+GS.wave,6);nr.stats.hp=nr.stats.maxHP;
      GS.riders.push(nr);
      GS.particles.emit(e.mesh.position,FC[e.faction].color,15,4,1);
      GS.floats.spawnRing(e.mesh.position,FC[e.faction].color,3);
      GS.floats.spawn(e.mesh.position,'HATCHED!',FC[e.faction].color,1.2);
      continue;
    }
    for(const r of GS.riders){
      if(!r.alive)continue;
      const d=dist2D(r.mesh.position,e.mesh.position);
      if(d<3.5&&r.faction!==e.faction){
        e.collected=true;
        const xp=e.xpValue;
        r.stats.addXP(xp);
        if(r.isPlayer){GS.score+=500*GS.combo;GS.combo++;GS.comboTimer=3;sfx.eggGet()}
        GS.particles.emit(e.mesh.position,0xffff00,12,3,1);
        GS.floats.spawn(e.mesh.position,`+${xp} XP`,0xffff00);
        GS.floats.spawnRing(e.mesh.position,0xffff00,2);
      }
    }
  }
}

/* ════════════════════════════════════════════
   POWERUPS
   ════════════════════════════════════════════ */
function updatePowerups(dt){
  for(let i=GS.powerups.length-1;i>=0;i--){
    const p=GS.powerups[i];
    p.life-=dt;p.time+=dt;
    if(p.life<=0){S.remove(p.mesh);GS.powerups.splice(i,1);continue}
    // Float & spin
    p.mesh.position.y+=Math.sin(p.time*3)*0.5*dt;
    p.mesh.rotation.y+=dt*2;p.mesh.rotation.x+=dt*0.5;
    // Blink when expiring
    if(p.life<3)p.mesh.visible=Math.floor(p.time*8)%2===0;
    // Collection by player (player priority)
    for(const r of GS.riders){
      if(!r.alive||!r.isPlayer)continue; // only player collects powerups
      const d=dist2D(r.mesh.position,p.mesh.position);
      if(d<4){
        applyPowerup(r,p.type);
        GS.particles.explode(p.mesh.position,0xffffff,15);
        GS.floats.spawn(p.mesh.position,p.icon,0xffffff,1.5);
        GS.floats.spawnRing(p.mesh.position,0xffffff,3);
        sfx.powerup();
        S.remove(p.mesh);GS.powerups.splice(i,1);
        break;
      }
    }
  }
}

function applyPowerup(rider,type){
  switch(type){
    case'heal':rider.stats.heal(2);GS.floats.spawn(rider.mesh.position.clone(),'+2 HP',0x44ff44,1.2);break;
    case'speed':rider.stats.speedTimer=10;GS.floats.spawn(rider.mesh.position.clone(),'SPEED!',0x44ccff,1.2);break;
    case'damage':rider.stats.dmgBoostTimer=10;GS.floats.spawn(rider.mesh.position.clone(),'DMG UP!',0xff4444,1.2);break;
    case'shield':rider.stats.shieldTimer=8;GS.floats.spawn(rider.mesh.position.clone(),'SHIELD!',0x44ffff,1.2);break;
    case'magnet':rider.stats.magnetTimer=12;GS.floats.spawn(rider.mesh.position.clone(),'MAGNET!',0xff44ff,1.2);break;
  }
}

/* ════════════════════════════════════════════
   DRAGON SPAWN
   ════════════════════════════════════════════ */
function updateDragon(dt){
  GS.dragonTimer-=dt;
  if(GS.dragonTimer<=0&&(!GS.dragon||!GS.dragon.alive)){
    GS.dragon=new DragonBoss(GS.wave);
    GS.dragonTimer=DRAGON_INT+GS.wave*5;
    showBanner('🐉 DRAGON INCOMING!');
    document.getElementById('boss-bar').style.display='block';
    document.getElementById('boss-label').textContent=`🐉 DRAGON (Wave ${GS.wave})`;
    document.getElementById('boss-fill').style.width='100%';
  }
  if(GS.dragon&&GS.dragon.alive)GS.dragon.update(dt,GS);
}

/* ════════════════════════════════════════════
   CAMERA
   ════════════════════════════════════════════ */
function updateCam(dt){
  const p=GS.player;if(!p)return;
  let tx=p.alive?p.mesh.position.x*0.35:0;
  let ty=p.alive?p.mesh.position.y*0.3+5:5;
  if(p.alive&&p.stats.targetAssist>0){
    let nearest=null,nd=999;
    for(const r of GS.riders){if(r===p||!r.alive||r.faction===p.faction)continue;const d=p.mesh.position.distanceTo(r.mesh.position);if(d<nd){nd=d;nearest=r}}
    if(nearest&&nd<20){const b=p.stats.targetAssist*0.3;tx+=(nearest.mesh.position.x-tx)*b;ty+=(nearest.mesh.position.y-ty)*b*0.5}
  }
  cam.position.x+=(tx-cam.position.x)*2.5*dt;cam.position.y+=(ty-cam.position.y)*2.5*dt;
  if(shakeAmt>0.1){cam.position.x+=(Math.random()-0.5)*shakeAmt*0.15;cam.position.y+=(Math.random()-0.5)*shakeAmt*0.15;shakeAmt*=0.92}else shakeAmt=0;
  cam.lookAt(new THREE.Vector3(cam.position.x,cam.position.y-2,0));
}

/* ════════════════════════════════════════════
   HUD + MINIMAP
   ════════════════════════════════════════════ */
function updateHUD(){
  ['cowboys','outlaws','law'].forEach(f=>{
    const rs=GS.riders.filter(r=>r.faction===f);
    const el=document.getElementById(f==='cowboys'?'cl':f==='outlaws'?'ol':'ll');
    el.innerHTML=rs.map(r=>{
      const hp=r.alive?'♥'.repeat(Math.max(0,Math.ceil(r.stats.hp))):(r.stats.maxHP>0?'⏳':'✗');
      const hunt=r.brain.huntPlayer&&!r.isPlayer?' 🎯':'';
      return `${r.name} L${r.stats.level}: ${hp}${r.isPlayer?' ◀YOU':''}${hunt}`;
    }).join('<br>');
  });
  document.getElementById('sc').textContent=`Score: ${GS.score}`;
  document.getElementById('cc').textContent=`Combo: x${GS.combo}`;
  document.getElementById('wv').textContent=`Wave ${GS.wave}`;
  const p=GS.player;
  if(p){
    document.getElementById('ps').textContent=p.alive?'♥'.repeat(Math.max(0,Math.ceil(p.stats.hp))):'Respawning...';
    const icons=[];if(p.stats.lanceLevel>=3)icons.push('⚡🔥');else if(p.stats.lanceLevel>=2)icons.push('⚡');else if(p.stats.lanceLevel>=1)icons.push('🔥');
    if(p.stats.shieldTimer>0)icons.push('🛡');if(p.stats.speedTimer>0)icons.push('💨');if(p.stats.dmgBoostTimer>0)icons.push('⚔️');if(p.stats.magnetTimer>0)icons.push('🧲');
    document.getElementById('plvl').textContent=`Lv.${p.stats.level} Sheriff ${icons.join('')}`;
    document.getElementById('php').style.width=`${Math.max(0,p.stats.hp/p.stats.maxHP*100)}%`;
    document.getElementById('pxp').style.width=`${Math.min(100,p.stats.xp/p.stats.xpNext*100)}%`;
  }
}

const mCv=document.getElementById('mc'),mCtx=mCv.getContext('2d');
function drawMinimap(){
  mCtx.fillStyle='rgba(10,6,8,0.8)';mCtx.fillRect(0,0,140,100);
  const sx=140/AW,sy=100/AH,ox=70,oy=50;
  mCtx.fillStyle='#3a2a0a';
  GS.platforms.forEach(p=>{mCtx.fillRect(ox+p.x*sx-p.w*sx/2,oy-p.y*sy-1,p.w*sx,2)});
  GS.riders.forEach(r=>{
    if(!r.alive)return;
    mCtx.fillStyle='#'+FC[r.faction].color.toString(16).padStart(6,'0');
    const x=ox+r.mesh.position.x*sx,y=oy-r.mesh.position.y*sy;
    if(r.isPlayer){mCtx.fillRect(x-3,y-3,6,6);mCtx.strokeStyle='#fff';mCtx.strokeRect(x-4,y-4,8,8)}
    else{
      if(r.brain.huntPlayer){mCtx.fillStyle='#ff0000';mCtx.fillRect(x-2,y-2,5,5)}
      else mCtx.fillRect(x-1,y-1,3,3);
    }
  });
  if(GS.dragon&&GS.dragon.alive){
    mCtx.fillStyle=GS.dragon.enraged?'#ff4444':'#44ff44';
    const x=ox+GS.dragon.mesh.position.x*sx,y=oy-GS.dragon.mesh.position.y*sy;
    mCtx.fillRect(x-3,y-3,7,7);
  }
  mCtx.fillStyle='#ffff00';
  GS.eggs.forEach(e=>{mCtx.beginPath();mCtx.arc(ox+e.mesh.position.x*sx,oy-e.mesh.position.y*sy,2,0,6.28);mCtx.fill()});
  mCtx.fillStyle='#ffffff';
  GS.powerups.forEach(p=>{mCtx.beginPath();mCtx.arc(ox+p.mesh.position.x*sx,oy-p.mesh.position.y*sy,2.5,0,6.28);mCtx.fill()});
}

function showBanner(txt){document.getElementById('wave-banner').textContent=txt;document.getElementById('wave-banner').style.opacity='1';GS.waveBannerTimer=3}

/* ════════════════════════════════════════════
   WAVES
   ════════════════════════════════════════════ */
function checkWave(){
  const eAlive=GS.riders.filter(r=>r.faction!=='cowboys'&&(r.alive||r.stats.maxHP>0));
  if(eAlive.length===0&&GS.eggs.length===0){
    GS.wave++;showBanner(`⚔️ WAVE ${GS.wave} ⚔️`);
    if(GS.player){GS.player.stats.heal(2);GS.floats.spawn(GS.player.mesh.position.clone(),'+2 HP',0x44ff44)}
    // Tougher enemies with evolved brains
    const bestAI=GS.riders.filter(x=>!x.isPlayer&&x.stats.veteranXP>0).sort((a,b)=>b.stats.veteranXP-a.stats.veteranXP)[0];
    ['outlaws','law'].forEach(f=>{
      for(let i=0;i<3;i++){
        const r=new Rider(f,i,false);
        r.stats.level=Math.max(1,GS.wave-1);
        for(let l=1;l<r.stats.level;l++)r.stats._lvl();
        r.stats.hp=r.stats.maxHP;
        if(bestAI)r.brain.copyFrom(bestAI.brain);
        // Spread out altitude preferences
        r.brain.preferredAltitude=FLOOR+6+((i+f.length)%5)*(CEIL-FLOOR-12)/5;
        r.brain.flyDir=i%2===0?1:-1;
        r.brain.patrolLane=i%2===0?1:-1;
        // More enemies hunt player in later waves
        r.brain.huntPlayer=Math.random()<Math.min(0.2+GS.wave*0.08,0.6);
        GS.riders.push(r);
      }
    });
    GS.dragonTimer=Math.max(8,DRAGON_INT-GS.wave*3);
  }
}

/* ════════════════════════════════════════════
   TARGETING ARROW
   ════════════════════════════════════════════ */
const arrowGeo=new THREE.ConeGeometry(0.3,0.8,4);
const arrowMat=new THREE.MeshBasicMaterial({color:0xff4444,transparent:true,opacity:0.6});
const targetArrow=new THREE.Mesh(arrowGeo,arrowMat);targetArrow.visible=false;S.add(targetArrow);
function updateArrow(){
  const p=GS.player;
  if(!p||!p.alive||p.stats.targetAssist<0.1){targetArrow.visible=false;return}
  let nearest=null,nd=999;
  for(const r of GS.riders){if(r===p||!r.alive||r.faction===p.faction||r.invincible>0)continue;const d=p.mesh.position.distanceTo(r.mesh.position);if(d<nd){nd=d;nearest=r}}
  if(nearest&&nd<25){
    targetArrow.visible=true;
    const dir=nearest.mesh.position.clone().sub(p.mesh.position).normalize();
    targetArrow.position.copy(p.mesh.position.clone().add(dir.multiplyScalar(3)));
    targetArrow.lookAt(nearest.mesh.position);targetArrow.rotation.x+=Math.PI/2;
    arrowMat.opacity=0.3+p.stats.targetAssist*0.5;
  }else targetArrow.visible=false;
}

/* ════════════════════════════════════════════
   LAVA ANIM
   ════════════════════════════════════════════ */
function animLava(t){
  S.traverse(o=>{if(o.userData.isBubble){o.position.y=FLOOR-2.5+Math.sin(t*2+o.userData.phase)*0.5;o.scale.setScalar(0.5+Math.sin(t*3+o.userData.phase)*0.3)}});
  lavaL.intensity=2+Math.sin(t*1.5)*0.5;
}

/* ════════════════════════════════════════════
   GAME LOOP
   ════════════════════════════════════════════ */
const clock=new THREE.Clock();
function loop(){
  requestAnimationFrame(loop);
  const dt=Math.min(clock.getDelta(),0.05);GS.time+=dt;
  if(!GS.gameStarted){
    cam.position.x=Math.sin(GS.time*0.3)*10;cam.position.y=5+Math.sin(GS.time*0.5)*3;
    cam.lookAt(0,0,0);animLava(GS.time);R.render(S,cam);return;
  }
  // Player input
  const p=GS.player;
  if(p&&p.alive){
    const spd=MSPD*p.stats.spdMult;
    if(GS.keys['ArrowLeft']||GS.keys['KeyA'])p.vx-=spd*dt*2.2;
    if(GS.keys['ArrowRight']||GS.keys['KeyD'])p.vx+=spd*dt*2.2;
    if(GS.keys['ArrowUp']||GS.keys['KeyW'])p.vz-=spd*0.3*dt;
    if(GS.keys['ArrowDown']||GS.keys['KeyS'])p.vz+=spd*0.3*dt;
    p.vx=THREE.MathUtils.clamp(p.vx,-spd,spd);
  }
  // Combo decay
  if(GS.comboTimer>0){GS.comboTimer-=dt;if(GS.comboTimer<=0)GS.combo=1}
  // Update
  GS.riders.forEach(r=>r.update(dt,GS));
  checkCombat(dt);
  updateEggs(dt);
  updatePowerups(dt);
  updateDragon(dt);
  GS.particles.update(dt);
  GS.floats.update(dt);
  GS.skewers.update(dt);
  updateCam(dt);
  animLava(GS.time);
  updateArrow();
  if(GS.waveBannerTimer>0){GS.waveBannerTimer-=dt;if(GS.waveBannerTimer<=0)document.getElementById('wave-banner').style.opacity='0'}
  checkWave();
  // Game over
  const cowAlive=GS.riders.filter(r=>r.faction==='cowboys'&&(r.alive||r.stats.maxHP>0));
  if(cowAlive.length===0&&!GS.gameOver){
    GS.gameOver=true;
    document.getElementById('center-hud').style.display='block';
    document.getElementById('tt').textContent='GAME OVER';
    document.getElementById('st').textContent=`Score: ${GS.score} — Wave ${GS.wave} — Level ${p?p.stats.level:1}`;
    document.getElementById('stxt').textContent='Refresh to play again';
  }
  updateHUD();drawMinimap();R.render(S,cam);
}
window.addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();R.setSize(innerWidth,innerHeight)});
loop();
</script>
