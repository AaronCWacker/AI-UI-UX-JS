<script id="SVG_BACKS">
// ════════════════════════════════════════════════════════════════════
//  PROCEDURAL SVG CARD BACKS
//  Each of the 80 saints gets a UNIQUE, deterministic back (seeded by id).
//  Backs reveal only the SUIT (Fire/Water/Air/Earth/Arcana) via iconography,
//  intricate geometric filigree, and a short moral/principle line.
//  No text identifying the saint — outward-facing, game-legal "deck back".
// ════════════════════════════════════════════════════════════════════
(function(){
  // ---- seeded PRNG (mulberry32) ----
  function rng(seed){let a=seed>>>0;return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}

  const SUIT = {
    Fire:   {c1:'#ff9d4a',c2:'#ff5a1f',c3:'#7a1505',glow:'#ffb870',ink:'#2a0a02',name:'WANDS',el:'FIRE',motif:'flame'},
    Water:  {c1:'#7fcaff',c2:'#2a7fe0',c3:'#0a2a5a',glow:'#aee0ff',ink:'#02122a',name:'CUPS',el:'WATER',motif:'wave'},
    Air:    {c1:'#e6ecff',c2:'#9fb0e8',c3:'#3a4a7a',glow:'#f4f7ff',ink:'#1a1f3a',name:'SWORDS',el:'AIR',motif:'blade'},
    Earth:  {c1:'#ffd66a',c2:'#d99a2a',c3:'#5a3a0a',glow:'#ffe9a8',ink:'#2a1a02',name:'PENTACLES',el:'EARTH',motif:'coin'},
    Arcana: {c1:'#e0a8ff',c2:'#a855f0',c3:'#3a0a6a',glow:'#f0d0ff',ink:'#1a0230',name:'ARCANA',el:'MYSTERY',motif:'star'}
  };

  function colorOf(saint){
    if(saint.color==='Fire')return 'Fire';
    if(saint.color==='Water')return 'Water';
    if(saint.color==='Air')return 'Air';
    if(saint.color==='Earth')return 'Earth';
    return 'Arcana';
  }

  // ── motif generators ──────────────────────────────────────────────
  function flame(r,cx,cy,s,col,ink){
    // multi-tongue flame: central plume + side licks, curved cubic edges
    const tongues=2+Math.floor(r()*3); // total flames
    let g='';
    function oneFlame(ox,scale,c){
      const h=s*scale, w=s*0.42*scale;
      const sway=(r()-0.5)*w*0.8;
      const top=cy-h+ox*0.0;
      // left edge up, curl at tip, right edge down — bezier
      const d=`M${cx+ox} ${cy+s*0.15}
        C${cx+ox-w} ${cy-h*0.2} ${cx+ox-w*0.5+sway} ${cy-h*0.55} ${cx+ox+sway*0.6} ${top}
        C${cx+ox+w*0.5+sway} ${cy-h*0.55} ${cx+ox+w} ${cy-h*0.2} ${cx+ox} ${cy+s*0.15} Z`;
      return `<path d="${d}" fill="${c}" opacity="0.92"/>`;
    }
    // back glow layers
    g+=`<g opacity="0.5">`+oneFlame(0,1.15,col)+`</g>`;
    g+=oneFlame(0,1.0,col);
    for(let i=0;i<tongues;i++){const side=(i%2?1:-1);const ox=side*s*(0.18+i*0.07);
      g+=oneFlame(ox,0.55-i*0.08,col);}
    // bright inner core
    g+=oneFlame((r()-0.5)*s*0.1,0.5,'#fff6e0');
    return g;
  }
  function wave(r,cx,cy,s,col){
    let g='';const rings=3+Math.floor(r()*3);
    for(let k=0;k<rings;k++){const rad=s*(0.3+k*0.28);let d=`M${cx-rad} ${cy}`;
      for(let a=0;a<=Math.PI*2+0.1;a+=0.3){const wob=1+Math.sin(a*4+k)*0.06*r();
        d+=`L${cx+Math.cos(a)*rad*wob} ${cy+Math.sin(a)*rad*wob} `;}
      g+=`<path d="${d}Z" fill="none" stroke="${col}" stroke-width="${1.4-k*0.15}" opacity="${0.8-k*0.12}"/>`;}
    return g;
  }
  function blade(r,cx,cy,s,col){
    const tilt=(r()-0.5)*0.5;const w=s*0.16;
    const dx=Math.sin(tilt),dy=-Math.cos(tilt);
    const tipx=cx+dx*s,tipy=cy+dy*s, bx=cx-dx*s*0.7,by=cy-dy*s*0.7;
    const px=-dy,py=dx;
    return `<g>
      <path d="M${tipx} ${tipy} L${cx+px*w} ${cy+py*w} L${bx+px*w*0.6} ${by+py*w*0.6} L${bx-px*w*0.6} ${by-py*w*0.6} L${cx-px*w} ${cy-py*w} Z" fill="${col}" opacity="0.92"/>
      <rect x="${bx-w*1.8}" y="${by-2}" width="${w*3.6}" height="4" fill="${col}" transform="rotate(${tilt*57},${bx},${by})" opacity="0.85"/>
      <circle cx="${bx-dx*s*0.18}" cy="${by-dy*s*0.18}" r="${w*0.7}" fill="${col}"/>
    </g>`;
  }
  function coin(r,cx,cy,s,col,ink){
    const pts=5;let star='';const rot=r()*Math.PI;
    for(let i=0;i<pts*2;i++){const a=rot+i*Math.PI/pts;const rad=(i%2?s*0.4:s*0.78);
      star+=`${cx+Math.cos(a-Math.PI/2)*rad} ${cy+Math.sin(a-Math.PI/2)*rad} `;}
    let g=`<circle cx="${cx}" cy="${cy}" r="${s}" fill="${col}" opacity="0.92"/>`;
    g+=`<circle cx="${cx}" cy="${cy}" r="${s*0.88}" fill="none" stroke="${ink}" stroke-width="1.5" opacity="0.5"/>`;
    // engraved runes around rim
    const runes=8+Math.floor(r()*8);
    for(let i=0;i<runes;i++){const a=i*Math.PI*2/runes;
      g+=`<line x1="${cx+Math.cos(a)*s*0.82}" y1="${cy+Math.sin(a)*s*0.82}" x2="${cx+Math.cos(a)*s*0.7}" y2="${cy+Math.sin(a)*s*0.7}" stroke="${ink}" stroke-width="1.4" opacity="0.45"/>`;}
    g+=`<polygon points="${star}" fill="${ink}" opacity="0.55"/>`;
    g+=`<polygon points="${star}" fill="none" stroke="${col}" stroke-width="0.8" opacity="0.6" transform="rotate(36,${cx},${cy})"/>`;
    return g;
  }
  function star(r,cx,cy,s,col){
    const pts=6+Math.floor(r()*3);let g='';
    for(let i=0;i<pts;i++){const a=i*Math.PI*2/pts;const len=s*(0.7+r()*0.5);
      g+=`<line x1="${cx}" y1="${cy}" x2="${cx+Math.cos(a)*len}" y2="${cy+Math.sin(a)*len}" stroke="${col}" stroke-width="${1.5+r()}" opacity="0.85"/>`;
      g+=`<circle cx="${cx+Math.cos(a)*len}" cy="${cy+Math.sin(a)*len}" r="${1.5+r()*2}" fill="${col}"/>`;}
    g+=`<circle cx="${cx}" cy="${cy}" r="${s*0.28}" fill="${col}" opacity="0.95"/>`;
    return g;
  }
  const MOTIF={flame,wave,blade,coin,star};

  // ── filigree border (unique per seed) ──────────────────────────────
  function filigree(r,W,H,col){
    let g='';const inset=14;const knots=4+Math.floor(r()*4);
    // corner flourishes
    [[inset,inset,1,1],[W-inset,inset,-1,1],[inset,H-inset,1,-1],[W-inset,H-inset,-1,-1]].forEach(([x,y,sx,sy])=>{
      const sz=10+r()*8;
      g+=`<path d="M${x} ${y} q${sx*sz} 0 ${sx*sz} ${sy*sz} q0 ${sy*sz*0.6} ${-sx*sz*0.5} ${sy*sz*0.6}" fill="none" stroke="${col}" stroke-width="1.4" opacity="0.7"/>`;
      g+=`<circle cx="${x+sx*sz}" cy="${y+sy*sz}" r="2.4" fill="${col}" opacity="0.8"/>`;
    });
    // edge knots along top & bottom
    for(let i=1;i<knots;i++){const x=inset+(W-2*inset)*i/knots;
      g+=`<circle cx="${x}" cy="${inset}" r="${1.4+r()*1.6}" fill="${col}" opacity="0.6"/>`;
      g+=`<circle cx="${x}" cy="${H-inset}" r="${1.4+r()*1.6}" fill="${col}" opacity="0.6"/>`;}
    return g;
  }

  // ── background radial weave ─────────────────────────────────────────
  function weave(r,W,H,col,n){
    let g='';const cx=W/2,cy=H/2;const rays=n;
    for(let i=0;i<rays;i++){const a=i*Math.PI*2/rays + r()*0.05;
      const len=Math.max(W,H);
      g+=`<line x1="${cx}" y1="${cy}" x2="${cx+Math.cos(a)*len}" y2="${cy+Math.sin(a)*len}" stroke="${col}" stroke-width="0.6" opacity="0.12"/>`;}
    const rings=4+Math.floor(r()*3);
    for(let k=1;k<=rings;k++){g+=`<circle cx="${cx}" cy="${cy}" r="${k/rings*Math.min(W,H)*0.46}" fill="none" stroke="${col}" stroke-width="0.5" opacity="0.1"/>`;}
    return g;
  }

  // ── MAIN: build one card back SVG string ───────────────────────────
  // wrapText helper for the moral line
  function wrapMoral(text,max){
    const words=text.split(' ');const lines=[];let cur='';
    for(const w of words){if((cur+' '+w).trim().length>max){lines.push(cur.trim());cur=w;}else cur+=' '+w;}
    if(cur.trim())lines.push(cur.trim());return lines;
  }

  window.buildCardBack = function(saint, W, H){
    W=W||280; H=H||420;
    const suitKey=colorOf(saint);const S=SUIT[suitKey];
    const r=rng(saint.id*2654435761 % 4294967296);
    const cx=W/2, cy=H*0.42;
    const gid='g'+saint.id;

    let svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">`;
    svg+=`<defs>
      <radialGradient id="bg${gid}" cx="50%" cy="40%" r="75%">
        <stop offset="0%" stop-color="${S.c2}"/>
        <stop offset="55%" stop-color="${S.c3}"/>
        <stop offset="100%" stop-color="${S.ink}"/>
      </radialGradient>
      <radialGradient id="hl${gid}" cx="50%" cy="42%" r="40%">
        <stop offset="0%" stop-color="${S.glow}" stop-opacity="0.55"/>
        <stop offset="100%" stop-color="${S.glow}" stop-opacity="0"/>
      </radialGradient>
      <linearGradient id="frame${gid}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#ffe27a"/><stop offset="50%" stop-color="#d4af37"/><stop offset="100%" stop-color="#8a6d1e"/>
      </linearGradient>
      <filter id="soft${gid}"><feGaussianBlur stdDeviation="1.1"/></filter>
    </defs>`;

    // base
    svg+=`<rect x="0" y="0" width="${W}" height="${H}" rx="16" fill="url(#bg${gid})"/>`;
    svg+=`<rect x="0" y="0" width="${W}" height="${H}" rx="16" fill="url(#hl${gid})"/>`;

    // background weave
    svg+=weave(r,W,H,S.glow, 16+Math.floor(r()*12));

    // gold double frame
    svg+=`<rect x="6" y="6" width="${W-12}" height="${H-12}" rx="12" fill="none" stroke="url(#frame${gid})" stroke-width="3"/>`;
    svg+=`<rect x="12" y="12" width="${W-24}" height="${H-24}" rx="9" fill="none" stroke="${S.glow}" stroke-width="0.8" opacity="0.5"/>`;
    svg+=filigree(r,W,H,'url(#frame'+gid+')');

    // rose-window tracery behind emblem (intricate, seed-varied)
    const petals=8+Math.floor(r()*8);
    svg+=`<g opacity="0.18">`;
    for(let i=0;i<petals;i++){const a=i*Math.PI*2/petals;const rr=W*0.30;
      const ex=cx+Math.cos(a)*rr, ey=cy+Math.sin(a)*rr;
      svg+=`<path d="M${cx} ${cy} Q${cx+Math.cos(a-0.18)*rr*0.7} ${cy+Math.sin(a-0.18)*rr*0.7} ${ex} ${ey} Q${cx+Math.cos(a+0.18)*rr*0.7} ${cy+Math.sin(a+0.18)*rr*0.7} ${cx} ${cy} Z" fill="none" stroke="${S.glow}" stroke-width="0.7"/>`;}
    svg+=`</g>`;

    // central emblem — layered motifs (count + scale vary per seed)
    const motif=MOTIF[S.motif];
    const layers=2+Math.floor(r()*3);
    svg+=`<g filter="url(#soft${gid})" opacity="0.4">`;
    for(let i=0;i<layers;i++){const sc=(W*0.32)*(1-i*0.16);
      svg+=motif(r,cx,cy,sc,S.glow,S.ink);}
    svg+=`</g>`;
    // crisp top motif
    svg+=motif(r,cx,cy,W*0.30,S.c1,S.ink);
    // satellite motifs around center
    const sats=Math.floor(r()*4);
    for(let i=0;i<sats;i++){const a=r()*Math.PI*2;const dist=W*0.34;
      svg+=`<g opacity="0.5">`+motif(r,cx+Math.cos(a)*dist,cy+Math.sin(a)*dist*0.7,W*0.07,S.c1,S.ink)+`</g>`;}

    // suit banner (element + suit name only — no saint identity)
    svg+=`<g text-anchor="middle" font-family="Cinzel, Georgia, serif">`;
    svg+=`<text x="${cx}" y="${H*0.70}" font-size="15" letter-spacing="3" fill="url(#frame${gid})" font-weight="700">${S.name}</text>`;
    svg+=`<text x="${cx}" y="${H*0.745}" font-size="8" letter-spacing="5" fill="${S.glow}" opacity="0.75">· ${S.el} ·</text>`;
    svg+=`</g>`;

    // divider
    svg+=`<line x1="${W*0.22}" y1="${H*0.775}" x2="${W*0.78}" y2="${H*0.775}" stroke="url(#frame${gid})" stroke-width="1" opacity="0.6"/>`;
    svg+=`<circle cx="${cx}" cy="${H*0.775}" r="2.2" fill="url(#frame${gid})"/>`;

    // moral / principle line — the wisdom essence
    const ml=wrapMoral('“'+saint.moral+'”', 30);
    svg+=`<g text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-style="italic" fill="${S.glow}">`;
    ml.forEach((line,i)=>{svg+=`<text x="${cx}" y="${H*0.82+i*15}" font-size="11.5" opacity="0.92">${escapeXml(line)}</text>`;});
    svg+=`</g>`;

    // small suit pip in each corner (game readability)
    const pip=PIP[suitKey];
    [[20,24],[W-20,24],[20,H-18],[W-20,H-18]].forEach(([px,py])=>{
      svg+=`<text x="${px}" y="${py}" text-anchor="middle" font-size="13" fill="${S.c1}" opacity="0.85">${pip}</text>`;});

    svg+=`</svg>`;
    return svg;
  };

  const PIP={Fire:'🔥',Water:'💧',Air:'⚔',Earth:'⬟',Arcana:'✦'};
  function escapeXml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  // expose suit lookup for the engine
  window.suitColorOf = colorOf;
  window.SUIT_THEME = SUIT;
})();

</script>
<script id="GAME_ENGINE">
// ════════════════════════════════════════════════════════════════════
//  SACRED GAMES ENGINE
//  Three games on the 80-saint tarot deck, all vs. an AI adversary.
//   1) ARCANUM DUEL  — Magic-compatible: 40-card decks, lands tap for mana,
//                       mana cost summons creatures, instants react, Major
//                       Arcana are planeswalker-tier. Stack + priority.
//   2) WAR OF SAINTS  — fast duel; higher virtue-rank wins, suits trump.
//   3) CONCENTRATION  — memory match on suit-pairs; AI remembers per difficulty.
// ════════════════════════════════════════════════════════════════════
const Game = (function(){
  let SAINTS=[];            // injected
  function setData(d){SAINTS=d;}

  // ---- helpers ----
  const $=s=>document.querySelector(s);
  const el=(t,c)=>{const e=document.createElement(t);if(c)e.className=c;return e;};
  function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
  const SUIT_GLYPH={Fire:'🔥',Water:'💧',Air:'⚔',Earth:'⬟',Arcana:'✦'};
  const SUIT_VAR={Fire:'--fire',Water:'--water',Air:'--air',Earth:'--earth',Arcana:'--arcana'};
  let difficulty=3;
  function setDifficulty(d){difficulty=d;}

  // ─────────────────────────────────────────────────────────────────
  //  LOGGING
  // ─────────────────────────────────────────────────────────────────
  function log(msg,cls){const lg=$('#gamelog');if(!lg)return;const e=el('div','le '+(cls||'sys'));e.innerHTML=msg;lg.insertBefore(e,lg.firstChild);while(lg.children.length>60)lg.removeChild(lg.lastChild);}
  function feedback(t){const f=$('#feedback');f.textContent=t;f.style.opacity=1;clearTimeout(f._t);f._t=setTimeout(()=>f.style.opacity=0,900);}

  // ═══════════════════════════════════════════════════════════════════
  //  DECK CONSTRUCTION  (40-card Magic-style)
  //  ~17 lands (basics + shrine saints), ~16 creatures, ~4 instants, ~3 arcana
  // ═══════════════════════════════════════════════════════════════════
  let basicLandSeq=0;
  function basicLand(element){
    const themeName={Fire:'Pyre',Water:'Spring',Air:'Aerie',Earth:'Shrine'}[element];
    return {
      id:'L'+(basicLandSeq++), name:themeName, isBasic:true, isLand:true,
      kind:'land', color:element, cost:0, power:0, tough:0,
      moral:'', card:'Land · '+element, classifier:'Basic Land',
      emojis:SUIT_GLYPH[element], continent:'', virtues:'Mana',
    };
  }
  // build a focused, playable 40-card deck around 1-2 elements
  function buildDeck(elementFocus){
    const pool=SAINTS.filter(s=>!s.isLand); // saints (creatures/instants/arcana)
    const colorMatch=s=> elementFocus.includes(s.color) || s.color==='Arcana';
    let spells=shuffle(pool.filter(colorMatch));
    // pick spells by cost curve: prefer cheaper, cap arcana at 4
    let chosen=[],arcanaCount=0,curve={};
    for(const s of spells){
      if(chosen.length>=23)break;
      if(s.kind==='arcana'){ if(arcanaCount>=4)continue; arcanaCount++; }
      const c=Math.min(s.cost,7); curve[c]=(curve[c]||0)+1;
      if(c>=6 && (curve[c]>3))continue; // limit top end
      chosen.push(clone(s));
    }
    // pad to 23 spells if short
    let i=0;while(chosen.length<23 && i<spells.length){chosen.push(clone(spells[i++]));}
    chosen=chosen.slice(0,23);
    // 17 lands: split across the focus elements (+a few Earth shrines if available)
    const lands=[];
    const els=elementFocus.length?elementFocus:['Earth'];
    for(let k=0;k<17;k++)lands.push(basicLand(els[k%els.length]));
    const deck=shuffle(chosen.concat(lands));
    return deck;
  }
  function clone(s){return Object.assign({},s);}

  // assign a fresh instance id to every card drawn into play
  let instSeq=0;
  function instate(card){const c=clone(card);c.iid='i'+(instSeq++);c.tapped=false;c.summonSick=true;c.dmg=0;return c;}

  // ═══════════════════════════════════════════════════════════════════
  //  ARCANUM DUEL  (Magic-compatible)
  // ═══════════════════════════════════════════════════════════════════
  const A={ // state
    me:null, ai:null, turn:'me', phase:'main1', stack:[],
    started:false, gameOver:false, pendingTarget:null, firstTurn:true,
  };
  function freshPlayer(elementFocus,isAI){
    const deck=buildDeck(elementFocus);
    const p={
      deck, hand:[], lands:[], field:[], grave:[], life:20,
      manaPool:{Fire:0,Water:0,Air:0,Earth:0,Arcana:0}, isAI:!!isAI,
      landedThisTurn:false, elementFocus,
    };
    for(let i=0;i<7;i++)draw(p);
    return p;
  }
  function draw(p,n){n=n||1;for(let k=0;k<n;k++){if(!p.deck.length){p.life-=1;log((p.isAI?'Adversary':'You')+' drew from an empty deck — a life fades.',p.isAI?'ai':'you');continue;}p.hand.push(instate(p.deck.pop()));}}

  function startArcanum(){
    instSeq=0;basicLandSeq=0;
    // player gets to face a themed adversary; player deck = balanced 2-color
    A.me=freshPlayer(['Fire','Water'],false);
    // AI element focus scales with difficulty (higher = more synergistic/aggressive)
    const aiFocus= difficulty>=4?['Fire','Air'] : difficulty>=2?['Earth','Water'] : ['Water','Earth'];
    A.ai=freshPlayer(aiFocus,true);
    A.turn='me';A.phase='main1';A.stack=[];A.started=true;A.gameOver=false;A.firstTurn=true;
    A.me.landedThisTurn=false;A.ai.landedThisTurn=false;
    log('⚔ Arcanum Duel begins. You hold the line at 20 life.','sys');
    log('Play a land, then summon saints with their mana cost.','sys');
    renderArcanum();
    showPhasebar(true);
  }

  function totalMana(p){ // available (untapped lands) by color + total
    const avail={Fire:0,Water:0,Air:0,Earth:0,Arcana:0,total:0};
    p.lands.forEach(l=>{if(!l.tapped){avail[l.color]++;avail.total++;}});
    return avail;
  }
  function canAfford(p,card){
    const m=totalMana(p);
    // generic cost: any mana pays. (Color-light ruleset for approachability.)
    return m.total>=card.cost;
  }
  function payMana(p,cost){ // tap lands, prefer off-color first to keep options
    let need=cost;const order=p.lands.filter(l=>!l.tapped);
    for(const l of order){if(need<=0)break;l.tapped=true;need--;}
  }

  // ---- play actions (human) ----
  function humanPlayFromHand(iid){
    if(A.turn!=='me'||A.gameOver)return;
    const idx=A.me.hand.findIndex(c=>c.iid===iid);if(idx<0)return;
    const card=A.me.hand[idx];
    if(card.isLand){
      if(A.me.landedThisTurn){feedback('One land per turn');return;}
      if(A.phase!=='main1'&&A.phase!=='main2'){feedback('Lands only in Main');return;}
      A.me.hand.splice(idx,1);card.tapped=false;A.me.lands.push(card);A.me.landedThisTurn=true;
      log('You consecrate a '+card.name+' ('+SUIT_GLYPH[card.color]+').','you');
      renderArcanum();return;
    }
    if(card.kind==='instant'){
      if(!canAfford(A.me,card)){feedback('Not enough mana');return;}
      // instants can target; resolve simply
      beginCast(A.me,card,idx);return;
    }
    // creature / arcana — sorcery speed (main phase, empty stack)
    if(A.phase!=='main1'&&A.phase!=='main2'){feedback('Summon in Main phase');return;}
    if(!canAfford(A.me,card)){feedback('Not enough mana');return;}
    payMana(A.me,card.cost);A.me.hand.splice(idx,1);
    const inst=card;inst.summonSick=true;inst.tapped=false;inst.dmg=0;
    A.me.field.push(inst);
    log('You summon <b>'+card.name+'</b> '+manaStr(card.cost)+(card.kind==='arcana'?' — an Arcanum!':'')+'.','you');
    if(card.kind==='arcana')resolveArcanaETB(A.me,A.ai,inst);
    renderArcanum();
  }
  function manaStr(c){return '('+c+'💎)';}

  function beginCast(caster,card,handIdx){
    // simple instants: damage / heal / boost depending on suit+rank
    const eff=instantEffect(card);
    if(eff.needsTarget){
      A.pendingTarget={caster,card,handIdx,eff};
      banner('Choose a target for '+card.name+' — '+eff.desc);
    }else{
      payMana(caster,card.cost);caster.hand.splice(handIdx,1);
      applyInstant(caster, caster===A.me?A.ai:A.me, card, eff, null);
      renderArcanum();
    }
  }
  function instantEffect(card){
    // Air swords = damage; Water cups = heal/draw
    if(card.color==='Air'){return {type:'bolt',amt:card.cost+1,needsTarget:true,desc:'deal '+(card.cost+1)+' to any saint or the adversary'};}
    if(card.color==='Water'){return {type:'bless',amt:card.cost+2,needsTarget:false,desc:'gain '+(card.cost+2)+' life'};}
    return {type:'bolt',amt:card.cost,needsTarget:true,desc:'deal '+card.cost};
  }
  function applyInstant(caster,foe,card,eff,target){
    if(eff.type==='bless'){caster.life+=eff.amt;log((caster.isAI?'Adversary':'You')+' invoke '+card.name+': +'+eff.amt+' life.',caster.isAI?'ai':'you');}
    else if(eff.type==='bolt'){
      if(target==='face'){foe.life-=eff.amt;log((caster.isAI?'Adversary':'You')+' strike with '+card.name+' for '+eff.amt+'.',caster.isAI?'ai':'you');}
      else if(target&&target.iid){target.dmg+=eff.amt;log((caster.isAI?'Adversary':'You')+' smite '+target.name+' ('+eff.amt+').',caster.isAI?'ai':'you');checkDeaths();}
    }
    caster.grave.push(card);
    checkWin();
  }

  // Major Arcana enter-the-battlefield powers (planeswalker-tier one-shots)
  function resolveArcanaETB(owner,foe,card){
    const n=card.name;
    // theme each arcanum loosely to its meaning
    if(/Sun|Star|Empress/.test(card.card)){owner.life+=5;log('☀ '+n+' radiates: +5 life.',owner.isAI?'ai':'you');}
    else if(/Tower|Devil|Death|Judgement|Judgment/.test(card.card)){foe.field.forEach(c=>c.dmg+=2);log('🔥 '+n+' shakes the field: 2 to all enemy saints.',owner.isAI?'ai':'you');checkDeaths();}
    else if(/Justice|Emperor|Hierophant/.test(card.card)){
      // tap down all enemy creatures
      foe.field.forEach(c=>c.tapped=true);log('⚖ '+n+' commands: all enemy saints tapped.',owner.isAI?'ai':'you');}
    else if(/Magician|High Priestess|Wheel/.test(card.card)){draw(owner,2);log('✦ '+n+' reveals: draw 2.',owner.isAI?'ai':'you');}
    else if(/Strength|Chariot|World/.test(card.card)){owner.field.forEach(c=>{if(c.kind==='creature'){c.power+=1;c.tough+=1;}});log('💪 '+n+' inspires: +1/+1 to your saints.',owner.isAI?'ai':'you');}
    else {owner.life+=3;log('✦ '+n+' blesses: +3 life.',owner.isAI?'ai':'you');}
    checkWin();
  }

  // ---- combat ----
  let attackers=[]; // iids declared
  function toggleAttacker(iid){
    if(A.turn!=='me'||A.phase!=='combat')return;
    const c=A.me.field.find(x=>x.iid===iid);if(!c||c.kind!=='creature')return;
    if(c.tapped||c.summonSick){feedback(c.summonSick?'Summoning sick':'Tapped');return;}
    const i=attackers.indexOf(iid);
    if(i<0)attackers.push(iid);else attackers.splice(i,1);
    renderArcanum();
  }
  function resolveCombat(atkList,defender,attacker){
    // AI blocks: assign blockers greedily (best trade) based on difficulty
    const atk=atkList.map(iid=>attacker.field.find(c=>c.iid===iid)).filter(Boolean);
    const blockers=defender.field.filter(c=>c.kind==='creature'&&!c.tapped);
    const assignments=aiAssignBlocks(atk,blockers);
    atk.forEach(a=>{
      const b=assignments[a.iid];
      if(b){
        b.dmg+=a.power; a.dmg+=b.power;
        log((attacker.isAI?'Adversary ':'Your ')+a.name+' clashes with '+b.name+'.',attacker.isAI?'ai':'you');
      }else{
        defender.life-=a.power;
        log((attacker.isAI?'Adversary ':'Your ')+a.name+' strikes for '+a.power+'.',attacker.isAI?'ai':'you');
      }
      a.tapped=true;
    });
    checkDeaths();checkWin();
  }
  function aiAssignBlocks(attackers,blockers){
    const a={};const avail=blockers.slice();
    // difficulty governs how cleverly AI blocks
    const sorted=attackers.slice().sort((x,y)=>y.power-x.power);
    for(const atk of sorted){
      if(!avail.length)break;
      // find a blocker that survives & kills, else chump only if low life / high difficulty
      let best=null,bestScore=-1e9;
      for(const b of avail){
        const kills=b.power>=atk.tough-atk.dmg;
        const survives=atk.power<b.tough-b.dmg;
        let score=(kills?5:0)+(survives?3:0)-b.power*0.2;
        if(difficulty<=2)score+= (Math.random()*4-2); // sloppy
        if(score>bestScore){bestScore=score;best=b;}
      }
      const wouldChump=!(best && best.power>=atk.tough);
      const lowLife=A.ai.life<=atk.power+2;
      if(best && (bestScore>3 || lowLife || (difficulty>=4&&wouldChump&&A.ai.life<10))){
        a[atk.iid]=best;avail.splice(avail.indexOf(best),1);
      }
    }
    return a;
  }
  function checkDeaths(){
    [A.me,A.ai].forEach(p=>{
      const dead=p.field.filter(c=>c.kind==='creature'&&c.dmg>=c.tough);
      dead.forEach(c=>{p.grave.push(c);log((p.isAI?'Adversary ':'Your ')+c.name+' falls.',p.isAI?'ai':'you');});
      p.field=p.field.filter(c=>!(c.kind==='creature'&&c.dmg>=c.tough));
      // arcana persist as enchantment-like; clear lethal-damaged arcana too
    });
  }
  function checkWin(){
    if(A.gameOver)return;
    if(A.ai.life<=0){A.gameOver=true;log('🏆 The adversary is undone. Victory is yours.','you');feedback('VICTORY');showPhasebar(false);}
    else if(A.me.life<=0){A.gameOver=true;log('☠ Your light is spent. The adversary prevails.','ai');feedback('DEFEAT');showPhasebar(false);}
  }

  // ---- phase / turn flow ----
  const PHASES=['main1','combat','main2','end'];
  function advancePhase(){
    if(A.turn!=='me'||A.gameOver)return;
    if(A.phase==='combat'&&attackers.length){
      resolveCombat(attackers,A.ai,A.me);attackers=[];renderArcanum();
      if(A.gameOver)return;
    }
    const i=PHASES.indexOf(A.phase);
    if(i<PHASES.length-1){A.phase=PHASES[i+1];renderArcanum();}
    else{ endMyTurn(); }
  }
  function endMyTurn(){
    A.me.field.forEach(c=>c.summonSick=false);
    A.turn='ai';A.phase='main1';renderArcanum();
    setTimeout(aiTurn, 650);
  }
  function startMyTurn(){
    A.turn='me';A.phase='main1';A.me.landedThisTurn=false;
    A.me.lands.forEach(l=>l.tapped=false);
    A.me.field.forEach(c=>{c.tapped=false;c.dmg=0;c.summonSick=c.summonSick&&false;});
    A.me.field.forEach(c=>c.summonSick=false);
    if(!A.firstTurn)draw(A.me);
    A.firstTurn=false;
    log('— Your turn —','sys');renderArcanum();
  }

  // ═══════════════════════════════════════════════════════════════════
  //  AI TURN  (priority-style, difficulty-scaled)
  // ═══════════════════════════════════════════════════════════════════
  function aiTurn(){
    if(A.gameOver)return;
    const ai=A.ai, foe=A.me;
    ai.landedThisTurn=false;ai.lands.forEach(l=>l.tapped=false);
    ai.field.forEach(c=>{c.tapped=false;c.dmg=0;});
    draw(ai);
    log('— Adversary\'s turn —','sys');
    // 1) play a land (prefer the color it's shortest on)
    const landCard=ai.hand.find(c=>c.isLand);
    if(landCard){ai.hand.splice(ai.hand.indexOf(landCard),1);landCard.tapped=false;ai.lands.push(landCard);ai.landedThisTurn=true;}
    // 2) cast spells greedily within mana, smartest at high difficulty
    let acted=true,guard=0;
    while(acted&&guard++<12){
      acted=false;
      const mana=totalMana(ai).total;
      // candidate plays sorted by value
      const plays=ai.hand.filter(c=>!c.isLand&&c.cost<=mana);
      if(!plays.length)break;
      // value heuristic
      plays.sort((a,b)=>playValue(b,ai,foe)-playValue(a,ai,foe));
      // low difficulty: sometimes pick randomly / skip
      let pick=plays[0];
      if(difficulty<=2&&Math.random()<0.35)pick=plays[Math.floor(Math.random()*plays.length)];
      if(difficulty<=1&&Math.random()<0.25)break; // sometimes just stops
      if(pick.kind==='instant'){
        const eff=instantEffect(pick);
        payMana(ai,pick.cost);ai.hand.splice(ai.hand.indexOf(pick),1);
        let target=null;
        if(eff.needsTarget){
          // target biggest threat or face if lethal
          const threats=foe.field.filter(c=>c.kind==='creature');
          if(foe.life<=eff.amt && difficulty>=2)target='face';
          else if(threats.length){threats.sort((a,b)=>b.power-a.power);target=threats[0];}
          else target='face';
        }
        applyInstant(ai,foe,pick,eff,target);
      }else{
        payMana(ai,pick.cost);ai.hand.splice(ai.hand.indexOf(pick),1);
        pick.summonSick=true;pick.tapped=false;pick.dmg=0;ai.field.push(pick);
        log('Adversary summons <b>'+pick.name+'</b> '+manaStr(pick.cost)+'.','ai');
        if(pick.kind==='arcana')resolveArcanaETB(ai,foe,pick);
      }
      acted=true;
      if(A.gameOver){renderArcanum();return;}
    }
    renderArcanum();
    // 3) attack with non-sick creatures
    setTimeout(()=>{
      if(A.gameOver)return;
      const canAttack=ai.field.filter(c=>c.kind==='creature'&&!c.summonSick&&!c.tapped);
      // decide attackers: at high difficulty, attack when profitable; low = swing all
      let atkers=canAttack;
      if(difficulty>=3){
        const myBlockers=foe.field.filter(c=>c.kind==='creature'&&!c.tapped);
        atkers=canAttack.filter(a=>{
          // attack if unblocked damage likely or trade favorable
          if(!myBlockers.length)return true;
          const wouldDie=myBlockers.some(b=>b.power>=a.tough);
          const kills=myBlockers.every(b=>a.power>=b.tough);
          return !wouldDie || kills || foe.life<=a.power;
        });
      }
      if(atkers.length){
        log('Adversary attacks with '+atkers.length+' saint(s).','ai');
        resolveCombatAI(atkers, foe);
      }
      renderArcanum();
      if(!A.gameOver)setTimeout(startMyTurn,500);
    }, 500);
  }
  function resolveCombatAI(atkers,defender){
    // human gets auto-block at low difficulty? No — human pre-assigned none; let them block via prompt-lite:
    // For approachability we auto-assign player's untapped blockers to biggest threats.
    const blockers=defender.field.filter(c=>c.kind==='creature'&&!c.tapped&&!c.summonSick);
    const assign={};const avail=blockers.slice();
    atkers.slice().sort((a,b)=>b.power-a.power).forEach(a=>{
      // player auto-blocks to survive lethal, else favorable trade
      let best=null;
      for(const b of avail){const kills=b.power>=a.tough;const survives=a.power<b.tough;
        if(kills&&survives){best=b;break;}}
      if(!best)for(const b of avail){if(b.power>=a.tough){best=b;break;}}
      if(best && defender.life>a.power && Math.random()<0.5 && !(best.power>=a.tough)){best=null;} // sometimes take it
      if(defender.life<=atkers.reduce((s,x)=>s+x.power,0) && avail.length){best=best||avail[0];} // chump if lethal
      if(best){assign[a.iid]=best;avail.splice(avail.indexOf(best),1);}
    });
    atkers.forEach(a=>{const b=assign[a.iid];
      if(b){b.dmg+=a.power;a.dmg+=b.power;log('Your '+b.name+' blocks '+a.name+'.','you');}
      else{defender.life-=a.power;log('Adversary '+a.name+' hits you for '+a.power+'.','ai');}
      a.tapped=true;});
    checkDeaths();checkWin();
  }

  function playValue(card,owner,foe){
    if(card.kind==='arcana')return 100+card.cost;
    if(card.kind==='instant'){const e=instantEffect(card);return (e.type==='bolt'? (foe.field.length?40:25):30)+card.cost;}
    return 10+card.power*2+card.tough+card.cost; // creatures
  }

  // ─────────────────────────────────────────────────────────────────
  //  TARGETING (human instants / clicks)
  // ─────────────────────────────────────────────────────────────────
  function clickTargetCreature(p,iid){
    if(!A.pendingTarget)return false;
    const {caster,card,handIdx,eff}=A.pendingTarget;
    const target=p.field.find(c=>c.iid===iid);if(!target)return false;
    payMana(caster,card.cost);caster.hand.splice(handIdx,1);
    applyInstant(caster, caster===A.me?A.ai:A.me, card, eff, target);
    A.pendingTarget=null;banner(null);renderArcanum();return true;
  }
  function clickTargetFace(){
    if(!A.pendingTarget)return;
    const {caster,card,handIdx,eff}=A.pendingTarget;
    payMana(caster,card.cost);caster.hand.splice(handIdx,1);
    applyInstant(caster, caster===A.me?A.ai:A.me, card, eff, 'face');
    A.pendingTarget=null;banner(null);renderArcanum();
  }
  function banner(t){const b=$('#targetbanner');if(t){b.textContent=t;b.classList.add('show');}else b.classList.remove('show');}

  // ═══════════════════════════════════════════════════════════════════
  //  RENDER — Arcanum board
  // ═══════════════════════════════════════════════════════════════════
  function miniCard(card,opts){
    opts=opts||{};
    const c=el('div','mc'+(card.isLand?' land':'')+(card.tapped?' tapped':'')+(card.summonSick&&card.kind==='creature'?' summon-sick':''));
    c.dataset.iid=card.iid||card.id;
    if(opts.faceDown){c.classList.add('face-down');c.innerHTML=window.buildCardBack(card,74,108);return wireHover(c,card,opts);}
    const suitVar=getComputedStyle(document.documentElement).getPropertyValue(SUIT_VAR[card.color]).trim()||'#d4af37';
    c.style.borderColor=suitVar;
    let inner=`<div class="nm">${card.name}</div>`;
    if(!card.isLand)inner+=`<div class="cost">${card.cost}</div>`;
    inner+=`<div class="art" style="color:${suitVar}">${(card.emojis||'').split(',')[0]}</div>`;
    inner+=`<div class="typ">${card.isLand?'Land':card.kind==='arcana'?'Arcanum':card.kind==='instant'?'Instant':card.classifier.split(' ')[0]}</div>`;
    if(card.kind==='creature')inner+=`<div class="pt">${card.power}/${card.tough-(card.dmg||0)}</div>`;
    if(card.isLand)inner+=`<div class="pip">${SUIT_GLYPH[card.color]}</div>`;
    c.innerHTML=inner;
    if(opts.attacker)c.classList.add('atk');
    if(opts.canplay)c.classList.add('canplay');
    return wireHover(c,card,opts);
  }
  function wireHover(c,card,opts){
    c.addEventListener('mouseenter',()=>showPeek(card,c));
    c.addEventListener('mouseleave',hidePeek);
    if(opts.onClick)c.addEventListener('click',e=>{e.stopPropagation();opts.onClick(card);});
    return c;
  }
  function showPeek(card,anchor){
    if(card.isBasic)return;
    const pk=$('#peek');pk.innerHTML=window.buildCardBack(card,230,345);
    const r=anchor.getBoundingClientRect();
    let x=r.right+8;if(x+240>innerWidth)x=r.left-240;
    let y=Math.max(60,Math.min(r.top, innerHeight-360));
    pk.style.left=x+'px';pk.style.top=y+'px';pk.classList.add('show');
  }
  function hidePeek(){$('#peek').classList.remove('show');}

  function renderArcanum(){
    if(!A.started)return;
    const z=id=>{const e=$(id);[...e.querySelectorAll('.mc')].forEach(n=>n.remove());return e;};
    // opponent
    const oppBf=z('#z-opp-bf'),oppLand=z('#z-opp-land');
    A.ai.field.forEach(c=>oppBf.appendChild(miniCard(c,{onClick:card=>{ if(A.pendingTarget)clickTargetCreature(A.ai,card.iid);}})));
    A.ai.lands.forEach(c=>oppLand.appendChild(miniCard(c)));
    // mid stack (instants resolve immediately in this ruleset; show pending target)
    z('#z-stack');
    // me
    const meBf=z('#z-me-bf'),meLand=z('#z-me-land');
    A.me.field.forEach(c=>{
      const isAtk=attackers.includes(c.iid);
      meBf.appendChild(miniCard(c,{attacker:isAtk,onClick:card=>{
        if(A.pendingTarget){clickTargetCreature(A.me,card.iid);return;}
        if(A.phase==='combat')toggleAttacker(card.iid);
      }}));
    });
    A.me.lands.forEach(c=>meLand.appendChild(miniCard(c)));
    // hand
    const hand=$('#hand');hand.innerHTML='';
    A.me.hand.forEach(c=>{
      const playable=A.turn==='me'&&((c.isLand&&!A.me.landedThisTurn&&(A.phase==='main1'||A.phase==='main2'))||(!c.isLand&&canAfford(A.me,c)&&(c.kind==='instant'||A.phase==='main1'||A.phase==='main2')));
      hand.appendChild(miniCard(c,{canplay:playable,onClick:card=>humanPlayFromHand(card.iid)}));
    });
    // stats
    const m=totalMana(A.me),om=totalMana(A.ai);
    $('#me-life').textContent=A.me.life;$('#me-deck').textContent=A.me.deck.length;$('#me-mana').textContent=m.total;
    $('#opp-life').textContent=A.ai.life;$('#opp-hand').textContent=A.ai.hand.length;$('#opp-deck').textContent=A.ai.deck.length;$('#opp-mana').textContent=om.total;
    // phase indicator
    document.querySelectorAll('#phasebar .ph').forEach(p=>p.classList.toggle('on',p.dataset.ph===A.phase&&A.turn==='me'));
    $('#advance').textContent = A.turn==='me' ? (A.phase==='combat'&&attackers.length?'Attack ▸':A.phase==='end'?'End Turn ▸':'Next ▸') : 'Adversary…';
    $('#advance').disabled = A.turn!=='me';
  }
  function showPhasebar(on){$('#phasebar').style.display=on?'flex':'none';$('#hand').style.display=on?'flex':'none';$('#gamelog').style.display=on?'block':'none';}

  // face click = target adversary face
  function wireFaceClicks(){
    $('#opp-life').closest('.pbar').addEventListener('click',()=>{if(A.pendingTarget)clickTargetFace();});
  }

  // ═══════════════════════════════════════════════════════════════════
  //  WAR OF SAINTS  (fast)
  //  Each flips top card. Compare virtue-rank (cost). Suit trumps on ties:
  //  Arcana>Fire>Air>Water>Earth (a wheel of dominance). Winner takes both.
  // ═══════════════════════════════════════════════════════════════════
  const W={me:[],ai:[],pile:[],over:false};
  const TRUMP=['Earth','Water','Air','Fire','Arcana'];
  function startWar(){
    const d=shuffle(SAINTS.filter(s=>!s.isBasic).map(clone));
    const half=Math.floor(d.length/2);
    W.me=d.slice(0,half);W.ai=d.slice(half,half*2);W.pile=[];W.over=false;
    log('⚡ War of Saints. '+W.me.length+' cards each. Flip to fight.','sys');
    renderWar(null,null,'Flip a card to begin.');
  }
  function warFlip(){
    if(W.over)return;
    if(!W.me.length||!W.ai.length){endWar();return;}
    const a=W.me.shift(),b=W.ai.shift();
    const av=warValue(a),bv=warValue(b);
    let res;
    if(av>bv)res='you';else if(bv>av)res='ai';
    else{ // tie → suit trump
      const at=TRUMP.indexOf(a.color),bt=TRUMP.indexOf(b.color);
      res= at>bt?'you': bt>at?'ai':'war';
    }
    if(res==='war'){
      W.pile.push(a,b);
      // war: each burns up to 2 then flips
      const burnA=W.me.splice(0,Math.min(2,W.me.length));const burnB=W.ai.splice(0,Math.min(2,W.ai.length));
      W.pile.push(...burnA,...burnB);
      renderWar(a,b,'⚔ WAR! Tied in rank and suit — spoils mount.');
      setTimeout(warFlip,900);return;
    }
    const spoils=[a,b,...W.pile];W.pile=[];
    if(res==='you'){W.me.push(...shuffle(spoils));feedback('You take it');}
    else{W.ai.push(...shuffle(spoils));feedback('Adversary takes it');}
    renderWar(a,b, res==='you'?'You win the exchange (+'+spoils.length+').':'Adversary wins (+'+spoils.length+').',res);
    if(!W.me.length||!W.ai.length)setTimeout(endWar,400);
  }
  function warValue(c){let v=c.cost||c.power||1;if(c.kind==='arcana')v+=4;return v;}
  function endWar(){W.over=true;const win=W.me.length>W.ai.length;log(win?'🏆 You hold the most relics. Victory.':'☠ The adversary prevails.',win?'you':'ai');feedback(win?'VICTORY':'DEFEAT');}
  function renderWar(a,b,msg,res){
    const board=$('#board');
    let arena=$('#war-arena');
    if(!arena){arena=el('div');arena.id='war-arena';arena.style.cssText='position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;';board.appendChild(arena);}
    arena.innerHTML='';
    const top=el('div');top.style.cssText='display:flex;gap:40px;align-items:center;';
    const youWrap=el('div');youWrap.style.cssText='text-align:center;';
    const aiWrap=el('div');aiWrap.style.cssText='text-align:center;';
    aiWrap.appendChild(labeled('Adversary · '+W.ai.length+' cards'));
    if(b)aiWrap.appendChild(bigCard(b,res==='ai'));else aiWrap.appendChild(faceDownStack());
    youWrap.appendChild(labeled('You · '+W.me.length+' cards'));
    if(a)youWrap.appendChild(bigCard(a,res==='you'));else youWrap.appendChild(faceDownStack());
    top.appendChild(aiWrap);
    const vs=el('div');vs.style.cssText='font-family:var(--display);font-size:2rem;color:var(--gold);';vs.textContent='⚔';top.appendChild(vs);
    top.appendChild(youWrap);
    arena.appendChild(top);
    const m=el('div');m.style.cssText='font-family:var(--display);color:var(--gold-bright);font-size:1rem;letter-spacing:.05em;min-height:24px;text-align:center;';m.textContent=msg||'';arena.appendChild(m);
    const btn=el('button','turnbtn');btn.style.cssText='font-family:var(--display);font-size:1rem;padding:12px 30px;border-radius:12px;border:1px solid var(--gold);background:linear-gradient(135deg,#8a6d1e,#d4af37);color:#180e02;cursor:pointer;';
    btn.textContent=W.over?'Game Over':'Flip ⚔';btn.disabled=W.over;btn.onclick=warFlip;arena.appendChild(btn);
  }
  function labeled(t){const d=el('div');d.style.cssText='font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;color:#9c8351;margin-bottom:8px;';d.textContent=t;return d;}
  function bigCard(card,win){
    const wrap=el('div');wrap.style.cssText='width:150px;transition:.3s;'+(win?'transform:scale(1.06);filter:drop-shadow(0 0 22px rgba(255,226,122,.7));':'');
    wrap.innerHTML=window.buildCardBack(card,150,225);
    const lbl=el('div');lbl.style.cssText='margin-top:6px;font-size:.74rem;color:#e4d8bc;';lbl.innerHTML=card.name+'<br><span style="color:var(--gold)">rank '+warValue(card)+' '+SUIT_GLYPH[card.color]+'</span>';
    const c=el('div');c.appendChild(wrap);c.appendChild(lbl);return c;
  }
  function faceDownStack(){const d=el('div');d.style.cssText='width:150px;height:225px;border-radius:14px;border:2px dashed rgba(212,175,55,.4);display:flex;align-items:center;justify-content:center;color:#8d7a4d;font-family:var(--display);';d.textContent='⭐';return d;}

  // ═══════════════════════════════════════════════════════════════════
  //  CONCENTRATION  (memory, match by suit pairs)
  //  Grid of face-down backs. Match two of same suit. AI plays on alternate
  //  turns and "remembers" revealed cards based on difficulty.
  // ═══════════════════════════════════════════════════════════════════
  const C={cards:[],flipped:[],myScore:0,aiScore:0,turn:'me',memory:{},busy:false,over:false};
  function startConcentration(){
    // pick pairs: 8 pairs (16 cards) chosen so each suit appears; match = same suit
    const bySuit={Fire:[],Water:[],Air:[],Earth:[],Arcana:[]};
    SAINTS.filter(s=>!s.isBasic).forEach(s=>bySuit[s.color]&&bySuit[s.color].push(s));
    let chosen=[];
    Object.keys(bySuit).forEach(k=>{const arr=shuffle(bySuit[k]);for(let i=0;i+1<arr.length&&chosen.length<16;i+=2){if(chosen.length<16){chosen.push({...clone(arr[i]),pairSuit:k,uid:'c'+chosen.length});chosen.push({...clone(arr[i+1]),pairSuit:k,uid:'c'+(chosen.length)});}}});
    chosen=shuffle(chosen).slice(0,16);
    // ensure even — pad if odd
    if(chosen.length%2)chosen.pop();
    C.cards=chosen.map((c,i)=>({...c,uid:'c'+i,faceUp:false,matched:false,pos:i}));
    C.flipped=[];C.myScore=0;C.aiScore=0;C.turn='me';C.memory={};C.busy=false;C.over=false;
    log('🕯 Concentration. Match saints of the same suit. '+(C.cards.length/2)+' pairs.','sys');
    renderConcentration();
  }
  function concFlip(uid){
    if(C.turn!=='me'||C.busy||C.over)return;
    const card=C.cards.find(c=>c.uid===uid);if(!card||card.faceUp||card.matched)return;
    card.faceUp=true;C.flipped.push(card);rememberCard(card);renderConcentration();
    if(C.flipped.length===2)resolvePair('me');
  }
  function rememberCard(card){ // AI memory fidelity scales with difficulty
    const chance=[0,0.3,0.55,0.78,0.92,1][difficulty]||0.6;
    if(Math.random()<chance)C.memory[card.uid]={suit:card.pairSuit,pos:card.pos};
  }
  function resolvePair(who){
    C.busy=true;
    const [a,b]=C.flipped;
    const match=a.pairSuit===b.pairSuit;
    setTimeout(()=>{
      if(match){
        a.matched=b.matched=true;
        if(who==='me'){C.myScore++;log('You matched '+SUIT_GLYPH[a.pairSuit]+' '+a.pairSuit+'!','you');}
        else{C.aiScore++;log('Adversary matched '+SUIT_GLYPH[a.pairSuit]+' '+a.pairSuit+'.','ai');}
        delete C.memory[a.uid];delete C.memory[b.uid];
        C.flipped=[];C.busy=false;renderConcentration();
        if(C.cards.every(c=>c.matched)){endConc();return;}
        // same player goes again
        if(who==='ai')setTimeout(aiConcTurn,600);
      }else{
        a.faceUp=b.faceUp=false;C.flipped=[];
        C.turn=who==='me'?'ai':'me';C.busy=false;renderConcentration();
        if(C.turn==='ai')setTimeout(aiConcTurn,650);
      }
    }, match?500:850);
  }
  function aiConcTurn(){
    if(C.over)return;
    const unmatched=C.cards.filter(c=>!c.matched&&!c.faceUp);
    if(unmatched.length<2){C.turn='me';renderConcentration();return;}
    // try to use memory: find two known same-suit
    const known=Object.entries(C.memory).filter(([uid,v])=>{const c=C.cards.find(x=>x.uid===uid);return c&&!c.matched;});
    const bySuit={};known.forEach(([uid,v])=>{(bySuit[v.suit]=bySuit[v.suit]||[]).push(uid);});
    let first=null,second=null;
    const pairSuit=Object.keys(bySuit).find(s=>bySuit[s].length>=2);
    if(pairSuit && Math.random()< ([0,0.2,0.5,0.75,0.9,1][difficulty]||0.6)){
      [first,second]=bySuit[pairSuit];
    }else{
      // flip a random unknown, then try to match from memory
      const unknowns=unmatched.filter(c=>!C.memory[c.uid]);
      first=(unknowns.length?unknowns[Math.floor(Math.random()*unknowns.length)]:unmatched[0]).uid;
      const fc=C.cards.find(c=>c.uid===first);
      const memMatch=known.find(([uid,v])=>v.suit===fc.pairSuit&&uid!==first);
      if(memMatch&&Math.random()<([0,0.2,0.5,0.8,0.95,1][difficulty]||0.6))second=memMatch[0];
      else{const rest=unmatched.filter(c=>c.uid!==first);second=rest[Math.floor(Math.random()*rest.length)].uid;}
    }
    const c1=C.cards.find(c=>c.uid===first);c1.faceUp=true;rememberCard(c1);C.flipped.push(c1);renderConcentration();
    setTimeout(()=>{
      const c2=C.cards.find(c=>c.uid===second);c2.faceUp=true;rememberCard(c2);C.flipped.push(c2);renderConcentration();
      resolvePair('ai');
    },700);
  }
  function endConc(){C.over=true;const win=C.myScore>C.aiScore;log(win?'🏆 You hold more pairs. Victory!':C.myScore===C.aiScore?'A draw of equal minds.':'☠ The adversary remembered more.',win?'you':'ai');feedback(win?'VICTORY':C.myScore===C.aiScore?'DRAW':'DEFEAT');}
  function renderConcentration(){
    const board=$('#board');let grid=$('#conc-grid');
    if(!grid){grid=el('div');grid.id='conc-grid';grid.style.cssText='position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;';board.appendChild(grid);}
    grid.innerHTML='';
    const head=el('div');head.style.cssText='font-family:var(--display);display:flex;gap:30px;color:#e4d8bc;font-size:.95rem;';
    head.innerHTML=`<span style="color:${C.turn==='me'?'var(--gold-bright)':'#8d7a4d'}">You · ${C.myScore}</span>
      <span style="color:#9c8351">match the suit</span>
      <span style="color:${C.turn==='ai'?'#ff9b8a':'#8d7a4d'}">Adversary · ${C.aiScore}</span>`;
    grid.appendChild(head);
    const g=el('div');const cols=Math.min(4, Math.ceil(Math.sqrt(C.cards.length)));
    const cw=Math.min(98, Math.floor((Math.min(innerWidth,640)-60)/cols));
    g.style.cssText=`display:grid;grid-template-columns:repeat(${cols},${cw}px);gap:8px;`;
    C.cards.forEach(card=>{
      const cell=el('div');cell.style.cssText=`width:${cw}px;height:${Math.floor(cw*1.5)}px;border-radius:8px;cursor:pointer;transition:.25s;position:relative;`;
      if(card.matched){cell.style.opacity='0.25';cell.style.transform='scale(.92)';}
      if(card.faceUp||card.matched){
        cell.innerHTML=window.buildCardBack(card,cw,cw*1.5);
        const tag=el('div');tag.style.cssText='position:absolute;top:3px;left:50%;transform:translateX(-50%);font-size:.5rem;color:#fff;background:rgba(0,0,0,.5);padding:1px 5px;border-radius:5px;';tag.textContent=card.name.split(' ')[0];cell.appendChild(tag);
      }else{
        cell.style.background='linear-gradient(160deg,#2a1448,#160a26)';cell.style.border='1.5px solid var(--gold-dim)';
        cell.innerHTML='<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.6rem;color:var(--gold);opacity:.6">✦</div>';
        cell.onclick=()=>concFlip(card.uid);
      }
      g.appendChild(cell);
    });
    grid.appendChild(g);
    const btn=el('button','turnbtn');btn.style.cssText='font-family:var(--display);padding:10px 24px;border-radius:10px;border:1px solid var(--gold);background:rgba(255,255,255,.05);color:var(--gold-bright);cursor:pointer;';btn.textContent='New Board';btn.onclick=startConcentration;grid.appendChild(btn);
  }

  // ═══════════════════════════════════════════════════════════════════
  //  MODE SWITCH + cleanup
  // ═══════════════════════════════════════════════════════════════════
  function clearBoardExtras(){['#war-arena','#conc-grid'].forEach(id=>{const e=$(id);if(e)e.remove();});}
  function enter(mode){
    clearBoardExtras();showPhasebar(false);banner(null);hidePeek();
    if(mode==='arcanum'){$('#board').classList.add('show');startArcanum();}
    else if(mode==='duel'){$('#board').classList.add('show');startWar();}
    else if(mode==='memory'){$('#board').classList.add('show');startConcentration();}
    else {$('#board').classList.remove('show');}
  }
  function leave(){$('#board').classList.remove('show');clearBoardExtras();showPhasebar(false);}

  // public api
  return {
    setData, setDifficulty, enter, leave,
    advance:()=>advancePhase(),
    newGame:(mode)=>enter(mode),
    state:()=>A,
    targetFace:()=>clickTargetFace(),
    wireFace:()=>wireFaceClicks(),
  };
})();

</script>
<script id="THREE_SCENE">
// ════════════════════════════════════════════════════════════════════
//  THREE.JS SCENE — Reading & Gallery
//  Improved lighting, tone-mapped glow, procedural SVG backs as card faces,
//  flight/orbit camera, cursor orb with trails, idle auto-review.
// ════════════════════════════════════════════════════════════════════
const Scene = (function(){
  let SAINTS=[], POEMS={};
  let renderer, scene, camera, clock;
  let cards=[], raycaster, mouse=new THREE.Vector2();
  let mode='reading', frameStyle='auto', trailsOn=true, orbOn=true;
  let camTarget=new THREE.Vector3(0,0,0), camPos=new THREE.Vector3(0,2,14);
  let camMode='orbit', orbitAngle=0;
  let spread=[];        // current 3-card reading
  let galleryCards=[];
  let orb, trailPts=[], trailLine;
  let raf, idleTimer=0, lastInteract=Date.now();
  let hovered=null;

  function init(SaintData, PoemData){
    SAINTS=SaintData; POEMS=PoemData;
    const container=document.getElementById('container');
    renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
    renderer.setSize(innerWidth,innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio,2));
    renderer.toneMapping=THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure=1.15;
    renderer.outputEncoding=THREE.sRGBEncoding;
    container.appendChild(renderer.domElement);

    scene=new THREE.Scene();
    scene.fog=new THREE.FogExp2(0x0a0612, 0.022);
    camera=new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 200);
    camera.position.copy(camPos);
    clock=new THREE.Clock();
    raycaster=new THREE.Raycaster();

    setupLights();
    setupEnvironment();
    setupOrb();

    addEventListener('resize',onResize);
    renderer.domElement.addEventListener('pointermove',onMove);
    renderer.domElement.addEventListener('pointerdown',onDown);
    renderer.domElement.addEventListener('wheel',onWheel,{passive:false});

    drawSpread();
    animate();
  }

  function setupLights(){
    scene.add(new THREE.AmbientLight(0x4a3a6a, 0.6));
    const key=new THREE.DirectionalLight(0xffe9c0, 1.1); key.position.set(5,10,8); scene.add(key);
    const rim=new THREE.DirectionalLight(0xc98bff, 0.7); rim.position.set(-8,4,-6); scene.add(rim);
    const fill=new THREE.PointLight(0xd4af37, 1.4, 40); fill.position.set(0,3,10); scene.add(fill);
    // floating candle-like points
    for(let i=0;i<6;i++){
      const p=new THREE.PointLight([0xff6a2b,0x3aa6ff,0xc98bff][i%3], 0.8, 14);
      p.position.set((Math.random()-.5)*24,(Math.random()-.5)*8+2,(Math.random()-.5)*16-4);
      p.userData.bob=Math.random()*6.28; scene.add(p);
      scene._candles=scene._candles||[]; scene._candles.push(p);
    }
  }

  function setupEnvironment(){
    // starfield
    const g=new THREE.BufferGeometry();const N=1400;const pos=new Float32Array(N*3);
    for(let i=0;i<N;i++){const r=40+Math.random()*60;const a=Math.random()*6.28;const b=Math.acos(2*Math.random()-1);
      pos[i*3]=r*Math.sin(b)*Math.cos(a);pos[i*3+1]=r*Math.cos(b);pos[i*3+2]=r*Math.sin(b)*Math.sin(a);}
    g.setAttribute('position',new THREE.BufferAttribute(pos,3));
    const m=new THREE.PointsMaterial({color:0xd4af37,size:0.18,transparent:true,opacity:0.7});
    scene.add(new THREE.Points(g,m));
    // reflective floor
    const floor=new THREE.Mesh(new THREE.PlaneGeometry(120,120),
      new THREE.MeshStandardMaterial({color:0x140a24,metalness:0.6,roughness:0.4}));
    floor.rotation.x=-Math.PI/2;floor.position.y=-6;scene.add(floor);
  }

  // ── SVG → CanvasTexture (uses procedural backs as the card face art) ──
  function svgTexture(svgString){
    const canvas=document.createElement('canvas');canvas.width=280;canvas.height=420;
    const ctx=canvas.getContext('2d');
    const tex=new THREE.CanvasTexture(canvas);tex.anisotropy=8;
    const img=new Image();
    const blob=new Blob([svgString],{type:'image/svg+xml'});
    const url=URL.createObjectURL(blob);
    img.onload=()=>{ctx.clearRect(0,0,280,420);ctx.drawImage(img,0,0,280,420);tex.needsUpdate=true;URL.revokeObjectURL(url);};
    img.src=url;
    return tex;
  }

  function frameColor(saint){
    if(frameStyle==='gold')return 0xd4af37;
    if(frameStyle==='silver')return 0xcfd6e8;
    if(frameStyle==='bronze')return 0xb5651d;
    // auto: by suit
    return {Fire:0xff6a2b,Water:0x3aa6ff,Air:0xcfd6ff,Earth:0xffc23a,Arcana:0xc98bff}[saint.color]||0xd4af37;
  }

  function makeCard(saint){
    const grp=new THREE.Group();
    const W=3.0,H=4.5,T=0.08;
    // face = procedural back art (the saint's unique SVG)
    const tex=svgTexture(window.buildCardBack(saint,280,420));
    const faceMat=new THREE.MeshStandardMaterial({map:tex,metalness:0.25,roughness:0.55,emissive:0x111018,emissiveIntensity:0.4});
    const sideMat=new THREE.MeshStandardMaterial({color:0x1a0e2e,metalness:0.5,roughness:0.5});
    const geo=new THREE.BoxGeometry(W,H,T);
    const mats=[sideMat,sideMat,sideMat,sideMat,faceMat,faceMat];
    const mesh=new THREE.Mesh(geo,mats);grp.add(mesh);
    // metal frame border (procedural torus-ish bevel)
    const fc=frameColor(saint);
    const frameMat=new THREE.MeshStandardMaterial({color:fc,metalness:0.95,roughness:0.25,emissive:fc,emissiveIntensity:0.25});
    const edge=new THREE.Mesh(new THREE.BoxGeometry(W+0.18,H+0.18,T*0.6),frameMat);
    edge.position.z=-0.02;grp.add(edge);
    // glow halo
    const halo=new THREE.Mesh(new THREE.PlaneGeometry(W*1.6,H*1.6),
      new THREE.MeshBasicMaterial({color:fc,transparent:true,opacity:0.06,blending:THREE.AdditiveBlending,depthWrite:false}));
    halo.position.z=-0.1;grp.add(halo);
    grp.userData={saint,mesh,halo,baseRot:0,targetRot:0,hoverLift:0};
    return grp;
  }

  // ── Reading: draw 3 cards ──
  function drawSpread(){
    clearCards();
    const picks=[];const used=new Set();
    while(picks.length<3){const s=SAINTS[Math.floor(Math.random()*SAINTS.length)];if(s.isBasic||used.has(s.id))continue;used.add(s.id);picks.push(s);}
    spread=picks;
    const positions=[[-4,0,0],[0,0.5,0],[4,0,0]];
    picks.forEach((s,i)=>{
      const c=makeCard(s);
      c.position.set(positions[i][0],positions[i][1],positions[i][2]);
      c.userData.flipT=0;c.userData.flipping=true;c.userData.delay=i*0.3;
      c.rotation.y=Math.PI; // start face-away, flip in
      scene.add(c);cards.push(c);
    });
    setReadingText(picks);
    camMode='orbit';
  }

  function setReadingText(picks){
    // surface in the log-like feedback; reading mode shows poem on hover
    const titles=picks.map(p=>p.name).join(' · ');
    showFeedback('The Spread: '+titles);
  }

  // ── Gallery: all 80 in a ring/grid ──
  function buildGallery(){
    clearCards();
    const cols=10;const sp=3.6;
    SAINTS.filter(s=>!s.isBasic).forEach((s,i)=>{
      const c=makeCard(s);
      const col=i%cols, row=Math.floor(i/cols);
      c.position.set((col-cols/2)*sp+sp/2,(4-row)*5.0, -row*1.5);
      c.scale.setScalar(0.8);
      scene.add(c);cards.push(c);
    });
    camMode='orbit';camTarget.set(0,0,0);
  }

  function clearCards(){cards.forEach(c=>scene.remove(c));cards=[];}

  // ── Orb cursor ──
  function setupOrb(){
    orb=new THREE.Mesh(new THREE.SphereGeometry(0.22,20,20),
      new THREE.MeshBasicMaterial({color:0xffe27a,transparent:true,opacity:0.9}));
    const glow=new THREE.Mesh(new THREE.SphereGeometry(0.5,16,16),
      new THREE.MeshBasicMaterial({color:0xd4af37,transparent:true,opacity:0.25,blending:THREE.AdditiveBlending}));
    orb.add(glow);scene.add(orb);
    const tg=new THREE.BufferGeometry();
    tg.setAttribute('position',new THREE.BufferAttribute(new Float32Array(60*3),3));
    trailLine=new THREE.Line(tg,new THREE.LineBasicMaterial({color:0xffe27a,transparent:true,opacity:0.5}));
    scene.add(trailLine);
  }
  function updateOrb(){
    orb.visible=orbOn;trailLine.visible=orbOn&&trailsOn;
    if(!orbOn)return;
    const v=new THREE.Vector3(mouse.x,mouse.y,0.5).unproject(camera);
    const dir=v.sub(camera.position).normalize();
    const dist=10;const target=camera.position.clone().add(dir.multiplyScalar(dist));
    orb.position.lerp(target,0.2);
    if(trailsOn){
      trailPts.unshift(orb.position.clone());if(trailPts.length>60)trailPts.pop();
      const arr=trailLine.geometry.attributes.position.array;
      trailPts.forEach((p,i)=>{arr[i*3]=p.x;arr[i*3+1]=p.y;arr[i*3+2]=p.z;});
      trailLine.geometry.attributes.position.needsUpdate=true;
      trailLine.geometry.setDrawRange(0,trailPts.length);
    }
  }

  // ── interaction ──
  function onMove(e){
    mouse.x=(e.clientX/innerWidth)*2-1;mouse.y=-(e.clientY/innerHeight)*2+1;
    lastInteract=Date.now();
    raycaster.setFromCamera(mouse,camera);
    const hits=raycaster.intersectObjects(cards.map(c=>c.userData.mesh));
    const newHover=hits.length?hits[0].object.parent:null;
    if(newHover!==hovered){hovered=newHover;
      if(hovered){const s=hovered.userData.saint;showCardInfo(s);}else hideCardInfo();}
  }
  function onDown(e){
    raycaster.setFromCamera(mouse,camera);
    const hits=raycaster.intersectObjects(cards.map(c=>c.userData.mesh));
    if(hits.length){const card=hits[0].object.parent;focusCard(card);}
  }
  function onWheel(e){e.preventDefault();const d=e.deltaY*0.01;
    const dir=camera.position.clone().sub(camTarget).normalize();
    camera.position.add(dir.multiplyScalar(d));lastInteract=Date.now();}

  let focused=null;
  function focusCard(card){
    focused=card;camMode='focus';
    const s=card.userData.saint;
    showPoem(s);
  }

  function showCardInfo(s){
    const fb=document.getElementById('feedback');
    fb.style.fontSize='1.1rem';fb.textContent=s.name+' — '+s.card;fb.style.opacity=1;
  }
  function hideCardInfo(){if(!focused){const fb=document.getElementById('feedback');fb.style.opacity=0;}}
  function showFeedback(t){const fb=document.getElementById('feedback');fb.style.fontSize='1.4rem';fb.textContent=t;fb.style.opacity=1;clearTimeout(fb._t);fb._t=setTimeout(()=>fb.style.opacity=0,2600);}

  function showPoem(s){
    let panel=document.getElementById('poem-panel');
    if(!panel){panel=document.createElement('div');panel.id='poem-panel';
      panel.style.cssText='position:fixed;right:14px;bottom:80px;width:280px;z-index:52;background:rgba(11,6,20,.92);border:1px solid rgba(212,175,55,.4);border-radius:14px;padding:16px 18px;backdrop-filter:blur(12px);box-shadow:0 16px 50px rgba(0,0,0,.6);';
      document.body.appendChild(panel);}
    const poem=POEMS[s.id]||[];
    const suitColor={Fire:'#ff6a2b',Water:'#3aa6ff',Air:'#cfd6ff',Earth:'#ffc23a',Arcana:'#c98bff'}[s.color];
    panel.innerHTML=`<div style="font-family:var(--display);color:${suitColor};font-size:1.05rem;letter-spacing:.04em;">${s.name}</div>
      <div style="font-size:.74rem;color:#9c8351;letter-spacing:.1em;margin:2px 0 8px;">${s.card} · ${s.continent}</div>
      <div style="font-style:italic;color:#e4d8bc;font-size:.92rem;line-height:1.5;border-left:2px solid ${suitColor};padding-left:10px;margin-bottom:10px;">“${s.moral}”</div>
      ${poem.length?'<div style="font-size:.82rem;line-height:1.55;color:#d8ccae;max-height:200px;overflow-y:auto;">'+poem.map(l=>`<div>${l}</div>`).join('')+'</div>':''}
      <div style="font-size:.7rem;color:#7d6b40;margin-top:8px;">Virtues: ${s.virtues}</div>
      <div style="text-align:right;margin-top:6px;"><span id="poem-close" style="cursor:pointer;color:var(--gold);font-size:.78rem;">close ✕</span></div>`;
    panel.style.display='block';
    document.getElementById('poem-close').onclick=()=>{panel.style.display='none';focused=null;camMode='orbit';};
  }
  function hidePoemPanel(){const p=document.getElementById('poem-panel');if(p)p.style.display='none';}

  // ── camera views ──
  function setCamera(view){
    camMode=view;lastInteract=Date.now();
    if(view==='front'){camPos.set(0,1,13);camTarget.set(0,0,0);}
    else if(view==='iso'){camPos.set(10,7,12);camTarget.set(0,0,0);}
    else if(view==='top'){camPos.set(0,16,2);camTarget.set(0,0,0);}
    else if(view==='orbit'){orbitAngle=0;}
  }

  // ── main loop ──
  function animate(){
    raf=requestAnimationFrame(animate);
    const t=clock.getElapsedTime();const dt=clock.getDelta();
    // candle bob
    (scene._candles||[]).forEach(p=>{p.intensity=0.6+Math.sin(t*3+p.userData.bob)*0.3;});
    // card animations
    cards.forEach((c,i)=>{
      const u=c.userData;
      if(u.flipping){u.flipT+=dt;if(u.flipT>u.delay){const p=Math.min(1,(u.flipT-u.delay)*1.6);c.rotation.y=Math.PI*(1-easeOut(p));if(p>=1)u.flipping=false;}}
      else{
        // gentle float + face camera-ish
        c.position.y+=Math.sin(t*1.2+i)*0.0015;
        if(c===hovered||c===focused){u.hoverLift=Math.min(u.hoverLift+dt*3,1);}else{u.hoverLift=Math.max(u.hoverLift-dt*3,0);}
        c.scale.setScalar((mode==='gallery'?0.8:1)*(1+u.hoverLift*0.12));
        if(u.halo)u.halo.material.opacity=0.06+u.hoverLift*0.18;
        c.rotation.z=Math.sin(t*0.6+i)*0.02;
      }
    });
    // camera modes
    if(camMode==='orbit'){orbitAngle+=dt*0.12;
      const rad=mode==='gallery'?34:13;
      camPos.set(Math.sin(orbitAngle)*rad, mode==='gallery'?4:2.5, Math.cos(orbitAngle)*rad);}
    else if(camMode==='focus'&&focused){
      const fp=focused.position.clone();camPos.copy(fp).add(new THREE.Vector3(0,0,7));camTarget.copy(fp);}
    camera.position.lerp(camPos,0.05);
    const lookT=new THREE.Vector3().lerpVectors(camera.getWorldDirection(new THREE.Vector3()).add(camera.position),camTarget,0.1);
    camera.lookAt(camTarget);
    // idle auto-review
    if(Date.now()-lastInteract>9000 && mode==='reading'&&!focused){
      if(!idleTimer){idleTimer=1;}
      camMode='orbit';
    }
    updateOrb();
    // HUD
    const spd=camera.position.distanceTo(camPos);
    const hudS=document.getElementById('hud-speed'),hudA=document.getElementById('hud-alt'),hudM=document.getElementById('hud-mode');
    if(hudS)hudS.textContent=(spd*10).toFixed(0);
    if(hudA)hudA.textContent=camera.position.y.toFixed(1);
    if(hudM)hudM.textContent=camMode;
    renderer.render(scene,camera);
  }
  function easeOut(t){return 1-Math.pow(1-t,3);}
  function onResize(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);}

  // ── public ──
  function show(){renderer.domElement.style.display='block';}
  function hide(){renderer.domElement.style.display='none';hidePoemPanel();}
  return {
    init,
    setMode:(m)=>{mode=m; if(m==='reading'){show();drawSpread();} else if(m==='gallery'){show();buildGallery();} else {hide();}},
    drawSpread, buildGallery, setCamera,
    setFrame:(f)=>{frameStyle=f; if(mode==='reading')drawSpread(); else if(mode==='gallery')buildGallery();},
    setTrails:(b)=>{trailsOn=b;},
    setOrb:(b)=>{orbOn=b;},
    show, hide,
  };
})();

// ════════════════════════════════════════════════════════════════════
//  MAIN WIRING
// ════════════════════════════════════════════════════════════════════
(function(){
  const $=s=>document.querySelector(s);
  const SAINTS = window.SAINTS_GAME;
  const POEMS = window.SAINTS_POEMS;

  Game.setData(SAINTS);
  Scene.init(SAINTS, POEMS);

  let mode='reading';
  const DIFF_NAMES={1:'Novice',2:'Seeker',3:'Balanced',4:'Adept',5:'Brutal'};

  // ── Rules content ──
  const RULES = {
    arcanum:`<span class="closex" data-close>✕</span>
      <h2>⚔ Arcanum Duel</h2>
      <p>A <span class="kw">Magic-compatible</span> duel on the tarot deck. You and the adversary each wield a <span class="kw">40-card</span> deck and begin at <span class="kw">20 life</span>. Reduce the adversary to 0.</p>
      <h3>Suits are Colors</h3>
      <p>Each suit is an element that flavors its saints:</p>
      <div>
        <span class="suitchip s-fire">🔥 Wands · Fire — aggression</span>
        <span class="suitchip s-water">💧 Cups · Water — life & blessing</span>
        <span class="suitchip s-air">⚔ Swords · Air — direct damage</span>
        <span class="suitchip s-earth">⬟ Pentacles · Earth — defense & mana</span>
        <span class="suitchip s-arcana">✦ Major Arcana — planeswalker-tier</span>
      </div>
      <h3>The Flow of a Turn</h3>
      <ul>
        <li><span class="kw">Main:</span> Play one <span class="kw">Land</span> per turn (your mana source). Tap lands to pay the <span class="kw">mana cost</span> (the number on each card) to summon Saints.</li>
        <li><span class="kw">Combat:</span> Tap your un-sick Saints to attack. Click a Saint to declare it an attacker, then press <b>Attack ▸</b>. The adversary blocks automatically.</li>
        <li><span class="kw">Main 2:</span> Play more Saints if you have mana.</li>
        <li><span class="kw">End:</span> Press <b>End Turn ▸</b> and the adversary takes its turn.</li>
      </ul>
      <h3>Card Types</h3>
      <ul>
        <li><span class="kw">Saints (creatures):</span> have Power / Toughness. They're <i>summoning sick</i> the turn they arrive (💤 — can't attack yet).</li>
        <li><span class="kw">Instants:</span> low Swords deal damage; low Cups grant life. Cast any time you can pay.</li>
        <li><span class="kw">Arcana:</span> Major Arcana trigger a one-shot power on arrival — the Sun heals, the Tower scorches the field, Justice taps the foe, the Magician draws cards, Strength buffs your saints.</li>
        <li><span class="kw">Lands:</span> Pyre / Spring / Aerie / Shrine produce mana. Low Pentacle saints are sacred shrine-lands.</li>
      </ul>
      <p style="margin-top:10px;color:#9c8351;">Color-light ruleset: any mana pays any cost, so every deck is playable from turn one.</p>`,
    duel:`<span class="closex" data-close>✕</span>
      <h2>⚡ War of Saints</h2>
      <p>The swift duel. The deck is split evenly between you and the adversary. Each round you both flip the top card — the higher <span class="kw">virtue-rank</span> wins both cards.</p>
      <h3>Resolving Ties</h3>
      <p>When ranks tie, the <span class="kw">suit wheel</span> decides dominance:</p>
      <p style="text-align:center;font-size:1.05rem;letter-spacing:.06em;">
        <span class="suitchip s-arcana">✦ Arcana</span> ▸
        <span class="suitchip s-fire">🔥 Fire</span> ▸
        <span class="suitchip s-air">⚔ Air</span> ▸
        <span class="suitchip s-water">💧 Water</span> ▸
        <span class="suitchip s-earth">⬟ Earth</span>
      </p>
      <p>If suit <em>and</em> rank tie, it's <span class="kw">WAR</span>: each side buries cards and flips again — the winner claims the whole pile.</p>
      <p style="margin-top:10px;">Hold the most relics when a deck runs dry to win. Press <b>Flip ⚔</b> to fight.</p>`,
    memory:`<span class="closex" data-close>✕</span>
      <h2>🕯 Concentration</h2>
      <p>A trial of memory. Saints lie face-down — their procedural backs revealing only a suit. Flip two cards; if they share a <span class="kw">suit</span>, you claim the pair and go again.</p>
      <h3>The Adversary Remembers</h3>
      <p>The adversary's recall scales with its <span class="kw">cunning</span>. At Novice it forgets often; at Brutal it remembers nearly every card it has seen. Raise the difficulty for a real contest of minds.</p>
      <p style="margin-top:10px;">Claim more pairs than the adversary to win.</p>`,
  };

  function openRules(which){
    $('#rules-sheet').innerHTML=RULES[which]||RULES.arcanum;
    $('#rules').classList.add('show');
    $('#rules-sheet').querySelector('[data-close]').onclick=()=>$('#rules').classList.remove('show');
  }
  $('#rules').addEventListener('click',e=>{if(e.target.id==='rules')$('#rules').classList.remove('show');});

  // ── hint text per mode ──
  const HINTS={
    arcanum:'Play a land each turn, then tap lands to summon Saints. Attack in Combat. Lower the adversary to 0 life.',
    duel:'Flip cards — higher rank wins. Suits break ties. Claim the most relics.',
    memory:'Flip two cards of the same suit to claim the pair. Outscore the adversary.',
  };

  // ── mode switching ──
  function switchMode(m){
    mode=m;
    document.querySelectorAll('.mode-tab').forEach(t=>t.classList.toggle('active',t.dataset.mode===m));
    const isGame = (m==='arcanum'||m==='duel'||m==='memory');
    $('#left-rail').style.display = (m==='reading') ? 'block' : 'none';
    $('#game-panel').style.display = isGame ? 'block' : 'none';
    $('#flight-hud').style.display = (m==='reading'||m==='gallery') ? 'flex' : 'none';
    if(isGame){
      Scene.hide();
      $('#gp-title').textContent = {arcanum:'Arcanum Duel',duel:'War of Saints',memory:'Concentration'}[m];
      $('#gp-hint').textContent = HINTS[m];
      Game.enter(m);
    } else {
      Game.leave();
      Scene.setMode(m);
      if(m==='gallery'){$('#rail-title').textContent='Gallery — All 80';}
      else $('#rail-title').textContent='Three-Card Reading';
    }
  }
  document.querySelectorAll('.mode-tab').forEach(t=>t.addEventListener('click',()=>switchMode(t.dataset.mode)));

  // ── reading controls ──
  $('#btn-draw').onclick=()=>Scene.drawSpread();
  $('#btn-reset').onclick=()=>Scene.drawSpread();
  document.querySelectorAll('[data-cam]').forEach(b=>b.onclick=()=>Scene.setCamera(b.dataset.cam));
  document.querySelectorAll('[data-frame]').forEach(b=>b.onclick=()=>Scene.setFrame(b.dataset.frame));
  let trails=true,orb=true;
  $('#btn-trails').onclick=function(){trails=!trails;Scene.setTrails(trails);this.textContent='✨ Trails: '+(trails?'ON':'OFF');};
  $('#btn-orbcursor').onclick=function(){orb=!orb;Scene.setOrb(orb);this.textContent='👁 Cursor Orb: '+(orb?'ON':'OFF');};

  // ── game panel ──
  $('#gp-new').onclick=()=>Game.newGame(mode);
  $('#gp-rules').onclick=()=>openRules(mode);
  $('#diff').oninput=function(){const v=+this.value;Game.setDifficulty(v);$('#diff-val').textContent=v;$('#diff-name').textContent=DIFF_NAMES[v];};
  Game.setDifficulty(3);

  // ── arcanum advance / phase button ──
  $('#advance').onclick=()=>Game.advance();
  // face targeting — clicking the adversary's life bar targets their face
  Game.wireFace();

  // start in reading mode
  switchMode('reading');
})();

</script>
