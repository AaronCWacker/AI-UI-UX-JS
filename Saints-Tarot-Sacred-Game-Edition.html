<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Saints Tarot — Sacred Games Edition</title>
<style>
:root{
  --gold:#d4af37; --gold-bright:#ffe27a; --gold-dim:#8a6d1e;
  --ink:#0a0612; --ink2:#160a26; --ink3:#22113c;
  --fire:#ff6a2b; --water:#3aa6ff; --air:#cfd6ff; --earth:#ffc23a; --arcana:#c98bff;
  --parch:#ece0c8; --blood:#7a1422;
  --serif:'Cormorant Garamond','Georgia',serif;
  --display:'Cinzel','Trajan Pro',serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  font-family:var(--serif); background:
    radial-gradient(1200px 800px at 50% -10%, #1b0d33 0%, #0a0612 60%),
    radial-gradient(900px 600px at 90% 110%, #1a0a28 0%, transparent 60%);
  color:#f3ead4; overflow:hidden; height:100vh; touch-action:none;
}
#container{position:fixed;inset:0;}
canvas{display:block;}

/* ── Title chrome ── */
#topbar{
  position:fixed;top:0;left:0;right:0;z-index:60;display:flex;align-items:center;
  justify-content:space-between;padding:10px 16px;pointer-events:none;
  background:linear-gradient(180deg,rgba(8,4,16,.85),transparent);
}
#brand{pointer-events:auto;display:flex;flex-direction:column;line-height:1;}
#brand h1{
  font-family:var(--display);font-weight:700;font-size:1.5rem;letter-spacing:.12em;
  background:linear-gradient(180deg,var(--gold-bright),var(--gold) 55%,var(--gold-dim));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  text-shadow:0 1px 0 rgba(0,0,0,.4);
}
#brand .sub{font-size:.72rem;letter-spacing:.32em;color:#b79b5e;text-transform:uppercase;margin-top:3px;}

/* ── Mode rail ── */
#moderail{
  position:fixed;top:54px;left:50%;transform:translateX(-50%);z-index:60;
  display:flex;gap:6px;padding:6px;border-radius:999px;pointer-events:auto;
  background:rgba(12,7,22,.78);border:1px solid rgba(212,175,55,.28);
  backdrop-filter:blur(10px);box-shadow:0 8px 30px rgba(0,0,0,.5);max-width:96vw;overflow-x:auto;
}
#moderail::-webkit-scrollbar{display:none;}
.mode-tab{
  font-family:var(--display);font-size:.74rem;letter-spacing:.08em;white-space:nowrap;
  padding:8px 14px;border-radius:999px;border:1px solid transparent;color:#cbb98a;
  cursor:pointer;transition:.25s;background:transparent;
}
.mode-tab:hover{color:var(--gold-bright);}
.mode-tab.active{
  color:#1a0e02;border-color:var(--gold);
  background:linear-gradient(180deg,var(--gold-bright),var(--gold));
  box-shadow:0 0 18px rgba(212,175,55,.5);
}

/* ── Panels (overlay UIs per mode) ── */
.panel{
  position:fixed;z-index:55;background:rgba(11,6,20,.9);backdrop-filter:blur(12px);
  border:1px solid rgba(212,175,55,.3);border-radius:16px;padding:14px;
  box-shadow:0 16px 50px rgba(0,0,0,.6);pointer-events:auto;
}
.panel h2{font-family:var(--display);font-size:.95rem;letter-spacing:.1em;color:var(--gold-bright);margin-bottom:8px;
  border-bottom:1px solid rgba(212,175,55,.25);padding-bottom:6px;}
.btn{
  font-family:var(--display);font-size:.8rem;letter-spacing:.05em;width:100%;padding:10px;margin:4px 0;
  border-radius:10px;border:1px solid var(--gold);color:#f6ecd2;cursor:pointer;font-weight:600;
  background:linear-gradient(135deg,#3a1d63,#5a1f8f);transition:.2s;
}
.btn:hover{background:linear-gradient(135deg,#4d2880,#7a2bbf);box-shadow:0 0 18px rgba(201,139,255,.45);transform:translateY(-1px);}
.btn:active{transform:translateY(0) scale(.98);}
.btn.gold{background:linear-gradient(135deg,#8a6d1e,#d4af37);color:#180e02;border-color:var(--gold-bright);}
.btn.gold:hover{background:linear-gradient(135deg,#b8901f,#ffe27a);}
.btn.ghost{background:rgba(255,255,255,.04);}
.btn.sm{padding:7px;font-size:.72rem;margin:3px 0;}
.row{display:flex;gap:6px;}
.row .btn{margin:4px 0;}

#left-rail{top:96px;left:14px;width:236px;max-height:calc(100vh - 200px);overflow-y:auto;}
#left-rail::-webkit-scrollbar{width:5px;}
#left-rail::-webkit-scrollbar-thumb{background:rgba(212,175,55,.3);border-radius:3px;}
.sec-label{font-size:.66rem;letter-spacing:.22em;text-transform:uppercase;color:#9c8351;text-align:center;margin:10px 0 4px;}
.divline{height:1px;background:linear-gradient(90deg,transparent,rgba(212,175,55,.4),transparent);margin:8px 0;}

/* difficulty slider */
.slider-wrap{padding:4px 2px;}
.slider-wrap label{display:flex;justify-content:space-between;font-size:.72rem;color:#cbb98a;margin-bottom:4px;}
input[type=range]{width:100%;-webkit-appearance:none;height:5px;border-radius:3px;
  background:linear-gradient(90deg,#3aa6ff,#ffc23a,#ff6a2b);outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;
  background:var(--gold-bright);border:2px solid #2a1b06;cursor:pointer;box-shadow:0 0 8px rgba(212,175,55,.7);}

/* ── Reading HUD reused ── */
#flight-hud{
  position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:50;
  background:rgba(8,4,16,.8);padding:10px 22px;border-radius:14px;backdrop-filter:blur(8px);
  border:1px solid rgba(212,175,55,.25);font-size:.72rem;display:flex;gap:22px;pointer-events:none;
}
#flight-hud .m{text-align:center;}
#flight-hud .ml{color:var(--gold);font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;}
#flight-hud .mv{font-size:1.05rem;font-weight:700;font-variant-numeric:tabular-nums;}
#crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:40;pointer-events:none;opacity:0;transition:.4s;}
#crosshair.active{opacity:.55;}
#feedback{position:fixed;top:46%;left:50%;transform:translate(-50%,-50%);z-index:70;
  font-family:var(--display);font-size:2.2rem;color:var(--gold-bright);
  text-shadow:0 0 30px rgba(212,175,55,.8);opacity:0;pointer-events:none;transition:.2s;}

/* ── Card game board (2D overlay for the 3 inner games) ── */
#board{position:fixed;inset:0;z-index:45;display:none;pointer-events:auto;
  background:radial-gradient(1000px 700px at 50% 40%, rgba(30,16,52,.55), rgba(8,4,16,.92));}
#board.show{display:block;}
.board-grid{position:absolute;inset:0;display:flex;flex-direction:column;}
.zone{flex:1;position:relative;display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;padding:6px;}
.zone.opp{background:linear-gradient(180deg,rgba(122,20,34,.16),transparent);}
.zone.mid{flex:.5;border-top:1px solid rgba(212,175,55,.15);border-bottom:1px solid rgba(212,175,55,.15);}
.zone.me{background:linear-gradient(0deg,rgba(58,166,255,.12),transparent);}
.zone-label{position:absolute;top:4px;left:10px;font-family:var(--display);font-size:.62rem;
  letter-spacing:.2em;text-transform:uppercase;color:#8d7a4d;}

/* mini card (game token) */
.mc{
  width:74px;height:108px;border-radius:8px;position:relative;cursor:pointer;flex:0 0 auto;
  background:linear-gradient(160deg,#241038,#160a26);border:1.5px solid var(--gold-dim);
  box-shadow:0 4px 12px rgba(0,0,0,.5);transition:transform .18s,box-shadow .18s,outline .15s;
  overflow:hidden;color:#f3ead4;font-family:var(--serif);
}
.mc:hover{transform:translateY(-6px) scale(1.04);box-shadow:0 10px 24px rgba(0,0,0,.7);z-index:5;}
.mc.tapped{transform:rotate(82deg);filter:brightness(.7);}
.mc.sel{outline:2px solid var(--gold-bright);outline-offset:1px;box-shadow:0 0 18px rgba(255,226,122,.7);}
.mc.atk{outline:2px solid var(--fire);box-shadow:0 0 16px rgba(255,106,43,.7);}
.mc.canplay{box-shadow:0 0 0 2px rgba(120,255,140,.6),0 4px 12px rgba(0,0,0,.5);}
.mc .nm{position:absolute;top:3px;left:4px;right:4px;font-size:.5rem;font-weight:700;line-height:1.05;
  text-shadow:0 1px 2px #000;letter-spacing:.01em;}
.mc .art{position:absolute;top:20px;left:5px;right:5px;height:50px;border-radius:4px;overflow:hidden;
  display:flex;align-items:center;justify-content:center;font-size:1.5rem;background:rgba(0,0,0,.25);}
.mc .cost{position:absolute;top:2px;right:3px;width:16px;height:16px;border-radius:50%;
  background:var(--ink);border:1px solid var(--gold);font-size:.56rem;display:flex;align-items:center;
  justify-content:center;font-weight:700;}
.mc .typ{position:absolute;bottom:18px;left:0;right:0;text-align:center;font-size:.46rem;
  letter-spacing:.08em;color:#bda86f;text-transform:uppercase;}
.mc .pt{position:absolute;bottom:2px;right:4px;font-size:.62rem;font-weight:700;
  background:rgba(0,0,0,.55);padding:0 4px;border-radius:4px;border:1px solid var(--gold-dim);}
.mc .pip{position:absolute;bottom:2px;left:4px;font-size:.7rem;}
.mc.land{border-color:#6a8a3a;}
.mc.land .art{background:rgba(60,80,30,.3);}
.mc.face-down{background:none;border:none;}
.mc.face-down svg{width:100%;height:100%;display:block;}
.mc.summon-sick::after{content:'💤';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:.9rem;opacity:.5;}

/* player stat bars */
.pbar{position:absolute;display:flex;align-items:center;gap:14px;font-family:var(--display);z-index:6;}
.pbar.opp{top:6px;right:14px;}
.pbar.me{bottom:6px;left:14px;}
.stat{display:flex;align-items:center;gap:5px;font-size:.82rem;}
.stat .ico{font-size:1rem;}
.stat .v{font-weight:700;font-variant-numeric:tabular-nums;color:var(--gold-bright);min-width:18px;text-align:center;}
.life{font-size:1.4rem;color:#ff6b6b;text-shadow:0 0 12px rgba(255,80,80,.6);}

/* turn / phase control */
#phasebar{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:48;
  display:flex;gap:8px;align-items:center;background:rgba(8,4,16,.85);padding:8px 12px;
  border-radius:12px;border:1px solid rgba(212,175,55,.3);backdrop-filter:blur(8px);}
#phasebar .ph{font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;color:#7d6b40;padding:4px 8px;border-radius:6px;}
#phasebar .ph.on{color:#1a0e02;background:var(--gold);}
#phasebar .turnbtn{font-family:var(--display);font-size:.78rem;padding:8px 16px;border-radius:10px;
  border:1px solid var(--gold);background:linear-gradient(135deg,#8a6d1e,#d4af37);color:#180e02;cursor:pointer;font-weight:700;}
#phasebar .turnbtn:hover{background:linear-gradient(135deg,#b8901f,#ffe27a);}

/* log */
#gamelog{position:fixed;top:96px;right:14px;width:228px;max-height:38vh;overflow-y:auto;z-index:48;
  background:rgba(8,4,16,.82);border:1px solid rgba(212,175,55,.25);border-radius:12px;padding:10px;
  font-size:.7rem;line-height:1.4;backdrop-filter:blur(8px);}
#gamelog::-webkit-scrollbar{width:4px;}#gamelog::-webkit-scrollbar-thumb{background:rgba(212,175,55,.3);}
#gamelog .le{margin-bottom:3px;padding-bottom:3px;border-bottom:1px solid rgba(255,255,255,.05);}
#gamelog .le.ai{color:#ff9b8a;}#gamelog .le.you{color:#8ad6ff;}#gamelog .le.sys{color:#bda86f;font-style:italic;}

/* hand dock */
#hand{position:fixed;bottom:64px;left:50%;transform:translateX(-50%);z-index:47;
  display:flex;gap:-20px;align-items:flex-end;pointer-events:auto;perspective:800px;}
#hand .mc{margin-left:-22px;transition:transform .2s,margin .2s;}
#hand .mc:first-child{margin-left:0;}
#hand .mc:hover{margin-right:24px;}

/* rules modal */
#rules{position:fixed;inset:0;z-index:90;display:none;align-items:center;justify-content:center;
  background:rgba(4,2,8,.8);backdrop-filter:blur(6px);pointer-events:auto;}
#rules.show{display:flex;}
#rules .sheet{width:min(720px,92vw);max-height:86vh;overflow-y:auto;background:
  linear-gradient(180deg,#17102a,#0c0718);border:1px solid rgba(212,175,55,.4);border-radius:18px;
  padding:26px 30px;box-shadow:0 30px 80px rgba(0,0,0,.7);}
#rules h2{font-family:var(--display);color:var(--gold-bright);font-size:1.4rem;letter-spacing:.08em;margin-bottom:6px;}
#rules h3{font-family:var(--display);color:var(--gold);font-size:1rem;letter-spacing:.05em;margin:16px 0 6px;}
#rules p,#rules li{font-size:.92rem;line-height:1.55;color:#e4d8bc;}
#rules ul{margin:4px 0 4px 20px;}
#rules .tag{display:inline-block;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;
  padding:2px 8px;border-radius:6px;margin:2px 4px 2px 0;}
#rules .closex{float:right;cursor:pointer;font-size:1.4rem;color:#b79b5e;}
#rules .closex:hover{color:var(--gold-bright);}
.kw{color:var(--gold-bright);font-weight:600;}
.suitchip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:999px;
  font-size:.72rem;margin:3px;border:1px solid;}
.s-fire{color:var(--fire);border-color:var(--fire);}
.s-water{color:var(--water);border-color:var(--water);}
.s-air{color:var(--air);border-color:var(--air);}
.s-earth{color:var(--earth);border-color:var(--earth);}
.s-arcana{color:var(--arcana);border-color:var(--arcana);}

/* target overlay */
#targetbanner{position:fixed;top:140px;left:50%;transform:translateX(-50%);z-index:80;
  background:rgba(122,20,34,.9);padding:8px 18px;border-radius:10px;font-family:var(--display);
  font-size:.85rem;letter-spacing:.05em;display:none;border:1px solid var(--gold);}
#targetbanner.show{display:block;}

/* card detail peek */
#peek{position:fixed;z-index:85;width:230px;pointer-events:none;display:none;
  filter:drop-shadow(0 12px 30px rgba(0,0,0,.7));}
#peek.show{display:block;}

@media(max-width:780px){
  #left-rail{width:200px;top:90px;font-size:.9rem;}
  #gamelog{display:none;}
  #brand h1{font-size:1.15rem;}
  .mode-tab{font-size:.64rem;padding:7px 10px;}
  .mc{width:60px;height:88px;}
}
</style>
</head>
<body>
<div id="container"></div>

<div id="topbar">
  <div id="brand">
    <h1>SAINTS TAROT</h1>
    <div class="sub">Sacred Games Edition · 80 Saints</div>
  </div>
</div>

<div id="moderail">
  <button class="mode-tab active" data-mode="reading">✦ Reading</button>
  <button class="mode-tab" data-mode="gallery">✦ Gallery</button>
  <button class="mode-tab" data-mode="arcanum">⚔ Arcanum Duel</button>
  <button class="mode-tab" data-mode="duel">⚡ War of Saints</button>
  <button class="mode-tab" data-mode="memory">🕯 Concentration</button>
</div>

<!-- READING / GALLERY rail -->
<div id="left-rail" class="panel">
  <h2 id="rail-title">Three-Card Reading</h2>
  <div id="rail-reading">
    <button class="btn gold" id="btn-draw">Draw the Spread</button>
    <button class="btn" id="btn-reset">Reset</button>
    <div class="divline"></div>
    <div class="sec-label">Camera</div>
    <div class="row"><button class="btn sm" data-cam="front">Front</button><button class="btn sm" data-cam="iso">Iso</button></div>
    <div class="row"><button class="btn sm" data-cam="top">Top</button><button class="btn sm" data-cam="orbit">Orbit</button></div>
    <div class="divline"></div>
    <div class="sec-label">Frame</div>
    <div class="row"><button class="btn sm" data-frame="auto">Auto</button><button class="btn sm" data-frame="gold">Gold</button></div>
    <div class="row"><button class="btn sm" data-frame="silver">Silver</button><button class="btn sm" data-frame="bronze">Bronze</button></div>
    <div class="divline"></div>
    <div class="sec-label">Effects</div>
    <button class="btn sm" id="btn-trails">✨ Trails: ON</button>
    <button class="btn sm" id="btn-orbcursor">👁 Cursor Orb: ON</button>
  </div>
</div>

<!-- 3D HUD -->
<div id="crosshair"><svg viewBox="0 0 48 48" width="46" height="46"><circle cx="24" cy="24" r="18" fill="none" stroke="#d4af37" stroke-width="1" opacity=".5"/><line x1="24" y1="6" x2="24" y2="15" stroke="#d4af37"/><line x1="24" y1="33" x2="24" y2="42" stroke="#d4af37"/><line x1="6" y1="24" x2="15" y2="24" stroke="#d4af37"/><line x1="33" y1="24" x2="42" y2="24" stroke="#d4af37"/><circle cx="24" cy="24" r="2.5" fill="none" stroke="#d4af37"/></svg></div>
<div id="feedback"></div>
<div id="flight-hud">
  <div class="m"><div class="ml">Speed</div><div class="mv" id="hud-speed">0</div></div>
  <div class="m"><div class="ml">Alt</div><div class="mv" id="hud-alt">0</div></div>
  <div class="m"><div class="ml">Mode</div><div class="mv" id="hud-mode">orbit</div></div>
</div>

<!-- 2D GAME BOARD -->
<div id="board">
  <div class="board-grid">
    <div class="zone opp" id="z-opp-bf"><span class="zone-label">Adversary · Battlefield</span></div>
    <div class="zone opp" id="z-opp-land" style="flex:.6"><span class="zone-label">Adversary · Lands</span></div>
    <div class="zone mid" id="z-stack"><span class="zone-label">The Stack</span></div>
    <div class="zone me" id="z-me-land" style="flex:.6"><span class="zone-label">Your Lands</span></div>
    <div class="zone me" id="z-me-bf"><span class="zone-label">Your Battlefield</span></div>
  </div>
  <div class="pbar opp">
    <div class="stat"><span class="ico">❤</span><span class="v life" id="opp-life">20</span></div>
    <div class="stat"><span class="ico">🃏</span><span class="v" id="opp-hand">0</span></div>
    <div class="stat"><span class="ico">📚</span><span class="v" id="opp-deck">0</span></div>
    <div class="stat"><span class="ico">💎</span><span class="v" id="opp-mana">0</span></div>
  </div>
  <div class="pbar me">
    <div class="stat"><span class="ico">❤</span><span class="v life" id="me-life">20</span></div>
    <div class="stat"><span class="ico">📚</span><span class="v" id="me-deck">0</span></div>
    <div class="stat"><span class="ico">💎</span><span class="v" id="me-mana">0</span></div>
  </div>
</div>
<div id="hand"></div>
<div id="phasebar" style="display:none">
  <span class="ph" data-ph="main1">Main</span>
  <span class="ph" data-ph="combat">Combat</span>
  <span class="ph" data-ph="main2">Main 2</span>
  <span class="ph" data-ph="end">End</span>
  <button class="turnbtn" id="advance">Next ▸</button>
</div>
<div id="gamelog" style="display:none"><div class="le sys">The deck awaits.</div></div>
<div id="targetbanner"></div>
<div id="peek"></div>

<!-- RULES MODAL -->
<div id="rules"><div class="sheet" id="rules-sheet"></div></div>

<!-- game control panel (right side, for active games) -->
<div id="game-panel" class="panel" style="top:96px;left:14px;width:210px;display:none;">
  <h2 id="gp-title">Arcanum Duel</h2>
  <button class="btn gold" id="gp-new">New Game</button>
  <button class="btn sm" id="gp-rules">📜 Rules & Play</button>
  <div class="divline"></div>
  <div class="sec-label">Adversary Cunning</div>
  <div class="slider-wrap">
    <label><span id="diff-name">Balanced</span><span id="diff-val">3</span></label>
    <input type="range" id="diff" min="1" max="5" value="3">
  </div>
  <div class="divline"></div>
  <div id="gp-hint" style="font-size:.74rem;color:#bda86f;line-height:1.4;"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
