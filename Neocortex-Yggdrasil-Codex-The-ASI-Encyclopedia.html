<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧠 Neocortex Yggdrasil — ASI Language Encyclopedia</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Fira+Code:wght@300;400;500&display=swap');

:root {
  --void: #020208;
  --cortex-bg: #060612;
  --neural-gold: #d4a520;
  --synapse-cyan: #00e5ff;
  --axon-green: #00ff88;
  --dendrite-pink: #ff4488;
  --myelin-purple: #9c44ff;
  --glia-orange: #ff8c00;
  --membrane-blue: #2244cc;
  --text-bright: #e0e4f0;
  --text-dim: #5a6080;
  --panel-bg: rgba(6, 6, 18, 0.94);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 100vw; height: 100vh;
  background: var(--void);
  color: var(--text-bright);
  font-family: 'Rajdhani', sans-serif;
  overflow: hidden;
  cursor: default;
}

#three-container {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
}

/* ═══ SIDEBAR ═══ */
#sidebar {
  position: fixed;
  top: 0; left: 0;
  width: 310px;
  height: 100%;
  background: linear-gradient(180deg, rgba(4,4,14,0.97) 0%, rgba(8,8,20,0.95) 100%);
  border-right: 1px solid rgba(212,165,32,0.12);
  z-index: 10;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: rgba(212,165,32,0.3) transparent;
  backdrop-filter: blur(12px);
  transition: transform 0.4s cubic-bezier(0.23,1,0.32,1);
}

#sidebar::-webkit-scrollbar { width: 3px; }
#sidebar::-webkit-scrollbar-thumb { background: rgba(212,165,32,0.3); border-radius: 2px; }

#sidebar-head {
  position: sticky; top: 0; z-index: 2;
  padding: 16px 14px 10px;
  background: linear-gradient(180deg, rgba(4,4,14,0.99) 70%, transparent);
  text-align: center;
}

#sidebar-head h1 {
  font-family: 'Cinzel Decorative', serif;
  font-size: 15px;
  color: var(--neural-gold);
  text-shadow: 0 0 25px rgba(212,165,32,0.5);
  letter-spacing: 2px;
}

#sidebar-head .sub {
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-top: 3px;
}

.lobe-group { margin: 3px 6px; }

.lobe-head {
  display: flex; align-items: center; gap: 7px;
  padding: 7px 9px;
  cursor: pointer;
  border-radius: 5px;
  font-family: 'Cinzel Decorative', serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.5px;
  transition: all 0.25s;
  border: 1px solid transparent;
  user-select: none;
}

.lobe-head:hover { background: rgba(212,165,32,0.07); border-color: rgba(212,165,32,0.15); }
.lobe-head.active { background: rgba(212,165,32,0.1); border-color: rgba(212,165,32,0.25); }
.lobe-head .lem { font-size: 15px; }
.lobe-head .lnum { font-family: 'Fira Code', monospace; font-size: 8px; color: var(--text-dim); min-width: 16px; }
.lobe-head .chev { margin-left: auto; font-size: 9px; transition: transform 0.3s; color: var(--text-dim); }
.lobe-head.active .chev { transform: rotate(90deg); }

.region-list { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
.region-list.open { max-height: 1500px; }

.region-item {
  display: flex; align-items: center; gap: 7px;
  padding: 4px 8px 4px 32px;
  cursor: pointer;
  font-size: 11px;
  color: var(--text-dim);
  transition: all 0.2s;
  border-radius: 3px;
  margin: 1px 3px;
  user-select: none;
}

.region-item:hover { color: var(--text-bright); background: rgba(0,229,255,0.05); }
.region-item.active { color: var(--synapse-cyan); background: rgba(0,229,255,0.08); }
.region-item .rem { font-size: 12px; flex-shrink: 0; }
.region-item .rnum { font-family: 'Fira Code', monospace; font-size: 8px; min-width: 18px; opacity: 0.4; }

/* ═══ INFO PANEL ═══ */
#info-panel {
  position: fixed;
  bottom: 16px; left: 330px; right: 16px;
  max-width: 700px;
  max-height: 42%;
  background: var(--panel-bg);
  border: 1px solid rgba(212,165,32,0.18);
  border-radius: 10px;
  padding: 22px 24px;
  backdrop-filter: blur(20px);
  overflow-y: auto;
  transform: translateY(130%);
  transition: transform 0.5s cubic-bezier(0.23,1,0.32,1);
  z-index: 10;
  scrollbar-width: thin;
  scrollbar-color: rgba(212,165,32,0.3) transparent;
}

#info-panel.vis { transform: translateY(0); }

.ph { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.ph .pe { font-size: 30px; }
.ph .pt { font-family: 'Cinzel Decorative', serif; font-size: 18px; color: var(--neural-gold); text-shadow: 0 0 12px rgba(212,165,32,0.35); }
.ph .pp { font-size: 10px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; }
.pb { font-size: 13px; line-height: 1.7; }
.pb p { margin-bottom: 8px; }
.kws { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
.kw { padding: 2px 9px; border-radius: 16px; font-size: 10px; font-family: 'Fira Code', monospace; border: 1px solid; }

#close-p {
  position: absolute; top: 10px; right: 14px;
  background: none; border: 1px solid rgba(255,255,255,0.12);
  color: var(--text-dim); width: 26px; height: 26px;
  border-radius: 50%; cursor: pointer; font-size: 13px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}

#close-p:hover { color: var(--neural-gold); border-color: var(--neural-gold); }

/* ═══ HUD ═══ */
#hud {
  position: fixed;
  top: 14px; right: 14px;
  background: var(--panel-bg);
  border: 1px solid rgba(212,165,32,0.12);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 10px;
  z-index: 10;
  backdrop-filter: blur(10px);
  min-width: 160px;
}

#hud h3 {
  font-family: 'Cinzel Decorative', serif;
  font-size: 10px;
  color: var(--neural-gold);
  margin-bottom: 6px;
  letter-spacing: 1px;
}

.hud-row { display: flex; align-items: center; gap: 7px; margin: 2px 0; color: var(--text-dim); font-size: 10px; }
.hud-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

#controls-hint {
  position: fixed;
  bottom: 14px; right: 14px;
  background: var(--panel-bg);
  border: 1px solid rgba(212,165,32,0.1);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 10px;
  color: var(--text-dim);
  z-index: 10;
  backdrop-filter: blur(10px);
  font-family: 'Fira Code', monospace;
}

/* ═══ LOADING ═══ */
#loader {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: var(--void);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 100;
  transition: opacity 1s;
}

#loader.gone { opacity: 0; pointer-events: none; }

#loader h1 {
  font-family: 'Cinzel Decorative', serif;
  font-size: 24px;
  color: var(--neural-gold);
  text-shadow: 0 0 40px rgba(212,165,32,0.6);
}

#loader p { color: var(--text-dim); font-size: 11px; letter-spacing: 3px; margin-top: 6px; }

.spinner {
  width: 36px; height: 36px;
  border: 2px solid rgba(212,165,32,0.15);
  border-top-color: var(--neural-gold);
  border-radius: 50%;
  animation: sp 1s linear infinite;
  margin-top: 20px;
}

@keyframes sp { to { transform: rotate(360deg); } }

@media (max-width: 800px) {
  #sidebar { width: 250px; transform: translateX(-100%); }
  #sidebar.open { transform: translateX(0); }
  #mob-tog { display: flex !important; }
  #info-panel { left: 16px; }
}

#mob-tog {
  display: none;
  position: fixed; top: 10px; left: 10px; z-index: 15;
  width: 34px; height: 34px;
  background: var(--panel-bg); border: 1px solid rgba(212,165,32,0.25);
  border-radius: 7px; color: var(--neural-gold); font-size: 16px;
  align-items: center; justify-content: center; cursor: pointer;
}
</style>
</head>

// Store node data for raycasting
const nodeMeshes = [];
const nodeDataMap = new Map();

// Cortical folding offsets (sulci & gyri pattern)
function corticalFold(angle, height, depth) {
  const fold = Math.sin(angle * 3.7) * 0.8 + Math.cos(angle * 5.3 + height) * 0.5;
  return fold * depth;
}

LOBES.forEach((lobe, li) => {
  const baseAngle = (li / LOBES.length) * Math.PI * 2 - Math.PI / 2;
  const col = new THREE.Color(lobe.c);

  lobe.regions.forEach((region, ri) => {
    const frac = (ri + 1) / (lobe.regions.length + 1);
    const spread = 8 + frac * 10;
    const angleJitter = (ri - lobe.regions.length / 2) * 0.12;
    const angle = baseAngle + angleJitter;

    // Cortical fold displacement
    const foldDisp = corticalFold(angle, frac * 5, 1.5);

    // ── CROWN NODE (upper hemisphere) ──
    const cx = Math.cos(angle) * spread + foldDisp * Math.cos(angle + 1);
    const cy = 2 + frac * 13 + Math.sin(frac * Math.PI) * 2;
    const cz = Math.sin(angle) * spread * 0.6 + foldDisp * Math.sin(angle + 1);

    const nodeGeo = new THREE.SphereGeometry(0.28, 16, 16);
    const nodeMat = new THREE.MeshStandardMaterial({
      color: col,
      emissive: col,
      emissiveIntensity: 0.6,
      metalness: 0.3,
      roughness: 0.4
    });
    const nodeMesh = new THREE.Mesh(nodeGeo, nodeMat);
    nodeMesh.position.set(cx, cy, cz);
    nodeGroup.add(nodeMesh);
    nodeMeshes.push(nodeMesh);
    nodeDataMap.set(nodeMesh.uuid, { region, lobe, type: 'crown' });

    // Glow sphere
    const glowNodeGeo = new THREE.SphereGeometry(0.55, 8, 8);
    const glowNodeMat = new THREE.MeshBasicMaterial({
      color: col, transparent: true, opacity: 0.12, side: THREE.BackSide
    });
    const glowNode = new THREE.Mesh(glowNodeGeo, glowNodeMat);
    glowNode.position.copy(nodeMesh.position);
    nodeGroup.add(glowNode);

    // ── ROOT NODE (mirror — lower hemisphere) ──
    const rx = cx * 0.75;
    const ry = -cy * 0.85;
    const rz = cz * 0.75;

    const rootGeo = new THREE.SphereGeometry(0.2, 12, 12);
    const rootMat = new THREE.MeshStandardMaterial({
      color: col,
      emissive: col,
      emissiveIntensity: 0.3,
      metalness: 0.5,
      roughness: 0.5,
      transparent: true,
      opacity: 0.6
    });
    const rootMesh = new THREE.Mesh(rootGeo, rootMat);
    rootMesh.position.set(rx, ry, rz);
    nodeGroup.add(rootMesh);
    nodeMeshes.push(rootMesh);
    nodeDataMap.set(rootMesh.uuid, { region, lobe, type: 'root' });

    // ── DENDRITE BRANCH (trunk → crown node) ──
    const midY = cy * 0.4;
    const midX = cx * 0.3;
    const midZ = cz * 0.3;
    const branchCurve = new THREE.CatmullRomCurve3([
      new THREE.Vector3(0, 2, 0),
      new THREE.Vector3(midX * 0.5, midY, midZ * 0.5),
      new THREE.Vector3(midX, midY + (cy - midY) * 0.4, midZ),
      new THREE.Vector3(cx, cy, cz)
    ]);

    const branchTube = new THREE.TubeGeometry(branchCurve, 20, 0.06 + (1 - frac) * 0.08, 6, false);
    const branchMat = new THREE.MeshStandardMaterial({
      color: col, emissive: col, emissiveIntensity: 0.2,
      transparent: true, opacity: 0.35, metalness: 0.3, roughness: 0.6
    });
    branchGroup.add(new THREE.Mesh(branchTube, branchMat));

    // ── ROOT BRANCH (trunk → root node) ──
    const rmidY = ry * 0.35;
    const rootCurve = new THREE.CatmullRomCurve3([
      new THREE.Vector3(0, -2, 0),
      new THREE.Vector3(rx * 0.3, rmidY, rz * 0.3),
      new THREE.Vector3(rx * 0.6, rmidY + (ry - rmidY) * 0.5, rz * 0.6),
      new THREE.Vector3(rx, ry, rz)
    ]);

    const rootTube = new THREE.TubeGeometry(rootCurve, 16, 0.04 + (1 - frac) * 0.06, 6, false);
    const rootBrMat = new THREE.MeshStandardMaterial({
      color: col, emissive: col, emissiveIntensity: 0.1,
      transparent: true, opacity: 0.2, metalness: 0.4, roughness: 0.7
    });
    mirrorBranchGroup.add(new THREE.Mesh(rootTube, rootBrMat));

    // ── SYNAPSE CONNECTOR (crown ↔ root) ──
    // Store positions for particle animation
    nodeMesh.userData = { crownPos: new THREE.Vector3(cx, cy, cz), rootPos: new THREE.Vector3(rx, ry, rz), col: col };
  });
});

// ═══ SYNAPSE PARTICLES ═══
const SYNAPSE_COUNT = 300;
const synPositions = new Float32Array(SYNAPSE_COUNT * 3);
const synColors = new Float32Array(SYNAPSE_COUNT * 3);
const synData = [];

for (let i = 0; i < SYNAPSE_COUNT; i++) {
  // Pick a random crown node
  const crownNodes = nodeMeshes.filter((_, idx) => {
    const d = nodeDataMap.get(nodeMeshes[idx].uuid);
    return d && d.type === 'crown';
  });
  const src = crownNodes[Math.floor(Math.random() * crownNodes.length)];
  if (!src || !src.userData.crownPos) continue;

  synData.push({
    start: src.userData.crownPos.clone(),
    end: src.userData.rootPos.clone(),
    t: Math.random(),
    speed: 0.002 + Math.random() * 0.006,
    col: src.userData.col || new THREE.Color(0xd4a520)
  });

  const c = synData[synData.length - 1].col;
  synColors[i * 3] = c.r;
  synColors[i * 3 + 1] = c.g;
  synColors[i * 3 + 2] = c.b;
}

const synGeo = new THREE.BufferGeometry();
synGeo.setAttribute('position', new THREE.BufferAttribute(synPositions, 3));
synGeo.setAttribute('color', new THREE.BufferAttribute(synColors, 3));

const synMat = new THREE.PointsMaterial({
  size: 0.12,
  vertexColors: true,
  transparent: true,
  opacity: 0.7,
  blending: THREE.AdditiveBlending,
  depthWrite: false
});

const synPoints = new THREE.Points(synGeo, synMat);
scene.add(synPoints);

// ═══ CORTICAL SURFACE (transparent hemisphere shells) ═══
function createCorticalShell(ySign, opacity, radius) {
  const shellGeo = new THREE.SphereGeometry(radius, 48, 32, 0, Math.PI * 2, ySign > 0 ? 0 : Math.PI / 2, Math.PI / 2);
  const shellMat = new THREE.MeshStandardMaterial({
    color: 0x1a1a3e,
    emissive: 0x0a0a2e,
    emissiveIntensity: 0.3,
    transparent: true,
    opacity: opacity,
    metalness: 0.2,
    roughness: 0.8,
    side: THREE.DoubleSide,
    wireframe: true
  });
  const shell = new THREE.Mesh(shellGeo, shellMat);
  shell.position.y = ySign * 3;
  scene.add(shell);
  return shell;
}

const crownShell = createCorticalShell(1, 0.04, 20);
const rootShell = createCorticalShell(-1, 0.03, 16);

// ═══ CAMERA CONTROLS (custom orbit) ═══
let isDragging = false;
let prevMouse = { x: 0, y: 0 };
let spherical = { theta: 0, phi: Math.PI / 3, radius: 35 };
let targetSpherical = { ...spherical };
let autoRotate = true;

renderer.domElement.addEventListener('mousedown', (e) => {
  isDragging = true;
  autoRotate = false;
  prevMouse = { x: e.clientX, y: e.clientY };
});

window.addEventListener('mouseup', () => { isDragging = false; });

window.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const dx = e.clientX - prevMouse.x;
  const dy = e.clientY - prevMouse.y;
  targetSpherical.theta -= dx * 0.005;
  targetSpherical.phi = Math.max(0.2, Math.min(Math.PI - 0.2, targetSpherical.phi - dy * 0.005));
  prevMouse = { x: e.clientX, y: e.clientY };
});

renderer.domElement.addEventListener('wheel', (e) => {
  e.preventDefault();
  targetSpherical.radius = Math.max(15, Math.min(60, targetSpherical.radius + e.deltaY * 0.03));
}, { passive: false });

// Touch support
renderer.domElement.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    isDragging = true;
    autoRotate = false;
    prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
}, { passive: false });

renderer.domElement.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (isDragging && e.touches.length === 1) {
    const dx = e.touches[0].clientX - prevMouse.x;
    const dy = e.touches[0].clientY - prevMouse.y;
    targetSpherical.theta -= dx * 0.005;
    targetSpherical.phi = Math.max(0.2, Math.min(Math.PI - 0.2, targetSpherical.phi - dy * 0.005));
    prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
}, { passive: false });

renderer.domElement.addEventListener('touchend', () => { isDragging = false; });

function onPointerMove(e) {
  const rect = renderer.domElement.getBoundingClientRect();
  const cx = e.clientX || (e.touches && e.touches[0].clientX);
  const cy = e.clientY || (e.touches && e.touches[0].clientY);
  if (cx === undefined) return;
  mouse.x = ((cx - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((cy - rect.top) / rect.height) * 2 + 1;
}

renderer.domElement.addEventListener('mousemove', onPointerMove);

renderer.domElement.addEventListener('click', (e) => {
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(nodeMeshes);
  if (intersects.length > 0) {
    const mesh = intersects[0].object;
    const data = nodeDataMap.get(mesh.uuid);
    if (data) {
      selectedNode = mesh;
      selectRegion(data.region, data.lobe);
      selRing.visible = true;
      selRing.position.copy(mesh.position);
    }
  }
});

// ═══ ANIMATION LOOP ═══
let clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const elapsed = clock.getElapsedTime();

  // Auto-rotate
  if (autoRotate) {
    targetSpherical.theta += 0.002;
  }

  // Smooth camera
  spherical.theta += (targetSpherical.theta - spherical.theta) * 0.05;
  spherical.phi += (targetSpherical.phi - spherical.phi) * 0.05;
  spherical.radius += (targetSpherical.radius - spherical.radius) * 0.05;

  camera.position.x = spherical.radius * Math.sin(spherical.phi) * Math.cos(spherical.theta);
  camera.position.y = spherical.radius * Math.cos(spherical.phi);
  camera.position.z = spherical.radius * Math.sin(spherical.phi) * Math.sin(spherical.theta);
  camera.lookAt(0, 2, 0);

  // Pulse node emissive
  nodeMeshes.forEach((mesh, i) => {
    const mat = mesh.material;
    if (mat.emissiveIntensity !== undefined) {
      const base = nodeDataMap.get(mesh.uuid)?.type === 'crown' ? 0.6 : 0.3;
      mat.emissiveIntensity = base + Math.sin(elapsed * 2 + i * 0.5) * 0.2;
    }
  });

  // Animate synapse particles
  for (let i = 0; i < synData.length; i++) {
    const s = synData[i];
    s.t += s.speed;
    if (s.t > 1) { s.t = 0; s.speed = 0.002 + Math.random() * 0.006; }

    // Bezier-ish path through center
    const mid = new THREE.Vector3(
      s.start.x * 0.2 * (1 - s.t) + s.end.x * 0.2 * s.t,
      0 + Math.sin(s.t * Math.PI) * 2,
      s.start.z * 0.2 * (1 - s.t) + s.end.z * 0.2 * s.t
    );

    const t = s.t;
    const inv = 1 - t;
    const px = inv * inv * s.start.x + 2 * inv * t * mid.x + t * t * s.end.x;
    const py = inv * inv * s.start.y + 2 * inv * t * mid.y + t * t * s.end.y;
    const pz = inv * inv * s.start.z + 2 * inv * t * mid.z + t * t * s.end.z;

    synPositions[i * 3] = px;
    synPositions[i * 3 + 1] = py;
    synPositions[i * 3 + 2] = pz;
  }
  synGeo.attributes.position.needsUpdate = true;

  // Rotate cortical shells slowly
  crownShell.rotation.y = elapsed * 0.03;
  crownShell.rotation.x = Math.sin(elapsed * 0.02) * 0.05;
  rootShell.rotation.y = -elapsed * 0.025;
  rootShell.rotation.x = Math.sin(elapsed * 0.015) * 0.04;

  // Hover ring faces camera
  hoverRing.lookAt(camera.position);
  selRing.lookAt(camera.position);
  selRing.rotation.z = elapsed * 0.5;

  // Pulse core light
  coreLight.intensity = 2 + Math.sin(elapsed * 1.5) * 0.5;

  // Raycast hover
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(nodeMeshes);
  if (hits.length > 0 && !isDragging) {
    const h = hits[0].object;
    hoverRing.visible = true;
    hoverRing.position.copy(h.position);
    renderer.domElement.style.cursor = 'pointer';
  } else {
    hoverRing.visible = false;
    renderer.domElement.style.cursor = isDragging ? 'grabbing' : 'default';
  }

  renderer.render(scene, camera);
}

  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ═══ INIT ═══
buildSidebar();
buildHUD();
animate();

setTimeout(() => {
  document.getElementById('loader').classList.add('gone');
}, 1500);
</script>
</body>
