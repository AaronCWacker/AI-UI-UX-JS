<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>🌳 Yggdrasil — AI Knowledge Tree Gallery</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8C%B3%3C/text%3E%3C/svg%3E">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --trunk: #5C3D2E;
      --bark-light: #8B6914;
      --leaf-mother: #2D8B4E;
      --leaf-father: #1A6B8A;
      --gold: #C9A84C;
      --rune: #E8D5A3;
      --void: #0A0E17;
      --mist: rgba(180,200,220,0.08);
      --glow-mother: #3BF08C;
      --glow-father: #3BB8F0;
      --amber: #F0A830;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Fira Code', monospace;
      background: var(--void);
      color: var(--rune);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }
    #three-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }
    /* === HUD OVERLAY === */
    #hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
      pointer-events: none;
    }
    #hud > * { pointer-events: auto; }
    .hud-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: linear-gradient(180deg, rgba(10,14,23,0.95) 0%, rgba(10,14,23,0.6) 80%, transparent 100%);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(201,168,76,0.15);
    }
    .hud-title {
      font-family: 'Cinzel', serif;
      font-weight: 900;
      font-size: 1.2rem;
      letter-spacing: 0.15em;
      background: linear-gradient(135deg, var(--gold), var(--amber), var(--rune));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: none;
    }
    .hud-controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .hud-btn {
      background: rgba(201,168,76,0.08);
      border: 1px solid rgba(201,168,76,0.2);
      color: var(--rune);
      padding: 5px 12px;
      border-radius: 6px;
      font-family: 'Fira Code', monospace;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.25s;
    }
    .hud-btn:hover {
      background: rgba(201,168,76,0.2);
      border-color: var(--gold);
      box-shadow: 0 0 12px rgba(201,168,76,0.15);
    }
    .hud-btn.active {
      background: rgba(201,168,76,0.25);
      border-color: var(--gold);
      color: var(--gold);
    }
    #search-box {
      background: rgba(10,14,23,0.8);
      border: 1px solid rgba(201,168,76,0.2);
      color: var(--rune);
      padding: 5px 12px;
      border-radius: 6px;
      font-family: 'Fira Code', monospace;
      font-size: 11px;
      width: 180px;
      outline: none;
      transition: border-color 0.3s;
    }
    #search-box:focus {
      border-color: var(--gold);
      box-shadow: 0 0 8px rgba(201,168,76,0.2);
    }
    #search-box::placeholder { color: rgba(232,213,163,0.3); }
    /* === GENE LEGEND === */
    .gene-legend {
      position: fixed;
      bottom: 16px; left: 16px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 10px;
      opacity: 0.7;
    }
    .gene-tag {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: rgba(10,14,23,0.8);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.06);
      backdrop-filter: blur(8px);
    }
    .gene-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }
    /* === INFO PANEL === */
    #info-panel {
      position: fixed;
      bottom: 16px; right: 16px;
      z-index: 10;
      background: rgba(10,14,23,0.9);
      border: 1px solid rgba(201,168,76,0.15);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 11px;
      backdrop-filter: blur(12px);
      max-width: 280px;
      display: none;
    }
    #info-panel .info-title {
      font-family: 'Cinzel', serif;
      font-weight: 700;
      font-size: 14px;
      color: var(--gold);
      margin-bottom: 6px;
    }
    #info-panel .info-meta {
      color: rgba(232,213,163,0.5);
      font-size: 9px;
      margin-bottom: 8px;
    }
    #info-panel .info-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    #info-panel .info-actions button {
      flex: 1;
      padding: 6px;
      border-radius: 6px;
      font-family: 'Fira Code', monospace;
      font-size: 10px;
      cursor: pointer;
      border: 1px solid;
      transition: all 0.2s;
    }
    .btn-launch {
      background: rgba(59,240,140,0.15);
      border-color: rgba(59,240,140,0.3) !important;
      color: var(--glow-mother);
    }
    .btn-launch:hover { background: rgba(59,240,140,0.3); }
    .btn-code {
      background: rgba(59,184,240,0.1);
      border-color: rgba(59,184,240,0.2) !important;
      color: var(--glow-father);
    }
    .btn-code:hover { background: rgba(59,184,240,0.2); }
    /* === STATS === */
    #stats-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 9;
      text-align: center;
      padding: 4px;
      font-size: 9px;
      color: rgba(232,213,163,0.3);
      background: linear-gradient(0deg, rgba(10,14,23,0.9) 0%, transparent 100%);
      font-family: 'Fira Code', monospace;
      letter-spacing: 0.1em;
    }
    /* === GENERATION COUNTER === */
    #gen-counter {
      position: fixed;
      top: 60px; right: 16px;
      z-index: 10;
      font-family: 'Cinzel', serif;
      font-size: 10px;
      color: rgba(201,168,76,0.4);
      text-align: right;
    }
    #gen-counter .gen-num {
      font-size: 28px;
      font-weight: 900;
      color: var(--gold);
      opacity: 0.6;
      line-height: 1;
    }
    /* === FILTER PILLS === */
    #filter-row {
      display: flex;
      gap: 4px;
      padding: 6px 16px;
      overflow-x: auto;
      scrollbar-width: none;
      background: rgba(10,14,23,0.5);
    }
    #filter-row::-webkit-scrollbar { display: none; }
    .filter-pill {
      flex-shrink: 0;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-family: 'Fira Code', monospace;
      cursor: pointer;
      border: 1px solid rgba(201,168,76,0.1);
      background: transparent;
      color: rgba(232,213,163,0.4);
      transition: all 0.25s;
    }
    .filter-pill:hover { color: var(--rune); border-color: rgba(201,168,76,0.3); }
    .filter-pill.active {
      background: rgba(201,168,76,0.15);
      color: var(--gold);
      border-color: rgba(201,168,76,0.4);
    }
    /* Loading overlay */
    #loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: var(--void);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.8s;
    }
    #loading-overlay.fade { opacity: 0; pointer-events: none; }
    .loading-rune {
      font-size: 48px;
      animation: pulse-rune 2s ease-in-out infinite;
    }
    @keyframes pulse-rune {
      0%, 100% { opacity: 0.3; transform: scale(0.95); }
      50% { opacity: 1; transform: scale(1.05); }
    }
    .loading-text {
      font-family: 'Cinzel', serif;
      font-size: 14px;
      color: var(--gold);
      margin-top: 16px;
      letter-spacing: 0.2em;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <!-- Loading -->
  <div id="loading-overlay">
    <div class="loading-rune">🌳</div>
    <div class="loading-text">GROWING YGGDRASIL…</div>
  </div>

  <!-- Three.js Canvas -->
  <canvas id="three-canvas"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-bar">
      <div style="display:flex; align-items:center; gap:12px;">
        <span class="hud-title">🌳 YGGDRASIL</span>
        <span style="font-size:9px; opacity:0.3; letter-spacing:0.1em;">KNOWLEDGE TREE</span>
      </div>
      <div class="hud-controls">
        <input type="text" id="search-box" placeholder="⌘K search runes…" />
        <button class="hud-btn" id="btn-grow" title="Grow next generation">🌱 Grow</button>
        <button class="hud-btn" id="btn-reset" title="Reset view">⟲ Reset</button>
        <button class="hud-btn" id="btn-flat" title="Toggle flat gallery">📋 Flat</button>
      </div>
    </div>
    <div id="filter-row"></div>
  </div>

  <!-- Gene Legend -->
  <div class="gene-legend">
    <div class="gene-tag">
      <div class="gene-dot" style="background:var(--glow-mother);box-shadow:0 0 6px var(--glow-mother)"></div>
      <span>🧬 Mother Lineage — Structure / Logic</span>
    </div>
    <div class="gene-tag">
      <div class="gene-dot" style="background:var(--glow-father);box-shadow:0 0 6px var(--glow-father)"></div>
      <span>🧬 Father Lineage — Creative / Chaos</span>
    </div>
    <div class="gene-tag">
      <div class="gene-dot" style="background:var(--gold);box-shadow:0 0 6px var(--gold)"></div>
      <span>🧬 Hybrid Offspring — Emergent</span>
    </div>
  </div>

  <!-- Info Panel -->
  <div id="info-panel">
    <div class="info-title" id="info-name">—</div>
    <div class="info-meta" id="info-meta">—</div>
    <div id="info-gene" style="font-size:10px;margin-bottom:4px;">—</div>
    <div class="info-actions">
      <button class="btn-launch" id="info-launch">🚀 Launch</button>
      <button class="btn-code" id="info-code">🧾 Source</button>
    </div>
  </div>

  <!-- Generation Counter -->
  <div id="gen-counter">
    <div>GENERATION</div>
    <div class="gen-num" id="gen-num">0</div>
  </div>

  <!-- Stats -->
  <div id="stats-bar">⏳ Seeding…</div>

  <!-- Three.js r172 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <script>
  // ================================================================
  //  🌳 YGGDRASIL — L-System Knowledge Tree with Genetic Inheritance
  // ================================================================

  const CONFIG = {
    user: 'aaroncwacker',
    repo: 'AI-UI-UX-JS',
    root: 'https://aaroncwacker.github.io/AI-UI-UX-JS/',
  };

  const FILE_TYPES = [
    { id:'all', keys:['all'], label:'All', emoji:'💠' },
    { id:'ai', keys:['ai','bot','gpt','gemini','claude','llm','agent','speech','voice'], label:'AI/LLM', emoji:'🧠' },
    { id:'sim', keys:['sim','city','traffic','evolution','network','population'], label:'World Sim', emoji:'🌍' },
    { id:'tool', keys:['builder','editor','visualizer','dashboard','teleprompter','graph','art','creator'], label:'Tools', emoji:'🛠️' },
    { id:'audio', keys:['mp3','audio','jam','looper','chord','music','sound'], label:'Audio', emoji:'🎵' },
    { id:'video', keys:['video','cam','cinema','timeline','sequencer','mp4'], label:'Video', emoji:'📹' },
    { id:'game', keys:['game','arcade','quest','brawl','combat','retro','memory','play','versus'], label:'Arcade', emoji:'🕹️' },
    { id:'drive', keys:['drive','racer','rally','racing','car'], label:'Racing', emoji:'🏎️' },
    { id:'cards', keys:['tarot','oracle','deck','spirit','card'], label:'Tarot', emoji:'🔮' },
    { id:'3d', keys:['3d','webgl','three','canvas','skyforge'], label:'3D', emoji:'🧊' },
    { id:'gps', keys:['gps','map','zipcode','location'], label:'Maps', emoji:'📍' },
    { id:'space', keys:['alien','ufo','space','starship','thor'], label:'Sci-Fi', emoji:'🚀' },
  ];

  // === STATE ===
  let apps = [];
  let treeNodes = [];
  let generation = 0;
  let activeFilter = 'all';
  let searchTerm = '';
  let selectedNode = null;
  let flatMode = false;

  // === THREE.JS SETUP ===
  const canvas = document.getElementById('three-canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x0A0E17, 1);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x0A0E17, 0.012);

  const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 500);
  camera.position.set(0, 15, 40);
  camera.lookAt(0, 10, 0);

  // Lights
  const ambientLight = new THREE.AmbientLight(0x1a1a2e, 0.6);
  scene.add(ambientLight);

  const moonLight = new THREE.DirectionalLight(0xC9A84C, 0.4);
  moonLight.position.set(20, 40, 10);
  moonLight.castShadow = true;
  moonLight.shadow.mapSize.set(2048, 2048);
  scene.add(moonLight);

  const motherLight = new THREE.PointLight(0x3BF08C, 0.8, 60);
  motherLight.position.set(-15, 20, 5);
  scene.add(motherLight);

  const fatherLight = new THREE.PointLight(0x3BB8F0, 0.8, 60);
  fatherLight.position.set(15, 20, -5);
  scene.add(fatherLight);

  // Ground plane — dark rune circle
  const groundGeo = new THREE.CircleGeometry(50, 64);
  const groundMat = new THREE.MeshStandardMaterial({
    color: 0x0D1117,
    roughness: 0.95,
    metalness: 0.1,
  });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene.add(ground);

  // Rune ring
  const ringGeo = new THREE.RingGeometry(18, 18.3, 128);
  const ringMat = new THREE.MeshBasicMaterial({ color: 0xC9A84C, transparent: true, opacity: 0.08, side: THREE.DoubleSide });
  const runeRing = new THREE.Mesh(ringGeo, ringMat);
  runeRing.rotation.x = -Math.PI / 2;
  runeRing.position.y = 0.02;
  scene.add(runeRing);

  // Particle mist
  const mistCount = 600;
  const mistGeo = new THREE.BufferGeometry();
  const mistPositions = new Float32Array(mistCount * 3);
  for (let i = 0; i < mistCount; i++) {
    mistPositions[i*3] = (Math.random() - 0.5) * 80;
    mistPositions[i*3+1] = Math.random() * 35;
    mistPositions[i*3+2] = (Math.random() - 0.5) * 80;
  }
  mistGeo.setAttribute('position', new THREE.BufferAttribute(mistPositions, 3));
  const mistMat = new THREE.PointsMaterial({ color: 0xC9A84C, size: 0.15, transparent: true, opacity: 0.2 });
  const mistParticles = new THREE.Points(mistGeo, mistMat);
  scene.add(mistParticles);

  // === L-SYSTEM ENGINE ===
  // Axiom: F  |  Rules differ for Mother vs Father lineage
  const LSYSTEM = {
    // Mother: structured, branching, orderly
    mother: {
      axiom: 'F',
      rules: { 'F': 'F[+F]F[-F]F' },
      angle: 25.7,
      lengthScale: 0.85,
      color: 0x3BF08C,
    },
    // Father: chaotic, curving, exploratory
    father: {
      axiom: 'F',
      rules: { 'F': 'FF+[+F-F-F]-[-F+F+F]' },
      angle: 22.5,
      lengthScale: 0.78,
      color: 0x3BB8F0,
    }
  };

  function expandLSystem(axiom, rules, iterations) {
    let current = axiom;
    for (let i = 0; i < iterations; i++) {
      let next = '';
      for (const ch of current) {
        next += rules[ch] || ch;
      }
      current = next;
    }
    return current;
  }

  // === GENETIC MIXING ===
  function mixGenes(mother, father, bias = 0.5) {
    return {
      angle: mother.angle * bias + father.angle * (1 - bias),
      lengthScale: mother.lengthScale * bias + father.lengthScale * (1 - bias),
      color: new THREE.Color(mother.color).lerp(new THREE.Color(father.color), 1 - bias),
    };
  }

  // === BUILD TREE GEOMETRY ===
  function buildTree(apps, gen) {
    // Remove old tree
    treeNodes.forEach(n => {
      if (n.mesh) scene.remove(n.mesh);
      if (n.label) scene.remove(n.label);
      if (n.glow) scene.remove(n.glow);
    });
    treeNodes = [];

    if (apps.length === 0) return;

    const iterations = Math.min(gen + 2, 4);
    const motherStr = expandLSystem(LSYSTEM.mother.axiom, LSYSTEM.mother.rules, Math.min(iterations, 3));
    const fatherStr = expandLSystem(LSYSTEM.father.axiom, LSYSTEM.father.rules, Math.min(iterations, 3));

    // We'll place apps along the L-system path segments
    // Each app gets a branch position derived from the L-system turtle
    const branchPositions = generateBranchPositions(motherStr, fatherStr, apps.length, gen);

    apps.forEach((app, i) => {
      const bp = branchPositions[i];
      const fileType = getFileType(app.name);

      // Determine lineage from index position
      const lineage = i % 3 === 0 ? 'mother' : i % 3 === 1 ? 'father' : 'hybrid';
      const genes = lineage === 'mother' ? LSYSTEM.mother :
                    lineage === 'father' ? LSYSTEM.father :
                    mixGenes(LSYSTEM.mother, LSYSTEM.father, 0.4 + Math.random() * 0.2);

      const baseColor = lineage === 'mother' ? 0x3BF08C :
                        lineage === 'father' ? 0x3BB8F0 :
                        genes.color.getHex ? genes.color.getHex() : 0xC9A84C;

      // Leaf node (app tile)
      const size = 0.4 + (app.date ? Math.min((Date.now() - app.date) / (365*24*3600000), 1) * 0.3 : 0.2);
      const leafGeo = new THREE.IcosahedronGeometry(size, 1);
      const leafMat = new THREE.MeshStandardMaterial({
        color: baseColor,
        emissive: baseColor,
        emissiveIntensity: 0.15,
        roughness: 0.4,
        metalness: 0.3,
        transparent: true,
        opacity: 0.85,
      });
      const leaf = new THREE.Mesh(leafGeo, leafMat);
      leaf.position.copy(bp.pos);
      leaf.castShadow = true;
      scene.add(leaf);

      // Glow sphere
      const glowGeo = new THREE.SphereGeometry(size * 1.6, 8, 8);
      const glowMat = new THREE.MeshBasicMaterial({
        color: baseColor,
        transparent: true,
        opacity: 0.06,
      });
      const glow = new THREE.Mesh(glowGeo, glowMat);
      glow.position.copy(bp.pos);
      scene.add(glow);

      // Branch line from parent
      if (bp.parent) {
        const branchMat = new THREE.LineBasicMaterial({
          color: baseColor,
          transparent: true,
          opacity: 0.25,
        });
        const branchGeo = new THREE.BufferGeometry().setFromPoints([bp.parent, bp.pos]);
        const branchLine = new THREE.Line(branchGeo, branchMat);
        scene.add(branchLine);
      }

      // Store node
      const node = {
        mesh: leaf,
        glow,
        app,
        lineage,
        fileType,
        baseColor,
        originalScale: leaf.scale.clone(),
      };
      leaf.userData = { nodeIndex: treeNodes.length };
      treeNodes.push(node);
    });

    // Build trunk
    buildTrunk(gen);
  }

  function generateBranchPositions(motherStr, fatherStr, count, gen) {
    const positions = [];
    const trunkHeight = 4 + gen * 1.5;

    // Spiral upward placement with L-system influenced angles
    for (let i = 0; i < count; i++) {
      const t = i / Math.max(count - 1, 1);
      // Golden angle spiral
      const goldenAngle = Math.PI * (3 - Math.sqrt(5));
      const angle = i * goldenAngle;
      // Height follows date order (newest = top)
      const y = trunkHeight + t * (12 + gen * 3);
      // Radius expands with height like a tree canopy
      const radiusBase = 2 + Math.sin(t * Math.PI) * (8 + gen * 2);
      // L-system perturbation
      const lChar = motherStr[i % motherStr.length] || 'F';
      const perturbation = lChar === '+' ? 1.3 : lChar === '-' ? 0.7 : 1.0;
      const radius = radiusBase * perturbation;

      const x = Math.cos(angle) * radius;
      const z = Math.sin(angle) * radius;

      // Parent point on trunk/branch
      const parentY = Math.max(y * 0.6, trunkHeight * 0.5);
      const parentX = x * 0.15;
      const parentZ = z * 0.15;

      positions.push({
        pos: new THREE.Vector3(x, y, z),
        parent: new THREE.Vector3(parentX, parentY, parentZ),
      });
    }
    return positions;
  }

  function buildTrunk(gen) {
    const trunkHeight = 4 + gen * 1.5;
    const segments = 12;
    const trunkPoints = [];

    for (let i = 0; i <= segments; i++) {
      const t = i / segments;
      const y = t * trunkHeight;
      const wobble = Math.sin(t * 4 + gen) * 0.3;
      trunkPoints.push(new THREE.Vector3(wobble, y, wobble * 0.5));
    }

    const trunkCurve = new THREE.CatmullRomCurve3(trunkPoints);
    const trunkGeo = new THREE.TubeGeometry(trunkCurve, 20, 0.6 - gen * 0.02, 8, false);
    const trunkMat = new THREE.MeshStandardMaterial({
      color: 0x5C3D2E,
      roughness: 0.9,
      metalness: 0.1,
    });
    const trunk = new THREE.Mesh(trunkGeo, trunkMat);
    trunk.castShadow = true;
    scene.add(trunk);

    // Root tendrils
    for (let r = 0; r < 5; r++) {
      const rAngle = (r / 5) * Math.PI * 2;
      const rootPoints = [
        new THREE.Vector3(0, 0, 0),
        new THREE.Vector3(Math.cos(rAngle) * 3, -0.5, Math.sin(rAngle) * 3),
        new THREE.Vector3(Math.cos(rAngle) * 6, -1.5, Math.sin(rAngle) * 6),
      ];
      const rootCurve = new THREE.CatmullRomCurve3(rootPoints);
      const rootGeo = new THREE.TubeGeometry(rootCurve, 8, 0.15, 6, false);
      const rootMat = new THREE.MeshStandardMaterial({ color: 0x3D2917, roughness: 0.95 });
      const rootMesh = new THREE.Mesh(rootGeo, rootMat);
      scene.add(rootMesh);
    }
  }

  // === FILE HELPERS ===
  function cleanName(f) { return f.replace(/\.html$/, '').replace(/\.py$/, '').replace(/[-_]/g, ' '); }
  function getFileType(name) {
    const lower = name.toLowerCase();
    return FILE_TYPES.slice(1).find(t => t.keys.some(k => lower.includes(k))) || { id:'other', label:'App', emoji:'⚡' };
  }

  // === CAMERA CONTROLS (simple orbit) ===
  let isDragging = false;
  let prevMouse = { x: 0, y: 0 };
  let cameraAngle = 0;
  let cameraHeight = 15;
  let cameraDistance = 40;
  let targetAngle = 0;
  let targetHeight = 15;
  let targetDistance = 40;
  let autoRotate = true;

  canvas.addEventListener('pointerdown', (e) => {
    isDragging = true;
    prevMouse = { x: e.clientX, y: e.clientY };
    autoRotate = false;
  });
  canvas.addEventListener('pointermove', (e) => {
    if (!isDragging) return;
    const dx = e.clientX - prevMouse.x;
    const dy = e.clientY - prevMouse.y;
    targetAngle += dx * 0.005;
    targetHeight = Math.max(2, Math.min(35, targetHeight - dy * 0.1));
    prevMouse = { x: e.clientX, y: e.clientY };
  });
  canvas.addEventListener('pointerup', () => isDragging = false);
  canvas.addEventListener('pointerleave', () => isDragging = false);
  canvas.addEventListener('wheel', (e) => {
    targetDistance = Math.max(10, Math.min(80, targetDistance + e.deltaY * 0.05));
  });

  // === RAYCASTING ===
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  let hoveredNode = null;

  canvas.addEventListener('pointermove', (e) => {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  });

  canvas.addEventListener('click', (e) => {
    if (hoveredNode) {
      selectNode(hoveredNode);
    } else {
      deselectNode();
    }
  });

  function selectNode(node) {
    selectedNode = node;
    const panel = document.getElementById('info-panel');
    panel.style.display = 'block';
    document.getElementById('info-name').textContent = `${node.fileType.emoji} ${cleanName(node.app.name)}`;
    const dateStr = node.app.date ? new Date(node.app.date).toLocaleDateString() : 'Unknown';
    document.getElementById('info-meta').textContent = `📅 ${dateStr} · 🏷️ ${node.fileType.label} · 🧬 ${node.lineage}`;
    const geneDesc = node.lineage === 'mother' ? '🌿 Structure gene — orderly branching, +25.7° angle' :
                     node.lineage === 'father' ? '🌊 Chaos gene — exploratory branching, ±22.5° angle' :
                     '✨ Hybrid — emergent traits from both lineages';
    document.getElementById('info-gene').textContent = geneDesc;
    document.getElementById('info-launch').onclick = () => {
      window.open(CONFIG.root + node.app.name, '_blank');
    };
    document.getElementById('info-code').onclick = () => {
      window.open(`https://github.com/${CONFIG.user}/${CONFIG.repo}/blob/main/${node.app.name}`, '_blank');
    };

    // Camera focus
    targetHeight = node.mesh.position.y;
    targetDistance = 20;
  }

  function deselectNode() {
    selectedNode = null;
    document.getElementById('info-panel').style.display = 'none';
  }

  // === FILTERS ===
  function buildFilters() {
    const row = document.getElementById('filter-row');
    row.innerHTML = '';
    FILE_TYPES.forEach(ft => {
      const pill = document.createElement('button');
      pill.className = `filter-pill ${ft.id === activeFilter ? 'active' : ''}`;
      pill.textContent = `${ft.emoji} ${ft.label}`;
      pill.onclick = () => {
        activeFilter = ft.id;
        document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
        rebuildTree();
      };
      row.appendChild(pill);
    });
  }

  function getFilteredApps() {
    return apps.filter(app => {
      const name = cleanName(app.name).toLowerCase();
      const matchSearch = name.includes(searchTerm);
      const matchFilter = activeFilter === 'all' ||
        FILE_TYPES.find(f => f.id === activeFilter)?.keys.some(k => name.includes(k));
      return matchSearch && matchFilter;
    });
  }

  function rebuildTree() {
    const filtered = getFilteredApps();
    buildTree(filtered, generation);
    document.getElementById('stats-bar').textContent =
      `🌳 ${filtered.length} nodes · Gen ${generation} · 🧬 Mother ∠${LSYSTEM.mother.angle}° · Father ∠${LSYSTEM.father.angle}° · ${apps.length} total apps`;
  }

  // === DATA FETCHING ===
  async function fetchApps() {
    try {
      const res = await fetch(`https://api.github.com/repos/${CONFIG.user}/${CONFIG.repo}/contents/`);
      const data = await res.json();

      apps = data
        .filter(f => f.type === 'file' && (f.name.endsWith('.html') || f.name.endsWith('.py')) && f.name !== 'index.html' && f.name !== 'python-runner.html')
        .map(f => ({ name: f.name, date: 0 }));

      // Sort by date (newest first) once dates are fetched
      buildFilters();
      rebuildTree();
      fetchDates();

      // Hide loading
      setTimeout(() => {
        document.getElementById('loading-overlay').classList.add('fade');
        setTimeout(() => document.getElementById('loading-overlay').style.display = 'none', 800);
      }, 500);
    } catch (e) {
      document.getElementById('stats-bar').textContent = '💥 Failed to fetch. Retry in 60s…';
    }
  }

  async function fetchDates() {
    let updated = false;
    for (const app of apps) {
      if (app.date) continue;
      try {
        const r = await fetch(CONFIG.root + app.name, { method: 'HEAD' });
        const lm = r.headers.get('Last-Modified');
        if (lm) {
          app.date = new Date(lm).getTime();
          updated = true;
        }
      } catch(e) {}
    }
    if (updated) {
      // Sort newest first
      apps.sort((a, b) => b.date - a.date);
      rebuildTree();
    }
  }

  // === GROW BUTTON ===
  document.getElementById('btn-grow').onclick = () => {
    generation++;
    document.getElementById('gen-num').textContent = generation;
    // Evolve the L-system rules slightly
    LSYSTEM.mother.angle += (Math.random() - 0.5) * 2;
    LSYSTEM.father.angle += (Math.random() - 0.5) * 3;
    LSYSTEM.mother.lengthScale = Math.max(0.6, Math.min(0.95, LSYSTEM.mother.lengthScale + (Math.random()-0.5)*0.05));
    LSYSTEM.father.lengthScale = Math.max(0.5, Math.min(0.9, LSYSTEM.father.lengthScale + (Math.random()-0.5)*0.08));
    rebuildTree();
  };

  document.getElementById('btn-reset').onclick = () => {
    targetAngle = 0;
    targetHeight = 15;
    targetDistance = 40;
    autoRotate = true;
    deselectNode();
  };

  document.getElementById('btn-flat').onclick = () => {
    flatMode = !flatMode;
    document.getElementById('btn-flat').classList.toggle('active', flatMode);
    rebuildTree();
  };

  // Search
  document.getElementById('search-box').addEventListener('input', (e) => {
    searchTerm = e.target.value.toLowerCase();
    rebuildTree();
  });
  window.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
      e.preventDefault();
      document.getElementById('search-box').focus();
    }
  });

  // === ANIMATION LOOP ===
  const clock = new THREE.Clock();

  function animate() {
    requestAnimationFrame(animate);
    const dt = clock.getDelta();
    const elapsed = clock.getElapsedTime();

    // Auto-rotate
    if (autoRotate) targetAngle += dt * 0.08;

    // Smooth camera
    cameraAngle += (targetAngle - cameraAngle) * 0.05;
    cameraHeight += (targetHeight - cameraHeight) * 0.05;
    cameraDistance += (targetDistance - cameraDistance) * 0.05;

    camera.position.x = Math.sin(cameraAngle) * cameraDistance;
    camera.position.z = Math.cos(cameraAngle) * cameraDistance;
    camera.position.y = cameraHeight;

    const lookY = Math.max(cameraHeight * 0.5, 5);
    camera.lookAt(0, lookY, 0);

    // Animate nodes
    treeNodes.forEach((node, i) => {
      if (!node.mesh) return;
      // Gentle float
      node.mesh.position.y += Math.sin(elapsed * 0.8 + i * 0.3) * 0.003;
      // Slow rotation
      node.mesh.rotation.y += dt * 0.2;
      node.mesh.rotation.x = Math.sin(elapsed * 0.5 + i) * 0.1;
    });

    // Mist float
    const positions = mistParticles.geometry.attributes.position.array;
    for (let i = 0; i < mistCount; i++) {
      positions[i*3+1] += Math.sin(elapsed * 0.3 + i * 0.1) * 0.005;
      if (positions[i*3+1] > 35) positions[i*3+1] = 0;
    }
    mistParticles.geometry.attributes.position.needsUpdate = true;

    // Raycasting
    raycaster.setFromCamera(mouse, camera);
    const meshes = treeNodes.map(n => n.mesh).filter(Boolean);
    const intersects = raycaster.intersectObjects(meshes);

    // Reset hover
    if (hoveredNode) {
      hoveredNode.mesh.scale.copy(hoveredNode.originalScale);
      hoveredNode.mesh.material.emissiveIntensity = 0.15;
      hoveredNode.glow.material.opacity = 0.06;
      canvas.style.cursor = 'default';
    }
    hoveredNode = null;

    if (intersects.length > 0) {
      const idx = intersects[0].object.userData.nodeIndex;
      if (idx !== undefined && treeNodes[idx]) {
        hoveredNode = treeNodes[idx];
        hoveredNode.mesh.scale.multiplyScalar(1.4);
        hoveredNode.mesh.material.emissiveIntensity = 0.6;
        hoveredNode.glow.material.opacity = 0.2;
        canvas.style.cursor = 'pointer';
      }
    }

    // Pulse rune ring
    runeRing.material.opacity = 0.04 + Math.sin(elapsed * 0.5) * 0.04;

    renderer.render(scene, camera);
  }

  // === RESIZE ===
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // === INIT ===
  animate();
  fetchApps();

  // Auto-reload
  setInterval(() => fetchApps(), 120000);
  </script>
</body>
</html>
