<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASI DARK FACTORY — Book Engine & 3D Forge</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --gold: #ffc909;
            --gold-bright: #fff352;
            --bg: #06060a;
            --panel-bg: rgba(12,12,18,.92);
            --green: #50dc78;
            --red: #ff4466;
            --cyan: #00e5ff;
            --border: rgba(255,201,9,.3);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; }
        body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: #ddd; }

        /* ═══ MODE TABS ═══ */
        #mode-tabs {
            position: fixed; top: 0; left: 0; right: 0; z-index: 500;
            display: flex; height: 48px;
            background: rgba(6,6,10,.95); border-bottom: 1px solid var(--border);
            backdrop-filter: blur(12px);
        }
        .mode-tab {
            flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px;
            font-family: 'Orbitron', sans-serif; font-size: .8rem; font-weight: 700;
            color: rgba(255,201,9,.5); border: none; background: none; cursor: pointer;
            transition: all .3s; letter-spacing: .08em; text-transform: uppercase;
        }
        .mode-tab:hover { color: var(--gold); }
        .mode-tab.active {
            color: var(--gold-bright); background: rgba(255,201,9,.06);
            box-shadow: inset 0 -2px 0 var(--gold);
        }

        .mode-panel { display: none; position: absolute; top: 48px; left: 0; right: 0; bottom: 0; }
        .mode-panel.active { display: block; }

        /* ═══ TELEPROMPTER MODE ═══ */
        #scene-container { position: absolute; inset: 0; z-index: 1; }
        #teleprompter-container {
            position: absolute; inset: 0; z-index: 2;
            display: flex; justify-content: center;
            pointer-events: none; overflow: hidden; perspective: 600px;
        }
        #teleprompter {
            width: 98%; max-width: 1400px; position: relative;
            transform-style: preserve-3d; transition: max-width .5s ease-in-out;
        }
        .scrolling-content {
            position: absolute; width: 100%;
            animation: crawl 420s linear 1 forwards;
            animation-play-state: paused; will-change: transform; padding-bottom: 22vh;
        }
        @keyframes crawl {
            0%   { transform: rotateX(6deg) translateY(100vh) translateZ(50px); }
            100% { transform: rotateX(6deg) translateY(var(--crawl-end-y,-4200px)) translateZ(-560px); }
        }
        .section { margin-bottom: 2.5rem; pointer-events: all; }
        .section-title {
            color: var(--gold-bright); font-family: 'Orbitron', sans-serif;
            font-size: 2.6rem; font-weight: 900; line-height: 1.25;
            text-align: center; padding: 1rem 0 .75rem;
            text-shadow: 0 0 18px rgba(255,243,82,.3);
        }
        .principle {
            color: var(--gold); font-size: 2.2rem; font-weight: 600; line-height: 1.42;
            text-align: left; padding: .9rem 8px; cursor: pointer; pointer-events: all;
            transition: color .3s, transform .3s, background .3s; border-radius: 6px;
            text-shadow: 0 0 8px rgba(0,0,0,.7);
        }
        .principle:hover { color: var(--gold-bright); transform: scale(1.01); }
        .principle.speaking {
            color: #fff; background: rgba(255,201,9,.1);
            box-shadow: inset 0 0 30px rgba(255,201,9,.06), 0 0 20px rgba(255,201,9,.12);
        }
        .video-link {
            color: var(--gold); display: block; font-size: 2.1rem; font-weight: 700;
            line-height: 1.4; text-align: center; padding: .75rem 0; pointer-events: all;
            transition: color .3s, transform .3s; text-decoration: none;
        }
        .video-link:hover { color: var(--gold-bright); transform: scale(1.01); }

        /* Teleprompter controls */
        .ctrl-btn {
            background: rgba(255,255,255,.06); border: 1px solid var(--border);
            color: var(--gold); padding: 7px 14px; border-radius: 4px; cursor: pointer;
            transition: all .3s; font-weight: 700; pointer-events: all;
            font-family: 'Rajdhani', sans-serif; font-size: .85rem;
        }
        .ctrl-btn:hover { background: rgba(255,201,9,.15); box-shadow: 0 0 10px rgba(255,201,9,.3); }

        .controls-container { position: absolute; top: 12px; z-index: 100; display: flex; flex-direction: column; gap: 8px; }
        #speed-controls { left: 16px; }
        #text-controls  { right: 16px; }
        #bottom-controls {
            position: absolute; bottom: 16px; left: 16px; z-index: 100;
            display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
        }
        #countdown-display {
            min-width: 86px; color: var(--gold-bright); font-size: 1rem;
            font-weight: 700; font-family: 'JetBrains Mono', monospace;
        }
        #copy-notification {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(30,200,100,.85); color: #fff; padding: 10px 20px;
            border-radius: 8px; z-index: 600; opacity: 0; transition: opacity .5s, transform .5s;
            pointer-events: none; font-weight: 700;
        }
        #copy-notification.show { opacity: 1; transform: translateX(-50%) translateY(-20px); }

        /* TTS Panel */
        #tts-panel {
            position: absolute; bottom: 16px; right: 16px; z-index: 200;
            display: flex; flex-direction: column; align-items: flex-end; gap: 8px;
            pointer-events: all; max-width: 320px;
        }
        #privacy-badge {
            display: flex; align-items: center; gap: 6px;
            background: var(--panel-bg); border: 1px solid rgba(80,220,120,.3);
            padding: 4px 10px; border-radius: 16px; font-size: .68rem;
            color: var(--green); letter-spacing: .03em; white-space: nowrap;
        }
        #privacy-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); }
        #voice-select {
            width: 100%; background: var(--panel-bg); border: 1px solid var(--border);
            color: var(--gold); padding: 6px 8px; border-radius: 4px; font-size: .75rem;
            font-family: inherit; cursor: pointer; outline: none;
        }
        #voice-select option { background: #111; color: var(--gold); }
        #tts-sliders {
            width: 100%; background: var(--panel-bg); border: 1px solid rgba(255,201,9,.15);
            border-radius: 6px; padding: 6px 10px; display: flex; flex-direction: column; gap: 4px;
        }
        .slider-row { display: flex; align-items: center; gap: 6px; font-size: .7rem; color: rgba(255,201,9,.6); }
        .slider-row label { width: 36px; text-align: right; }
        .slider-row input[type=range] { flex: 1; accent-color: var(--gold); height: 3px; cursor: pointer; }
        .slider-row .val { width: 28px; color: var(--gold); font-weight: 700; font-family: 'JetBrains Mono', monospace; font-size: .68rem; }
        #tts-progress-wrap { width: 100%; height: 3px; background: rgba(255,255,255,.06); border-radius: 3px; overflow: hidden; }
        #tts-progress { height: 100%; width: 0%; background: linear-gradient(90deg, var(--gold), var(--gold-bright)); border-radius: 3px; transition: width .3s; }
        #tts-controls { display: flex; gap: 6px; }
        .tts-btn {
            width: 40px; height: 40px; border-radius: 50%;
            border: 1px solid var(--border); background: var(--panel-bg);
            color: var(--gold); font-size: 1.05rem; cursor: pointer;
            display: inline-flex; align-items: center; justify-content: center;
            transition: all .25s;
        }
        .tts-btn:hover { background: rgba(255,201,9,.15); box-shadow: 0 0 10px rgba(255,201,9,.3); }
        .tts-btn.active { background: rgba(255,201,9,.2); box-shadow: 0 0 14px rgba(255,201,9,.4); }
        .tts-btn:disabled { opacity: .3; cursor: default; }

        /* ═══ FORGE MODE (3D SCULPTOR) ═══ */
        #forge-panel { display: flex; height: 100%; background: var(--bg); }
        #forge-viewport { flex: 1; position: relative; cursor: crosshair; }
        #forge-canvas { width: 100%; height: 100%; display: block; }

        #forge-sidebar {
            width: 280px; background: var(--panel-bg);
            border-left: 1px solid var(--border);
            overflow-y: auto; padding: 16px;
            display: flex; flex-direction: column; gap: 14px;
            font-size: .82rem;
        }
        .forge-section-label {
            font-family: 'Orbitron', sans-serif; font-size: .7rem; font-weight: 700;
            color: var(--gold); letter-spacing: .12em; text-transform: uppercase;
            padding-bottom: 6px; border-bottom: 1px solid rgba(255,201,9,.15);
        }
        .forge-btn {
            display: flex; align-items: center; justify-content: center; gap: 6px;
            width: 100%; padding: 10px; border-radius: 5px; cursor: pointer;
            border: 1px solid var(--border); background: rgba(255,255,255,.04);
            color: var(--gold); font-family: 'Rajdhani', sans-serif; font-weight: 700;
            font-size: .85rem; transition: all .25s;
        }
        .forge-btn:hover { background: rgba(255,201,9,.12); box-shadow: 0 0 8px rgba(255,201,9,.2); }
        .forge-btn.active { background: rgba(255,201,9,.18); border-color: var(--gold); box-shadow: 0 0 12px rgba(255,201,9,.3); }
        .forge-btn.danger { border-color: rgba(255,68,102,.4); color: var(--red); }
        .forge-btn.danger:hover { background: rgba(255,68,102,.12); }
        .forge-btn.cyan { border-color: rgba(0,229,255,.3); color: var(--cyan); }
        .forge-btn.cyan:hover { background: rgba(0,229,255,.1); }

        .forge-row { display: flex; gap: 8px; }
        .forge-row > * { flex: 1; }

        .forge-slider-group { display: flex; flex-direction: column; gap: 3px; }
        .forge-slider-group label { font-size: .72rem; color: rgba(255,201,9,.6); display: flex; justify-content: space-between; }
        .forge-slider-group label span { color: var(--gold); font-weight: 700; font-family: 'JetBrains Mono', monospace; }
        .forge-slider-group input[type=range] { width: 100%; accent-color: var(--gold); height: 4px; cursor: pointer; }

        .color-grid { display: grid; grid-template-columns: repeat(6,1fr); gap: 4px; }
        .color-swatch {
            width: 100%; aspect-ratio: 1; border-radius: 4px; cursor: pointer;
            border: 2px solid transparent; transition: all .2s;
        }
        .color-swatch:hover, .color-swatch.active { border-color: #fff; transform: scale(1.1); }

        #forge-status {
            position: absolute; bottom: 12px; left: 12px;
            font-family: 'JetBrains Mono', monospace; font-size: .72rem;
            color: rgba(255,201,9,.5); pointer-events: none;
        }
        #brush-cursor {
            position: absolute; pointer-events: none; border: 2px solid var(--gold);
            border-radius: 50%; opacity: .4; display: none; transform: translate(-50%,-50%);
        }
        #forge-file-input { display: none; }

        /* ═══ Responsive ═══ */
        @media (max-width: 768px) {
            .section-title { font-size: 1.8rem; text-align: left; }
            .principle, .video-link { font-size: 1.35rem; }
            #teleprompter-container { perspective: 250px; }
            #forge-sidebar { width: 220px; padding: 10px; }
            #tts-panel { bottom: 70px; right: 10px; max-width: 240px; }
        }
    </style>
</head>
<body>

<!-- ═══ MODE TABS ═══ -->
<div id="mode-tabs">
    <button class="mode-tab active" data-mode="teleprompter">📖 ASI Book Engine</button>
    <button class="mode-tab" data-mode="forge">🔨 3D FORGE — Sculpt Studio</button>
</div>

<!-- ═══════════════════════════════════════════
     MODE 1: TELEPROMPTER
     ═══════════════════════════════════════════ -->
<div class="mode-panel active" id="panel-teleprompter">
    <div id="speed-controls" class="controls-container">
        <button class="ctrl-btn" id="slow-btn">Slow</button>
        <button class="ctrl-btn" id="pause-btn">Pause</button>
        <button class="ctrl-btn" id="fast-btn">Fast</button>
    </div>
    <div id="text-controls" class="controls-container">
        <button class="ctrl-btn" id="wider-btn">Wider</button>
        <button class="ctrl-btn" id="reset-btn">Reset</button>
        <button class="ctrl-btn" id="smaller-btn">Smaller</button>
    </div>
    <div id="bottom-controls">
        <button class="ctrl-btn" id="copy-all-btn">Copy All</button>
        <div style="display:flex;align-items:center;gap:8px;pointer-events:all;">
            <button class="ctrl-btn" id="timer-btn" style="min-width:auto;width:40px;height:40px;padding:0;font-size:1.1rem;display:inline-flex;align-items:center;justify-content:center;" title="2-min rehearsal">⏱️</button>
            <span id="countdown-display">02:00</span>
        </div>
    </div>
    <div id="tts-panel">
        <div id="privacy-badge"><span class="dot"></span><span>🔒 100% Browser-Local · No Data Leaves Your Device</span></div>
        <select id="voice-select" title="Choose a voice"></select>
        <div id="tts-sliders">
            <div class="slider-row"><label>Rate</label><input type="range" id="rate-slider" min="0.5" max="2" step="0.1" value="1"><span class="val" id="rate-val">1.0</span></div>
            <div class="slider-row"><label>Pitch</label><input type="range" id="pitch-slider" min="0.5" max="2" step="0.1" value="1"><span class="val" id="pitch-val">1.0</span></div>
        </div>
        <div id="tts-progress-wrap"><div id="tts-progress"></div></div>
        <div id="tts-controls">
            <button class="tts-btn" id="tts-play" title="Read current section">▶️</button>
            <button class="tts-btn" id="tts-pause" title="Pause / Resume" disabled>⏸️</button>
            <button class="tts-btn" id="tts-stop" title="Stop" disabled>⏹️</button>
            <button class="tts-btn" id="tts-all" title="Read everything">📖</button>
        </div>
    </div>
    <div id="scene-container"></div>
    <div id="teleprompter-container"><div id="teleprompter"></div></div>
</div>

<!-- ═══════════════════════════════════════════
     MODE 2: 3D FORGE
     ═══════════════════════════════════════════ -->
<div class="mode-panel" id="panel-forge">
    <div id="forge-panel">
        <div id="forge-viewport">
            <canvas id="forge-canvas"></canvas>
            <div id="brush-cursor"></div>
            <div id="forge-status">Vertices: 0 | Faces: 0</div>
        </div>
        <div id="forge-sidebar">
            <div class="forge-section-label">📦 Scene</div>
            <button class="forge-btn" id="btn-add-sphere">➕ Add Sphere</button>
            <button class="forge-btn cyan" id="btn-load-glb">📂 Load GLB</button>
            <button class="forge-btn cyan" id="btn-export-glb">💾 Export GLB</button>
            <input type="file" id="forge-file-input" accept=".glb,.gltf">

            <div class="forge-section-label" style="margin-top:6px;">🖌️ Brush</div>
            <div class="forge-row">
                <button class="forge-btn active" data-brush="raise">⬆ Raise</button>
                <button class="forge-btn" data-brush="indent">⬇ Indent</button>
            </div>
            <div class="forge-row">
                <button class="forge-btn" data-brush="smooth">〰 Smooth</button>
                <button class="forge-btn" data-brush="flatten">▬ Flatten</button>
            </div>

            <div class="forge-slider-group">
                <label>Radius <span id="brush-size-val">0.30</span></label>
                <input type="range" id="brush-size" min="0.05" max="1.5" step="0.05" value="0.30">
            </div>
            <div class="forge-slider-group">
                <label>Strength <span id="brush-str-val">0.02</span></label>
                <input type="range" id="brush-strength" min="0.005" max="0.15" step="0.005" value="0.02">
            </div>
            <div class="forge-slider-group">
                <label>Subdivisions <span id="subdiv-val">64</span></label>
                <input type="range" id="subdiv-slider" min="16" max="256" step="8" value="64">
            </div>

            <div class="forge-section-label" style="margin-top:6px;">🎨 Material</div>
            <div class="color-grid" id="color-grid"></div>
            <div class="forge-slider-group" style="margin-top:4px;">
                <label>Metalness <span id="metal-val">0.1</span></label>
                <input type="range" id="metal-slider" min="0" max="1" step="0.05" value="0.1">
            </div>
            <div class="forge-slider-group">
                <label>Roughness <span id="rough-val">0.6</span></label>
                <input type="range" id="rough-slider" min="0" max="1" step="0.05" value="0.6">
            </div>

            <div class="forge-section-label" style="margin-top:6px;">🔧 Utilities</div>
            <button class="forge-btn" id="btn-recalc-normals">🔄 Recalc Normals</button>
            <button class="forge-btn" id="btn-toggle-wire">◻ Toggle Wireframe</button>
            <button class="forge-btn danger" id="btn-clear-scene">🗑️ Clear Scene</button>
        </div>
    </div>
</div>

<div id="copy-notification">Copied to clipboard!</div>

/* ══════════════════════════════════════════════
   MODE SWITCHING
   ══════════════════════════════════════════════ */
const modeTabs = document.querySelectorAll('.mode-tab');
const modePanels = document.querySelectorAll('.mode-panel');
let forgeInitialized = false;

modeTabs.forEach(tab => {
    tab.addEventListener('click', () => {
        const mode = tab.dataset.mode;
        modeTabs.forEach(t => t.classList.remove('active'));
        modePanels.forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('panel-' + mode).classList.add('active');
        if (mode === 'forge' && !forgeInitialized) { initForge(); forgeInitialized = true; }
        if (mode === 'forge') resizeForge();
    });
});

/* ══════════════════════════════════════════════
   TELEPROMPTER (same mechanics, new content)
   ══════════════════════════════════════════════ */
const teleprompter = document.getElementById('teleprompter');
const notification = document.getElementById('copy-notification');
const DEFAULT_WIDER_CLICKS=3, WIDTH_STEP=500, ROTATION_STEP=1, INITIAL_BASE_WIDTH=2900, INITIAL_BASE_ROTATION=9;
const initialDuration=420, timedRunDuration=155;
const initialMaxWidth = INITIAL_BASE_WIDTH+(DEFAULT_WIDER_CLICKS*WIDTH_STEP);
const initialRotationX = INITIAL_BASE_ROTATION-(DEFAULT_WIDER_CLICKS*ROTATION_STEP);
const finalVisibleRatio=.94, finalTranslateZ=-560;
let scrollingContent, currentDuration=initialDuration, currentMaxWidth=initialMaxWidth, currentRotationX=initialRotationX;
let isPaused=true, timerInterval=null, countdownSeconds=120, timedRunActive=false, hasCompletedScroll=false;

// TTS
const synth=window.speechSynthesis; let voices=[], ttsQueue=[], ttsCurrentIndex=0, ttsTotalItems=0, ttsIsActive=false, ttsSpeakingEl=null;

function loadVoices(){
    voices=synth.getVoices(); if(!voices.length) return;
    const sel=document.getElementById('voice-select'); sel.innerHTML='';
    [...voices].sort((a,b)=>{const ae=a.lang.startsWith('en')?0:1,be=b.lang.startsWith('en')?0:1; return ae!==be?ae-be:a.name.localeCompare(b.name);})
    .forEach(v=>{ const o=document.createElement('option'); o.value=v.name; o.textContent=`${v.localService?'🖥️':'☁️'} ${v.name} (${v.lang})`; sel.appendChild(o); });
}
synth.onvoiceschanged=loadVoices; loadVoices();

function getSelectedVoice(){ return voices.find(v=>v.name===document.getElementById('voice-select').value)||voices[0]||null; }
function cleanText(t){ return t.replace(/^[\p{Emoji_Presentation}\p{Extended_Pictographic}\uFE0F\u200D]+\s*/gu,'').trim(); }
function speakText(text){ return new Promise((res,rej)=>{
    const u=new SpeechSynthesisUtterance(cleanText(text)); const v=getSelectedVoice(); if(v)u.voice=v;
    u.rate=parseFloat(document.getElementById('rate-slider').value); u.pitch=parseFloat(document.getElementById('pitch-slider').value);
    u.onend=()=>res(); u.onerror=e=>rej(e); synth.speak(u);
});}
function highlightEl(el){ if(ttsSpeakingEl)ttsSpeakingEl.classList.remove('speaking'); ttsSpeakingEl=el||null; if(ttsSpeakingEl)ttsSpeakingEl.classList.add('speaking'); }
function updateTTSProgress(){ document.getElementById('tts-progress').style.width=(ttsTotalItems?(ttsCurrentIndex/ttsTotalItems*100):0)+'%'; }

async function processQueue(){
    ttsIsActive=true; document.getElementById('tts-play').classList.add('active');
    document.getElementById('tts-pause').disabled=false; document.getElementById('tts-stop').disabled=false;
    while(ttsQueue.length>0&&ttsIsActive){
        if(synth.paused){await new Promise(r=>setTimeout(r,200));continue;}
        const{text,el}=ttsQueue.shift(); highlightEl(el); ttsCurrentIndex++; updateTTSProgress();
        try{await speakText(text);}catch(_){}
    }
    finishTTS();
}
function finishTTS(){ ttsIsActive=false;ttsQueue=[];highlightEl(null);document.getElementById('tts-play').classList.remove('active');
    document.getElementById('tts-pause').disabled=true;document.getElementById('tts-stop').disabled=true;
    const p=document.getElementById('tts-progress'); p.style.width='100%'; setTimeout(()=>{p.style.width='0%';},1500); }
function stopTTS(){ ttsIsActive=false;ttsQueue=[];synth.cancel();highlightEl(null);document.getElementById('tts-play').classList.remove('active');
    document.getElementById('tts-pause').disabled=true;document.getElementById('tts-stop').disabled=true;document.getElementById('tts-progress').style.width='0%'; }

function buildFullQueue(){
    ttsQueue=[];ttsCurrentIndex=0;ttsTotalItems=0;
    teleprompter.querySelectorAll('.section').forEach(sec=>{
        const t=sec.querySelector('.section-title'); if(t){ttsQueue.push({text:t.textContent,el:null});ttsTotalItems++;}
        sec.querySelectorAll('.principle').forEach(p=>{ttsQueue.push({text:p.textContent,el:p});ttsTotalItems++;});
    }); updateTTSProgress();
}

document.getElementById('tts-play').addEventListener('click',()=>{ if(ttsIsActive)return; buildFullQueue(); if(ttsQueue.length)processQueue(); });
document.getElementById('tts-all').addEventListener('click',()=>{ stopTTS(); buildFullQueue(); if(ttsQueue.length)processQueue(); });
document.getElementById('tts-pause').addEventListener('click',()=>{
    if(synth.speaking&&!synth.paused){synth.pause();document.getElementById('tts-pause').textContent='▶️';}
    else if(synth.paused){synth.resume();document.getElementById('tts-pause').textContent='⏸️';}
});
document.getElementById('tts-stop').addEventListener('click',stopTTS);
document.getElementById('rate-slider').addEventListener('input',e=>{document.getElementById('rate-val').textContent=parseFloat(e.target.value).toFixed(1);});
document.getElementById('pitch-slider').addEventListener('input',e=>{document.getElementById('pitch-val').textContent=parseFloat(e.target.value).toFixed(1);});

function speakSingle(text,el){ stopTTS(); ttsQueue=[{text,el}]; ttsCurrentIndex=0; ttsTotalItems=1; processQueue(); }

// Build DOM
(function initTeleprompter(){
    const cd=document.createElement('div'); cd.className='scrolling-content';
    talkSections.forEach(sec=>{
        const sw=document.createElement('section'); sw.className='section';
        const h=document.createElement('h2'); h.className='section-title'; h.textContent=sec.title; sw.appendChild(h);
        sec.items.forEach(txt=>{
            const p=document.createElement('p'); p.textContent=txt; p.className='principle';
            p.addEventListener('click',()=>copyToClipboard(txt));
            p.addEventListener('dblclick',e=>{e.preventDefault();speakSingle(txt,p);});
            sw.appendChild(p);
        }); cd.appendChild(sw);
    });
    const ls=document.createElement('section'); ls.className='section'; ls.style.marginTop='4rem';
    const lh=document.createElement('h2'); lh.textContent='🎥 Videos'; lh.className='section-title'; ls.appendChild(lh);
    videoLinks.forEach(lnk=>{ const a=document.createElement('a'); a.href=lnk.url; a.target='_blank'; a.rel='noopener noreferrer'; a.textContent=lnk.text; a.className='video-link'; ls.appendChild(a); });
    cd.appendChild(ls); scrollingContent=cd; teleprompter.appendChild(scrollingContent);
    document.getElementById('slow-btn').addEventListener('click',()=>{currentDuration+=40;resetScrollPosition();});
    document.getElementById('fast-btn').addEventListener('click',()=>{if(currentDuration>40){currentDuration-=20;resetScrollPosition();}});
    document.getElementById('pause-btn').addEventListener('click',togglePause);
    document.getElementById('wider-btn').addEventListener('click',makeWider);
    document.getElementById('smaller-btn').addEventListener('click',makeSmaller);
    document.getElementById('reset-btn').addEventListener('click',resetSettings);
    document.getElementById('copy-all-btn').addEventListener('click',copyAllContent);
    document.getElementById('timer-btn').addEventListener('click',startTimedRun);
    scrollingContent.addEventListener('animationend',handleScrollComplete);
    teleprompter.style.maxWidth=currentMaxWidth+'px'; updateCrawlAnimation(); resetScrollPosition(); updatePauseLabel(); updateCountdownDisplay(countdownSeconds);
})();

function getCrawlEndY(){ if(!scrollingContent)return'-4200px'; const h=scrollingContent.scrollHeight||innerHeight*4; return `${-Math.max(h-innerHeight*finalVisibleRatio,80)}px`; }
function resetScrollPosition(){ hasCompletedScroll=false; scrollingContent.style.animation='none'; scrollingContent.style.setProperty('--crawl-end-y',getCrawlEndY());
    scrollingContent.offsetHeight; scrollingContent.style.animation=`crawl ${currentDuration}s linear 1 forwards`; scrollingContent.style.animationPlayState=isPaused?'paused':'running'; }
function togglePause(){ if(hasCompletedScroll&&isPaused){isPaused=false;resetScrollPosition();updatePauseLabel();return;}
    isPaused=!isPaused; scrollingContent.style.animationPlayState=isPaused?'paused':'running'; if(timedRunActive&&isPaused)stopTimedRun(false); updatePauseLabel(); }
function updatePauseLabel(){ document.getElementById('pause-btn').textContent=isPaused?'Play':'Pause'; }
function makeWider(){ if(currentMaxWidth<5000){currentMaxWidth+=WIDTH_STEP;teleprompter.style.maxWidth=currentMaxWidth+'px';} if(currentRotationX>4){currentRotationX-=ROTATION_STEP;updateCrawlAnimation();} }
function makeSmaller(){ if(currentMaxWidth>800){currentMaxWidth-=WIDTH_STEP;teleprompter.style.maxWidth=currentMaxWidth+'px';} if(currentRotationX<20){currentRotationX+=ROTATION_STEP;updateCrawlAnimation();} }
function resetSettings(){ stopTimedRun(true);stopTTS(); currentMaxWidth=initialMaxWidth;currentRotationX=initialRotationX;currentDuration=initialDuration;
    teleprompter.style.maxWidth=currentMaxWidth+'px'; updateCrawlAnimation(); isPaused=true; resetScrollPosition(); updatePauseLabel(); updateCountdownDisplay(120); }
function updateCrawlAnimation(){
    let ss=document.getElementById('dynamic-styles'); if(!ss){ss=document.createElement('style');ss.id='dynamic-styles';document.head.appendChild(ss);}
    ss.innerHTML=`@keyframes crawl{0%{transform:rotateX(${currentRotationX}deg) translateY(100vh) translateZ(50px);}100%{transform:rotateX(${currentRotationX}deg) translateY(var(--crawl-end-y,-4200px)) translateZ(${finalTranslateZ}px);}}`;
    resetScrollPosition();
}
async function copyToClipboard(text){ try{if(navigator.clipboard&&window.isSecureContext)await navigator.clipboard.writeText(text); else{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);} showCopyNotice();}catch(e){console.error(e);} }
function copyAllContent(){ const s=talkSections.map(sec=>`${sec.title}\n\n${sec.items.join('\n')}`).join('\n\n'); const l=videoLinks.map(lnk=>`${lnk.text}: ${lnk.url}`).join('\n'); copyToClipboard(`${s}\n\n🎥 Videos\n\n${l}`); }
function showCopyNotice(){ notification.classList.add('show'); setTimeout(()=>notification.classList.remove('show'),2000); }
function updateCountdownDisplay(t){ document.getElementById('countdown-display').textContent=`${String(Math.floor(t/60)).padStart(2,'0')}:${String(t%60).padStart(2,'0')}`; }
function startTimedRun(){ stopTimedRun(true);timedRunActive=true;countdownSeconds=120;currentDuration=timedRunDuration;isPaused=false;updatePauseLabel();updateCountdownDisplay(countdownSeconds);
    resetScrollPosition(); document.getElementById('timer-btn').textContent='⏳'; timerInterval=setInterval(()=>{countdownSeconds--;updateCountdownDisplay(Math.max(countdownSeconds,0));if(countdownSeconds<=0)stopTimedRun(false);},1000); }
function stopTimedRun(rd=false){ if(timerInterval){clearInterval(timerInterval);timerInterval=null;} if(timedRunActive||!rd){isPaused=true;if(scrollingContent)scrollingContent.style.animationPlayState='paused';}
    timedRunActive=false;document.getElementById('timer-btn').textContent='⏱️';updatePauseLabel(); if(rd){countdownSeconds=120;updateCountdownDisplay(countdownSeconds);}else updateCountdownDisplay(0); }
function handleScrollComplete(){ hasCompletedScroll=true;isPaused=true;scrollingContent.style.animationPlayState='paused';
    if(timerInterval){clearInterval(timerInterval);timerInterval=null;} if(timedRunActive){timedRunActive=false;countdownSeconds=0;updateCountdownDisplay(0);document.getElementById('timer-btn').textContent='⏱️';} updatePauseLabel(); }

// Starfield
let tScene,tCamera,tRenderer,starLayers=[];
(function init3D(){
    const c=document.getElementById('scene-container'); tScene=new THREE.Scene(); tScene.fog=new THREE.FogExp2(0x000000,.0007);
    tCamera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,.1,1000); tCamera.position.z=5;
    tRenderer=new THREE.WebGLRenderer({antialias:true}); tRenderer.setSize(innerWidth,innerHeight); tRenderer.setPixelRatio(devicePixelRatio); c.appendChild(tRenderer.domElement);
    const tex=(()=>{const cv=document.createElement('canvas');cv.width=cv.height=64;const cx=cv.getContext('2d');const g=cx.createRadialGradient(32,32,0,32,32,32);
        g.addColorStop(0,'rgba(255,255,255,1)');g.addColorStop(.2,'rgba(255,255,255,.8)');g.addColorStop(.7,'rgba(255,255,255,.1)');g.addColorStop(1,'rgba(255,255,255,0)');
        cx.fillStyle=g;cx.fillRect(0,0,64,64);return new THREE.CanvasTexture(cv);})();
    [[15000,.7,0xffffff],[25000,.5,0xf0e68c],[10000,.6,0xadd8e6]].forEach(([cnt,sz,col])=>{
        const geo=new THREE.BufferGeometry(),v=[]; for(let i=0;i<cnt;i++){v.push((Math.random()-.5)*2000,(Math.random()-.5)*2000,(Math.random()-.5)*2000);}
        geo.setAttribute('position',new THREE.Float32BufferAttribute(v,3));
        const pts=new THREE.Points(geo,new THREE.PointsMaterial({color:col,size:sz,transparent:true,opacity:.8,map:tex,blending:THREE.AdditiveBlending}));
        starLayers.push(pts);tScene.add(pts);
    });
    window.addEventListener('resize',()=>{tCamera.aspect=innerWidth/innerHeight;tCamera.updateProjectionMatrix();tRenderer.setSize(innerWidth,innerHeight);if(scrollingContent)updateCrawlAnimation();});
    (function anim(){requestAnimationFrame(anim);tCamera.lookAt(tScene.position);if(starLayers.length){starLayers[0].rotation.y+=.0002;starLayers[1].rotation.y+=.0001;starLayers[2].rotation.y+=.00015;}tRenderer.render(tScene,tCamera);})();
})();

/* ══════════════════════════════════════════════════════════════
   3D FORGE — SCULPTING TOOL
   ══════════════════════════════════════════════════════════════ */
let fScene,fCamera,fRenderer,fControls,fRaycaster,fMouse;
let sculptMesh=null, brushType='raise', isSculpting=false;
const brushCursor=document.getElementById('brush-cursor');

const COLORS=['#e74c3c','#e67e22','#f1c40f','#2ecc71','#1abc9c','#3498db','#9b59b6','#ecf0f1','#95a5a6','#34495e','#d35400','#c0392b',
              '#ffc909','#00e5ff','#ff4466','#7bed9f','#a29bfe','#fd79a8'];
let activeColor='#ffc909';

function initForge(){
    const canvas=document.getElementById('forge-canvas');
    fScene=new THREE.Scene(); fScene.background=new THREE.Color(0x0a0a12);
    fCamera=new THREE.PerspectiveCamera(50,1,.01,100); fCamera.position.set(0,1,3);
    fRenderer=new THREE.WebGLRenderer({canvas,antialias:true}); fRenderer.setPixelRatio(devicePixelRatio);
    fRenderer.physicallyCorrectLights=true; fRenderer.outputEncoding=THREE.sRGBEncoding;

    fControls=new THREE.OrbitControls(fCamera,canvas); fControls.enableDamping=true; fControls.dampingFactor=.08;

    // Lights
    const amb=new THREE.AmbientLight(0x404050,.6); fScene.add(amb);
    const dir=new THREE.DirectionalLight(0xffffff,.9); dir.position.set(3,5,4); fScene.add(dir);
    const dir2=new THREE.DirectionalLight(0x6688cc,.4); dir2.position.set(-3,2,-2); fScene.add(dir2);
    const hemi=new THREE.HemisphereLight(0x8899aa,0x334455,.4); fScene.add(hemi);

    // Grid
    const grid=new THREE.GridHelper(8,20,0x222233,0x151520); fScene.add(grid);

    fRaycaster=new THREE.Raycaster(); fMouse=new THREE.Vector2();

    // Color grid
    const cg=document.getElementById('color-grid');
    COLORS.forEach(c=>{
        const sw=document.createElement('div'); sw.className='color-swatch'; if(c===activeColor)sw.classList.add('active');
        sw.style.background=c; sw.addEventListener('click',()=>{
            cg.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('active')); sw.classList.add('active');
            activeColor=c; if(sculptMesh)sculptMesh.material.color.set(c);
        }); cg.appendChild(sw);
    });

    // Brush buttons
    document.querySelectorAll('[data-brush]').forEach(btn=>{
        btn.addEventListener('click',()=>{
            document.querySelectorAll('[data-brush]').forEach(b=>b.classList.remove('active'));
            btn.classList.add('active'); brushType=btn.dataset.brush;
        });
    });

    // Sliders
    document.getElementById('brush-size').addEventListener('input',e=>{ document.getElementById('brush-size-val').textContent=parseFloat(e.target.value).toFixed(2); });
    document.getElementById('brush-strength').addEventListener('input',e=>{ document.getElementById('brush-str-val').textContent=parseFloat(e.target.value).toFixed(3); });
    document.getElementById('subdiv-slider').addEventListener('input',e=>{ document.getElementById('subdiv-val').textContent=e.target.value; });
    document.getElementById('metal-slider').addEventListener('input',e=>{ document.getElementById('metal-val').textContent=parseFloat(e.target.value).toFixed(2); if(sculptMesh)sculptMesh.material.metalness=parseFloat(e.target.value); });
    document.getElementById('rough-slider').addEventListener('input',e=>{ document.getElementById('rough-val').textContent=parseFloat(e.target.value).toFixed(2); if(sculptMesh)sculptMesh.material.roughness=parseFloat(e.target.value); });

    // Action buttons
    document.getElementById('btn-add-sphere').addEventListener('click',addSphere);
    document.getElementById('btn-load-glb').addEventListener('click',()=>document.getElementById('forge-file-input').click());
    document.getElementById('forge-file-input').addEventListener('change',loadGLB);
    document.getElementById('btn-export-glb').addEventListener('click',exportGLB);
    document.getElementById('btn-recalc-normals').addEventListener('click',()=>{ if(sculptMesh){sculptMesh.geometry.computeVertexNormals();} });
    document.getElementById('btn-toggle-wire').addEventListener('click',()=>{ if(sculptMesh)sculptMesh.material.wireframe=!sculptMesh.material.wireframe; });
    document.getElementById('btn-clear-scene').addEventListener('click',clearScene);

    // Sculpt events
    canvas.addEventListener('pointerdown',onSculptStart);
    canvas.addEventListener('pointermove',onSculptMove);
    canvas.addEventListener('pointerup',onSculptEnd);
    canvas.addEventListener('pointerleave',onSculptEnd);

    resizeForge();
    window.addEventListener('resize',resizeForge);
    animForge();
    addSphere(); // start with a sphere
}

function resizeForge(){
    if(!fRenderer) return;
    const vp=document.getElementById('forge-viewport');
    const w=vp.clientWidth, h=vp.clientHeight;
    fCamera.aspect=w/h; fCamera.updateProjectionMatrix();
    fRenderer.setSize(w,h);
}

function animForge(){
    requestAnimationFrame(animForge);
    if(fControls)fControls.update();
    if(fRenderer&&fScene&&fCamera)fRenderer.render(fScene,fCamera);
}

function updateStatus(){
    const s=document.getElementById('forge-status');
    if(!sculptMesh){s.textContent='No mesh';return;}
    const g=sculptMesh.geometry;
    const verts=g.attributes.position.count;
    const faces=g.index?g.index.count/3:verts/3;
    s.textContent=`Vertices: ${verts} | Faces: ${Math.floor(faces)}`;
}

/* ─── Add Sphere ─── */
function addSphere(){
    if(sculptMesh){ fScene.remove(sculptMesh); sculptMesh.geometry.dispose(); sculptMesh.material.dispose(); }
    const subdiv=parseInt(document.getElementById('subdiv-slider').value);
    const geo=new THREE.SphereBufferGeometry(1,subdiv,subdiv);
    // Convert to non-indexed for easy sculpting
    const niGeo=geo.toNonIndexed();
    niGeo.computeVertexNormals();

    const mat=new THREE.MeshStandardMaterial({
        color: activeColor, metalness: parseFloat(document.getElementById('metal-slider').value),
        roughness: parseFloat(document.getElementById('rough-slider').value), flatShading: false
    });
    sculptMesh=new THREE.Mesh(niGeo,mat);
    fScene.add(sculptMesh);
    updateStatus();
}

/* ─── Load GLB ─── */
function loadGLB(e){
    const file=e.target.files[0]; if(!file)return;
    const reader=new FileReader();
    reader.onload=function(ev){
        const loader=new THREE.GLTFLoader();
        loader.parse(ev.target.result,'',gltf=>{
            if(sculptMesh){fScene.remove(sculptMesh);sculptMesh.geometry.dispose();sculptMesh.material.dispose();}
            // Find first mesh
            let foundMesh=null;
            gltf.scene.traverse(child=>{ if(!foundMesh&&child.isMesh)foundMesh=child; });
            if(!foundMesh){alert('No mesh found in GLB.');return;}

            // Convert to non-indexed
            let geo=foundMesh.geometry;
            if(geo.index) geo=geo.toNonIndexed();
            geo.computeVertexNormals();
            // Center and scale
            geo.computeBoundingBox();
            const box=geo.boundingBox;
            const center=new THREE.Vector3(); box.getCenter(center);
            geo.translate(-center.x,-center.y,-center.z);
            const size=new THREE.Vector3(); box.getSize(size);
            const maxDim=Math.max(size.x,size.y,size.z);
            if(maxDim>0) geo.scale(2/maxDim,2/maxDim,2/maxDim);

            const mat=new THREE.MeshStandardMaterial({
                color: activeColor, metalness: parseFloat(document.getElementById('metal-slider').value),
                roughness: parseFloat(document.getElementById('rough-slider').value)
            });
            sculptMesh=new THREE.Mesh(geo,mat);
            fScene.add(sculptMesh);
            updateStatus();
        }, err=>{ console.error(err); alert('Failed to load GLB.'); });
    };
    reader.readAsArrayBuffer(file);
    e.target.value='';
}

/* ─── Export GLB ─── */
function exportGLB(){
    if(!sculptMesh){alert('Nothing to export.');return;}
    const exporter=new THREE.GLTFExporter();
    exporter.parse(sculptMesh,result=>{
        const blob=new Blob([result],{type:'application/octet-stream'});
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a'); a.href=url; a.download='sculpt.glb'; a.click();
        URL.revokeObjectURL(url);
    },{binary:true});
}

/* ─── Clear Scene ─── */
function clearScene(){
    if(sculptMesh){fScene.remove(sculptMesh);sculptMesh.geometry.dispose();sculptMesh.material.dispose();sculptMesh=null;}
    updateStatus();
}

/* ══════════════════════════════════════════════
   SCULPTING ENGINE
   ══════════════════════════════════════════════ */
function getCanvasCoords(e){
    const rect=document.getElementById('forge-canvas').getBoundingClientRect();
    fMouse.x=((e.clientX-rect.left)/rect.width)*2-1;
    fMouse.y=-((e.clientY-rect.top)/rect.height)*2+1;
    return {x:e.clientX-rect.left, y:e.clientY-rect.top};
}

function onSculptStart(e){
    if(!sculptMesh)return;
    const coords=getCanvasCoords(e);
    fRaycaster.setFromCamera(fMouse,fCamera);
    const hits=fRaycaster.intersectObject(sculptMesh);
    if(hits.length>0){
        isSculpting=true;
        fControls.enabled=false;
        applySculpt(hits[0].point);
    }
}

function onSculptMove(e){
    if(!sculptMesh)return;
    const coords=getCanvasCoords(e);
    const radius=parseFloat(document.getElementById('brush-size').value);

    // Update brush cursor visual
    const screenRadius=radius*200;
    brushCursor.style.display='block';
    brushCursor.style.width=screenRadius+'px'; brushCursor.style.height=screenRadius+'px';
    brushCursor.style.left=coords.x+'px'; brushCursor.style.top=coords.y+'px';

    if(!isSculpting)return;
    fRaycaster.setFromCamera(fMouse,fCamera);
    const hits=fRaycaster.intersectObject(sculptMesh);
    if(hits.length>0) applySculpt(hits[0].point);
}

function onSculptEnd(){
    isSculpting=false;
    fControls.enabled=true;
    brushCursor.style.display='none';
}

function applySculpt(hitPoint){
    const geo=sculptMesh.geometry;
    const pos=geo.attributes.position;
    const nor=geo.attributes.normal;
    const radius=parseFloat(document.getElementById('brush-size').value);
    const strength=parseFloat(document.getElementById('brush-strength').value);
    const radiusSq=radius*radius;

    // Transform hit point to local space
    const invMatrix=new THREE.Matrix4().copy(sculptMesh.matrixWorld).invert();
    const localHit=hitPoint.clone().applyMatrix4(invMatrix);

    const vCount=pos.count;
    const tmpV=new THREE.Vector3();
    const tmpN=new THREE.Vector3();

    if(brushType==='smooth'){
        // Collect positions first for averaging
        const origPositions=[];
        for(let i=0;i<vCount;i++){
            origPositions.push(new THREE.Vector3(pos.getX(i),pos.getY(i),pos.getZ(i)));
        }

        for(let i=0;i<vCount;i++){
            tmpV.set(pos.getX(i),pos.getY(i),pos.getZ(i));
            const distSq=tmpV.distanceToSquared(localHit);
            if(distSq>=radiusSq)continue;

            const falloff=1-(distSq/radiusSq);
            const w=falloff*falloff*strength*5;

            // Average with nearby vertices
            const avg=new THREE.Vector3();
            let count=0;
            for(let j=0;j<vCount;j++){
                if(i===j)continue;
                const d=origPositions[i].distanceToSquared(origPositions[j]);
                if(d<radiusSq*.15){
                    avg.add(origPositions[j]); count++;
                }
            }
            if(count>0){
                avg.divideScalar(count);
                tmpV.lerp(avg,w);
                pos.setXYZ(i,tmpV.x,tmpV.y,tmpV.z);
            }
        }
    } else if(brushType==='flatten'){
        // Find average height of vertices in brush
        let avgY=0, cnt=0;
        for(let i=0;i<vCount;i++){
            tmpV.set(pos.getX(i),pos.getY(i),pos.getZ(i));
            if(tmpV.distanceToSquared(localHit)<radiusSq){ avgY+=tmpV.y; cnt++; }
        }
        if(cnt>0){ avgY/=cnt;
            // Flatten towards that plane
            const flatNormal=new THREE.Vector3(0,1,0);
            // Use the hit face normal direction instead
            for(let i=0;i<vCount;i++){
                tmpV.set(pos.getX(i),pos.getY(i),pos.getZ(i));
                const distSq=tmpV.distanceToSquared(localHit);
                if(distSq>=radiusSq)continue;
                const falloff=1-(distSq/radiusSq);
                const w=falloff*falloff*strength*5;
                // Project onto plane at localHit
                tmpN.set(nor.getX(i),nor.getY(i),nor.getZ(i)).normalize();
                const offset=tmpV.clone().sub(localHit);
                const dot=offset.dot(tmpN);
                tmpV.addScaledVector(tmpN,-dot*w);
                pos.setXYZ(i,tmpV.x,tmpV.y,tmpV.z);
            }
        }
    } else {
        // raise or indent
        const sign=brushType==='raise'?1:-1;
        for(let i=0;i<vCount;i++){
            tmpV.set(pos.getX(i),pos.getY(i),pos.getZ(i));
            const distSq=tmpV.distanceToSquared(localHit);
            if(distSq>=radiusSq)continue;

            const falloff=1-(distSq/radiusSq);
            const w=falloff*falloff*strength*sign;

            tmpN.set(nor.getX(i),nor.getY(i),nor.getZ(i)).normalize();
            tmpV.addScaledVector(tmpN,w);
            pos.setXYZ(i,tmpV.x,tmpV.y,tmpV.z);
        }
    }

    pos.needsUpdate=true;
    geo.computeVertexNormals();
    geo.computeBoundingSphere();
}
</script>
