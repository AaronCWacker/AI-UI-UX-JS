<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic Delivery Teleprompter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000000;
            color: #e5e5e5;
        }
        #scene-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 1;
        }
        #teleprompter-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            display: flex;
            justify-content: center;
            pointer-events: none;
            overflow: hidden;
            perspective: 600px;
        }
        #teleprompter {
            width: 98%;
            max-width: 1400px;
            position: relative;
            transform-style: preserve-3d;
            transition: max-width 0.5s ease-in-out;
        }
        .principle {
            color: #ffc909;
            font-size: 2.8rem;
            font-weight: bold;
            line-height: 1.5;
            text-align: justify;
            padding: 2rem 0;
            cursor: pointer;
            pointer-events: all;
            transition: color 0.3s, transform 0.3s;
            text-shadow: 0 0 8px rgba(0,0,0,0.7);
        }
        .principle:hover {
            color: #fff352;
            transform: scale(1.02);
        }
        .scrolling-content {
            position: absolute;
            width: 100%;
            animation: crawl 180s linear infinite;
        }
        @keyframes crawl {
            0% {
                transform: rotateX(12deg) translateY(100vh) translateZ(50px);
            }
            100% {
                transform: rotateX(12deg) translateY(-950vh) translateZ(-1200px);
            }
        }
        #copy-notification {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(30, 200, 100, 0.85);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.5s, transform 0.5s;
            pointer-events: none;
        }
        #copy-notification.show {
            opacity: 1;
            transform: translateX(-50%) translateY(-20px);
        }

        .controls-container {
            position: fixed;
            top: 20px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        #speed-controls { left: 20px; }
        #text-controls { right: 20px; }

        .controls-container button, #bottom-controls button {
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 201, 9, 0.5);
            color: #ffc909;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 0 0 5px #ffc909;
            font-weight: bold;
            pointer-events: all;
            min-width: 80px;
        }
        .controls-container button:hover, #bottom-controls button:hover {
            background-color: rgba(255, 201, 9, 0.2);
            box-shadow: 0 0 10px #ffc909;
        }

        #bottom-controls {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        #timer-btn {
            font-size: 2rem;
            padding: 8px 14px;
            min-width: auto;
        }

        #timer-display {
            color: #ffc909;
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 0 0 5px #ffc909;
            min-width: 70px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .principle {
                font-size: 1.8rem;
                text-align: left;
            }
            #teleprompter-container {
                perspective: 250px;
            }
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>

    <div id="speed-controls" class="controls-container">
        <button id="slow-btn">Slow</button>
        <button id="pause-btn">Pause</button>
        <button id="fast-btn">Fast</button>
    </div>

    <div id="text-controls" class="controls-container">
        <button id="wider-btn">Wider</button>
        <button id="reset-btn">Reset</button>
        <button id="smaller-btn">Smaller</button>
    </div>

    <div id="bottom-controls">
        <button id="timer-btn">⏱️</button>
        <span id="timer-display"></span>
        <button id="copy-all-btn">Copy All</button>
    </div>

    <div id="scene-container"></div>

    <div id="teleprompter-container">
        <div id="teleprompter">
             <!-- Principles will be injected here by JavaScript -->
        </div>
    </div>

    <div id="copy-notification">Copied to clipboard!</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- DATA ---
        const principles = [
            "📈 There are 5 Levels of Agentic Development:",
            "👶 Level 1: Assisted (The Copilot): AI suggests syntax while the human remains the primary author and typist.",
            "🧑‍🎓 Level 2: Task-Based (The Intern): AI handles discrete routines like unit tests; the human manages the manual workflow.",
            "👔 Level 3: Collaborative (The Manager): Agents coordinate handoffs (Spec to Code); the human acts as the \"Air Traffic Controller.\"",
            "📋 Level 4: Autonomous (The PM): Agents build features directly from Markdown Specs; the human moves from writing to Articulating.",
            "🏭 Level 5: ASI Dark Factory: Self-improving cyclic graphs handle everything; the human exercises 100x Opportunity Judgment.",
            "🏛️ The Articulation Shift: Managing Intent",
            "🤖 The \"Adequate\" is automated: Roughly 60% of entry-level implementation is now a commodity, leaving humans to focus on judgment.",
            "✍️ Markdown is the new code: We have moved to \"Specifications as Truth\"; if you cannot describe it in Markdown, the agents cannot build it.",
            "🌉 The Spec is the interface: Senior Engineers must treat high-bandwidth Markdown as the primary bridge between human intent and AI execution.",
            "🏗️ Architect the factory: Your value is no longer your syntax; it is your ability to design high-correctness, low-latency agentic loops.",
            "📝 Reverse engineer your flagship apps and start specifying Intent of Organization: Tomorrow’s workflow begins in a Markdown file—defining intent, IO paths, and evaluation criteria.",
            "🔌 Reverse Engineer Intent: Point AI at legacy repos to extract the core business logic and wrap it in a modern specification.",
            "🎯 Opportunity Judgment: The bottleneck is no longer typing speed; it is the decision of what should be built and why.",
            "🔄 Level 5 \"Dark Factories\": We are moving toward cyclic graphs where software improves itself in a closed loop.",
            "🔋 The Agentic Engine: Memory & HPC",
            "🧠 The Multi-Agent Stack: Reach Level 5 using a modular system of specialized agents—Brains, Muscle, and Memory.",
            "⚙️ Market Agents for Scale: We use Python asyncio and multiprocessing to load-balance high-performance computing tasks across the cloud.",
            "🕸️ The Intelligence Graph: Distill all business and engineering expertise into a machine-readable graph that solves your most complex, \"messy\" problems.",
            "📚 Semantic Memory: Agents must utilize semantic layers to maintain consistent logic and professional standards across all sessions. Measure in evaluations and result sets.",
            "🎞️ Episodic Memory: Systems must \"remember\" specific customer timelines of needs and interacts to provide context-aware results. This models what interested parties hold as goals and needs.",
            "📄 Programmatic Summarization: We can collapse hundreds of pages of data into a single page of high-fidelity insight in seconds when we have full context of both specification and inputs.",
            "🖼️ The \"Glass Box\" View: Use AI-native preview and canvas (HTML JS Client and Optionally Python and JS Client Sandbox Interpreter) to make complex agent reasoning transparent to stakeholders.",
            "⏳ Short Term Value Windows: Agentic speed allows us to meet critical deadlines previously impossible for humans.  We used to think it was about volume. Now we know Opportunity Judgment is about limited opportunity deadlines and task of completing at scale within timeline constraints.",
            "📈 Knowledge Additive Effect: Every release stores judgment and intelligence of experts, making a system smarter with every encounter and episode.",
            "⚖️ The Validation Shift: From Tests to Outcomes",
            "⚖️ Correctness over Speed: Speed is a liability without accuracy; we must prioritize \"High-Correctness AI Architecture.\"",
            "🧪 ABTesting (sharing full review examples with experts for analysis of opportunity appropriateness, ABTest Engine: Replace traditional unit tests with a holdout set of your most complex, high-volume cases then measure model performance, completeness, correctness, and timeliness to goal due date.",
            "🏥 Outcome Evaluation: We have moved from reviewing lines of code to performing Programmatic Outcome Reviews with subject matter experts.",
            "🛣️ The Scenario Shift: Shift from \"testing functions\" to evaluating how the system handles real-world behavior scenarios.",
            "🤝 Business and Customer Partnership: Use AI as a bridge for collaboration, allowing experts and engineers to audit \"Dark Factory\" together.",
            "🔄 The Self-Correcting Loop: If a system fails ABTest at scale, the agents should self-correct the specification, not just the syntax.  This value add can shore up and improve result meeting intent",
            "🗓️ Weekly Human Audits: Level 5 requires a non-negotiable weekly review where senior human experts audit the AI's improvement cycle.",
            "👓 Transparency as Safety: Interactive 3D visualizations prove that agentic systems are not \"Black Boxes.\"",
            "🛡️ Architecting Trust: By focusing on outcomes, we turn business intent based delivery into a scalable, trustworthy engine."
        ];

        const toolLinks = [
            { text: "1. Nate B Jones", url: "https://www.youtube.com/@NateBJones" },
            { text: "2. Wes Roth", url: "https://www.youtube.com/@WesRoth/videos" },
            { text: "3. Jordan B Peterson", url: "https://www.youtube.com/@JordanBPeterson/videos" },
            { text: "4. Lex Fridman", url: "https://www.youtube.com/@lexfridman/videos" },
            { text: "5. Aaron Wacker", url: "https://www.youtube.com/@AaronWacker/videos" },
            { text: "6. Joe Rogan Experience", url: "https://www.youtube.com/@joerogan/videos" }
        ];

        // --- DOM ELEMENTS ---
        const teleprompter = document.getElementById('teleprompter');
        const notification = document.getElementById('copy-notification');
        // Speed controls
        const slowBtn = document.getElementById('slow-btn');
        const fastBtn = document.getElementById('fast-btn');
        const pauseBtn = document.getElementById('pause-btn');
        // Text controls
        const widerBtn = document.getElementById('wider-btn');
        const resetBtn = document.getElementById('reset-btn');
        const smallerBtn = document.getElementById('smaller-btn');
        // Bottom controls
        const timerBtn = document.getElementById('timer-btn');
        const timerDisplay = document.getElementById('timer-display');
        const copyAllBtn = document.getElementById('copy-all-btn');

        // --- STATE VARIABLES ---
        let scrollingContent;
        const initialDuration = 180;
        const initialMaxWidth = 1400;
        const initialRotationX = 12;
        let currentDuration = initialDuration;
        let currentMaxWidth = initialMaxWidth;
        let currentRotationX = initialRotationX;
        let isPaused = false;
        let timerInterval = null;
        let countdownTime = 120;

        // --- INITIALIZATION ---
        function init() {
            initTeleprompter();
            init3D();
            animate();
        }

        // --- TELEPROMPTER LOGIC ---
        function initTeleprompter() {
            const contentDiv = document.createElement('div');
            contentDiv.className = 'scrolling-content';

            principles.forEach(text => {
                const p = document.createElement('p');
                p.textContent = text;
                p.className = 'principle';
                p.addEventListener('click', () => copyToClipboard(text));
                contentDiv.appendChild(p);
            });

            const linksHeader = document.createElement('p');
            linksHeader.textContent = '--- Key Videos ---';
            linksHeader.className = 'principle';
            linksHeader.style.textAlign = 'center';
            linksHeader.style.marginTop = '5rem';
            contentDiv.appendChild(linksHeader);

            toolLinks.forEach(link => {
                const a = document.createElement('a');
                a.href = link.url;
                a.target = '_blank';
                a.textContent = link.text;
                a.className = 'principle';
                a.style.display = 'block';
                a.style.textAlign = 'center';
                contentDiv.appendChild(a);
            });

            scrollingContent = contentDiv;
            teleprompter.appendChild(scrollingContent);

            // Add event listeners for controls
            slowBtn.addEventListener('click', slowDown);
            fastBtn.addEventListener('click', speedUp);
            pauseBtn.addEventListener('click', togglePause);
            widerBtn.addEventListener('click', makeWider);
            smallerBtn.addEventListener('click', makeSmaller);
            resetBtn.addEventListener('click', resetSettings);
            copyAllBtn.addEventListener('click', copyAllPrinciples);
            timerBtn.addEventListener('click', startTimer);
        }

        function slowDown() {
            currentDuration += 30;
            scrollingContent.style.animationDuration = currentDuration + 's';
        }

        function speedUp() {
            if (currentDuration > 15) {
                currentDuration -= 15;
                scrollingContent.style.animationDuration = currentDuration + 's';
            }
        }

        function togglePause() {
            isPaused = !isPaused;
            if (isPaused) {
                scrollingContent.style.animationPlayState = 'paused';
                pauseBtn.textContent = 'Play';
            } else {
                scrollingContent.style.animationPlayState = 'running';
                pauseBtn.textContent = 'Pause';
            }
        }

        function makeWider() {
            if (currentMaxWidth < 5000) {
                currentMaxWidth += 500;
                teleprompter.style.maxWidth = currentMaxWidth + 'px';
            }
            if (currentRotationX > 5) {
                currentRotationX -= 1;
                updateCrawlAnimation();
            }
        }

        function makeSmaller() {
            if (currentMaxWidth > 800) {
                currentMaxWidth -= 500;
                teleprompter.style.maxWidth = currentMaxWidth + 'px';
            }
            if (currentRotationX < 20) {
                currentRotationX += 1;
                updateCrawlAnimation();
            }
        }

        function resetSettings() {
            currentMaxWidth = initialMaxWidth;
            currentRotationX = initialRotationX;
            teleprompter.style.maxWidth = currentMaxWidth + 'px';
            updateCrawlAnimation();

            currentDuration = initialDuration;
            scrollingContent.style.animationDuration = currentDuration + 's';

            if (isPaused) {
                togglePause();
            }
        }

        function updateCrawlAnimation() {
            let styleSheet = document.getElementById('dynamic-styles');
            if (!styleSheet) {
                styleSheet = document.createElement('style');
                styleSheet.id = 'dynamic-styles';
                document.head.appendChild(styleSheet);
            }

            const keyframes = `
                @keyframes crawl {
                    0% {
                        transform: rotateX(${currentRotationX}deg) translateY(100vh) translateZ(50px);
                    }
                    100% {
                        transform: rotateX(${currentRotationX}deg) translateY(-950vh) translateZ(-1200px);
                    }
                }
            `;
            styleSheet.innerHTML = keyframes;
        }

        function copyToClipboard(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);

            notification.classList.add('show');
            setTimeout(() => {
                notification.classList.remove('show');
            }, 2000);
        }

        function copyAllPrinciples() {
            let allText = principles.join('\n\n');
            allText += '\n\n\n--- Key Videos ---\n\n';
            const linksText = toolLinks.map(link => `${link.text}: ${link.url}`).join('\n');
            allText += linksText;
            copyToClipboard(allText);
        }

        // --- TIMER FEATURE ---
        function startTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
            }
            countdownTime = 120;
            timerDisplay.textContent = '120s';

            // Force scrolling to start (if paused or not running)
            if (isPaused || !scrollingContent.style.animationPlayState || scrollingContent.style.animationPlayState === 'paused') {
                scrollingContent.style.animationPlayState = 'running';
                isPaused = false;
                pauseBtn.textContent = 'Pause';
            }

            timerInterval = setInterval(() => {
                countdownTime--;
                timerDisplay.textContent = `${countdownTime}s`;

                if (countdownTime <= 0) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    timerDisplay.textContent = '0s ✅';
                    // Freeze scrolling exactly at 0
                    scrollingContent.style.animationPlayState = 'paused';
                    isPaused = true;
                    pauseBtn.textContent = 'Play';
                }
            }, 1000);
        }

        // --- THREE.JS BACKGROUND LOGIC ---
        let scene, camera, renderer, starLayers = [];

        function init3D() {
            const container = document.getElementById('scene-container');
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.0007);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            const starTexture = createStarTexture();
            createStarLayer(15000, 0.7, 0xffffff, starTexture);
            createStarLayer(25000, 0.5, 0xf0e68c, starTexture);
            createStarLayer(10000, 0.6, 0xadd8e6, starTexture);

            window.addEventListener('resize', onWindowResize, false);
        }

        function createStarLayer(count, size, color, texture) {
            const geometry = new THREE.BufferGeometry();
            const material = new THREE.PointsMaterial({
                color: color,
                size: size,
                transparent: true,
                opacity: 0.8,
                map: texture,
                blending: THREE.AdditiveBlending
            });

            const vertices = [];
            for (let i = 0; i < count; i++) {
                const x = (Math.random() - 0.5) * 2000;
                const y = (Math.random() - 0.5) * 2000;
                const z = (Math.random() - 0.5) * 2000;
                vertices.push(x, y, z);
            }

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            const stars = new THREE.Points(geometry, material);
            starLayers.push(stars);
            scene.add(stars);
        }

        function createStarTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const context = canvas.getContext('2d');
            const gradient = context.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(0.2, 'rgba(255,255,255,0.8)');
            gradient.addColorStop(0.7, 'rgba(255,255,255,0.1)');
            gradient.addColorStop(1, 'rgba(255,255,255,0)');
            context.fillStyle = gradient;
            context.fillRect(0, 0, 64, 64);
            return new THREE.CanvasTexture(canvas);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            camera.lookAt(scene.position);

            if (starLayers.length) {
                starLayers[0].rotation.y += 0.00020;
                starLayers[1].rotation.y += 0.00010;
                starLayers[2].rotation.y += 0.00015;
            }

            renderer.render(scene, camera);
        }

        // --- START THE APP ---
        init();
    </script>
</body>
</html>
