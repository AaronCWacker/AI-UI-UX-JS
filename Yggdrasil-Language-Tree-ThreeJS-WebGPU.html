:root {

  --glow-red: #ff4466;
  --glow-orange: #ff8c00;
  --glow-pink: #ff69b4;

  --text: #c8cee0;
  --text-dim: #6a7090;

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  background: var(--void);
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  overflow: hidden;
}

#app {

  display: flex;
  position: relative;
}

/* ── SIDEBAR NAV ── */
#sidebar {

  min-width: 320px;

  overflow-y: auto;
  z-index: 10;
  position: relative;
  scrollbar-width: thin;
  scrollbar-color: var(--glow-gold) transparent;
}

#sidebar::-webkit-scrollbar { width: 4px; }
#sidebar::-webkit-scrollbar-track { background: transparent; }
#sidebar::-webkit-scrollbar-thumb { background: var(--glow-gold); border-radius: 2px; }

#sidebar-header {
  padding: 20px 16px 12px;
  text-align: center;
  position: sticky;
  top: 0;

}

#sidebar-header h1 {

  font-size: 16px;
  color: var(--glow-gold);

  letter-spacing: 2px;
  line-height: 1.3;
}

#sidebar-header .subtitle {
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-top: 4px;
}

.part-group {
  margin: 4px 8px;
}

.part-header {

  font-size: 12px;
  font-weight: 700;

.part-header.active {

.part-header .part-emoji { font-size: 16px; }
.part-header .part-num {

  font-size: 9px;
  color: var(--text-dim);
  min-width: 18px;
}

.part-header .chevron {
  margin-left: auto;
  font-size: 10px;
  transition: transform 0.3s;
  color: var(--text-dim);
}

.part-header.active .chevron { transform: rotate(90deg); }

.theme-list {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease;
}

.theme-list.open { max-height: 2000px; }

.theme-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 10px 5px 36px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 400;
  color: var(--text-dim);

  border-radius: 4px;

.theme-item:hover {

#tree-canvas {

  height: 100%;
  position: absolute;
  top: 0; left: 0;

#close-panel {

  background: none;
  border: 1px solid rgba(255,255,255,0.15);
  color: var(--text-dim);

  border-radius: 50%;

  font-size: 14px;

  align-items: center;
  justify-content: center;

#legend {

  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;

  border-top-color: var(--glow-gold);

/* ── MOBILE ── */
@media (max-width: 768px) {

  border-radius: 8px;
  color: var(--glow-gold);
  font-size: 18px;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
</style>
</head>

// ═══════════════════════════════════════════════════════════
//  CANVAS RENDERER — DUAL YGGDRASIL TREE
// ═══════════════════════════════════════════════════════════

const canvas = document.getElementById('tree-canvas');
const ctx = canvas.getContext('2d');
let W, H, centerX, centerY;
let animFrame;
let time = 0;
let selectedTheme = null;
let hoveredNode = null;
let nodes = [];
let particles = [];

function resize() {
  W = canvas.width = canvas.parentElement.clientWidth;
  H = canvas.height = canvas.parentElement.clientHeight;
  centerX = W / 2;
  centerY = H / 2;
  buildNodes();
}

function buildNodes() {
  nodes = [];
  const trunkTop = centerY - H * 0.35;
  const trunkBot = centerY + H * 0.35;
  const spread = Math.min(W * 0.4, 380);

  PARTS.forEach((part, pi) => {
    const angle = (pi / PARTS.length) * Math.PI - Math.PI / 2;
    const branchLen = spread * (0.7 + Math.random() * 0.3);

    // Crown branch endpoint
    const bx = centerX + Math.cos(angle) * branchLen * 0.9;
    const by = trunkTop + Math.sin(angle) * branchLen * 0.5 - 20;

    // Root mirror (reflected)
    const rx = centerX + Math.cos(angle) * branchLen * 0.7;
    const ry = trunkBot - Math.sin(angle) * branchLen * 0.4 + 20;

    part.themes.forEach((theme, ti) => {
      const frac = (ti + 1) / (part.themes.length + 1);
      const jitter = 15;
      const jx = (Math.random() - 0.5) * jitter;
      const jy = (Math.random() - 0.5) * jitter;

      // Crown node
      const cx = centerX + (bx - centerX) * frac + jx;
      const cy = trunkTop + (by - trunkTop) * frac + jy - 10;

      // Root node (mirror)
      const mrx = centerX + (rx - centerX) * frac + jx;
      const mry = trunkBot + (ry - trunkBot) * frac - jy + 10;

      nodes.push({
        x: cx, y: cy,
        mx: mrx, my: mry,
        partIdx: pi,
        themeIdx: ti,
        theme: theme,
        part: part,
        radius: 5,
        glow: 0
      });
    });
  });
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return { r, g, b };
}

function drawTree() {
  ctx.clearRect(0, 0, W, H);
  time += 0.016;

  // Background gradient
  const bg = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, Math.max(W, H));
  bg.addColorStop(0, '#0d0d20');
  bg.addColorStop(0.5, '#080815');
  bg.addColorStop(1, '#030308');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  const trunkTop = centerY - H * 0.35;
  const trunkBot = centerY + H * 0.35;

  // ── TRUNK (central axis) ──
  const trunkGrad = ctx.createLinearGradient(centerX, trunkTop, centerX, trunkBot);
  trunkGrad.addColorStop(0, 'rgba(226, 183, 20, 0.6)');
  trunkGrad.addColorStop(0.45, 'rgba(226, 183, 20, 0.25)');
  trunkGrad.addColorStop(0.55, 'rgba(207, 155, 58, 0.25)');
  trunkGrad.addColorStop(1, 'rgba(139, 69, 19, 0.5)');
  ctx.beginPath();
  ctx.moveTo(centerX - 4, trunkTop);
  ctx.lineTo(centerX + 4, trunkTop);
  ctx.lineTo(centerX + 6, trunkBot);
  ctx.lineTo(centerX - 6, trunkBot);
  ctx.closePath();
  ctx.fillStyle = trunkGrad;
  ctx.fill();

  // ── Trunk glow ──
  ctx.save();
  ctx.shadowBlur = 30;
  ctx.shadowColor = 'rgba(226, 183, 20, 0.15)';
  ctx.beginPath();
  ctx.moveTo(centerX, trunkTop);
  ctx.lineTo(centerX, trunkBot);
  ctx.strokeStyle = 'rgba(226, 183, 20, 0.1)';
  ctx.lineWidth = 20;
  ctx.stroke();
  ctx.restore();

  // ── MIDLINE LABEL ──
  ctx.save();
  ctx.font = '10px "Fira Code", monospace';
  ctx.fillStyle = 'rgba(226, 183, 20, 0.3)';
  ctx.textAlign = 'center';
  ctx.fillText('▲ CROWN — BRANCHES OF KNOWLEDGE ▲', centerX, trunkTop - 12);
  ctx.fillText('▼ ROOTS — MIRRORED FOUNDATIONS ▼', centerX, trunkBot + 20);
  ctx.restore();

  // ── BRANCHES (crown + root) ──
  PARTS.forEach((part, pi) => {
    const col = hexToRgb(part.color);
    const partNodes = nodes.filter(n => n.partIdx === pi);
    if (partNodes.length === 0) return;

    // Crown branch line
    ctx.beginPath();
    ctx.moveTo(centerX, trunkTop + 10);
    partNodes.forEach(n => {
      ctx.lineTo(n.x, n.y);
    });
    ctx.strokeStyle = `rgba(${col.r}, ${col.g}, ${col.b}, 0.25)`;
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Root branch line (mirror)
    ctx.beginPath();
    ctx.moveTo(centerX, trunkBot - 10);
    partNodes.forEach(n => {
      ctx.lineTo(n.mx, n.my);
    });
    ctx.strokeStyle = `rgba(${col.r}, ${col.g}, ${col.b}, 0.15)`;
    ctx.lineWidth = 1;
    ctx.stroke();

    // Connecting wisps (crown to root)
    if (Math.random() < 0.02) {
      const rn = partNodes[Math.floor(Math.random() * partNodes.length)];
      particles.push({
        x: rn.x, y: rn.y,
        tx: rn.mx, ty: rn.my,
        t: 0, life: 1,
        col: part.color
      });
    }
  });

  // ── PARTICLES ──
  particles = particles.filter(p => {
    p.t += 0.008;
    p.life -= 0.008;
    if (p.life <= 0) return false;
    const px = p.x + (p.tx - p.x) * p.t;
    const py = p.y + (p.ty - p.y) * p.t;
    const c = hexToRgb(p.col);
    ctx.beginPath();
    ctx.arc(px, py, 2, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${c.r}, ${c.g}, ${c.b}, ${p.life * 0.6})`;
    ctx.fill();
    return p.t < 1;
  });

  // ── NODES ──
  nodes.forEach(n => {
    const col = hexToRgb(n.part.color);
    const isSelected = selectedTheme && selectedTheme.id === n.theme.id;
    const isHovered = hoveredNode === n;
    const pulse = Math.sin(time * 2 + n.partIdx + n.themeIdx) * 0.3 + 0.7;

    // Crown node
    const r = isSelected ? 8 : isHovered ? 7 : 4;
    const alpha = isSelected ? 1 : isHovered ? 0.9 : 0.6 * pulse;

    if (isSelected || isHovered) {
      ctx.save();
      ctx.shadowBlur = 20;
      ctx.shadowColor = n.part.color;
      ctx.restore();
    }

    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${col.r}, ${col.g}, ${col.b}, ${alpha})`;
    ctx.fill();

    if (isSelected) {
      ctx.beginPath();
      ctx.arc(n.x, n.y, r + 4, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(${col.r}, ${col.g}, ${col.b}, 0.4)`;
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // Root node (dimmer mirror)
    ctx.beginPath();
    ctx.arc(n.mx, n.my, r * 0.7, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${col.r}, ${col.g}, ${col.b}, ${alpha * 0.4})`;
    ctx.fill();

    // Label on hover/select
    if (isSelected || isHovered) {
      ctx.save();
      ctx.font = '11px "Rajdhani", sans-serif';
      ctx.fillStyle = `rgba(${col.r}, ${col.g}, ${col.b}, 0.9)`;
      ctx.textAlign = 'center';
      ctx.fillText(n.theme.emoji + ' ' + n.theme.title, n.x, n.y - r - 8);
      ctx.restore();
    }
  });

  // ── Part labels at branch ends ──
  PARTS.forEach((part, pi) => {
    const partNodes = nodes.filter(n => n.partIdx === pi);
    if (partNodes.length === 0) return;
    const last = partNodes[partNodes.length - 1];
    const col = hexToRgb(part.color);
    ctx.save();
    ctx.font = '600 11px "Rajdhani", sans-serif';
    ctx.fillStyle = `rgba(${col.r}, ${col.g}, ${col.b}, 0.7)`;
    ctx.textAlign = last.x > centerX ? 'left' : 'right';
    const ox = last.x > centerX ? 14 : -14;
    ctx.fillText(part.emoji + ' ' + part.title, last.x + ox, last.y + 4);
    ctx.restore();
  });

  animFrame = requestAnimationFrame(drawTree);
}

// ── Mouse interaction ──
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  hoveredNode = null;
  for (const n of nodes) {
    const dx = mx - n.x;
    const dy = my - n.y;
    if (dx * dx + dy * dy < 200) {
      hoveredNode = n;
      canvas.style.cursor = 'pointer';
      break;
    }
  }
  if (!hoveredNode) canvas.style.cursor = 'default';
});

canvas.addEventListener('click', (e) => {
  if (hoveredNode) {
    selectTheme(hoveredNode.theme, hoveredNode.part);
  }
});

// ═══════════════════════════════════════════════════════════
//  SIDEBAR NAVIGATION
// ═══════════════════════════════════════════════════════════

function buildSidebar() {
  const nav = document.getElementById('nav-tree');
  nav.innerHTML = '';

  PARTS.forEach((part, pi) => {
    const group = document.createElement('div');
    group.className = 'part-group';

    const header = document.createElement('div');
    header.className = 'part-header';
    header.style.color = part.color;
    header.innerHTML = `
      <span class="part-emoji">${part.emoji}</span>
      <span class="part-num">${String(part.id).padStart(2, '0')}</span>
      <span>${part.title}</span>
      <span class="chevron">▶</span>
    `;

    const list = document.createElement('div');
    list.className = 'theme-list';

    part.themes.forEach(theme => {
      const item = document.createElement('div');
      item.className = 'theme-item';
      item.innerHTML = `
        <span class="t-emoji">${theme.emoji}</span>
        <span class="t-num">${String(theme.id).padStart(2, '0')}</span>
        <span>${theme.title}</span>
      `;
      item.addEventListener('click', () => selectTheme(theme, part));
      list.appendChild(item);
    });

    header.addEventListener('click', () => {
      const wasOpen = list.classList.contains('open');
      document.querySelectorAll('.theme-list').forEach(l => l.classList.remove('open'));
      document.querySelectorAll('.part-header').forEach(h => h.classList.remove('active'));
      if (!wasOpen) {
        list.classList.add('open');
        header.classList.add('active');
      }
    });

    group.appendChild(header);
    group.appendChild(list);
    nav.appendChild(group);
  });
}

function buildLegend() {
  const el = document.getElementById('legend-items');
  el.innerHTML = '';
  PARTS.forEach(p => {
    const row = document.createElement('div');
    row.className = 'legend-row';
    row.innerHTML = `<span class="legend-dot" style="background:${p.color};box-shadow:0 0 6px ${p.color}"></span>${p.emoji} ${p.title}`;
    el.appendChild(row);
  });
}

// ═══════════════════════════════════════════════════════════
//  INFO PANEL
// ═══════════════════════════════════════════════════════════

function selectTheme(theme, part) {
  selectedTheme = theme;

  // Highlight sidebar
  document.querySelectorAll('.theme-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.theme-item').forEach(el => {
    if (el.querySelector('.t-num').textContent.trim() === String(theme.id).padStart(2, '0')) {
      el.classList.add('active');
      // Open parent
      const list = el.parentElement;
      const header = list.previousElementSibling;
      document.querySelectorAll('.theme-list').forEach(l => l.classList.remove('open'));
      document.querySelectorAll('.part-header').forEach(h => h.classList.remove('active'));
      list.classList.add('open');
      header.classList.add('active');
      el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  });

  // Fill panel
  document.getElementById('p-emoji').textContent = theme.emoji;
  document.getElementById('p-title').textContent = theme.title;
  document.getElementById('p-part').textContent = `Part ${part.id}: ${part.emoji} ${part.title}  ·  Theme ${theme.id} of 66`;

  document.getElementById('p-body').innerHTML = `<p>${theme.desc}</p>`;

  const kwEl = document.getElementById('p-keywords');
  kwEl.innerHTML = '';
  theme.keywords.forEach(kw => {
    const span = document.createElement('span');
    span.className = 'kw';
    span.textContent = kw;
    span.style.borderColor = part.color;
    span.style.color = part.color;
    kwEl.appendChild(span);
  });

  document.getElementById('info-panel').classList.add('visible');
}

document.getElementById('close-panel').addEventListener('click', () => {
  document.getElementById('info-panel').classList.remove('visible');
  selectedTheme = null;
});

// ── MOBILE MENU ──
document.getElementById('menu-toggle').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
});

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════

window.addEventListener('resize', resize);
resize();
buildSidebar();
buildLegend();
drawTree();

setTimeout(() => {
  document.getElementById('loading').classList.add('fade');
}, 1200);
</script>
