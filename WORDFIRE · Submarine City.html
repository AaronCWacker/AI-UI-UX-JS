<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>WORDFIRE · Submarine City</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#040d1a;color:#eee;user-select:none}
#wrap{position:fixed;inset:0;display:flex;flex-direction:column}
#c{width:100%;flex:1;display:block;cursor:crosshair;outline:none}

/* Word buffer */
#wb{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:30;
  padding:8px 16px 6px;border-radius:12px;border:1px solid rgba(255,255,255,.14);
  background:rgba(4,13,26,.9);backdrop-filter:blur(12px);text-align:center;min-width:320px;max-width:72vw}
#wt{font-family:'Orbitron',sans-serif;font-size:1.15rem;letter-spacing:.18em;min-height:1.8em;
  display:flex;flex-wrap:wrap;justify-content:center;gap:3px;align-items:center}
.wl{display:inline-block;font-size:1.1rem;font-weight:900;text-shadow:0 0 8px currentColor;transition:color .1s}
.wsp{display:inline-block;width:12px;color:#334;font-size:.6rem;align-self:center}
#ws{font-size:.62rem;color:#556;margin-top:4px;font-family:'JetBrains Mono',monospace;transition:color .3s}
#ws.ok{color:#51ffd0}#ws.bad{color:#ff7fa6}

/* Sub HUD */
#hud{position:absolute;top:10px;left:10px;z-index:30;display:flex;gap:6px}
.sp{padding:7px 9px;border-radius:9px;border:1px solid rgba(255,255,255,.12);
  background:rgba(4,13,26,.88);backdrop-filter:blur(8px);min-width:108px}
.sn{font-family:'Orbitron',sans-serif;font-size:.6rem;letter-spacing:.1em;margin-bottom:4px}
.bw{height:5px;background:rgba(255,255,255,.09);border-radius:3px;margin-bottom:3px;overflow:hidden}
.bf{height:100%;border-radius:3px;transition:width .4s}
.hpb{background:linear-gradient(90deg,#ff6b6b,#ff9f43)}
.enb{background:linear-gradient(90deg,#5fd8ff,#51ffd0)}
.sc{font-family:'JetBrains Mono',monospace;font-size:.66rem;color:#94a7c6;margin-top:2px}
.ss{font-family:'JetBrains Mono',monospace;font-size:.56rem;color:#556;margin-top:1px}

/* Info pills */
#info{position:absolute;top:10px;right:10px;z-index:30;display:flex;flex-direction:column;gap:4px;align-items:flex-end}
.ipl{padding:4px 8px;border-radius:7px;border:1px solid rgba(255,255,255,.1);
  background:rgba(4,13,26,.85);font-size:.62rem;color:#94a7c6;font-family:'JetBrains Mono',monospace}

/* Keyboard */
#kb{position:absolute;bottom:0;left:0;right:0;z-index:30;padding:6px 8px 8px;
  background:rgba(4,13,26,.96);border-top:1px solid rgba(255,255,255,.1);backdrop-filter:blur(14px)}
.kr{display:flex;justify-content:center;gap:3px;margin-bottom:3px}
.k{width:36px;height:36px;border-radius:6px;border:1px solid rgba(255,255,255,.16);
  background:rgba(255,255,255,.06);color:#c8d8f0;font-size:.82rem;
  font-family:'JetBrains Mono',monospace;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform .08s,background .1s,border-color .12s,box-shadow .12s}
.k:hover{background:rgba(255,255,255,.13);transform:translateY(-1px)}
.k:active{transform:scale(.91)}
.k.v{border-color:rgba(199,157,255,.4);color:#c79dff}
.k.lit{background:rgba(95,216,255,.2);border-color:#5fd8ff;color:#fff;
  box-shadow:0 0 10px rgba(95,216,255,.3)}
.k.v.lit{background:rgba(199,157,255,.2);border-color:#c79dff;
  box-shadow:0 0 10px rgba(199,157,255,.3)}
.kw{width:auto;padding:0 14px;font-size:.7rem;letter-spacing:.04em}
.kspc{flex:1;max-width:180px;color:#778;border-color:rgba(255,255,255,.1)}
.kfr{color:#51ffd0;border-color:rgba(81,255,208,.35);background:rgba(81,255,208,.08)}
.kfr:hover{background:rgba(81,255,208,.18)}
.kfr.rdy{animation:fpulse 1.1s ease-in-out infinite}
.kbk{color:#ff7fa6;border-color:rgba(255,127,166,.3)}
@keyframes fpulse{0%,100%{box-shadow:0 0 0 0 rgba(81,255,208,0)}50%{box-shadow:0 0 14px 3px rgba(81,255,208,.4)}}
</style>
</head>
<body>
<div id="wrap">
<canvas id="c" tabindex="0"></canvas>

<div id="wb">
  <div id="wt"><span style="color:#334;font-family:'JetBrains Mono',monospace;font-size:.8rem">type a word…</span></div>
  <div id="ws">type letters · ENTER or ⏎ FIRE to launch · click floor to set target</div>
</div>

<div id="hud">
  <div class="sp" id="spa">
    <div class="sn" style="color:#5fd8ff">◈ ALPHA</div>
    <div class="bw"><div class="bf hpb" id="ahp" style="width:100%"></div></div>
    <div class="bw"><div class="bf enb" id="aen" style="width:100%"></div></div>
    <div class="sc" id="asc">score: 0</div>
    <div class="ss" id="ast">PATROL</div>
  </div>
  <div class="sp" id="spb">
    <div class="sn" style="color:#ff7fa6">◈ BETA</div>
    <div class="bw"><div class="bf hpb" id="bhp" style="width:100%"></div></div>
    <div class="bw"><div class="bf enb" id="ben" style="width:100%"></div></div>
    <div class="sc" id="bsc">score: 0</div>
    <div class="ss" id="bst">WANDER</div>
  </div>
</div>

<div id="info">
  <div class="ipl" id="tgtlbl">🎯 click floor to set target</div>
  <div class="ipl" id="bldlbl">🏙 buildings: 0</div>
  <div class="ipl" id="fdlbl">🍡 food: 0</div>
</div>

<div id="kb"></div>
</div>

<script>
'use strict';
(function(){

// ══════════════════════════ HELPERS ══════════════════════════
function rnd(a,b){return Math.random()*(b-a)+a;}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function lerp(a,b,t){return a+(b-a)*t;}
function d2(ax,az,bx,bz){return Math.hypot(bx-ax,bz-az);}

// ══════════════════════════ CONSTANTS ══════════════════════════
const ROWS=[
  ['Q','W','E','R','T','Y','U','I','O','P'],
  ['A','S','D','F','G','H','J','K','L'],
  ['Z','X','C','V','B','N','M']
];
const VOWELS=new Set('AEIOU');
const LCOL={
  A:'#e74c3c',B:'#e67e22',C:'#f1c40f',D:'#2ecc71',E:'#3498db',
  F:'#9b59b6',G:'#1abc9c',H:'#e55039',I:'#2980b9',J:'#d35400',
  K:'#f39c12',L:'#27ae60',M:'#8e44ad',N:'#16a085',O:'#2471a3',
  P:'#c0392b',Q:'#d4ac0d',R:'#1a8a4a',S:'#7d3c98',T:'#148f77',
  U:'#1f618d',V:'#ba4a00',W:'#cb4335',X:'#117a65',Y:'#b7950b',
  Z:'#6c3483'
};
const MAX_FOOD=20, FOOD_INT=2.8, SUB_SPD=3.0, FOOD_SENSE=6.0;

// ══════════════════════════ THREE.JS ══════════════════════════
const canvas=document.getElementById('c');
const W=()=>canvas.clientWidth||window.innerWidth;
const H=()=>canvas.clientHeight||window.innerHeight;
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(devicePixelRatio||1,1.5));
renderer.setSize(W(),H());
renderer.outputEncoding=THREE.sRGBEncoding;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.05;
const scene=new THREE.Scene();
scene.background=new THREE.Color('#04091a');
scene.fog=new THREE.FogExp2('#060f20',.026);
const camera=new THREE.PerspectiveCamera(52,W()/H(),.1,130);
const camTgt=new THREE.Vector3(0,0,0);
const CR={yaw:0,pitch:.92,dist:24,drag:false,lx:0,ly:0,dx:0,dy:0,moved:false};
function updCam(){
  CR.pitch=clamp(CR.pitch,.38,Math.PI*.47);
  CR.dist=clamp(CR.dist,10,38);
  camera.position.x=camTgt.x+Math.sin(CR.pitch)*Math.sin(CR.yaw)*CR.dist;
  camera.position.y=camTgt.y+Math.cos(CR.pitch)*CR.dist;
  camera.position.z=camTgt.z+Math.sin(CR.pitch)*Math.cos(CR.yaw)*CR.dist;
  camera.lookAt(camTgt);
}
updCam();
const hemi=new THREE.HemisphereLight('#3a6a99','#0a1520',1.1);
const dirL=new THREE.DirectionalLight('#88aacc',1.0);dirL.position.set(5,10,7);
const rimA=new THREE.PointLight('#5fd8ff',9,24,2);rimA.position.set(-8,3,-4);
const rimB=new THREE.PointLight('#c79dff',6,20,2);rimB.position.set(8,2,5);
scene.add(hemi,dirL,rimA,rimB);
const world=new THREE.Group();scene.add(world);
const ray=new THREE.Raycaster();
const ptr=new THREE.Vector2();
const tmp3=new THREE.Vector3();

// ══════════════════════════ TEXTURES ══════════════════════════
function makeGlow(){
  const c=document.createElement('canvas');c.width=c.height=128;
  const ctx=c.getContext('2d');
  const g=ctx.createRadialGradient(64,64,0,64,64,64);
  g.addColorStop(0,'rgba(255,255,255,1)');g.addColorStop(.2,'rgba(255,255,255,.85)');
  g.addColorStop(.5,'rgba(255,255,255,.2)');g.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=g;ctx.fillRect(0,0,128,128);
  const t=new THREE.CanvasTexture(c);t.encoding=THREE.sRGBEncoding;return t;
}
const GLOW=makeGlow();

function makeLetterTex(letter,hex){
  const c=document.createElement('canvas');c.width=c.height=256;
  const ctx=c.getContext('2d');
  // Gradient bg
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  const grad=ctx.createLinearGradient(0,0,0,256);
  grad.addColorStop(0,`rgb(${Math.min(255,r+40)},${Math.min(255,g+40)},${Math.min(255,b+40)})`);
  grad.addColorStop(1,`rgb(${Math.max(0,r-30)},${Math.max(0,g-30)},${Math.max(0,b-30)})`);
  ctx.fillStyle=grad;ctx.fillRect(0,0,256,256);
  // Window grid lines
  ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=1;
  for(let x=0;x<256;x+=32){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,256);ctx.stroke();}
  for(let y=0;y<256;y+=32){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(256,y);ctx.stroke();}
  // Window dots
  for(let wx=24;wx<256;wx+=32)for(let wy=24;wy<256;wy+=32){
    if(Math.random()>.4){ctx.fillStyle=Math.random()>.5?'rgba(255,250,200,.6)':hex+'aa';ctx.fillRect(wx-5,wy-4,10,8);}
  }
  // Letter
  ctx.fillStyle='rgba(255,255,255,0.93)';
  ctx.font='bold 168px Arial, sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor='rgba(255,255,255,.7)';ctx.shadowBlur=22;
  ctx.fillText(letter.toUpperCase(),128,130);ctx.shadowBlur=0;
  // Border
  ctx.strokeStyle='rgba(255,255,255,.28)';ctx.lineWidth=7;ctx.strokeRect(4,4,248,248);
  const t=new THREE.CanvasTexture(c);t.encoding=THREE.sRGBEncoding;return t;
}

// ══════════════════════════ SCENE BUILD ══════════════════════════
function buildScene(){
  // Ocean floor
  const fg=new THREE.PlaneGeometry(30,22,48,36);
  const fp=fg.attributes.position;
  for(let i=0;i<fp.count;i++){
    const x=fp.getX(i),z=fp.getY(i);
    fp.setZ(i,Math.sin(x*.6)*Math.cos(z*.5)*.18+Math.sin(x*.3+z*.4)*.1);
  }
  fg.computeVertexNormals();
  const fm=new THREE.MeshStandardMaterial({color:'#091824',metalness:.08,roughness:.95});
  const floor=new THREE.Mesh(fg,fm);floor.rotation.x=-Math.PI/2;floor.position.y=-.05;floor.name='floor';
  world.add(floor);
  // Grid
  const grid=new THREE.GridHelper(26,26,'#0d3050','#0a2038');
  grid.position.y=.01;world.add(grid);
  // Water surface
  const wm=new THREE.MeshStandardMaterial({color:'#1a4060',transparent:true,opacity:.15,side:THREE.DoubleSide,metalness:.85,roughness:.05});
  const ws=new THREE.Mesh(new THREE.PlaneGeometry(60,50),wm);ws.rotation.x=-Math.PI/2;ws.position.y=9;world.add(ws);
  // Ambient particles (bubbles)
  const bp=new Float32Array(500*3);
  for(let i=0;i<500;i++){bp[i*3]=rnd(-14,14);bp[i*3+1]=rnd(0,9);bp[i*3+2]=rnd(-10,10);}
  const bg=new THREE.BufferGeometry();bg.setAttribute('position',new THREE.BufferAttribute(bp,3));
  const bub=new THREE.Points(bg,new THREE.PointsMaterial({color:'#88aacc',size:.055,transparent:true,opacity:.3,depthWrite:false}));
  bub.name='bub';world.add(bub);
  // Ambient seabed glow
  const seaGlow=new THREE.Sprite(new THREE.SpriteMaterial({map:GLOW,color:'#0a2040',transparent:true,opacity:.4,depthWrite:false,blending:THREE.AdditiveBlending}));
  seaGlow.scale.set(40,40,1);seaGlow.position.y=-.04;world.add(seaGlow);
}

// ══════════════════════════ TARGET MARKER ══════════════════════════
let TGX=0,TGZ=0,hasTgt=false;
const tgtGrp=new THREE.Group();world.add(tgtGrp);
function buildTarget(){
  const r1=new THREE.Mesh(new THREE.RingGeometry(.35,.5,32),new THREE.MeshBasicMaterial({color:'#ffd96c',transparent:true,opacity:.85,side:THREE.DoubleSide}));
  r1.rotation.x=-Math.PI/2;tgtGrp.add(r1);
  const r2=new THREE.Mesh(new THREE.RingGeometry(.65,.73,32),new THREE.MeshBasicMaterial({color:'#ffd96c',transparent:true,opacity:.4,side:THREE.DoubleSide}));
  r2.rotation.x=-Math.PI/2;tgtGrp.add(r2);
  const cA=new THREE.Mesh(new THREE.BoxGeometry(1.2,.02,.04),new THREE.MeshBasicMaterial({color:'#ffd96c',transparent:true,opacity:.6}));cA.rotation.x=-Math.PI/2;tgtGrp.add(cA);
  const cB=new THREE.Mesh(new THREE.BoxGeometry(.04,.02,1.2),new THREE.MeshBasicMaterial({color:'#ffd96c',transparent:true,opacity:.6}));cB.rotation.x=-Math.PI/2;tgtGrp.add(cB);
  const gl=new THREE.Sprite(new THREE.SpriteMaterial({map:GLOW,color:'#ffd96c',transparent:true,opacity:.5,depthWrite:false,blending:THREE.AdditiveBlending}));
  gl.scale.set(2.2,2.2,1);tgtGrp.add(gl);
  tgtGrp.position.set(0,.02,0);
}

// ══════════════════════════ BUILDINGS ══════════════════════════
const buildings=[];
function spawnBuilding(letter,bx,bz){
  const h=1.8+Math.random()*3.8, w=.7+Math.random()*.65;
  const col=LCOL[letter.toUpperCase()]||'#4488cc';
  const grp=new THREE.Group();
  const tex=makeLetterTex(letter,col);
  const r=parseInt(col.slice(1,3),16),g=parseInt(col.slice(3,5),16),b=parseInt(col.slice(5,7),16);
  const litCol=`rgb(${Math.min(255,r+45)},${Math.min(255,g+45)},${Math.min(255,b+45)})`;
  const mats=[
    new THREE.MeshStandardMaterial({color:col,metalness:.35,roughness:.6,emissive:col,emissiveIntensity:.04}),
    new THREE.MeshStandardMaterial({color:col,metalness:.35,roughness:.6,emissive:col,emissiveIntensity:.04}),
    new THREE.MeshStandardMaterial({color:'#081420',metalness:.1,roughness:.9}),
    new THREE.MeshStandardMaterial({color:'#081420',metalness:.1,roughness:.9}),
    new THREE.MeshStandardMaterial({color:col,map:tex,metalness:.3,roughness:.5,emissive:col,emissiveIntensity:.07}),
    new THREE.MeshStandardMaterial({color:col,metalness:.35,roughness:.6,emissive:col,emissiveIntensity:.04}),
  ];
  const mesh=new THREE.Mesh(new THREE.BoxGeometry(w,h,w),mats);
  mesh.position.y=h/2;grp.add(mesh);
  // Roof glow
  const rgl=new THREE.Sprite(new THREE.SpriteMaterial({map:GLOW,color:col,transparent:true,opacity:.55,depthWrite:false,blending:THREE.AdditiveBlending}));
  rgl.scale.set(w*1.8,w*1.8,1);rgl.position.y=h+.12;grp.add(rgl);
  // Window lights (sprites on sides)
  const floors=Math.max(1,Math.floor(h/.9));
  for(let f=0;f<floors;f++)for(let s=0;s<4;s++){
    if(Math.random()>.4){
      const wgl=new THREE.Sprite(new THREE.SpriteMaterial({map:GLOW,color:Math.random()>.45?'#fffacd':litCol,transparent:true,opacity:.35+Math.random()*.35,depthWrite:false,blending:THREE.AdditiveBlending}));
      wgl.scale.set(.2,.16,1);
      const side=s<2?1:-1,axis=s%2===0?'x':'z';
      const off={x:0,y:.3+f*.92,z:0};off[axis]=side*w*.54;
      const perp=axis==='x'?'z':'x';off[perp]=(Math.random()-.5)*w*.6;
      wgl.position.set(off.x,off.y,off.z);grp.add(wgl);
    }
  }
  grp.position.set(bx,0,bz);grp.scale.y=.01;grp.userData.growing=true;
  world.add(grp);
  const bd={letter:letter.toUpperCase(),grp,x:bx,z:bz,h,w,col,r:Math.max(w,w)*.75};
  buildings.push(bd);
  document.getElementById('bldlbl').textContent=`🏙 buildings: ${buildings.length}`;
  return bd;
}
function updBuildings(dt){
  for(const b of buildings){
    if(b.grp.userData.growing){b.grp.scale.y=Math.min(1,b.grp.scale.y+dt*3.5);if(b.grp.scale.y>=1)b.grp.userData.growing=false;}
  }
}

// ══════════════════════════ PARTICLES ══════════════════════════
const MAX_P=250;const parts=[];
const pPos=new Float32Array(MAX_P*3),pCol=new Float32Array(MAX_P*3);
const pGeo=new THREE.BufferGeometry();
pGeo.setAttribute('position',new THREE.BufferAttribute(pPos,3));
pGeo.setAttribute('color',new THREE.BufferAttribute(pCol,3));
world.add(new THREE.Points(pGeo,new THREE.PointsMaterial({size:.18,map:GLOW,transparent:true,opacity:.9,depthWrite:false,blending:THREE.AdditiveBlending,vertexColors:true})));
function spawnPart(x,y,z,col){
  if(parts.length>=MAX_P)parts.shift();
  parts.push({x,y,z,vx:rnd(-.15,.15),vy:rnd(.04,.2),vz:rnd(-.15,.15),life:rnd(18,38),col:new THREE.Color(col)});
}
function updParts(){
  for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.x+=p.vx;p.y+=p.vy;p.z+=p.vz;p.life--;if(p.life<=0)parts.splice(i,1);}
  for(let i=0;i<MAX_P;i++){
    const p=parts[i];
    if(p){pPos[i*3]=p.x;pPos[i*3+1]=p.y;pPos[i*3+2]=p.z;pCol[i*3]=p.col.r;pCol[i*3+1]=p.col.g;pCol[i*3+2]=p.col.b;}
    else{pPos[i*3]=9999;pPos[i*3+1]=9999;pPos[i*3+2]=9999;pCol[i*3]=pCol[i*3+1]=pCol[i*3+2]=0;}
  }
  pGeo.attributes.position.needsUpdate=true;pGeo.attributes.color.needsUpdate=true;
}

// ══════════════════════════ FOOD ══════════════════════════
const food=[];let foodT=0;
const FOODCOLS=['#ffd96c','#ff9f43','#51ffd0','#ff7fa6','#5fd8ff','#a29bfe','#55efc4'];
function spawnFood(){
  if(food.filter(f=>!f.dead).length>=MAX_FOOD)return;
  let fx,fz,tries=0;
  do{fx=rnd(-10,10);fz=rnd(-7,7);tries++;}
  while(tries<20&&buildings.some(b=>d2(fx,fz,b.x,b.z)<b.r+1.3));
  const col=FOODCOLS[Math.floor(Math.random()*FOODCOLS.length)];
  const grp=new THREE.Group();
  const core=new THREE.Mesh(new THREE.SphereGeometry(.18,12,8),new THREE.MeshStandardMaterial({color:col,emissive:col,emissiveIntensity:.9,metalness:.1,roughness:.3}));
  grp.add(core);
  const gl=new THREE.Sprite(new THREE.SpriteMaterial({map:GLOW,color:col,transparent:true,opacity:.78,depthWrite:false,blending:THREE.AdditiveBlending}));
  gl.scale.set(1.1,1.1,1);grp.add(gl);
  // Orbiting ring
  const ring=new THREE.Mesh(new THREE.TorusGeometry(.26,.02,6,24),new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:.6}));
  ring.name='ring';grp.add(ring);
  const fy=.4+Math.random()*.55;
  grp.position.set(fx,fy,fz);world.add(grp);
  food.push({grp,core,gl,x:fx,z:fz,y:fy,bp:rnd(0,Math.PI*2),vx:rnd(-.012,.012),vz:rnd(-.012,.012),val:18+Math.floor(Math.random()*22),col,dead:false});
}
function updFood(dt){
  foodT+=dt;if(foodT>=FOOD_INT){foodT=0;spawnFood();spawnFood();}
  let alive=0;
  for(const f of food){
    if(f.dead)continue;alive++;
    f.bp+=dt*2.1;f.x+=f.vx;f.z+=f.vz;
    if(Math.abs(f.x)>11.5)f.vx*=-1;if(Math.abs(f.z)>8.5)f.vz*=-1;
    f.grp.position.set(f.x,f.y+Math.sin(f.bp)*.13,f.z);
    f.grp.rotation.y+=dt*.9;
    const ring=f.grp.getObjectByName('ring');if(ring)ring.rotation.x+=dt*1.5;
  }
  document.getElementById('fdlbl').textContent=`🍡 food: ${alive}`;
}
function eatFood(f,sub){
  f.dead=true;f.grp.visible=false;if(f.grp.parent)f.grp.parent.remove(f.grp);
  sub.energy=Math.min(sub.maxE,sub.energy+f.val);sub.score+=10;
  for(let i=0;i<14;i++)spawnPart(f.x,f.y,f.z,f.col);
}

// ══════════════════════════ SUBMARINES ══════════════════════════
const subs=[];
function buildSubMesh(col,acc){
  const g=new THREE.Group();
  // Hull
  const hull=new THREE.Mesh(new THREE.SphereGeometry(.28,10,8),new THREE.MeshStandardMaterial({color:col,metalness:.6,roughness:.25,emissive:col,emissiveIntensity:.1}));
  hull.scale.set(1,.55,2.7);g.add(hull);
  // Conning tower
  const tow=new THREE.Mesh(new THREE.BoxGeometry(.22,.28,.36),new THREE.MeshStandardMaterial({color:col,metalness:.7,roughness:.2,emissive:col,emissiveIntensity:.12}));
  tow.position.set(0,.27,-.12);g.add(tow);
  // Fins
  const fm=new THREE.MeshStandardMaterial({color:acc,metalness:.5,roughness:.3});
  const fg2=new THREE.BoxGeometry(.08,.18,.34);
  const fL=new THREE.Mesh(fg2,fm);fL.position.set(-.31,0,.36);fL.rotation.z=Math.PI*.14;g.add(fL);
  const fR=new THREE.Mesh(fg2,fm);fR.position.set(.31,0,.36);fR.rotation.z=-Math.PI*.14;g.add(fR);
  const fT=new THREE.Mesh(new THREE.BoxGeometry(.32,.08,.26),fm);fT.position.set(0,.29,.36);g.add(fT);
  // Prop hub
  const ph=new THREE.Mesh(new THREE.CylinderGeometry(.055,.055,.1,8),new THREE.MeshStandardMaterial({color:'#aaa'}));
  ph.rotation.z=Math.PI/2;ph.position.z=.75;ph.name='ph';g.add(ph);
  for(let i=0;i<3;i++){const bl=new THREE.Mesh(new THREE.BoxGeometry(.04,.2,.05),new THREE.MeshBasicMaterial({color:acc,transparent:true,opacity:.85}));bl.rotation.z=i/3*Math.PI*2;ph.add(bl);}
  // Glow + headlight
  const gl=new THREE.Sprite(new THREE.SpriteMaterial({map:GLOW,color:col,transparent:true,opacity:.45,depthWrite:false,blending:THREE.AdditiveBlending}));gl.scale.set(1.6,.9,1);g.add(gl);
  const hl=new THREE.Sprite(new THREE.SpriteMaterial({map:GLOW,color:'#ccffff',transparent:true,opacity:.55,depthWrite:false,blending:THREE.AdditiveBlending}));hl.scale.set(.5,.5,1);hl.position.z=-.78;g.add(hl);
  return g;
}
function makeSub(name,col,acc,sx,sz){
  const mesh=buildSubMesh(col,acc);mesh.position.set(sx,.55,sz);world.add(mesh);
  return{name,col,acc,mesh,x:sx,z:sz,y:.55,vx:0,vz:0,angle:0,
    hp:100,maxHp:100,energy:100,maxE:100,score:0,
    state:'WANDER',stateT:0,patTgt:null,eatTgt:null,
    phase:rnd(0,Math.PI*2),wTgt:{x:0,z:0,timer:0}};
}
function nearestFood(sub){
  let best=null,bd=Infinity;
  for(const f of food){if(f.dead)continue;const dd=d2(sub.x,sub.z,f.x,f.z);if(dd<bd){bd=dd;best=f;}}
  return bd<FOOD_SENSE*1.8?best:null;
}
function steer(sub,tx,tz,dt,spd=1){
  const dx=tx-sub.x,dz=tz-sub.z,dd=Math.hypot(dx,dz)||1;
  let da=(Math.atan2(dz,dx))-sub.angle;
  while(da>Math.PI)da-=Math.PI*2;while(da<-Math.PI)da+=Math.PI*2;
  sub.angle+=da*Math.min(1,dt*4.5);
  sub.vx+=Math.cos(sub.angle)*SUB_SPD*spd*dt*3;
  sub.vz+=Math.sin(sub.angle)*SUB_SPD*spd*dt*3;
}
function doWander(sub,dt){
  sub.wTgt.timer-=dt;
  if(sub.wTgt.timer<=0){sub.wTgt.x=rnd(-8,8);sub.wTgt.z=rnd(-6,6);sub.wTgt.timer=3+rnd(0,4);}
  steer(sub,sub.wTgt.x,sub.wTgt.z,dt,.65);
}
function avoidBuilds(sub){
  for(const b of buildings){
    const dx=sub.x-b.x,dz=sub.z-b.z,dd=Math.hypot(dx,dz)||1;
    const minD=b.r+1.1;
    if(dd<minD){const push=(minD-dd)/minD*3.5;sub.vx+=(dx/dd)*push;sub.vz+=(dz/dd)*push;}
  }
}
function nearBuilding(sub,range=2.5){
  return buildings.some(b=>d2(sub.x,sub.z,b.x,b.z)<b.r+range);
}
function updSub(sub,dt){
  sub.stateT-=dt;
  const nf=nearestFood(sub);
  // State machine
  switch(sub.state){
    case 'HUNT':
      if(sub.eatTgt&&!sub.eatTgt.dead){
        steer(sub,sub.eatTgt.x,sub.eatTgt.z,dt,1.05);
        if(d2(sub.x,sub.z,sub.eatTgt.x,sub.eatTgt.z)<.9){eatFood(sub.eatTgt,sub);sub.eatTgt=null;sub.state='PATROL';sub.stateT=1.5;}
      }else{sub.eatTgt=null;sub.state='PATROL';}
      break;
    case 'PATROL':
      if(nf&&d2(sub.x,sub.z,nf.x,nf.z)<FOOD_SENSE){sub.state='HUNT';sub.eatTgt=nf;break;}
      if(buildings.length>0){
        if(!sub.patTgt||d2(sub.x,sub.z,sub.patTgt.x,sub.patTgt.z)<1.6||sub.stateT<=0){
          sub.patTgt=buildings[Math.floor(Math.random()*buildings.length)];sub.stateT=5+rnd(0,5);
        }
        steer(sub,sub.patTgt.x,sub.patTgt.z,dt,.8);
      }else doWander(sub,dt);
      break;
    case 'WANDER':default:
      doWander(sub,dt);
      if(nf&&d2(sub.x,sub.z,nf.x,nf.z)<FOOD_SENSE){sub.state='HUNT';sub.eatTgt=nf;}
      else if(sub.stateT<=0&&buildings.length>0){sub.state='PATROL';sub.stateT=4;}
  }
  avoidBuilds(sub);
  // Boundary
  if(Math.abs(sub.x)>10.8)sub.vx-=Math.sign(sub.x)*1.8;
  if(Math.abs(sub.z)>7.8)sub.vz-=Math.sign(sub.z)*1.8;
  sub.vx*=.80;sub.vz*=.80;
  sub.x+=sub.vx*dt;sub.z+=sub.vz*dt;
  sub.x=clamp(sub.x,-11.5,11.5);sub.z=clamp(sub.z,-8.5,8.5);
  sub.phase+=dt*1.3;
  sub.y=.52+Math.sin(sub.phase)*.1;
  // Energy drain / regen
  const moving=Math.hypot(sub.vx,sub.vz)>.4;
  sub.energy-=dt*(moving?2.8:1.0);
  if(nearBuilding(sub))sub.energy=Math.min(sub.maxE,sub.energy+dt*2.2);
  if(sub.energy<0){sub.energy=0;sub.hp-=dt*5;}
  if(sub.hp<=0){sub.hp=75;sub.energy=60;sub.x=rnd(-6,6);sub.z=rnd(-5,5);sub.vx=0;sub.vz=0;}
  // Update mesh
  sub.mesh.position.set(sub.x,sub.y,sub.z);
  const tRot=-sub.angle;const da2=tRot-sub.mesh.rotation.y;
  const da3=((da2+Math.PI)%(Math.PI*2))-Math.PI;
  sub.mesh.rotation.y+=da3*.18;
  sub.mesh.rotation.z=clamp(sub.vz*.14,-.28,.28);
  sub.mesh.rotation.x=clamp(-sub.vx*.08,-.18,.18);
  const ph=sub.mesh.getObjectByName('ph');if(ph)ph.rotation.z+=dt*(6+Math.hypot(sub.vx,sub.vz)*4);
  // Bubbles
  if(Math.random()<.12&&moving)spawnPart(sub.x+(Math.random()-.5)*.3,sub.y+(Math.random()-.5)*.15,sub.z+(Math.random()-.5)*.3,'#88ccff');
}
function updSubUI(){
  const a=subs[0],b=subs[1];if(!a||!b)return;
  document.getElementById('ahp').style.width=(a.hp/a.maxHp*100)+'%';
  document.getElementById('aen').style.width=(a.energy/a.maxE*100)+'%';
  document.getElementById('asc').textContent='score: '+a.score;
  document.getElementById('ast').textContent=a.state+(a.state==='PATROL'&&a.patTgt?` → ${a.patTgt.letter}`:'');
  document.getElementById('bhp').style.width=(b.hp/b.maxHp*100)+'%';
  document.getElementById('ben').style.width=(b.energy/b.maxE*100)+'%';
  document.getElementById('bsc').textContent='score: '+b.score;
  document.getElementById('bst').textContent=b.state+(b.state==='PATROL'&&b.patTgt?` → ${b.patTgt.letter}`:'');
}

// ══════════════════════════ PROJECTILES ══════════════════════════
const projs=[];
function launchLetter(letter,idx,total,tx,tz){
  const col=LCOL[letter.toUpperCase()]||'#4488cc';
  const tex=makeLetterTex(letter,col);
  const mesh=new THREE.Mesh(new THREE.BoxGeometry(.55,.55,.55),
    new THREE.MeshStandardMaterial({color:col,map:tex,emissive:col,emissiveIntensity:.4,metalness:.3,roughness:.4}));
  const gl=new THREE.Sprite(new THREE.SpriteMaterial({map:GLOW,color:col,transparent:true,opacity:.7,depthWrite:false,blending:THREE.AdditiveBlending}));
  gl.scale.set(1.2,1.2,1);mesh.add(gl);
  const sx=camTgt.x+rnd(-5,5),sy=9+rnd(0,3),sz=camTgt.z+rnd(-5,5);
  const spread=Math.max(.8,total*.18);
  const ang=(idx/Math.max(1,total))*Math.PI*2+rnd(-.3,.3);
  const r=spread*(.5+Math.random()*.6);
  const lx=tx+Math.cos(ang)*r,lz=tz+Math.sin(ang)*r;
  mesh.position.set(sx,sy,sz);world.add(mesh);
  projs.push({letter,mesh,sx,sy,sz,lx,lz,
    cx:(sx+lx)*.5+rnd(-3,3),cy:sy*.55+5+rnd(0,3),cz:(sz+lz)*.5+rnd(-3,3),
    progress:0,dur:1.1+rnd(0,.7),done:false,
    rx:rnd(-7,7),rz:rnd(-7,7),col});
}
function updProjs(dt){
  for(let i=projs.length-1;i>=0;i--){
    const p=projs[i];if(p.done){projs.splice(i,1);continue;}
    p.progress=Math.min(1,p.progress+dt/p.dur);
    const t=p.progress,t1=1-t;
    const x=t1*t1*p.sx+2*t1*t*p.cx+t*t*p.lx;
    const y=t1*t1*p.sy+2*t1*t*p.cy+t*t*.15;
    const z=t1*t1*p.sz+2*t1*t*p.cz+t*t*p.lz;
    p.mesh.position.set(x,y,z);
    p.mesh.rotation.x+=dt*p.rx;p.mesh.rotation.z+=dt*p.rz;
    p.mesh.scale.setScalar(.7+(1-t)*.45);
    if(p.progress>=1){
      p.done=true;if(p.mesh.parent)p.mesh.parent.remove(p.mesh);
      spawnBuilding(p.letter,p.lx,p.lz);
      for(let j=0;j<18;j++)spawnPart(p.lx,rnd(.2,.8),p.lz,p.col);
      // Shockwave ring (temporary mesh)
      const sw=new THREE.Mesh(new THREE.RingGeometry(.1,2,32),new THREE.MeshBasicMaterial({color:p.col,transparent:true,opacity:.7,side:THREE.DoubleSide}));
      sw.rotation.x=-Math.PI/2;sw.position.set(p.lx,.1,p.lz);world.add(sw);
      let swT=0;
      const swInt=setInterval(()=>{swT+=.05;sw.scale.setScalar(1+swT*2);sw.material.opacity=Math.max(0,.7-swT*2);if(swT>=.35){clearInterval(swInt);if(sw.parent)sw.parent.remove(sw);}},16);
    }
  }
}
function fireWord(text,tx,tz){
  const letters=text.replace(/\s+/g,'').toUpperCase().split('').filter(l=>/[A-Z]/.test(l));
  if(!letters.length)return;
  letters.forEach((l,i)=>setTimeout(()=>launchLetter(l,i,letters.length,tx,tz),i*90));
  wordBuf='';updWordUI();updKeyLights();
}

// ══════════════════════════ WORD INPUT ══════════════════════════
let wordBuf='';
function hasVowel(s){return s.split('').some(c=>VOWELS.has(c.toUpperCase()));}
function isValid(s){return s.trim().split(/\s+/).some(w=>w.length>0&&hasVowel(w));}
function updWordUI(){
  const wt=document.getElementById('wt'),ws=document.getElementById('ws');
  if(!wordBuf){
    wt.innerHTML='<span style="color:#334;font-family:\'JetBrains Mono\',monospace;font-size:.8rem">type a word…</span>';
    ws.textContent='type letters · ENTER or ⏎ FIRE to launch · click floor to set target';
    ws.className='';
  }else{
    wt.innerHTML=wordBuf.split('').map(c=>{
      if(c===' ')return '<span class="wsp">·</span>';
      const col=LCOL[c.toUpperCase()]||'#94a7c6';
      return `<span class="wl" style="color:${col}">${c.toUpperCase()}</span>`;
    }).join('');
    if(!hasTgt){ws.textContent='⚠ click the arena floor to place a target first';ws.className='bad';}
    else if(isValid(wordBuf)){ws.textContent=`✓ ready! ENTER or ⏎ FIRE to launch ${wordBuf.replace(/\s/g,'').length} letter-buildings`;ws.className='ok';}
    else{ws.textContent='⚠ word needs at least one vowel (A E I O U)';ws.className='bad';}
  }
  const fb=document.getElementById('btn-enter');
  if(fb){if(isValid(wordBuf)&&hasTgt)fb.classList.add('rdy');else fb.classList.remove('rdy');}
}
function updKeyLights(){
  const used=new Set(wordBuf.toUpperCase().replace(/[^A-Z]/g,''));
  document.querySelectorAll('.kl').forEach(b=>{
    if(used.has(b.dataset.l))b.classList.add('lit');else b.classList.remove('lit');
  });
}
function pressLetter(l){
  if(wordBuf.length>=32)return;
  wordBuf+=l.toUpperCase();updWordUI();updKeyLights();
  const btn=document.querySelector(`.kl[data-l="${l.toUpperCase()}"]`);
  if(btn){btn.classList.add('lit');setTimeout(()=>!wordBuf.includes(l.toUpperCase())&&btn.classList.remove('lit'),220);}
}
function pressSpace(){if(wordBuf.length>0&&wordBuf[wordBuf.length-1]!==' ')wordBuf+=' ';updWordUI();}
function pressBack(){wordBuf=wordBuf.slice(0,-1);updWordUI();updKeyLights();}
function pressEnter(){
  if(!hasTgt){const ws=document.getElementById('ws');ws.textContent='⚠ click the floor first to set a landing target!';ws.className='bad';return;}
  if(!isValid(wordBuf)){const ws=document.getElementById('ws');ws.textContent='⚠ needs at least one word with a vowel!';ws.className='bad';return;}
  fireWord(wordBuf,TGX,TGZ);
}

// ══════════════════════════ KEYBOARD UI ══════════════════════════
function buildKB(){
  const kb=document.getElementById('kb');kb.innerHTML='';
  ROWS.forEach(row=>{
    const div=document.createElement('div');div.className='kr';
    row.forEach(l=>{
      const btn=document.createElement('button');
      btn.className='k kl'+(VOWELS.has(l)?' v':'');
      btn.textContent=l;btn.dataset.l=l;
      btn.addEventListener('click',()=>pressLetter(l));
      div.appendChild(btn);
    });
    kb.appendChild(div);
  });
  const bot=document.createElement('div');bot.className='kr';
  const sp=document.createElement('button');sp.className='k kw kspc';sp.id='btn-space';sp.innerHTML='⎵ SPACE';sp.title='Space / word separator';sp.addEventListener('click',pressSpace);bot.appendChild(sp);
  const en=document.createElement('button');en.className='k kw kfr';en.id='btn-enter';en.innerHTML='⏎ FIRE';en.addEventListener('click',pressEnter);bot.appendChild(en);
  const bk=document.createElement('button');bk.className='k kw kbk';bk.innerHTML='⌫';bk.addEventListener('click',pressBack);bot.appendChild(bk);
  kb.appendChild(bot);
}

// ══════════════════════════ INPUT ══════════════════════════
function ptrFromEv(ev){const r=canvas.getBoundingClientRect();ptr.x=((ev.clientX-r.left)/r.width)*2-1;ptr.y=-((ev.clientY-r.top)/r.height)*2+1;}
canvas.addEventListener('pointerdown',ev=>{CR.drag=true;CR.lx=ev.clientX;CR.ly=ev.clientY;CR.dx=ev.clientX;CR.dy=ev.clientY;CR.moved=false;canvas.setPointerCapture(ev.pointerId);});
canvas.addEventListener('pointermove',ev=>{
  if(!CR.drag)return;
  CR.yaw-=(ev.clientX-CR.lx)*.006;CR.pitch+=(ev.clientY-CR.ly)*.006;
  CR.lx=ev.clientX;CR.ly=ev.clientY;
  if(Math.abs(ev.clientX-CR.dx)>4||Math.abs(ev.clientY-CR.dy)>4)CR.moved=true;
  updCam();
});
canvas.addEventListener('pointerup',ev=>{
  CR.drag=false;if(CR.moved)return;
  ptrFromEv(ev);ray.setFromCamera(ptr,camera);
  const ro=ray.ray.origin,rd=ray.ray.direction;
  if(Math.abs(rd.y)>.0001){const t=-ro.y/rd.y;if(t>0){
    TGX=clamp(ro.x+rd.x*t,-11,11);TGZ=clamp(ro.z+rd.z*t,-8,8);
    tgtGrp.position.set(TGX,.02,TGZ);hasTgt=true;
    document.getElementById('tgtlbl').textContent=`🎯 target (${TGX.toFixed(1)}, ${TGZ.toFixed(1)})`;
    updWordUI();
  }}
});
canvas.addEventListener('wheel',ev=>{CR.dist=clamp(CR.dist+ev.deltaY*.015,10,38);updCam();},{passive:true});
document.addEventListener('keydown',ev=>{
  const k=ev.key;
  if(k==='Backspace'){ev.preventDefault();pressBack();}
  else if(k==='Enter'){ev.preventDefault();pressEnter();}
  else if(k===' '){ev.preventDefault();pressSpace();}
  else if(k.length===1&&/[a-zA-Z]/.test(k)){pressLetter(k);}
});
window.addEventListener('resize',()=>{camera.aspect=W()/H();camera.updateProjectionMatrix();renderer.setSize(W(),H());updCam();});

// ══════════════════════════ MAIN LOOP ══════════════════════════
let lastT=0,time=0,uiT=0;
function loop(ts){
  requestAnimationFrame(loop);
  const dt=Math.min((ts-lastT)/1000,.05);lastT=ts;time+=dt;
  updFood(dt);
  subs.forEach(s=>updSub(s,dt));
  updProjs(dt);
  updBuildings(dt);
  updParts();
  // Scene animation
  rimA.intensity=8+Math.sin(time*1.35)*1.8;
  rimB.intensity=5+Math.sin(time*.9+.8)*1.3;
  tgtGrp.rotation.y+=dt*2;
  const bub=world.getObjectByName('bub');
  if(bub){bub.rotation.y+=dt*.015;
    const bp=bub.geometry.attributes.position;
    for(let i=0;i<bp.count;i++){let y=bp.getY(i)+dt*.18;if(y>9)y=-Math.random();bp.setY(i,y);}
    bp.needsUpdate=true;
  }
  uiT+=dt;if(uiT>.15){uiT=0;updSubUI();}
  renderer.render(scene,camera);
}

// ══════════════════════════ INIT ══════════════════════════
buildScene();buildTarget();buildKB();updWordUI();
subs.push(makeSub('ALPHA','#5fd8ff','#00aaff',-4,2));
subs.push(makeSub('BETA','#ff7fa6','#cc2255',4,-2));
for(let i=0;i<10;i++)spawnFood();
requestAnimationFrame(loop);
})();
</script>
