<!DOCTYPE html>
<html lang="en">
<head>
    <title>MYTHIC DRIFT — Dragon's Pass</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{overflow:hidden;background:#050505;font-family:'Palatino Linotype','Book Antiqua',Palatino,serif}
        canvas{display:block}
        #overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,#1a0f2e 0%,#000 100%);z-index:300;transition:opacity 1.5s ease}
        #overlay.hidden{opacity:0;pointer-events:none}
        #overlay h1{color:#ffd700;font-size:48px;font-weight:bold;letter-spacing:12px;text-transform:uppercase;text-shadow:0 0 30px rgba(255,215,0,0.6), 2px 2px 4px #000}
        #overlay .sub{color:rgba(200,180,255,0.8);font-size:14px;letter-spacing:6px;margin-top:8px;text-transform:uppercase}
        #overlay .start-btn{margin-top:40px;padding:14px 45px;background:rgba(255,215,0,0.15);border:2px solid rgba(255,215,0,0.5);color:#ffd700;font-size:16px;letter-spacing:4px;cursor:pointer;border-radius:4px;transition:all 0.3s;font-family:inherit;text-transform:uppercase;box-shadow:inset 0 0 10px rgba(255,215,0,0.2)}
        #overlay .start-btn:hover{background:rgba(255,215,0,0.4);color:#fff;transform:scale(1.05);box-shadow:0 0 20px rgba(255,215,0,0.4), inset 0 0 15px rgba(255,215,0,0.4)}
        #overlay .controls-hint{margin-top:25px;color:rgba(255,255,255,0.4);font-size:12px;letter-spacing:1px;text-align:center;line-height:2}
        #countdown{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#ffd700;font-size:140px;font-weight:bold;letter-spacing:10px;pointer-events:none;z-index:250;opacity:0;transition:opacity 0.3s;text-shadow:0 0 50px rgba(255,215,0,0.8),0 0 100px rgba(138,43,226,0.5)}
        #countdown.show{opacity:1}
        #hud{position:fixed;top:0;left:0;width:100%;pointer-events:none;z-index:100}
        #hud .speed-panel{position:absolute;bottom:20px;left:20px;background:rgba(20,15,30,0.7);backdrop-filter:blur(8px);border:2px solid rgba(255,215,0,0.3);border-radius:8px;padding:15px 20px;min-width:180px;box-shadow:0 4px 15px rgba(0,0,0,0.5)}
        #hud .speed-val{font-size:40px;color:#ffd700;font-weight:bold;letter-spacing:2px;text-shadow:0 2px 4px rgba(0,0,0,0.8)}
        #hud .speed-unit{font-size:12px;color:rgba(255,215,0,0.5);letter-spacing:3px}
        #hud .boost-bar{margin-top:10px;height:6px;background:rgba(0,0,0,0.6);border:1px solid rgba(138,43,226,0.4);border-radius:3px;overflow:hidden}
        #hud .boost-fill{height:100%;background:linear-gradient(90deg,#8a2be2,#d8bfd8);border-radius:2px;transition:width 0.15s;box-shadow:0 0 10px rgba(138,43,226,0.8)}
        #hud .air-label{font-size:11px;color:rgba(135,206,235,0.8);letter-spacing:2px;margin-top:6px;opacity:0;transition:opacity 0.2s;text-transform:uppercase}
        #hud .air-label.show{opacity:1}
        #hud .race-panel{position:absolute;top:20px;right:20px;background:rgba(20,15,30,0.7);backdrop-filter:blur(8px);border:2px solid rgba(255,215,0,0.3);border-radius:8px;padding:15px 20px;text-align:right;box-shadow:0 4px 15px rgba(0,0,0,0.5)}
        #hud .position{font-size:48px;color:#fff;font-weight:bold;text-shadow:0 2px 6px rgba(0,0,0,0.8)}
        #hud .position sup{font-size:18px;color:rgba(255,215,0,0.7)}
        #hud .lap-info{font-size:14px;color:rgba(218,165,32,0.8);letter-spacing:3px;margin-top:4px}
        #hud .lap-time{font-size:13px;color:rgba(255,255,255,0.5);letter-spacing:1px;margin-top:4px}
        #hud .best-time{font-size:11px;color:rgba(152,251,152,0.6);letter-spacing:1px;margin-top:2px}
        #hud .section-display{position:absolute;top:20px;left:50%;transform:translateX(-50%);color:rgba(255,215,0,0.9);font-size:16px;letter-spacing:5px;text-shadow:0 2px 10px rgba(138,43,226,0.6);font-weight:bold}
        #hud .pos-panel{position:absolute;top:60px;left:50%;transform:translateX(-50%);display:flex;gap:8px}
        #hud .pos-dot{width:32px;height:32px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;border:2px solid rgba(255,215,0,0.3);transition:all 0.3s;background:rgba(0,0,0,0.6);font-family:sans-serif}
        #hud .pos-dot.player{border-color:#ffd700;box-shadow:0 0 15px rgba(255,215,0,0.5)}
        #minimap{position:fixed;bottom:20px;right:20px;z-index:100;pointer-events:none;border:2px solid rgba(255,215,0,0.3);border-radius:50%;background:rgba(10,5,15,0.6)}
        #ui-bar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:100;display:flex;gap:8px;align-items:center;background:rgba(20,15,30,0.8);backdrop-filter:blur(8px);padding:8px 16px;border-radius:8px;border:1px solid rgba(255,215,0,0.2)}
        #ui-bar button{background:rgba(0,0,0,0.5);color:rgba(255,215,0,0.6);border:1px solid rgba(255,215,0,0.3);padding:6px 14px;border-radius:4px;cursor:pointer;font-size:11px;font-family:inherit;letter-spacing:2px;transition:all 0.3s;text-transform:uppercase}
        #ui-bar button:hover{background:rgba(255,215,0,0.2);color:#ffd700}
        #ui-bar button.active{background:rgba(138,43,226,0.4);border-color:#8a2be2;color:#fff;box-shadow:0 0 10px rgba(138,43,226,0.4)}
        #ui-bar .sep{width:2px;height:24px;background:rgba(255,215,0,0.2)}
        #ui-bar label{color:rgba(255,215,0,0.6);font-size:11px;display:flex;align-items:center;gap:6px;letter-spacing:1px}
        #ui-bar input[type=range]{width:60px;accent-color:#8a2be2;height:4px}
        #lap-flash{position:fixed;top:30%;left:50%;transform:translate(-50%,-50%);color:#ffd700;font-size:36px;font-weight:bold;letter-spacing:10px;pointer-events:none;z-index:100;opacity:0;transition:opacity 0.5s;text-shadow:0 0 40px rgba(138,43,226,0.8), 2px 2px 4px #000}
        #lap-flash.show{opacity:1}
        #jump-flash{position:fixed;top:60%;left:50%;transform:translate(-50%,-50%);color:#e6e6fa;font-size:18px;font-weight:bold;letter-spacing:8px;pointer-events:none;z-index:100;opacity:0;transition:opacity 0.3s;text-shadow:0 0 25px rgba(138,43,226,0.9)}
        #jump-flash.show{opacity:1}
    </style>
</head>
<body>
    <div id="overlay">
        <h1>MYTHIC DRIFT</h1>
        <div class="sub">DRAGON'S PASS — REALM OF THE ANCIENTS</div>
        <button class="start-btn" id="startBtn">Enter the Rift</button>
        <div class="controls-hint">WASD / ARROWS — Steer Arcane Skiff<br>SHIFT — Channel Mana | SPACE — Void Brake<br>C — Visor | R — Recall | Hit runes to ASCEND!</div>
    </div>
    <div id="countdown"></div>
    <div id="hud" style="display:none">
        <div class="speed-panel"><div class="speed-val" id="speedVal">0</div><div class="speed-unit">AURAL KNOTS</div><div class="boost-bar"><div class="boost-fill" id="boostFill" style="width:100%"></div></div><div class="air-label" id="airLabel">LEVITATING</div></div>
        <div class="race-panel"><div class="position" id="posDisplay">1<sup>ST</sup></div><div class="lap-info" id="lapDisplay">CYCLE 1</div><div class="lap-time" id="timeDisplay">0:00.0</div><div class="best-time" id="bestDisplay"></div></div>
        <div class="section-display" id="sectionDisplay"></div>
        <div class="pos-panel" id="posPanel"></div>
    </div>
    <canvas id="minimap" width="180" height="180"></canvas>
    <div id="ui-bar">
        <button id="camChase" class="active">ASTRAL</button><button id="camCockpit">HELM</button><button id="camBird">RAVEN</button>
        <div class="sep"></div><label>WARD <input type="range" id="tubeOpacity" min="3" max="60" value="15"></label>
    </div>
    <div id="lap-flash"></div><div id="jump-flash"></div>

    <script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.webgpu.js","three/webgpu":"https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.webgpu.js","three/tsl":"https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.tsl.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.172.0/examples/jsm/"}}</script>

    <script type="module">
import * as THREE from 'three/webgpu';

const R = new THREE.WebGPURenderer({ antialias: true });
await R.init();
R.setPixelRatio(Math.min(window.devicePixelRatio, 2));
R.setSize(window.innerWidth, window.innerHeight);
R.toneMapping = THREE.ACESFilmicToneMapping;
R.toneMappingExposure = 0.85; // Slightly darker, moodier
document.body.appendChild(R.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0514, 0.00006); // Deep magical purple fog

const aspect = window.innerWidth / window.innerHeight;
const chaseCam = new THREE.PerspectiveCamera(58, aspect, 1, 20000);
const cockpitCam = new THREE.PerspectiveCamera(75, aspect, 1, 20000);
const birdCam = new THREE.PerspectiveCamera(45, aspect, 1, 20000);
let activeCam = chaseCam, camMode = 'chase';

// ═══════════════════════════════════════
//  LIGHTING — Mystic and Earthy
// ═══════════════════════════════════════
scene.add(new THREE.AmbientLight(0x2a2040, 0.8)); // Purple ambient
const sun = new THREE.DirectionalLight(0xffdf88, 2.5); // Golden sun
sun.position.set(800, 1200, 600); scene.add(sun);
const fill = new THREE.DirectionalLight(0x4a2288, 1.5); // Arcane purple fill
fill.position.set(-600, 400, -400); scene.add(fill);
const rim = new THREE.DirectionalLight(0x44ffaa, 0.5); // Spectral green rim
rim.position.set(-200, 200, 800); scene.add(rim);

// Magical node lights instead of neon accents
const accentCols = [0x8a2be2, 0xffd700, 0x48d1cc, 0xff4500, 0x9370db, 0x00fa9a, 0xdda0dd, 0xff8c00];
accentCols.forEach((c,i) => {
    const p = new THREE.PointLight(c, 20, 1500);
    const a = (i/accentCols.length)*Math.PI*2;
    p.position.set(Math.cos(a)*1200, 100+i*15, Math.sin(a)*1200);
    scene.add(p);
});

// ═══════════════════════════════════════
//  SKY — Astral/Magical Night
// ═══════════════════════════════════════
const skyC = document.createElement('canvas'); skyC.width=2048; skyC.height=1024;
const sCtx = skyC.getContext('2d');
const sGrad = sCtx.createLinearGradient(0,0,0,1024);
[[0,'#050011'],[0.2,'#110522'],[0.4,'#1e0b3b'],[0.6,'#2c1554'],[0.8,'#4a2574'],[1,'#6b3b96']].forEach(([s,c])=>sGrad.addColorStop(s,c));
sCtx.fillStyle=sGrad; sCtx.fillRect(0,0,2048,1024);
// Stars & Astral Dust
sCtx.fillStyle='#fff';
for(let i=0;i<2000;i++){sCtx.globalAlpha=0.1+Math.random()*0.7;const sz=0.5+Math.random()*1.5;sCtx.fillRect(Math.random()*2048,Math.random()*1024,sz,sz);}
sCtx.globalAlpha=0.05;
for(let i=0;i<100;i++){sCtx.fillStyle=['#8a2be2','#ffb6c1','#00ffff'][i%3];sCtx.beginPath();sCtx.ellipse(Math.random()*2048,Math.random()*1024,50+Math.random()*400,10+Math.random()*100,Math.random()*Math.PI,0,Math.PI*2);sCtx.fill();}
sCtx.globalAlpha=1;
const skyTex = new THREE.CanvasTexture(skyC);
scene.add(new THREE.Mesh(new THREE.SphereGeometry(9000,64,32), new THREE.MeshBasicMaterial({map:skyTex,side:THREE.BackSide})));

const pmrem = new THREE.PMREMGenerator(R);
const envS = new THREE.Scene();
envS.add(new THREE.Mesh(new THREE.SphereGeometry(100,16,8), new THREE.MeshBasicMaterial({map:skyTex,side:THREE.BackSide})));
scene.environment = pmrem.fromScene(envS,0,0.1,250).texture;

// ═══════════════════════════════════════════════════════
//  TRACK
// ═══════════════════════════════════════════════════════
const TRACK_PTS=12000, TRACK_WIDTH=22, TUBE_RADIUS=16;

function smootherstep(e0,e1,x){const t=Math.max(0,Math.min(1,(x-e0)/(e1-e0)));return t*t*t*(t*(t*6-15)+10);}

function buildTrackPoints(){
    const pts=[];
    for(let i=0;i<TRACK_PTS;i++){
        const t=i/TRACK_PTS, a=t*Math.PI*2;
        let x = 2400*Math.sin(a) + 600*Math.sin(2*a) + 150*Math.cos(3*a);
        let z = 2000*Math.cos(a) + 500*Math.cos(2*a) + 120*Math.sin(3*a);
        let y = 35 + 18*Math.sin(a*0.5+0.5) + 10*Math.cos(a+1.0) + 5*Math.sin(2*a+0.7);

        const loops=[
            [0.10,0.15,0.21,0.26, 280, 340],
            [0.40,0.45,0.51,0.56, 320, 400],
            [0.70,0.75,0.81,0.86, 260, 320],
        ];
        for(const[rS,lS,lE,rE,Rad,cY] of loops){
            const pre=0.03, post=0.03, fS=rS-pre, fE=rE+post;
            if(t<fS||t>fE) continue;
            const entryBlend=smootherstep(fS,rS,t), exitBlend=1-smootherstep(rE,fE,t);
            const envelope=Math.min(entryBlend,exitBlend);
            if(t>=lS&&t<=lE){
                const loopFrac=(t-lS)/(lE-lS), loopAngle=loopFrac*Math.PI*2;
                y=cY+Math.sin(loopAngle-Math.PI/2)*Rad;
                const lateralPush=(1-Math.cos(loopAngle))*Rad*0.05;
                x+=-Math.sin(a)*lateralPush; z+=Math.cos(a)*lateralPush;
            } else {
                y=y+(cY-Rad-y)*envelope;
            }
        }
        y=Math.max(y,8);
        pts.push(new THREE.Vector3(x,y,z));
    }
    return pts;
}
const trackCurve = new THREE.CatmullRomCurve3(buildTrackPoints(), true, 'catmullrom', 0.2);

const TS=8000;
const frenetFrames=[];
{
    const tangents=[];
    for(let i=0;i<TS;i++) tangents.push(trackCurve.getTangentAt(i/TS).normalize());
    let pN=new THREE.Vector3(0,1,0);
    const d=pN.dot(tangents[0]); pN.sub(tangents[0].clone().multiplyScalar(d)).normalize();
    if(pN.lengthSq()<0.001) pN.set(0,0,1);
    const normals=[pN.clone()], binormals=[new THREE.Vector3().crossVectors(tangents[0],pN).normalize()];
    for(let i=1;i<TS;i++){
        const pT=tangents[i-1],cT=tangents[i],ax=new THREE.Vector3().crossVectors(pT,cT);
        let n;
        if(ax.length()>1e-6){ax.normalize();n=pN.clone().applyAxisAngle(ax,Math.acos(THREE.MathUtils.clamp(pT.dot(cT),-1,1)));}
        else n=pN.clone();
        n.normalize();pN=n;normals.push(n);binormals.push(new THREE.Vector3().crossVectors(cT,n).normalize());
    }
    for(let i=0;i<TS;i++) frenetFrames.push({tangent:tangents[i],normal:normals[i],binormal:binormals[i]});
}

function getTrackFrame(t){
    const tt=((t%1)+1)%1,pos=trackCurve.getPointAt(tt),idx=Math.floor(tt*TS)%TS,f=frenetFrames[idx];
    return{pos,tan:f.tangent.clone(),up:f.normal.clone(),right:f.binormal.clone()};
}

function getTrackSection(t){
    t=((t%1)+1)%1;
    if(t<0.02)return'\u2694 GATES OF VALOR';
    if(t>=0.07&&t<0.15)return'\u25b2 TITAN\'S STAIRCASE';
    if(t>=0.15&&t<0.21)return'\u25ce ARCHMAGE\'S HALO';
    if(t>=0.21&&t<0.29)return'\u25bc WYVERN\'S DIVE';
    if(t>=0.37&&t<0.45)return'\u25b2 ASCENT TO ELDORIA';
    if(t>=0.45&&t<0.51)return'\u25ce RING OF THE ANCIENTS';
    if(t>=0.51&&t<0.59)return'\u25bc CHASM OF SHADOWS';
    if(t>=0.67&&t<0.75)return'\u25b2 DRAGONBONE RIDGE';
    if(t>=0.75&&t<0.81)return'\u25ce THE ETERNAL CROWN';
    if(t>=0.81&&t<0.89)return'\u25bc FALL OF GIANTS';
    if(t>=0.92)return'\u2192 KING\'S HIGHWAY';
    return'';
}

// ═══════════════════════════════════════
//  MAGICAL WARD TUBE (Instead of Glass)
// ═══════════════════════════════════════
const tubeMat = new THREE.MeshPhysicalMaterial({
    color:0xffd700,metalness:0.2,roughness:0.4,transmission:0.95,thickness:0.5,
    transparent:true,opacity:0.15,side:THREE.DoubleSide,envMapIntensity:1.0,
    emissive:0x4a2288, emissiveIntensity:0.1, depthWrite:false, wireframe: true // Runes/magic cage look
});
scene.add(new THREE.Mesh(new THREE.TubeGeometry(trackCurve,2000,TUBE_RADIUS,8,true),tubeMat));
document.getElementById('tubeOpacity').oninput=e=>{const v=parseInt(e.target.value)/100;tubeMat.opacity=v;};

// ═══════════════════════════════════════
//  ROAD SURFACE — Cobblestone & Magic
// ═══════════════════════════════════════
{
    const SEGS=4000,positions=[],indices=[],uvs=[];
    for(let i=0;i<=SEGS;i++){
        const t=i/SEGS,f=getTrackFrame(t);
        const L=f.pos.clone().add(f.right.clone().multiplyScalar(-TRACK_WIDTH/2)).sub(f.up.clone().multiplyScalar(0.05));
        const Ri=f.pos.clone().add(f.right.clone().multiplyScalar(TRACK_WIDTH/2)).sub(f.up.clone().multiplyScalar(0.05));
        positions.push(L.x,L.y,L.z,Ri.x,Ri.y,Ri.z);uvs.push(0,t*400,1,t*400);
        if(i<SEGS){const b=i*2;indices.push(b,b+1,b+2,b+1,b+3,b+2);}
    }
    const geo=new THREE.BufferGeometry();
    geo.setAttribute('position',new THREE.Float32BufferAttribute(positions,3));
    geo.setAttribute('uv',new THREE.Float32BufferAttribute(uvs,2));
    geo.setIndex(indices);geo.computeVertexNormals();
    
    // Create stone path with magical leylines
    const rc=document.createElement('canvas');rc.width=256;rc.height=256;const rx=rc.getContext('2d');
    rx.fillStyle='#2a2a2a';rx.fillRect(0,0,256,256);
    // Cobble cracks
    rx.strokeStyle='#111';rx.lineWidth=2;
    for(let i=0;i<50;i++){rx.beginPath();rx.moveTo(Math.random()*256,Math.random()*256);rx.lineTo(Math.random()*256,Math.random()*256);rx.stroke();}
    // Glowing Arcane Leylines
    rx.strokeStyle='rgba(138,43,226,0.6)';rx.lineWidth=6;rx.shadowColor='#8a2be2';rx.shadowBlur=15;
    rx.beginPath();rx.moveTo(128,0);rx.lineTo(128,256);rx.stroke();
    rx.strokeStyle='rgba(255,215,0,0.4)';rx.lineWidth=4;rx.shadowColor='#ffd700';
    rx.beginPath();rx.moveTo(10,0);rx.lineTo(10,256);rx.stroke();
    rx.beginPath();rx.moveTo(246,0);rx.lineTo(246,256);rx.stroke();
    
    const roadTex=new THREE.CanvasTexture(rc);roadTex.wrapS=roadTex.wrapT=THREE.RepeatWrapping;
    scene.add(new THREE.Mesh(geo,new THREE.MeshStandardMaterial({map:roadTex,color:0x444444,metalness:0.1,roughness:0.9})));
}

// Arcane borders
function buildRail(s){const pts=[];for(let i=0;i<=3000;i++){const t=i/3000,f=getTrackFrame(t);pts.push(f.pos.clone().add(f.right.clone().multiplyScalar(s*TRACK_WIDTH/2)).add(f.up.clone().multiplyScalar(0.5)));}return new THREE.CatmullRomCurve3(pts,true);}
scene.add(new THREE.Mesh(new THREE.TubeGeometry(buildRail(-1),3000,0.4,4,true),new THREE.MeshBasicMaterial({color:0xffd700,transparent:true,opacity:0.6})));
scene.add(new THREE.Mesh(new THREE.TubeGeometry(buildRail(1),3000,0.4,4,true),new THREE.MeshBasicMaterial({color:0x8a2be2,transparent:true,opacity:0.6})));

// ═══════════════════════════════════════
//  RUNIC LAUNCHPADS (Jumps)
// ═══════════════════════════════════════
const JUMP_POS=[0.05,0.30,0.35,0.58,0.63,0.88,0.94];
const jumpRamps=[];
const rampMat=new THREE.MeshStandardMaterial({color:0x333333,metalness:0.3,roughness:0.8,emissive:0x8a2be2,emissiveIntensity:0.6});
JUMP_POS.forEach(jt=>{
    const f=getTrackFrame(jt);
    const ramp=new THREE.Mesh(new THREE.BoxGeometry(TRACK_WIDTH*0.6,0.8,12),rampMat);
    ramp.position.copy(f.pos).add(f.up.clone().multiplyScalar(0.4));
    const m=new THREE.Matrix4().lookAt(f.pos,f.pos.clone().add(f.tan),f.up);
    ramp.quaternion.setFromRotationMatrix(m);ramp.rotateX(-0.18);ramp.userData.t=jt;
    scene.add(ramp);jumpRamps.push(ramp);
    const lt=new THREE.PointLight(0x8a2be2,15,100);lt.position.copy(f.pos).add(f.up.clone().multiplyScalar(5));scene.add(lt);
});

// Mana Pools (Boosts)
const BOOST_POS=[0.02,0.12,0.22,0.40,0.52,0.66,0.78,0.90];
const boostPads=[];
BOOST_POS.forEach(bt=>{
    const f=getTrackFrame(bt);
    const pad=new THREE.Mesh(new THREE.PlaneGeometry(TRACK_WIDTH*0.5,14),new THREE.MeshBasicMaterial({color:0x00fa9a,transparent:true,opacity:0.5,side:THREE.DoubleSide}));
    pad.position.copy(f.pos).add(f.up.clone().multiplyScalar(0.2));
    const m4=new THREE.Matrix4().lookAt(f.pos,f.pos.clone().add(f.tan),f.up);
    pad.quaternion.setFromRotationMatrix(m4);pad.userData.t=bt;scene.add(pad);boostPads.push(pad);
    const lt=new THREE.PointLight(0x00fa9a,12,90);lt.position.copy(f.pos).add(f.up.clone().multiplyScalar(5));scene.add(lt);
});

// Ancient Stone Gate (Start/Finish)
{
    const sf=getTrackFrame(0),gate=new THREE.Group();
    const stoneMat=new THREE.MeshStandardMaterial({color:0x555555,metalness:0.1,roughness:0.9});
    for(const s of[-1,1]){

// ═══════════════════════════════════════════════════
//  FANTASY LANDSCAPES & MOUNTAINS
// ═══════════════════════════════════════════════════
const mtGeo = new THREE.ConeGeometry(1,1,5); // Sharper, jagged peaks
const mtMats = [
    new THREE.MeshStandardMaterial({color:0x2c3e20,roughness:0.9,metalness:0.0}), // Dark forest green
    new THREE.MeshStandardMaterial({color:0x3a4233,roughness:0.95,metalness:0.0}), // Mossy stone
    new THREE.MeshStandardMaterial({color:0x403d39,roughness:1.0,metalness:0.0}), // Dark rock
];
const snowMat = new THREE.MeshStandardMaterial({color:0xffffff,roughness:0.6,metalness:0.1});

function noise2D(x,z){return Math.sin(x*0.0031+0.5)*Math.cos(z*0.0027+1.2)+Math.sin(x*0.0073)*Math.sin(z*0.0061+0.8)*0.5+Math.cos(x*0.0017+z*0.0019)*0.3;}

const trackCenter = new THREE.Vector3();
for(let i=0;i<100;i++){const p=trackCurve.getPointAt(i/100);trackCenter.add(p);}
trackCenter.divideScalar(100);

// Jagged Fantasy Mountains
for(let i=0;i<700;i++){
    const angle=Math.random()*Math.PI*2;
    const baseDist=2000+Math.random()*4500;
    const x=trackCenter.x+Math.cos(angle)*baseDist+(Math.random()-0.5)*800;
    const z=trackCenter.z+Math.sin(angle)*baseDist+(Math.random()-0.5)*800;

    const nv=noise2D(x,z);
    const distFactor=Math.max(0,(baseDist-2000)/3000);
    const baseH=200+nv*250+distFactor*400+Math.random()*300;
    const w=100+Math.random()*150+distFactor*100;

    const mt=new THREE.Mesh(mtGeo,mtMats[i%3].clone());
    mt.position.set(x,baseH*0.4,z);
    mt.scale.set(w,baseH,w);
    mt.rotation.y=Math.random()*Math.PI*2;
    scene.add(mt);

    if(baseH>350){
        const snow=new THREE.Mesh(mtGeo,snowMat);
        snow.position.set(x,baseH*0.75,z);
        snow.scale.set(w*0.4,baseH*0.26,w*0.4);
        snow.rotation.y=mt.rotation.y;
        scene.add(snow);
    }
}

// Fantasy Giant Mushrooms / Flora near track
const shroomGeo=new THREE.SphereGeometry(1, 16, 16, 0, Math.PI*2, 0, Math.PI/2);
const stemGeo=new THREE.CylinderGeometry(0.3, 0.5, 1, 8);
for(let i=0;i<300;i++){
    const t=Math.random();
    const p=trackCurve.getPointAt(t);
    const angle=Math.random()*Math.PI*2;
    const dist=50+Math.random()*250;
    const sx=p.x+Math.cos(angle)*dist;
    const sz=p.z+Math.sin(angle)*dist;
    if(p.y > 30) continue; // Keep them lower
    
    const scale=5+Math.random()*15;
    const shroom=new THREE.Mesh(shroomGeo,new THREE.MeshStandardMaterial({color:Math.random()>0.5?0x8a2be2:0x00fa9a,roughness:0.4,emissive:Math.random()>0.5?0x4a1b7a:0x006a4a}));
    shroom.position.set(sx,scale*0.8,sz);
    shroom.scale.set(scale,scale*0.6,scale);
    scene.add(shroom);
    
    const stem=new THREE.Mesh(stemGeo,new THREE.MeshStandardMaterial({color:0xd2b48c}));
    stem.position.set(sx,scale*0.4,sz);
    stem.scale.set(scale,scale*0.8,scale);
    scene.add(stem);
}

{
    const sz=12000,sg=200;

        colors[i*3]=c.r; colors[i*3+1]=c.g; colors[i*3+2]=c.b;

// Enchanted Water
const waterGeo=new THREE.PlaneGeometry(14000,14000,60,60);
const waterMesh=new THREE.Mesh(waterGeo,new THREE.MeshPhysicalMaterial({color:0x220044,metalness:0.8,roughness:0.1,envMapIntensity:2.0,transparent:true,opacity:0.9,emissive:0x110022}));
waterMesh.rotation.x=-Math.PI/2;waterMesh.position.y=-5;scene.add(waterMesh);
const waterPos=waterGeo.attributes.position;const waterOrigZ=new Float32Array(waterPos.count);
for(let i=0;i<waterPos.count;i++) waterOrigZ[i]=waterPos.getZ(i);

// ═══════════════════════════════════════
//  RACERS — ARCANE SKIFFS/CHARIOTS
// ═══════════════════════════════════════
const RC=[{body:0x8b4513,accent:0xffd700},{body:0x2f4f4f,accent:0x00ffff},{body:0x556b2f,accent:0xadff2f},{body:0x483d8b,accent:0xff69b4},{body:0x8b0000,accent:0xff4500},{body:0x4682b4,accent:0xffffff}];
function createRacer(ci){
    const rc=RC[ci],g=new THREE.Group();
    // Wooden/Stone Chariot Body
    g.add(new THREE.Mesh(new THREE.BoxGeometry(3.0,1.2,6.0),new THREE.MeshStandardMaterial({color:rc.body,metalness:0.1,roughness:0.9})));
    // Crystal Power Core
    const core=new THREE.Mesh(new THREE.OctahedronGeometry(1.2),new THREE.MeshStandardMaterial({color:rc.accent,emissive:rc.accent,emissiveIntensity:0.5,roughness:0.1}));
    core.position.set(0,1.5,-1);g.add(core);
    // Skiff Pontoons
    for(const s of[-1,1]){const pon=new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.4,6.5,8),new THREE.MeshStandardMaterial({color:0x333333,roughness:0.8}));pon.rotation.x=Math.PI/2;pon.position.set(s*1.8,0,0);g.add(pon);}
    // Magic Trail
    const eg=new THREE.PointLight(rc.accent,8,50);eg.position.set(0,0,4);g.add(eg);
    const th=new THREE.Mesh(new THREE.SphereGeometry(0.8,8,8),new THREE.MeshBasicMaterial({color:rc.accent,transparent:true,opacity:0.7}));
    th.position.set(0,0,3.5);g.add(th);g.userData.thruster=th;g.userData.engineGlow=eg;
    
    // Front magical lantern
    const hl=new THREE.SpotLight(rc.accent,15,200,Math.PI/6,0.5);hl.position.set(0,1,-3);hl.target.position.set(0,-2,-20);g.add(hl);g.add(hl.target);
    scene.add(g);return g;
}

const racers=[];
racers.push({mesh:createRacer(0),t:0,lateralOffset:0,speed:0,boost:100,boosting:false,lap:0,lapTimes:[],lapStartTime:0,bestLap:Infinity,lastT:0,heightOffset:0,heightVel:0,airborne:false,airTimer:0});
for(let i=0;i<5;i++) racers.push({mesh:createRacer(i+1),t:-0.001*(i+1),lateralOffset:(Math.random()-0.5)*TRACK_WIDTH*0.4,speed:0,boost:100,boosting:false,lap:0,lapTimes:[],lapStartTime:0,bestLap:Infinity,lastT:0,heightOffset:0,heightVel:0,airborne:false,airTimer:0,baseSpeed:0.000075+Math.random()*0.000020,lateralTarget:0,lateralTimer:0,boostChance:0.001+Math.random()*0.001});
const player=racers[0];

const keys={};
window.addEventListener('keydown',e=>{keys[e.code]=true;if(['Space','ShiftLeft','ShiftRight'].includes(e.code))e.preventDefault();});
window.addEventListener('keyup',e=>{keys[e.code]=false;});

let gameState='menu',countdownTimer=0,raceTime=0,prevTime=performance.now(),frame=0;
let smoothCamPos=new THREE.Vector3(0,60,0);
const GRAVITY=0.0004, JUMP_IMPULSE=0.18;

function setCamera(m){camMode=m;activeCam={chase:chaseCam,cockpit:cockpitCam,bird:birdCam}[m];document.querySelectorAll('#ui-bar button').forEach(b=>b.classList.remove('active'));document.getElementById({chase:'camChase',cockpit:'camCockpit',bird:'camBird'}[m])?.classList.add('active');}
document.getElementById('camChase').onclick=()=>setCamera('chase');
document.getElementById('camCockpit').onclick=()=>setCamera('cockpit');
document.getElementById('camBird').onclick=()=>setCamera('bird');
document.getElementById('startBtn').onclick=()=>{gameState='countdown';countdownTimer=3.5;document.getElementById('overlay').classList.add('hidden');document.getElementById('hud').style.display='';};

function ordSuf(n){return n===1?'ST':n===2?'ND':n===3?'RD':'TH';}
function fmtTime(ms){const s=Math.floor(ms/1000),m=Math.floor(s/60),r=s%60,f=Math.floor((ms%1000)/100);return m+':'+String(r).padStart(2,'0')+'.'+f;}

const posPanel=document.getElementById('posPanel');
racers.forEach((_,i)=>{const d=document.createElement('div');d.className='pos-dot'+(i===0?' player':'');d.style.color='#fff';d.textContent=i+1;d.id='posDot'+i;posPanel.appendChild(d);});
window.addEventListener('resize',()=>{const w=window.innerWidth,h=window.innerHeight;[chaseCam,cockpitCam,birdCam].forEach(c=>{c.aspect=w/h;c.updateProjectionMatrix();});R.setSize(w,h);});

const mmCtx=document.getElementById('minimap').getContext('2d');
function drawMinimap(){
    mmCtx.clearRect(0,0,180,180);mmCtx.fillStyle='rgba(0,0,0,0.4)';mmCtx.beginPath();mmCtx.arc(90,90,88,0,Math.PI*2);mmCtx.fill();
    mmCtx.beginPath();mmCtx.strokeStyle='rgba(255,215,0,0.3)';mmCtx.lineWidth=2;
    for(let i=0;i<=400;i++){const p=trackCurve.getPointAt(i/400);const mx=90+p.x/40,my=90+p.z/40;i===0?mmCtx.moveTo(mx,my):mmCtx.lineTo(mx,my);}
    mmCtx.stroke();
    racers.forEach((r,idx)=>{const p=trackCurve.getPointAt(((r.t%1)+1)%1);mmCtx.fillStyle='#'+RC[idx].accent.toString(16).padStart(6,'0');
        mmCtx.beginPath();mmCtx.arc(90+p.x/40,90+p.z/40,idx===0?4:3,0,Math.PI*2);mmCtx.fill();if(idx===0){mmCtx.strokeStyle='#fff';mmCtx.lineWidth=1;mmCtx.stroke();}});
}

function updatePhysics(racer,dt){
    if(racer.airborne){racer.heightVel-=GRAVITY*dt;racer.heightOffset+=racer.heightVel*dt;racer.airTimer+=dt;
        if(racer.heightOffset<=0){racer.heightOffset=0;racer.heightVel=0;racer.airborne=false;if(racer.airTimer>400)racer.speed*=1.04;racer.airTimer=0;}
        if(racer.heightOffset>TUBE_RADIUS*0.65){racer.heightOffset=TUBE_RADIUS*0.65;racer.heightVel=-Math.abs(racer.heightVel)*0.25;}}
    if(!racer.airborne){JUMP_POS.forEach(jt=>{if(Math.abs(((racer.t-jt)+1.5)%1-0.5)<0.0015){racer.airborne=true;racer.heightVel=JUMP_IMPULSE*(0.7+racer.speed/0.0002*0.4);racer.airTimer=0;}});}
}

function updatePlayer(dt){
    const p=player, accel=0.00000030*dt, maxSpd=0.000130, maxBoost=0.000180;
    const steerRate=p.airborne?0.10:0.25;
    if(keys['KeyW']||keys['ArrowUp'])p.speed+=accel;
    if(keys['KeyS']||keys['ArrowDown'])p.speed-=accel*0.5;
    if(keys['KeyA']||keys['ArrowLeft'])p.lateralOffset-=steerRate*dt;
    if(keys['KeyD']||keys['ArrowRight'])p.lateralOffset+=steerRate*dt;
    if(keys['Space'])p.speed*=0.985;
    if((keys['ShiftLeft']||keys['ShiftRight'])&&p.boost>0){p.boosting=true;p.speed+=accel*1.5;p.boost=Math.max(0,p.boost-0.08*dt);}
    else{p.boosting=false;p.boost=Math.min(100,p.boost+0.015*dt);}
    p.speed=Math.max(0.000005,Math.min(p.speed,p.boosting?maxBoost:maxSpd));
    p.speed*=p.airborne?0.9998:0.9985;
    p.lateralOffset=THREE.MathUtils.clamp(p.lateralOffset,-TRACK_WIDTH*0.38,TRACK_WIDTH*0.38);p.lateralOffset*=0.997;
    BOOST_POS.forEach(bt=>{if(Math.abs(((p.t-bt)+1.5)%1-0.5)<0.002&&!p.airborne){p.speed=Math.min(p.speed+0.000040,maxBoost);p.boost=Math.min(100,p.boost+20);}});
    updatePhysics(p,dt);
    p.lastT=p.t;p.t+=p.speed*dt;
    if(p.lastT%1>0.97&&p.t%1<0.03&&p.t>p.lastT){
        p.lap++;const lapTime=raceTime-p.lapStartTime;p.lapTimes.push(lapTime);if(lapTime<p.bestLap)p.bestLap=lapTime;p.lapStartTime=raceTime;
        const fl=document.getElementById('lap-flash');fl.textContent='CYCLE '+(p.lap+1)+' \u2014 '+fmtTime(lapTime);fl.classList.add('show');setTimeout(()=>fl.classList.remove('show'),2500);}
    if(keys['KeyR']){p.lateralOffset=0;p.speed=0.000050;p.heightOffset=0;p.heightVel=0;p.airborne=false;}
    if(keys['KeyC']){keys['KeyC']=false;const ms=['chase','cockpit','bird'];setCamera(ms[(ms.indexOf(camMode)+1)%3]);}
}

function updateAI(ai,idx,dt){
    const target=ai.baseSpeed*(0.9+0.2*Math.sin(raceTime*0.0003+idx*2));
    const gap=(player.lap+player.t%1)-(ai.lap+ai.t%1);
    ai.speed+=(target*(1+gap*0.08)-ai.speed)*0.01;
    ai.speed=THREE.MathUtils.clamp(ai.speed,0.000025,0.000170);
    ai.lateralTimer-=dt;if(ai.lateralTimer<=0){ai.lateralTarget=(Math.random()-0.5)*TRACK_WIDTH*0.4;ai.lateralTimer=1500+Math.random()*4000;}
    ai.lateralOffset+=(ai.lateralTarget-ai.lateralOffset)*0.0015*dt;
    if(Math.random()<ai.boostChance&&ai.boost>30){ai.speed+=0.000020;ai.boost-=10;}
    ai.boost=Math.min(100,ai.boost+0.008*dt);
    BOOST_POS.forEach(bt=>{if(Math.abs(((ai.t-bt)+1.5)%1-0.5)<0.003)ai.speed=Math.min(ai.speed+0.000025,0.000170);});
    updatePhysics(ai,dt);
    ai.lastT=ai.t;ai.t+=ai.speed*dt;
    if(ai.lastT%1>0.97&&ai.t%1<0.03&&ai.t>ai.lastT){ai.lap++;const lt2=raceTime-ai.lapStartTime;ai.lapTimes.push(lt2);if(lt2<ai.bestLap)ai.bestLap=lt2;ai.lapStartTime=raceTime;}
}

function positionRacer(racer){
    const t=((racer.t%1)+1)%1,f=getTrackFrame(t);
    const p=f.pos.clone().add(f.right.clone().multiplyScalar(racer.lateralOffset)).add(f.up.clone().multiplyScalar(1.4+racer.heightOffset));
    racer.mesh.position.copy(p);
    const lt2=((racer.t+0.0015)%1+1)%1,lf=getTrackFrame(lt2);
    const lp=lf.pos.clone().add(lf.right.clone().multiplyScalar(racer.lateralOffset)).add(lf.up.clone().multiplyScalar(1.4+racer.heightOffset));
    racer.mesh.up.copy(f.up);racer.mesh.lookAt(lp);
    if(racer.airborne&&racer.heightVel>0)racer.mesh.rotateX(0.12);
    if(racer.airborne&&racer.heightVel<-0.04)racer.mesh.rotateX(-0.08);
    const sf=racer.speed/0.0002;
    if(racer.mesh.userData.thruster){racer.mesh.userData.thruster.scale.setScalar(0.5+sf*1.5);racer.mesh.userData.thruster.material.opacity=0.3+sf*0.5;}
    if(racer.mesh.userData.engineGlow)racer.mesh.userData.engineGlow.intensity=2+sf*10;
}

function getRanking(){return racers.map((r,i)=>({idx:i,dist:r.lap+(r.t%1)})).sort((a,b)=>b.dist-a.dist);}

R.setAnimationLoop(function animate(){
    const now=performance.now(),rawDt=Math.min(now-prevTime,50);prevTime=now;frame++;

    if(frame%3===0){const wt=now*0.0002;for(let i=0;i<waterPos.count;i++){const wx=waterPos.getX(i),wy=waterPos.getY(i);waterPos.setZ(i,waterOrigZ[i]+Math.sin(wx*0.002+wt*1.5)*0.8+Math.sin(wy*0.003+wt*1.0)*0.5);}waterPos.needsUpdate=true;waterGeo.computeVertexNormals();}

    if(gameState==='countdown'){
        countdownTimer-=rawDt/1000;const cd=document.getElementById('countdown');
        if(countdownTimer>0.5){const n=Math.ceil(countdownTimer-0.5);cd.textContent=n>3?'':n;cd.classList.toggle('show',n<=3);}
        else if(countdownTimer>-0.5){cd.textContent='ASCEND!';cd.classList.add('show');}
        else{cd.classList.remove('show');gameState='racing';racers.forEach(r2=>{r2.lapStartTime=0;});}
        racers.forEach(r2=>positionRacer(r2));
    } else if(gameState==='racing'){
        raceTime+=rawDt;updatePlayer(rawDt);
        racers.forEach((r2,i)=>{if(i>0)updateAI(r2,i,rawDt);});
        racers.forEach(r2=>positionRacer(r2));
        document.getElementById('speedVal').textContent=Math.round(player.speed*250000);
        document.getElementById('boostFill').style.width=player.boost+'%';
        document.getElementById('lapDisplay').textContent='CYCLE '+(player.lap+1);
        document.getElementById('timeDisplay').textContent=fmtTime(raceTime-player.lapStartTime);
        document.getElementById('sectionDisplay').textContent=getTrackSection(player.t);
        document.getElementById('airLabel').classList.toggle('show',player.airborne);
        if(player.bestLap<Infinity)document.getElementById('bestDisplay').textContent='BEST '+fmtTime(player.bestLap);
        const jf=document.getElementById('jump-flash');
        if(player.airborne&&player.airTimer<250&&player.airTimer>0){jf.textContent='LEVITATING!';jf.classList.add('show');}else{jf.classList.remove('show');}
        const ranking=getRanking(),pr=ranking.findIndex(r2=>r2.idx===0)+1;
        document.getElementById('posDisplay').innerHTML=pr+'<sup>'+ordSuf(pr)+'</sup>';
        ranking.forEach((r2,p2)=>{const d=document.getElementById('posDot'+r2.idx);if(d){d.textContent=p2+1;d.style.order=p2;}});
    }

    if(gameState==='racing'||gameState==='countdown'){
        const pPos=player.mesh.position.clone(),pt=((player.t%1)+1)%1,pf=getTrackFrame(pt),fwd=pf.tan;
        const WU=new THREE.Vector3(0,1,0);
        if(camMode==='chase'){
            const flatFwd=new THREE.Vector3(fwd.x,0,fwd.z).normalize();
            const airLift=player.airborne?player.heightOffset*0.4:0;
            const ideal=pPos.clone().sub(flatFwd.clone().multiplyScalar(45)).add(new THREE.Vector3(0,18+airLift,0));
            smoothCamPos.lerp(ideal,0.035);chaseCam.position.copy(smoothCamPos);chaseCam.up.copy(WU);
            chaseCam.lookAt(pPos.clone().add(flatFwd.clone().multiplyScalar(30)).add(new THREE.Vector3(0,4,0)));
        }else if(camMode==='cockpit'){
            cockpitCam.position.copy(pPos.clone().add(new THREE.Vector3(0,4,0)));
            const dampFwd=new THREE.Vector3(fwd.x,fwd.y*0.12,fwd.z).normalize();
            cockpitCam.up.copy(WU);cockpitCam.lookAt(cockpitCam.position.clone().add(dampFwd.multiplyScalar(120)));
        }else if(camMode==='bird'){
            birdCam.position.lerp(pPos.clone().add(new THREE.Vector3(0,300,0)),0.03);birdCam.up.copy(WU);birdCam.lookAt(pPos);
        }
    }
    if(frame%4===0&&gameState!=='menu')drawMinimap();
    R.render(scene,activeCam);
});
