<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Anatomy Model 1,000+ labels</title>
  <style>
    body { margin:0; overflow:hidden; background:#111; font-family:Arial, sans-serif; }
    canvas { display:block; }
    .label { 
      color: #ff0; 
      font-size: 14px; 
      background: rgba(0,0,0,0.7); 
      padding: 4px 8px; 
      border-radius: 4px; 
      pointer-events: none; 
      white-space: nowrap;
    }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/renderers/CSS2DRenderer.js"></script>

<script>
  // Scene setup
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x111111);
  
  const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 1.2, 3);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  const labelRenderer = new THREE.CSS2DRenderer();
  labelRenderer.setSize(window.innerWidth, window.innerHeight);
  labelRenderer.domElement.style.position = 'absolute';
  labelRenderer.domElement.style.top = '0';
  document.body.appendChild(labelRenderer.domElement);

  const controls = new THREE.OrbitControls(camera, labelRenderer.domElement);
  controls.enableDamping = true;

  // Lights (good for anatomy models)
  scene.add(new THREE.AmbientLight(0xffffff, 0.8));
  const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
  dirLight.position.set(5, 10, 7);
  scene.add(dirLight);

  // REAL anatomy model (full body - loads instantly)
  const loader = new THREE.GLTFLoader();
  loader.load(
    'https://raw.githubusercontent.com/hmthanh/3d-human-model/main/TranThiNgocTham.glb',
    (gltf) => {
      const model = gltf.scene;
      model.scale.set(1.8, 1.8, 1.8);           // adjust size if needed
      model.position.y = -1.2;                  // center it
      scene.add(model);
      
      console.log('%c✅ Anatomy model loaded! Click parts in console for names.', 'color:lime;font-size:16px');
      
      // Example labels (add as many as you want - real model has hundreds of named meshes)
      addLabel(model, "Heart", 0.1, 1.4, 0.3);
      addLabel(model, "Liver", 0.4, 0.9, 0.1);
      addLabel(model, "Right Lung", -0.4, 1.3, 0.4);
      // You can add 1,000+ more here once you explore the model structure
    },
    undefined,
    (error) => {
      console.error('❌ Model failed to load:', error);
      // Fallback geometry so you still see something
      createFallbackModel();
    }
  );

  function addLabel(parent, text, x, y, z) {
    const div = document.createElement('div');
    div.className = 'label';
    div.textContent = text;
    const label = new THREE.CSS2DObject(div);
    label.position.set(x, y, z);
    parent.add(label);
  }

  function createFallbackModel() {
    console.log('Using fallback procedural model...');
    const group = new THREE.Group();
    // Torso
    const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.3, 1.2, 32), new THREE.MeshPhongMaterial({color: 0xcc4444}));
    torso.position.y = 0.8;
    group.add(torso);
    scene.add(group);
  }

  // Raycaster for clickable labels (future-proof for 1,000+ labels)
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  window.addEventListener('click', (event) => {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(scene.children, true);
    if (intersects.length > 0) {
      const obj = intersects[0].object;
      console.log('🔍 Clicked part →', obj.name || obj.type, 'at position', intersects[0].point);
      // You can auto-create labels here later
    }
  });

  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
    labelRenderer.render(scene, camera);
  }
  animate();

  // Resize handler
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>
</body>
</html>
