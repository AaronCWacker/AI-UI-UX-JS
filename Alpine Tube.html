<!DOCTYPE html>
<html lang="en">
<head>
    <title>NEON DRIFT — Alpine Tube Circuit</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{overflow:hidden;background:#000;font-family:'Segoe UI',system-ui,sans-serif}
        canvas{display:block}
        #overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,#0a0018 0%,#000 100%);z-index:300;transition:opacity 1.5s ease}
        #overlay.hidden{opacity:0;pointer-events:none}
        #overlay h1{color:#ff44aa;font-size:42px;font-weight:200;letter-spacing:18px;text-transform:uppercase;text-shadow:0 0 40px rgba(255,68,170,0.6)}
        #overlay .sub{color:rgba(255,100,200,0.4);font-size:12px;letter-spacing:5px;margin-top:8px}
        #overlay .start-btn{margin-top:30px;padding:12px 40px;background:rgba(255,68,170,0.15);border:1px solid rgba(255,68,170,0.4);color:#ff88cc;font-size:14px;letter-spacing:6px;cursor:pointer;border-radius:30px;transition:all 0.3s;font-family:inherit;text-transform:uppercase}
        #overlay .start-btn:hover{background:rgba(255,68,170,0.3);color:#fff;transform:scale(1.05)}
        #overlay .controls-hint{margin-top:20px;color:rgba(255,255,255,0.25);font-size:11px;letter-spacing:2px;text-align:center;line-height:1.8}
        #countdown{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:120px;font-weight:100;letter-spacing:10px;pointer-events:none;z-index:250;opacity:0;transition:opacity 0.3s;text-shadow:0 0 60px rgba(255,68,170,0.8),0 0 120px rgba(100,50,255,0.4)}
        #countdown.show{opacity:1}
        #hud{position:fixed;top:0;left:0;width:100%;pointer-events:none;z-index:100}
        #hud .speed-panel{position:absolute;bottom:20px;left:20px;background:rgba(0,0,0,0.5);backdrop-filter:blur(12px);border:1px solid rgba(255,68,170,0.15);border-radius:12px;padding:12px 18px;min-width:160px}
        #hud .speed-val{font-size:36px;color:#ff66bb;font-weight:200;letter-spacing:2px}
        #hud .speed-unit{font-size:11px;color:rgba(255,255,255,0.3);letter-spacing:3px}
        #hud .boost-bar{margin-top:8px;height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden}
        #hud .boost-fill{height:100%;background:linear-gradient(90deg,#ff44aa,#44aaff);border-radius:2px;transition:width 0.15s}
        #hud .air-label{font-size:10px;color:rgba(100,255,200,0.6);letter-spacing:2px;margin-top:4px;opacity:0;transition:opacity 0.2s}
        #hud .air-label.show{opacity:1}
        #hud .race-panel{position:absolute;top:14px;right:14px;background:rgba(0,0,0,0.5);backdrop-filter:blur(12px);border:1px solid rgba(100,180,255,0.15);border-radius:12px;padding:12px 18px;text-align:right}
        #hud .position{font-size:42px;color:#fff;font-weight:100}
        #hud .position sup{font-size:16px;color:rgba(255,255,255,0.4)}
        #hud .lap-info{font-size:12px;color:rgba(255,200,100,0.6);letter-spacing:2px;margin-top:4px}
        #hud .lap-time{font-size:11px;color:rgba(255,255,255,0.3);letter-spacing:1px;margin-top:2px}
        #hud .best-time{font-size:10px;color:rgba(100,255,200,0.5);letter-spacing:1px}
        #hud .section-display{position:absolute;top:14px;left:50%;transform:translateX(-50%);color:rgba(255,200,100,0.8);font-size:13px;letter-spacing:4px;text-shadow:0 2px 12px rgba(255,150,0,0.3)}
        #hud .pos-panel{position:absolute;top:50px;left:50%;transform:translateX(-50%);display:flex;gap:6px}
        #hud .pos-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;border:2px solid rgba(255,255,255,0.15);transition:all 0.3s}
        #hud .pos-dot.player{border-color:#ff44aa;box-shadow:0 0 12px rgba(255,68,170,0.4)}
        #minimap{position:fixed;bottom:20px;right:20px;z-index:100;pointer-events:none}
        #ui-bar{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:100;display:flex;gap:6px;align-items:center;background:rgba(0,0,0,0.6);backdrop-filter:blur(16px);padding:7px 14px;border-radius:30px;border:1px solid rgba(255,255,255,0.06)}
        #ui-bar button{background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.5);border:1px solid rgba(255,255,255,0.1);padding:5px 12px;border-radius:16px;cursor:pointer;font-size:10px;font-family:inherit;letter-spacing:2px;transition:all 0.3s}
        #ui-bar button:hover{background:rgba(255,255,255,0.12);color:#fff}
        #ui-bar button.active{background:rgba(255,68,170,0.25);border-color:rgba(255,68,170,0.4);color:#ff88cc}
        #ui-bar .sep{width:1px;height:20px;background:rgba(255,255,255,0.08)}
        #ui-bar label{color:rgba(255,255,255,0.4);font-size:10px;display:flex;align-items:center;gap:5px}
        #ui-bar input[type=range]{width:55px;accent-color:#ff44aa;height:3px}
        #lap-flash{position:fixed;top:30%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:28px;font-weight:200;letter-spacing:8px;pointer-events:none;z-index:100;opacity:0;transition:opacity 0.5s;text-shadow:0 0 30px rgba(255,200,100,0.6)}
        #lap-flash.show{opacity:1}
        #jump-flash{position:fixed;top:60%;left:50%;transform:translate(-50%,-50%);color:#44ffaa;font-size:16px;font-weight:200;letter-spacing:6px;pointer-events:none;z-index:100;opacity:0;transition:opacity 0.3s;text-shadow:0 0 20px rgba(68,255,170,0.6)}
        #jump-flash.show{opacity:1}
        #backend-tag{position:fixed;top:8px;right:8px;color:rgba(255,255,255,0.15);font-size:9px;z-index:100;letter-spacing:2px}
    </style>
</head>
<body>
    <div id="overlay">
        <h1>NEON DRIFT</h1>
        <div class="sub">ALPINE TUBE CIRCUIT — ENDLESS</div>
        <button class="start-btn" id="startBtn">BEGIN RACE</button>
        <div class="controls-hint">WASD / ARROWS — Steer &amp; Thrust<br>SHIFT — Boost | SPACE — Airbrake<br>C — Camera | R — Reset | Hit ramps to JUMP!</div>
    </div>
    <div id="countdown"></div>
    <div id="hud" style="display:none">
        <div class="speed-panel"><div class="speed-val" id="speedVal">0</div><div class="speed-unit">KM/H</div><div class="boost-bar"><div class="boost-fill" id="boostFill" style="width:100%"></div></div><div class="air-label" id="airLabel">AIRBORNE</div></div>
        <div class="race-panel"><div class="position" id="posDisplay">1<sup>ST</sup></div><div class="lap-info" id="lapDisplay">LAP 1</div><div class="lap-time" id="timeDisplay">0:00.0</div><div class="best-time" id="bestDisplay"></div></div>
        <div class="section-display" id="sectionDisplay"></div>
        <div class="pos-panel" id="posPanel"></div>
    </div>
    <canvas id="minimap" width="180" height="180"></canvas>
    <div id="ui-bar">
        <button id="camChase" class="active">CHASE</button><button id="camCockpit">COCKPIT</button><button id="camBird">BIRD</button>
        <div class="sep"></div><label>TUBE <input type="range" id="tubeOpacity" min="3" max="60" value="15"></label>
    </div>
    <div id="lap-flash"></div><div id="jump-flash"></div><div id="backend-tag"></div>

    <script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.webgpu.js","three/webgpu":"https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.webgpu.js","three/tsl":"https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.tsl.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.172.0/examples/jsm/"}}</script>

    <script type="module">
import * as THREE from 'three/webgpu';

// ═══════════════════════════════════════
//  RENDERER
// ═══════════════════════════════════════
const R = new THREE.WebGPURenderer({ antialias: true });
await R.init();
R.setPixelRatio(Math.min(window.devicePixelRatio, 2));
R.setSize(window.innerWidth, window.innerHeight);
R.toneMapping = THREE.ACESFilmicToneMapping;
R.toneMappingExposure = 0.9;
document.body.appendChild(R.domElement);
document.getElementById('backend-tag').textContent = R.backend?.isWebGPUBackend ? 'WebGPU' : 'WebGL2';

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x080820, 0.000055);

const aspect = window.innerWidth / window.innerHeight;
const chaseCam = new THREE.PerspectiveCamera(58, aspect, 1, 20000);
const cockpitCam = new THREE.PerspectiveCamera(75, aspect, 1, 20000);
const birdCam = new THREE.PerspectiveCamera(45, aspect, 1, 20000);
let activeCam = chaseCam, camMode = 'chase';

// ═══════════════════════════════════════
//  LIGHTING — rich, warm + cool
// ═══════════════════════════════════════
scene.add(new THREE.AmbientLight(0x556677, 0.8));
const sun = new THREE.DirectionalLight(0xffeedd, 3.0);
sun.position.set(800, 1200, 600); scene.add(sun);
const fill = new THREE.DirectionalLight(0x5544aa, 1.2);
fill.position.set(-600, 400, -400); scene.add(fill);
const rim = new THREE.DirectionalLight(0xffcc88, 0.6);
rim.position.set(-200, 200, 800); scene.add(rim);
const under = new THREE.DirectionalLight(0x224488, 0.3);
under.position.set(0, -100, 0); scene.add(under);

// Track accent lights — more of them, spread wider
const accentCols = [0xff44aa,0x44aaff,0xaa44ff,0x44ffaa,0xff8844,0xff4466,0x22ddff,0xff22aa,0x88ff44,0x44ffdd,0xff66ff,0x6688ff];
accentCols.forEach((c,i) => {
    const p = new THREE.PointLight(c, 15, 1200);
    const a = (i/accentCols.length)*Math.PI*2;
    p.position.set(Math.cos(a)*1200, 40+i*5, Math.sin(a)*1200);
    scene.add(p);
});

// ═══════════════════════════════════════
//  SKY — detailed with horizon glow
// ═══════════════════════════════════════
const skyC = document.createElement('canvas'); skyC.width=2048; skyC.height=1024;
const sCtx = skyC.getContext('2d');
const sGrad = sCtx.createLinearGradient(0,0,0,1024);
[[0,'#000008'],[0.08,'#020014'],[0.18,'#0a0030'],[0.3,'#120045'],[0.42,'#0e0d40'],[0.55,'#0a1035'],[0.68,'#0c1830'],[0.78,'#122640'],[0.86,'#1a3050'],[0.92,'#203858'],[0.96,'#2a4565'],[1,'#354f70']].forEach(([s,c])=>sGrad.addColorStop(s,c));
sCtx.fillStyle=sGrad; sCtx.fillRect(0,0,2048,1024);
// Stars — more layers
sCtx.fillStyle='#fff';
for(let i=0;i<1200;i++){sCtx.globalAlpha=0.1+Math.random()*0.9;const sz=0.2+Math.random()*2.2;sCtx.fillRect(Math.random()*2048,Math.random()*650,sz,sz);}
// Bright stars
for(let i=0;i<30;i++){sCtx.globalAlpha=0.6+Math.random()*0.4;sCtx.beginPath();sCtx.arc(Math.random()*2048,Math.random()*500,1+Math.random()*1.5,0,Math.PI*2);sCtx.fill();}
// Nebula wisps
sCtx.globalAlpha=0.03;
for(let i=0;i<80;i++){sCtx.fillStyle=['#ff44aa','#4466ff','#aa44ff','#44ffaa','#ff8866','#6644cc'][i%6];sCtx.beginPath();sCtx.ellipse(Math.random()*2048,60+Math.random()*550,40+Math.random()*300,8+Math.random()*50,Math.random()*Math.PI,0,Math.PI*2);sCtx.fill();}
// Horizon glow band — warm
sCtx.globalAlpha=0.12;
const hG=sCtx.createLinearGradient(0,880,0,1024);hG.addColorStop(0,'transparent');hG.addColorStop(0.3,'#442244');hG.addColorStop(0.6,'#ff66aa');hG.addColorStop(0.85,'#ffaa66');hG.addColorStop(1,'#4466aa');
sCtx.fillStyle=hG;sCtx.fillRect(0,880,2048,144);
sCtx.globalAlpha=1;
const skyTex = new THREE.CanvasTexture(skyC);
scene.add(new THREE.Mesh(new THREE.SphereGeometry(9000,64,32), new THREE.MeshBasicMaterial({map:skyTex,side:THREE.BackSide})));

const pmrem = new THREE.PMREMGenerator(R);
const envS = new THREE.Scene();
envS.add(new THREE.Mesh(new THREE.SphereGeometry(100,16,8), new THREE.MeshBasicMaterial({map:skyTex,side:THREE.BackSide})));
scene.environment = pmrem.fromScene(envS,0,0.1,250).texture;

// ═══════════════════════════════════════════════════════
//  TRACK — 3x LARGER, very gradual, 3 huge gentle loops
// ═══════════════════════════════════════════════════════
const TRACK_PTS=12000, TRACK_WIDTH=22, TUBE_RADIUS=16;

function smootherstep(e0,e1,x){const t=Math.max(0,Math.min(1,(x-e0)/(e1-e0)));return t*t*t*(t*(t*6-15)+10);}

function buildTrackPoints(){
    const pts=[];
    for(let i=0;i<TRACK_PTS;i++){
        const t=i/TRACK_PTS, a=t*Math.PI*2;
        // HUGE sweeping circuit — 3x scale, very smooth
        let x = 2400*Math.sin(a) + 600*Math.sin(2*a) + 150*Math.cos(3*a);
        let z = 2000*Math.cos(a) + 500*Math.cos(2*a) + 120*Math.sin(3*a);
        // Very gentle base elevation — rolling hills
        let y = 35 + 18*Math.sin(a*0.5+0.5) + 10*Math.cos(a+1.0) + 5*Math.sin(2*a+0.7);

        // THREE MASSIVE LOOPS — very long ramps, huge radii
        const loops=[
            [0.10,0.15,0.21,0.26, 280, 340],  // Loop 1 — long gradual
            [0.40,0.45,0.51,0.56, 320, 400],  // Loop 2 — biggest
            [0.70,0.75,0.81,0.86, 260, 320],  // Loop 3
        ];
        for(const[rS,lS,lE,rE,Rad,cY] of loops){
            const pre=0.03, post=0.03, fS=rS-pre, fE=rE+post;
            if(t<fS||t>fE) continue;
            const entryBlend=smootherstep(fS,rS,t), exitBlend=1-smootherstep(rE,fE,t);
            const envelope=Math.min(entryBlend,exitBlend);
            if(t>=lS&&t<=lE){
                const loopFrac=(t-lS)/(lE-lS), loopAngle=loopFrac*Math.PI*2;
                y=cY+Math.sin(loopAngle-Math.PI/2)*Rad;
                const lateralPush=(1-Math.cos(loopAngle))*Rad*0.05;
                x+=-Math.sin(a)*lateralPush; z+=Math.cos(a)*lateralPush;
            } else {
                y=y+(cY-Rad-y)*envelope;
            }
        }
        y=Math.max(y,8);
        pts.push(new THREE.Vector3(x,y,z));
    }
    return pts;
}
const trackCurve = new THREE.CatmullRomCurve3(buildTrackPoints(), true, 'catmullrom', 0.2);

// Frenet frames
const TS=8000;
const frenetFrames=[];
{
    const tangents=[];
    for(let i=0;i<TS;i++) tangents.push(trackCurve.getTangentAt(i/TS).normalize());
    let pN=new THREE.Vector3(0,1,0);
    const d=pN.dot(tangents[0]); pN.sub(tangents[0].clone().multiplyScalar(d)).normalize();
    if(pN.lengthSq()<0.001) pN.set(0,0,1);
    const normals=[pN.clone()], binormals=[new THREE.Vector3().crossVectors(tangents[0],pN).normalize()];
    for(let i=1;i<TS;i++){
        const pT=tangents[i-1],cT=tangents[i],ax=new THREE.Vector3().crossVectors(pT,cT);
        let n;
        if(ax.length()>1e-6){ax.normalize();n=pN.clone().applyAxisAngle(ax,Math.acos(THREE.MathUtils.clamp(pT.dot(cT),-1,1)));}
        else n=pN.clone();
        n.normalize();pN=n;normals.push(n);binormals.push(new THREE.Vector3().crossVectors(cT,n).normalize());
    }
    for(let i=0;i<TS;i++) frenetFrames.push({tangent:tangents[i],normal:normals[i],binormal:binormals[i]});
}

function getTrackFrame(t){
    const tt=((t%1)+1)%1,pos=trackCurve.getPointAt(tt),idx=Math.floor(tt*TS)%TS,f=frenetFrames[idx];
    return{pos,tan:f.tangent.clone(),up:f.normal.clone(),right:f.binormal.clone()};
}

function getTrackSection(t){
    t=((t%1)+1)%1;
    if(t<0.02)return'\u25a3 START / FINISH';
    if(t>=0.07&&t<0.15)return'\u25b2 ALPINE CLIMB \u2014 LOOP 1';
    if(t>=0.15&&t<0.21)return'\u25ce LOOP 1 \u2014 SKYREACH';
    if(t>=0.21&&t<0.29)return'\u25bc VALLEY DESCENT';
    if(t>=0.37&&t<0.45)return'\u25b2 GLACIER ASCENT \u2014 LOOP 2';
    if(t>=0.45&&t<0.51)return'\u25ce LOOP 2 \u2014 SUMMIT';
    if(t>=0.51&&t<0.59)return'\u25bc CANYON DROP';
    if(t>=0.67&&t<0.75)return'\u25b2 RIDGE CLIMB \u2014 LOOP 3';
    if(t>=0.75&&t<0.81)return'\u25ce LOOP 3 \u2014 FINAL RING';
    if(t>=0.81&&t<0.89)return'\u25bc DESCENT TO VALLEY';
    if(t>=0.92)return'\u2192 LAKESIDE STRAIGHT';
    return'';
}

// ═══════════════════════════════════════
//  GLASS TUBE
// ═══════════════════════════════════════
const tubeMat = new THREE.MeshPhysicalMaterial({
    color:0x99ddff,metalness:0.0,roughness:0.02,transmission:0.92,thickness:1.2,ior:1.45,
    transparent:true,opacity:0.15,side:THREE.DoubleSide,envMapIntensity:2.0,clearcoat:1.0,
    clearcoatRoughness:0.02,attenuationColor:new THREE.Color(0x55aaff),attenuationDistance:12,
    depthWrite:false,specularIntensity:1.0,
});
scene.add(new THREE.Mesh(new THREE.TubeGeometry(trackCurve,4000,TUBE_RADIUS,16,true),tubeMat));
document.getElementById('tubeOpacity').oninput=e=>{const v=parseInt(e.target.value)/100;tubeMat.opacity=v;tubeMat.transmission=0.5+(1-v)*0.45;};

// ═══════════════════════════════════════
//  ROAD SURFACE
// ═══════════════════════════════════════
{
    const SEGS=4000,positions=[],indices=[],uvs=[];
    for(let i=0;i<=SEGS;i++){
        const t=i/SEGS,f=getTrackFrame(t);
        const L=f.pos.clone().add(f.right.clone().multiplyScalar(-TRACK_WIDTH/2)).sub(f.up.clone().multiplyScalar(0.05));
        const Ri=f.pos.clone().add(f.right.clone().multiplyScalar(TRACK_WIDTH/2)).sub(f.up.clone().multiplyScalar(0.05));
        positions.push(L.x,L.y,L.z,Ri.x,Ri.y,Ri.z);uvs.push(0,t*400,1,t*400);
        if(i<SEGS){const b=i*2;indices.push(b,b+1,b+2,b+1,b+3,b+2);}
    }
    const geo=new THREE.BufferGeometry();
    geo.setAttribute('position',new THREE.Float32BufferAttribute(positions,3));
    geo.setAttribute('uv',new THREE.Float32BufferAttribute(uvs,2));
    geo.setIndex(indices);geo.computeVertexNormals();
    const rc=document.createElement('canvas');rc.width=128;rc.height=512;const rx=rc.getContext('2d');
    rx.fillStyle='#0c0c16';rx.fillRect(0,0,128,512);
    rx.strokeStyle='rgba(255,68,170,0.2)';rx.lineWidth=2;rx.setLineDash([28,28]);rx.beginPath();rx.moveTo(64,0);rx.lineTo(64,512);rx.stroke();
    rx.strokeStyle='rgba(100,180,255,0.3)';rx.lineWidth=3;rx.setLineDash([]);rx.beginPath();rx.moveTo(3,0);rx.lineTo(3,512);rx.stroke();rx.beginPath();rx.moveTo(125,0);rx.lineTo(125,512);rx.stroke();
    rx.strokeStyle='rgba(255,255,255,0.02)';rx.lineWidth=1;for(let yy=0;yy<512;yy+=24){rx.beginPath();rx.moveTo(0,yy);rx.lineTo(128,yy);rx.stroke();}
    const roadTex=new THREE.CanvasTexture(rc);roadTex.wrapS=roadTex.wrapT=THREE.RepeatWrapping;
    scene.add(new THREE.Mesh(geo,new THREE.MeshStandardMaterial({map:roadTex,color:0x1a1a2a,metalness:0.6,roughness:0.25,emissive:0x060610,emissiveIntensity:0.3})));
}

// Neon rails
function buildRail(s){const pts=[];for(let i=0;i<=3000;i++){const t=i/3000,f=getTrackFrame(t);pts.push(f.pos.clone().add(f.right.clone().multiplyScalar(s*TRACK_WIDTH/2)).add(f.up.clone().multiplyScalar(0.2)));}return new THREE.CatmullRomCurve3(pts,true);}
scene.add(new THREE.Mesh(new THREE.TubeGeometry(buildRail(-1),3000,0.22,4,true),new THREE.MeshBasicMaterial({color:0xff44aa,transparent:true,opacity:0.65})));
scene.add(new THREE.Mesh(new THREE.TubeGeometry(buildRail(1),3000,0.22,4,true),new THREE.MeshBasicMaterial({color:0x44aaff,transparent:true,opacity:0.65})));

// ═══════════════════════════════════════
//  JUMP RAMPS
// ═══════════════════════════════════════
const JUMP_POS=[0.05,0.30,0.35,0.58,0.63,0.88,0.94];
const jumpRamps=[];
const rampMat=new THREE.MeshStandardMaterial({color:0xff8833,metalness:0.7,roughness:0.2,emissive:0xff4400,emissiveIntensity:0.4});
JUMP_POS.forEach(jt=>{
    const f=getTrackFrame(jt);
    const ramp=new THREE.Mesh(new THREE.BoxGeometry(TRACK_WIDTH*0.55,0.5,10),rampMat);
    ramp.position.copy(f.pos).add(f.up.clone().multiplyScalar(0.35));
    const m=new THREE.Matrix4().lookAt(f.pos,f.pos.clone().add(f.tan),f.up);
    ramp.quaternion.setFromRotationMatrix(m);ramp.rotateX(-0.15);ramp.userData.t=jt;
    scene.add(ramp);jumpRamps.push(ramp);
    const lt=new THREE.PointLight(0xff8833,10,80);lt.position.copy(f.pos).add(f.up.clone().multiplyScalar(4));scene.add(lt);
});

// Boost pads
const BOOST_POS=[0.02,0.12,0.22,0.40,0.52,0.66,0.78,0.90];
const boostPads=[];

function updatePhysics(racer,dt){
    if(racer.airborne){racer.heightVel-=GRAVITY*dt;racer.heightOffset+=racer.heightVel*dt;racer.airTimer+=dt;
        if(racer.heightOffset<=0){racer.heightOffset=0;racer.heightVel=0;racer.airborne=false;if(racer.airTimer>400)racer.speed*=1.04;racer.airTimer=0;}
        if(racer.heightOffset>TUBE_RADIUS*0.65){racer.heightOffset=TUBE_RADIUS*0.65;racer.heightVel=-Math.abs(racer.heightVel)*0.25;}}
    if(!racer.airborne){JUMP_POS.forEach(jt=>{if(Math.abs(((racer.t-jt)+1.5)%1-0.5)<0.0015){racer.airborne=true;racer.heightVel=JUMP_IMPULSE*(0.7+racer.speed/0.0002*0.4);racer.airTimer=0;}});}
}

// MUCH SLOWER speeds
function updatePlayer(dt){
    const p=player, accel=0.00000030*dt, maxSpd=0.000130, maxBoost=0.000180;
    const steerRate=p.airborne?0.10:0.25;
    if(keys['KeyW']||keys['ArrowUp'])p.speed+=accel;
    if(keys['KeyS']||keys['ArrowDown'])p.speed-=accel*0.5;
    if(keys['KeyA']||keys['ArrowLeft'])p.lateralOffset-=steerRate*dt;
    if(keys['KeyD']||keys['ArrowRight'])p.lateralOffset+=steerRate*dt;
    if(keys['Space'])p.speed*=0.985;
    if((keys['ShiftLeft']||keys['ShiftRight'])&&p.boost>0){p.boosting=true;p.speed+=accel*1.5;p.boost=Math.max(0,p.boost-0.08*dt);}
    else{p.boosting=false;p.boost=Math.min(100,p.boost+0.015*dt);}
    p.speed=Math.max(0.000005,Math.min(p.speed,p.boosting?maxBoost:maxSpd));
    p.speed*=p.airborne?0.9998:0.9985;
    p.lateralOffset=THREE.MathUtils.clamp(p.lateralOffset,-TRACK_WIDTH*0.38,TRACK_WIDTH*0.38);p.lateralOffset*=0.997;
    BOOST_POS.forEach(bt=>{if(Math.abs(((p.t-bt)+1.5)%1-0.5)<0.002&&!p.airborne){p.speed=Math.min(p.speed+0.000040,maxBoost);p.boost=Math.min(100,p.boost+20);}});
    updatePhysics(p,dt);
    p.lastT=p.t;p.t+=p.speed*dt;
    if(p.lastT%1>0.97&&p.t%1<0.03&&p.t>p.lastT){
        p.lap++;const lapTime=raceTime-p.lapStartTime;p.lapTimes.push(lapTime);if(lapTime<p.bestLap)p.bestLap=lapTime;p.lapStartTime=raceTime;
        const fl=document.getElementById('lap-flash');fl.textContent='LAP '+(p.lap+1)+' \u2014 '+fmtTime(lapTime);fl.classList.add('show');setTimeout(()=>fl.classList.remove('show'),2500);}
    if(keys['KeyR']){p.lateralOffset=0;p.speed=0.000050;p.heightOffset=0;p.heightVel=0;p.airborne=false;}
    if(keys['KeyC']){keys['KeyC']=false;const ms=['chase','cockpit','bird'];setCamera(ms[(ms.indexOf(camMode)+1)%3]);}
}

function updateAI(ai,idx,dt){
    const target=ai.baseSpeed*(0.9+0.2*Math.sin(raceTime*0.0003+idx*2));
    const gap=(player.lap+player.t%1)-(ai.lap+ai.t%1);
    ai.speed+=(target*(1+gap*0.08)-ai.speed)*0.01;
    ai.speed=THREE.MathUtils.clamp(ai.speed,0.000025,0.000170);
    ai.lateralTimer-=dt;if(ai.lateralTimer<=0){ai.lateralTarget=(Math.random()-0.5)*TRACK_WIDTH*0.4;ai.lateralTimer=1500+Math.random()*4000;}
    ai.lateralOffset+=(ai.lateralTarget-ai.lateralOffset)*0.0015*dt;
    if(Math.random()<ai.boostChance&&ai.boost>30){ai.speed+=0.000020;ai.boost-=10;}
    ai.boost=Math.min(100,ai.boost+0.008*dt);
    BOOST_POS.forEach(bt=>{if(Math.abs(((ai.t-bt)+1.5)%1-0.5)<0.003)ai.speed=Math.min(ai.speed+0.000025,0.000170);});
    updatePhysics(ai,dt);
    ai.lastT=ai.t;ai.t+=ai.speed*dt;
    if(ai.lastT%1>0.97&&ai.t%1<0.03&&ai.t>ai.lastT){ai.lap++;const lt2=raceTime-ai.lapStartTime;ai.lapTimes.push(lt2);if(lt2<ai.bestLap)ai.bestLap=lt2;ai.lapStartTime=raceTime;}
}

function positionRacer(racer){
    const t=((racer.t%1)+1)%1,f=getTrackFrame(t);
    const p=f.pos.clone().add(f.right.clone().multiplyScalar(racer.lateralOffset)).add(f.up.clone().multiplyScalar(1.4+racer.heightOffset));
    racer.mesh.position.copy(p);
    const lt2=((racer.t+0.0015)%1+1)%1,lf=getTrackFrame(lt2);
    const lp=lf.pos.clone().add(lf.right.clone().multiplyScalar(racer.lateralOffset)).add(lf.up.clone().multiplyScalar(1.4+racer.heightOffset));
    racer.mesh.up.copy(f.up);racer.mesh.lookAt(lp);
    if(racer.airborne&&racer.heightVel>0)racer.mesh.rotateX(0.12);
    if(racer.airborne&&racer.heightVel<-0.04)racer.mesh.rotateX(-0.08);
    const sf=racer.speed/0.0002;
    if(racer.mesh.userData.thruster){racer.mesh.userData.thruster.scale.z=0.5+sf*1.5;racer.mesh.userData.thruster.material.opacity=0.3+sf*0.5;}
    if(racer.mesh.userData.engineGlow)racer.mesh.userData.engineGlow.intensity=2+sf*10;
}

function getRanking(){return racers.map((r,i)=>({idx:i,dist:r.lap+(r.t%1)})).sort((a,b)=>b.dist-a.dist);}

R.setAnimationLoop(function animate(){
    const now=performance.now(),rawDt=Math.min(now-prevTime,50);prevTime=now;frame++;

    // Water
    if(frame%3===0){const wt=now*0.0002;for(let i=0;i<waterPos.count;i++){const wx=waterPos.getX(i),wy=waterPos.getY(i);waterPos.setZ(i,waterOrigZ[i]+Math.sin(wx*0.003+wt*1.8)*0.6+Math.sin(wy*0.005+wt*1.2)*0.4+Math.sin((wx+wy)*0.002+wt*2.5)*0.3);}waterPos.needsUpdate=true;waterGeo.computeVertexNormals();}
    boostPads.forEach(pad=>{pad.material.opacity=0.3+0.3*Math.sin(now*0.004+pad.userData.t*20);});
    jumpRamps.forEach(r2=>{r2.material.emissiveIntensity=0.3+0.2*Math.sin(now*0.003+r2.userData.t*15);});

    if(gameState==='countdown'){
        countdownTimer-=rawDt/1000;const cd=document.getElementById('countdown');
        if(countdownTimer>0.5){const n=Math.ceil(countdownTimer-0.5);cd.textContent=n>3?'':n;cd.classList.toggle('show',n<=3);}
        else if(countdownTimer>-0.5){cd.textContent='GO!';cd.classList.add('show');}
        else{cd.classList.remove('show');gameState='racing';racers.forEach(r2=>{r2.lapStartTime=0;});}
        racers.forEach(r2=>positionRacer(r2));
    } else if(gameState==='racing'){
        raceTime+=rawDt;updatePlayer(rawDt);
        racers.forEach((r2,i)=>{if(i>0)updateAI(r2,i,rawDt);});
        racers.forEach(r2=>positionRacer(r2));
        document.getElementById('speedVal').textContent=Math.round(player.speed*250000);
        document.getElementById('boostFill').style.width=player.boost+'%';
        document.getElementById('lapDisplay').textContent='LAP '+(player.lap+1);
        document.getElementById('timeDisplay').textContent=fmtTime(raceTime-player.lapStartTime);
        document.getElementById('sectionDisplay').textContent=getTrackSection(player.t);
        document.getElementById('airLabel').classList.toggle('show',player.airborne);
        if(player.bestLap<Infinity)document.getElementById('bestDisplay').textContent='BEST '+fmtTime(player.bestLap);
        const jf=document.getElementById('jump-flash');
        if(player.airborne&&player.airTimer<250&&player.airTimer>0){jf.textContent='AIRBORNE!';jf.classList.add('show');}else{jf.classList.remove('show');}
        const ranking=getRanking(),pr=ranking.findIndex(r2=>r2.idx===0)+1;
        document.getElementById('posDisplay').innerHTML=pr+'<sup>'+ordSuf(pr)+'</sup>';
        ranking.forEach((r2,p2)=>{const d=document.getElementById('posDot'+r2.idx);if(d){d.textContent=p2+1;d.style.order=p2;}});
    }

    // Camera — horizon locked, pulled back further for sense of scale
    if(gameState==='racing'||gameState==='countdown'){
        const pPos=player.mesh.position.clone(),pt=((player.t%1)+1)%1,pf=getTrackFrame(pt),fwd=pf.tan;
        const WU=new THREE.Vector3(0,1,0);
        if(camMode==='chase'){
            const flatFwd=new THREE.Vector3(fwd.x,0,fwd.z).normalize();
            const airLift=player.airborne?player.heightOffset*0.4:0;
            const ideal=pPos.clone().sub(flatFwd.clone().multiplyScalar(45)).add(new THREE.Vector3(0,18+airLift,0));
            smoothCamPos.lerp(ideal,0.035);chaseCam.position.copy(smoothCamPos);chaseCam.up.copy(WU);
            chaseCam.lookAt(pPos.clone().add(flatFwd.clone().multiplyScalar(30)).add(new THREE.Vector3(0,4,0)));
        }else if(camMode==='cockpit'){
            cockpitCam.position.copy(pPos.clone().add(new THREE.Vector3(0,4,0)));
            const dampFwd=new THREE.Vector3(fwd.x,fwd.y*0.12,fwd.z).normalize();
            cockpitCam.up.copy(WU);cockpitCam.lookAt(cockpitCam.position.clone().add(dampFwd.multiplyScalar(120)));
        }else if(camMode==='bird'){
            birdCam.position.lerp(pPos.clone().add(new THREE.Vector3(0,300,0)),0.03);birdCam.up.copy(WU);birdCam.lookAt(pPos);
        }
    }
    if(frame%4===0&&gameState!=='menu')drawMinimap();
    R.render(scene,activeCam);
});
    </script>
</body>
