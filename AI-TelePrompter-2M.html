<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic Development — 2-Minute Delivery</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            background: #000;
            color: #e5e5e5;
        }

        #scene-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100vh;
            z-index: 1;
        }

        #teleprompter-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 2;
            display: flex;
            justify-content: center;
            pointer-events: none;
            overflow: hidden;
            perspective: 600px;
        }

        #teleprompter {
            width: 98%;
            max-width: 1400px;
            position: relative;
            transform-style: preserve-3d;
            transition: max-width 0.5s ease-in-out;
        }

        .scrolling-content {
            position: absolute;
            width: 100%;
            animation: crawl var(--crawl-duration, 120s) linear forwards;
            animation-play-state: var(--crawl-state, paused);
        }

        @keyframes crawl {
            0% {
                transform: rotateX(12deg) translateY(100vh) translateZ(50px);
            }
            100% {
                transform: rotateX(12deg) translateY(-680vh) translateZ(-900px);
            }
        }

        .section-header {
            font-family: 'Orbitron', monospace;
            color: #00e5ff;
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 2.5rem 0 0.5rem 0;
            pointer-events: all;
            cursor: pointer;
            text-shadow: 0 0 20px rgba(0, 229, 255, 0.6), 0 0 40px rgba(0, 229, 255, 0.2);
            border-bottom: 1px solid rgba(0, 229, 255, 0.25);
            margin-bottom: 0.5rem;
        }

        .principle {
            color: #ffc909;
            font-size: 2.2rem;
            font-weight: 500;
            line-height: 1.45;
            text-align: left;
            padding: 0.6rem 0;
            cursor: pointer;
            pointer-events: all;
            transition: color 0.3s, transform 0.3s;
            text-shadow: 0 0 8px rgba(0,0,0,0.7);
        }
        .principle:hover {
            color: #fff352;
            transform: scale(1.015);
        }

        .kw {
            color: #ff6b6b;
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            font-size: 0.92em;
            letter-spacing: 0.06em;
            text-shadow: 0 0 12px rgba(255, 107, 107, 0.4);
        }

        .video-link {
            display: block;
            color: #7cffcb;
            font-family: 'Orbitron', monospace;
            font-size: 1.4rem;
            font-weight: 400;
            text-align: center;
            padding: 0.7rem 0;
            pointer-events: all;
            cursor: pointer;
            text-decoration: none;
            letter-spacing: 0.08em;
            transition: color 0.3s, text-shadow 0.3s;
            text-shadow: 0 0 10px rgba(124, 255, 203, 0.3);
        }
        .video-link:hover {
            color: #b9ffe8;
            text-shadow: 0 0 20px rgba(124, 255, 203, 0.7);
        }

        /* ── Controls ── */
        .controls-container {
            position: fixed;
            top: 20px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        #speed-controls { left: 20px; }
        #text-controls  { right: 20px; }

        .controls-container button, #bottom-controls button.ctrl-btn {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,201,9,0.4);
            color: #ffc909;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 0 0 5px #ffc909;
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            font-size: 0.75rem;
            letter-spacing: 0.06em;
            pointer-events: all;
            min-width: 80px;
            text-align: center;
        }
        .controls-container button:hover, #bottom-controls button.ctrl-btn:hover {
            background: rgba(255,201,9,0.15);
            box-shadow: 0 0 12px rgba(255,201,9,0.4);
        }
        .controls-container button.cyan-btn {
            border-color: rgba(0,229,255,0.5);
            color: #00e5ff;
            text-shadow: 0 0 5px #00e5ff;
        }
        .controls-container button.cyan-btn:hover {
            background: rgba(0,229,255,0.12);
            box-shadow: 0 0 12px rgba(0,229,255,0.4);
        }

        .ctrl-divider {
            height: 1px;
            background: rgba(255,201,9,0.15);
            margin: 2px 0;
            pointer-events: none;
        }

        #bottom-controls {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        /* ── Timer ── */
        #timer-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(0,229,255,0.4);
            color: #fff;
            width: 50px; height: 50px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            pointer-events: all;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            box-shadow: 0 0 12px rgba(0,229,255,0.15);
        }
        #timer-btn:hover {
            box-shadow: 0 0 24px rgba(0,229,255,0.5);
            border-color: #00e5ff;
        }
        #timer-btn.running {
            border-color: #ff6b6b;
            box-shadow: 0 0 18px rgba(255,107,107,0.4);
            animation: pulse-ring 1.5s ease-in-out infinite;
        }
        #timer-btn.done {
            border-color: #7cffcb;
            box-shadow: 0 0 18px rgba(124,255,203,0.4);
        }

        @keyframes pulse-ring {
            0%, 100% { box-shadow: 0 0 12px rgba(255,107,107,0.3); }
            50%       { box-shadow: 0 0 28px rgba(255,107,107,0.6); }
        }

        #timer-display {
            font-family: 'Orbitron', monospace;
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            color: #00e5ff;
            opacity: 0;
            transition: opacity 0.4s;
            pointer-events: none;
            min-width: 80px;
        }
        #timer-display.visible { opacity: 1; }
        #timer-display.warning { color: #ff6b6b; }
        #timer-display.done    { color: #7cffcb; }

        /* ── Notification ── */
        #copy-notification {
            position: fixed;
            bottom: 30px; left: 50%;
            transform: translateX(-50%);
            background: rgba(30,200,100,0.85);
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.5s, transform 0.5s;
            pointer-events: none;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
        }
        #copy-notification.show {
            opacity: 1;
            transform: translateX(-50%) translateY(-20px);
        }

        @media (max-width: 768px) {
            .principle { font-size: 1.5rem; }
            .section-header { font-size: 1.2rem; }
            #teleprompter-container { perspective: 300px; }
        }
    </style>
</head>
<body>

<!-- LEFT: Speed + Reset -->
<div id="speed-controls" class="controls-container">
    <button id="slow-btn">Slow</button>
    <button id="pause-btn">Pause</button>
    <button id="fast-btn">Fast</button>
    <div class="ctrl-divider"></div>
    <button id="reset-pos-btn" class="cyan-btn">Reset</button>
</div>

<!-- RIGHT: Size + Position -->
<div id="text-controls" class="controls-container">
    <button id="wider-btn">Wider</button>
    <button id="reset-btn">Reset</button>
    <button id="smaller-btn">Smaller</button>
    <div class="ctrl-divider"></div>
    <button id="top-btn" class="cyan-btn">Top</button>
    <button id="bottom-btn" class="cyan-btn">Bottom</button>
</div>

<!-- BOTTOM LEFT: Timer + Copy -->
<div id="bottom-controls">
    <button id="timer-btn" title="Start 2-min delivery timer">⏱️</button>
    <div id="timer-display">2:00</div>
    <button class="ctrl-btn" id="copy-all-btn">Copy All</button>
</div>

<div id="scene-container"></div>

<div id="teleprompter-container">
    <div id="teleprompter"></div>
</div>

<div id="copy-notification">Copied to clipboard!</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════
// DATA — "the" removed, KEYWORDS uppercased
// ═══════════════════════════════════════
const sections = [

            "⚙️ MARKET AGENTS for Scale: Python ASYNCIO and MULTIPROCESSING to load-balance HPC tasks across cloud.",

            "🔄 SELF-CORRECTING LOOP: If system fails AB200, agents should self-correct SPECIFICATION, not just syntax.",
            "🗓️ WEEKLY HUMAN AUDITS: Level 5 requires non-negotiable weekly review where senior humans audit AI's IMPROVEMENT CYCLE.",
            "👓 TRANSPARENCY AS SAFETY: Interactive 3D VISUALIZATIONS prove agentic systems are not BLACK BOXES.",
            "🛡️ ARCHITECTING TRUST: By focusing on OUTCOMES, we turn clinical and business INTENT into scalable, trustworthy ENGINE."
        ]
    }
];

const videoLinks = [
    { text: "1. Nate B Jones",        url: "https://www.youtube.com/@NateBJones" },
    { text: "2. Wes Roth",            url: "https://www.youtube.com/@WesRoth/videos" },
    { text: "3. Jordan B Peterson",    url: "https://www.youtube.com/@JordanBPeterson/videos" },
    { text: "4. Lex Fridman",         url: "https://www.youtube.com/@lexfridman/videos" },
    { text: "5. Aaron Wacker",        url: "https://www.youtube.com/@AaronWacker/videos" },
    { text: "6. Joe Rogan Experience", url: "https://www.youtube.com/@joerogan/videos" }
];

// ═══════════════════════════════════════
// KEYWORD HIGHLIGHT
// ═══════════════════════════════════════
function highlightKeywords(text) {
    return text.replace(/\b([A-Z][A-Z0-9](?:[A-Z0-9\-]*[A-Z0-9])?)\b/g, '<span class="kw">$1</span>');
}

// ═══════════════════════════════════════
// DOM
// ═══════════════════════════════════════
const teleprompter    = document.getElementById('teleprompter');
const notification    = document.getElementById('copy-notification');
const slowBtn         = document.getElementById('slow-btn');
const fastBtn         = document.getElementById('fast-btn');
const pauseBtn        = document.getElementById('pause-btn');
const resetPosBtn     = document.getElementById('reset-pos-btn');
const widerBtn        = document.getElementById('wider-btn');
const resetBtn        = document.getElementById('reset-btn');
const smallerBtn      = document.getElementById('smaller-btn');
const topBtn          = document.getElementById('top-btn');
const bottomBtn       = document.getElementById('bottom-btn');
const copyAllBtn      = document.getElementById('copy-all-btn');
const timerBtn        = document.getElementById('timer-btn');
const timerDisplay    = document.getElementById('timer-display');

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let scrollingContent;
const initialDuration = 120;
const initialMaxWidth = 1400;
const initialRotationX = 12;
let currentDuration = initialDuration;
let currentMaxWidth = initialMaxWidth;
let currentRotationX = initialRotationX;
let isPaused = false;
let crawlMode = 'top'; // 'top' | 'bottom'

// Timer
let timerState = 'idle';
let timerInterval = null;
let timerSeconds = 120;

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
function init() {
    initTeleprompter();
    init3D();
    animate();
}

// ═══════════════════════════════════════
// TELEPROMPTER
// ═══════════════════════════════════════
function initTeleprompter() {
    const contentDiv = document.createElement('div');
    contentDiv.className = 'scrolling-content';

    sections.forEach(section => {
        const h = document.createElement('div');
        h.className = 'section-header';
        h.innerHTML = highlightKeywords(section.header);
        h.addEventListener('click', () => copyToClipboard(section.header));
        contentDiv.appendChild(h);

        section.items.forEach(text => {
            const p = document.createElement('p');
            p.className = 'principle';
            p.innerHTML = highlightKeywords(text);
            p.addEventListener('click', () => copyToClipboard(text));
            contentDiv.appendChild(p);
        });
    });

    // Video links
    const linksHeader = document.createElement('div');
    linksHeader.className = 'section-header';
    linksHeader.textContent = '🎬 Key Video Channels';
    linksHeader.style.textAlign = 'center';
    linksHeader.style.marginTop = '5rem';
    contentDiv.appendChild(linksHeader);

    videoLinks.forEach(link => {
        const a = document.createElement('a');
        a.href = link.url;
        a.target = '_blank';
        a.rel = 'noopener';
        a.textContent = link.text;
        a.className = 'video-link';
        contentDiv.appendChild(a);
    });

    scrollingContent = contentDiv;
    teleprompter.appendChild(scrollingContent);

    // Listeners
    slowBtn.addEventListener('click', slowDown);
    fastBtn.addEventListener('click', speedUp);
    pauseBtn.addEventListener('click', togglePause);
    resetPosBtn.addEventListener('click', resetPosition);
    widerBtn.addEventListener('click', makeWider);
    resetBtn.addEventListener('click', resetSettings);
    smallerBtn.addEventListener('click', makeSmaller);
    topBtn.addEventListener('click', () => setCrawlMode('top'));
    bottomBtn.addEventListener('click', () => setCrawlMode('bottom'));
    copyAllBtn.addEventListener('click', copyAllContent);
    timerBtn.addEventListener('click', handleTimer);
}

// ═══════════════════════════════════════
// CRAWL MODE (TOP / BOTTOM)
// ═══════════════════════════════════════
function setCrawlMode(mode) {
    crawlMode = mode;
    updateCrawlAnimation();
    restartCrawlAnimation();
}

function updateCrawlAnimation() {
    let styleSheet = document.getElementById('dynamic-styles');
    if (!styleSheet) {
        styleSheet = document.createElement('style');
        styleSheet.id = 'dynamic-styles';
        document.head.appendChild(styleSheet);
    }

    let keyframes;
    if (crawlMode === 'bottom') {
        // Start further below viewport, same end point
        keyframes = `
            @keyframes crawl {
                0% {
                    transform: rotateX(${currentRotationX}deg) translateY(250vh) translateZ(100px);
                }
                100% {
                    transform: rotateX(${currentRotationX}deg) translateY(-680vh) translateZ(-900px);
                }
            }
        `;
    } else {
        keyframes = `
            @keyframes crawl {
                0% {
                    transform: rotateX(${currentRotationX}deg) translateY(100vh) translateZ(50px);
                }
                100% {
                    transform: rotateX(${currentRotationX}deg) translateY(-680vh) translateZ(-900px);
                }
            }
        `;
    }
    styleSheet.innerHTML = keyframes;
}

function restartCrawlAnimation() {
    scrollingContent.style.animation = 'none';
    scrollingContent.offsetHeight; // force reflow
    scrollingContent.style.animation = '';
    scrollingContent.style.animationDuration = currentDuration + 's';
    scrollingContent.style.animationTimingFunction = 'linear';
    scrollingContent.style.animationFillMode = 'forwards';
    scrollingContent.style.animationPlayState = isPaused ? 'paused' : 'running';
}

// ═══════════════════════════════════════
// RESET — back to start, paused
// ═══════════════════════════════════════
function resetPosition() {
    if (timerState !== 'idle') resetTimerState();
    currentDuration = initialDuration;
    crawlMode = 'top';
    isPaused = true;
    pauseBtn.textContent = 'Play';
    updateCrawlAnimation();
    restartCrawlAnimation();
    scrollingContent.style.animationPlayState = 'paused';
}

// ═══════════════════════════════════════
// SPEED
// ═══════════════════════════════════════
function slowDown() {
    currentDuration += 20;
    scrollingContent.style.animationDuration = currentDuration + 's';
}

function speedUp() {
    if (currentDuration > 20) {
        currentDuration -= 15;
        scrollingContent.style.animationDuration = currentDuration + 's';
    }
}

function togglePause() {
    isPaused = !isPaused;
    if (isPaused) {
        scrollingContent.style.animationPlayState = 'paused';
        pauseBtn.textContent = 'Play';
    } else {
        scrollingContent.style.animationPlayState = 'running';
        pauseBtn.textContent = 'Pause';
    }
}

// ═══════════════════════════════════════
// WIDTH / ANGLE
// ═══════════════════════════════════════
function makeWider() {
    if (currentMaxWidth < 5000) {
        currentMaxWidth += 500;
        teleprompter.style.maxWidth = currentMaxWidth + 'px';
    }
    if (currentRotationX > 5) {
        currentRotationX -= 1;
        updateCrawlAnimation();
    }
}

function makeSmaller() {
    if (currentMaxWidth > 800) {
        currentMaxWidth -= 500;
        teleprompter.style.maxWidth = currentMaxWidth + 'px';
    }
    if (currentRotationX < 20) {
        currentRotationX += 1;
        updateCrawlAnimation();
    }
}

function resetSettings() {
    currentMaxWidth = initialMaxWidth;
    currentRotationX = initialRotationX;
    teleprompter.style.maxWidth = currentMaxWidth + 'px';
    currentDuration = initialDuration;
    scrollingContent.style.animationDuration = currentDuration + 's';
    updateCrawlAnimation();
    if (isPaused) togglePause();
}

// ═══════════════════════════════════════
// COPY
// ═══════════════════════════════════════
function copyToClipboard(text) {
    const plain = text.replace(/<[^>]*>/g, '');
    navigator.clipboard.writeText(plain).catch(() => {
        const t = document.createElement('textarea');
        t.value = plain; document.body.appendChild(t);
        t.select(); document.execCommand('copy');
        document.body.removeChild(t);
    });
    notification.classList.add('show');
    setTimeout(() => notification.classList.remove('show'), 2000);
}

function copyAllContent() {
    let all = '';
    sections.forEach(s => {
        all += s.header + '\n';
        s.items.forEach(i => all += i + '\n');
        all += '\n';
    });
    all += '--- Key Video Channels ---\n';
    videoLinks.forEach(v => all += `${v.text}: ${v.url}\n`);
    copyToClipboard(all);
}

// ═══════════════════════════════════════
// 2-MINUTE DELIVERY TIMER
// ═══════════════════════════════════════
function handleTimer() {
    if (timerState === 'idle') {
        startTimer();
    } else {
        resetTimerState();
    }
}

function startTimer() {
    timerState = 'running';
    timerSeconds = 120;
    timerBtn.classList.add('running');
    timerBtn.classList.remove('done');
    timerDisplay.classList.add('visible');
    timerDisplay.classList.remove('done', 'warning');
    updateTimerText();

    // Restart crawl from beginning and play
    restartCrawlAnimation();
    if (isPaused) {
        isPaused = false;
        pauseBtn.textContent = 'Pause';
    }
    scrollingContent.style.animationPlayState = 'running';

    timerInterval = setInterval(() => {
        timerSeconds--;
        updateTimerText();

        if (timerSeconds <= 15 && timerSeconds > 0) {
            timerDisplay.classList.add('warning');
        }

        if (timerSeconds <= 0) {
            clearInterval(timerInterval);
            timerState = 'done';
            timerBtn.classList.remove('running');
            timerBtn.classList.add('done');
            timerBtn.textContent = '✅';
            timerDisplay.classList.remove('warning');
            timerDisplay.classList.add('done');
            timerDisplay.textContent = 'DONE';

            // Freeze
            scrollingContent.style.animationPlayState = 'paused';
            isPaused = true;
            pauseBtn.textContent = 'Play';
        }
    }, 1000);
}

function resetTimerState() {
    clearInterval(timerInterval);
    timerState = 'idle';
    timerSeconds = 120;
    timerBtn.classList.remove('running', 'done');
    timerBtn.textContent = '⏱️';
    timerDisplay.classList.remove('visible', 'warning', 'done');
    updateTimerText();
}

function updateTimerText() {
    const m = Math.floor(timerSeconds / 60);
    const s = timerSeconds % 60;
    timerDisplay.textContent = `${m}:${s.toString().padStart(2, '0')}`;
}

// ═══════════════════════════════════════
// THREE.JS STARFIELD
// ═══════════════════════════════════════
let scene, camera, renderer, starLayers = [];

function init3D() {
    const container = document.getElementById('scene-container');
    scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000000, 0.0007);
    camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 1000);
    camera.position.z = 5;
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(devicePixelRatio);
    container.appendChild(renderer.domElement);

    const tex = makeStarTex();
    addStars(15000, 0.7, 0xffffff, tex);
    addStars(25000, 0.5, 0xf0e68c, tex);
    addStars(10000, 0.6, 0xadd8e6, tex);

    addEventListener('resize', () => {
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
    });
}

function addStars(count, size, color, tex) {
    const geo = new THREE.BufferGeometry();
    const v = [];
    for (let i = 0; i < count; i++) {
        v.push((Math.random()-0.5)*2000, (Math.random()-0.5)*2000, (Math.random()-0.5)*2000);
    }
    geo.setAttribute('position', new THREE.Float32BufferAttribute(v, 3));
    const mat = new THREE.PointsMaterial({
        color, size, transparent: true, opacity: 0.8,
        map: tex, blending: THREE.AdditiveBlending
    });
    const pts = new THREE.Points(geo, mat);
    starLayers.push(pts);
    scene.add(pts);
}

function makeStarTex() {
    const c = document.createElement('canvas');
    c.width = c.height = 64;
    const ctx = c.getContext('2d');
    const g = ctx.createRadialGradient(32,32,0,32,32,32);
    g.addColorStop(0,'rgba(255,255,255,1)');
    g.addColorStop(0.2,'rgba(255,255,255,0.8)');
    g.addColorStop(0.7,'rgba(255,255,255,0.1)');
    g.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,64,64);
    return new THREE.CanvasTexture(c);
}

function animate() {
    requestAnimationFrame(animate);
    if (starLayers.length) {
        starLayers[0].rotation.y += 0.00020;
        starLayers[1].rotation.y += 0.00010;
        starLayers[2].rotation.y += 0.00015;
    }
    renderer.render(scene, camera);
}

// ═══════════════════════════════════════
// GO
// ═══════════════════════════════════════
init();
</script>
</body>
</html>
