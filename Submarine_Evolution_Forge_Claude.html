<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ABYSSAL FORGE: Sub of Life</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=JetBrains+Mono:wght@500;700&family=Chakra+Petch:wght@300;400;600;700&display=swap');
    :root {
      --bg: #020a12; --mint: #33ffbb; --cyan: #44ddff; --violet: #c79dff;
      --rose: #ff6f91; --gold: #ffd35e; --bio: #91ff6b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      overflow: hidden; background: var(--bg);
      font-family: 'Chakra Petch', sans-serif; color: #eef4ff; user-select: none;
    }
    #C3D { position: fixed; inset: 0; z-index: 0; }
    .UI { position: fixed; inset: 0; z-index: 10; pointer-events: none; display: flex; flex-direction: column; padding: 10px; gap: 8px; }
    .I { pointer-events: auto; }
    .G {
      background: rgba(2,10,24,0.82); backdrop-filter: blur(14px);
      border: 1px solid rgba(68,221,255,0.12);
      box-shadow: 0 0 30px rgba(0,40,80,0.4), inset 0 1px 0 rgba(255,255,255,0.04);
      border-radius: 10px;
    }
    .FO { font-family: 'Orbitron', sans-serif; }
    .FM { font-family: 'JetBrains Mono', monospace; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(68,221,255,0.25); border-radius: 4px; }
    .log-e { animation: sIn .25s ease-out forwards; }
    @keyframes sIn { from { opacity:0; transform:translateX(-8px); } to { opacity:1; transform:translateX(0); } }
    .card { transition: all .18s; cursor: pointer; }
    .card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(68,221,255,0.2); }
    .depth-bar {
      background: linear-gradient(180deg, #115577, #0a2244, #061133, #020818, #000);
      border-radius: 6px; overflow: hidden; position: relative;
    }
    .depth-mk {
      width: 100%; height: 3px; background: var(--cyan);
      box-shadow: 0 0 8px var(--cyan); position: absolute; transition: top .3s;
    }
    .zl { position: absolute; right: 3px; font-size: 7px; color: rgba(255,255,255,0.3); font-family: 'JetBrains Mono', monospace; }
    .o2b { height: 6px; border-radius: 3px; background: rgba(255,255,255,0.08); overflow: hidden; }
    .o2f { height: 100%; border-radius: 3px; transition: width .3s; }
    .en { width: 26px; height: 26px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.12);
      display: flex; align-items: center; justify-content: center; font-size: 10px; transition: all .3s; flex-shrink: 0; }
    .en.ok { border-color: var(--mint); box-shadow: 0 0 10px rgba(51,255,187,0.35); }
    .en.on { border-color: var(--gold); background: rgba(255,211,94,0.12); box-shadow: 0 0 14px rgba(255,211,94,0.4); }
    .rpulse { animation: pls 1.5s infinite; }
    @keyframes pls { 0%{box-shadow:0 0 0 0 rgba(255,111,145,.7)} 70%{box-shadow:0 0 0 10px rgba(255,111,145,0)} 100%{box-shadow:0 0 0 0 rgba(255,111,145,0)} }
    #flash { position: fixed; inset: 0; z-index: 999; pointer-events: none; opacity: 0; transition: opacity .15s; }
    .combo {
      position: fixed; z-index: 100; pointer-events: none;
      font-family: 'Orbitron', sans-serif; font-weight: 900;
      animation: cfly 1s ease-out forwards;
    }
    @keyframes cfly { 0%{transform:translateY(0) scale(1);opacity:1} 60%{transform:translateY(-50px) scale(1.3);opacity:.8} 100%{transform:translateY(-100px) scale(.5);opacity:0} }
    .hdr { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; flex-wrap: wrap; }
    .bot { flex: 1; display: flex; justify-content: space-between; align-items: flex-end; gap: 8px; padding-bottom: 8px; min-height: 0; }
    .col { display: flex; flex-direction: column; overflow: hidden; }
    .sh { padding: 6px 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .sb { flex: 1; overflow-y: auto; padding: 6px; display: flex; flex-direction: column; gap: 4px; }
    .stat-g { display: flex; gap: 14px; text-align: center; padding: 8px 12px; }
    .stat-l { font-size: 8px; color: #556; font-family: 'JetBrains Mono', monospace; }
    .stat-v { font-weight: 700; font-size: 14px; font-family: 'JetBrains Mono', monospace; }
    .btn {
      font-size: 9px; font-family: 'JetBrains Mono', monospace; padding: 4px 8px;
      border-radius: 4px; background: rgba(20,60,80,0.5); color: #88ccee;
      border: 1px solid rgba(68,180,220,0.25); cursor: pointer; transition: background .2s;
    }
    .btn:hover { background: rgba(30,80,110,0.7); }
  </style>
</head>
<body>
<div id="C3D"></div>
<div id="flash"></div>
<div class="UI">
  <div class="hdr">
    <div class="G I" style="width:270px;padding:10px">
      <div class="FO" style="font-size:12px;font-weight:900;letter-spacing:4px;background:linear-gradient(90deg,#44ddff,#33ffbb,#c79dff);-webkit-background-clip:text;-webkit-text-fill-color:transparent">ABYSSAL FORGE</div>
      <div style="font-size:9px;color:#556;margin-top:4px;line-height:1.3">Pilot the Sub of Life. Harvest microorganisms to evolve your vessel into advanced biomachinery.</div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:5px;padding-top:5px;border-top:1px solid rgba(255,255,255,0.05)">
        <span id="status" class="FM" style="font-size:8px;color:var(--cyan)">ZONE: SUNLIT</span>
        <div style="display:flex;align-items:center;gap:5px">
          <span class="FM" style="font-size:7px;color:#556">SFX</span>
          <div id="sfx-btn" class="I" style="width:24px;height:12px;border-radius:6px;background:#1a6b6b;cursor:pointer;position:relative">
            <div style="width:9px;height:9px;border-radius:50%;background:#fff;position:absolute;top:1.5px;right:1.5px;transition:all .2s"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="G I stat-g">
      <div><div class="stat-l">HARVEST</div><div id="uH" class="stat-v" style="color:#fff">0</div></div>
      <div><div class="stat-l">DEPTH</div><div id="uD" class="stat-v" style="color:var(--cyan)">0m</div></div>
      <div><div class="stat-l">BIOMASS</div><div id="uM" class="stat-v" style="color:var(--bio)">1.0</div></div>
      <div><div class="stat-l">EVO</div><div id="uG" class="stat-v" style="color:var(--violet)">1</div></div>
      <div><div class="stat-l">COMBO</div><div id="uC" class="stat-v" style="color:var(--gold)">×1</div></div>
      <div><div class="stat-l">SWEEP</div><div id="uS" class="stat-v" style="color:var(--rose)">0%</div></div>
    </div>
    <div class="G I" style="width:180px;padding:8px">
      <div style="display:flex;justify-content:space-between;font-size:8px" class="FM">
        <span style="color:var(--cyan)">O₂ RESERVE</span><span id="o2p">100%</span>
      </div>
      <div class="o2b" style="margin:3px 0 5px"><div id="o2f" class="o2f" style="width:100%;background:linear-gradient(90deg,#33ffbb,#44ddff)"></div></div>
      <div style="display:flex;gap:5px">
        <div class="depth-bar" style="flex:1;height:50px">
          <div id="dMk" class="depth-mk" style="top:0%"></div>
          <div class="zl" style="top:1px">SUN</div><div class="zl" style="top:25%">TWI</div>
          <div class="zl" style="top:50%">MID</div><div class="zl" style="top:75%">ABY</div>
          <div class="zl" style="bottom:1px">HAD</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:3px">
          <button id="diveBtn" class="btn I">DIVE▼</button>
          <button id="riseBtn" class="btn I">RISE▲</button>
        </div>
      </div>
    </div>
  </div>
  <div class="bot">
    <div class="G I col" style="width:250px;height:310px">
      <div class="sh" style="display:flex;justify-content:space-between;align-items:center">
        <span class="FO" style="font-size:9px;color:var(--cyan);letter-spacing:2px">SONAR LOG</span>
        <button id="mic" class="I" style="padding:3px 5px;background:#1a2a3a;border:none;border-radius:50%;cursor:pointer;color:#fff;font-size:10px">🎙</button>
      </div>
      <div id="log" class="sb" style="font-size:10px"></div>
      <div style="padding:4px;border-top:1px solid rgba(255,255,255,0.05)">
        <input id="cmd" class="I" style="width:100%;background:#080e1a;color:#aac;font-size:10px;padding:4px 7px;border-radius:4px;border:1px solid rgba(68,180,220,0.2);outline:none;font-family:'JetBrains Mono',monospace" placeholder="dive, rise, sonar, torpedo..." />
      </div>
    </div>
    <div class="G I col" style="width:230px;height:310px">
      <div class="sh"><span class="FO" style="font-size:9px;color:var(--gold);letter-spacing:2px">ARSENAL</span></div>
      <div id="pList" class="sb"><div style="font-size:8px;color:#334;text-align:center;margin-top:30px">Harvest to unlock bio-weapons.</div></div>
    </div>
    <div class="G I col" style="width:230px;height:310px">
      <div class="sh"><span class="FO" style="font-size:9px;color:var(--mint);letter-spacing:2px">EVOLUTION</span></div>
      <div id="evoT" class="sb"></div>
    </div>
    <div class="G I col" style="width:230px;height:310px">
      <div class="sh"><span class="FO" style="font-size:9px;color:var(--bio);letter-spacing:2px">DEEP SPECIES</span></div>
      <div id="spList" class="sb"></div>
    </div>
  </div>
</div>
<script>
(function(){
  var B=240,MXP=1500,MXE=100,MXB=200,MXD=5000;
  var DZ=[
    {name:'SUNLIT',md:200,col:0x0a4466,fog:.0018,sr:1,tone:440},
    {name:'TWILIGHT',md:1000,col:0x061844,fog:.0028,sr:.8,tone:330},
    {name:'MIDNIGHT',md:2500,col:0x030c22,fog:.0038,sr:.6,tone:220},
    {name:'ABYSSAL',md:4000,col:0x010610,fog:.005,sr:.4,tone:165},
    {name:'HADAL',md:5000,col:0x000308,fog:.007,sr:.3,tone:110}
  ];
  var SEEDS=[
    {n:'Diatom',c:0x88ffcc,b:'disc',sp:14,dr:.5,fe:.3,ag:.02,dMi:0,dMa:400},
    {n:'Radiolarian',c:0xffcc88,b:'sphere',sp:10,dr:.3,fe:.25,ag:.05,dMi:0,dMa:800},
    {n:'Copepod',c:0x44ddff,b:'shrimp',sp:28,dr:.4,fe:.2,ag:.15,dMi:0,dMa:1200},
    {n:'Salp',c:0xaabbff,b:'tube',sp:16,dr:.6,fe:.22,ag:.08,dMi:100,dMa:2000},
    {n:'Siphonophore',c:0xff88cc,b:'chain',sp:12,dr:.7,fe:.15,ag:.2,dMi:200,dMa:3000},
    {n:'Anglerfish',c:0xff4422,b:'fang',sp:20,dr:.2,fe:.1,ag:.45,dMi:800,dMa:4000},
    {n:'Tubeworm',c:0xff6644,b:'worm',sp:4,dr:.1,fe:.35,ag:.03,dMi:1500,dMa:5000},
    {n:'DumboOcto',c:0xcc88ff,b:'octo',sp:18,dr:.45,fe:.12,ag:.18,dMi:2000,dMa:5000},
    {n:'Xenophyophore',c:0x66ff66,b:'blob',sp:2,dr:.05,fe:.4,ag:.01,dMi:3500,dMa:5000},
    {n:'HadalFish',c:0xeeeeff,b:'fish',sp:22,dr:.35,fe:.08,ag:.3,dMi:4000,dMa:5000}
  ];
  var CT=[
    {t:'Burst',e:'burst',d:'Pressure wave.',i:'💥'},
    {t:'Magnet',e:'magnet',d:'Bioelectric pull.',i:'🧲'},
    {t:'Sweep',e:'sweep',d:'Total sweep.',i:'🌊'},
    {t:'Freeze',e:'freeze',d:'Cryo stasis.',i:'❄️'},
    {t:'Halo',e:'halo',d:'Expand ring.',i:'💫'},
    {t:'Splice',e:'splice',d:'Force mutation.',i:'🧬'},
    {t:'Sonar',e:'sonar',d:'Reveal life.',i:'📡'},
    {t:'Torpedo',e:'torpedo',d:'Bio-missile.',i:'🚀'},
    {t:'Shield',e:'shield',d:'Hull barrier.',i:'🛡️'},
    {t:'Drill',e:'drill',d:'Pierce depth.',i:'⛏️'},
    {t:'Biolum',e:'biolum',d:'Bio lure.',i:'✨'},
    {t:'Vortex',e:'vortex',d:'Whirlpool.',i:'🌀'}
  ];
  var EVO=[
    {id:'hull1',n:'Chitin Hull',co:5,st:'armor',v:1,i:'🐚',d:'Bio-hull'},
    {id:'eng1',n:'Flagella Engine',co:8,st:'speed',v:5,i:'🦠',d:'+5 speed'},
    {id:'son1',n:'Echo Organ',co:10,st:'sonarR',v:30,i:'🔊',d:'+30 sonar'},
    {id:'lung1',n:'Gill Membrane',co:12,st:'o2Rate',v:-.3,i:'🫁',d:'Slow O₂ drain'},
    {id:'arm1',n:'Tentacle Array',co:15,st:'colR',v:8,i:'🦑',d:'+8 collect'},
    {id:'hull2',n:'Bone Plate',co:20,st:'armor',v:2,i:'🦴',d:'Pressure resist'},
    {id:'eye1',n:'Compound Eye',co:22,st:'vis',v:1,i:'👁️',d:'See through fog'},
    {id:'eng2',n:'Jet Siphon',co:28,st:'speed',v:10,i:'💨',d:'+10 speed'},
    {id:'lure1',n:'Angler Lure',co:32,st:'lureR',v:50,i:'🎣',d:'Auto-attract'},
    {id:'lung2',n:'Hemocyanin',co:38,st:'o2Rate',v:-.5,i:'🩸',d:'Major O₂ eff.'},
    {id:'drill1',n:'Radula Drill',co:42,st:'drillP',v:1,i:'⚙️',d:'Break barriers'},
    {id:'final',n:'LEVIATHAN',co:60,st:'lev',v:1,i:'🐉',d:'Ultimate form'}
  ];

  var S={t:0,collected:0,combo:0,comboT:0,sweepC:0,powers:[],
    fx:{mag:0,frz:0,halo:0,spl:0,shd:0,bio:0,vtx:0},
    sfx:true,ents:[],catalog:[],spCnt:0,mass:1,gene:1,
    parts:[],hNodes:[],depth:0,tDepth:0,dzi:0,
    o2:100,o2Rate:1,armor:0,subSpd:20,colR:18,magR:70,
    sonarR:80,lureR:0,drillP:0,vis:0,isLev:false,
    evoUn:[],shake:0,bubbles:[]};

  // AUDIO
  var AC,MG,ambO,ambG,engO,engG;
  function initA(){
    if(AC)return;try{
    AC=new(window.AudioContext||window.webkitAudioContext)();
    MG=AC.createGain();MG.gain.value=.3;MG.connect(AC.destination);
    ambG=AC.createGain();ambG.gain.value=.05;ambG.connect(MG);
    ambO=AC.createOscillator();ambO.type='sine';ambO.frequency.value=55;
    var af=AC.createBiquadFilter();af.type='lowpass';af.frequency.value=120;
    ambO.connect(af);af.connect(ambG);ambO.start();
    engG=AC.createGain();engG.gain.value=.03;engG.connect(MG);
    engO=AC.createOscillator();engO.type='sawtooth';engO.frequency.value=38;
    var ef=AC.createBiquadFilter();ef.type='lowpass';ef.frequency.value=80;
    engO.connect(ef);ef.connect(engG);engO.start();
    }catch(e){console.warn('Audio init failed',e);}
  }
  function sfx(ty){
    if(!S.sfx||!AC)return;var t=AC.currentTime;
    function osc(type,f0,f1,dur,vol){
      var o=AC.createOscillator(),g=AC.createGain();
      o.type=type;o.frequency.setValueAtTime(f0,t);
      if(f1)o.frequency.exponentialRampToValueAtTime(Math.max(1,f1),t+dur);
      g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);
      o.connect(g).connect(MG);o.start(t);o.stop(t+dur);
    }
    if(ty==='collect')osc('sine',600+S.combo*40,1200+S.combo*60,.15,.12);
    else if(ty==='sonar')osc('sine',1800,400,.8,.15);
    else if(ty==='torpedo'){osc('square',120,40,.3,.2);osc('triangle',800,100,.2,.1);}
    else if(ty==='burst'){osc('triangle',300,80,.25,.1);osc('triangle',500,100,.2,.08);osc('triangle',700,120,.15,.06);}
    else if(ty==='shield')osc('sine',200,600,.6,.1);
    else if(ty==='drill'){osc('sawtooth',100,50,.4,.12);osc('square',200,80,.3,.08);}
    else if(ty==='dive')osc('sine',500,100,.5,.08);
    else if(ty==='rise')osc('sine',150,700,.4,.08);
    else if(ty==='vortex'){var o=AC.createOscillator(),g=AC.createGain(),l=AC.createOscillator(),lg=AC.createGain();l.frequency.value=8;lg.gain.value=200;l.connect(lg).connect(o.frequency);o.type='sawtooth';o.frequency.value=150;g.gain.setValueAtTime(.1,t);g.gain.exponentialRampToValueAtTime(.001,t+1.2);o.connect(g).connect(MG);o.start(t);l.start(t);o.stop(t+1.2);l.stop(t+1.2);}
    else if(ty==='evolve'){[400,500,600,800].forEach(function(f,i){osc('sine',f,f*1.5,.35,.08);});}
    else if(ty==='depthZ')osc('sine',DZ[S.dzi].tone,DZ[S.dzi].tone*.5,.8,.06);
    else if(ty==='bubble')osc('sine',800+Math.random()*600,300,.08,.03);
  }
  function updAmb(){
    if(!AC||!ambO)return;var z=DZ[S.dzi],t=AC.currentTime;
    ambO.frequency.linearRampToValueAtTime(z.tone*.25,t+2);
    ambG.gain.linearRampToValueAtTime(.04+S.dzi*.012,t+1);
    if(engO){var sp=ship.vel.length();engO.frequency.linearRampToValueAtTime(30+sp*.5,t+.1);engG.gain.linearRampToValueAtTime(Math.min(.05,sp*.002),t+.1);}
  }

  // THREE
  var ctn=document.getElementById('C3D');
  var scene=new THREE.Scene();
  scene.fog=new THREE.FogExp2(0x0a4466,.0018);
  scene.background=new THREE.Color(0x0a4466);
  var cam=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,1,1800);
  cam.position.set(0,180,240);cam.lookAt(0,20,0);
  var R=new THREE.WebGLRenderer({antialias:false,powerPreference:'high-performance'});
  R.setSize(innerWidth,innerHeight);R.setPixelRatio(Math.min(devicePixelRatio,2));
  R.toneMapping=THREE.ACESFilmicToneMapping;R.toneMappingExposure=.85;
  ctn.appendChild(R.domElement);

  var grid=new THREE.GridHelper(B*2,48,0x115577,0x0a2244);
  grid.position.y=-10;grid.material.transparent=true;grid.material.opacity=.18;scene.add(grid);

  var shafts=[];
  for(var i=0;i<14;i++){
    var sg=new THREE.PlaneGeometry(8+Math.random()*16,320);
    var sm=new THREE.MeshBasicMaterial({color:0x44ddff,transparent:true,opacity:.012+Math.random()*.018,side:THREE.DoubleSide,depthWrite:false});
    var sh=new THREE.Mesh(sg,sm);
    sh.position.set((Math.random()-.5)*B*1.6,110,(Math.random()-.5)*B*1.6);
    sh.rotation.y=Math.random()*Math.PI;sh.rotation.x=-.08+Math.random()*.16;
    sh.userData={bOp:sm.opacity,ph:Math.random()*Math.PI*2};
    scene.add(sh);shafts.push(sh);
  }
  var kelps=[];
  for(var i=0;i<45;i++){
    var h=15+Math.random()*35;
    var kg=new THREE.CylinderGeometry(.3,.8,h,5,4);
    var km=new THREE.MeshStandardMaterial({color:new THREE.Color().setHSL(.28+Math.random()*.08,.6,.18+Math.random()*.12),emissive:0x112200,emissiveIntensity:.2,roughness:.8});
    var kk=new THREE.Mesh(kg,km);
    kk.position.set((Math.random()-.5)*B*1.8,h/2-10,(Math.random()-.5)*B*1.8);
    kk.rotation.x=(Math.random()-.5)*.3;kk.userData={ph:Math.random()*Math.PI*2,sw:.5+Math.random()*1.5};
    scene.add(kk);kelps.push(kk);
  }
  var jellies=[];
  for(var i=0;i<22;i++){
    var jr=1.5+Math.random()*2;var jc=new THREE.Color().setHSL(Math.random()*.3+.5,.8,.55);
    var jg=new THREE.SphereGeometry(jr,8,6);
    var jm=new THREE.MeshStandardMaterial({color:jc,emissive:jc,emissiveIntensity:.5,transparent:true,opacity:.3,roughness:.1});
    var jj=new THREE.Mesh(jg,jm);
    jj.position.set((Math.random()-.5)*B*2,10+Math.random()*80,(Math.random()-.5)*B*2);
    jj.userData={ph:Math.random()*Math.PI*2,sp:.3+Math.random()*.7,bY:jj.position.y};
    scene.add(jj);jellies.push(jj);
  }
  scene.add(new THREE.AmbientLight(0x1a3355,.8));
  var pL=new THREE.PointLight(0x44ddff,3,500);scene.add(pL);
  var bL=new THREE.PointLight(0x88ffdd,0,120);scene.add(bL);
  var bioC=new THREE.Group();scene.add(bioC);

  var ship={pos:new THREE.Vector3(),vel:new THREE.Vector3(),tgt:new THREE.Vector3(),bOrb:24,root:null,parts:[],shM:null};
  var particles=[],dm=new THREE.Object3D();
  var pMesh=new THREE.InstancedMesh(new THREE.SphereGeometry(.35,4,4),new THREE.MeshBasicMaterial({color:0xffffff}),MXP);
  pMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);scene.add(pMesh);
  var bMesh=new THREE.InstancedMesh(new THREE.SphereGeometry(.25,5,4),new THREE.MeshBasicMaterial({color:0xaaddff,transparent:true,opacity:.2}),MXB);
  bMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);scene.add(bMesh);

  var sRing=new THREE.Mesh(new THREE.RingGeometry(1,2,48),new THREE.MeshBasicMaterial({color:0x00ff88,transparent:true,opacity:0,side:THREE.DoubleSide,depthWrite:false}));
  sRing.rotation.x=-Math.PI/2;sRing.position.y=5;scene.add(sRing);

  // SPECIES
  function seedSp(s){S.spCnt++;return{id:'sp-'+S.spCnt,name:s.n+'-'+S.spCnt,color:s.c,body:s.b,speed:s.sp,drift:s.dr,fertility:s.fe,aggression:s.ag,dMin:s.dMi,dMax:s.dMa,gen:1,births:0,harv:0,muts:0};}
  function mutSp(b){
    S.spCnt++;var h=new THREE.Color(b.color);h.offsetHSL(rnd(-.1,.1),rnd(-.1,.1),rnd(-.08,.08));
    var bodies=['disc','sphere','shrimp','tube','chain','fang','worm','octo','blob','fish','spine','crystal'];
    return{id:'sp-'+S.spCnt,name:b.name.split('-')[0]+"'"+S.spCnt,color:h.getHex(),
      body:Math.random()<.3?pk(bodies):b.body,
      speed:cl(b.speed+rnd(-5,5),2,40),drift:cl(b.drift+rnd(-.15,.15),.02,.8),
      fertility:cl(b.fertility+rnd(-.06,.06),.05,.45),aggression:cl(b.aggression+rnd(-.1,.1),.01,.6),
      dMin:Math.max(0,b.dMin+rnd(-200,200)),dMax:Math.min(MXD,b.dMax+rnd(-200,200)),
      gen:b.gen+1,births:0,harv:0,muts:(b.muts||0)+1};
  }
  function mkG(k,sc){
    var s=sc||1;
    if(k==='disc')return new THREE.CylinderGeometry(2.5*s,2.5*s,.5*s,10);
    if(k==='sphere')return new THREE.IcosahedronGeometry(2*s,1);
    if(k==='shrimp')return new THREE.CylinderGeometry(.6*s,1*s,5*s,6);
    if(k==='tube')return new THREE.CylinderGeometry(1*s,1.5*s,7*s,8,1,true);
    if(k==='chain')return new THREE.TorusGeometry(1.8*s,.4*s,8,12);
    if(k==='fang')return new THREE.ConeGeometry(1.8*s,5*s,7);
    if(k==='worm')return new THREE.CylinderGeometry(.4*s,.6*s,9*s,6);
    if(k==='octo')return new THREE.DodecahedronGeometry(2.5*s,0);
    if(k==='blob')return new THREE.SphereGeometry(3*s,6,6);
    if(k==='fish')return new THREE.CylinderGeometry(.8*s,1.2*s,5*s,6);
    if(k==='spine')return new THREE.ConeGeometry(2*s,7*s,6);
    if(k==='crystal')return new THREE.OctahedronGeometry(2.2*s,0);
    return new THREE.IcosahedronGeometry(2*s,0);
  }
  function bioM(c,ei){return new THREE.MeshStandardMaterial({color:c,emissive:c,emissiveIntensity:ei||.35,roughness:.4,metalness:.1,transparent:true,opacity:.85});}
  function bldM(sp,mass){
    var g=new THREE.Group();g.add(new THREE.Mesh(mkG(sp.body,.7+mass*.2),bioM(sp.color)));
    var n=Math.floor(1+mass*1.5+sp.gen*.3),limbs=['tube','spine','chain','crystal','worm'];
    for(var i=0;i<n;i++){
      var l=new THREE.Mesh(mkG(pk(limbs),rnd(.15,.38)),bioM(sp.color,.5));
      var a=(Math.PI*2*i)/n;l.position.set(Math.cos(a)*rnd(1.5,3.5),rnd(-1,1),Math.sin(a)*rnd(1.5,3.5));
      l.rotation.set(rnd(-1.5,1.5),rnd(-1.5,1.5),rnd(-1.5,1.5));g.add(l);
    }
    g.add(new THREE.Mesh(new THREE.SphereGeometry(.5+mass*.15,8,8),new THREE.MeshStandardMaterial({color:0xffffff,emissive:sp.color,emissiveIntensity:.9,transparent:true,opacity:.7})));
    return g;
  }
  function spawnE(sp){
    var mass=rnd(.5,1.4)+sp.gen*.06,mesh=bldM(sp,mass);
    mesh.position.set(rnd(-B,B),rnd(0,15),rnd(-B,B));scene.add(mesh);
    var d=new THREE.Vector3(rnd(-1,1),0,rnd(-1,1)).normalize();
    var ent={id:Math.random().toString(36).slice(2),spId:sp.id,spN:sp.name,sp:sp,mesh:mesh,
      pos:mesh.position,vel:d.multiplyScalar(sp.speed*.15),en:rnd(40,100),age:0,mass:mass,
      ph:rnd(0,Math.PI*2),col:false,vR:false,pwr:pk(CT),pk:sp.body,rev:false};
    S.ents.push(ent);sp.births++;return ent;
  }

  // SUB
  function bldSub(){
    bioC.clear();ship.parts=[];
    var hm=new THREE.MeshStandardMaterial({color:0x1a6655,emissive:0x0a3322,emissiveIntensity:.5,roughness:.35,metalness:.25});
    var root=new THREE.Group();
    root.add(new THREE.Mesh(new THREE.CylinderGeometry(3.5,3.5,18,12),hm));root.children[0].rotation.z=Math.PI/2;
    var bow=new THREE.Mesh(new THREE.SphereGeometry(3.5,10,10),hm);bow.position.x=9;root.add(bow);
    var stern=new THREE.Mesh(new THREE.SphereGeometry(3.5,10,10),hm);stern.position.x=-9;root.add(stern);
    var tower=new THREE.Mesh(new THREE.CylinderGeometry(1.5,1.8,5,8),hm);tower.position.y=5;root.add(tower);
    var bowL=new THREE.Mesh(new THREE.SphereGeometry(1.4,8,8),new THREE.MeshStandardMaterial({color:0x88ffdd,emissive:0x44ddff,emissiveIntensity:1.5}));
    bowL.position.set(10.5,0,0);root.add(bowL);
    for(var i=0;i<4;i++){
      var bl=new THREE.Mesh(new THREE.BoxGeometry(.3,3,1),new THREE.MeshStandardMaterial({color:0x446666,metalness:.5}));
      bl.position.x=-11;bl.rotation.x=(Math.PI/2)*i;bl.userData={prop:true};root.add(bl);
    }

    [-1,1].forEach(function(s){var f=new THREE.Mesh(new THREE.BoxGeometry(5,.3,3),fm);f.position.set(-3,0,s*4.5);root.add(f);});
    var tf=new THREE.Mesh(new THREE.BoxGeometry(3,4,.3),fm);tf.position.x=-9;root.add(tf);
    var shM=new THREE.Mesh(new THREE.SphereGeometry(14,16,16),new THREE.MeshBasicMaterial({color:0x44aaff,transparent:true,opacity:0,side:THREE.DoubleSide,depthWrite:false}));

  }
  function addP(pk,col,eff){
    if(!ship.root)return;
    var p=new THREE.Mesh(mkG(pk,rnd(.18,.4)),bioM(col,.6));
    var sl=ship.parts.length,ring=5+Math.floor(sl/6)*3,a=sl*1.05;
    p.position.set(Math.cos(a)*ring,rnd(-2.5,2.5),Math.sin(a)*ring);
    p.rotation.set(rnd(-1.5,1.5),rnd(-1.5,1.5),rnd(-1.5,1.5));
    p.userData={sl:sl,pu:rnd(0,Math.PI*2),eff:eff};ship.root.add(p);ship.parts.push(p);
    var gf=1+ship.parts.length*.01;ship.root.scale.setScalar(gf);
    S.colR=18+Math.min(20,ship.parts.length*.2);S.magR=70+Math.min(100,ship.parts.length*1.2);
    ship.bOrb=24+Math.min(22,ship.parts.length*.3);
    S.mass=(1+ship.parts.length*.06).toFixed(1);S.gene=1+Math.floor(ship.parts.length/5);
  }

  // PARTICLES
  function emit(pos,col,n){var c=new THREE.Color(col);for(var i=0;i<(n||12);i++){if(particles.length>=MXP)break;particles.push({pos:pos.clone(),vel:new THREE.Vector3(rnd(-2,2),rnd(0,3),rnd(-2,2)),life:1,col:c});}}
  function spBub(pos,n){for(var i=0;i<(n||5);i++){if(S.bubbles.length>=MXB)break;S.bubbles.push({pos:pos.clone().add(new THREE.Vector3(rnd(-3,3),rnd(-1,1),rnd(-3,3))),vel:new THREE.Vector3(rnd(-.3,.3),rnd(.8,2.5),rnd(-.3,.3)),life:1,sz:rnd(.2,.8)});}}
  function updPt(dt){
    var c=0;for(var i=particles.length-1;i>=0;i--){var p=particles[i];p.life-=dt*1.5;
    if(p.life<=0){particles.splice(i,1);continue;}p.pos.addScaledVector(p.vel,dt*50);p.vel.y-=dt*1.5;
    dm.position.copy(p.pos);dm.scale.setScalar(Math.max(.1,p.life*.8));dm.updateMatrix();
    pMesh.setMatrixAt(c,dm.matrix);pMesh.setColorAt(c,p.col);c++;}
    pMesh.count=c;pMesh.instanceMatrix.needsUpdate=true;if(pMesh.instanceColor)pMesh.instanceColor.needsUpdate=true;
  }
  function updBb(dt){
    var c=0;for(var i=S.bubbles.length-1;i>=0;i--){var b=S.bubbles[i];b.life-=dt*.4;
    if(b.life<=0||b.pos.y>120){S.bubbles.splice(i,1);continue;}
    b.pos.addScaledVector(b.vel,dt*30);b.pos.x+=Math.sin(S.t*3+i)*dt*2;
    dm.position.copy(b.pos);dm.scale.setScalar(b.sz*b.life);dm.updateMatrix();
    bMesh.setMatrixAt(c,dm.matrix);c++;}
    bMesh.count=c;bMesh.instanceMatrix.needsUpdate=true;
  }

  // COLLECT
  function collect(e,src){
    if(e.col)return;e.col=true;S.collected++;S.combo++;S.comboT=3;
    S.sweepC=Math.min(100,S.sweepC+3+e.mass*2);
    emit(e.mesh.position,e.sp.color,25);spBub(e.mesh.position,8);sfx('collect');
    if(S.combo>1)showCb('×'+S.combo,'#ffd35e');
    S.powers.unshift({id:e.id,name:e.pwr.t,icon:e.pwr.i,eff:e.pwr.e,desc:e.pwr.d+' '+e.spN,used:false});
    S.powers=S.powers.slice(0,40);e.sp.harv++;addP(e.pk,e.sp.color,e.pwr.e);
    S.hNodes.push({ent:e,ph:rnd(0,Math.PI*2)});
    if(S.hNodes.length>18){var r=S.hNodes.shift();if(r&&r.ent&&!r.ent.vR){r.ent.vR=true;scene.remove(r.ent.mesh);}}
    S.o2=Math.min(100,S.o2+1.5+e.mass*.5);
    renderP();renderSp();renderEvo();updUI();
  }
  function execP(eff,src){
    initA();var idx=S.powers.findIndex(function(p){return p.eff===eff&&!p.used;});
    if(idx===-1&&eff!=='sweep'){logC('HELM','No '+eff.toUpperCase()+'.');return false;}
    if(eff==='sweep'&&idx===-1&&S.sweepC<100){logC('HELM','Sweep charge low.');return false;}
    if(idx!==-1)S.powers[idx].used=true;
    var msg='';
    if(eff==='burst'){sfx('burst');flash('#ffd35e');S.shake=.5;var h=0;
      S.ents.forEach(function(e){if(!e.col&&e.pos.distanceTo(ship.pos)<100){collect(e,src);h++;}});
      emit(ship.pos,0xffd35e,60);spBub(ship.pos,30);msg='Burst: '+h+' harvested.';}
    else if(eff==='magnet'){sfx('shield');S.fx.mag=S.t+8;msg='Magnet field active.';}
    else if(eff==='sweep'){sfx('burst');flash('#ff6f91');S.shake=.8;
      S.ents.forEach(function(e){if(!e.col)collect(e,src);});S.sweepC=0;msg='TOTAL SWEEP!';}
    else if(eff==='freeze'){sfx('shield');flash('#44ddff');S.fx.frz=S.t+6;msg='Cryostasis on.';}
    else if(eff==='halo'){sfx('shield');S.fx.halo=S.t+10;msg='Halo expanded.';}
    else if(eff==='splice'){sfx('evolve');flash('#91ff6b');S.fx.spl=S.t+12;
      for(var i=0;i<5;i++){var m=mutSp(pk(S.catalog));S.catalog.push(m);spawnE(m);}msg='Genome splice wave!';}
    else if(eff==='sonar'){sfx('sonar');sonarOn=true;sonarSc=0;sonarOp=.8;
      sRing.position.copy(ship.pos);sRing.position.y=5;var rv=0;
      S.ents.forEach(function(e){if(!e.col&&e.pos.distanceTo(ship.pos)<S.sonarR+60){e.rev=true;rv++;}});
      msg='Sonar: '+rv+' detected.';}
    else if(eff==='torpedo'){sfx('torpedo');flash('#ff4444');S.shake=.6;
      var tg=S.ents.filter(function(e){return!e.col;}).sort(function(a,b){return a.pos.distanceTo(ship.pos)-b.pos.distanceTo(ship.pos);}).slice(0,5);
      tg.forEach(function(t){emit(t.pos,0xff4444,15);collect(t,src);});spBub(ship.pos,20);
      msg='Torpedo: '+tg.length+' targets.';}
    else if(eff==='shield'){sfx('shield');S.fx.shd=S.t+12;msg='Shield on. O₂ halted.';}
    else if(eff==='drill'){sfx('drill');flash('#ffaa22');S.shake=1;
      S.tDepth=Math.min(MXD,S.depth+500);spBub(ship.pos,40);msg='Drill to '+Math.floor(S.tDepth)+'m!';}
    else if(eff==='biolum'){sfx('evolve');S.fx.bio=S.t+15;msg='Biolum lure active.';}
    else if(eff==='vortex'){sfx('vortex');flash('#aa44ff');S.fx.vtx=S.t+8;vtxG.visible=true;msg='Vortex deployed!';}
    logC('HELM',msg,true);renderP();updUI();return true;
  }
  function parseCmd(raw,src){
    var l=raw.toLowerCase();
    if(l.indexOf('dive')>=0||l.indexOf('descend')>=0){initA();S.tDepth=Math.min(MXD,S.depth+300);sfx('dive');logC('HELM','Diving to '+Math.floor(S.tDepth)+'m...');return true;}
    if(l.indexOf('rise')>=0||l.indexOf('ascend')>=0||l.indexOf('surface')>=0){initA();S.tDepth=Math.max(0,S.depth-300);sfx('rise');logC('HELM','Rising to '+Math.floor(S.tDepth)+'m...');return true;}
    for(var i=0;i<CT.length;i++){if(l.indexOf(CT[i].e)>=0||l.indexOf(CT[i].t.toLowerCase())>=0)return execP(CT[i].e,src);}
    logC('SONAR','Unknown. Try: dive, rise, sonar, torpedo, burst, shield, drill, vortex, splice, freeze...');return false;
  }

  // EVO
  function tryEvo(eid){
    initA();var ev=EVO.find(function(e){return e.id===eid;});
    if(!ev||S.evoUn.indexOf(eid)>=0)return;
    if(S.collected<ev.co){logC('BIO','Need '+ev.co+' (have '+S.collected+').');return;}
    S.evoUn.push(eid);sfx('evolve');flash('#33ffbb');
    if(ev.st==='speed')S.subSpd+=ev.v;
    else if(ev.st==='armor')S.armor+=ev.v;
    else if(ev.st==='o2Rate')S.o2Rate+=ev.v;
    else if(ev.st==='colR')S.colR+=ev.v;
    else if(ev.st==='sonarR')S.sonarR+=ev.v;
    else if(ev.st==='lureR')S.lureR+=ev.v;
    else if(ev.st==='vis')S.vis+=ev.v;
    else if(ev.st==='drillP')S.drillP+=ev.v;
    else if(ev.st==='lev'){S.isLev=true;S.subSpd+=20;S.colR+=25;S.armor+=5;}
    logC('BIO','EVOLVED: '+ev.n+'! '+ev.d,true);renderEvo();
  }

  // DEPTH
  function updDep(dt){
    var diff=S.tDepth-S.depth;if(Math.abs(diff)>1)S.depth+=Math.sign(diff)*Math.min(Math.abs(diff),80*dt);
    var nz=0;for(var i=DZ.length-1;i>=0;i--)if(S.depth>=(i>0?DZ[i-1].md:0)){nz=i;break;}
    if(nz!==S.dzi){
      S.dzi=nz;var z=DZ[nz];setS('ZONE: '+z.name);
      logC('SONAR','Entering '+z.name+' at '+Math.floor(S.depth)+'m.',true);sfx('depthZ');
      scene.fog.color.setHex(z.col);scene.fog.density=z.fog-S.vis*.0005;scene.background.setHex(z.col);
      shafts.forEach(function(s){s.material.opacity=s.userData.bOp*Math.max(0,1-nz*.25);});
    }
    if(S.t>S.fx.shd)S.o2-=dt*(S.o2Rate+S.dzi*.15);
    S.o2=cl(S.o2,0,100);
    if(S.o2<=0){S.tDepth=Math.max(0,S.depth-100);if(S.depth<10)S.o2=30;logC('ALERT','O₂ CRITICAL!');}
    document.getElementById('dMk').style.top=(S.depth/MXD*100)+'%';
  }

  // WORLD
  function valSp(){return S.catalog.filter(function(sp){return S.depth>=sp.dMin-200&&S.depth<=sp.dMax+200;});}
  function evolveW(dt){
    if(S.t>=S.nMut){S.nMut=S.t+rnd(5,9);var b=pk(S.catalog),m=mutSp(b);S.catalog.push(m);
      logC('BIO','Mutation: '+m.name+' ('+m.body+').');for(var i=0;i<2;i++)spawnE(m);renderSp();}
    if(S.t>=S.nSpec&&S.catalog.length<20){S.nSpec=S.t+rnd(12,22);var s=mutSp(pk(S.catalog));S.catalog.push(s);logC('BIO','Speciation: '+s.name+'.');renderSp();}
    var fOn=S.t<S.fx.frz,spOn=S.t<S.fx.spl,biOn=S.t<S.fx.bio,vOn=S.t<S.fx.vtx;
    S.ents.forEach(function(e){
      if(e.col)return;e.age+=dt;e.en-=dt*(.4+e.sp.speed*.01);
      e.ph+=dt*(.7+e.sp.drift*2);e.mesh.rotation.x+=dt*.5;e.mesh.rotation.y+=dt*(.6+e.sp.drift);
      e.mesh.position.y=4+Math.sin(S.t*1.8+e.ph)*(2+e.mass);
      if(!fOn){var nx=new THREE.Vector3(Math.sin(e.ph)*e.sp.drift,0,Math.cos(e.ph*1.3)*e.sp.drift);
        e.vel.addScaledVector(nx,dt*6);e.vel.clampLength(0,e.sp.speed*.3);e.pos.addScaledVector(e.vel,dt);}
      if(biOn&&e.pos.distanceTo(ship.pos)<120)e.vel.add(ship.pos.clone().sub(e.pos).normalize().multiplyScalar(.15));
      if(vOn&&e.pos.distanceTo(ship.pos)<80){
        var tc=ship.pos.clone().sub(e.pos),d=tc.length(),tg=new THREE.Vector3(-tc.z,0,tc.x).normalize();
        e.vel.lerp(tg.multiplyScalar(15),dt*2);e.vel.add(tc.normalize().multiplyScalar(Math.max(0,.5-d*.01)));
        if(d<S.colR+5)collect(e,'vortex');}
      if(S.lureR>0&&e.pos.distanceTo(ship.pos)<S.lureR)e.vel.add(ship.pos.clone().sub(e.pos).normalize().multiplyScalar(.04));
      if(Math.abs(e.pos.x)>B)e.vel.x*=-1;if(Math.abs(e.pos.z)>B)e.vel.z*=-1;
      e.pos.x=cl(e.pos.x,-B,B);e.pos.z=cl(e.pos.z,-B,B);
      if(Math.random()<(e.sp.fertility+(spOn?.08:0))*dt*.12&&S.ents.filter(function(x){return!x.col;}).length<MXE){
        var ch=Math.random()<.15?mutSp(e.sp):e.sp;
        if(!S.catalog.find(function(s){return s.id===ch.id;}))S.catalog.push(ch);
        var c=spawnE(ch);c.pos.copy(e.pos.clone().add(new THREE.Vector3(rnd(-5,5),0,rnd(-5,5))));}
    });
    var live=S.ents.filter(function(e){return!e.col;});
    for(var i=0;i<live.length;i++)for(var j=i+1;j<live.length;j++){
      var a=live[i],b=live[j],d=a.pos.distanceTo(b.pos);
      if(d>0&&d<8){var p=a.pos.clone().sub(b.pos).normalize().multiplyScalar(.04);a.vel.add(p);b.vel.sub(p);}
      if(d<10&&Math.random()<(a.sp.aggression+b.sp.aggression)*.003){if(a.mass>b.mass)b.en-=1.5;else a.en-=1.5;}}
    live.forEach(function(e){if(e.en<=0)collect(e,'eco');});
  }

  // AUTOPILOT
  function bestT(){
    var loose=S.ents.filter(function(e){return!e.col;});if(!loose.length)return new THREE.Vector3();
    var best=null,bs=-Infinity;
    loose.forEach(function(e){
      var sc=e.en*.01+e.mass*.5+e.sp.gen*.4;
      loose.forEach(function(o){var d=e.pos.distanceTo(o.pos);if(d<40)sc+=1-d/40;});
      sc+=Math.max(0,1-ship.pos.distanceTo(e.pos)/150)*2;if(e.rev)sc+=3;
      if(sc>bs){bs=sc;best=e.pos.clone();}
    });return best||new THREE.Vector3();
  }
  function autop(dt){
    ship.tgt=bestT();var dir=ship.tgt.clone().sub(ship.pos),dist=dir.length();
    if(dist>.1){var spd=cl(S.subSpd+S.gene*1.5+dist*.1,15,120);dir.normalize().multiplyScalar(spd);ship.vel.lerp(dir,.04);}
    ship.pos.addScaledVector(ship.vel,dt);ship.pos.x=cl(ship.pos.x,-B,B);ship.pos.z=cl(ship.pos.z,-B,B);
    bioC.position.copy(ship.pos);bioC.position.y=8+Math.sin(S.t*2.2)*2;
    if(ship.vel.lengthSq()>.1){var a=Math.atan2(ship.vel.x,ship.vel.z);bioC.rotation.y+=(a-bioC.rotation.y)*.05;}
    if(ship.root)ship.root.children.forEach(function(c){if(c.userData&&c.userData.prop)c.rotation.x+=dt*15*(1+ship.vel.length()*.1);});
    pL.position.copy(bioC.position);pL.position.y+=15;
    bL.position.copy(bioC.position);bL.intensity=S.t<S.fx.bio?4+Math.sin(S.t*5)*2:0;
    if(ship.shM){var on=S.t<S.fx.shd;ship.shM.material.opacity=on?.12+Math.sin(S.t*4)*.04:Math.max(0,ship.shM.material.opacity-dt*.5);ship.shM.rotation.y+=dt*.8;}
    if(S.t<S.fx.vtx){vtxG.visible=true;vtxG.position.copy(ship.pos);vtxG.position.y=5;vtxG.rotation.y+=dt*3;vtxG.children.forEach(function(c){c.material.opacity=.15+Math.sin(S.t*3+c.userData.idx)*.08;});}else vtxG.visible=false;
    var magOn=S.t<S.fx.mag,haloOn=S.t<S.fx.halo,cr=S.colR+(haloOn?18:0),mr=S.magR+(magOn?120:0);
    S.ents.forEach(function(e){if(e.col)return;var d=e.pos.distanceTo(ship.pos);
      if(d<mr){var p=ship.pos.clone().sub(e.pos).normalize().multiplyScalar((magOn?.9:.07)*Math.max(.2,1-d/mr));e.vel.add(p);}
      if(d<cr)collect(e);});
    ship.parts.forEach(function(p){var u=p.userData;u.pu+=dt*2;
      var ring=5+Math.floor(u.sl/6)*3,a=u.sl*1.05+S.t*.15;
      p.position.x=Math.cos(a)*ring;p.position.z=Math.sin(a)*ring;p.position.y+=Math.sin(u.pu)*.02;p.rotation.x+=dt*.5;p.rotation.y+=dt*.7;});
    if(Math.random()<.3)spBub(ship.pos.clone().add(new THREE.Vector3(-8,0,0)),1);
  }
  function updH(dt){
    var oR=ship.bOrb+(S.t<S.fx.halo?16:0);
    S.hNodes.forEach(function(h,i){if(h.ent.vR)return;h.ph+=dt*1.3;var r=oR+(i%3)*4;
      h.ent.mesh.position.x=ship.pos.x+Math.cos(h.ph+i*.55)*r;
      h.ent.mesh.position.z=ship.pos.z+Math.sin(h.ph+i*.55)*r;
      h.ent.mesh.position.y=bioC.position.y+Math.sin(S.t*1.8+i)*3;});
  }
  function updSon(dt){if(!sonarOn)return;sonarSc+=dt*80;sonarOp-=dt*.6;
    sRing.scale.setScalar(sonarSc);sRing.material.opacity=Math.max(0,sonarOp);
    if(sonarOp<=0){sonarOn=false;sRing.scale.setScalar(0);}}
  function animE(dt){
    shafts.forEach(function(s){s.userData.ph+=dt*.3;s.rotation.x=-.05+Math.sin(s.userData.ph)*.05;
      s.material.opacity=s.userData.bOp*(.8+Math.sin(s.userData.ph*1.3)*.2)*Math.max(0,1-S.dzi*.25);});
    kelps.forEach(function(k){k.userData.ph+=dt*k.userData.sw;k.rotation.x=Math.sin(k.userData.ph)*.08;k.rotation.z=Math.cos(k.userData.ph*.7)*.05;});
    jellies.forEach(function(j){j.userData.ph+=dt*j.userData.sp;j.position.y=j.userData.bY+Math.sin(j.userData.ph)*8;
      j.position.x+=Math.sin(j.userData.ph*.3)*dt*2;j.scale.y=.8+Math.sin(j.userData.ph*2)*.2;
      j.material.emissiveIntensity=.3+Math.sin(j.userData.ph*1.5)*.3+S.dzi*.15;});
    if(Math.random()<.05)spBub(new THREE.Vector3(rnd(-B,B),-5,rnd(-B,B)),2);
  }
  function shk(dt){if(S.shake>0){S.shake-=dt*2;var i=S.shake*4;cam.position.x+=(Math.random()-.5)*i;cam.position.y+=(Math.random()-.5)*i;}}

  // UI
  function updUI(){
    document.getElementById('uH').textContent=S.collected;
    document.getElementById('uD').textContent=Math.floor(S.depth)+'m';
    document.getElementById('uM').textContent=S.mass;
    document.getElementById('uG').textContent=S.gene;
    document.getElementById('uC').textContent='×'+S.combo;
    document.getElementById('uS').textContent=Math.floor(S.sweepC)+'%';
    var o=Math.floor(S.o2);
    document.getElementById('o2p').textContent=o+'%';
    document.getElementById('o2f').style.width=o+'%';
    document.getElementById('o2f').style.background=o<25?'linear-gradient(90deg,#ff2222,#ff4444)':o<50?'linear-gradient(90deg,#ff8844,#ffd35e)':'linear-gradient(90deg,#33ffbb,#44ddff)';
  }
  function renderP(){
    var l=document.getElementById('pList');l.innerHTML='';
    var act=S.powers.filter(function(p){return!p.used;}).slice(0,14);
    if(!act.length){l.innerHTML='<div style="font-size:8px;color:#334;text-align:center;margin-top:30px">Harvest to unlock.</div>';return;}
    act.forEach(function(p){
      var el=document.createElement('div');el.className='card';
      el.style.cssText='padding:4px 6px;border-radius:5px;border:1px solid rgba(68,180,220,.12);background:rgba(10,20,40,.7);font-size:10px;';
      el.innerHTML='<div style="display:flex;justify-content:space-between;font-weight:700"><span>'+p.icon+' '+p.name+'</span><span style="font-size:7px;color:#556;font-family:monospace">RDY</span></div><div style="font-size:8px;color:#445;margin-top:1px">'+p.desc+'</div>';
      el.onclick=function(){execP(p.eff,'manual');};l.appendChild(el);});
  }
  function renderSp(){
    var lab=document.getElementById('spList');lab.innerHTML='';
    var v=valSp().sort(function(a,b){return(b.gen+b.births*.1)-(a.gen+a.births*.1);}).slice(0,12);
    if(!v.length){lab.innerHTML='<div style="font-size:8px;color:#334;text-align:center;margin-top:30px">No species here.</div>';return;}
    v.forEach(function(sp){
      var live=S.ents.filter(function(e){return!e.col&&e.spId===sp.id;}).length;
      var r=document.createElement('div');
      r.style.cssText='padding:4px 6px;border-radius:5px;border:1px solid rgba(255,255,255,.04);background:rgba(5,10,25,.6);';
      r.innerHTML='<div style="display:flex;justify-content:space-between"><span style="font-weight:600;font-size:10px;color:#'+sp.color.toString(16).padStart(6,'0')+'">'+sp.name+'</span><span style="font-size:8px;color:#445">G'+sp.gen+'</span></div><div style="font-size:8px;color:#445">'+sp.body+' • '+live+' live • '+sp.harv+' harv</div><div style="font-size:7px;color:#334">'+sp.dMin+'-'+sp.dMax+'m</div>';
      lab.appendChild(r);});
  }
  function renderEvo(){
    var tree=document.getElementById('evoT');tree.innerHTML='';
    EVO.forEach(function(ev){
      var un=S.evoUn.indexOf(ev.id)>=0,ca=S.collected>=ev.co;
      var el=document.createElement('div');
      el.style.cssText='display:flex;align-items:center;gap:7px;padding:4px 6px;border-radius:5px;border:1px solid '+(un?'rgba(51,255,187,.2)':ca?'rgba(255,211,94,.2)':'rgba(255,255,255,.04)')+';background:'+(un?'rgba(10,40,30,.4)':ca?'rgba(40,35,10,.3)':'rgba(5,10,25,.4)')+';cursor:'+((!un&&ca)?'pointer':'default')+';opacity:'+(un||ca?1:.45)+';transition:all .2s;';
      el.innerHTML='<div class="en '+(un?'on':ca?'ok':'')+'">'+ev.i+'</div><div style="flex:1"><div style="font-size:9px;font-weight:700;color:'+(un?'#33ffbb':ca?'#ffd35e':'#445')+'">'+ev.n+'</div><div style="font-size:7px;color:'+(un?'#4a8':ca?'#886':'#334')+'">'+ev.d+(un?' ✓':' ('+ev.co+')')+'</div></div>';
      if(!un&&ca)el.onclick=function(){tryEvo(ev.id);};
      tree.appendChild(el);});
  }

  // INIT
  function init(){
    bldSub();S.catalog=SEEDS.map(seedSp);S.nMut=8;S.nSpec=20;S.nSpawn=0;
    valSp().forEach(function(sp){for(var i=0;i<5+Math.floor(rnd(0,4));i++)spawnE(sp);});
    addP('shrimp',0x44ddff,'sonar');addP('tube',0x33ffbb,'magnet');
    scene.fog.color.setHex(DZ[0].col);scene.background.setHex(DZ[0].col);
    logC('SONAR','Sub of Life launched. Sunlit zone.');
    logC('HELM','DIVE to descend. Harvest to evolve.');
    logC('BIO','Organisms grant powers. Click Arsenal.');
    renderP();renderSp();renderEvo();updUI();
  }

  // INPUT
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition,rec=null;
  if(SR){rec=new SR();rec.continuous=true;rec.interimResults=false;
    rec.onstart=function(){document.getElementById('mic').classList.add('rpulse');};
    rec.onend=function(){document.getElementById('mic').classList.remove('rpulse');};
    rec.onresult=function(e){var t=e.results[e.results.length-1][0].transcript.trim();logC('VOICE','"'+t+'"');parseCmd(t,'voice');};}
  document.getElementById('mic').onclick=function(){if(!rec)return logC('SONAR','No speech.');if(rec.state==='running')rec.stop();else try{rec.start();}catch(e){}};
  document.getElementById('sfx-btn').onclick=function(e){S.sfx=!S.sfx;e.currentTarget.style.background=S.sfx?'#1a6b6b':'#334';};
  document.getElementById('cmd').onkeypress=function(e){if(e.key!=='Enter')return;var v=e.target.value.trim();if(!v)return;initA();logC('CMD',v);e.target.value='';parseCmd(v,'text');};
  document.getElementById('diveBtn').onclick=function(){initA();S.tDepth=Math.min(MXD,S.depth+300);sfx('dive');logC('HELM','Diving to '+Math.floor(S.tDepth)+'m...');};
  document.getElementById('riseBtn').onclick=function(){initA();S.tDepth=Math.max(0,S.depth-300);sfx('rise');logC('HELM','Rising to '+Math.floor(S.tDepth)+'m...');};
  ctn.addEventListener('click',function(){initA();},{once:true});

  // LOOP
  var clock=new THREE.Clock();
  function loop(){
    requestAnimationFrame(loop);var dt=Math.min(clock.getDelta(),.1);S.t+=dt;
    if(S.comboT>0){S.comboT-=dt;if(S.comboT<=0)S.combo=0;}
    updDep(dt);evolveW(dt);autop(dt);updH(dt);updPt(dt);updBb(dt);updSon(dt);animE(dt);shk(dt);updAmb();
    var vs=valSp();
    if(S.ents.filter(function(e){return!e.col;}).length<20+S.dzi*5&&S.t>=S.nSpawn&&vs.length>0){
      spawnE(pk(vs));S.nSpawn=S.t+(.3/DZ[S.dzi].sr);if(Math.random()<.02)sfx('bubble');}
    var ct=new THREE.Vector3(ship.pos.x*.15,180,ship.pos.z*.15+240);
    cam.position.lerp(ct,.01);cam.lookAt(ship.pos.x*.3,20,ship.pos.z*.3);
    R.render(scene,cam);updUI();
  }
  window.onresize=function(){cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();R.setSize(innerWidth,innerHeight);};
  init();loop();
})();
</script>
</body>
</html>
