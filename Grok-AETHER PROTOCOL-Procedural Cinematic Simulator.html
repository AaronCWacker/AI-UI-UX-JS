<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHER PROTOCOL // Procedural Cinematic Simulator</title>
    <script src="https://unpkg.com/three@0.165.0/build/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        
        :root {
            --bg: #0a0c12;
            --accent: #4a9eff;
        }
        
        body {
            margin: 0;
            padding: 0;
            background: #0a0c12;
            color: #e0e7ff;
            font-family: 'Inter', system_ui, sans-serif;
            overflow: hidden;
            user-select: none;
        }
        
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        
        #c {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        
        .panel {
            background: rgba(10, 12, 18, 0.85);
            border: 1px solid rgba(74, 158, 255, 0.2);
            border-radius: 8px;
            padding: 12px 16px;
            backdrop-filter: blur(12px);
            pointer-events: auto;
        }
        
        .header {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 16px;
            z-index: 20;
        }
        
        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -1px;
            background: linear-gradient(90deg, #4a9eff, #a5c8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .mode-tabs {
            display: flex;
            background: rgba(10, 12, 18, 0.9);
            border-radius: 9999px;
            padding: 4px;
            border: 1px solid rgba(74, 158, 255, 0.15);
        }
        
        .mode-tab {
            padding: 8px 20px;
            border-radius: 9999px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.23, 1, 0.32, 1);
            white-space: nowrap;
        }
        
        .mode-tab.active {
            background: #4a9eff;
            color: #0a0c12;
            box-shadow: 0 0 0 1px rgba(74, 158, 255, 0.5);
        }
        
        .mode-tab:not(.active):hover {
            background: rgba(74, 158, 255, 0.1);
        }
        
        .controls {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 20;
        }
        
        button {
            background: rgba(20, 24, 36, 0.95);
            color: #e0e7ff;
            border: 1px solid rgba(74, 158, 255, 0.3);
            padding: 10px 18px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        button:hover {
            background: rgba(74, 158, 255, 0.15);
            border-color: #4a9eff;
            transform: translateY(-1px);
        }
        
        button.primary {
            background: #4a9eff;
            color: #0a0c12;
            border-color: #4a9eff;
            font-weight: 600;
        }
        
        button.primary:hover {
            background: #6bb0ff;
            transform: translateY(-1px);
        }
        
        .hud {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: flex-end;
            z-index: 20;
        }
        
        .hud-item {
            background: rgba(10, 12, 18, 0.75);
            border: 1px solid rgba(74, 158, 255, 0.15);
            padding: 6px 14px;
            border-radius: 4px;
            font-size: 12px;
            font-family: monospace;
            letter-spacing: 0.5px;
            min-width: 160px;
            text-align: right;
        }
        
        .status {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 2px;
        }
        
        .instructions {
            position: absolute;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 12, 18, 0.7);
            border: 1px solid rgba(74, 158, 255, 0.15);
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 12px;
            max-width: 420px;
            text-align: center;
            line-height: 1.4;
            z-index: 20;
            pointer-events: none;
        }
        
        . cinematic-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(to right, #4a9eff, #a5c8ff);
            z-index: 30;
            transition: width 0.1s linear;
        }
        
        .warning {
            animation: warning-pulse 0.8s infinite alternate;
        }
        
        @keyframes warning-pulse {
            from { opacity: 1; }
            to { opacity: 0.4; }
        }
        
        .info-text {
            font-size: 11px;
            opacity: 0.6;
            max-width: 280px;
            line-height: 1.3;
        }
        
        .webgpu-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 10px;
            padding: 2px 8px;
            background: rgba(74, 158, 255, 0.1);
            border: 1px solid rgba(74, 158, 255, 0.3);
            border-radius: 3px;
            color: #4a9eff;
            z-index: 20;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="c"></canvas>
        
        <!-- UI Overlay -->
        <div id="ui-overlay">
            <!-- Header -->
            <div class="header">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <div class="logo">AETHER</div>
                    <div style="font-size: 13px; opacity: 0.6; font-weight: 400; letter-spacing: 3px;">PROTOCOL</div>
                </div>
                
                <div class="mode-tabs">
                    <div id="tab-ring" class="mode-tab active" onclick="switchMode('ring')">RING WORLD</div>
                    <div id="tab-explorer" class="mode-tab" onclick="switchMode('explorer')">MEGASTRUCTURE</div>
                </div>
            </div>
            
            <!-- WebGPU note -->
            <div class="webgpu-badge">WebGL • WebGPU-ready architecture</div>
            
            <!-- HUD -->
            <div class="hud" id="hud">
                <div class="panel hud-item" id="hud-primary">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span id="hud-label">DISTANCE</span>
                        <span id="hud-value" style="font-weight: 600; color: #4a9eff;">1240</span>
                    </div>
                    <div class="status" id="hud-status">NOMINAL • 87% HULL</div>
                </div>
                
                <div class="panel hud-item" id="hud-secondary" style="font-size: 11px; opacity: 0.85;">
                    <div id="hud-extra">THRUST 68% • INERTIA DAMPENED</div>
                </div>
            </div>
            
            <!-- Instructions -->
            <div class="instructions panel" id="instructions">
                <div id="inst-text">WASD / Arrows — Fly &amp; Strafe &nbsp;&nbsp; MOUSE — Look &amp; Steer &nbsp;&nbsp; SPACE — Boost</div>
            </div>
            
            <!-- Controls -->
            <div class="controls">
                <button onclick="playCinematic()">▶ PLAY CINEMATIC SEQUENCE</button>
                <button onclick="regenerateEnvironment()">⟳ REGENERATE PROCEDURAL</button>
                <button onclick="resetPlayer()" class="primary">RESET SIM</button>
            </div>
            
            <!-- Cinematic progress bar -->
            <div id="cinematic-progress" style="position: absolute; bottom: 0; left: 0; width: 0%; height: 3px; background: linear-gradient(to right, #4a9eff, #a5c8ff); z-index: 30; transition: width 0.05s linear; display: none;"></div>
        </div>
    </div>

    <script>
        // ============================================
        // AETHER PROTOCOL - Procedural Cinematic Sci-Fi Simulator
        // WebGPU-ready Three.js architecture (WebGL renderer for compatibility)
        // Combines two ultra-cinematic hard sci-fi sequences into an interactive game
        // ============================================
        
        let scene, camera, renderer;
        let clock = new THREE.Clock();
        let currentMode = 'ring';
        let isCinematicPlaying = false;
        let cinematicTime = 0;
        let currentSeed = 48291;
        
        // Player objects
        let ship, explorer;
        let shipVelocity = new THREE.Vector3();
        let shipAngularVel = new THREE.Vector3();
        
        // Environment groups
        let ringGroup, explorerGroup;
        let obstacles = [];
        let floorPanels = [];
        let debris = [];
        let gears = [];
        let gateGroup;
        
        // Input state
        const keys = {};
        let mouseX = 0, mouseY = 0;
        let isMouseDown = false;
        let pointerLocked = false;
        
        // Game state
        let playerProgress = 0; // 0-1 normalized progress through sequence
        let hullIntegrity = 100;
        let sequencePhase = 0;
        
        // Seeded random
        function seededRandom(seed) {
            let s = seed >>> 0;
            return function() {
                s = (s * 16807) % 2147483647;
                return (s - 1) / 2147483646;
            };
        }
        
        let rand = seededRandom(currentSeed);
        
        function init() {
            const canvas = document.getElementById('c');
            
            // Renderer - WebGL (WebGPU path available via three/addons/renderers/webgpu)
            renderer = new THREE.WebGLRenderer({ 
                canvas: canvas, 
                antialias: true, 
                powerPreference: "high-performance",
                alpha: false,
                stencil: false
            });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            
            // Scene
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x05070f, 80, 1800);
            
            // Camera
            camera = new THREE.PerspectiveCamera(52, window.innerWidth / window.innerHeight, 0.5, 5000);
            camera.position.set(0, 35, -120);
            
            // Lights - cinematic hard sci-fi palette
            setupLighting();
            
            // Starfield (shared)
            createStarfield();
            
            // Initial mode
            switchMode('ring', true);
            
            // Input listeners
            setupInput();
            
            // Handle resize
            window.addEventListener('resize', onResize);
            
            // Start loop
            animate();
            
            // Boot message
            setTimeout(() => {
                updateHUD();
            }, 300);
        }
        
        function setupLighting() {
            // Deep space ambient
            const ambient = new THREE.AmbientLight(0x111522, 0.35);
            scene.add(ambient);
            
            // Subtle warm sunlight (anamorphic feel)
            const sun = new THREE.DirectionalLight(0xfff8e8, 0.9);
            sun.position.set(120, 280, -180);
            sun.castShadow = true;
            sun.shadow.mapSize.width = 1024;
            sun.shadow.mapSize.height = 1024;
            sun.shadow.camera.near = 50;
            sun.shadow.camera.far = 800;
            sun.shadow.camera.left = -300;
            sun.shadow.camera.right = 300;
            sun.shadow.camera.top = 200;
            sun.shadow.camera.bottom = -200;
            scene.add(sun);
            
            // Cool rim / fill lights (muted blue-white)
            const rim1 = new THREE.DirectionalLight(0x88aaff, 0.25);
            rim1.position.set(-180, 60, 120);
            scene.add(rim1);
            
            const rim2 = new THREE.DirectionalLight(0x4466aa, 0.15);
            rim2.position.set(80, -40, -200);
            scene.add(rim2);
            
            // Accent point lights for machinery/panels
            const accent1 = new THREE.PointLight(0x4a9eff, 0.6, 120);
            accent1.position.set(40, 25, 60);
            scene.add(accent1);
        }
        
        function createStarfield() {
            const starCount = 2800;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(starCount * 3);
            const colors = new Float32Array(starCount * 3);
            const sizes = new Float32Array(starCount);
            
            const color = new THREE.Color();
            
            for (let i = 0; i < starCount; i++) {
                // Spherical distribution for deep space
                const radius = 1200 + Math.random() * 2400;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                
                positions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
                positions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                positions[i * 3 + 2] = radius * Math.cos(phi);
                
                // Subtle color variation (cool whites + faint blue)
                const t = Math.random();
                if (t > 0.92) {
                    color.setHex(0xaaccff);
                } else if (t > 0.7) {
                    color.setHex(0xccddee);
                } else {
                    color.setHex(0xffffff);
                }
                colors[i * 3] = color.r;
                colors[i * 3 + 1] = color.g;
                colors[i * 3 + 2] = color.b;
                
                sizes[i] = Math.random() * 1.8 + 0.6;
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            
            const material = new THREE.PointsMaterial({
                size: 1.2,
                vertexColors: true,
                transparent: true,
                opacity: 0.95,
                depthWrite: false,
                blending: THREE.AdditiveBlending
            });
            
            const stars = new THREE.Points(geometry, material);
            scene.add(stars);
        }
        
        // ============================================
        // RING WORLD MODE (Colossal rotating ring + interceptor)
        // ============================================
        function createRingWorld(seed) {
            if (ringGroup) {
                scene.remove(ringGroup);
                obstacles = [];
                gears = [];
            }
            
            ringGroup = new THREE.Group();
            scene.add(ringGroup);
            
            rand = seededRandom(seed);
            
            const RING_RADIUS = 380;
            const RING_LENGTH = 2600;
            
            // Main inner surface - colossal rotating ring (BackSide so we see inside)
            const ringMat = new THREE.MeshStandardMaterial({
                color: 0x1a1f2e,
                metalness: 0.92,
                roughness: 0.55,
                envMapIntensity: 0.4,
                side: THREE.BackSide
            });
            
            const ringGeo = new THREE.CylinderGeometry(RING_RADIUS, RING_RADIUS, RING_LENGTH, 92, 1, true);
            const ringMesh = new THREE.Mesh(ringGeo, ringMat);
            ringMesh.rotation.x = Math.PI / 2; // Orient cylinder along Z (flight axis)
            ringMesh.castShadow = true;
            ringMesh.receiveShadow = true;
            ringGroup.add(ringMesh);
            
            // Structural mega-ribs (immense curved architecture)
            const ribMat = new THREE.MeshStandardMaterial({
                color: 0x2a2f3e,
                metalness: 0.85,
                roughness: 0.4
            });
            
            const numRibs = 11;
            for (let i = 0; i < numRibs; i++) {
                const z = -RING_LENGTH / 2 + (i / (numRibs - 1)) * RING_LENGTH;
                const rib = new THREE.Mesh(
                    new THREE.BoxGeometry(14, 28, 6),
                    ribMat
                );
                // Position on inner surface (approximate)
                const angle = (i % 3) * 1.8;
                rib.position.set(
                    Math.cos(angle) * (RING_RADIUS - 18),
                    Math.sin(angle) * (RING_RADIUS - 18) * 0.6,
                    z
                );
                rib.rotation.z = angle + 1.2;
                ringGroup.add(rib);
                
                // Extra structural detail
                if (i % 2 === 0) {
                    const brace = new THREE.Mesh(
                        new THREE.BoxGeometry(6, 12, 3),
                        ribMat
                    );
                    brace.position.copy(rib.position);
                    brace.position.y += 45;
                    brace.rotation.copy(rib.rotation);
                    ringGroup.add(brace);
                }
            }
            
            // Procedural mechanical continents / habitat clusters on "floor"
            const floorMat = new THREE.MeshStandardMaterial({
                color: 0x252a38,
                metalness: 0.7,
                roughness: 0.65
            });
            
            const numBuildings = 38;
            for (let i = 0; i < numBuildings; i++) {
                const z = -RING_LENGTH / 2 + rand() * RING_LENGTH * 0.95;
                const angle = (rand() - 0.5) * 1.6; // mostly on bottom half
                
                const bWidth = 8 + rand() * 22;
                const bHeight = 6 + rand() * 38;
                const bDepth = 9 + rand() * 14;
                
                const building = new THREE.Mesh(
                    new THREE.BoxGeometry(bWidth, bHeight, bDepth),
                    floorMat
                );
                
                const r = RING_RADIUS - 22 - (rand() * 8);
                building.position.set(
                    Math.cos(angle) * r,
                    Math.sin(angle) * r * 0.75 - 12,
                    z
                );
                building.rotation.y = angle + (rand() - 0.5) * 0.6;
                building.castShadow = true;
                building.receiveShadow = true;
                ringGroup.add(building);
                
                // Add some glowing "city lights" / windows
                if (rand() > 0.6) {
                    const light = new THREE.PointLight(0xffcc77, 0.35, 28);
                    light.position.copy(building.position);
                    light.position.y += bHeight * 0.4;
                    ringGroup.add(light);
                }
            }
            
            // Animated gears / machinery (tactile heavy industrial)
            gears = [];
            const gearMat = new THREE.MeshStandardMaterial({
                color: 0x3a3f4e,
                metalness: 0.95,
                roughness: 0.25
            });
            
            const numGears = 5;
            for (let i = 0; i < numGears; i++) {
                const g = createGear(18 + rand() * 11, gearMat, rand);
                const zPos = -RING_LENGTH / 2 + 280 + i * 420 + (rand() - 0.5) * 80;
                const angle = 1.8 + (i % 2) * 2.4;
                
                g.position.set(
                    Math.cos(angle) * (RING_RADIUS - 55),
                    Math.sin(angle) * (RING_RADIUS - 55) * 0.8,
                    zPos
                );
                g.userData = { 
                    baseAngle: angle, 
                    rotSpeed: 0.4 + rand() * 0.7,
                    phase: rand() * Math.PI * 2
                };
                ringGroup.add(g);
                gears.push(g);
            }
            
            // Create the interceptor fighter
            if (ship) scene.remove(ship);
            ship = createInterceptorFighter();
            ship.position.set(12, -18, -80);
            scene.add(ship);
            
            // Initial velocity
            shipVelocity.set(0, 0, 38);
            shipAngularVel.set(0, 0, 0);
            
            // Add some floating procedural debris
            createFloatingDebris(ringGroup, 26, rand);
            
            // Initial camera
            camera.position.set(28, 42, -145);
            camera.lookAt(8, -12, 40);
            
            playerProgress = 0;
            hullIntegrity = 100;
            obstacles = [];
            
            // Create timed cinematic obstacles / collapsing machinery
            createCinematicObstacles(RING_RADIUS, RING_LENGTH);
            
            updateHUD();
        }
        
        function createGear(radius, mat, randFn) {
            const group = new THREE.Group();
            
            // Core
            const core = new THREE.Mesh(
                new THREE.CylinderGeometry(radius * 0.35, radius * 0.35, 7, 28),
                mat
            );
            core.rotation.x = Math.PI / 2;
            group.add(core);
            
            // Teeth
            const teethCount = 11;
            for (let t = 0; t < teethCount; t++) {
                const tooth = new THREE.Mesh(
                    new THREE.BoxGeometry(4.5, 7.5, radius * 0.38),
                    mat
                );
                const a = (t / teethCount) * Math.PI * 2;
                tooth.position.set(Math.cos(a) * radius * 0.72, 0, Math.sin(a) * radius * 0.72);
                tooth.rotation.y = a;
                group.add(tooth);
            }
            
            // Inner detail ring
            const inner = new THREE.Mesh(
                new THREE.TorusGeometry(radius * 0.55, 1.8, 8, 24),
                new THREE.MeshStandardMaterial({ color: 0x4a4f5e, metalness: 0.8, roughness: 0.3 })
            );
            inner.rotation.x = Math.PI / 2;
            group.add(inner);
            
            return group;
        }
        
        function createInterceptorFighter() {
            const group = new THREE.Group();
            
            // Fuselage - sleek compact interceptor
            const fuselageMat = new THREE.MeshStandardMaterial({
                color: 0x2c313f,
                metalness: 0.95,
                roughness: 0.25
            });
            
            const fuselage = new THREE.Mesh(
                new THREE.CylinderGeometry(1.8, 2.4, 13, 7, 1, false),
                fuselageMat
            );
            fuselage.rotation.x = Math.PI / 2;
            group.add(fuselage);
            
            // Cockpit canopy (dark reflective)
            const canopy = new THREE.Mesh(
                new THREE.SphereGeometry(2.1, 12, 8, 0, Math.PI * 2, 0, 1.3),
                new THREE.MeshStandardMaterial({
                    color: 0x11151f,
                    metalness: 0.3,
                    roughness: 0.1,
                    envMapIntensity: 0.8
                })
            );
            canopy.position.set(0, 0, -1.5);
            canopy.scale.set(1, 0.65, 1);
            group.add(canopy);
            
            // Wings - delta style compact
            const wingMat = new THREE.MeshStandardMaterial({
                color: 0x252a38,
                metalness: 0.9,
                roughness: 0.35
            });
            
            const leftWing = new THREE.Mesh(
                new THREE.BoxGeometry(11, 0.6, 5.5),
                wingMat
            );
            leftWing.position.set(-5.5, 0, 1);
            leftWing.rotation.z = 0.18;
            group.add(leftWing);
            
            const rightWing = leftWing.clone();
            rightWing.position.x = 5.5;
            rightWing.rotation.z = -0.18;
            group.add(rightWing);
            
            // Engine nacelles + glow
            const engineMat = new THREE.MeshStandardMaterial({
                color: 0x1a1f2e,
                metalness: 0.98,
                roughness: 0.2
            });
            
            const leftEngine = new THREE.Mesh(
                new THREE.CylinderGeometry(1.1, 1.4, 5.5, 6),
                engineMat
            );
            leftEngine.rotation.x = Math.PI / 2;
            leftEngine.position.set(-3.8, -0.8, 5.5);
            group.add(leftEngine);
            
            const rightEngine = leftEngine.clone();
            rightEngine.position.x = 3.8;
            group.add(rightEngine);
            
            // Engine glow (blue-white)
            const glowMat = new THREE.MeshBasicMaterial({
                color: 0x88ccff,
                transparent: true,
                opacity: 0.85,
                blending: THREE.AdditiveBlending
            });
            
            const leftGlow = new THREE.Mesh(
                new THREE.CylinderGeometry(0.7, 0.9, 1.2, 8),
                glowMat
            );
            leftGlow.rotation.x = Math.PI / 2;
            leftGlow.position.set(-3.8, -0.8, 8.3);
            group.add(leftGlow);
            
            const rightGlow = leftGlow.clone();
            rightGlow.position.x = 3.8;
            group.add(rightGlow);
            
            // Subtle engine light
            const engineLight = new THREE.PointLight(0x88ccff, 0.7, 35);
            engineLight.position.set(0, -0.8, 9);
            group.add(engineLight);
            
            // Small detail fins
            const fin = new THREE.Mesh(
                new THREE.BoxGeometry(0.4, 3.2, 1.8),
                wingMat
            );
            fin.position.set(0, 2.8, -2);
            group.add(fin);
            
            group.userData = { engineGlows: [leftGlow, rightGlow] };
            
            return group;
        }
        
        function createFloatingDebris(parent, count, randFn) {
            const debrisMat = new THREE.MeshStandardMaterial({
                color: 0x3a3f4e,
                metalness: 0.6,
                roughness: 0.7
            });
            
            for (let i = 0; i < count; i++) {
                const size = 0.8 + randFn() * 3.2;
                let mesh;
                
                if (randFn() > 0.6) {

        function setupInput() {
            document.addEventListener('keydown', (e) => {
                keys[e.key.toLowerCase()] = true;
                keys[e.code] = true;
                
                if (e.key.toLowerCase() === 'e' && currentMode === 'explorer') {
                    tryInteractGate();
                }
                
                if (e.key === ' ' && currentMode === 'ring') {
                    // Boost handled in update
                }
                
                if (e.key.toLowerCase() === 'c') {
                    playCinematic();
                }
                
                if (e.key.toLowerCase() === 'r') {
                    regenerateEnvironment();
                }
            });
            
            document.addEventListener('keyup', (e) => {
                keys[e.key.toLowerCase()] = false;
                keys[e.code] = false;
            });
            
            const canvas = document.getElementById('c');
            
            canvas.addEventListener('mousedown', (e) => {
                isMouseDown = true;
                if (!pointerLocked) {
                    canvas.requestPointerLock();
                }
            });
            
            canvas.addEventListener('mouseup', () => {
                isMouseDown = false;
            });
            
            document.addEventListener('pointerlockchange', () => {
                pointerLocked = document.pointerLockElement === canvas;
            });
            
            canvas.addEventListener('mousemove', (e) => {
                if (pointerLocked || isMouseDown) {
                    mouseX += e.movementX || 0;
                    mouseY += e.movementY || 0;
                }
            });
            
            // Touch support for mobile (basic)
            canvas.addEventListener('touchstart', (e) => {
                isMouseDown = true;
                if (e.touches.length === 1) {
                    mouseX = e.touches[0].clientX;
                    mouseY = e.touches[0].clientY;
                }
            });
            
            canvas.addEventListener('touchend', () => {
                isMouseDown = false;
            });
            
            canvas.addEventListener('touchmove', (e) => {
                if (isMouseDown && e.touches.length === 1) {
                    const dx = e.touches[0].clientX - mouseX;
                    const dy = e.touches[0].clientY - mouseY;
                    mouseX = e.touches[0].clientX;
                    mouseY = e.touches[0].clientY;
                    
                    // Apply as look input
                    if (currentMode === 'ring' && ship) {
                        ship.rotation.y -= dx * 0.0022;
                        ship.rotation.x -= dy * 0.0022;
                    }
                }
            });
            
            // Prevent context menu
            canvas.addEventListener('contextmenu', (e) => e.preventDefault());
        }
        
        function updatePlayerControls(delta) {
            if (isCinematicPlaying) return; // Cinematic takes full control
            
            const moveSpeed = 42;
            const rotSpeed = 1.6;
            const thrust = 68;
            
            if (currentMode === 'ring' && ship) {
                // Flight simulator style controls
                let forward = 0, strafeX = 0, strafeY = 0;
                let pitch = 0, yaw = 0, roll = 0;
                
                // Keyboard
                if (keys['w'] || keys['arrowup']) forward = 1;
                if (keys['s'] || keys['arrowdown']) forward = -0.6;
                if (keys['a'] || keys['arrowleft']) strafeX = -1;
                if (keys['d'] || keys['arrowright']) strafeX = 1;
                if (keys['q']) strafeY = 1;
                if (keys['e']) strafeY = -1;
                if (keys[' ']) forward = 2.2; // boost
                
                // Mouse look (yaw/pitch)
                if (Math.abs(mouseX) > 0.1 || Math.abs(mouseY) > 0.1) {
                    yaw = -mouseX * 0.0008 * rotSpeed;
                    pitch = -mouseY * 0.0008 * rotSpeed;
                    mouseX *= 0.6; // decay
                    mouseY *= 0.6;
                }
                
                // Apply rotation with inertia
                shipAngularVel.y = THREE.MathUtils.lerp(shipAngularVel.y, yaw, 0.25);
                shipAngularVel.x = THREE.MathUtils.lerp(shipAngularVel.x, pitch, 0.22);
                
                ship.rotation.y += shipAngularVel.y * delta;
                ship.rotation.x += shipAngularVel.x * delta;
                ship.rotation.z += roll * delta * 0.6;
                
                // Damp angular
                shipAngularVel.multiplyScalar(0.86);
                
                // Local space acceleration
                const localAccel = new THREE.Vector3(strafeX * 14, strafeY * 11, -forward * thrust);
                
                // Rotate accel to world using ship orientation
                const worldAccel = localAccel.clone().applyQuaternion(ship.quaternion);
                
                shipVelocity.add(worldAccel.multiplyScalar(delta * 0.9));
                
                // Drag + inertia feel
                shipVelocity.multiplyScalar(0.982 - (forward > 1.5 ? 0.006 : 0));
                
                // Clamp max speed
                if (shipVelocity.length() > 95) {
                    shipVelocity.normalize().multiplyScalar(95);
                }
                
                // Apply movement
                ship.position.add(shipVelocity.clone().multiplyScalar(delta));
                
                // Subtle cockpit vibration at high speed
                if (shipVelocity.length() > 48) {
                    const vib = Math.sin(clock.elapsedTime * 38) * 0.035 * (shipVelocity.length() / 95);
                    ship.position.y += vib;
                    ship.rotation.z += vib * 0.6;
                }
                
                // Update engine glow intensity
                if (ship.userData.engineGlows) {
                    const intensity = 0.6 + forward * 0.35;
                    ship.userData.engineGlows.forEach(g => {
                        g.material.opacity = Math.max(0.4, Math.min(1, intensity));
                    });
                }
                
                // Progress tracking
                playerProgress = THREE.MathUtils.clamp((ship.position.z + 120) / 2400, 0, 1);
                
                // Collision check with obstacles
                checkCollisions();
                
                // Keep inside ring bounds (soft walls)
                const ringR = 355;
                const distFromCenter = Math.sqrt(ship.position.x * ship.position.x + ship.position.y * ship.position.y);
                if (distFromCenter > ringR) {
                    const dir = new THREE.Vector2(ship.position.x, ship.position.y).normalize();
                    ship.position.x = dir.x * ringR;
                    ship.position.y = dir.y * ringR;
                    shipVelocity.x *= -0.4;
                    shipVelocity.y *= -0.4;
                    hullIntegrity = Math.max(8, hullIntegrity - 1.5);
                }
                
                // Update HUD
                if (Math.random() < 0.08) updateHUD();
                
            } else if (currentMode === 'explorer' && explorer) {
                // Slow deliberate walk controls
                let moveX = 0, moveZ = 0;
                
                if (keys['w'] || keys['arrowup']) moveZ = -1;
                if (keys['s'] || keys['arrowdown']) moveZ = 1;
                if (keys['a'] || keys['arrowleft']) moveX = -1;
                if (keys['d'] || keys['arrowright']) moveX = 1;
                
                const speed = 18;
                explorer.position.x += moveX * speed * delta;
                explorer.position.z += moveZ * speed * delta;
                
                // Gentle walk animation
                const walkPhase = clock.elapsedTime * 3.2;
                if (explorer.userData.legs) {
                    explorer.userData.legs[0].rotation.x = Math.sin(walkPhase) * 0.35 + 0.15;
                    explorer.userData.legs[1].rotation.x = Math.sin(walkPhase + Math.PI) * 0.35 + 0.15;
                }
                
                // Cape sway
                if (explorer.userData.cape) {
                    explorer.userData.cape.rotation.y = Math.sin(walkPhase * 0.6) * 0.08;
                }
                
                // Camera follow (cinematic third person)
                const targetCamPos = explorer.position.clone().add(new THREE.Vector3(18, 32, 52));
                camera.position.lerp(targetCamPos, 0.035);
                camera.lookAt(explorer.position.x * 0.6, explorer.position.y + 18, explorer.position.z + 40);
                
                // Progress
                playerProgress = THREE.MathUtils.clamp((explorer.position.z + 180) / 720, 0, 1);
                
                // Light up floor panels as we walk
                updateFloorPanels();
                
                updateHUD();
            }
        }
        
        function checkCollisions() {
            if (!ship || !ringGroup) return;
            
            const shipBox = new THREE.Box3().setFromObject(ship);
            let hit = false;
            
            obstacles.forEach(obs => {
                if (!obs.parent) return;
                
                if (obs.userData.type === 'sweep' && obs.userData.active) {
                    const obsBox = new THREE.Box3().setFromObject(obs);
                    if (shipBox.intersectsBox(obsBox)) {
                        hit = true;
                        // Repel
                        shipVelocity.x += (ship.position.x > 0 ? -38 : 38);
                        shipVelocity.z *= 0.3;
                    }
                }
                
                if (obs.userData.type === 'bulkhead' && obs.userData.active) {
                    const obsBox = new THREE.Box3().setFromObject(obs);
                    if (shipBox.intersectsBox(obsBox)) {
                        hit = true;
                        shipVelocity.z = Math.max(shipVelocity.z * 0.1, 8);
                    }
                }
                
                if (obs.userData.type === 'collapse') {
                    const obsBox = new THREE.Box3().setFromObject(obs);
                    if (shipBox.intersectsBox(obsBox)) {
                        hit = true;
                        shipVelocity.multiplyScalar(0.2);
                    }
                }
            });
            
            if (hit) {
                hullIntegrity = Math.max(0, hullIntegrity - 7);
                // Screen shake effect
                camera.position.x += (Math.random() - 0.5) * 2.8;
                camera.position.y += (Math.random() - 0.5) * 1.6;
                
                if (hullIntegrity < 25) {
                    document.getElementById('hud-status').innerHTML = 'CRITICAL • HULL BREACH';
                    document.getElementById('hud-status').classList.add('warning');
                }
            }
        }
        
        function updateFloorPanels() {
            if (!explorer || floorPanels.length === 0) return;
            
            floorPanels.forEach((panel, idx) => {
                const dist = explorer.position.distanceTo(panel.position);
                const shouldLight = dist < 68 || (playerProgress > idx / floorPanels.length * 0.92);
                
                if (shouldLight && !panel.userData.lit) {
                    panel.userData.lit = true;
                    panel.material.emissive.setHex(0x224466);
                    panel.material.color.setHex(0x1a2233);
                    
                    // Soft pulse
                    setTimeout(() => {
                        if (panel && panel.material) {
                            panel.material.emissive.setHex(0x113355);
                        }
                    }, 420);
                }
            });
        }
        
        function tryInteractGate() {
            if (!explorer || !gateGroup || gateGroup.userData.opened) return;
            
            const dist = explorer.position.distanceTo(gateGroup.position);
            
            if (dist < 95) {
                // Raise arm animation
                if (explorer.userData.rightArm) {
                    explorer.userData.rightArm.rotation.z = -1.8;
                    explorer.userData.rightArm.position.y = 11;
                }
                
                // Trigger star map hologram
                createStarMapHologram(gateGroup.position);
                
                // Open the gate after short delay
                setTimeout(() => {
                    openGate();
                }, 850);
                
                // Update status
                document.getElementById('hud-status').innerHTML = 'GATE ACTIVATED • STAR MAP ONLINE';
            } else {
                document.getElementById('hud-status').innerHTML = 'APPROACH CLOSER TO INTERFACE';
                setTimeout(() => {
                    if (document.getElementById('hud-status'))
                        document.getElementById('hud-status').innerHTML = 'NOMINAL • SUIT INTEGRITY 100%';
                }, 1400);
            }
        }
        
        function createStarMapHologram(origin) {
            const particleCount = 420;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);
            const sizes = new Float32Array(particleCount);
            
            const color = new THREE.Color();
            
            for (let i = 0; i < particleCount; i++) {
                // Spherical distribution forming a "galactic" map
                const r = 18 + Math.random() * 52;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                
                // Target position (final star map)
                positions[i * 3] = origin.x + r * Math.sin(phi) * Math.cos(theta) * 0.6;
                positions[i * 3 + 1] = origin.y + 12 + r * Math.sin(phi) * Math.sin(theta) * 0.5 + (Math.random() - 0.5) * 18;
                positions[i * 3 + 2] = origin.z + r * Math.cos(phi) * 0.6 - 12;
                
                // Initial spread (will animate from random)
                const spread = 38;
                positions[i * 3] += (Math.random() - 0.5) * spread;
                positions[i * 3 + 1] += (Math.random() - 0.5) * spread * 0.6;
                positions[i * 3 + 2] += (Math.random() - 0.5) * spread;
                
                color.setHSL(0.58 + Math.random() * 0.12, 0.7, 0.65 + Math.random() * 0.3);
                colors[i * 3] = color.r;
                colors[i * 3 + 1] = color.g;
                colors[i * 3 + 2] = color.b;
                
                sizes[i] = 1.2 + Math.random() * 2.6;
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            
            const mat = new THREE.PointsMaterial({
                size: 2.4,
                vertexColors: true,
                transparent: true,
                opacity: 0.9,
                depthWrite: false,
                blending: THREE.AdditiveBlending
            });
            
            const hologram = new THREE.Points(geometry, mat);
            scene.add(hologram);
            
            // Animate formation
            let t = 0;
            const interval = setInterval(() => {
                t += 0.035;
                const posAttr = hologram.geometry.attributes.position;
                
                for (let i = 0; i < particleCount; i++) {
                    const targetX = origin.x + (posAttr.array[i * 3] - origin.x) * 0.4;
                    const targetY = origin.y + 12 + (posAttr.array[i * 3 + 1] - origin.y - 12) * 0.4;
                    const targetZ = origin.z - 12 + (posAttr.array[i * 3 + 2] - origin.z + 12) * 0.4;
                    
                    posAttr.array[i * 3] = THREE.MathUtils.lerp(posAttr.array[i * 3], targetX, t);
                    posAttr.array[i * 3 + 1] = THREE.MathUtils.lerp(posAttr.array[i * 3 + 1], targetY, t);
                    posAttr.array[i * 3 + 2] = THREE.MathUtils.lerp(posAttr.array[i * 3 + 2], targetZ, t);
                }
                posAttr.needsUpdate = true;
                
                if (t > 1.05) {
                    clearInterval(interval);
                    // Fade out after viewing
                    setTimeout(() => {
                        if (hologram.parent) {
                            const fade = setInterval(() => {
                                hologram.material.opacity *= 0.82;
                                if (hologram.material.opacity < 0.05) {
                                    clearInterval(fade);
                                    scene.remove(hologram);
                                }
                            }, 60);
                        }
                    }, 5200);
                }
            }, 40);
        }
        
        function openGate() {
            if (!gateGroup || gateGroup.userData.opened) return;
            
            gateGroup.userData.opened = true;
            const field = gateGroup.userData.field;
            
            // Brighten and "open" the horizon
            if (field && field.material) {
                field.material.color.setHex(0xaaddff);
                field.material.opacity = 0.15;
            }
            
            // Animate inner rings opening
            gateGroup.children.forEach((child, idx) => {
                if (child.userData && child.userData.baseRadius) {
                    const targetScale = 1.0 + idx * 0.18;
                    const startZ = child.position.z;
                    
                    let progress = 0;
                    const anim = setInterval(() => {
                        progress += 0.065;
                        if (child.scale) {
                            child.scale.setScalar(THREE.MathUtils.lerp(1, targetScale, progress));
                        }
                        child.position.z = THREE.MathUtils.lerp(startZ, startZ - 8 - idx * 3, progress);
                        
                        if (progress >= 1) {
                            clearInterval(anim);
                        }
                    }, 32);
                }
            });
            
            // Hero wide shot effect - bright blue-white horizon
            const horizonLight = new THREE.PointLight(0xaaddff, 1.8, 420);
            horizonLight.position.copy(gateGroup.position);
            horizonLight.position.z += 45;
            scene.add(horizonLight);
            
            setTimeout(() => {
                if (horizonLight.parent) scene.remove(horizonLight);
            }, 4200);
            
            // Update HUD
            document.getElementById('hud-status').innerHTML = 'GATE OPEN • HORIZON CLEAR';
            document.getElementById('hud-status').style.color = '#a5c8ff';
            
            // After opening, offer transition to ring world (narrative tie-in)
            setTimeout(() => {
                if (currentMode === 'explorer' && gateGroup.userData.opened) {
                    const inst = document.getElementById('inst-text');
                    if (inst) inst.innerHTML = 'GATE STABILIZED — PRESS <b>C</b> TO ENTER RING WORLD SEQUENCE';
                }
            }, 1800);
        }
        
        // ============================================
        // CINEMATIC SEQUENCER (matches the exact 0-15s descriptions)
        // ============================================
        function playCinematic() {
            if (isCinematicPlaying) return;
            
            isCinematicPlaying = true;
            cinematicTime = 0;
            sequencePhase = 0;
            
            const progressBar = document.getElementById('cinematic-progress');
            progressBar.style.display = 'block';
            progressBar.style.width = '0%';
            
            // Hide instructions during cinematic
            document.getElementById('instructions').style.opacity = '0.3';
            
            // Reset player position for sequence
            if (currentMode === 'ring' && ship) {
                ship.position.set(8, -22, -95);
                ship.rotation.set(0.12, 0.08, 0);
                shipVelocity.set(0, 0, 42);
            } else if (currentMode === 'explorer' && explorer) {
                explorer.position.set(6, 11, -155);
                if (explorer.userData.rightArm) explorer.userData.rightArm.rotation.z = -0.6;
            }
            
            // Run the 15-second cinematic loop
            const cinematicInterval = setInterval(() => {
                cinematicTime += 0.032;
                const t = cinematicTime / 15; // 0 to 1
                
                progressBar.style.width = Math.min(t * 100, 100) + '%';
                
                if (currentMode === 'ring') {
                    updateRingCinematic(t);
                } else {
                    updateExplorerCinematic(t);
                }
                
                if (cinematicTime >= 15) {
                    clearInterval(cinematicInterval);
                    isCinematicPlaying = false;
                    progressBar.style.display = 'none';
                    document.getElementById('instructions').style.opacity = '1';
                    
                    // Return some control
                    if (currentMode === 'ring' && ship) {
                        shipVelocity.z = 32;
                    }
                    
                    setTimeout(() => {
                        if (document.getElementById('hud-status'))
                            document.getElementById('hud-status').innerHTML = 'SEQUENCE COMPLETE • SIM MODE ACTIVE';
                    }, 800);
                }
            }, 32);
        }
        
        function updateRingCinematic(t) {
            if (!ship || !ringGroup) return;
            
            // Phase timing matches the prompt exactly
            // 0-4s: Establishing ultra-wide shot, ship tiny against immense ring
            if (t < 0.27) {
                // Camera starts wide trailing
                const camX = 85 + Math.sin(t * 8) * 12;
                const camY = 95 + Math.cos(t * 3) * 18;
                camera.position.lerp(new THREE.Vector3(camX, camY, -280 + t * 420), 0.04);
                camera.lookAt(ship.position.x * 0.3, ship.position.y - 30, ship.position.z + 180);
                
                // Ship slowly pulled forward
                ship.position.z = THREE.MathUtils.lerp(-95, 180, t / 0.27);
                ship.position.x = Math.sin(t * 4) * 18;
                ship.rotation.y = Math.sin(t * 3) * 0.25;
                
            } 
            // 4-9s: Rear tracking shot, plunges into internal machinery
            else if (t < 0.6) {
                const localT = (t - 0.27) / 0.33;
                
                // Rear tracking locked behind fighter
                const camOffset = new THREE.Vector3(14, 22, -68);
                const camPos = ship.position.clone().add(camOffset.applyQuaternion(ship.quaternion));
                camera.position.lerp(camPos, 0.12);
                camera.lookAt(ship.position.x, ship.position.y + 4, ship.position.z + 55);
                
                // Ship threads through
                ship.position.z = 180 + localT * 520;
                ship.position.y = -18 + Math.sin(localT * 6) * 14;
                ship.rotation.x = Math.sin(localT * 5) * 0.18;
                
                // Activate first gear sweep if not active
                obstacles.forEach(o => {
                    if (o.userData.type === 'sweep' && !o.userData.active && ship.position.z > o.userData.triggerZ - 60) {
                        o.userData.active = true;
                    }
                });
                
            } 
            // 9-13s: Intense chase through collapsing corridor
            else if (t < 0.87) {
                const localT = (t - 0.6) / 0.27;
                
                // Shaking chase cam
                const shake = (Math.sin(cinematicTime * 42) * 1.8 + Math.sin(cinematicTime * 27) * 1.1) * (localT * 0.7 + 0.3);
                camera.position.x = ship.position.x * 0.6 + 22 + (Math.random() - 0.5) * shake * 0.8;
                camera.position.y = ship.position.y + 28 + (Math.random() - 0.5) * shake * 0.5;
                camera.position.z = ship.position.z - 52;
                camera.lookAt(ship.position.x * 0.4, ship.position.y + 6, ship.position.z + 38);
                
                ship.position.z = 700 + localT * 580;
                ship.position.x = Math.sin(localT * 7 + 1) * (38 - localT * 12);
                ship.position.y = -22 + Math.cos(localT * 5) * 16;
                
                // Activate bulkhead
                obstacles.forEach(o => {
                    if (o.userData.type === 'bulkhead' && !o.userData.active && ship.position.z > o.userData.triggerZ - 40) {
                        o.userData.active = true;
                    }
                });
                
                // Animate bulkhead closing
                obstacles.forEach(o => {
                    if (o.userData.type === 'bulkhead' && o.userData.active) {
                        o.userData.closeAmount = Math.min(1, o.userData.closeAmount + 0.018);
                        const amt = o.userData.closeAmount * 72;
                        if (o.children[0]) o.children[0].position.x = -95 + amt * 0.6;
                        if (o.children[1]) o.children[1].position.x = 95 - amt * 0.6;
                    }
                });
                
            } 
            // 13-15s: Final escape hero shot
            else {
                const localT = (t - 0.87) / 0.13;
                
                // Hero wide shot - ship shoots through vanishing gap
                camera.position.lerp(new THREE.Vector3(68, 95, ship.position.z - 180), 0.06);
                camera.lookAt(ship.position.x * 0.2, ship.position.y - 8, ship.position.z + 120);
                
                ship.position.z = 1280 + localT * 420;
                ship.position.x = THREE.MathUtils.lerp(ship.position.x, 0, localT * 1.6);
                ship.position.y = THREE.MathUtils.lerp(ship.position.y, -8, localT);
                ship.rotation.x = THREE.MathUtils.lerp(ship.rotation.x, 0.08, localT * 2);
                
                // Final colliding walls
                obstacles.forEach(o => {
                    if (o.userData.type === 'collapse') {
                        o.userData.active = true;
                        const amt = localT * 92;
                        if (o.userData.side === 'left') {
                            o.position.x = -140 + amt * 0.65;
                        } else {
                            o.position.x = 140 - amt * 0.65;
                        }
                    }
                });
                
                // On escape - blinding burst + shockwave (particles)
                if (localT > 0.6 && localT < 0.65) {
                    createEscapeBurst(ship.position);
                }
            }
            
            // Animate gears during cinematic
            updateGears(0.032);
            updateDebris(0.032);
        }
        
        function updateExplorerCinematic(t) {
            if (!explorer || !gateGroup) return;
            
            // 0-4s: Establishing ultra-wide dolly
            if (t < 0.27) {
                camera.position.lerp(new THREE.Vector3(95, 72, -265 + t * 380), 0.035);
                camera.lookAt(12, 38, 120);
                
                explorer.position.z = -155 + t * 180;
                explorer.position.x = Math.sin(t * 3) * 6;
                
            } 
            // 4-9s: Medium tracking from behind toward dormant gate
            else if (t < 0.6) {
                const localT = (t - 0.27) / 0.33;
                
                const targetZ = -155 + 180 + localT * 310;
                explorer.position.z = targetZ;
                explorer.position.x = Math.sin(localT * 4) * 4;
                
                // Camera tracks behind
                camera.position.lerp(new THREE.Vector3(
                    explorer.position.x * 0.6 + 22,
                    42,
                    explorer.position.z - 68
                ), 0.08);
                camera.lookAt(explorer.position.x * 0.4, 18, explorer.position.z + 55);
                
                // Light panels progressively
                if (Math.random() < 0.4) {
                    const idx = Math.floor(localT * floorPanels.length * 0.95);
                    if (floorPanels[idx] && !floorPanels[idx].userData.lit) {
                        floorPanels[idx].userData.lit = true;
                        floorPanels[idx].material.emissive.setHex(0x224466);
                    }
                }
                
            } 
            // 9-13s: Close-up on helmet visor + star map
            else if (t < 0.87) {
                const localT = (t - 0.6) / 0.27;
                
                // Stop and raise hand
                explorer.position.z = 155;
                if (explorer.userData.rightArm) {
                    explorer.userData.rightArm.rotation.z = THREE.MathUtils.lerp(-0.6, -1.85, localT);
                    explorer.userData.rightArm.position.y = 10 + localT * 3;
                }
                
                // Slow push-in on visor
                camera.position.lerp(new THREE.Vector3(
                    explorer.position.x + 4,
                    explorer.position.y + 17,
                    explorer.position.z + 9
                ), 0.07);
                camera.lookAt(explorer.position.x + 1, explorer.position.y + 16, explorer.position.z + 18);
                
                // Trigger star map at ~10.5s
                if (localT > 0.35 && !gateGroup.userData.starMapTriggered) {
                    gateGroup.userData.starMapTriggered = true;
                    createStarMapHologram(gateGroup.position);
                }
                
            } 
            // 13-15s: Hero wide shot - gate opens to blinding horizon
            else {
                const localT = (t - 0.87) / 0.13;
                
                // Wide hero shot
                camera.position.lerp(new THREE.Vector3(72, 58, explorer.position.z - 95), 0.05);
                camera.lookAt(explorer.position.x * 0.3, explorer.position.y + 22, explorer.position.z + 85);
                
                // Open gate dramatically
                if (!gateGroup.userData.opened && localT > 0.2) {
                    openGate();
                }
                
                // Cape moves in "artificial wind"
                if (explorer.userData.cape && localT > 0.4) {
                    explorer.userData.cape.rotation.x = 0.3 + Math.sin(localT * 18) * 0.12;
                }
            }
            
            updateDebris(0.032);
        }
        
        function createEscapeBurst(pos) {
            const count = 68;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(count * 3);
            const velocities = [];
            
            for (let i = 0; i < count; i++) {
                positions[i * 3] = pos.x + (Math.random() - 0.5) * 8;
                positions[i * 3 + 1] = pos.y + (Math.random() - 0.5) * 8;
                positions[i * 3 + 2] = pos.z + (Math.random() - 0.5) * 8;
                
                velocities.push(new THREE.Vector3(
                    (Math.random() - 0.5) * 42,
                    (Math.random() - 0.5) * 32,
                    (Math.random() - 0.5) * 28 + 12
                ));
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            const mat = new THREE.PointsMaterial({
                color: 0xffcc88,
                size: 2.8,
                transparent: true,
                opacity: 0.9,
                depthWrite: false,
                blending: THREE.AdditiveBlending
            });
            
            const burst = new THREE.Points(geometry, mat);
            scene.add(burst);
            
            let life = 0;
            const burstInterval = setInterval(() => {
                life += 0.04;
                const posAttr = burst.geometry.attributes.position;
                
                for (let i = 0; i < count; i++) {
                    posAttr.array[i * 3] += velocities[i].x * 0.6;
                    posAttr.array[i * 3 + 1] += velocities[i].y * 0.6;
                    posAttr.array[i * 3 + 2] += velocities[i].z * 0.6;
                    velocities[i].multiplyScalar(0.96);
                }
                posAttr.needsUpdate = true;
                
                burst.material.opacity = Math.max(0.05, 0.9 - life * 1.8);
                
                if (life > 1.1) {
                    clearInterval(burstInterval);
                    scene.remove(burst);
                }
            }, 28);
        }
        
        function updateGears(delta) {
            gears.forEach(g => {
                if (g.userData.rotSpeed) {
                    g.rotation.y += g.userData.rotSpeed * delta * (g.userData.phase > 0 ? 1 : -1);
                    
                    // Subtle bob for weight
                    g.position.y = Math.sin(clock.elapsedTime * 0.8 + g.userData.phase) * 1.2 + g.userData.baseY || g.position.y;
                }
            });
        }
        
        function updateDebris(delta) {
            debris.forEach(d => {
                if (d.userData.rotSpeed) {
                    d.rotation.x += d.userData.rotSpeed.x * delta;
                    d.rotation.y += d.userData.rotSpeed.y * delta;
                    d.rotation.z += d.userData.rotSpeed.z * delta;
                }
                
                if (d.userData.floatPhase !== undefined) {
                    d.position.y += Math.sin(clock.elapsedTime * d.userData.floatSpeed + d.userData.floatPhase) * 0.035;
                }
                
                // Gentle drift for explorer mode debris
                if (currentMode === 'explorer' && d.userData.vel) {
                    d.position.add(d.userData.vel.clone().multiplyScalar(delta * 0.3));
                    
                    // Reset if too far
                    if (d.position.z > 780) d.position.z = -220;
                    if (d.position.x > 210) d.position.x = -195;
                    if (d.position.x < -210) d.position.x = 195;
                }
            });
        }
        
        function updateObstacles(delta) {
            if (!obstacles.length) return;
            
            obstacles.forEach(o => {
                if (!o.parent || !o.userData) return;
                
                if (o.userData.type === 'sweep' && o.userData.active) {
                    o.userData.phase = (o.userData.phase || 0) + delta * 1.6;
                    // Sweep across path
                    o.position.x = Math.sin(o.userData.phase) * 95;
                    o.position.y = 48 + Math.cos(o.userData.phase * 0.7) * 22;
                    
                    // Deactivate after pass
                    if (o.userData.phase > Math.PI * 1.8) {
                        o.userData.active = false;
                        o.position.x = 320; // move out of way
                    }
                }
                
                if (o.userData.type === 'dangerDebris' && o.userData.vel) {
                    o.position.add(o.userData.vel.clone().multiplyScalar(delta));
                    o.rotation.x += delta * 2.2;
                    o.rotation.y += delta * 1.8;
                    
                    if (o.position.z < -200) {
                        o.position.z = 1550;
                        o.position.x = (Math.random() - 0.5) * 140;
                    }
                }
            });
        }
        
        function updateHUD() {
            const label = document.getElementById('hud-label');
            const value = document.getElementById('hud-value');
            const status = document.getElementById('hud-status');
            const extra = document.getElementById('hud-extra');
            
            if (!label || !value) return;
            
            if (currentMode === 'ring') {
                label.innerHTML = 'DISTANCE';
                value.innerHTML = Math.floor(playerProgress * 2480) + 'm';
                status.innerHTML = `HULL ${Math.floor(hullIntegrity)}% • PHASE ${sequencePhase + 1}`;
                extra.innerHTML = `THRUST ${Math.floor(shipVelocity.length() / 95 * 100)}% • INERTIA ACTIVE`;
                
                if (hullIntegrity < 40) {
                    status.style.color = '#ff8866';
                } else {
                    status.style.color = '#a5c8ff';
                }
            } else {
                label.innerHTML = 'PROGRESS';
                value.innerHTML = Math.floor(playerProgress * 100) + '%';
                status.innerHTML = `SUIT INTEGRITY ${Math.floor(hullIntegrity)}%`;
                extra.innerHTML = gateGroup && gateGroup.userData.opened ? 'GATE OPEN • HORIZON STABLE' : 'WALK TO GATE • E TO INTERFACE';
            }
        }
        
        function updateProceduralElements(delta) {
            if (currentMode === 'ring') {
                updateGears(delta);
                updateDebris(delta);
                updateObstacles(delta);
                
                // Slow ring rotation for immense scale feel
                if (ringGroup) {
                    ringGroup.rotation.z = Math.sin(clock.elapsedTime * 0.018) * 0.008;
                }
                
                // Auto progress in free mode if no input
                if (!isCinematicPlaying && ship && shipVelocity.length() < 8) {
                    shipVelocity.z = THREE.MathUtils.lerp(shipVelocity.z, 26, 0.01);
                }
                
            } else if (currentMode === 'explorer') {
                updateDebris(delta);
                
                // Gentle ambient movement of debris
                debris.forEach(d => {
                    if (d.userData.floatPhase !== undefined) {
                        d.position.x += Math.sin(clock.elapsedTime * 0.2 + d.userData.floatPhase) * 0.012;
                    }
                });
            }
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            const delta = Math.min(clock.getDelta(), 0.1);
            
            // Update player
            updatePlayerControls(delta);
            
            // Procedural elements
            updateProceduralElements(delta);
            
            // Cinematic camera breathing / subtle movement
            if (isCinematicPlaying && camera) {
                camera.position.x += Math.sin(clock.elapsedTime * 1.8) * 0.035;
                camera.position.y += Math.cos(clock.elapsedTime * 1.4) * 0.025;
            }
            
            // Render
            renderer.render(scene, camera);
            
            // Occasional HUD refresh
            if (Math.random() < 0.03 && !isCinematicPlaying) {
                updateHUD();
            }
        }
        
        function onResize() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        }
        
        function switchMode(mode, initial = false) {
            if (mode === currentMode && !initial) return;
            
            currentMode = mode;
            
            // Update tabs
            document.getElementById('tab-ring').classList.toggle('active', mode === 'ring');
            document.getElementById('tab-explorer').classList.toggle('active', mode === 'explorer');
            
            // Clear previous
            if (ringGroup) { scene.remove(ringGroup); ringGroup = null; }
            if (explorerGroup) { scene.remove(explorerGroup); explorerGroup = null; }
            if (ship) { scene.remove(ship); ship = null; }
            if (explorer) { scene.remove(explorer); explorer = null; }
            
            obstacles = [];
            debris = [];
            gears = [];
            floorPanels = [];
            
            // Create new environment
            if (mode === 'ring') {
                createRingWorld(currentSeed);
                document.getElementById('inst-text').innerHTML = 
                    'WASD / Arrows — Fly &amp; Strafe &nbsp;&nbsp; MOUSE — Yaw/Pitch &nbsp;&nbsp; SPACE — Boost &nbsp;&nbsp; C — Cinematic';
                document.getElementById('hud-primary').style.borderColor = 'rgba(74, 158, 255, 0.25)';
            } else {
                createMegastructure(currentSeed);
                document.getElementById('inst-text').innerHTML = 
                    'WASD / Arrows — Walk &nbsp;&nbsp; MOUSE — Look &nbsp;&nbsp; E — Interface with Gate &nbsp;&nbsp; C — Cinematic';
                document.getElementById('hud-primary').style.borderColor = 'rgba(120, 180, 255, 0.25)';
            }
            
            // Reset cinematic state
            isCinematicPlaying = false;
            document.getElementById('cinematic-progress').style.display = 'none';
            document.getElementById('instructions').style.opacity = '1';
            
            playerProgress = 0;
            hullIntegrity = 100;
            updateHUD();
        }
        
        function regenerateEnvironment() {
            currentSeed = Math.floor(Math.random() * 900000) + 10000;
            switchMode(currentMode, true);
            
            // Brief feedback
            const origText = document.getElementById('inst-text').innerHTML;
            document.getElementById('inst-text').innerHTML = 'PROCEDURAL SEED UPDATED • NEW GEOMETRY GENERATED';
            setTimeout(() => {
                if (document.getElementById('inst-text'))
                    document.getElementById('inst-text').innerHTML = origText;
            }, 1350);
        }
        
        function resetPlayer() {
            if (currentMode === 'ring' && ship) {
                ship.position.set(12, -18, -80);
                ship.rotation.set(0.1, 0.06, 0);
                shipVelocity.set(0, 0, 38);
                shipAngularVel.set(0, 0, 0);
                hullIntegrity = 100;
                playerProgress = 0;
                
                // Reset obstacles
                obstacles.forEach(o => {
                    if (o.userData) {
                        o.userData.active = false;
                        if (o.userData.type === 'bulkhead') o.userData.closeAmount = 0;
                        if (o.userData.type === 'sweep') o.userData.phase = 0;
                    }
                    if (o.userData && o.userData.side === 'left') o.position.x = -140;
                    if (o.userData && o.userData.side === 'right') o.position.x = 140;
                });
                
            } else if (currentMode === 'explorer' && explorer) {
                explorer.position.set(8, 12, -160);
                if (explorer.userData.rightArm) {
                    explorer.userData.rightArm.rotation.z = -0.6;
                    explorer.userData.rightArm.position.y = 10;
                }
                playerProgress = 0;
                hullIntegrity = 100;
                
                // Reset panels
                floorPanels.forEach(p => {
                    p.userData.lit = false;
                    if (p.material.emissive) p.material.emissive.setHex(0x112233);
                    if (p.material.color) p.material.color.setHex(0x0a0e18);
                });
                
                if (gateGroup) {
                    gateGroup.userData.opened = false;
                    gateGroup.userData.starMapTriggered = false;
                    if (gateGroup.userData.field) {
                        gateGroup.userData.field.material.color.setHex(0x0a0c12);
                        gateGroup.userData.field.material.opacity = 0.95;
                    }
                }
            }
            
            updateHUD();
        }
        
        // Boot the simulator
        window.onload = function() {
            init();
            
            // Easter egg: press "g" to generate new seed quickly
            document.addEventListener('keypress', function(e) {
                if (e.key.toLowerCase() === 'g') {
                    regenerateEnvironment();
                }
            });
            
            // Initial cinematic hint
            setTimeout(() => {
                const inst = document.getElementById('inst-text');
                if (inst && currentMode === 'ring') {
                    inst.style.transition = 'opacity 0.6s ease';
                }
            }, 4200);
        };
        
        // Expose for debugging / future extension
        window.AETHER = { switchMode, playCinematic, regenerateEnvironment, resetPlayer };
    </script>
</body>
</html>
