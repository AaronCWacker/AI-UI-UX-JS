<html lang="en">
<head>

<title>🎬 HeyGen IO Media Lab</title>
<style>
:root{--bg:#050712;--p:#0b1026d9;--p2:#111a3ad9;--ink:#eef6ff;--mut:#96a8cf;--line:#2a3e68;--hot:#83f7ff;--ok:#9cffb6;--warn:#ffd37a;--bad:#ff8aa0;--r:18px;--mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;--sans:Inter,system-ui,Segoe UI,Roboto,Arial,sans-serif}*{box-sizing:border-box}html,body{height:100%;margin:0;overflow:hidden;background:radial-gradient(circle at 20% 5%,#263a7c,#060817 38%,#01020a);color:var(--ink);font-family:var(--sans)}button,input,textarea,select{font:inherit;color:var(--ink)}button{border:1px solid #3b5488;background:linear-gradient(#24345f,#101a36);border-radius:13px;padding:9px 11px;cursor:pointer;box-shadow:0 8px 20px #0007}button:hover{filter:brightness(1.14);border-color:var(--hot)}button:active{transform:translateY(1px)}.primary{background:linear-gradient(#17608d,#162d62);border-color:#77ecff}.good{background:linear-gradient(#1d7040,#173b25);border-color:#a5ffbc}.warn{background:linear-gradient(#795119,#3b2917);border-color:#ffd37a}.bad{background:linear-gradient(#7c253e,#351824);border-color:#ff8aa0}input,textarea,select{width:100%;border:1px solid #344a78;background:#070d20d9;border-radius:12px;padding:9px;outline:none}textarea{min-height:92px;resize:vertical;line-height:1.35}.small{font-size:12px;color:var(--mut)}.mono{font-family:var(--mono)}#app{height:100%;display:grid;grid-template-columns:400px 1fr 450px;grid-template-rows:56px 1fr}header{grid-column:1/4;display:flex;align-items:center;gap:10px;padding:8px 13px;background:#050713ee;border-bottom:1px solid var(--line);backdrop-filter:blur(16px)}h1{font-size:18px;margin:0;white-space:nowrap}.pill{border:1px solid #38517f;background:#0d1731;border-radius:999px;padding:6px 10px;color:#c1cff0;font-size:12px}.dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:#65708b;margin-right:5px;box-shadow:0 0 16px currentColor}.dot.on{background:#84ffad;color:#84ffad}.dot.warn{background:#ffd37a;color:#ffd37a}.dot.bad{background:#ff8aa0;color:#ff8aa0}.grow{flex:1}aside{overflow:auto;padding:12px;scrollbar-width:thin}.left{border-right:1px solid var(--line)}.right{border-left:1px solid var(--line)}main{position:relative;background:#010209;min-width:0}#three{position:absolute;inset:0;width:100%;height:100%}.card{background:linear-gradient(180deg,var(--p),#070c1cdd);border:1px solid var(--line);border-radius:var(--r);padding:12px;margin:0 0 12px;box-shadow:0 14px 42px #0008}.card h2{font-size:15px;margin:0 0 10px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.row{display:flex;gap:8px;align-items:center}.stack{display:grid;gap:8px}.tabs{display:flex;gap:6px;flex-wrap:wrap}.tab{font-size:12px;padding:7px 9px}.tab.on{border-color:var(--hot);background:#172850}.sec{display:none}.sec.on{display:block}video,canvas.preview{width:100%;min-height:115px;border:1px solid #263d66;border-radius:14px;background:#030612;object-fit:cover}.media{position:relative}.media .ov{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}.hud{position:absolute;left:12px;right:12px;bottom:12px;display:flex;gap:8px;align-items:flex-end;pointer-events:none}.hud>*{pointer-events:auto}.logMini{max-height:145px;overflow:auto;background:#020510dd;border:1px solid #2a416c;border-radius:15px;padding:9px;font:12px/1.34 var(--mono);width:min(680px,70vw);white-space:pre-wrap}.assetList{display:grid;gap:7px;max-height:170px;overflow:auto}.asset{display:grid;grid-template-columns:34px 1fr auto;gap:8px;align-items:center;border:1px solid #30476f;background:#0a1228;border-radius:12px;padding:8px;font-size:12px}.thumb{width:34px;height:34px;border-radius:9px;background:#13203e;display:grid;place-items:center;overflow:hidden}.thumb img{width:100%;height:100%;object-fit:cover}.drop{border:1px dashed #426492;border-radius:14px;padding:12px;text-align:center;background:#080e1faa;color:#b7c8f1}.drop.drag{border-color:var(--hot);background:#112452aa}.out{height:218px;overflow:auto;white-space:pre-wrap;background:#040814;border:1px solid #293e66;border-radius:14px;padding:10px;font:12px/1.35 var(--mono)}.meter{height:10px;border:1px solid #2c4168;border-radius:99px;overflow:hidden;background:#071022}.meter i{display:block;height:100%;width:0;background:linear-gradient(90deg,#76eaff,#c0ff93)}@media(max-width:1180px){#app{grid-template-columns:360px 1fr;grid-template-rows:56px 1fr auto}header{grid-column:1/3}.right{grid-column:1/3;border-left:0;border-top:1px solid var(--line);display:grid;grid-template-columns:1fr 1fr;gap:12px}.right .card{margin-bottom:0}}@media(max-width:820px){html,body{overflow:auto}#app{display:block;height:auto}header{position:sticky;top:0;z-index:5}main{height:62vh}.left,.right{border:0}.right{display:block}.grid2,.grid3{grid-template-columns:1fr}.logMini{width:calc(100vw - 24px)}}

<body>
<div id="app">
<header><h1>🎬 HeyGen IO Media Lab</h1><span class="pill"><i id="camDot" class="dot"></i>cam</span><span class="pill"><i id="micDot" class="dot"></i>mic</span><span class="pill"><i id="screenDot" class="dot"></i>screen</span><span class="pill"><i id="mpDot" class="dot"></i>mediapipe</span><span class="grow"></span><button id="save">💾 Save</button><button id="load">📂 Load</button><button id="clear" class="bad">🧹 Clear</button></header>
<aside class="left">
<section class="card"><h2>🎥 Live IO</h2><div class="grid2"><button id="cam" class="primary">📷 Camera</button><button id="mic" class="primary">🎙️ Mic</button><button id="screen" class="primary">🖥️ Screen</button><button id="stop" class="bad">⏹ Stop</button></div><div class="stack" style="margin-top:10px"><div class="media"><video id="camVideo" playsinline muted autoplay></video><canvas id="marks" class="ov"></canvas></div><video id="screenVideo" playsinline muted autoplay></video><canvas id="audioViz" class="preview" height="80"></canvas></div></section>
<section class="card"><h2>🧠 MediaPipe</h2><div class="grid2"><button id="loadMP" class="good">⚡ Load Models</button><button id="track" class="warn">🕹 Track Off</button></div><div class="small mono" id="mpStats" style="margin-top:8px">face idle · hands idle · fps 0</div></section>
<section class="card"><h2>📼 Record / Capture</h2><div class="grid2"><select id="recordSrc"><option value="master">Three.js master</option><option value="camera">camera</option><option value="screen">screen</option></select><select id="mime"><option value="video/webm;codecs=vp9,opus">webm vp9</option><option value="video/webm;codecs=vp8,opus">webm vp8</option><option value="video/webm">webm</option></select><button id="rec" class="bad">● Record</button><button id="snap3" class="good">📸 3D Snap</button><button id="snapCam">📷 Cam Snap</button><button id="snapScreen">🖥 Screen Snap</button></div><div class="row" style="margin-top:9px"><span class="small">FPS</span><input id="fps" type="range" min="10" max="60" value="30"><span id="fpsv" class="small mono">30</span></div><div class="row"><div class="meter grow"><i id="recbar"></i></div><span id="rectime" class="small mono">00:00</span></div></section>
<section class="card"><h2>📦 Assets</h2><div id="drop" class="drop">Drop media/docs here</div><input id="files" type="file" multiple accept="image/*,video/*,audio/*,.pdf,.md,.json,.html,.txt"><div id="assets" class="assetList" style="margin-top:9px"></div></section>
</aside>
<main><canvas id="three"></canvas><div class="hud"><div id="mini" class="logMini"></div><div class="stack"><button id="view">🎛 View</button><button id="orbit">🌀 Orbit On</button><button id="export" class="good">⬇ Export</button></div></div></main>
<aside class="right">
<section class="card"><h2>🧪 Lab Tabs</h2><div class="tabs"><button class="tab on" data-t="api">🔌 API</button><button class="tab" data-t="edu">🏫 Edu</button><button class="tab" data-t="speech">🗣️ Speech</button><button class="tab" data-t="out">📤 Export</button></div>
<div id="api" class="sec on stack" style="margin-top:9px"><div class="grid2"><input id="base" value="https://api.heygen.com"><input id="proxy" placeholder="optional proxy base"></div><input id="key" type="text" value="sk_V2..." data-default-key="sk_V2..."><label class="row small"><input id="keepKey" type="checkbox" checked style="width:auto"> keep key set while I play</label><div class="grid2"><button id="resetKey">🔑 Reset Key</button><button id="maskKey">🙈 Mask Key</button></div><div class="grid3"><select id="mode"><option value="generate">generate</option><option value="chat">chat</option></select><select id="orient"><option value="auto">auto</option><option value="landscape">landscape</option><option value="portrait">portrait</option></select><input id="styleTag" placeholder="style tag"></div><div class="grid2"><button id="avatars">🧍 Avatars</button><button id="voices">🔊 Voices</button><button id="sessions">🧾 Sessions</button><button id="styles">🎨 Styles</button><button id="brands">🏷 Brand Kits</button><button id="sessVideos">📼 Session Videos</button></div><div class="grid2"><select id="own"><option value="all">all ownership</option><option value="private">private</option><option value="public">public</option></select><select id="avatar"><option value="">avatar_id</option></select></div><div class="grid2"><select id="voice"><option value="">voice_id</option></select><select id="style"><option value="">style_id</option></select></div><select id="brand"><option value="">brand_kit_id</option></select><input id="manualAvatar" placeholder="manual avatar_id"><input id="manualVoice" placeholder="manual voice_id"><input id="callback" placeholder="callback_url optional"><input id="title" value="All.AI Long Form Lesson"><textarea id="motion" placeholder="motion prompt for direct avatar video"></textarea><textarea id="script" placeholder="script for direct avatar video"></textarea><textarea id="msg" placeholder="chat-mode follow-up / revision message"></textarea><div class="grid2"><button id="agent" class="primary">🤖 Create Agent</button><button id="direct" class="good">🎬 Avatar Video</button><button id="pollSess">🔁 Poll Agent</button><button id="pollVid">🔁 Poll Video</button><button id="sendMsg" class="warn">💬 Send Revision</button><button id="stopAgent" class="bad">🛑 Stop Agent</button></div><div class="grid2"><input id="sessionId" placeholder="session_id"><input id="videoId" placeholder="video_id"></div><div class="grid2"><input id="apiFiles" type="file" multiple accept="image/*,video/*,audio/*,application/pdf"><button id="upload" class="warn">☁ Upload Asset</button></div></div>
<div id="edu" class="sec stack" style="margin-top:9px"><div class="grid2"><input id="topic" value="AI literacy for healthcare teams"><input id="audience" value="busy clinicians and engineers"></div><div class="grid3"><input id="minutes" type="number" value="12" min="1"><select id="tone"><option>clear, warm, expert</option><option>cinematic and mythic</option><option>funny but precise</option><option>executive briefing</option></select><select id="chapters"><option>4</option><option>5</option><option>6</option><option>8</option></select></div><textarea id="prompt" placeholder="Video Agent prompt"></textarea><div class="grid2"><button id="lesson" class="good">🏗 Build Lesson</button><button id="promptToScript">📝 Prompt → Script</button></div><textarea id="story" placeholder="storyboard"></textarea><div class="grid2"><button id="chapterize">✂️ Split Chapters</button><button id="shot">➕ Add Shot</button></div><div id="shots" class="assetList"></div></div>
<div id="speech" class="sec stack" style="margin-top:9px"><div class="grid2"><button id="listen" class="primary">🎧 Listen</button><button id="stopListen" class="bad">🛑 Stop</button></div><textarea id="transcript" placeholder="speech transcript"></textarea><div class="grid2"><button id="toScript">⬇ To Script</button><button id="speak">🔈 Speak</button></div><div class="grid2"><select id="localVoice"></select><input id="rate" type="number" min="0.5" max="2" step="0.1" value="1"></div><textarea id="scratch" placeholder="interim speech"></textarea></div>
<div id="out" class="sec stack" style="margin-top:9px"><div class="grid2"><button id="copyPayload">📋 Copy Payload</button><button id="copyCurl">🧾 Copy cURL</button><button id="md" class="good">⬇ Markdown</button><button id="json" class="good">⬇ JSON</button></div><input id="outUrl" placeholder="output video_url"><button id="loadOut">📺 Load Output URL</button><video id="outVideo" controls playsinline></video></div></section>
<section class="card"><h2>📡 Console</h2><pre id="log" class="out"></pre></section>
</aside></div>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.183.1/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.183.1/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';import{OrbitControls}from'three/addons/controls/OrbitControls.js';import{EffectComposer}from'three/addons/postprocessing/EffectComposer.js';import{RenderPass}from'three/addons/postprocessing/RenderPass.js';import{UnrealBloomPass}from'three/addons/postprocessing/UnrealBloomPass.js';import{OutputPass}from'three/addons/postprocessing/OutputPass.js';
const $=id=>document.getElementById(id),DEF=$('key').dataset.defaultKey,stamp=()=>new Date().toISOString().replace(/[:T]/g,'-').slice(0,19),S={cam:null,mic:null,screen:null,rec:null,chunks:[],t0:0,timer:null,assets:[],shots:[],mp:false,track:false,face:null,hand:null,last:-1,frames:0,lastF:performance.now(),ctx:null,ana:null,freq:null,orbit:true,view:0,payload:null,curl:'',voices:[],sr:null};
let scene,camera,renderer,controls,composer,clock,panels={},facePts,handPts,bars=[];init3();ui();restore();anim();
function log(m,o){let x=`[${new Date().toLocaleTimeString()}] ${m}`+(o!==undefined?'\n'+(typeof o==='string'?o:JSON.stringify(o,null,2)):'');$('log').textContent=(x+'\n\n'+$('log').textContent).slice(0,22000);$('mini').textContent=(x+'\n'+$('mini').textContent).slice(0,6000)}function dot(id,on,k='on'){$(id).className='dot'+(on?' '+k:'')}function dl(name,blob){let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();addAsset({id:crypto.randomUUID(),name,type:blob.type,url:a.href,blob,size:blob.size})}function dlt(name,text,type='text/plain'){dl(name,new Blob([text],{type}))}
function init3(){renderer=new THREE.WebGLRenderer({canvas:$('three'),antialias:true,preserveDrawingBuffer:true});renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.toneMapping=THREE.ACESFilmicToneMapping;scene=new THREE.Scene();scene.background=new THREE.Color(0x02030a);scene.fog=new THREE.FogExp2(0x050819,.018);camera=new THREE.PerspectiveCamera(58,2,.1,240);camera.position.set(0,5.8,13);controls=new OrbitControls(camera,renderer.domElement);controls.enableDamping=true;controls.target.set(0,1.2,0);clock=new THREE.Clock();scene.add(new THREE.HemisphereLight(0x9fdcff,0x12061d,1.8));let d=new THREE.DirectionalLight(0xffffff,2.4);d.position.set(5,8,6);scene.add(d);scene.add(new THREE.GridHelper(44,44,0x39547e,0x18243e));let f=new THREE.Mesh(new THREE.CircleGeometry(24,96),new THREE.MeshStandardMaterial({color:0x071028,roughness:.55,metalness:.15,transparent:true,opacity:.82}));f.rotation.x=-Math.PI/2;f.position.y=-.02;scene.add(f);stars();panel('camP','📷 CAMERA',[-3.7,2.1,0],.45);panel('scrP','🖥 SCREEN',[3.7,2.1,0],-.45);panel('outP','🎬 HEYGEN',[0,4,-2.6],0,1.1);rig();composer=new EffectComposer(renderer);composer.addPass(new RenderPass(scene,camera));composer.addPass(new UnrealBloomPass(new THREE.Vector2(1,1),.75,.42,.08));composer.addPass(new OutputPass());addEventListener('resize',resize)}function tex(a,b=''){let c=document.createElement('canvas'),x=c.getContext('2d');c.width=768;c.height=432;let g=x.createLinearGradient(0,0,c.width,c.height);g.addColorStop(0,'#101a3a');g.addColorStop(.55,'#071025');g.addColorStop(1,'#1c1740');x.fillStyle=g;x.fillRect(0,0,c.width,c.height);x.strokeStyle='#6eeeff';x.lineWidth=6;x.strokeRect(10,10,c.width-20,c.height-20);x.textAlign='center';x.fillStyle='#eef8ff';x.font='bold 64px system-ui';x.fillText(a,c.width/2,205);x.fillStyle='#a9b9df';x.font='28px system-ui';x.fillText(b,c.width/2,258);let t=new THREE.CanvasTexture(c);t.colorSpace=THREE.SRGBColorSpace;return t}function panel(n,a,p,r,s=1){let m=new THREE.MeshBasicMaterial({map:tex(a),side:THREE.DoubleSide,toneMapped:false}),mesh=new THREE.Mesh(new THREE.PlaneGeometry(4.8*s,2.7*s),m);mesh.position.set(...p);mesh.rotation.y=r;scene.add(mesh);panels[n]={mesh,mat:m}}function stars(){let g=new THREE.BufferGeometry(),n=1000,p=new Float32Array(n*3);for(let i=0;i<n;i++){let r=35+Math.random()*85,a=Math.random()*6.283;p.set([Math.cos(a)*r,(Math.random()-.2)*42,Math.sin(a)*r],i*3)}g.setAttribute('position',new THREE.BufferAttribute(p,3));scene.add(new THREE.Points(g,new THREE.PointsMaterial({size:.08,color:0x99cfff,transparent:true,opacity:.72})))}function rig(){facePts=new THREE.Points(new THREE.BufferGeometry().setAttribute('position',new THREE.BufferAttribute(new Float32Array(478*3),3)),new THREE.PointsMaterial({color:0x83f7ff,size:.045}));facePts.position.set(-3.7,2.1,.08);facePts.scale.set(2.2,2.2,2.2);scene.add(facePts);handPts=new THREE.Points(new THREE.BufferGeometry().setAttribute('position',new THREE.BufferAttribute(new Float32Array(42*3),3)),new THREE.PointsMaterial({color:0xb7ff91,size:.07}));handPts.position.set(3.7,2.05,.08);handPts.scale.set(2,2,2);scene.add(handPts);for(let i=0;i<32;i++){let b=new THREE.Mesh(new THREE.BoxGeometry(.12,.1,.12),new THREE.MeshStandardMaterial({color:0x8cf7ff,emissive:0x123b44}));b.position.set((i-16)*.18,.18,-3.6);scene.add(b);bars.push(b)}}function vtex(k,v){let t=new THREE.VideoTexture(v);t.colorSpace=THREE.SRGBColorSpace;panels[k].mat.map=t;panels[k].mat.needsUpdate=true}function resize(){let c=$('three'),w=c.clientWidth,h=c.clientHeight;if(!w||!h)return;renderer.setSize(w,h,false);composer.setSize(w,h);camera.aspect=w/h;camera.updateProjectionMatrix()}function anim(){requestAnimationFrame(anim);let t=clock.elapsedTime;controls.enabled=S.orbit;controls.update();audioBars();if(S.track)mpFrame();Object.values(panels).forEach((p,i)=>p.mesh.position.y+=Math.sin(t+i)*.0008);resize();composer.render()}
function ui(){['api','edu','speech','out'].forEach(id=>document.querySelector(`[data-t=${id}]`).onclick=()=>tab(id));$('cam').onclick=cam;$('mic').onclick=mic;$('screen').onclick=screen;$('stop').onclick=stop;$('loadMP').onclick=loadMP;$('track').onclick=()=>{S.track=!S.track;$('track').textContent=S.track?'🕹 Track On':'🕹 Track Off'};$('fps').oninput=e=>$('fpsv').textContent=e.target.value;$('rec').onclick=rec;$('snap3').onclick=()=>renderer.domElement.toBlob(b=>dl(`three_${stamp()}.png`,b),'image/png');$('snapCam').onclick=()=>snap($('camVideo'),'camera');$('snapScreen').onclick=()=>snap($('screenVideo'),'screen');$('files').onchange=e=>files([...e.target.files]);drop();$('view').onclick=view;$('orbit').onclick=()=>{S.orbit=!S.orbit;$('orbit').textContent=S.orbit?'🌀 Orbit On':'🧲 Orbit Off'};$('export').onclick=exportJson;$('save').onclick=save;$('load').onclick=load;$('clear').onclick=clear;$('avatars').onclick=avatars;$('voices').onclick=voices;$('sessions').onclick=()=>api('/v3/video-agents?limit=20','GET','Sessions');$('styles').onclick=styles;$('brands').onclick=brands;$('sessVideos').onclick=()=>sessionVideos($('sessionId').value.trim());$('agent').onclick=agent;$('direct').onclick=direct;$('pollSess').onclick=()=>pollSess($('sessionId').value.trim());$('pollVid').onclick=()=>pollVid($('videoId').value.trim());$('sendMsg').onclick=sendMsg;$('stopAgent').onclick=()=>api(`/v3/video-agents/${encodeURIComponent($('sessionId').value.trim())}/stop`,'POST','Stop agent',{});$('upload').onclick=upload;$('resetKey').onclick=()=>{$('key').type='text';$('key').value=DEF;if($('keepKey').checked)localStorage.heygen_key=DEF};$('maskKey').onclick=()=>{$('key').type=$('key').type==='password'?'text':'password';$('maskKey').textContent=$('key').type==='password'?'👁 Show Key':'🙈 Mask Key'};$('keepKey').onchange=()=>{$('keepKey').checked?localStorage.heygen_key=$('key').value:localStorage.removeItem('heygen_key')};$('lesson').onclick=lesson;$('promptToScript').onclick=()=>{$('scr async function cam(){try{S.cam=await navigator.mediaDevices.getUserMedia({video:{width:{ideal:1280},height:{ideal:720},facingMode:'user'}});$('camVideo').srcObject=S.cam;await $('camVideo').play();vtex('camP',$('camVideo'));dot('camDot',1);log('Camera started')}catch(e){dot('camDot',1,'bad');log('Camera error',String(e))}}async function mic(){try{S.mic=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true}});S.ctx=S.ctx||new AudioContext();let src=S.ctx.createMediaStreamSource(S.mic);S.ana=S.ctx.createAnalyser();S.ana.fftSize=1024;src.connect(S.ana);S.freq=new Uint8Array(S.ana.frequencyBinCount);dot('micDot',1);log('Mic started')}catch(e){dot('micDot',1,'bad');log('Mic error',String(e))}}async function screen(){try{S.screen=await navigator.mediaDevices.getDisplayMedia({video:{frameRate:{ideal:30}},audio:true});$('screenVideo').srcObject=S.screen;await $('screenVideo').play();vtex('scrP',$('screenVideo'));dot('screenDot',1);log('Screen started')}catch(e){dot('screenDot',1,'bad');log('Screen error',String(e))}}function stop(){[S.cam,S.mic,S.screen].filter(Boolean).forEach(s=>s.getTracks().forEach(t=>t.stop()));S.cam=S.mic=S.screen=null;$('camVideo').srcObject=null;$('screenVideo').srcObject=null;['camDot','micDot','screenDot'].forEach(id=>dot(id,0));log('Streams stopped')}function audioBars(){let c=$('audioViz'),x=c.getContext('2d'),w=c.width=c.clientWidth*devicePixelRatio,h=c.height=c.clientHeight*devicePixelRatio;x.fillStyle='#060b18';x.fillRect(0,0,w,h);if(S.ana&&S.freq){S.ana.getByteFrequencyData(S.freq);let step=Math.floor(S.freq.length/32);for(let i=0;i<32;i++){let v=S.freq[i*step]/255;bars[i].scale.y=.15+v*4;x.fillStyle=`hsl(${185+v*80},90%,${45+v*30}%)`;x.fillRect(i*w/32,h-v*h,w/32-2,v*h)}}}
async function loadMP(){try{dot('mpDot',1,'warn');let vision=await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs'),fs=await vision.FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm');S.face=await vision.FaceLandmarker.createFromOptions(fs,{baseOptions:{modelAssetPath:'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/latest/face_landmarker.task',delegate:'GPU'},runningMode:'VIDEO',numFaces:1});S.hand=await vision.HandLandmarker.createFromOptions(fs,{baseOptions:{modelAssetPath:'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',delegate:'GPU'},runningMode:'VIDEO',numHands:2});S.mp=true;dot('mpDot',1);log('MediaPipe loaded')}catch(e){dot('mpDot',1,'bad');log('MediaPipe error',String(e))}}function mpFrame(){let v=$('camVideo');if(!S.mp||!v.videoWidth||v.currentTime===S.last)return;S.last=v.currentTime;let ts=performance.now(),f=S.face.detectForVideo(v,ts),h=S.hand.detectForVideo(v,ts);drawMarks(f,h);particles(f,h);S.frames++;if(ts-S.lastF>1000){$('mpStats').textContent=`face ${f.faceLandmarks?.[0]?.length||0} · hands ${h.landmarks?.length||0} · fps ${S.frames}`;S.frames=0;S.lastF=ts}}function drawMarks(f,h){let c=$('marks'),v=$('camVideo'),x=c.getContext('2d'),w=c.width=v.clientWidth*devicePixelRatio,hh=c.height=v.clientHeight*devicePixelRatio;x.clearRect(0,0,w,hh);x.fillStyle='#83f7ff';(f.faceLandmarks?.[0]||[]).forEach((p,i)=>{if(i%3)return;x.beginPath();x.arc(p.x*w,p.y*hh,1.5,0,7);x.fill()});x.fillStyle='#b7ff91';(h.landmarks||[]).flat().forEach(p=>{x.beginPath();x.arc(p.x*w,p.y*hh,3,0,7);x.fill()})}function particles(f,h){let a=facePts.geometry.attributes.position.array;a.fill(999);(f.faceLandmarks?.[0]||[]).forEach((p,i)=>{a[i*3]=(p.x-.5)*2;a[i*3+1]=-(p.y-.5)*1.2;a[i*3+2]=-(p.z||0)*2});facePts.geometry.attributes.position.needsUpdate=true;let b=handPts.geometry.attributes.position.array;b.fill(999);let n=0;(h.landmarks||[]).forEach(hand=>hand.forEach(p=>{if(n>=42)return;b[n*3]=(p.x-.5)*2;b[n*3+1]=-(p.y-.5)*1.2;b[n*3+2]=-(p.z||0)*2;n++}));handPts.geometry.attributes.position.needsUpdate=true}
function rec(){S.rec?.state==='recording'?stopRec():startRec()}function recStream(){let src=$('recordSrc').value;if(src==='camera'&&S.cam)return S.cam;if(src==='screen'&&S.screen)return S.screen;let st=renderer.domElement.captureStream(+$('fps').value||30);if(S.mic)S.mic.getAudioTracks().forEach(t=>st.addTrack(t));return st}function startRec(){let st=recStream(),mt=$('mime').value,opt=MediaRecorder.isTypeSupported(mt)?{mimeType:mt}:{};S.chunks=[];S.rec=new MediaRecorder(st,opt);S.rec.ondataavailable=e=>e.data.size&&S.chunks.push(e.data);S.rec.onstop=()=>{clearInterval(S.timer);$('rec').textContent='● Record';$('recbar').style.width='0';dl(`heygen_io_${stamp()}.webm`,new Blob(S.chunks,{type:S.rec.mimeType||'video/webm'}));log('Recording saved')};S.t0=Date.now();S.rec.start(500);$('rec').textContent='■ Stop';S.timer=setInterval(()=>{let s=Math.floor((Date.now()-S.t0)/1000);$('rectime').textContent=`${String(s/60|0).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;$('recbar').style.width=`${s%60/60*100}%`},250);log('Recording started')}function stopRec(){if(S.rec?.state==='recording')S.rec.stop()}function snap(v,n){if(!v.videoWidth)return log(`${n} not ready`);let c=document.createElement('canvas');c.width=v.videoWidth;c.height=v.videoHeight;c.getContext('2d').drawImage(v,0,0);c.toBlob(b=>dl(`${n}_${stamp()}.png`,b),'image/png')}
function drop(){let d=$('drop');['dragenter','dragover'].forEach(e=>d.addEventListener(e,x=>{x.preventDefault();d.classList.add('drag')}));['dragleave','drop'].forEach(e=>d.addEventListener(e,x=>{x.preventDefault();d.classList.remove('drag')}));d.ondrop=e=>files([...e.dataTransfer.files])}function files(fs){fs.forEach(f=>addAsset({id:crypto.randomUUID(),name:f.name,type:f.type||'file',size:f.size,url:URL.createObjectURL(f),blob:f}))}function addAsset(a){S.assets.unshift(a);renderAssets()}function renderAssets(){$('assets').innerHTML='';S.assets.forEach((a,i)=>{let icon=a.type?.startsWith('image')?`<img src="${a.url}">`:a.type?.startsWith('video')?'🎞️':a.type?.startsWith('audio')?'🎵':'📄',d=document.createElement('div');d.className='asset';d.innerHTML=`<div class="thumb">${icon}</div><div><b>${a.name}</b><br><span class="small">${a.type||'file'} ${a.heygenAssetId?' · '+a.heygenAssetId:''}</span></div><button>➕</button>`;d.querySelector('button').onclick=()=>{S.shots.push({id:crypto.randomUUID(),name:a.name,note:'asset shot'});renderShots()};$('assets').appendChild(d)})}function view(){let p=[[[0,5.8,13],[0,1.2,0]],[[0,8,5.5],[0,1,0]],[[8,4.2,7],[0,1,0]],[[0,2.4,9],[0,1.4,-1]]][++S.view%4];camera.position.set(...p[0]);controls.target.set(...p[1])}
function root(){return($('proxy').value.trim()||$('base').value.trim()).replace(/\/$/,'')}function headers(json=true){let h={};if(json)h['Content-Type']='application/json';h['X-Api-Key']=$('key').value.trim()||DEF;h['Idempotency-Key']=crypto.randomUUID();return h}async function api(path,method='GET',label='API',body){if($('keepKey').checked)localStorage.heygen_key=$('key').value.trim()||DEF;let opt={method,headers:headers(body!==undefined)};if(body!==undefined)opt.body=JSON.stringify(body);try{let r=await fetch(root()+path,opt),txt=await r.text(),data;try{data=JSON.parse(txt)}catch{data=txt}if(!r.ok)throw Error(`${r.status} ${r.statusText}: ${typeof data==='string'?data:JSON.stringify(data)}`);log(label,data);return data}catch(e){log(label+' error',String(e));throw e}}function sel(s,items,ids,labs){s.innerHTML='<option value="">select</option>';items.forEach(it=>{let id=ids.map(k=>it?.[k]).find(Boolean);if(!id)return;let lab=labs.map(k=>it?.[k]).filter(Boolean).join(' · ')||id,o=document.createElement('option');o.value=id;o.textContent=`${lab} — ${id}`;s.appendChild(o)})}function flat(groups){let out=[];groups.forEach(g=>{let looks=g.looks||g.avatar_looks||g.avatars||[];looks.length?looks.forEach(l=>out.push({...l,group_name:g.name||g.group_name,avatar_id:l.avatar_id||g.avatar_id||g.id,look_id:l.look_id||l.id})):out.push(g)});return out}async function avatars(){let q=new URLSearchParams({limit:50}),o=$('own').value;if(o!=='all')q.set('ownership',o);let d=await api('/v3/avatars?'+q,'GET','Avatar groups');sel($('avatar'),flat(d.data||[]),['look_id','avatar_id','id'],['name','avatar_name','look_name','group_name'])}async function voices(){let d=await api('/v3/voices','GET','Voices');sel($('voice'),d.data?.voices||d.data||[],['voice_id','id'],['name','display_name','language','gender'])}async function styles(){let q=new URLSearchParams({limit:50});if($('styleTag').value.trim())q.set('tag',$('styleTag').value.trim());let d=await api('/v3/video-agents/styles?'+q,'GET','Styles');sel($('style'),d.data||[],['style_id','id'],['name','title','tag'])}async function brands(){let d=await api('/v3/brand-kits?limit=50','GET','Brand kits');sel($('brand'),d.data||[],['brand_kit_id','id'],['name','title'])}function agentFiles(){return S.assets.filter(a=>a.heygenAssetId||a.heygenUrl).slice(0,20).map(a=>a.heygenAssetId?{type:'asset_id',asset_id:a.heygenAssetId}:{type:'url',url:a.heygenUrl})}
function agentPayload(){let p={prompt:$('prompt').value.trim()||buildPrompt(),mode:$('mode').value,incognito_mode:false},av=$('manualAvatar').value.trim()||$('avatar').value,vo=$('manualVoice').value.trim()||$('voice').value;if(av)p.avatar_id=av;if(vo)p.voice_id=vo;if($('style').value)p.style_id=$('style').value;if($('brand').value)p.brand_kit_id=$('brand').value;if($('orient').value!=='auto')p.orientation=$('orient').value;let fs=agentFiles();if(fs.length)p.files=fs;if($('callback').value.trim()){p.callback_url=$('callback').value.trim();p.callback_id='allai-'+stamp()}return p}function directPayload(){let av=$('manualAvatar').value.trim()||$('avatar').value,vo=$('manualVoice').value.trim()||$('voice').value,p={type:'avatar',avatar_id:av,voice_id:vo,title:$('title').value,script:$('script').value,output_format:'mp4',resolution:'1080p',aspect_ratio:'16:9'};if($('motion').value.trim())p.motion_prompt=$('motion').value.trim();if($('callback').value.trim()){p.callback_url=$('callback').value.trim();p.callback_id='allai-'+stamp()}Object.keys(p).forEach(k=>!p[k]&&delete p[k]);return p}async function agent(){let p=agentPayload();S.payload=p;S.curl=curl('/v3/video-agents','POST',p);let d=await api('/v3/video-agents','POST','Create Video Agent',p);$('sessionId').value=d.data?.session_id||$('sessionId').value;if(d.data?.video_id)$('videoId').value=d.data.video_id}async function direct(){let p=directPayload();S.payload=p;S.curl=curl('/v3/videos','POST',p);let d=await api('/v3/videos','POST','Create Avatar Video',p);$('videoId').value=d.data?.video_id||d.data?.id||$('videoId').value}async function pollSess(id){if(!id)return log('Missing session_id');let d=await api(`/v3/video-agents/${encodeURIComponent(id)}`,'GET','Poll session');if(d.data?.video_id)$('videoId').value=d.data.video_id}async function pollVid(id){if(!id)return log('Missing video_id');let d=await api(`/v3/videos/${encodeURIComponent(id)}`,'GET','Poll video'),u=d.data?.video_url||d.data?.captioned_video_url;if(u){$('outUrl').value=u;loadOut()}}async function sessionVideos(id){if(!id)return log('Missing session_id');let d=await api(`/v3/video-agents/${encodeURIComponent(id)}/videos`,'GET','Session videos'),u=d.data?.[0]?.video_url;if(u){$('outUrl').value=u;loadOut()}}async function sendMsg(){let id=$('sessionId').value.trim();if(!id)return log('Missing session_id');let p={message:$('msg').value.trim()||'Please revise with clearer pacing, stronger examples, and better educational structure.'},fs=agentFiles();if(fs.length)p.files=fs;if($('brand').value)p.brand_kit_id=$('brand').value;S.payload=p;S.curl=curl(`/v3/video-agents/${id}`,'POST',p);let d=await api(`/v3/video-agents/${encodeURIComponent(id)}`,'POST','Send revision',p);if(d.data?.video_id)$('videoId').value=d.data.video_id}async function upload(){let fs=[...$('apiFiles').files];if(!fs.length)return log('Choose file(s)');for(let f of fs){let fd=new FormData();fd.append('file',f,f.name);let h=headers(false);delete h['Content-Type'];try{let r=await fetch(root()+'/v3/assets',{method:'POST',headers:h,body:fd}),txt=await r.text(),d;try{d=JSON.parse(txt)}catch{d=txt}if(!r.ok)throw Error(`${r.status}: ${txt}`);let a=S.assets.find(x=>x.name===f.name&&x.size===f.size);if(!a){a={id:crypto.randomUUID(),name:f.name,type:f.type,size:f.size,url:URL.createObjectURL(f),blob:f};S.assets.unshift(a)}a.heygenAssetId=d.data?.asset_id||d.data?.id;a.heygenUrl=d.data?.url;renderAssets();log('Asset uploaded',d)}catch(e){log('Upload error '+f.name,String(e))}}}function curl(path,method,p){return`curl -X ${method} "${root()}${path}" \\\n  -H "X-Api-Key: ${$('key').value.trim()||DEF}" \\\n  -H "Content-Type: application/json" \\\n  -d '${JSON.stringify(p,null,2).replace(/'/g,"'\\''")}'`}function loadOut(){let u=$('outUrl').value.trim();if(!u)return;$('outVideo').src=u;$('outVideo').play().catch(()=>{});vtex('outP',$('outVideo'));log('Output video loaded',u)}
function buildPrompt(){return`Create a ${$('minutes').value}-minute long-form educational HeyGen video about ${$('topic').value} for ${$('audience').value}. Use a ${$('tone').value} voice. Structure it as ${$('chapters').value} short chapters with a hook, visual metaphors, practical examples, recap checkpoints, and a final action plan.`}function script(){let ch=+$('chapters').value||4,parts=[`Welcome. Today we are learning ${$('topic').value} for ${$('audience').value}.`];for(let i=1;i<=ch;i++)parts.push(`Chapter ${i}. ${['The map','The machine','The workflow','The guardrails','The launch','The feedback loop'][i-1]||'The next step'}. Inputs arrive, models reason, tools act, humans review, and evidence improves the next decision.`);parts.push('Final recap. Start small, measure outcomes, protect privacy, keep humans in the loop, and turn every lesson into a reusable workflow.');return parts.join('\n\n')}function lesson(){$('prompt').value=buildPrompt();$('script').value=script();$('story').value=Array.from({length:+$('chapters').value||4},(_,i)=>`🎞️ ${i+1}. Chapter ${i+1}\nAvatar teaches. Visual: glowing system map. Capture: camera/screen/image if useful. Checkpoint: one practical question.`).join('\n\n');log('Lesson built')}function chapterize(){S.shots=$('script').value.split(/\n\s*\n/).filter(Boolean).map((x,i)=>({id:crypto.randomUUID(),name:`Chapter ${i+1}`,note:x.slice(0,220)}));renderShots()}function renderShots(){$('shots').innerHTML='';S.shots.forEach((s,i)=>{let d=document.createElement('div');d.className='asset';d.innerHTML=`<div class="thumb">🎞️</div><div><b>${s.name}</b><br><span class="small">${s.note||''}</span></div><button class="bad">×</button>`;d.querySelector('button').onclick=()=>{S.shots.splice(i,1);renderShots()};$('shots').appendChild(d)})}
function speechUI(){loadVoices();speechSynthesis.onvoiceschanged=loadVoices;$('listen').onclick=listen;$('stopListen').onclick=()=>S.sr?.stop();$('toScript').onclick=()=>{$('script').value=($('script').value+'\n\n'+$('transcript').value).trim()};$('speak').onclick=()=>{speechSynthesis.cancel();let u=new SpeechSynthesisUtterance($('script').value||$('prompt').value||'Ready.'),v=S.voices[+$('localVoice').value];if(v)u.voice=v;u.rate=+$('rate').value||1;speechSynthesis.speak(u)}}function loadVoices(){S.voices=speechSynthesis.getVoices();$('localVoice').innerHTML='';S.voices.forEach((v,i)=>{let o=document.createElement('option');o.value=i;o.textContent=`${v.name} · ${v.lang}`;$('localVoice').appendChild(o)})}function listen(){let R=window.SpeechRecognition||window.webkitSpeechRecognition;if(!R)return log('SpeechRecognition unavailable');S.sr=new R();S.sr.continuous=true;S.sr.interimResults=true;S.sr.lang='en-US';S.sr.onresult=e=>{let fin='',int='';for(let i=e.resultIndex;i<e.results.length;i++){let t=e.results[i][0].transcript;e.results[i].isFinal?fin+=t+' ':int+=t}if(fin)$('transcript').value+=fin;$('scratch').value=int};S.sr.start();log('Speech listen started')}
function ser(){return{topic:$('topic').value,audience:$('audience').value,minutes:$('minutes').value,tone:$('tone').value,chapters:$('chapters').value,prompt:$('prompt').value,script:$('script').value,story:$('story').value,shots:S.shots,title:$('title').value,motion:$('motion').value,msg:$('msg').value,sessionId:$('sessionId').value,videoId:$('videoId').value,outUrl:$('outUrl').value,assets:S.assets.map(a=>({name:a.name,type:a.type,size:a.size,heygenAssetId:a.heygenAssetId,heygenUrl:a.heygenUrl}))}}function save(){localStorage.heygen_state=JSON.stringify(ser());log('State saved')}function load(){let s=JSON.parse(localStorage.heygen_state||'{}');['topic','audience','minutes','tone','chapters','prompt','script','story','title','motion','msg','sessionId','videoId','outUrl'].forEach(k=>{if(s[k]!==undefined&&$(k))$(k).value=s[k]});S.shots=s.shots||[];renderShots();log('State loaded')}function restore(){let k=localStorage.heygen_key;if(k)$('key').value=k;else $('key').value=DEF;$('keepKey').checked=true}function exportJson(){dlt(`heygen_io_${stamp()}.json`,JSON.stringify(ser(),null,2),'application/json')}function markdown(){let s=ser();return`# 🎬 HeyGen IO Media Lab\n\n## Prompt\n${s.prompt}\n\n## Script\n${s.script}\n\n## Storyboard\n${s.story}\n\n## Shots\n${S.shots.map((x,i)=>`${i+1}. **${x.name}** — ${x.note||''}`).join('\n')}\n\n## Last Payload\n\`\`\`json\n${JSON.stringify(S.payload||agentPayload(),null,2)}\n\`\`\`\n`}function clear(){if(confirm('Clear local state, assets, shots, and console?')){localStorage.removeItem('heygen_state');S.assets=[];S.shots=[];renderAssets();renderShots();$('log').textContent='';$('mini').textContent='';log('Cleared')}}
